/* KRńįTńįK G√úVENLńįK AńěI (kullanńĪcńĪ raporu: "beyaz ekran a√ßńĪlmńĪyor" ‚ÄĒ bazńĪ
   cihazlarda #app hi√ß dolmadan, sessizce, hi√ßbir iz bńĪrakmadan JS √ß√∂k√ľyordu).
   Ana uygulama script'i √áALIŇěMAYA BAŇěLAMADAN √∂nce, olabilecek en erken anda
   kaydedilen bu global hata yakalayńĪcńĪ, #app h√Ęl√Ę boŇüken (yani uygulama hi√ß
   render olmadan) bir hata olursa ekrana G√ĖR√úN√úR bir hata kartńĪ + "Yeniden
   Dene"/"√Ėnbelleńüi Temizle" d√ľńümeleri basar ‚ÄĒ kullanńĪcńĪ artńĪk sebepsiz bomboŇü
   bir ekranla baŇü baŇüa kalmńĪyor, biz de bir dahaki sefere ger√ßek hatayńĪ
   (mesaj+stack) g√∂rebiliyoruz. */
(function(){
  var gosterildi = false;
  function appBosMu(){ var a=document.getElementById("app"); return !a || !a.firstChild; }
  function hataGoster(baslik, detay){
    if(gosterildi || !appBosMu()) return;
    gosterildi = true;
    var el = document.getElementById("app");
    if(!el) return;
    var d1 = document.createElement("div");
    d1.style.cssText = "margin:16px;padding:16px;background:#fdeaea;border:1.5px solid #e8a8a8;border-radius:10px;";
    var h = document.createElement("div");
    h.style.cssText = "font-weight:700;font-size:16px;color:#a13a3a;margin-bottom:6px;";
    h.textContent = "‚ö†ÔłŹ " + baslik;
    var p = document.createElement("div");
    p.style.cssText = "font-size:12.5px;color:#8a5a1f;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;";
    p.textContent = detay || "";
    var b1 = document.createElement("button");
    b1.textContent = "ūüĒĄ Yeniden Dene";
    b1.style.cssText = "padding:9px 14px;border-radius:8px;border:none;background:#2f8f4e;color:#fff;font-weight:600;margin-right:8px;";
    b1.onclick = function(){ location.reload(); };
    var b2 = document.createElement("button");
    b2.textContent = "ūüßĻ √Ėnbelleńüi Temizle ve Yeniden Dene";
    b2.style.cssText = "padding:9px 14px;border-radius:8px;border:1px solid #a13a3a;background:#fff;color:#a13a3a;font-weight:600;";
    b2.onclick = function(){
      Promise.resolve().then(function(){
        if(!("serviceWorker" in navigator)) return;
        return navigator.serviceWorker.getRegistrations().then(function(regs){
          return Promise.all(regs.map(function(r){ return r.unregister(); }));
        });
      }).then(function(){
        if(!("caches" in window)) return;
        return caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); });
      }).then(function(){ location.reload(); }).catch(function(){ location.reload(); });
    };
    d1.appendChild(h); d1.appendChild(p); d1.appendChild(b1); d1.appendChild(b2);
    el.appendChild(d1);
  }
  window.addEventListener("error", function(e){
    hataGoster("Bir Ňüeyler ters gitti", (e && (e.message || (e.error && e.error.stack))) || "Bilinmeyen hata");
  });
  window.addEventListener("unhandledrejection", function(e){
    var r = e && e.reason;
    hataGoster("Bir Ňüeyler ters gitti", (r && (r.stack || r.message || String(r))) || "Bilinmeyen hata (promise)");
  });
})();
</script>

<script>
"use strict";

/* ===================== SENKRON (Firebase Firestore) =====================
   Bo\u015f b\u0131rak\u0131rsan uygulama yaln\u0131zca bu cihazda \u00e7al\u0131\u015f\u0131r (offline, mevcut h\u00e2li).
   Senkron i\u00e7in: Firebase'de \u00fccretsiz proje a\u00e7 -> Firestore Database ba\u015flat ->
   Proje Ayarlar\u0131 > "Web app" yap\u0131land\u0131rmas\u0131n\u0131 a\u015fa\u011f\u0131ya yap\u0131\u015ft\u0131r. FARM_CODE: i\u015fletme kodu. */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyDzG6DG2Z1xbGIBIy7gRM2yTENfrSq7Kh4",
  authDomain: "dirican-mantar.firebaseapp.com",
  projectId: "dirican-mantar",
  storageBucket: "dirican-mantar.firebasestorage.app",
  messagingSenderId: "854408068861",
  appId: "1:854408068861:web:7b358e97db38620d83c894"
};
var FARM_CODE = "merkez";
/* ======================================================================= */

var FB = { ready:false, coll:null, gorevColl:null, arizaColl:null, yoklamaColl:null, hasatColl:null, firstServer:false, firstServerG:false, firstServerA:false, firstServerY:false };
var _synced = {};
var _syncedG = {};
var _syncedA = {};
var _syncedY = {};
function cycleJSON(c){ return JSON.stringify(c); }
function fbClean(c){ return JSON.parse(JSON.stringify(c)); }
function rebuildSynced(){ _synced={}; ((memData&&memData.cycles)||[]).forEach(function(c){ _synced[c.id]=cycleJSON(c); }); }
function rebuildSyncedG(){ _syncedG={}; ((memData&&memData.gorevler)||[]).forEach(function(g){ _syncedG[g.id]=cycleJSON(g); }); }
function rebuildSyncedA(){ _syncedA={}; ((memData&&memData.arizalar)||[]).forEach(function(a){ _syncedA[a.id]=cycleJSON(a); }); }
function rebuildSyncedY(){ _syncedY={}; ((memData&&memData.yoklamalar)||[]).forEach(function(y){ _syncedY[y.id]=cycleJSON(y); }); }
function isTyping(){ var a=document.activeElement; return !!(a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)); }
function fbPendingCount(){
  var n=0;
  ((memData&&memData.cycles)||[]).forEach(function(c){ if(_synced[c.id]!==cycleJSON(c)) n++; });
  ((memData&&memData.gorevler)||[]).forEach(function(g){ if(_syncedG[g.id]!==cycleJSON(g)) n++; });
  ((memData&&memData.arizalar)||[]).forEach(function(a){ if(_syncedA[a.id]!==cycleJSON(a)) n++; });
  ((memData&&memData.yoklamalar)||[]).forEach(function(y){ if(_syncedY[y.id]!==cycleJSON(y)) n++; });
  return n;
}
function fbSetStatus(s){
  var e=document.getElementById("syncDot"); if(!e) return;
  var bekleyen = (s==="offline"||s==="hata") ? fbPendingCount() : 0;
  var bek = bekleyen>0 ? (" \u00b7 "+bekleyen+" kay\u0131t bekliyor") : "";
  if(s==="synced"){ e.textContent="\u25cf senkron"; e.style.color="#bff5dc"; }
  else if(s==="offline"){ e.textContent="\u25cf \u00e7evrimd\u0131\u015f\u0131"+bek; e.style.color="#ffe0a3"; }
  else if(s==="local"){ e.textContent="\u25cf yerel"; e.style.color="#cfe3ff"; }
  else if(s==="hata"){ e.textContent="\u25cf senkron bekliyor"+bek; e.style.color="#ffb3b3"; }
  else { e.textContent=""; }
}
var _syncFailCount=0;
function fbPushDirty(){
  if(!FB.ready) return;
  ((memData&&memData.cycles)||[]).forEach(function(c){
    var j=cycleJSON(c);
    if(_synced[c.id]!==j){
      FB.coll.doc(c.id).set(fbClean(c)).then(function(){
        _synced[c.id]=j; /* sadece ger√ßekten baŇüarńĪlńĪ olursa iŇüaretle */
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("set",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDelete(id){
  if(!FB.ready) return Promise.resolve();
  delete _synced[id];
  return FB.coll.doc(id).delete()
    .then(function(){
      /* Silme baŇüarńĪlńĪ ‚ÄĒ tombstone listesinden √ßńĪkar (tekrar gelmez) */
      silinenIdTemizle(id);
    })
    .catch(function(e){
      console.warn("delete hatasńĪ", e);
      fbSetStatus("hata");
      /* Hata olsa bile tombstone'da kalńĪr ‚ÄĒ sonra retry'ńĪ otomatik deneyecek */
      throw e;
    });
}
/* KALICI SńįLńįNEN KAYIT LńįSTESńį (tombstone): bir d√∂ng√ľ silindińüinde ID'si buraya
   eklenir. Silme isteńüi buluta ulaŇüamadan (yavaŇü bańülantńĪ, uygulama erken
   kapatńĪlńĪrsa) cihaz kapanńĪrsa, bulut o kaydńĪ h√Ęl√Ę tutar ve bir sonraki
   senkronda GERńį GELńįR ‚ÄĒ kullanńĪcńĪ "her kapattńĪńüńĪmda eski veri geliyor" diye
   defalarca aynńĪ hayalet kayńĪtlarńĪ elle siliyordu. ArtńĪk silinen ID'ler ayrńĪ
   bir listede kalńĪcńĪ tutuluyor; senkronda bu ID'lerden biri tekrar gelirse
   sessizce YOK SAYILIP buluttan bir daha silinir ‚ÄĒ kullanńĪcńĪya hi√ß g√∂r√ľnmez. */
var SILINEN_KEY = "utp_silinenIdler";
function silinenIdlerGetir(){ try{ return JSON.parse(localStorage.getItem(SILINEN_KEY)||"[]"); }catch(e){ return []; } }
function silinenIdEkle(id){
  try{
    var L=silinenIdlerGetir();
    if(L.indexOf(id)<0){ L.push(id); if(L.length>500) L=L.slice(-500); localStorage.setItem(SILINEN_KEY, JSON.stringify(L)); }
  }catch(e){ console.warn("silinen id kaydedilemedi", e); }
}
function silinenIdMi(id){ return silinenIdlerGetir().indexOf(id)>=0; }
/* Silinen ID'sini listeden kaldńĪr (buluta baŇüarńĪyla gittikten sonra) */
function silinenIdTemizle(id){
  try{
    var L=silinenIdlerGetir();
    L = L.filter(function(x){return x!==id;});
    localStorage.setItem(SILINEN_KEY, JSON.stringify(L));
  }catch(e){ console.warn("silinen id temizleme hatasńĪ", e); }
}
function fbPushDirtyGorev(){
  if(!FB.ready || !FB.gorevColl) return;
  ((memData&&memData.gorevler)||[]).forEach(function(g){
    var j=cycleJSON(g);
    if(_syncedG[g.id]!==j){
      FB.gorevColl.doc(g.id).set(fbClean(g)).then(function(){
        _syncedG[g.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setG",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteGorev(id){ if(FB.ready && FB.gorevColl){ delete _syncedG[id]; FB.gorevColl.doc(id).delete().catch(function(e){ console.warn("deleteG",e); fbSetStatus("hata"); }); } }
/* ArńĪzalar (d.arizalar) ‚ÄĒ KRńįTńįK: eskiden hi√ß buluta senkronize edilmiyordu,
   sadece o anki cihazńĪn localStorage'ńĪnda kalńĪyordu. Teknisyenin ekranńĪ,
   ArńĪzalar sekmesinin TEK amacńĪ olduńüu i√ßin bu, "y√∂neticinin bildirdińüi arńĪza
   teknisyende hi√ß g√∂r√ľnm√ľyor" hatasńĪnńĪn dońürudan sebebiydi ‚ÄĒ iki cihaz aynńĪ
   veriyi paylaŇümńĪyordu. gorevler ile birebir aynńĪ desen: kendi Firestore
   koleksiyonu, her arńĪza kendi dok√ľmanńĪ. */
function fbPushDirtyAriza(){
  if(!FB.ready || !FB.arizaColl) return;
  ((memData&&memData.arizalar)||[]).forEach(function(a){
    var j=cycleJSON(a);
    if(_syncedA[a.id]!==j){
      FB.arizaColl.doc(a.id).set(fbClean(a)).then(function(){
        _syncedA[a.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setA",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteAriza(id){ if(FB.ready && FB.arizaColl){ delete _syncedA[id]; FB.arizaColl.doc(id).delete().catch(function(e){ console.warn("deleteA",e); fbSetStatus("hata"); }); } }
/* Yoklama (d.yoklamalar) ‚ÄĒ gorevler/arizalar ile birebir aynńĪ desen: kendi
   Firestore koleksiyonu, her g√ľn+personel kaydńĪ kendi dok√ľmanńĪ. √Ėzl√ľk
   haklarńĪ i√ßin tutulan bir kayńĪt olduńüundan her cihaz aynńĪ veriyi g√∂rmeli. */
function fbPushDirtyYoklama(){
  if(!FB.ready || !FB.yoklamaColl) return;
  ((memData&&memData.yoklamalar)||[]).forEach(function(y){
    var j=cycleJSON(y);
    if(_syncedY[y.id]!==j){
      FB.yoklamaColl.doc(y.id).set(fbClean(y)).then(function(){
        _syncedY[y.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setY",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
/* gorevlerMukerrerleriBirlestir()'in kuyruńüa aldńĪńüńĪ fazlalńĪk bulut dok√ľmanlarńĪnńĪ
   siler ‚ÄĒ bkz. o fonksiyondaki yorum. Bulut hazńĪr deńüilse sessizce vazge√ßer,
   kuyruk (memData._gorevMukerrerSil) diskte kalńĪr, bir sonraki fńĪrsatta
   (30sn'lik senkron d√∂ng√ľs√ľ / bulut bańülantńĪsńĪ kurulunca) tekrar denenir. */
function gorevMukerrerBulutTemizle(){
  if(!FB.ready || !FB.gorevColl) return;
  var d=loadData();
  if(!Array.isArray(d._gorevMukerrerSil) || !d._gorevMukerrerSil.length) return;
  d._gorevMukerrerSil.forEach(function(id){ fbDeleteGorev(id); });
  d._gorevMukerrerSil=[];
  saveData();
}

function hasatTartiOtoOdalariSil(d){
  if(!d || !d.cycles) return false;

/* ---- EŇüzamanlńĪ d√ľzenleme: d√∂ng√ľ birleŇütirme (veri kaybńĪ olmasńĪn) ---- */
function mergeArr(localArr, remoteArr, keyFn, preferLocal){
  var map={}, order=[];
  function add(arr){ (arr||[]).forEach(function(e){ var k=keyFn(e); if(!(k in map)) order.push(k); map[k]=e; }); }
  if(preferLocal){ add(remoteArr); add(localArr); } else { add(localArr); add(remoteArr); }
  return order.map(function(k){ return map[k]; });
}
/* ńįki d√ľz obje (key -> deńüer) i√ßin birleŇütirme: her iki taraftaki T√úM anahtarlar
   korunur, aynńĪ anahtar ikisinde de varsa "tercih edilen" (daha yeni _at'lńĪ) taraf
   kazanńĪr. mergeArr'ńĪn obje versiyonu ‚ÄĒ dizi olmayan alanlar (done/ertele/
   adimDetay/kontrolKarar) i√ßin de aynńĪ "hi√ßbir taraf sessizce kaybolmasńĪn"
   prensibi ge√ßerli olsun diye. */
function mergeFlatObj(localObj, remoteObj, preferLocal){
  var out={};
  var alt=preferLocal?remoteObj:localObj, ust=preferLocal?localObj:remoteObj;
  if(alt) Object.keys(alt).forEach(function(k){ out[k]=alt[k]; });
  if(ust) Object.keys(ust).forEach(function(k){ out[k]=ust[k]; });
  return out;
}
function mergeCycle(localC, remoteC){
  if(!localC) return remoteC; if(!remoteC) return localC;
  var lAt=localC._at||"", rAt=remoteC._at||"", preferLocal=lAt>rAt;
  var merged=JSON.parse(JSON.stringify(preferLocal?localC:remoteC));
  merged.gunluk=mergeArr(localC.gunluk, remoteC.gunluk, function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hava  =mergeArr(localC.hava,   remoteC.hava,   function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  /* Anahtar √∂nce e.id (bkz. addHasat/hasatKayitIdEkle) ‚ÄĒ aynńĪ g√ľn+t√ľrde birden
     fazla hasat giriŇüi (√∂rn. sabah/√∂ńüleden sonra, farklńĪ personel) id olmadan
     tarih+tip'e g√∂re dedupe edilince BńįRBńįRńįNńįN √úZERńįNE YAZIP veri kaybediyordu
     (kullanńĪcńĪ raporu / kod incelemesi). id'si olmayan eski kayńĪtlar i√ßin geriye
     d√∂n√ľk uyumluluk amacńĪyla kasa+personel de anahtara eklenir (√ßakńĪŇüma riskini
     azaltńĪr, tamamen ortadan kaldńĪrmaz ‚ÄĒ id atamasńĪ kalńĪcńĪ √ß√∂z√ľm). */
  merged.hasat =mergeArr(localC.hasat,  remoteC.hasat,  function(e){return e.id||((e.tarih||"")+"|"+(e.tip||"")+"|"+(e.kasa||"")+"|"+(e.personel||""));}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.odaGorevleri=mergeArr(localC.odaGorevleri, remoteC.odaGorevleri, function(e){return e.id||"";}, preferLocal);
  /* KRńįTńįK: eskiden bu alanlar SADECE daha yeni _at'lńĪ tarafńĪn b√ľt√ľn objesinden
     kopyalanńĪyordu ‚ÄĒ iki cihaz aynńĪ anda farklńĪ protokol adńĪmlarńĪnńĪ (√∂rn. biri
     "Toprak serildi", dińüeri "TńĪrmńĪk yapńĪldńĪ") iŇüaretlerse, ge√ß senkron olan
     cihazńĪn iŇüareti sessizce kaybolabiliyordu (bkz. adimTamamla/c.done). ArtńĪk
     her iki taraftaki anahtarlar da korunuyor, sadece √áAKIŇěAN anahtarlarda
     "tercih edilen" taraf kazanńĪyor. */
  merged.done      = mergeFlatObj(localC.done,      remoteC.done,      preferLocal);
  merged.doneSon   = mergeFlatObj(localC.doneSon,   remoteC.doneSon,   preferLocal);
  merged.ertele    = mergeFlatObj(localC.ertele,    remoteC.ertele,    preferLocal);
  merged.adimDetay = mergeFlatObj(localC.adimDetay, remoteC.adimDetay, preferLocal);
  merged.kontrolKarar = mergeFlatObj(localC.kontrolKarar, remoteC.kontrolKarar, preferLocal);
  var tempAckKeys={};
  Object.keys(localC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  Object.keys(remoteC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  merged.tempAck={};
  Object.keys(tempAckKeys).forEach(function(k){
    merged.tempAck[k]=mergeFlatObj((localC.tempAck||{})[k], (remoteC.tempAck||{})[k], preferLocal);
  });
  merged._at=(lAt>rAt?lAt:rAt)||merged._at;
  return merged;
}

       Anonim giriŇü (kullanńĪcńĪya hi√ß g√∂r√ľnmez, Ňüifre gerektirmez) yapmadan
       hi√ßbir okuma/yazma iŇülemi √ßalńĪŇümaz. Bu, API key'i bilen rastgele bir
       script/curl isteńüinin dońürudan Firestore'a eriŇümesini engeller ‚ÄĒ

  if(_settingsPendingSince){ fbPushSettings(); _bootWaitResolveIfNeeded(); return; }

function fbPushSettings(){

/* KullanńĪcńĪ raporu: "Hasat Takip senkronu geldi ama Raporlar > Hasat/Firma/
   Analiz hi√ß deńüiŇümedi." K√∂k neden: hasatTartiGetir() SADECE Oda DetayńĪ'ndaki
   k√ľ√ß√ľk "Hasat Takip" kartńĪnńĪ besliyordu ‚ÄĒ Verim/Firma/Analiz/Excel'in
   GER√áEKTEN okuduńüu tek kaynak c.hasat dizisi (elle "+ Hasat ekle" ile
   doldurulan) hi√ß g√ľncellenmiyordu, senkronla bańülantńĪsńĪ yoktu.
   Bu fonksiyon, senkronlanan her tartńĪ kaydńĪnńĪ (ana90+duble+dokme+ikinci ‚Üí
   "normal", kestane ‚Üí "kestane") c.hasat'a birebir aynńĪ formatta yazar ‚ÄĒ
   b√∂ylece T√úM mevcut rapor/verim/analiz fonksiyonlarńĪ (hi√ßbiri deńüiŇütirilmeden)
   senkronu otomatik g√∂r√ľr. SatńĪrlar source:"hasat_tarti_sync" + sourceKey
   (oda+tarih) ile iŇüaretlenir: aynńĪ g√ľn yeniden senkronlanńĪnca ESKńį satńĪrńĪn

   Elle girilmiŇü ("+ Hasat ekle") kayńĪtlara ASLA dokunulmaz, ayrńĪ kalńĪr. */
/* Performans: window._hasatTarti'de biriken T√úM kayńĪtlarńĪ her cycle i√ßin
   TEKRAR TEKRAR taramak (hasatTartiGetir'in yaptńĪńüńĪ gibi) tur 16/17 ge√ßmiŇü
   verisi + zamanla b√ľy√ľyen g√ľnl√ľk senkron sonrasńĪnda (y√ľzlerce kayńĪt √ó
   onlarca oda) her a√ßńĪlńĪŇüta g√∂zle g√∂r√ľl√ľr bir yavaŇülńĪńüa yol a√ßtńĪ (kullanńĪcńĪ
   raporu: "yavaŇü a√ßńĪlńĪyor"). Bu index t√ľm kayńĪtlarńĪ TEK GE√áńįŇěTE oda+tur'a
   g√∂re gruplar; hasatTartiTumDonguleriSenkronEt bunu bir kez kurup her
   cycle'a O(1) eriŇüim i√ßin ge√ßer. hasatTartiGetir (Oda DetayńĪ gibi TEK bir
   oda i√ßin √ßańürńĪlan dińüer yerler) deńüiŇümedi, h√Ęl√Ę tek baŇüńĪna kullanńĪlabilir. */
function _hasatTartiIndexOlustur(){
  var idx={};
  var store=window._hasatTarti||{};
  Object.keys(store).forEach(function(key){
    var d=store[key]; if(!d || !d.oda) return;
    var gk=d.oda+"__"+String(d.tur);
    if(!idx[gk]) idx[gk]=[];
    idx[gk].push(d);
  });
  Object.keys(idx).forEach(function(gk){ idx[gk].sort(function(a,b){ return cmpDate(a.tarih,b.tarih); }); });

/* KullanńĪcńĪ isteńüi: "ge√ßmiŇü senkronu (tur16/17) devre dńĪŇüńĪ bńĪrakńĪrńĪm, bunu
   yap donuyor" ‚ÄĒ donma sorunu birden fazla d√ľzeltmeden sonra da s√ľrd√ľńü√ľ
   i√ßin, tur16/17 i√ßin hem YENńį oda oluŇüturma (HASAT_GECMIS_OTO_TUR=[])
   hem de zaten oluŇümuŇü bu odalarńĪn ńįLERńį senkron g√ľncellemesi (aŇüańüńĪdaki
   kontrol) tamamen durduruldu ‚ÄĒ bu odalar artńĪk dokunulmuyor/touchCycle
   edilmiyor/buluta push edilmiyor, olduklarńĪ h√Ęlde donuyor kalńĪyorlar.
   Zaten senkronlanmńĪŇü c.hasat verileri SńįLńįNMEDńį, sadece artńĪk
   g√ľncellenmiyor. Geri a√ßmak i√ßin bu listeyi boŇüalt. */
var HASAT_SENKRON_DEVRE_DISI_TUR = [16,17];
function hasatTartiSenkronEt(c, _idx){
  if(!c || !c.oda || c.tur==null || c.tur==="") return false;
  if(HASAT_SENKRON_DEVRE_DISI_TUR.indexOf(Number(c.tur))>=0) return false;
  var kayitlar = _idx ? (_idx[c.oda+"__"+String(c.tur)]||[]) : hasatTartiGetir(c.oda, c.tur);
  if(!kayitlar.length) return false;
  if(!c.hasat) c.hasat=[];
  var degisti=false;
  /* Firma/tonaj SADECE bu oda kaydńĪnda h√Ęl√Ę BOŇěSA senkrondan doldurulur ‚ÄĒ
     elle girilmiŇü bilgi asla ezilmez. Ama√ß: Firma Analizi'nin, oda elle
     a√ßńĪlńĪp firma bilgisi hi√ß yazńĪlmasa bile (√∂zellikle otomatik oluŇüan
     tur16/17 kayńĪtlarńĪnda) √ßalńĪŇüabilmesi. */
  if(!c.kompostFirma){
    var firmaliKayit = kayitlar.filter(function(k){return k.firma;})[0];
    if(firmaliKayit){ c.kompostFirma=firmaAdiCanonik(firmaliKayit.firma); degisti=true; }
  }
  if(!c.tonaj){
    var tonajliKayit = kayitlar.filter(function(k){return numParse(k.tonaj)>0;})[0];
    if(tonajliKayit){ c.tonaj=""+numParse(tonajliKayit.tonaj); degisti=true; }
  }
  /* c.hasat'ta sourceKey+tip'e g√∂re mevcut satńĪrńĪ bulmak i√ßin de aynńĪ
     O(kayńĪt√óhasat) taramasńĪ vardńĪ ‚ÄĒ tek ge√ßiŇüte bir haritaya √ßevrildi. */
  var hasatIdx={};
  c.hasat.forEach(function(h,i){ if(h.sourceKey) hasatIdx[h.sourceKey+"__"+h.tip]=i; });
  kayitlar.forEach(function(k){
    var srcKey = k.oda+"__"+k.tarih;
    var normalKasa = (numParse(k.ana90)||0)+(numParse(k.duble)||0)+(numParse(k.dokme)||0)+(numParse(k.ikinci)||0);
    var kestaneKasa = numParse(k.kestane)||0;
    [["normal",normalKasa],["kestane",kestaneKasa]].forEach(function(pair){
      var tip=pair[0], kasa=pair[1];
      var mapKey=srcKey+"__"+tip;
      var idx = (mapKey in hasatIdx) ? hasatIdx[mapKey] : -1;
      if(kasa<=0){
        if(idx>=0){
          c.hasat.splice(idx,1); degisti=true;
          delete hasatIdx[mapKey];
          Object.keys(hasatIdx).forEach(function(mk){ if(hasatIdx[mk]>idx) hasatIdx[mk]--; });
        }
        return;
      }
      var kasaStr=""+kasa;
      if(idx>=0){
        if(c.hasat[idx].kasa!==kasaStr){ c.hasat[idx].kasa=kasaStr; degisti=true; }
      } else {
        c.hasat.push({tarih:k.tarih, tip:tip, kasa:kasaStr, personel:"Hasat Takip (senkron)", source:"hasat_tarti_sync", sourceKey:srcKey});
        hasatIdx[mapKey]=c.hasat.length-1;
        degisti=true;
      }
    });
  });
  /* KRńįTńįK: touchCycle() burada UNUTULMUŇěTU ‚ÄĒ c._at hi√ß g√ľncellenmeden i√ßerik
     (c.hasat/kompostFirma/tonaj) deńüiŇüince, bulut senkronu mergeCycle()'da
     "hangi taraf daha yeni" kararńĪnńĪ YANLIŇě veriyordu (ikisi de _at="" olunca
     preferLocal=false kalńĪyor, sunucudan gecikmeli/eski bir yankńĪ gelirse ONU
     "daha yeni" sanńĪp yerel senkron g√ľncellemesinin √ľzerine yazabiliyor,
     bu da tekrar push‚ÜíyankńĪ‚Üímerge d√∂ng√ľs√ľne (ve donmaya) yol a√ßabiliyordu ‚ÄĒ
     kullanńĪcńĪ raporu: "hala donuyor"). Dińüer T√úM yazma yerlerinde olduńüu gibi
     (bkz. formKaydet, setTurNumarasi) burada da mutasyon sonrasńĪ √ßańürńĪlmalńĪ. */
  if(degisti) touchCycle(c);
  return degisti;
}
/* KullanńĪcńĪ isteńüi: "sadece 16. tur ve 17. turun hasat deńüerlerini al ama
   √ľretim takipten oda a√ßma" ‚ÄĒ bu iki tur √úretim Takip'te hi√ß oda kaydńĪ
   (cycle) olarak yok (uygulama 18. turdan itibaren kullanńĪlmaya baŇülanmńĪŇü),
   bu y√ľzden senkronlanan veri hi√ßbir yere yazńĪlamńĪyordu. Bu fonksiyon,
   SADECE bu iki tur i√ßin, karŇüńĪlńĪńüńĪ olmayan her oda+tur kombinasyonuna
   otomatik ve DOńěRUDAN ARŇěńįVLENMńįŇě (bosaltimTarihi dolu) minimal bir kayńĪt
   a√ßar ‚ÄĒ elle "Oda OluŇütur" akńĪŇüńĪna hi√ß girilmez, bosaltimTarihi baŇütan
   dolu olduńüu i√ßin G√ľnl√ľk Tur/Bug√ľn/protokol ekranlarńĪnda da hi√ß g√∂r√ľnmez,
   sadece ge√ßmiŇüe d√∂n√ľk Hasat/Analiz raporlarńĪnda sayńĪlńĪr. 18. tur ve
   sonrasńĪ kasńĪtlńĪ olarak KAPSAM DIŇěI ‚ÄĒ odalar orada zaten elle a√ßńĪlńĪyor,
   unutulan bir oda varsa sessizce "hayali oda" oluŇüturmasńĪn diye liste
   sabit tutuluyor. */
/* DEVRE DIŇěI (kullanńĪcńĪ raporu: "hala donuyor") ‚ÄĒ bkz. HASAT_SENKRON_DEVRE_DISI_TUR
   yorumu yukarńĪda. BoŇü bńĪrakńĪldńĪńüńĪ s√ľrece tur16/17 i√ßin yeni oda oluŇüturulmaz. */
var HASAT_GECMIS_OTO_TUR = [];
function hasatTartiEksikOdalariOlustur(){
  var d=loadData();
  var mevcutSet={};
  (d.cycles||[]).forEach(function(c){ mevcutSet[normalizeOda(c.oda)+"__"+String(c.tur)]=true; });
  var gruplar={};
  Object.keys(window._hasatTarti||{}).forEach(function(key){
    var k=window._hasatTarti[key];
    if(!k || !k.oda || k.tur==null || k.tur==="") return;
    var turNo=Number(k.tur);
    if(HASAT_GECMIS_OTO_TUR.indexOf(turNo)<0) return;
    var gk=normalizeOda(k.oda)+"__"+String(turNo);
    if(mevcutSet[gk]) return;
    if(!gruplar[gk]) gruplar[gk]={oda:k.oda, tur:turNo, tarihler:[], gelis:""};
    gruplar[gk].tarihler.push(k.tarih);
    if(k.gelis_tarihi) gruplar[gk].gelis=k.gelis_tarihi;
  });
  var eklendi=false;
  Object.keys(gruplar).forEach(function(gk){
    var g=gruplar[gk];
    if(!g.tarihler.length) return;
    var sirali=g.tarihler.slice().sort();
    var c={id:uid(), oda:g.oda, tur:g.tur, gelisTarihi:(g.gelis||sirali[0]), gunluk:[], hava:[], hasat:[],
      bosaltimTarihi:sirali[sirali.length-1], source:"hasat_tarti_sync"};
    touchCycle(c);
    d.cycles.push(c);
    mevcutSet[gk]=true;
    eklendi=true;
  });
  if(eklendi) saveData();
  return eklendi;
}
/* T√ľm d√∂ng√ľler i√ßin hasatTartiSenkronEt √ßalńĪŇütńĪrńĪr ‚ÄĒ hasat_tarti koleksiyonu
   her g√ľncellendińüinde (onSnapshot) √ßańürńĪlńĪr. Sadece ger√ßekten deńüiŇüiklik
   olduysa saveData() tetikler (gereksiz yazma/senkron trafińüi olmasńĪn). */
function hasatTartiTumDonguleriSenkronEt(){
  var idx = _hasatTartiIndexOlustur();
  var otoEklendi = hasatTartiEksikOdalariOlustur();
  var d=loadData(); var degisti=otoEklendi;
  (d.cycles||[]).forEach(function(c){ if(hasatTartiSenkronEt(c, idx)) degisti=true; });
  if(degisti){ d.cycles.forEach(function(c){ if(c.hasat) c.hasat.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); }); }); saveData(); }
  return degisti;
}

var STORE_KEY = "uretim_takip_v1";

         ({enc:1,salt,iv,ct}) olabilir ‚ÄĒ bu senkron yol onu √á√ĖZEMEZ. ZarfńĪ
         ger√ßek veriymiŇü gibi kabul edip memData.cycles'ńĪ sessizce
         boŇüaltmak yerine (ge√ßmiŇüte "odalar silindi" g√∂r√ľn√ľm√ľne yol a√ßan bir
         veri kaybńĪ bugńĪ yaratmńĪŇütńĪ) burada NET bi√ßimde reddedip appBoot'un
         dońüru (asenkron, g√∂√ß mantńĪklńĪ) yoldan doldurmasńĪnńĪ bekleriz. */
      if(memData && memData.enc===1){
        console.error("loadData(): eski Ňüifreli zarf senkron yoldan okunmaya √ßalńĪŇüńĪldńĪ ‚ÄĒ √ß√∂z√ľlmeden kullanńĪlmayacak");
        memData = null;
        return {cycles:[]};
      }
    }catch(e){
      console.error("KayńĪtlńĪ veri bozuk ‚ÄĒ JSON.parse hatasńĪ", e);
      /* Bozuk ham veriyi ASLA kaybetme: ayrńĪ bir anahtara yedekle ki elle kurtarńĪlabilsin.
         Aksi halde ilk saveData() bozuk veriyi ezerdi ve geri d√∂n√ľŇü√ľ olmazdńĪ. */
      try{ localStorage.setItem(STORE_KEY+"_bozuk_"+Date.now(), raw); }catch(e2){ console.error("bozuk veri yedeklenemedi", e2); }
      _veriOkumaHatasi=true;

}
/* loadData()'nńĪn alan-varsayńĪlanńĪ + tek seferlik g√∂√ß mantńĪńüńĪ ‚ÄĒ appBoot/
   resumeYenidenYukle memData'yńĪ loadData()'nńĪn senkron sońüuk yolundan

function firmaCasingBirlestir(d){
  if(!d) return false;
  var degisti=false;
  if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.firmalar)) d.settings.firmalar=[];
  var canon={};
  var temiz=[];
  d.settings.firmalar.forEach(function(f){
    if(!f){ return; }
    var lc=f.toLowerCase();
    if(lc in canon){ degisti=true; return; }
    canon[lc]=f; temiz.push(f);
  });
  if(temiz.length!==d.settings.firmalar.length){ d.settings.firmalar=temiz; degisti=true; }
  (d.cycles||[]).forEach(function(c){
    if(!c.kompostFirma) return;
    var lc=c.kompostFirma.toLowerCase();
    if(!(lc in canon)){ canon[lc]=c.kompostFirma; return; }
    if(canon[lc]!==c.kompostFirma){ c.kompostFirma=canon[lc]; degisti=true; }
  });
  return degisti;
}
/* TEK SEFERLńįK GE√áńįŇě: Zaten aktif olan (kompost i√ßinde, g√ľnl√ľk √∂l√ß√ľm giriliyor)
   odalarda kompostIndirme hi√ß set edilmemiŇü olabilir (bu d√ľzeltmeden √∂nce oluŇüturulmuŇü
   odalar). "Oda var = kompost zaten konmuŇü = indirilmiŇü" mantńĪńüńĪyla geriye d√∂n√ľk
   dolduruyoruz ‚ÄĒ b√∂ylece "YarńĪn planlanan"da anlamsńĪz bir "kompost indirme" g√∂revi
   kńĪrmńĪzńĪ g√∂r√ľnmeye devam etmez. ńįdempotent, zaten dolu olanlara dokunmaz. */
function kompostIndirmeGeriyeDonukDoldur(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi) return; /* boŇüaltńĪlmńĪŇü eski odalarńĪ geriye d√∂n√ľk deńüiŇütirmeye gerek yok */
    /* ńįleri tarihli (hen√ľz gelmemiŇü) kompostu geriye d√∂n√ľk "indirildi" SAYMAYIZ
       ‚ÄĒ yoksa bu migration her a√ßńĪlńĪŇüta, planToOda'nńĪn kasńĪtlńĪ olarak boŇü
       bńĪraktńĪńüńĪ ileri tarihli kompost indirmeyi tekrar doldurup "yarńĪn kompost
       gelecek"i YarńĪn yapńĪlacaklar'dan gizlerdi (kullanńĪcńĪ raporu: "A-7 yarńĪn
       kompost gelecek ama yarńĪnki iŇülemlerde g√∂r√ľnm√ľyor"). */
    if((!c.kompostIndirme || !c.kompostIndirme.tarih) && c.gelisTarihi && c.gelisTarihi<=todayISO()){
      c.kompostIndirme={tarih:c.gelisTarihi};
      degisti=true;
    }
  });
  return degisti;
}
/* TEK SEFERLńįK GE√áńįŇě (v187 √∂ncesi kayńĪtlar i√ßin): eskiden protokol notlarńĪ
   ("X yapńĪldńĪ", "X ertelendi" vb.) sulama alanńĪna karńĪŇüńĪk yazńĪlńĪyordu. BunlarńĪ
   islemNot'a ayńĪrńĪr. Desen eŇüleŇümeyen (ger√ßek sulama/ila√ß metni) sulama'da kalńĪr.
   "YarńĪn i√ßin deńüiŇüiklik: ..." notlarńĪ TAŇěINMAZ, tamamen SńįLńįNńįR ‚ÄĒ o bilgi zaten
   c.yarinDegisiklik i√ßinde ayrńĪca saklńĪ ve YarńĪn s√ľtununda mavi g√∂steriliyor;
   Bug√ľn ńįŇülem kutusunda tekrar g√∂stermek sadece kalabalńĪk yapńĪyordu.
   ńįdempotent ‚ÄĒ zaten temiz kayńĪtlarda hi√ßbir Ňüeyi deńüiŇütirmez, her seferinde
   √ßalńĪŇütńĪrmak g√ľvenlidir. */
function gunlukEskiNotlariAyir(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  var silDeseni=/^(deńüiŇüiklik|yarńĪn i√ßin deńüiŇüiklik)\s*:/i;
  var tasiDeseni=/(yapńĪldńĪ|ertelendi|planlandńĪ|√ßekildi|hatńĪrlatńĪlacak)\s*(\([^)]*\))?\s*$/i;
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){
      if(g.sulama){
        var parcalar=(""+g.sulama).split(" ¬∑ ").map(function(x){return x.trim();}).filter(Boolean);
        var kalanSulama=[], tasinacak=[];
        parcalar.forEach(function(p){
          if(silDeseni.test(p)){ degisti=true; return; } /* tamamen at */
          (tasiDeseni.test(p)?tasinacak:kalanSulama).push(p);
        });
        var yeniSulama=kalanSulama.join(" ¬∑ ");
        if(yeniSulama!==g.sulama){ g.sulama=yeniSulama; degisti=true; }
        tasinacak.forEach(function(t){
          var mevcut=(""+(g.islemNot||"")).split(" ¬∑ ").map(function(x){return x.trim();});
          if(mevcut.indexOf(t)>=0) return;
          g.islemNot = g.islemNot ? (g.islemNot+" ¬∑ "+t) : t;
          degisti=true;
        });
      }
      /* islemNot'ta zaten "deńüiŇüiklik:" notu varsa (v187-v189 arasńĪ kńĪsa s√ľre
         b√∂yle yazńĪlmńĪŇütńĪ) onu da temizle */
      if(g.islemNot){
        var inP=(""+g.islemNot).split(" ¬∑ ").map(function(x){return x.trim();}).filter(Boolean);
        var inK=inP.filter(function(p){ return !silDeseni.test(p); });
        if(inK.length!==inP.length){ g.islemNot=inK.join(" ¬∑ "); degisti=true; }
      }
    });
  });
  return degisti;
}
/* KRńįTńįK G√Ė√á: Eskiden Sabah/AkŇüam ayrńĪ kayńĪt tutuluyordu ‚ÄĒ aynńĪ g√ľn i√ßin iki satńĪr
   oluŇüabiliyordu (biri dolu, biri boŇü), bu da PDF/rapor'da anlamsńĪz tekrar gibi
   g√∂r√ľn√ľyordu. ArtńĪk g√ľnde TEK kayńĪt var. Bu fonksiyon var olan m√ľkerrer kayńĪtlarńĪ
   BńįR KEZ birleŇütirir (boŇü olmayan alanlarńĪ korur, metinleri birleŇütirir), sonra
   bir daha √ßalńĪŇümaz (bayrakla iŇüaretlenir). */
function gunlukKayitlariniBirlestir(){
  if(!memData || memData._gunlukBirlestirildi) return;
  var degisti=false;
  (memData.cycles||[]).forEach(function(c){
    if(!Array.isArray(c.gunluk) || c.gunluk.length<2) return;
    var byTarih={}; var yeni=[];
    c.gunluk.forEach(function(r){
      var t=r&&r.tarih; if(!t) return;
      if(!byTarih[t]){ byTarih[t]=r; yeni.push(r); }
      else{
        degisti=true;
        var mevcut=byTarih[t];
        ["odaC","kompostC","kompostUst","klimaC","co2alt","co2ust","su"].forEach(function(k){
          if(!mevcut[k] && r[k]) mevcut[k]=r[k];
        });
        if(r.sulama && r.sulama!==mevcut.sulama){
          mevcut.sulama = mevcut.sulama ? (mevcut.sulama+" ¬∑ "+r.sulama) : r.sulama;
        }
        if(r.vakit) mevcut.vakit=r.vakit;
      }

}

/* ================= IndexedDB (ana veri deposu) =================
   localStorage'ńĪn ~5-10MB sńĪnńĪrńĪ b√ľy√ľd√ľk√ße (yńĪllar boyu biriken g√ľnl√ľk
   kayńĪtlar) yetersiz kalabilir. Ana veri blońüu (STORE_KEY) IndexedDB'de
   tutuluyor ‚ÄĒ √ßok daha b√ľy√ľk kota. IndexedDB kullanńĪlamazsa (eski tarayńĪcńĪ,
   kńĪsńĪtlńĪ bańülam) localStorage'a sessizce d√ľŇü√ľl√ľr. */
var IDB_NAME = "utp_db", IDB_STORE = "kv", IDB_VERSION = 1;
var _idbPromise = null;
function idbAc(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise(function(resolve, reject){
    if(!window.indexedDB){ reject(new Error("indexedDB yok")); return; }
    var req;
    try{ req = indexedDB.open(IDB_NAME, IDB_VERSION); }catch(e){ reject(e); return; }
    req.onupgradeneeded = function(){ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
  return _idbPromise;
}
function idbGet(key){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var req;
      try{ req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(key); }catch(e){ reject(e); return; }
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  });
}
function idbSet(key, val){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var tx;
      try{ tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).put(val, key); }catch(e){ reject(e); return; }
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
      tx.onabort = function(){ reject(tx.error||new Error("iŇülem iptal edildi")); };
    });
  });
}
/* STORE_KEY'i okur; IndexedDB'de yoksa localStorage'a bakar (eski v‚Č§310
   kurulumlarńĪ ya da IndexedDB'nin hen√ľz tarafńĪna hi√ß yazńĪlmamńĪŇü olmasńĪ) ve
   bulursa TEK SEFERLńįK IndexedDB'ye taŇüńĪr (baŇüarńĪlńĪ taŇüńĪmadan SONRA
   localStorage'dan siler ‚ÄĒ asńĪl kazanńĪlan alan bu). */
async function storeKeyOku(){
  try{
    var v = await idbGet(STORE_KEY);
    if(v!=null) return v;
  }catch(e){ console.warn("IndexedDB okunamadńĪ, localStorage'a bakńĪlńĪyor", e); }
  var raw=null;
  try{ raw=localStorage.getItem(STORE_KEY); }catch(e){ console.warn("localStorage okunamadńĪ", e); }
  if(raw!=null){
    try{
      await idbSet(STORE_KEY, raw);
      try{ localStorage.removeItem(STORE_KEY); }catch(e){ console.warn("eski localStorage kaydńĪ silinemedi (√∂nemli deńüil)", e); }
    }catch(e){ console.warn("IndexedDB'ye taŇüńĪnamadńĪ, localStorage'da kalmaya devam ediyor", e); }
  }
  return raw;
}
function storeKeyYaz(str){
  return idbSet(STORE_KEY, str).catch(function(e){
    console.warn("IndexedDB'ye yazńĪlamadńĪ, localStorage'a d√ľŇü√ľl√ľyor", e);
    localStorage.setItem(STORE_KEY, str); /* kota hatasńĪ burada fńĪrlarsa √ßańüńĪran yakalar */
  });
}
/* √úst √ľste gelen saveData() √ßańürńĪlarńĪ birbirini yarńĪŇüta ezmesin diye
   yazmalar bir zincirde (kuyrukta) sńĪrayla iŇülenir. */
var _pinSaveChain = Promise.resolve();
function persistData(jsonStr){
  _pinSaveChain = _pinSaveChain.then(function(){
    return storeKeyYaz(jsonStr);
  }).then(function(){
    _quotaWarnShown=false; /* bir sonraki dolma anńĪnda tekrar uyarabilelim */
  }).catch(function(e){
    console.error("kayńĪt yazńĪlamadńĪ", e);
    /* KRńįTńįK: Depolama dolduńüunda sessizce ge√ßmek veri kaybńĪna yol a√ßar ‚ÄĒ
       kullanńĪcńĪ "kaydettim" sanńĪr ama deńüiŇüiklik sadece bellekte (memData)
       kalńĪr, sayfa kapanńĪnca kaybolur. Kota dolma hatasńĪ √∂zel olarak
       yakalanńĪp A√áIK√áA bildirilir ‚ÄĒ sadece console'a deńüil. */
    var isQuota = (e && (e.name==="QuotaExceededError" || e.code===22 || e.code===1014 || /quota/i.test(e.message||"")));
    if(isQuota && !_quotaWarnShown){
      _quotaWarnShown=true;
      showWarnBox("‚ö†ÔłŹ Depolama Doldu", [
        "CihazńĪn hafńĪzasńĪ doldu ‚ÄĒ <b>son deńüiŇüiklik cihaza kaydedilemedi.</b>",
        FB.ready ? "Bulut senkronu a√ßńĪk ‚ÄĒ az √∂nceki deńüiŇüiklik oradan kurtarńĪlabilir, ama emin olmak i√ßin hemen bir yedek al." : "‚ö†ÔłŹ Bulut senkronu KAPALI ‚ÄĒ bu deńüiŇüiklik kaybolmuŇü olabilir!",
        "√á√∂z√ľm: Ayarlar ‚Üí Yedekleme'den JSON indir, sonra eski fotońüraflarńĪ (√∂zellikle sesli/fotońüraflńĪ kayńĪtlarńĪ) sil.",
        "Silme sonrasńĪ tekrar dene ‚ÄĒ bu uyarńĪ kaybolursa kayńĪt baŇüarńĪlńĪ demektir."
      ]);
    }
  });
}

function normalizeOda(s){
  if(!s) return "";
  var x = s.toString().trim().toUpperCase().replace(/ńį/g,"I").replace(/Ňě/g,"S").replace(/√á/g,"C").replace(/ńě/g,"G").replace(/√ú/g,"U").replace(/√Ė/g,"O");
  var m = x.match(/([A-Z]+)\s*[-\/ .]?\s*(\d+)/);
  if(m) return m[1] + "-" + parseInt(m[2],10);
  return x.replace(/\s+/g,"");
}

/* Atama deńüeri kodlamasńĪ: "" (atanmadńĪ) | "grup:<ekipId>" | "kisi:<personelId>" */
/* √áoklu atama: deńüer virg√ľlle ayrńĪlmńĪŇü (√∂r. "grup:ic" veya "kisi:a,kisi:b") */
function atamaParse(val){ return (val||"").split(",").map(function(s){return s.trim();}).filter(Boolean); }
/* √áoklu kiŇüi se√ßim aray√ľz√ľ ‚ÄĒ onclickExpr: butona val g√∂m√ľl√ľ tam onclick ifadesi √ľreten fonksiyon */
function atamaCokluHTML(mevcut, onclickExpr){
  var secili=atamaParse(mevcut);
  var ekipler=getEkipler();
  function rozet(val,label,renk){
    var on=secili.indexOf(val)>=0;
    return '<button type="button" onclick="'+onclickExpr(val)+'" '
      +'style="display:inline-block; margin:3px; padding:4px 10px; border-radius:14px; border:1.5px solid '+renk+'; font-size:13px; cursor:pointer; '
      +(on?('background:'+renk+'; color:#fff;'):('background:#fff; color:'+renk+';'))+'">'+esc(label)+'</button>';
  }
  var h='<div style="margin-top:4px;">';
  h+='<div style="font-size:12px; color:#888; margin:2px;">Grup:</div>';
  ekipler.forEach(function(ek){ h+=rozet("grup:"+ek.id, "ūüĎ• "+ek.ad, ekipRenk(ek.id)); });
  ekipler.forEach(function(ek){
    var uyeler=getPersonelList().filter(function(p){return p.grup===ek.id;});
    if(uyeler.length){
      h+='<div style="font-size:12px; color:#888; margin:4px 2px 2px;">'+esc(ek.ad)+':</div>';
      uyeler.forEach(function(p){ h+=rozet("kisi:"+p.id, p.ad, ekipRenk(ek.id)); });
    }
  });
  h+='</div>';
  return h;
}
function atamaLabel(val){
  if(!val) return "";
  var parts=atamaParse(val);
  if(!parts.length) return "";
  return parts.map(function(v){
    if(v.indexOf("grup:")===0) return "ūüĎ• "+ekipAdi(v.slice(5));
    if(v.indexOf("kisi:")===0){ var p=personelBul(v.slice(5)); return p?("ūüĎ§ "+esc(p.ad)):"ūüĎ§ (silinmiŇü)"; }
    return "";
  }).filter(Boolean).join(" ¬∑ ");
}
/* Atanan grup/kiŇüi kodlarńĪnńĪ ger√ßek isim listesine √ßevirir (WhatsApp mesajńĪ i√ßin) */
function atamaIsimListesi(val){
  var parts=atamaParse(val); var isimler=[];
  parts.forEach(function(p){
    if(p.indexOf("grup:")===0){
      var gid=p.slice(5);
      getPersonelList().filter(function(x){return x.grup===gid;}).forEach(function(x){ if(isimler.indexOf(x.ad)<0) isimler.push(x.ad); });
    }
    else if(p.indexOf("kisi:")===0){ var per=personelBul(p.slice(5)); if(per && isimler.indexOf(per.ad)<0) isimler.push(per.ad); }
  });
  return isimler;
}

function kisaGorevAdi(txt){

/* --- Toplu g√∂rev se√ßimi: birden fazla g√∂revi iŇüaretleyip TEK WhatsApp mesajńĪnda g√∂nder ---
   Anahtar: protokol g√∂revi i√ßin "cid|idx", kompost indirme g√∂revi i√ßin "plan|planId". */
var _gorevSecili={};
function gorevSecAnahtar(i){
  if(i.plan) return "plan|"+i.planId;

    +'</div>';
}
/* Se√ßili g√∂revlerin tamamńĪnńĪ, oda + iŇü + atanan kiŇüilerle tek mesajda birleŇütirir.
   Protokol g√∂revleri + oda iŇülemleri (odaGorev) + genel/serbest g√∂revler hepsi dahil. */
function gorevTopluMesajOlustur(){
  var items=nextTasks();
  var lines=[];
  items.forEach(function(i){
    if(!gorevSecili(i)) return;
    if(i.odaGorev){
      lines.push("ūüďÖ "+fmtDate(i.date)+" ¬∑ ūüŹ† "+(i.oda||"")+": "+kisaGorevAdi(i.txt||""));
      return;
    }
    var isimler=atamaIsimListesi(i.atama||"");
    var satir="ūüďÖ "+fmtDate(i.date)+" ¬∑ ūüŹ† "+(i.oda||"")+": "+kisaGorevAdi(i.txt||"");
    if(isimler.length) satir+="\n   ūüĎ§ "+isimler.join(", ");
    lines.push(satir);
  });
  getGorevler().filter(function(g){return !g.done && g.tarih;}).forEach(function(g){
    if(!_gorevSecili["gg|"+g.id]) return;
    var isimler=atamaIsimListesi(g.atama||"");
    /* "Oda B-1 ¬∑ Oda boŇüaltma/yńĪkama" kalńĪbńĪndaki genel g√∂rev baŇülńĪklarńĪ ‚ÄĒ
       kisaGorevAdi() " ¬∑ "de ńįLK eŇüleŇümede kestińüi i√ßin asńĪl iŇü t√ľr√ľn√ľ
       sessizce atńĪyordu (bkz. gorevPlanlaGonder'daki aynńĪ d√ľzeltme). */
    var _baslik=g.baslik||"", _gOda="", _gIs=_baslik;
    if(_baslik.indexOf(" ¬∑ ")>=0){ var _p=_baslik.split(" ¬∑ "); _gOda=_p[0]; _gIs=_p.slice(1).join(" ¬∑ "); }
    var satir="ūüďÖ "+fmtDate(g.tarih)+" ¬∑ ūüßĻ "+(_gOda?("ūüŹ†"+_gOda+": "):"")+kisaGorevAdi(_gIs);
    if(isimler.length) satir+="\n   ūüĎ§ "+isimler.join(", ");
    lines.push(satir);
  });
  if(!lines.length) return null;
  return "ūüďč G√ĖREV PLANI\n\n"+lines.join("\n\n");
}
function gorevTopluGonder(){
  var msg=gorevTopluMesajOlustur();
  if(!msg){ toast("√Ėnce en az bir g√∂rev se√ß"); return; }
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }

function gorevPlanlaGonder(oda, txt, atamaVal, tarihISO){

     kaydediliyor (bkz. gorevEkleForm: baslik=konum+" ¬∑ "+is) ‚ÄĒ bu tip
     g√∂revlerde oda parametresi hep boŇü geliyordu. kisaGorevAdi() " ¬∑ "de
     ńįLK eŇüleŇümede kesiyordu, bu da konumu tutup asńĪl ńįŇě T√úR√úN√ú sessizce

  var gosterOda=oda, gosterIs=txt;

  /* Not: chat.whatsapp.com grup davet linkleri metin √∂n-doldurmayńĪ desteklemiyor.
     wa.me/?text= WhatsApp'ńĪ mesaj hazńĪr a√ßar, hangi sohbete g√∂nderileceńüini kullanńĪcńĪ se√ßer. */
  window.open("https://wa.me/?text="+encodeURIComponent(mesaj), "_blank");

var PROTOKOL_SURUM = 6; /* v6: √úretim zinciri yeniden kuruldu ‚ÄĒ Kompost indirme (gelis+0, YENńį) ‚Üí PoŇüet (indirmeden+6, artńĪk geliŇü yerine indirmeye bańülńĪ) ‚Üí Tiftik (gelis+7, bańüńĪmsńĪz) ‚Üí Toprak (offToprak, bańüńĪmsńĪz) ‚Üí TńĪrmńĪk (toprak+7) ‚Üí Hava (artńĪk tńĪrmńĪk+3, eskiden toprak+10 sabitti) ‚Üí Hasat (artńĪk hava+11, eskiden toprak+20 sabitti). PoŇüet/tiftik gecikmesi sonrakini ETKńįLEMEZ; kompost indirme/toprak/tńĪrmńĪk/hava gecikmesi bir SONRAKńį adńĪmńĪ ETKńįLER (otomatik kayar). */
/* KRńįTńįK FIX: KullanńĪcńĪ protokol√ľn√ľ v158'den (rol sistemi) √ĖNCE √∂zelleŇütirmiŇüse,
   protokolOzellestirildi bayrańüńĪ zaten true olduńüu i√ßin normal senkron mekanizmasńĪ
   bir daha √ßalńĪŇümaz ‚ÄĒ bu da "rol" alanńĪnńĪn hi√ß eklenmemesine yol a√ßar! Sonu√ß: sistem
   h√Ęl√Ę eski, kńĪrńĪlgan metin eŇüleŇümesine (regex) d√ľŇüer, "Tiftik yapńĪldńĪ" gibi durumlar
   G√∂revler ile Bilgileri D√ľzenle arasńĪnda tutarsńĪz g√∂r√ľn√ľr.
   Bu fonksiyon SADECE eksik rol etiketlerini, mevcut metne bakarak BńįR KERELńįK tahmin
   edip doldurur ‚ÄĒ metni/g√ľn√ľ/hi√ßbir Ňüeyi deńüiŇütirmez, protokolOzellestirildi'den
   bańüńĪmsńĪz olarak HER ZAMAN √ßalńĪŇüńĪr (√ß√ľnk√ľ sadece eksińüi tamamlar, asla √ľzerine yazmaz). */
function protokolRolleriTamamla(P){
  if(!Array.isArray(P)) return;
  var atanmis={};
  P.forEach(function(s){ if(s && s.rol) atanmis[s.rol]=true; });
  ["poset","tiftik","toprak","tirmik","hasat","hava","kompostindirme"].forEach(function(rol){
    if(atanmis[rol]) return;
    var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return;
    var sahipGerekli=(rol==="tiftik"||rol==="toprak"||rol==="tirmik")?"ekip":null;
    var bulunanIdx=-1;
    /* 1. deneme: metin + sahip ikisi de uysun (en kesin eŇüleŇüme) */
    for(var i=0;i<P.length;i++){
      if(P[i] && !P[i].silindi && P[i].tip==="olay" && re.test(P[i].txt||"") && (!sahipGerekli||P[i].sahip===sahipGerekli)){ bulunanIdx=i; break; }
    }
    /* 2. deneme: bulunamadńĪysa (kullanńĪcńĪ sahip'i deńüiŇütirmiŇü/farklńĪ bńĪrakmńĪŇü olabilir),
       sadece metne bak ‚ÄĒ hi√ß rol atanmamaktansa daha toleranslńĪ eŇüleŇüme daha g√ľvenli */
    if(bulunanIdx<0){
      for(var j=0;j<P.length;j++){
        if(P[j] && !P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt||"")){ bulunanIdx=j; break; }
      }
    }
    if(bulunanIdx>=0){ P[bulunanIdx].rol=rol; return; }
    /* 3. SATIR Hńį√á YOK: kullanńĪcńĪnńĪn donmuŇü (protokolOzellestirildi) protokol√ľ bu
       adńĪmńĪn eklenmesinden √ĖNCE oluŇüturulmuŇü olabilir (√∂rn. "Kompost indirme"
       v6'da eklendi ‚ÄĒ daha eski kopyalarda hi√ß satńĪr yok). Bu durumda "sńĪradaki
       iŇülem" hesaplamasńĪ bu adńĪmńĪn referans tarihini bulamaz (null d√∂ner), adńĪm
       SESSńįZCE atlanńĪr ve sńĪra bozulur (√∂rn. PoŇüet/Tiftik atlanńĪp dońürudan
       Toprak "sńĪradaki" g√∂sterilir ‚ÄĒ KRńįTńįK BUG, d√ľzeltildi). Eksik zorunlu
       adńĪm varsayńĪlandan (PROTOKOL dizisi) SONA eklenir ‚ÄĒ mevcut index'leri
       (c.ertele, c.done) bozmaz. */
    var varsayilan=null;
    for(var k=0;k<PROTOKOL.length;k++){ if(PROTOKOL[k].rol===rol){ varsayilan=PROTOKOL[k]; break; } }
    if(varsayilan){ P.push(protokolSatirKopyala(varsayilan)); }
  });
}
function getProtokol(){
  var d=loadData();
  if(d.settings && Array.isArray(d.settings.protokol) && d.settings.protokol.length){
    /* KRńįTńįK: kullanńĪcńĪ bir kez elle d√ľzenleme yaptńĪysa (protokolOzellestirildi),
       kod g√ľncellemesi (PROTOKOL_SURUM artńĪŇüńĪ) bir daha ASLA onun listesinin √ľzerine yazmaz.
       Aksi halde her yazńĪlńĪm g√ľncellemesinde kullanńĪcńĪnńĪn sildińüi/ekledińüi satńĪrlar
       sessizce geri gelirdi ‚ÄĒ bu ger√ßekten yaŇüanmńĪŇü bir hataydńĪ. */
    if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
      d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
      d.settings.protokolSurum = PROTOKOL_SURUM;
      saveData();
    }
    protokolRolleriTamamla(d.settings.protokol);
    return d.settings.protokol;
  }
  return PROTOKOL;
}
/* Bir protokol satńĪrńĪnńĪn TAM kopyasńĪnńĪ √ßńĪkarńĪr ‚ÄĒ t√ľm alanlar dahil.
   TEK KAYNAK: ensureProtokol() ve protokolVarsayilan() burayńĪ kullanńĪr.
   Eskiden √ľ√ß yerde ayrńĪ ayrńĪ elle alan listesi vardńĪ; yeni bir alan (√∂rn.
   tekrarBitisRef) eklendińüinde √ľ√ß√ľn√ľ de g√ľncellemek unutulabiliyordu ‚ÄĒ
   tam da "poŇüetten sonra sulama vermedi" hatasńĪnńĪn sebebi buydu: varsayńĪlana
   d√∂n√ľnce/otomatik g√ľncellenince tekrarBitisRef sessizce d√ľŇü√ľyordu. */
function protokolSatirKopyala(x){
  return {ref:x.ref, gun:x.gun, tip:x.tip, sahip:x.sahip, txt:x.txt, sure:x.sure, tekrar:x.tekrar, rol:x.rol,
    sonucSecenekleri:x.sonucSecenekleri, tekrarBitisRef:x.tekrarBitisRef, tekrarBitisGun:x.tekrarBitisGun};
}
function ensureProtokol(){
  var d=loadData(); if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.protokol) || !d.settings.protokol.length){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  } else if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  }
  protokolRolleriTamamla(d.settings.protokol);
  return d.settings.protokol;
}
/* Bir referans noktasńĪnńĪn (gelis/poset/tiftik/toprak/tirmik/hava) TARńįHńįNńį bulur.
   Ger√ßek tarih girilmiŇüse onu, girilmemiŇüse protokoldeki kendi tanńĪmńĪndan tahmin
   eder ‚ÄĒ tahmine o adńĪmńĪn kendi ertelemesi de eklenir. B√∂ylece "tiftikten 2 g√ľn
   sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar (toprak/su'da
   yaptńĪńüńĪmńĪz d√ľzeltmenin genel h√Ęli).
   Not: "toprak" √∂zel durumdur ‚ÄĒ protokoldeki kendi satńĪrńĪ kendine referans verir
   (ref:"toprak"), bu y√ľzden d√∂ng√ľye girmemesi i√ßin ayrńĪ ele alńĪnńĪr; tahmini
   ayarlardaki offToprak'tan gelir. poset/tiftik/tńĪrmńĪk/hava satńĪrlarńĪ gelis veya
   toprak'a referans verdińüi i√ßin √∂zyinelemeli √ß√∂z√ľm g√ľvenlidir (d√∂ng√ľ olmaz). */
function protokolReferansTarihi(c, ref, callerRol, _visiting){
  var visiting = _visiting || [];
  if(!c || !ref) return null;
  if(ref==="gelis") return c.gelisTarihi||null;
  if(ref==="toprak"){
    if(c.toprakTarihi) return c.toprakTarihi;
    if(!c.gelisTarihi) return null;
    var ti=protokolRolIdx("toprak");
    var base=null;
    /* KullanńĪcńĪ toprak satńĪrńĪnńĪ √∂zelleŇütirmiŇüse (√∂rn. ref:"gelis" + kendi gun
       deńüeri, offToprak ayarńĪndan FARKLI) o satńĪrńĪn KENDńį tanńĪmńĪna g√∂re
       hesaplarńĪz ‚ÄĒ offToprak ayarńĪnńĪ g√∂rmezden geliriz. B√∂ylece toprańüńĪn
       kendi hesabńĪ ile ona referans veren adńĪmlar (√∂rn. Vivando/toprak‚ąí2)
       HER ZAMAN aynńĪ tarihi baz alńĪr. VarsayńĪlan dizide toprak'ńĪn kendi satńĪrńĪ
       ref:"toprak" (kendine referans) olduńüu i√ßin sonsuz d√∂ng√ľye girmemek
       adńĪna SADECE ref baŇüka bir Ňüeyse (√∂zelleŇütirilmiŇüse) bu yolu kullanńĪrńĪz. */
    if(ti>=0 && getProtokol()[ti].ref!=="toprak"){
      if(visiting.indexOf(ti)<0){
        base=protokolTarih(c, getProtokol()[ti], visiting.concat([ti]));
      }
      /* visiting'de zaten varsa (d√∂ng√ľ) base=null kalńĪr, alttaki varsayńĪlana d√ľŇüer */
    }
    if(!base){
      base=addDays(c.gelisTarihi,getSet(c).offToprak); /* varsayńĪlan/self-referential durum */
    }
    /* AdńĪmńĪn kendisi TOPRAK ise kendi ertelemesini burada eklemeyiz ‚ÄĒ √ßańüńĪran
       (_adimiYarinaTasi vb.) bunu ayrńĪca ekliyor. Eklersek
       erteleme √ßift sayńĪlńĪr. Sadece BAŇěKA bir adńĪm (√∂rn. "1000 lt su") toprańüa
       referans veriyorsa, toprańüńĪn ertelemesini bu adńĪma da yansńĪtńĪrńĪz. */
    if(callerRol!=="toprak"){
      if(ti>=0){
        var te=(c.ertele&&c.ertele["p"+ti])||0;
        if(te) base=addDays(base,te);
      }
    }
    return base;
  }
  /* poset / tiftik / tńĪrmńĪk / hava: ger√ßek tarih varsa onu, yoksa protokoldeki
     kendi tanńĪmńĪndan (ref:gelis veya ref:toprak ‚ÄĒ d√∂ng√ľ olmaz) tahmin ediyoruz,
     tahmine o adńĪmńĪn kendi ertelemesi de eklenir. B√∂ylece "tiftikten 2 g√ľn
     sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar.
     G√úVENLńįK: kullanńĪcńĪ Ayarlar'dan iki adńĪmńĪ birbirine referans verecek
     Ňüekilde ayarlarsa (A‚ÜíB, B‚ÜíA), bu zincir sonsuz d√∂ng√ľye girip tarayńĪcńĪyńĪ
     √ß√∂kertebilirdi ("Maximum call stack size exceeded"). "visiting" dizisi
     Ňüu ana kadar ziyaret edilen adńĪm indekslerini tutar; aynńĪ indekse tekrar
     gelinirse d√∂ng√ľ tespit edilmiŇü demektir ‚ÄĒ hesaplama sessizce durdurulur
     (null d√∂ner, uygulama √ß√∂kmez). KullanńĪcńĪya asńĪl uyarńĪ Ayarlar ekranńĪnda
     protokol satńĪrńĪ kaydedilirken (protokolDongriVarMi) g√∂sterilir. */
  var idx=protokolRolIdx(ref);
  if(idx<0) return null;
  if(visiting.indexOf(idx)>=0){
    console.error("‚ö†ÔłŹ Protokol referans d√∂ng√ľs√ľ tespit edildi (adńĪm #"+idx+") ‚ÄĒ hesaplama durduruldu, √ß√∂kme engellendi");
    return null;
  }
  var st=getProtokol()[idx];
  if(!st) return null;
  if(adimGercektenYapildiMi(c, idx, st)){
    var real=adimYapilmaTarihi(c, idx, st);
    if(real) return real;
  }
  var est=protokolTarih(c, st, visiting.concat([idx]));
  if(!est) return null;
  var ert=(c.ertele && c.ertele["p"+idx]) || 0;
  return ert ? addDays(est, ert) : est;
}
function protokolTarih(c, step, _visiting){
  if(!step) return null;
  var refDate=protokolReferansTarihi(c, step.ref, step.rol, _visiting);
  if(!refDate) return null;
  return addDays(refDate, step.gun);
}

var ODA_MAX = 21, KOMPOST_IDEAL_MAX = 26, KOMPOST_IDEAL_MIN = 24, KOMPOST_KRITIK_ALT = 21, KOMPOST_KRITIK_UST = 28, KOMPOST_TEHLIKELI = 30, KOMPOST_TEHLIKE_ALT = 18;

/* ---- Kritik/tehlikeli sńĪcaklńĪk ikazlarńĪ: rol bazlńĪ "g√∂rd√ľm" iŇüareti ---- */
function tempAckGet(c,key){ return c && c.tempAck && c.tempAck[key] && c.tempAck[key][currentRole]; }

/* Tek seferlik ikazlar: "YapńĪldńĪ" (bu d√∂ng√ľ i√ßin bir daha g√∂sterme) / "Ertele" (yarńĪna kadar gizle) */
function oneTimeActive(c, field){

}

/* AteŇülenme (kompostta ńĪsńĪnma): geliŇüten 7-8. g√ľn ziraat m√ľhendisi kontrol√ľ */
function atesAlerts(){
  var d=loadData(); var out=[]; var today=todayISO();
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi || !c.gelisTarihi) return;
    if(c.toprakTarihi && daysBetween(c.toprakTarihi,today)>=0) return; /* toprak serildiyse ge√ßti */
    if(!oneTimeActive(c,"ates")) return;

  });

/* Erken poŇüet: geliŇüten 3-5. g√ľn nem/sńĪcaklńĪk/amonyak k√∂t√ľyse misel patlayńĪnca poŇüet erken a√ßńĪlabilir */
function posetAlerts(){

  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi || !c.gelisTarihi || c.toprakTarihi) return;

    var nem=lastTxt(c,"nem"), am=lastTxt(c,"amonyak"), ko=lastVal(c,"kompostC");

    if(am==="Var") sebep.push("amonyak kokusu");
    if(ko!==null && ko>=KOMPOST_KRITIK_UST) sebep.push("y√ľksek sńĪcaklńĪk");

  });
  return out;
}

/* SON G√úVENLńįK AńěI: Rol eŇüleŇümesi (veya c.done bayrańüńĪ) her nasńĪlsa senkron ka√ßńĪrmńĪŇüsa bile,
   Tiftik/Toprak/TńĪrmńĪk/Hava'nńĪn kendi √ĖZEL tarih alanńĪ (c.tiftikTarihi vb.) zaten doluysa,
   bu adńĪm HER ZAMAN "yapńĪldńĪ" sayńĪlńĪr. Bu iki ayrńĪ bayrańüńĪn (c.done ile c.tiftikTarihi)
   birbirinden kopmasńĪna karŇüńĪ kesin bir √ß√∂z√ľmd√ľr ‚ÄĒ hangi sebepten kopmuŇü olursa olsun. */
function adimGercektenYapildiMi(c, idx, s){
  if(c.done && c.done["p"+idx]) return true;
  var rol=(s&&s.rol)||"";
  /* Kompost indirme, tarihi GELECEKTE ise "yapńĪldńĪ" SAYILMAZ ‚ÄĒ kompost daha
     gelmediyse indirilmiŇü olamaz. Aksi halde ileri tarihli (√∂rn. yarńĪn geliŇüli,
     d√ľzeltmeden √ĖNCE oluŇüturulmuŇü) bir odada kompostIndirme={tarih:yarńĪn}
     olduńüu i√ßin indirme "yapńĪldńĪ" sayńĪlńĪp "YarńĪn yapńĪlacaklar"da gizleniyordu
     (kullanńĪcńĪ raporu: "A-7 yarńĪn kompost gelecek ama yarńĪnki iŇülemlerde
     g√∂r√ľnm√ľyor / yine g√∂r√ľnm√ľyor"). Tarih bug√ľne d√∂n√ľnce normal "yapńĪldńĪ" olur.
     Ekip/makine detayńĪ (ńįndirme PlanńĪ formundan) korunur; sadece done durumu
     tarihe bańülanńĪr. */
  if(rol==="kompostindirme") return !!(c.kompostIndirme && c.kompostIndirme.tarih && c.kompostIndirme.tarih<=todayISO());
  if(rol==="tiftik") return !!c.tiftikTarihi;
  if(rol==="toprak") return !!c.toprakTarihi;
  if(rol==="tirmik") return !!c.tirmikTarihi;
  if(rol==="hava") return !!c.havaBaslangic;
  return false;
}
/* ==================== SSOT: Bir protokol adńĪmńĪnńĪn TEK yazma kapńĪsńĪ ====================
   Bir iŇüi "yapńĪldńĪ" yapmanńĪn tek yolu budur. Hangi ekrandan √ßańürńĪlńĪrsa √ßańürńĪlsńĪn
   (G√∂revler ‚úď, Bilgileri D√ľzenle formu, protokol tamamlama, G√ľnl√ľk Tur) aynńĪ sonucu √ľretir.
   B√∂ylece aynńĪ bilgi √ľ√ß ayrńĪ yere farklńĪ bi√ßimde yazńĪlmaz ‚ÄĒ kafa karńĪŇüńĪklńĪńüńĪ biter.
     ‚ÄĘ c.done["p"+idx]                ‚Üí kanonik "yapńĪldńĪ" bayrańüńĪ
     ‚ÄĘ rol'e g√∂re √∂zel tarih alanńĪ    ‚Üí rapor/PDF/performans bunlarńĪ okuduńüu i√ßin senkron tutulur
       (tiftikTarihi / toprakTarihi / tirmikTarihi / havaBaslangic)
     ‚ÄĘ c.adimDetay["p"+idx]           ‚Üí ge√ßmiŇüe d√∂n√ľk tarih + serbest not
     ‚ÄĘ o tarihin g√ľnl√ľk kaydńĪna not   ‚Üí Ana Ekran "Bug√ľn iŇülem" s√ľtunu buradan besleniyor
   opts: {tarih (vars. bug√ľn), not, sessiz (g√ľnl√ľk nota yazma)}
   D√∂ner: true (yapńĪldńĪ) / false (sńĪra engeli ‚ÄĒ √∂nceki zorunlu adńĪm eksik) */
function adimTamamla(c, idx, opts){
  if(!c) return false;
  opts = opts || {};
  var st=getProtokol()[idx]; if(!st) return false;
  var tarih = opts.tarih || todayISO();
  var alanKey = st.rol || protokolAdimAlanKey(st.txt);

  /* TekrarlńĪ iŇü (oda yńĪkama vb.): kalńĪcńĪ bitmez ‚ÄĒ son yapńĪlmayńĪ iŇüaretle, N g√ľn sonra yine √ßńĪkar */
  var tekrarG = parseInt(st.tekrar,10)||0;
  if(tekrarG>0){
    if(!c.doneSon) c.doneSon={};
    c.doneSon["p"+idx]=tarih;
    if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapńĪldńĪ ("+tekrarG+" g√ľn sonra tekrar hatńĪrlatńĪlacak)");
    touchCycle(c);
    return true;
  }

  /* SńĪra kontrol√ľ: √∂nceki zorunlu adńĪm yapńĪlmadńĪysa engelle */
  if(alanKey==="toprak" && !oncekiAdimTamamMi(c,"toprak")) return false;
  if(alanKey==="tirmik" && !oncekiAdimTamamMi(c,"tirmik")) return false;
  if((alanKey==="hasat" || (!alanKey && /hasat/i.test(st.txt))) && !oncekiAdimTamamMi(c,"hasat")) return false;

  if(!c.done) c.done={};
  c.done["p"+idx]=true;

  /* Rol'e g√∂re √∂zel tarih alanńĪ ‚ÄĒ rapor/PDF/performans bunlarńĪ okur, senkron Ňüart.
     "kompostindirme" hari√ß: onun ger√ßek verisi Kompost ńįndirme PlanńĪ formundan
     (c.kompostIndirme) gelir, burada ayrńĪca yazmńĪyoruz ‚ÄĒ SSOT tek kaynakta kalsńĪn.
     "bosaltma": c.bosaltimTarihi UYGULAMANIN HER YERńįNDE "aktif mi" kontrol√ľ i√ßin
     kullanńĪlan KANONńįK alan ‚ÄĒ bu adńĪm tamamlanńĪnca onu da senkron tutuyoruz, aksi
     halde oda hem "boŇüaltńĪldńĪ" (protokolde) hem "h√Ęl√Ę aktif" (her yerde) g√∂r√ľn√ľr.
     FlaŇü adńĪmlarńĪ (flas1/flas1bitis/flasarasi/flas2/flas2bitis) ayrńĪ √ľst-seviye
     alana ihtiya√ß duymaz, c.adimDetay zaten SSOT olarak yeterli. */
  if(alanKey==="hava"){
    if(!c.havaBaslangic) c.havaBaslangic=tarih;
    /* SSOT: havaya baŇülama TEK yazma kapńĪsńĪndan ge√ßtińüi i√ßin (G√ľnl√ľk Tur'daki
       BaŇülat kartńĪ, Bilgileri D√ľzenle formu, ileride eklenecek her yeni yol),
       varsayńĪlan havalandńĪrma planńĪ burada, merkezi olarak kurulur ‚ÄĒ sadece
       BaŇülat kartńĪna bańülńĪ kalńĪrsa "Bilgileri D√ľzenle"den girilen hava tarihi
       planńĪ hi√ß oluŇüturmazdńĪ (kullanńĪcńĪ raporu: "otomatik havalandńĪrma planńĪ
       √ßńĪkmńĪyor"). havaPlaniOtomatikOlustur zaten var olan bir planńĪn √ľzerine
       yazmaz (idempotent). */
    havaPlaniOtomatikOlustur(c);
  }
  else if(alanKey==="bosaltma"){ if(!c.bosaltimTarihi) c.bosaltimTarihi=tarih; }
  else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=tarih; }

  /* Ge√ßmiŇüe d√∂n√ľk tarih + not + (tiftik/toprak/tńĪrmńĪk DIŇěINDAKńį adńĪmlar i√ßin)
     kim yaptńĪ / dońüru mu ‚ÄĒ bunlar rapor okumadńĪńüńĪ i√ßin buraya YAZILABńįLńįR,
     tiftik/toprak/tńĪrmńĪk'ńĪn kendi √∂zel alanlarńĪna (rapor okur) DOKUNULMAZ. */
  if(!c.adimDetay) c.adimDetay={};
  var oncekiDetay=c.adimDetay["p"+idx]||{};
  c.adimDetay["p"+idx]={
    tarih:tarih,
    not:(opts.not!=null?opts.not:oncekiDetay.not)||"",
    personel:(opts.personel!=null?opts.personel:oncekiDetay.personel)||"",
    dogru:(opts.dogru!=null?opts.dogru:oncekiDetay.dogru)||false
  };

  if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapńĪldńĪ");
  touchCycle(c);
  return true;
}
/* SSOT: Bir adńĪmńĪ "yapńĪlmadńĪ"ya geri alńĪr ‚ÄĒ bayrańüńĪ VE rol'e bańülńĪ √∂zel tarihi birlikte temizler.
   Tek yerden geri alńĪnca her ekrandan kalkar (yarńĪm "yapńĪldńĪ" durumu kalmaz). */
function adimGeriAl(c, idx){
  if(!c) return;
  var st=getProtokol()[idx];
  if(c.done) c.done["p"+idx]=false;
  if(st){
    var alanKey = st.rol || protokolAdimAlanKey(st.txt);
    if(alanKey==="hava"){ c.havaBaslangic=""; }
    else if(alanKey==="bosaltma"){ c.bosaltimTarihi=""; }
    else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=""; }
  }
  if(c.adimDetay) delete c.adimDetay["p"+idx];
  touchCycle(c);
}
/* Bir protokol adńĪmńĪnńĪn fiilen YAPILDIńěI tarihi d√∂nd√ľr√ľr (√∂zel alan veya adimDetay). */
function adimYapilmaTarihi(c, idx, s){
  var rol=(s&&s.rol)||protokolAdimAlanKey(s&&s.txt);
  if(rol==="kompostindirme") return (c.kompostIndirme&&c.kompostIndirme.tarih)||"";
  if(rol==="tiftik") return c.tiftikTarihi||"";
  if(rol==="toprak") return c.toprakTarihi||"";
  if(rol==="tirmik") return c.tirmikTarihi||"";
  if(rol==="hava")   return c.havaBaslangic||"";
  var ad=c.adimDetay && c.adimDetay["p"+idx];
  return (ad&&ad.tarih)||"";
}
/* Bir odada BELńįRLńį G√úN yapńĪlan t√ľm iŇüleri tek yerden t√ľretir (SSOT g√∂sterim):
   hem bug√ľn yapńĪldńĪ iŇüaretlenen protokol adńĪmlarńĪ (tarih alanńĪna g√∂re),
   hem o g√ľn√ľn g√ľnl√ľk kaydńĪndaki sulama/ila√ß/manuel notlar ‚ÄĒ tekilleŇütirilmiŇü. */
function odaYapilanlar(c, gun){
  var out=[], gorulen={};
  function ekle(not){ not=(""+not).trim(); if(!not||gorulen[not]) return; gorulen[not]=1; out.push(not); }
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(!adimGercektenYapildiMi(c, idx, s)) return;
    if(adimYapilmaTarihi(c, idx, s)===gun) ekle(s.txt+" yapńĪldńĪ");
  });
  (c.gunluk||[]).forEach(function(r){
    if(r.tarih!==gun) return;
    /* Sulama bilin√ßli olarak iptal/deńüiŇütirilmiŇüse "yapńĪlmadńĪ" gibi sessizce
       kaybolmasńĪn ‚ÄĒ √ľ√ß√ľnc√ľ bir durum olarak ayrńĪ bir not d√ľŇü√ľl√ľr. */
    if(r.sulamaDurum==="iptal"){ ekle("Sulama iptal edildi"+(r.sulamaOrijinal?(" (plan: "+r.sulamaOrijinal+")"):"")+(r.sulamaAciklama?(" ‚ÄĒ "+r.sulamaAciklama):"")); }
    else if(r.sulamaDurum==="degistirildi"){ ekle("Sulama deńüiŇütirildi"+(r.sulama?(": "+r.sulama):"")+(r.sulamaAciklama?(" ‚ÄĒ "+r.sulamaAciklama):"")); }
    else if(r.sulama) (""+r.sulama).split(" ¬∑ ").forEach(function(p){ ekle(p); });
    /* islemNot'taki "Sulama iptal edildi/deńüiŇütirildi ..." par√ßalarńĪ, sulamaDurum
       √ľzerinden yukarńĪda ZATEN eklendi (kim/ne zaman dahil daha kńĪsa haliyle) ‚ÄĒ
       burada tekrar eklenirse aynńĪ karar iki kez (biri kńĪsa, biri uzun) listelenir. */
    if(r.islemNot) (""+r.islemNot).split(" ¬∑ ").forEach(function(p){
      if(r.sulamaDurum && /^Sulama (iptal edildi|deńüiŇütirildi)/.test(p)) return;
      ekle(p);
    });
  });
  return out;
}
function nextTasks(){
  var d=loadData(); var today=todayISO(); var items=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi) return; /* soft-silinmiŇü satńĪr ‚ÄĒ index kaymasńĪn diye array'den hi√ß √ßńĪkarńĪlmńĪyor */
      if(s.rol==="kompostindirme") return; /* SSOT: ger√ßek kaydńĪ Kompost ńįndirme PlanńĪ formunda tutuluyor (c.kompostIndirme) ‚ÄĒ burada sadece tarih zinciri i√ßin referans, ayrńĪca g√∂rev olarak g√∂sterilmez */
      if(s.tip==="uyari") return; /* ateŇülenme √ľstte ayrńĪ kutuda g√∂steriliyor */
      if(s.tip==="ilac" || s.tip==="su") return; /* sulamalar g√∂rev listesinde deńüil, oda i√ßinde */
      var base=protokolTarih(c,s); if(!base) return;
      var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
      var t = ert ? addDays(base,ert) : base;
      var sure = parseInt(s.sure,10)||1;         /* iŇüin ka√ß g√ľn s√ľrd√ľńü√ľ (hasat=5 gibi) */
      var tekrarG = parseInt(s.tekrar,10)||0;    /* periyodik iŇü: ka√ß g√ľnde bir tekrar */
      /* TekrarlńĪ iŇü (√∂rn. oda yńĪkama): ‚úď'lanńĪnca kalńĪcńĪ bitmez, tekrarG g√ľn sonra yeniden √ßńĪkar */
      if(tekrarG>0){
        var son=(c.doneSon&&c.doneSon["p"+idx])||null;
        var tNext = son ? addDays(son,tekrarG) : t;
        var offT=daysBetween(today,tNext); if(offT===null) return;
        if((offT>=0 && offT<=1) || (offT<0 && offT>=-7)){
          items.push({cid:c.id, idx:idx, off:offT, date:tNext, oda:c.oda, txt:s.txt, tip:s.tip, sahip:s.sahip||"", done:false, overdue:offT<0, ertelendi:false, tekrarli:true, tekrarG:tekrarG, atama:(c.atama&&c.atama["p"+idx])||""});
        }
        return;
      }
      var off=daysBetween(today,t); if(off===null) return;
      var done = adimGercektenYapildiMi(c, idx, s);
      /* √áok g√ľnl√ľk iŇü (√∂rn. hasat 5 g√ľn): baŇülangńĪ√ß ge√ßse de son g√ľne kadar "devam ediyor" sayńĪlńĪr,
         gecikmiŇü DEńěńįL. Ancak son g√ľn de ge√ßtiyse ger√ßekten gecikmiŇütir. */
      var sonGun = addDays(t, sure-1);
      var offEnd = daysBetween(today, sonGun);
      var devamEdiyor = (!done && sure>1 && off<0 && offEnd>=0);
      var overdue = (!done && offEnd<0);
      var goster = (off>=0 && off<=1)                 /* bug√ľn + yarńĪn */
                || devamEdiyor                         /* √ßok g√ľnl√ľk iŇü s√ľr√ľyor */
                || (overdue && offEnd>=-7);            /* gecikmiŇü (7 g√ľne kadar g√∂ster) */
      if(goster){
        var kacinciGun = devamEdiyor ? (daysBetween(t,today)+1) : 0;
        items.push({cid:c.id, idx:idx, off:off, date:t, oda:c.oda, txt:adimGosterMetni(c, idx, s, t), tip:s.tip, sahip:s.sahip||"", done:done, overdue:overdue, devamGun:kacinciGun, sureGun:sure, ertelendi:!!ert, atama:(c.atama&&c.atama["p"+idx])||""});
      }
    });
  });
  /* Odaya √∂zel, tek seferlik iŇülemler (G√∂revler sekmesinden manuel eklenen) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).forEach(function(og){
      if(og.done) return; /* tamamlananlar listede kalmasńĪn */
      var base=og.tarih; if(!base) return;
      var ert=og.ertele||0;
      var t = ert ? addDays(base,ert) : base;
      var off=daysBetween(today,t); if(off===null) return;
      if((off>=0 && off<=1) || (off<0 && off>=-7)){
        items.push({cid:c.id, ogId:og.id, off:off, date:t, oda:c.oda, txt:og.is, tip:"olay", sahip:"", atama:og.atama||"", odaGorev:true, done:false, overdue:off<0, ertelendi:!!ert});
      }
    });
  });
  getPlan().filter(function(x){return !x.done && x.cikis;}).forEach(function(x){
    var off=daysBetween(today, x.cikis);
    if(off===null) return;
    if(off===1){
      items.push({plan:true, planId:x.id, off:1, date:x.cikis, oda:x.oda||"‚ÄĒ",
        txt:"YarńĪn kompost gelecek ("+(x.firma||"firma")+") ‚ÄĒ bug√ľn firma ile g√∂r√ľŇü√ľlecek",
        tip:"olay", sahip:"ziraat", done:!!x.irtibat, overdue:false, komGorusme:true});
    } else if(off===0){
      items.push({plan:true, planId:x.id, off:0, date:x.cikis, oda:x.oda||"‚ÄĒ",
        txt:"Kompost BUG√úN geliyor ("+(x.firma||"firma")+") ‚ÄĒ karŇüńĪla, oda oluŇütur",

/* Protokol adńĪmńĪnńĪn metnine g√∂re hangi tarih alanńĪna (tiftikTarihi/toprakTarihi/
   tirmikTarihi/havaBaslangic) karŇüńĪlńĪk geldińüini bulur. toggleTask'ta kullanńĪlńĪr. */
function protokolAdimAlanKey(txt){
  if(!txt) return null;
  if(/tiftik/i.test(txt)) return "tiftik";
  if(/tńĪrmńĪk/i.test(txt)) return "tirmik";
  if(/toprak/i.test(txt)) return "toprak";

}
/* MERKEZńį ROL BULUCU ‚ÄĒ kullanńĪcńĪ bir satńĪrńĪ istedińüi gibi yeniden adlandńĪrabilir
   (√∂rn. "PoŇüet a√ßńĪlńĪr" ‚Üí "PoŇüet kesimi"); sistem artńĪk metne deńüil, satńĪra a√ßńĪk√ßa
   atanmńĪŇü "rol" etiketine bakńĪyor. B√∂ylece yeniden adlandńĪrma hi√ßbir hesaplamayńĪ bozmaz.
   Eski (hen√ľz rol atanmamńĪŇü) kayńĪtlar i√ßin metin eŇüleŇümesine geriye d√∂n√ľk d√ľŇüer. */
var PROTOKOL_ROL_REGEX = {poset:/po\u015fet/i, tiftik:/tiftik/i, toprak:/toprak/i, tirmik:/t\u0131rm\u0131k/i, hasat:/hasat/i, hava:/hava/i, kompostindirme:/kompost indirme/i};
function protokolRolIdx(rol){
  var P=getProtokol();
  for(var i=0;i<P.length;i++){ if(!P[i].silindi && P[i].tip==="olay" && P[i].rol===rol) return i; }
  var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return -1;
  var sahipGerekli = (rol==="tiftik"||rol==="toprak"||rol==="tirmik") ? "ekip" : null;
  for(var j=0;j<P.length;j++){ if(!P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt) && (!sahipGerekli || P[j].sahip===sahipGerekli)) return j; }
  /* Sahip ŇüartńĪyla bulunamadńĪysa (kullanńĪcńĪ bu alanńĪ deńüiŇütirmiŇü olabilir), sadece metne bak */
  for(var k=0;k<P.length;k++){ if(!P[k].silindi && P[k].tip==="olay" && re.test(P[k].txt)) return k; }
  return -1;
}
/* Bir adńĪmńĪn (startIdx) referans zinciri takip edildińüinde kendine geri d√∂n√ľp
   d√∂nmedińüini kontrol eder. protokolTarih()'teki d√∂ng√ľ korumasńĪ bir G√úVENLńįK
   AńěI'dńĪr (√ß√∂kmeyi engeller) ‚ÄĒ ama en dońürusu d√∂ng√ľy√ľ hi√ß KAYDETMEMEK. Bu
   fonksiyon, Ayarlar'da bir referans deńüiŇütirilirken (hen√ľz kaydedilmeden
   hemen √∂nce, o deńüerle) √ßańürńĪlńĪr. */
function protokolRefDongusuVarMi(startIdx){
  var P=getProtokol();
  var idx=startIdx, guard=0;
  while(true){
    if(guard++ > P.length+2) return true; /* aŇüńĪrńĪ uzun zincir, g√ľvenlik i√ßin d√∂ng√ľ say */
    var st=P[idx];
    if(!st || !st.ref) return false;
    if(st.ref==="gelis") return false;
    var nextIdx;
    if(st.ref==="toprak"){
      var ti=protokolRolIdx("toprak");
      if(ti<0 || !P[ti] || P[ti].ref==="toprak" || !P[ti].ref) return false; /* kendine referans = g√ľvenli taban */
      nextIdx=ti;
    } else {
      nextIdx=protokolRolIdx(st.ref);
      if(nextIdx<0) return false; /* tanńĪmsńĪz referans, d√∂ng√ľ deńüil */
    }
    if(nextIdx===startIdx) return true; /* zincir baŇüa d√∂nd√ľ ‚ÄĒ d√∂ng√ľ! */
    idx=nextIdx;
  }
}
/* Bir odanńĪn SIRADAKńį (hen√ľz yapńĪlmamńĪŇü, en yakńĪn tarihli) protokol adńĪmńĪnńĪ bulur.
   G√ľnl√ľk Tur ekranńĪnda ziraat m√ľhendisinin g√∂zlemine g√∂re "yarńĪn yapalńĪm" diyebilmesi i√ßin. */
/* Bir adńĪmńĪn BELńįRLńį TARńįH i√ßin g√∂sterilecek metni: m√ľhendis o tarih i√ßin
   "deńüiŇütirerek onayla" yaptńĪysa (yarinDegisiklik) ekip protokol metnini deńüil
   m√ľhendisin d√ľzelttińüi metni g√∂r√ľr ‚ÄĒ protokol 400 dese de g√∂revde 600 yazar. */
function adimGosterMetni(c, idx, st, tarih){
  var d=c && c.yarinDegisiklik && c.yarinDegisiklik["p"+idx];
  if(d && d.txt && d.t===tarih) return d.txt;

}
/* siradakiProtokolAdimi'nin tersi: en son TAMAMLANMIŇě olay tipi adńĪm.
   c.adimDetay["p"+idx].tarih her tamamlanan adńĪmda evrensel olarak tutulur
   (poŇüet dahil, rol'e √∂zel alanlara ihtiya√ß yok) ‚ÄĒ SSOT'tan okunur. */
function sonYapilanOlayAdimi(c){
  var best=null;
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay") return;
    if(!adimGercektenYapildiMi(c,idx,s)) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    var tarih=detay?detay.tarih:null;
    if(!tarih) return;
    if(!best || tarih>best.tarih){ best={idx:idx, tarih:tarih, txt:s.txt}; }
  });
  return best;
}
function siradakiProtokolAdimi(c){
  /* K√ĖK MńįMARńį D√úZELTME: eskiden bu fonksiyon adaylar arasńĪndan en ERKEN
     TARńįHLńį olanńĪ se√ßiyordu (t<best.t). Bu, referans zinciri bir yerde
     bozuksa (√∂rn. eksik/sahipsiz bir referans ‚Üí tarihi yanlńĪŇü/erken
     hesaplanńĪyor) PoŇüet/Tiftik gibi √ĖNCEKńį zorunlu adńĪmlar h√Ęl√Ę yapńĪlmamńĪŇüken
     sistemin Toprak gibi SONRAKńį bir adńĪmńĪ "sńĪradaki" g√∂stermesine yol
     a√ßńĪyordu ‚ÄĒ kullanńĪcńĪ defalarca aynńĪ hatayńĪ bildirdi (PoŇüet/Tiftik atlanńĪp
     Toprak'a sńĪ√ßrama). ArtńĪk se√ßim, Ayarlar ‚Üí G√∂revler'de TANIMLI GER√áEK ńįŇě
     AKIŇěI SIRASINA (protokolSiraAnahtari ‚ÄĒ t√ľm referans zincirini kompost
     indirme‚ÜípoŇüet‚Üítiftik/toprak‚ÜítńĪrmńĪk‚Üíhava‚Üíhasat Ňüeklinde √ß√∂zer) g√∂re
     yapńĪlńĪyor: yapńĪlmamńĪŇü adńĪmlar arasńĪnda SIRA numarasńĪ en K√ú√á√úK olan asla
     atlanmaz, tarih sadece g√∂r√ľnt√ľleme/gecikme hesabńĪ i√ßin kullanńĪlńĪr. */
  var adaylar=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return;
    var done=adimGercektenYapildiMi(c, idx, s); if(done) return;
    adaylar.push({idx:idx, s:s, sira:protokolSiraAnahtari(s)});
  });
  if(!adaylar.length) return null;
  adaylar.sort(function(a,b){ return a.sira-b.sira; });
  var secilen=adaylar[0];
  var base=protokolTarih(c,secilen.s);
  var t;
  if(base){
    var ert=(c.ertele && c.ertele["p"+secilen.idx])?c.ertele["p"+secilen.idx]:0;
    t=ert?addDays(base,ert):base;
  } else {
    /* Tarih hesaplanamńĪyor (referans h√Ęl√Ę sahipsiz) ‚ÄĒ sessizce atlamak yerine
       bug√ľn√ľn tarihiyle g√∂ster, en azńĪndan adńĪm kaybolmasńĪn ve kullanńĪcńĪ
       Ayarlar'da referansńĪ d√ľzeltmesi gerektińüini fark etsin. */
    t=todayISO();
  }
  return {idx:secilen.idx, t:t, txt:adimGosterMetni(c, secilen.idx, secilen.s, t)};
}
/* G√ľnl√ľk Tur'da her zaman g√∂r√ľnen "Son yapńĪlan" √∂zeti ‚ÄĒ siradakiProtokolAdimi
   ile AYNI filtre (sadece olay tipi adńĪmlar, su/ila√ß/uyarńĪ hari√ß), ama fiilen
   TAMAMLANMIŇě adńĪmlar arasńĪndan ger√ßek tamamlanma tarihi en yeni olanńĪ se√ßer. */
function sonYapilanProtokolAdimi(c){

/* Bir ŇüartlńĪ kuralńĪn, VERńįLEN oda i√ßin Ňüu an tetiklenebilir olup olmadńĪńüńĪnńĪ kontrol eder.
   Tetiklenebilir = hedef adńĪm hen√ľz yapńĪlmamńĪŇü + normal zamanńĪ hen√ľz gelmemiŇü (ger√ßekten "erken")
   + eŇüik g√ľne ulaŇüńĪlmńĪŇü. Bulamazsa/uygun deńüilse null d√∂ner. */
function sartliKuralUygunMu(c, kural){
  if(!c || c.bosaltimTarihi) return null;
  var idx=-1;
  /* ROL bazlńĪ eŇüleŇütirme √ĖNCELńįKLńį (kodun geri kalanńĪyla tutarlńĪ, SSOT) ‚ÄĒ
     kural.hedefTxt'ten √ßńĪkarńĪlan rol (protokolAdimAlanKey) ile protokoldeki
     rol eŇüleŇüir. Metin birebir aynńĪ olmasa bile ("toprak serimi" vs "Toprak
     serilir") ROL √ľzerinden dońüru adńĪmńĪ bulur. Rol √ßńĪkarńĪlamazsa (√∂rn. "Oda
     yńĪkanńĪr" gibi rols√ľz bir adńĪm hedeflenmiŇüse) eski birebir metin eŇüleŇümesine
     d√ľŇüer ‚ÄĒ geriye d√∂n√ľk uyumluluk. */
  var hedefRol=protokolAdimAlanKey(kural.hedefTxt);
  if(hedefRol){
    idx=protokolRolIdx(hedefRol);
  }
  if(idx<0){
    getProtokol().forEach(function(s,i){ if(idx<0 && !s.silindi && s.tip==="olay" && s.txt===kural.hedefTxt) idx=i; });
  }
  if(idx<0) return null;
  var s=getProtokol()[idx];
  var done=adimGercektenYapildiMi(c, idx, s);
  if(done) return null;
  var base=protokolTarih(c,s); if(!base) return null;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var planliTarih=addDays(base,mevcutErt);
  var bugun=todayISO();
  if(kural.yon!=="ertele"){
    if(bugun>=planliTarih) return null; /* "erken" y√∂n√ľ sadece asńĪl tarihten √ĖNCE anlamlńĪ, ge√ßtiyse zaten normal zamanńĪ */
  }
  /* "ertele" y√∂n√ľ: asńĪl tarih ge√ßmiŇü (gecikmiŇü) olsa bile koŇüul (√∂rn. kompost
     sńĪcaklńĪńüńĪ) h√Ęl√Ę ge√ßerliyse g√∂stermeye DEVAM EDER ‚ÄĒ kullanńĪcńĪ isteńüi:
     "gecikse bile g√∂stermeye devam etsin, derece altńĪna d√ľŇü√ľnce ikaz
     kalksńĪn". KoŇüulun kendisi (aŇüańüńĪdaki otoAlan/otoOp/otoDeger kontrol√ľ)
     zaten iyileŇüince kartńĪ kaldńĪrńĪyor, burada ayrńĪca tarih bazlńĪ bir √ľst
     sńĪnńĪr YOK ‚ÄĒ s√ľrekli bir g√ľvenlik kapńĪsńĪ gibi √ßalńĪŇüńĪr. */
  var refTarih = kural.ref==="toprak" ? c.toprakTarihi : c.gelisTarihi;
  if(!refTarih) return null;
  var offset=daysBetween(refTarih,bugun);
  if(offset===null || offset<(kural.gun||0)) return null;
  /* Otomatik √∂l√ß√ľm eŇüińüi varsa (√∂rn. Kompost ¬įC > 28), sadece koŇüul GER√áEKTEN sańülanńĪyorsa g√∂ster.
     Yoksa (boŇü bńĪrakńĪldńĪysa) tamamen m√ľhendisin g√∂zlemine bańülńĪ bir kuraldńĪr ‚ÄĒ her zaman g√∂sterilir. */
  if(kural.otoAlan){
    var son=(c.gunluk&&c.gunluk.length)?c.gunluk[c.gunluk.length-1]:null;
    var deger=son?numParse(son[kural.otoAlan]):null;
    if(deger===null || kural.otoDeger===null) return null;
    if(kural.otoOp==="<" ? !(deger<kural.otoDeger) : !(deger>kural.otoDeger)) return null;
  }
  return {idx:idx, s:s};
}
function aktifSartliKurallar(c){
  var out=[];
  getSartliKurallar().forEach(function(k){
    var r=sartliKuralUygunMu(c,k);
    if(r){
      /* HANGńį √ĖNCEKńį ADIMLAR ATLANIYOR: bu kural hedefi (√∂rn. "Toprak serimi")
         dońürudan √∂neriyor ‚ÄĒ ama PoŇüet/Tiftik gibi ondan √ĖNCE gelmesi gereken
         adńĪmlar hen√ľz yapńĪlmamńĪŇüsa, bu SESSńįZCE atlanńĪyordu. ArtńĪk b√∂yle bir
         durumda "SńĪradaki iŇülem" olarak kuralńĪn hedefi DEńěńįL, GER√áEKTEN
         sńĪradaki (en erken, hen√ľz yapńĪlmamńĪŇü) adńĪm g√∂steriliyor ‚ÄĒ kural
         sadece bańülam/gerek√ße olarak kalńĪyor, aksiyon (metin + Planla)
         ger√ßek sńĪrayńĪ takip ediyor. Acil durumda kuralńĪn asńĪl hedefini a√ßmak
         istersen, o h√Ęl√Ę "atlanan" listesinde g√∂r√ľn√ľr, oradan elle a√ßabilirsin. */
      var hedefSira=protokolSiraAnahtari(r.s);
      var atlanan=[]; var enErken=null;
      getProtokol().forEach(function(s2,idx2){
        if(s2.silindi || s2.tip!=="olay" || idx2===r.idx) return;
        if(adimGercektenYapildiMi(c, idx2, s2)) return;
        var sira2=protokolSiraAnahtari(s2);
        if(sira2 < hedefSira){
          atlanan.push(s2.txt);
          if(!enErken || sira2<enErken.sira) enErken={idx:idx2, s:s2, sira:sira2};
        }
      });
      var gosterIdx = enErken ? enErken.idx : r.idx;
      var gosterTxt = enErken ? enErken.s.txt : r.s.txt;
      out.push({kural:k, hedefIdx:gosterIdx, hedefTxt:gosterTxt, atlanan:atlanan, kuralHedefTxt:r.s.txt});
    }
  });
  return out;
}
/* Bir protokol adńĪmńĪnńĪ BUG√úNE √ßeker (protokolYarinaCek'in "bug√ľn" versiyonu) ‚ÄĒ
   misel patlamasńĪ gibi koŇüullu erken tetikleyiciler i√ßin kullanńĪlńĪr. */
/* ŇěartlńĪ kuralńĪn "ertele" y√∂n√ľ: koŇüul ger√ßekleŇüirse (m√ľhendis onaylarsa) hedef iŇüi 1 g√ľn erteler.
   yarinErteleKaydet ile aynńĪ mantńĪk ama a√ßńĪklamasńĪ kuralńĪn kendi metninden geliyor; puan kńĪrńĪlmaz
   (biyolojik/kalite kaynaklńĪ erteleme sayńĪlńĪr ‚ÄĒ kompost sńĪcak, sarńĪm zayńĪf gibi). */
/* Bir adńĪm ŇěU AN ertelenirse GER√áEKTE hangi g√ľne geleceńüini hesaplar (yan etkisiz ‚ÄĒ
   c.ertele'ye YAZMAZ, sadece √∂nizleme/uygulama i√ßin tek bir SSOT hesap sańülar).
   KRńįTńįK: adńĪm zaten "yarńĪn"a planlńĪysa (√∂rn. gecikmemiŇü, normal sńĪrasńĪnda yarńĪna
   denk geliyorsa) bu iŇülem onu yarńĪna DEńěńįL bir sonraki g√ľne iter ‚ÄĒ √ß√ľnk√ľ "yarńĪn"
   zaten mevcut planńĪydńĪ, ertelemenin bir anlamńĪ olmasńĪ i√ßin ondan ńįLERńį bir tarihe
   gitmesi gerekir. Eskiden bu ayrńĪm YOKTU, sonu√ß her zaman "yarńĪna ertelendi" diye
   yazńĪlńĪyordu ‚ÄĒ adńĪm ger√ßekte iki g√ľn sonrasńĪna kaymńĪŇü olsa bile (kullanńĪcńĪ raporu:
   toprak+3 zaten yarńĪnsa, "ertele" onu toprak+4'e iter ama not h√Ęl√Ę "yarńĪna
   ertelendi" diyordu, ger√ßek yeni tarih hi√ßbir yerde g√∂r√ľnm√ľyordu). */
function _adimSonrakiErteleTarihi(c, idx){
  var base=protokolTarih(c, getProtokol()[idx]);
  var yarin=addDays(todayISO(),1);
  if(!base) return yarin;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])||0;
  var mevcutTarih=addDays(base, mevcutErt);
  return (cmpDate(mevcutTarih, yarin) < 0) ? yarin : addDays(mevcutTarih, 1);
}
/* Bir protokol adńĪmńĪnńĪ bir sonraki uygun g√ľne taŇüńĪr (DRY ‚ÄĒ hem koŇüul ertelemesi hem
   manuel ertele kullanńĪr) ve GER√áEKTE hangi g√ľne taŇüńĪndńĪńüńĪnńĪ d√∂nd√ľr√ľr ‚ÄĒ √ßańüńĪran bunu
   nota/onay mesajńĪna yazarak "yarńĪna ertelendi" gibi belirsiz bir ifade yerine asńĪl
   tarihi g√∂stersin diye. Puan orijinal tarihe + erteleSebep'e baktńĪńüńĪ i√ßin (ertele
   sayńĪsńĪna deńüil) puanńĪ etkilemez. */
function _adimiYarinaTasi(c, idx){
  if(!c.ertele) c.ertele={};
  var base=protokolTarih(c, getProtokol()[idx]);
  var yeniTarih=_adimSonrakiErteleTarihi(c, idx);
  c.ertele["p"+idx] = base ? daysBetween(base, yeniTarih) : ((c.ertele["p"+idx]||0)+1);
  return yeniTarih;
}

   kullanńĪlńĪyor) eklenir: sńĪcak kompost hńĪzlanmayńĪ, sońüuk kompost yavaŇülamayńĪ
   iŇüaret eder. Yeni √∂l√ß√ľm/erteleme girildik√ße otomatik g√ľncellenir. Hava hen√ľz
   baŇülamadńĪysa veya hasat zaten baŇüladńĪysa (bu kilometre taŇüńĪ geride kaldńĪysa,
   odak artńĪk ger√ßek hasat takibine ge√ßer) null d√∂ner ‚ÄĒ kart hi√ß g√∂sterilmez.
   DAYANIKLILIK (kullanńĪcńĪ raporu: "tahmini birinci flaŇü hi√ß yazmńĪyor"): protokol
   satńĪrńĪ "hasat" rol√ľyle bulunamazsa (Ayarlar ‚Üí G√∂revler'de yeniden adlandńĪrńĪlmńĪŇü/
   silinmiŇü olabilir) aynńĪ ger√ßek anńĪ iŇüaret eden "flas1" rol√ľ denenir; o da
   yoksa ya da referans zinciri kńĪrńĪksa (√∂zelleŇütirilmiŇü protokolde d√∂ng√ľ/eksik
   referans ‚Üí protokolTarih null d√∂ner) kart tamamen boŇü kalmak yerine protokol√ľn
   belgeledińüi sabit hava+11 varsayńĪmńĪna d√∂ner ‚ÄĒ kompost sapmasńĪ yine uygulanńĪr.
   Sadece HER ńįKńį rol de bulunup GER√áEKTEN tamamlanmńĪŇüsa (kilometre taŇüńĪ fiilen
   geride kaldńĪysa) null d√∂nd√ľr√ľl√ľr. */
function tahminiFlas1Tarihi(c){
  if(!c || !c.havaBaslangic) return null;
  var adaylarRol=["hasat","flas1"];
  var herhangiBulundu=false, hicYapilmadi=false;
  for(var r=0;r<adaylarRol.length;r++){
    var hi=protokolRolIdx(adaylarRol[r]);
    if(hi<0) continue;
    herhangiBulundu=true;
    var st=getProtokol()[hi];
    if(adimGercektenYapildiMi(c, hi, st)) continue;
    hicYapilmadi=true;
    var temel=protokolTarih(c, st);
    if(temel){
      var k=hasatKaymasi(c);
      return {tarih:(k.kayma?addDays(temel,k.kayma):temel), kayma:k.kayma, neden:k.neden};
    }
  }
  if(herhangiBulundu && !hicYapilmadi) return null; /* hem hasat hem flaŇü1 zaten yapńĪlmńĪŇü ‚ÄĒ kilometre taŇüńĪ geride kaldńĪ */
  var k2=hasatKaymasi(c);
  var temel2=addDays(c.havaBaslangic,11);
  return {tarih:(k2.kayma?addDays(temel2,k2.kayma):temel2), kayma:k2.kayma, neden:k2.neden};
}
