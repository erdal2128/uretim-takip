/* Bir ЕҹartlДұ kuralДұn, VERД°LEN oda iГ§in Еҹu an tetiklenebilir olup olmadДұДҹДұnДұ kontrol eder.
   Tetiklenebilir = hedef adДұm henГјz yapДұlmamДұЕҹ + normal zamanДұ henГјz gelmemiЕҹ (gerГ§ekten "erken")
   + eЕҹik gГјne ulaЕҹДұlmДұЕҹ. Bulamazsa/uygun deДҹilse null dГ¶ner. */
function sartliKuralUygunMu(c, kural){
  if(!c || c.bosaltimTarihi) return null;
  var idx=-1;
  /* ROL bazlДұ eЕҹleЕҹtirme Г–NCELД°KLД° (kodun geri kalanДұyla tutarlДұ, SSOT) вҖ”
     kural.hedefTxt'ten Г§ДұkarДұlan rol (protokolAdimAlanKey) ile protokoldeki
     rol eЕҹleЕҹir. Metin birebir aynДұ olmasa bile ("toprak serimi" vs "Toprak
     serilir") ROL Гјzerinden doДҹru adДұmДұ bulur. Rol Г§ДұkarДұlamazsa (Г¶rn. "Oda
     yДұkanДұr" gibi rolsГјz bir adДұm hedeflenmiЕҹse) eski birebir metin eЕҹleЕҹmesine
     dГјЕҹer вҖ” geriye dГ¶nГјk uyumluluk. */
  var hedefRol=protokolAdimAlanKey(kural.hedefTxt);
  if(hedefRol){
    idx=protokolRolIdx(hedefRol);
  }
  if(idx<0){
    getProtokol().forEach(function(s,i){ if(idx<0 && !s.silindi && s.tip==="olay" && s.txt===kural.hedefTxt) idx=i; });
  }
  if(idx<0) return null;
  var s=getProtokol()[idx];
  var done=adimGercektenYapildiMi(c, idx, s);
  if(done) return null;
  var base=protokolTarih(c,s); if(!base) return null;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var planliTarih=addDays(base,mevcutErt);
  var bugun=todayISO();
  if(kural.yon!=="ertele"){
    if(bugun>=planliTarih) return null; /* "erken" yГ¶nГј sadece asДұl tarihten Г–NCE anlamlДұ, geГ§tiyse zaten normal zamanДұ */
  }
  /* "ertele" yГ¶nГј: asДұl tarih geГ§miЕҹ (gecikmiЕҹ) olsa bile koЕҹul (Г¶rn. kompost
     sДұcaklДұДҹДұ) hГўlГў geГ§erliyse gГ¶stermeye DEVAM EDER вҖ” kullanДұcДұ isteДҹi:
     "gecikse bile gГ¶stermeye devam etsin, derece altДұna dГјЕҹГјnce ikaz
     kalksДұn". KoЕҹulun kendisi (aЕҹaДҹДұdaki otoAlan/otoOp/otoDeger kontrolГј)
     zaten iyileЕҹince kartДұ kaldДұrДұyor, burada ayrДұca tarih bazlДұ bir Гјst
     sДұnДұr YOK вҖ” sГјrekli bir gГјvenlik kapДұsДұ gibi Г§alДұЕҹДұr. */
  var refTarih = kural.ref==="toprak" ? c.toprakTarihi : c.gelisTarihi;
  if(!refTarih) return null;
  var offset=daysBetween(refTarih,bugun);
  if(offset===null || offset<(kural.gun||0)) return null;
  /* Otomatik Г¶lГ§Гјm eЕҹiДҹi varsa (Г¶rn. Kompost В°C > 28), sadece koЕҹul GERГҮEKTEN saДҹlanДұyorsa gГ¶ster.
     Yoksa (boЕҹ bДұrakДұldДұysa) tamamen mГјhendisin gГ¶zlemine baДҹlДұ bir kuraldДұr вҖ” her zaman gГ¶sterilir. */
  if(kural.otoAlan){
    var son=(c.gunluk&&c.gunluk.length)?c.gunluk[c.gunluk.length-1]:null;
    var deger=son?numParse(son[kural.otoAlan]):null;
    if(deger===null || kural.otoDeger===null) return null;
    if(kural.otoOp==="<" ? !(deger<kural.otoDeger) : !(deger>kural.otoDeger)) return null;
  }
  return {idx:idx, s:s};
}
function aktifSartliKurallar(c){
  var out=[];
  getSartliKurallar().forEach(function(k){
    var r=sartliKuralUygunMu(c,k);
    if(r){
      /* HANGД° Г–NCEKД° ADIMLAR ATLANIYOR: bu kural hedefi (Г¶rn. "Toprak serimi")
         doДҹrudan Г¶neriyor вҖ” ama PoЕҹet/Tiftik gibi ondan Г–NCE gelmesi gereken
         adДұmlar henГјz yapДұlmamДұЕҹsa, bu SESSД°ZCE atlanДұyordu. ArtДұk bГ¶yle bir
         durumda "SДұradaki iЕҹlem" olarak kuralДұn hedefi DEДһД°L, GERГҮEKTEN
         sДұradaki (en erken, henГјz yapДұlmamДұЕҹ) adДұm gГ¶steriliyor вҖ” kural
         sadece baДҹlam/gerekГ§e olarak kalДұyor, aksiyon (metin + Planla)
         gerГ§ek sДұrayДұ takip ediyor. Acil durumda kuralДұn asДұl hedefini aГ§mak
         istersen, o hГўlГў "atlanan" listesinde gГ¶rГјnГјr, oradan elle aГ§abilirsin. */
      var hedefSira=protokolSiraAnahtari(r.s);
      var atlanan=[]; var enErken=null;
      getProtokol().forEach(function(s2,idx2){
        if(s2.silindi || s2.tip!=="olay" || idx2===r.idx) return;
        if(adimGercektenYapildiMi(c, idx2, s2)) return;
        var sira2=protokolSiraAnahtari(s2);
        if(sira2 < hedefSira){
          atlanan.push(s2.txt);
          if(!enErken || sira2<enErken.sira) enErken={idx:idx2, s:s2, sira:sira2};
        }
      });
      var gosterIdx = enErken ? enErken.idx : r.idx;
      var gosterTxt = enErken ? enErken.s.txt : r.s.txt;
      out.push({kural:k, hedefIdx:gosterIdx, hedefTxt:gosterTxt, atlanan:atlanan, kuralHedefTxt:r.s.txt});
    }
  });
  return out;
}
/* Bir protokol adДұmДұnДұ BUGГңNE Г§eker (protokolYarinaCek'in "bugГјn" versiyonu) вҖ”

/* ЕһartlДұ kuralДұn "ertele" yГ¶nГј: koЕҹul gerГ§ekleЕҹirse (mГјhendis onaylarsa) hedef iЕҹi 1 gГјn erteler.
   yarinErteleKaydet ile aynДұ mantДұk ama aГ§ДұklamasДұ kuralДұn kendi metninden geliyor; puan kДұrДұlmaz
   (biyolojik/kalite kaynaklДұ erteleme sayДұlДұr вҖ” kompost sДұcak, sarДұm zayДұf gibi). */
/* Bir adДұm ЕһU AN ertelenirse GERГҮEKTE hangi gГјne geleceДҹini hesaplar (yan etkisiz вҖ”
   c.ertele'ye YAZMAZ, sadece Г¶nizleme/uygulama iГ§in tek bir SSOT hesap saДҹlar).
   KRД°TД°K: adДұm zaten "yarДұn"a planlДұysa (Г¶rn. gecikmemiЕҹ, normal sДұrasДұnda yarДұna
   denk geliyorsa) bu iЕҹlem onu yarДұna DEДһД°L bir sonraki gГјne iter вҖ” Г§ГјnkГј "yarДұn"
   zaten mevcut planДұydДұ, ertelemenin bir anlamДұ olmasДұ iГ§in ondan Д°LERД° bir tarihe
   gitmesi gerekir. Eskiden bu ayrДұm YOKTU, sonuГ§ her zaman "yarДұna ertelendi" diye
   yazДұlДұyordu вҖ” adДұm gerГ§ekte iki gГјn sonrasДұna kaymДұЕҹ olsa bile (kullanДұcДұ raporu:
   toprak+3 zaten yarДұnsa, "ertele" onu toprak+4'e iter ama not hГўlГў "yarДұna
   ertelendi" diyordu, gerГ§ek yeni tarih hiГ§bir yerde gГ¶rГјnmГјyordu). */
function _adimSonrakiErteleTarihi(c, idx){
  var base=protokolTarih(c, getProtokol()[idx]);
  var yarin=addDays(todayISO(),1);
  if(!base) return yarin;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])||0;
  var mevcutTarih=addDays(base, mevcutErt);
  return (cmpDate(mevcutTarih, yarin) < 0) ? yarin : addDays(mevcutTarih, 1);
}
/* Bir protokol adДұmДұnДұ bir sonraki uygun gГјne taЕҹДұr (DRY вҖ” hem koЕҹul ertelemesi hem
   manuel ertele kullanДұr) ve GERГҮEKTE hangi gГјne taЕҹДұndДұДҹДұnДұ dГ¶ndГјrГјr вҖ” Г§aДҹДұran bunu
   nota/onay mesajДұna yazarak "yarДұna ertelendi" gibi belirsiz bir ifade yerine asДұl
   tarihi gГ¶stersin diye. Puan orijinal tarihe + erteleSebep'e baktДұДҹДұ iГ§in (ertele
   sayДұsДұna deДҹil) puanДұ etkilemez. */
function _adimiYarinaTasi(c, idx){
  if(!c.ertele) c.ertele={};
  var base=protokolTarih(c, getProtokol()[idx]);

  c.ertele["p"+idx] = base ? daysBetween(base, yeniTarih) : ((c.ertele["p"+idx]||0)+1);
  return yeniTarih;

/* Havaya baЕҹladДұktan sonra kullanДұcДұnДұn odaДҹДұ TAKVД°M deДҹil BД°YOLOJД°K HEDEF
   olmalДұ (kullanДұcДұ isteДҹi): "BugГјn bunu yapmak zorundasДұn" yerine "Гјretim Еҹu
   aЕҹamada, sДұradaki biyolojik hedef bu, mevcut verilere gГ¶re beklenen tarih
   bu вҖ” ama kesin deДҹil". Bu yГјzden hava baЕҹladДұktan sonra (hasat/1. flaЕҹ
   fiilen baЕҹlayana kadar) tek tek protokol adДұmlarДұnДұn tarihini ayrДұ ayrДұ
   gГ¶stermek yerine (Hava+6 pimleme, Hava+9 bezelye vb.) TEK bir kilometre
   taЕҹДұ вҖ” 1. FlaЕҹ вҖ” bir tahmin olarak gГ¶sterilir. */
function fmtDateGun(iso){
  if(!iso) return "вҖ”";
  var p=iso.split("-"); if(p.length!==3) return iso;
  var ay=parseInt(p[1],10)-1;
  return parseInt(p[2],10)+" "+(YOKLAMA_AY_ADLARI[ay]||p[1]);
}
/* Tahmini 1. FlaЕҹ tarihi. Taban tarih hasat/flaЕҹ1 adДұmДұnДұn SSOT zincirinden
   (protokolTarihвҶ’protokolReferansTarihi) gelir вҖ” bu zaten GERГҮEK hava
   baЕҹlangДұcДұnДұ ve o adДұma (ya da hava adДұmДұna) yapДұlmДұЕҹ ertelemeleri/mГјhendis
   kararlarДұnДұ otomatik yansДұtДұr, sabit bir takvim deДҹildir. Гңzerine kuluГ§ka
   dГ¶nemi kompost sДұcaklДұДҹДұ sapmasДұ (hasatKaymasi вҖ” zaten var olan SSOT, aynДұ
   hesap Raporlar'daki "Tahmini 1. FlaЕҹ" ve puan/tahmin kartlarДұnda da
   kullanДұlДұyor) eklenir: sДұcak kompost hДұzlanmayДұ, soДҹuk kompost yavaЕҹlamayДұ
   iЕҹaret eder. Yeni Г¶lГ§Гјm/erteleme girildikГ§e otomatik gГјncellenir. Hava henГјz
   baЕҹlamadДұysa veya hasat zaten baЕҹladДұysa (bu kilometre taЕҹДұ geride kaldДұysa,
   odak artДұk gerГ§ek hasat takibine geГ§er) null dГ¶ner вҖ” kart hiГ§ gГ¶sterilmez.
   DAYANIKLILIK (kullanДұcДұ raporu: "tahmini birinci flaЕҹ hiГ§ yazmДұyor"): protokol
   satДұrДұ "hasat" rolГјyle bulunamazsa (Ayarlar вҶ’ GГ¶revler'de yeniden adlandДұrДұlmДұЕҹ/
   silinmiЕҹ olabilir) aynДұ gerГ§ek anДұ iЕҹaret eden "flas1" rolГј denenir; o da
   yoksa ya da referans zinciri kДұrДұksa (Г¶zelleЕҹtirilmiЕҹ protokolde dГ¶ngГј/eksik
   referans вҶ’ protokolTarih null dГ¶ner) kart tamamen boЕҹ kalmak yerine protokolГјn
   belgelediДҹi sabit hava+11 varsayДұmДұna dГ¶ner вҖ” kompost sapmasДұ yine uygulanДұr.
   Sadece HER Д°KД° rol de bulunup GERГҮEKTEN tamamlanmДұЕҹsa (kilometre taЕҹДұ fiilen
   geride kaldДұysa) null dГ¶ndГјrГјlГјr. */
function tahminiFlas1Tarihi(c){
  if(!c || !c.havaBaslangic) return null;
  var adaylarRol=["hasat","flas1"];
  var herhangiBulundu=false, hicYapilmadi=false;
  for(var r=0;r<adaylarRol.length;r++){
    var hi=protokolRolIdx(adaylarRol[r]);
    if(hi<0) continue;
    herhangiBulundu=true;
    var st=getProtokol()[hi];
    if(adimGercektenYapildiMi(c, hi, st)) continue;
    hicYapilmadi=true;
    var temel=protokolTarih(c, st);
    if(temel){
      var k=hasatKaymasi(c);
      return {tarih:(k.kayma?addDays(temel,k.kayma):temel), kayma:k.kayma, neden:k.neden};
    }
  }
  if(herhangiBulundu && !hicYapilmadi) return null; /* hem hasat hem flaЕҹ1 zaten yapДұlmДұЕҹ вҖ” kilometre taЕҹДұ geride kaldДұ */
  var k2=hasatKaymasi(c);
  var temel2=addDays(c.havaBaslangic,11);
  return {tarih:(k2.kayma?addDays(temel2,k2.kayma):temel2), kayma:k2.kayma, neden:k2.neden};
}

/* Гңretim sДұrasДұ kontrolГј: Tiftik вҶ’ Toprak вҶ’ TДұrmДұk вҶ’ Hasat.
   Sert engel deДҹil вҖ” Г¶nceki adДұm eksikse uyarДұr, mГјhendis "yine de devam" diyebilir
   (gerГ§ek istisnalar iГ§in yol kapanmasДұn). key: "toprak"|"tirmik"|"hasat" */
function oncekiAdimTamamMi(c, key){
  var eksik=null;
  if(key==="toprak" && !c.tiftikTarihi) eksik="Tiftik";
  else if(key==="tirmik" && !c.toprakTarihi) eksik="Toprak";
  else if(key==="hasat" && !c.tirmikTarihi) eksik="TДұrmДұk";
  if(!eksik) return true;
  return confirm("вҡ пёҸ "+eksik+" henГјz yapДұlmamДұЕҹ gГ¶rГјnГјyor.\n\nYine de devam edilsin mi?");
}
function toggleTask(cid, idx){

  /* SSOT: yazma tek kapДұdan. Еһu an yapДұldДұysa geri al, deДҹilse tamamla. */
  if(adimGercektenYapildiMi(c, idx, st)){
    adimGeriAl(c, idx);
  } else {
    /* Tiftik/Toprak/TДұrmДұk: sadece "yapДұldДұ" yetmez вҖ” kim yaptДұ, doДҹru mu, not.
       Detay kutusu aГ§ДұlДұr; kayДұt oradan SSOT kapДұsДұna gider. */
    var alanKey=st.rol||protokolAdimAlanKey(st.txt);
    if(alanKey==="tiftik"||alanKey==="toprak"||alanKey==="tirmik"){
      render(); /* checkbox'Дұ eski haline dГ¶ndГјr вҖ” kayДұt kutudan gelecek */

      return;
    }

  }
  saveData(); render();
}

function yarinErteleKaydet(cid, idx, neden){

/* Bir adДұmdaki ertelemeyi/erken Г§ekmeyi kaldДұrДұp protokoldeki asДұl tarihine
   dГ¶ndГјrГјr вҖ” kullanДұcДұ "bu ertelemeyi ben yapmadДұm" dediДҹinde ya da yanlДұЕҹlДұkla
   yapДұlan bir ertelemeyi dГјzeltmek istediДҹinde kendi baЕҹДұna telafi edebilsin
   diye (Oda detayДұ вҶ’ MГјhendis/Гңretim ProtokolГј tablosundaki "geri al" linki). */
function protokolErtelemeSifirla(cid, idx){
  if(!can("edit")) return noPerm();

  if(c.ertele) delete c.ertele["p"+idx];

  gunlukGorevNotEkle(c, s.txt+" вҖ” erteleme kaldДұrДұldДұ, asДұl tarihe ("+fmtDate(asilTarih)+") dГ¶ndГјrГјldГј вҖ” "+kimNeZamanEtiketi());

            +'<label style="display:inline-flex; align-items:center; gap:4px; font-size:13px; font-weight:normal;"><input type="checkbox" '+(gorevSecili(i)?"checked":"")+' onchange="gorevSecToggle(\''+gorevSecAnahtar(i)+'\')" style="width:20px;height:20px;">Toplu seГ§</label>'
            +'<button class="btn small" onclick="gorevPlanlaGonder(\''+esc(i.oda)+'\',\''+esc(i.txt).replace(/'/g,"\\'")+'\',\''+esc(i.atama)+'\',\''+esc(i.date)+'\')">рҹ“Ӣ Planla вҖ” WhatsApp\'a gГ¶nder</button>'
            +'</div>'):'')
        + '</div></div>';
    });
  }
  h+='</div>';
  }
  return h;
}

function fmtDate(iso){
  if(!iso) return "вҖ”";
  var p = iso.split("-");
  if(p.length!==3) return iso;
  return p[2]+"."+p[1]+"."+p[0];
}
function todayISO(){
  var d=new Date(); var m=("0"+(d.getMonth()+1)).slice(-2); var dd=("0"+d.getDate()).slice(-2);
  return d.getFullYear()+"-"+m+"-"+dd;
}
function parseISO(iso){ var p=(iso||"").split("-"); if(p.length!==3) return null; var y=+p[0],m=+p[1],d=+p[2]; if(isNaN(y)||isNaN(m)||isNaN(d)) return null; return Date.UTC(y,m-1,d); }
function cmpDate(a,b){ a=a||""; b=b||""; return a<b?-1:(a>b?1:0); }
function daysBetween(a,b){
  var da=parseISO(a), db=parseISO(b);
  if(da===null||db===null) return null;
  return Math.round((db-da)/86400000);
}
function gunNo(cycle, iso){
  var base = cycle.gelisTarihi;
  if(!base && cycle.gunluk && cycle.gunluk.length) base = cycle.gunluk[0].tarih;
  var d = daysBetween(base, iso);
  return d===null ? "" : d;   /* geliЕҹ = 0. gГјn */
}
function ortuGun(cycle, iso){
  if(!cycle.toprakTarihi) return null;
  var d = daysBetween(cycle.toprakTarihi, iso);
  return (d===null||d<0) ? null : d; /* toprak = 0. gГјn; Г¶ncesi boЕҹ */
}
function gunEtiket(c){
  var g=gunNo(c, todayISO());
  if(g==="") return "";
  var t=ortuGun(c, todayISO());
  return g + "/" + (t===null ? "\u2014" : t);
}
function addDays(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t + n*86400000);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* Ay ekleme вҖ” periyodik bakДұm/kalibrasyon aralДұklarДұ iГ§in (6 ayda bir, yДұlda
   bir vb). Ay taЕҹmalarДұnДұ (Г¶rn. 31 Ocak + 1 ay) JS Date kendi normalize eder. */
function addMonths(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t);
  d.setUTCMonth(d.getUTCMonth()+n);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* ---------- Oda performans puanДұ вҖ” KATEGORД°LД°, AГҮIKLANABД°LД°R SД°STEM ----------
   KullanДұcДұ isteДҹi: tek toplam puan yerine, deneyimli bir mantar Гјretim
   mГјdГјrГјnГјn odayДұ deДҹerlendirme Еҹeklini taklit eden, kategori kategori
   aГ§Дұklanabilir bir puanlama вҖ” ileride yapay zekГў/makine Г¶Дҹrenmesi
   tahminlerine veri saДҹlayacaДҹДұ iГ§in her kategori kendi maksimum puanДұnДұ,
   kendi kalemlerini (+/-, aГ§ДұklamalДұ) ve kritik hatalarДұ ayrДұ tutar; "neden
   88 aldДұm" sorusuna kategori kategori cevap verilebilir.
   6 kategori, toplam 100 puan:
     рҹҢЎпёҸ Д°klim YГ¶netimi (25) В· рҹҚ„ Misel GeliЕҹimi (20) В· рҹ“Ӣ Protokol UygunluДҹu (20)
     рҹ’§ Sulama YГ¶netimi (15) В· рҹ“Ҳ Trend Analizi (10) В· вҡ  Risk FaktГ¶rleri (10)
   Korunan/geniЕҹletilen ilkeler:
   1) Gecikme HAKLI bir biyolojik sebeple (sarДұm/geliЕҹme zayДұf) ertelendiyse
      puan kДұrДұlmaz вҖ” bu doДҹru bir karardДұ.
   2) SДұcaklДұk ihlalleri GEГҮMД°ЕһTE kaldДұysa, dГјzeltilse bile etkisi kalДұcДұdДұr.
   3) YENД° вҖ” aynДұ ihlal biyolojik dГ¶neme gГ¶re farklДұ aДҹДұrlДұkta puan kДұrar
      (kuluГ§kada kompost 30В° aДҹДұr ceza, hasat sonunda hafif ceza) вҖ” bkz.
      _donemAgirlikKatsayisi. Sadece ceza deДҹil, iyi yГ¶netime kГјГ§Гјk Г¶dГјller
      de var (7 gГјn ideal sДұcaklДұk, zamanДұnda iЕҹlemler vb.).
   5) KalДұcДұ/kritik hatalar (_kritikHatalarTespit) normal kategori
      cezalarДұndan AYRI, kendi baЕҹlДұДҹДұ altДұnda da gГ¶sterilir. */

/* AynДұ sДұcaklДұk/protokol ihlalinin biyolojik dГ¶neme gГ¶re aДҹДұrlДұДҹДұ вҖ” misel en
   hassas olduДҹu kuluГ§ka/toprak dГ¶neminde en aДҹДұr, hasat sonuna doДҹru en
   hafif (o noktada geliЕҹimini bГјyГјk Г¶lГ§Гјde tamamlamДұЕҹ olur). */
function _donemAgirlikKatsayisi(stageAd){
  if(stageAd==="KuluГ§ka dГ¶nemi") return 1.4;
  if(stageAd==="Toprak dГ¶nemi") return 1.2;
  if(stageAd==="1. Misel geliЕҹim") return 1.0;
  if(stageAd==="2. Misel geliЕҹim") return 0.8;
  if(stageAd==="Pimleme dГ¶nemi") return 0.6;
  if(stageAd==="Bezelye boyutu" || stageAd==="Ceviz boyutu") return 0.5;
  if(stageAd && (stageAd.indexOf("Hasat")>=0 || stageAd.indexOf("FlaЕҹ")>=0)) return 0.3;
  return 1.0;
}
/* Kategori kalemi: delta (+Г¶dГјl/-ceza/0 bilgi) + aГ§Дұklama. TГјm kategori
   fonksiyonlarДұ aynДұ Еҹekli dГ¶ndГјrГјr вҖ” hem UI hem ileride ML tarafДұ tek
   formatla Г§alДұЕҹsДұn diye. */
function _kalem(delta, aciklama){ return {delta:delta, aciklama:aciklama}; }

/* рҹҢЎпёҸ Д°klim YГ¶netimi (25) вҖ” kompost/oda sДұcaklДұДҹДұ, stabilite, ani deДҹiЕҹim. */
function _puanIklim(c){
  var maks=25, kalemler=[], puan=maks, today=todayISO();
  var gunler=(c.gunluk||[]).filter(function(r){return r.tarih<=today;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});

  var tehlikeCeza=0, kritikCeza=0, tehlikeGun=0, kritikGun=0, idealSeri=0, maxIdealSeri=0;
  gunler.forEach(function(r){
    var ko=numParse(r.kompostC); if(ko==null) return;
    var kat=_donemAgirlikKatsayisi(stageAtDate(c,r.tarih).t);
    if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT){ tehlikeCeza+=3*kat; tehlikeGun++; idealSeri=0; }
    else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT){ kritikCeza+=1.5*kat; kritikGun++; idealSeri=0; }
    else if(ko>=KOMPOST_IDEAL_MIN && ko<=KOMPOST_IDEAL_MAX){ idealSeri++; if(idealSeri>maxIdealSeri) maxIdealSeri=idealSeri; }
    else idealSeri=0;
  });
  tehlikeCeza=Math.min(11,tehlikeCeza); kritikCeza=Math.min(6,kritikCeza);
  if(tehlikeCeza>0){ puan-=tehlikeCeza; kalemler.push(_kalem(-Math.round(tehlikeCeza), tehlikeGun+" gГјn tehlikeli kompost sДұcaklДұДҹДұ (o dГ¶nemin aДҹДұrlДұДҹДұyla hesaplandДұ)")); }
  if(kritikCeza>0){ puan-=kritikCeza; kalemler.push(_kalem(-Math.round(kritikCeza), kritikGun+" gГјn kritik kompost sДұcaklДұДҹДұ (o dГ¶nemin aДҹДұrlДұДҹДұyla hesaplandДұ)")); }
  if(maxIdealSeri>=7){ puan+=2; kalemler.push(_kalem(2, maxIdealSeri+" gГјn Гјst Гјste ideal kompost sДұcaklДұДҹДұ")); }

  /* Oda sДұcaklДұДҹДұ: havadan Г¶nce Гјst sДұnДұr (ODA_MAX), havadan sonra o gГјnГјn hedefine (havaHedef) gГ¶re sapma. */
  var odaCeza=0, odaIhlalGun=0;
  gunler.forEach(function(r){
    var od=numParse(r.odaC); if(od==null) return;
    var kat=_donemAgirlikKatsayisi(stageAtDate(c,r.tarih).t);
    var havaBasladiMi = c.havaBaslangic && r.tarih>=c.havaBaslangic;
    if(!havaBasladiMi){ if(od>ODA_MAX){ odaCeza+=0.8*kat; odaIhlalGun++; } }
    else { var hedef=havaHedef(c); if(hedef!=null && Math.abs(od-hedef)>2){ odaCeza+=0.6*kat; odaIhlalGun++; } }
  });
  odaCeza=Math.min(5,odaCeza);
  if(odaCeza>0){ puan-=odaCeza; kalemler.push(_kalem(-Math.round(odaCeza), odaIhlalGun+" gГјn oda sДұcaklДұДҹДұ sДұnДұrlarДұn/hedefin dДұЕҹДұnda")); }

  /* Stabilite: art arda Г¶lГ§Гјmler arasДұ bГјyГјk sДұГ§rama (ani deДҹiЕҹim). */
  var aniDegisim=0;
  for(var i=1;i<gunler.length;i++){
    var a=numParse(gunler[i-1].kompostC), b=numParse(gunler[i].kompostC);
    if(a!=null && b!=null && Math.abs(b-a)>=3) aniDegisim++;
  }
  if(aniDegisim>0){ var d=Math.min(3,aniDegisim); puan-=d; kalemler.push(_kalem(-d, aniDegisim+" ani kompost sДұcaklДұДҹДұ sДұГ§ramasДұ (вүҘ3В°)")); }

  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"iklim", ad:"рҹҢЎпёҸ Д°klim YГ¶netimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* рҹҚ„ Misel GeliЕҹimi (20) вҖ” kilometre taЕҹlarДұnДұn (tiftik/toprak/tДұrmДұk/hava)
   plana gГ¶re zamanlamasДұ + ateЕҹlenme/erken poЕҹet (misel patlamasДұ) riski. */
function _puanMiselGelisimi(c){
  var maks=20, kalemler=[], puan=maks, today=todayISO();
  var MILESTONE_ROLLER={tiftik:1,toprak:1,tirmik:1,hava:1};
  var gecGun=0, gecAdimlar=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || !MILESTONE_ROLLER[s.rol]) return;
    var t=protokolTarih(c,s); if(!t) return;
    var ert=(c.ertele&&c.ertele["p"+idx])||0; t=addDays(t,ert);
    if(adimGercektenYapildiMi(c,idx,s)){
      var real=adimYapilmaTarihi(c,idx,s);
      if(real && real>t){ var g=daysBetween(t,real); gecGun+=g; gecAdimlar.push(s.txt+" ("+g+" gГјn geГ§)"); }
    } else if(t<today){
      var g2=daysBetween(t,today); gecGun+=g2; gecAdimlar.push(s.txt+" (hГўlГў yapДұlmadДұ, "+g2+" gГјn geГ§ti)");
    }
  });
  if(gecGun>0){ var d=Math.min(10,gecGun*1.5); puan-=d; kalemler.push(_kalem(-Math.round(d), "GeliЕҹim kilometre taЕҹlarДұnda toplam "+gecGun+" gГјn gecikme: "+gecAdimlar.slice(0,3).join(", "))); }
  else if(c.tiftikTarihi||c.toprakTarihi||c.tirmikTarihi||c.havaBaslangic){ puan+=2; kalemler.push(_kalem(2,"GeliЕҹim kilometre taЕҹlarДұ (tiftik/toprak/tДұrmДұk/hava) zamanДұnda ilerliyor")); }

  /* AteЕҹlenme riski: kompostun geliЕҹten 7-8. gГјnde kritik/tehlikeli seyretmesi
     вҖ” misel patlamasДұ riskinin en somut, veriye dayalДұ iЕҹareti. */
  var atesGunSayisi=0;
  (c.gunluk||[]).filter(function(r){return r.tarih<=today && (!c.toprakTarihi||r.tarih<c.toprakTarihi);}).forEach(function(r){
    var g=c.gelisTarihi?daysBetween(c.gelisTarihi,r.tarih):null;
    var ko=numParse(r.kompostC);
    if(g!=null && g>=7 && g<=8 && ko!=null && ko>=KOMPOST_KRITIK_UST) atesGunSayisi++;
  });
  if(atesGunSayisi>0){ puan-=3; kalemler.push(_kalem(-3, "AteЕҹlenme dГ¶nemi (7-8. gГјn) kompost sДұcaklДұДҹДұ yГјksek seyretmiЕҹ вҖ” misel patlamasДұ riski")); }

  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"misel", ad:"рҹҚ„ Misel GeliЕҹimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* рҹ“Ӣ Protokol UygunluДҹu (20) вҖ” tГјm adДұmlar (kilometre taЕҹlarДұ dahil, genel
   disiplin aГ§ДұsДұndan) sДұrasДұnda mДұ; kaГ§Дұ gecikmiЕҹ, kaГ§Дұ ciddi atlanmДұЕҹ, erken
   yapДұlan var mДұ. */
function _puanProtokolUygunlugu(c){
  var maks=20, kalemler=[], puan=maks, today=todayISO();
  var gecikmis=[], atlanmis=[], erken=0, haklДұ=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return; /* sulama kendi kategorisinde (рҹ’§) deДҹerlendirilir */
    var t=protokolTarih(c,s); if(!t) return;
    var ert=(c.ertele&&c.ertele["p"+idx])||0; var planli=addDays(t,ert);
    if(adimGercektenYapildiMi(c,idx,s)){
      var real=adimYapilmaTarihi(c,idx,s);
      if(real && real<planli && daysBetween(real,planli)>=2) erken++;
      return;
    }
    if(planli<today){
      var g=daysBetween(planli,today);
      var sebep=c.erteleSebep && c.erteleSebep["p"+idx];
      if(sebep==="biyolojik"){ haklДұ.push(s.txt); return; }
      if(g>=5) atlanmis.push(s.txt+" ("+g+" gГјn)"); else gecikmis.push(s.txt+" ("+g+" gГјn)");
    }
  });
  if(atlanmis.length){ var d1=Math.min(12,atlanmis.length*4); puan-=d1; kalemler.push(_kalem(-Math.round(d1), atlanmis.length+" iЕҹlem ciddi gecikmiЕҹ/atlanmДұЕҹ: "+atlanmis.slice(0,3).join(", "))); }
  if(gecikmis.length){ var d2=Math.min(8,gecikmis.length*2); puan-=d2; kalemler.push(_kalem(-Math.round(d2), gecikmis.length+" iЕҹlem gecikmiЕҹ: "+gecikmis.slice(0,3).join(", "))); }
  if(haklДұ.length){ kalemler.push(_kalem(0, haklДұ.length+" iЕҹlem haklДұ sebeple (geliЕҹme/sarДұm) ertelendi вҖ” puan kДұrДұlmadДұ")); }
  if(erken>=2){ puan-=1; kalemler.push(_kalem(-1, erken+" iЕҹlem planlanandan belirgin erken yapДұlmДұЕҹ вҖ” sДұra kontrolГј Г¶neriliir")); }
  if(!atlanmis.length && !gecikmis.length){ puan+=3; kalemler.push(_kalem(3,"TГјm iЕҹlemler zamanДұnda yapДұlДұyor")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"protokol", ad:"рҹ“Ӣ Protokol UygunluДҹu", maks:maks, puan:puan, kalemler:kalemler, gecikmisAdimlar:gecikmis.concat(atlanmis), haklДұGecikme:haklДұ};
}

/* рҹ’§ Sulama YГ¶netimi (15) вҖ” protokolГјn Г¶nerdiДҹi gГјn hiГ§ kayДұt girilmemiЕҹ mi
   (sessizce atlanmДұЕҹ, geГ§erli bir gerekГ§e YOK вҖ” her zaman puan kДұrar).
   Д°ptal/deДҹiЕҹtir kararlarДұ artДұk Yapay ZekГў KontrolГј'nden (bkz.
   erteleNedenAIKontrol, gun.sulamaAIVerdict) geГ§iyor вҖ” kullanДұcДұ isteДҹi:
   "doДҹru gerekГ§eyle yapДұlan bilinГ§li ertelemeler puan dГјЕҹГјrmemeli, hatta
   olumlu Гјretim yГ¶netimi olarak deДҹerlendirilebilmeli". Sadece seГ§ilen
   gerekГ§enin mevcut verilerle ГҮELД°ЕһTД°ДһД° (рҹ”ҙ) kararlar puan kДұrar; рҹҹў/рҹҹЎ
   (uyumlu ya da doДҹrulanamayan) kararlar puanДұ ETKД°LEMEZ. */
function _puanSulamaYonetimi(c){
  var maks=15, kalemler=[], puan=maks, today=todayISO();
  var gunler=(c.gunluk||[]).filter(function(r){return r.tarih<=today;});
  var kacirilanSayisi=0, toplamGun=0, riskliSayisi=0, uyumluSayisi=0, kararSayisi=0;
  gunler.forEach(function(r){
    if(r.sulamaDurum==="iptal" || r.sulamaDurum==="degistirildi"){
      kararSayisi++;
      if(r.sulamaAIVerdict==="kirmizi") riskliSayisi++;
      else if(r.sulamaAIVerdict==="yesil") uyumluSayisi++;
    }
    var oneri=protokolOneri(c,r.tarih);
    if(!oneri) return;
    toplamGun++;
    var girildi = (numParse(r.su)>0) || (r.sulama&&r.sulama.trim()) || r.sulamaDurum;
    if(!girildi) kacirilanSayisi++;
  });
  if(kacirilanSayisi>0){ var d1=Math.min(8,kacirilanSayisi*2); puan-=d1; kalemler.push(_kalem(-Math.round(d1), kacirilanSayisi+" gГјn protokol sulama/ilaГ§ Г¶nerdiДҹi halde hiГ§ kayДұt girilmemiЕҹ вҖ” geГ§erli bir gerekГ§e yok")); }
  if(riskliSayisi>0){ var d2=Math.min(6,riskliSayisi*3); puan-=d2; kalemler.push(_kalem(-Math.round(d2), riskliSayisi+" sulama kararДұ seГ§ilen gerekГ§eyle Г§eliЕҹen verilerle kaydedildi (рҹ”ҙ)")); }
  if(uyumluSayisi>=2 && !riskliSayisi && !kacirilanSayisi){ puan+=2; kalemler.push(_kalem(2, uyumluSayisi+" sulama kararДұnДұn gerekГ§esi verilerle doДҹrulandДұ (рҹҹў) вҖ” bilinГ§li, tutarlДұ yГ¶netim")); }
  else if(toplamGun>0 && !kacirilanSayisi && !kararSayisi){ puan+=2; kalemler.push(_kalem(2,"Sulama protokole tam uyumlu uygulanДұyor")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"sulama", ad:"рҹ’§ Sulama YГ¶netimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* рҹ“Ҳ Trend Analizi (10) вҖ” son Г¶lГ§Гјmler ideale mi yaklaЕҹДұyor uzaklaЕҹДұyor mu,
   risk (art arda kГ¶tГјleЕҹen Г¶lГ§Гјm sayДұsДұ) artДұyor mu. */
function _puanTrendAnalizi(c){
  var maks=10, kalemler=[], puan=maks, today=todayISO();
  var t=analizTrend(c,"kompostC",4);
  if(t && t.yon!=="sabit"){
    var ortaIdeal=(KOMPOST_IDEAL_MIN+KOMPOST_IDEAL_MAX)/2;
    var oncekiSapma=Math.abs(t.ilk-ortaIdeal), sonSapma=Math.abs(t.son-ortaIdeal);
    if(sonSapma<oncekiSapma-0.5){ puan+=2; kalemler.push(_kalem(2,"Kompost sДұcaklДұДҹДұ ideale doДҹru dГјzeliyor ("+t.ilk+"вҶ’"+t.son+")")); }
    else if(sonSapma>oncekiSapma+0.5){ puan-=2; kalemler.push(_kalem(-2,"Kompost sДұcaklДұДҹДұ idealden uzaklaЕҹДұyor ("+t.ilk+"вҶ’"+t.son+")")); }
  }
  var to=analizTrend(c,"odaC",4);
  if(to && to.yon==="sabit"){ puan+=1; kalemler.push(_kalem(1,"Oda sДұcaklДұДҹДұ son Г¶lГ§Гјmlerde stabil")); }

  var sonKayitlar=(c.gunluk||[]).filter(function(r){return r.tarih<=today;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).slice(-3);
  var kotuSayisi=0;
  sonKayitlar.forEach(function(r){ var ko=numParse(r.kompostC); if(ko!=null && (ko>=KOMPOST_KRITIK_UST||ko<=KOMPOST_KRITIK_ALT)) kotuSayisi++; });
  if(kotuSayisi>=2){ puan-=3; kalemler.push(_kalem(-3,"Son "+sonKayitlar.length+" Г¶lГ§ГјmГјn "+kotuSayisi+"'Гјnde kompost kritik/tehlikeli seviyede вҖ” risk artДұyor")); }

  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"trend", ad:"рҹ“Ҳ Trend Analizi", maks:maks, puan:puan, kalemler:kalemler};
}

/* вҡ  Risk FaktГ¶rleri (10) вҖ” ЕһU AN sГјregelen riskler. рҹҢЎпёҸ Д°klim kategorisi
   GEГҮMД°Еһ maruziyeti kalДұcДұ olarak cezalandДұrДұr; burada aynДұ ihlalin hГўlГў
   DEVAM ediyor olmasДұ (dГјzeltilmemiЕҹ, sГјregelen risk) ayrДұca deДҹerlendirilir
   вҖ” farklДұ bir yГ¶netim sorunudur. Kritik hatalar da burada bir kalemle
   toplam puana yansДұr (ayrДұca kendi baЕҹlДұДҹДұnda da gГ¶sterilir). */
function _puanRiskFaktorleri(c, kritikHatalar){
  var maks=10, kalemler=[], puan=maks;
  tempAlerts().filter(function(a){return a.cid===c.id;}).forEach(function(a){
    if(a.lvl===2){ puan-=4; kalemler.push(_kalem(-4,"Еһu an tehlikeli sДұcaklДұk: "+a.txt)); }
    else if(a.lvl===1){ puan-=2; kalemler.push(_kalem(-2,"Еһu an kritik sДұcaklДұk: "+a.txt)); }
  });
  if(odaHastalikRiskli(c)){
    var sonH=(c.hastalikKayitlar||[]).slice().sort(function(x,y){return cmpDate(y.tarih,x.tarih);})[0];
    puan-=3; kalemler.push(_kalem(-3,"Son 14 gГјnde hastalДұk/zararlДұ kaydДұ"+(sonH?(" вҖ” "+sonH.tur):"")));
  }
  var son=sonGunluk(c);
  if(son && son.amonyak==="Var"){ puan-=2; kalemler.push(_kalem(-2,"Amonyak kokusu bildirilmiЕҹ")); }
  ilacGecmisi(c).forEach(function(g){
    if(g.uyari.some(function(u){return u.indexOf("вҡ пёҸ")===0;})){ puan-=3; kalemler.push(_kalem(-3, g.ad+": hasat Г¶ncesi bekleme ihlali riski")); }
  });
  if(kritikHatalar.length){ var d=Math.min(6,kritikHatalar.length*2); puan-=d; kalemler.push(_kalem(-d, kritikHatalar.length+" kalДұcДұ kritik hata (aЕҹaДҹДұda detaylДұ)")); }
  /* Yapay ZekГў KontrolГј'nГјn "рҹ”ҙ riskli" bulduДҹu protokol adДұmДұ ertelemeleri вҖ”
     kullanДұcДұ isteДҹi: "erteleme Гјretim aГ§ДұsДұndan risk oluЕҹturuyorsa puanДұ
     etkileyebilir" вҖ” normal gecikme cezasДұnДұn (Protokol UygunluДҹu/Misel
     GeliЕҹimi) ГңSTГңNE, veriyle Г§eliЕҹen gerekГ§e seГ§imi iГ§in ayrДұ bir ceza. */
  var riskliErtelemeSayisi = c.erteleAIVerdict ? Object.keys(c.erteleAIVerdict).filter(function(k){return c.erteleAIVerdict[k]==="kirmizi";}).length : 0;
  if(riskliErtelemeSayisi>0){ var d2=Math.min(4,riskliErtelemeSayisi*2); puan-=d2; kalemler.push(_kalem(-d2, riskliErtelemeSayisi+" erteleme kararДұ seГ§ilen gerekГ§eyle Г§eliЕҹen verilerle kaydedildi (рҹ”ҙ)")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"risk", ad:"вҡ  Risk FaktГ¶rleri", maks:maks, puan:puan, kalemler:kalemler};
}

/* KalДұcДұ/kritik hatalar вҖ” normal kategori cezalarДұndan AYRI listelenir
   (kullanДұcДұ isteДҹi: "bu hatalar ayrДұ deДҹerlendirilsin"). Risk FaktГ¶rleri
   kategorisi Гјzerinden toplam puana da yansДұr, ama kullanДұcДұya HER ZAMAN
   kendi baЕҹlДұДҹДұ altДұnda, gerekГ§esiyle gГ¶sterilir. */
function _kritikHatalarTespit(c){
  var out=[], today=todayISO();
  var seri=0, maxSeri=0;
  (c.gunluk||[]).filter(function(r){return r.tarih<=today;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null && (ko>=KOMPOST_TEHLIKELI||ko<=KOMPOST_TEHLIKE_ALT)){ seri++; if(seri>maxSeri) maxSeri=seri; } else seri=0;
  });
  if(maxSeri>=3) out.push("Kompost art arda "+maxSeri+" gГјn tehlikeli sДұcaklДұkta kaldДұ вҖ” kalДұcДұ misel hasarДұ riski yГјksek.");

  if(c.tirmikTarihi && c.havaBaslangic){
    var S=getSet(c);
    var beklenenHava=addDays(c.tirmikTarihi, S.offHava-S.offTirmik);
    var gecikme=daysBetween(beklenenHava, c.havaBaslangic);
    if(gecikme>=5) out.push("Havaya baЕҹlama planlanandan "+gecikme+" gГјn geГ§ yapДұlmДұЕҹ вҖ” misel geliЕҹimi gereДҹinden uzun sГјrmГјЕҹ olabilir.");
  }

  if(c.gelisTarihi && c.toprakTarihi){
    var beklenenToprak=addDays(c.gelisTarihi, getSet(c).offToprak);
    var erkenlik=daysBetween(c.toprakTarihi, beklenenToprak);
    if(erkenlik>=3) out.push("Toprak planlanandan "+erkenlik+" gГјn erken serilmiЕҹ вҖ” kompost yeterince olgunlaЕҹmamДұЕҹ olabilir.");
  }

  var amonyakGunleri=(c.gunluk||[]).filter(function(r){return r.amonyak==="Var" && r.tarih<=today;}).map(function(r){return r.tarih;});
  if(amonyakGunleri.length){
    var adimGunleri=[];
    getProtokol().forEach(function(s,idx){ if(s.silindi) return; var yt=adimYapilmaTarihi(c,idx,s); if(yt) adimGunleri.push(yt); });
    var carpisma=amonyakGunleri.some(function(ag){ return adimGunleri.some(function(yt){ return Math.abs(daysBetween(ag,yt))<=1; }); });
    if(carpisma) out.push("Amonyak kokusu bildirilirken protokol iЕҹlemi yapДұlmaya devam edilmiЕҹ вҖ” Г¶nce havalandДұrma/nem sorunu Г§Г¶zГјlmeliydi.");
  }
  return out;
}

/* Yapay zekГў yorumu вҖ” kural tabanlДұ ama doДҹal dilde, kДұsa (1-2 cГјmle),
   puanДұn ALTINDA her zaman gГ¶sterilir. Stage/trend/kritik hata durumuna
   gГ¶re en anlamlДұ Еҹablonu seГ§er. */
function _performansYorumUret(c, kategoriler, kritikHatalar, toplamPuan, stageAd){
  if(kritikHatalar.length){
    return "GeГ§miЕҹte yaЕҹanan "+(kritikHatalar.length>1?"sorunlar":"sorun")+" ilerideki flaЕҹlarДұ hafif zayДұflatabilir; yakДұndan takip Г¶nerilir.";
  }
  var iklim=kategoriler.filter(function(k){return k.key==="iklim";})[0];
  var trend=kategoriler.filter(function(k){return k.key==="trend";})[0];
  if(trend && trend.puan>=trend.maks-1 && iklim && iklim.puan<iklim.maks){
    return "Son Г¶lГ§Гјmler ideale yaklaЕҹtДұДҹДұ iГ§in Г¶nceki risk bГјyГјk Г¶lГ§Гјde azalmДұЕҹ gГ¶rГјnГјyor.";
  }
  if(toplamPuan>=90) return stageAd+" dГ¶neminde sorunsuz ilerliyor; mevcut yГ¶netim Еҹekli sГјrdГјrГјlebilir.";
  if(toplamPuan>=75) return stageAd+" dГ¶neminde genel olarak iyi gidiyor, birkaГ§ kategoride kГјГ§Гјk iyileЕҹtirme fДұrsatДұ var.";
  return stageAd+" dГ¶neminde birden fazla kategoride puan kaybДұ var вҖ” en dГјЕҹГјk puanlДұ kategoriye Г¶nce odaklanmak faydalДұ olur.";
}

/* Tahmin вҖ” puan sadece bugГјnГј gГ¶stermesin, ileriye dГ¶nГјk Г¶ngГ¶rГј de versin.
   Mevcut tahminiVerim()/verimFlasOzet() altyapДұsДұ (firma/filo geГ§miЕҹi)
   TOPLAM verim iГ§in zaten var (gereksiz tekrar oluЕҹturmamak iГ§in AYNEN
   kullanДұlДұr); flaЕҹ1/flaЕҹ2 kДұrДұlДұmДұ tamamlanmДұЕҹ dГ¶ngГјlerin ortalama flaЕҹ
   oranДұndan, risk seviyesi gГјncel puan + kritik hata sayДұsДұndan tГјretilir. */
function _performansTahminUret(c, toplamPuan, kritikHatalar){
  var tv=tahminiVerim(c); /* {kg, kaynak} ya da null (tonaj/geГ§miЕҹ veri yoksa) */
  var oranEsleri=tumTamamlananDongu().map(function(x){
    var fo=verimFlasOzet(x); var f1=fo.F1?fo.F1.kg:0, f2=fo.F2?fo.F2.kg:0, top=f1+f2;
    return top>0 ? {f1:f1/top} : null;
  }).filter(Boolean);
  var f1Oran = oranEsleri.length ? (oranEsleri.reduce(function(s,x){return s+x.f1;},0)/oranEsleri.length) : 0.55; /* veri yoksa tipik oran */
  var toplamKg = tv?tv.kg:null;
  var puanKatsayi = 0.7+(toplamPuan/100)*0.5; /* dГјЕҹГјk puan tahmini hafif aЕҹaДҹДұ, yГјksek puan hafif yukarДұ Г§eker */
  var seviyeMetni=function(v){ return v>=80?"yГјksek":(v>=55?"orta":"dГјЕҹГјk"); };

  var risk;
  if(kritikHatalar.length>=2 || toplamPuan<55) risk={seviye:"yГјksek", aciklama:kritikHatalar.length?"kalДұcДұ kritik hatalar nedeniyle":"dГјЕҹГјk puan nedeniyle"};
  else if(kritikHatalar.length===1 || toplamPuan<75) risk={seviye:"orta", aciklama:"bazДұ kategorilerde puan kaybДұ var"};
  else risk={seviye:"dГјЕҹГјk", aciklama:"belirgin bir sorun gГ¶rГјnmГјyor"};

  return {
    flas1: toplamKg!=null ? {kg:Math.round(toplamKg*f1Oran*puanKatsayi), seviye:seviyeMetni(toplamPuan)} : null,
    flas2: toplamKg!=null ? {kg:Math.round(toplamKg*(1-f1Oran)*puanKatsayi), seviye:seviyeMetni(toplamPuan)} : null,
    toplamVerim: toplamKg!=null ? {kg:Math.round(toplamKg*puanKatsayi), kaynak:tv.kaynak} : null,
    risk: risk
  };
}

/* GГјven puanДұ вҖ” tahminin ne kadar veriye dayandДұДҹДұnДұ gГ¶sterir ("yeterli
   veri yok" gibi gerekГ§eli dГјЕҹГјk gГјven, kullanДұcДұ isteДҹi). ГңГ§ sinyal:
   (1) bu odanДұn kendi gГјnlГјk kayДұt sayДұsДұ, (2) tamamlanmДұЕҹ filo dГ¶ngГј
   sayДұsДұ (fleet tahmininin kalitesi), (3) firma-Г¶zel geГ§miЕҹ var mДұ. */
function _performansGuvenPuani(c){
  var gunlukSayisi=(c.gunluk||[]).length;
  var filoDongu=tumTamamlananDongu().length;
  var firmaN=0;
  if(c.kompostFirma){ var f=firmaOrtalamaKgTon(c.kompostFirma); firmaN=f?f.n:0; }
  var puan=30+Math.min(30,gunlukSayisi*1.5)+Math.min(25,filoDongu*3)+Math.min(15,firmaN*4);
  puan=Math.max(5,Math.min(97,Math.round(puan)));
  var aciklama;
  if(puan>=80) aciklama="Yeterli gГјnlГјk kayДұt ve geГ§miЕҹ dГ¶ngГј verisi var.";
  else if(filoDongu<3) aciklama="Filoda henГјz az sayДұda tamamlanmДұЕҹ dГ¶ngГј var вҖ” tahminler zamanla gГјГ§lenecek.";
  else if(gunlukSayisi<5) aciklama="Bu dГ¶ngГјde henГјz az sayДұda Г¶lГ§Гјm girildi.";
  else aciklama="Orta dГјzeyde veri вҖ” tahmin ipucu olarak deДҹerlendirilmeli.";
  return {yuzde:puan, aciklama:aciklama};
}

function odaPerformans(c){
  if(c.bosaltimTarihi) return null;
  var stageAd=stageOf(c).t;
  var kritikHatalar=_kritikHatalarTespit(c);
  var kategoriler=[
    _puanIklim(c),
    _puanMiselGelisimi(c),
    _puanProtokolUygunlugu(c),
    _puanSulamaYonetimi(c),
    _puanTrendAnalizi(c),
    _puanRiskFaktorleri(c, kritikHatalar)
  ];
  var toplamPuan=Math.max(0,Math.min(100,Math.round(kategoriler.reduce(function(s,k){return s+k.puan;},0))));

  /* Geriye dГ¶nГјk uyumluluk: nedenler dГјz listesi, kategorilerin kalemlerinden
     TГңRETД°LД°R (SSOT вҖ” iki ayrДұ hesap yok) вҖ” mevcut Г§aДҹДұranlar (varsa) hГўlГў
     Г§alДұЕҹДұr, ama asДұl veri artДұk kategoriler/kritikHatalar. */
  var nedenler=[];
  kategoriler.forEach(function(k){
    k.kalemler.forEach(function(kl){ nedenler.push({tip:(kl.delta<0?"kritik":(kl.delta>0?"bilgi":"gozlem")), metin:kl.aciklama}); });
  });
  kritikHatalar.forEach(function(h){ nedenler.push({tip:"kritik", metin:h}); });

  var protKat=kategoriler.filter(function(k){return k.key==="protokol";})[0];
  return {
    puan: toplamPuan,
    nedenler: nedenler,
    kategoriler: kategoriler,
    kritikHatalar: kritikHatalar,
    yorum: _performansYorumUret(c, kategoriler, kritikHatalar, toplamPuan, stageAd),
    tahmin: _performansTahminUret(c, toplamPuan, kritikHatalar),
    guven: _performansGuvenPuani(c),
    gecikmisAdimlar: protKat?protKat.gecikmisAdimlar:[],
    haklДұGecikme: protKat?protKat.haklДұGecikme:[]
  };
}
function puanRenk(p){ return p>=85?"var(--green)":(p>=70?"var(--amber)":"#c0291f"); }
/* Kategori/kritik hata/tahmin bloklarДұnДұn ortak HTML'i вҖ” hem oda detayДұndaki
   puan kartДұnda (puanCardHTML) hem Raporlar > Analiz'deki Oda Analizi'nde
   (odaAnalizHTML) AYNEN kullanДұlДұr, tek yerden (gereksiz tekrar yok). */
/* Kategori listesinin (delta/aГ§Дұklama kalemleriyle) ortak HTML'i вҖ” oda
   performansДұ (_performansDetayHTML) ve firma performansДұ (firmaPerformansDetayHTML)
   AYNI gГ¶rsel dili kullanДұr, tek yerden (gereksiz tekrar yok). */
function _kategorilerListHTML(kategoriler){
  return kategoriler.map(function(k){
    var renk=puanRenk(Math.round((k.puan/k.maks)*100));
    var kalemHTML=k.kalemler.length ? k.kalemler.map(function(kl){
      var isaret=kl.delta>0?("+"+kl.delta):(""+kl.delta);
      var kRenk=kl.delta>0?"var(--green-dark)":(kl.delta<0?"#a32d2d":"var(--muted)");
      return '<div style="display:flex;gap:6px;font-size:12.5px;padding:2px 0;"><span style="color:'+kRenk+';font-weight:700;min-width:26px;">'+(kl.delta?isaret:"В·")+'</span><span>'+esc(kl.aciklama)+'</span></div>';
    }).join('') : '<div class="muted" style="font-size:12.5px;">Bu kategoride kayda deДҹer bir bulgu yok.</div>';
    return '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;">'
      +'<span style="font-weight:700;font-size:13.5px;">'+k.ad+'</span>'
      +'<span style="font-weight:700;color:'+renk+';">'+k.puan+'<span class="muted" style="font-weight:400;font-size:12px;"> /'+k.maks+'</span></span>'
      +'</div>'+kalemHTML+'</div>';
  }).join('');
}
function _performansDetayHTML(p){

  var kritikHTML = p.kritikHatalar.length ? (
    '<div style="margin-top:10px;padding:9px 10px;background:#fdf3f3;border:1px solid #f0c9c9;border-radius:8px;">'
    +'<div style="font-weight:700;font-size:13px;color:#a32d2d;margin-bottom:4px;">рҹ”ҙ Kritik Hatalar (kalДұcДұ puan kaybДұ)</div>'
    +p.kritikHatalar.map(function(h){return '<div style="font-size:12.5px;color:#a32d2d;padding:2px 0;">вҖў '+esc(h)+'</div>';}).join('')
    +'</div>'
  ) : '';

  var tahmin=p.tahmin;
  var riskRenk = tahmin.risk.seviye==="yГјksek"?"#a32d2d":(tahmin.risk.seviye==="orta"?"#8a5a1f":"#1f7a4d");
  var tahminHTML='<div style="margin-top:10px;padding:9px 10px;background:#eef6ff;border:1px solid #b9d7f5;border-radius:8px;">'
    +'<div style="font-weight:700;font-size:13px;color:#1d4ed8;margin-bottom:4px;">рҹ”® Tahmin</div>'
    +(tahmin.flas1?('<div style="font-size:12.5px;">1. FlaЕҹ: <b>~'+tahmin.flas1.kg+' kg</b> ('+tahmin.flas1.seviye+')</div>'):'<div class="muted" style="font-size:12.5px;">1. FlaЕҹ: tonaj/geГ§miЕҹ veri yetersiz</div>')
    +(tahmin.flas2?('<div style="font-size:12.5px;">2. FlaЕҹ: <b>~'+tahmin.flas2.kg+' kg</b> ('+tahmin.flas2.seviye+')</div>'):'')
    +(tahmin.toplamVerim?('<div style="font-size:12.5px;">Toplam verim: <b>~'+tahmin.toplamVerim.kg+' kg</b> <span class="muted">('+esc(tahmin.toplamVerim.kaynak)+')</span></div>'):'')
    +'<div style="font-size:12.5px;">Risk: <b style="color:'+riskRenk+';">'+tahmin.risk.seviye+'</b> <span class="muted">('+esc(tahmin.risk.aciklama)+')</span></div>'
    +'<div class="muted" style="font-size:11.5px;margin-top:5px;">Tahmin gГјveni: <b>%'+p.guven.yuzde+'</b> вҖ” '+esc(p.guven.aciklama)+'</div>'
    +'</div>';

  return kritikHTML+kategorilerHTML+tahminHTML;
}
function puanCardHTML(c){
  var p=odaPerformans(c); if(!p) return "";
  var body='<div style="display:flex;align-items:center;gap:14px;">'
    +'<div style="font-size:34px;font-weight:700;color:'+puanRenk(p.puan)+';">'+p.puan+'<span style="font-size:15px;color:var(--muted);">/100</span></div>'
    +'<div style="flex:1;font-size:13px;font-style:italic;color:var(--muted);">'+esc(p.yorum)+'</div>'
    +'</div>'
    +_performansDetayHTML(p);
  return sectionCard('рҹҺҜ Гңretim performans puanДұ', body);
}
function hasatKaymasi(c){
  var ort=ortKompostSicaklik(c);
  if(ort==null) return {kayma:0, neden:[]};
  var kayma=0, neden=[];
  if(ort>=KOMPOST_TEHLIKELI){ kayma=-3; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (tehlikeli yГјksek) вҖ” misel Г§ok hДұzlanmДұЕҹ olabilir, hasat ~3 gГјn erkene kayabilir."); }
  else if(ort>=KOMPOST_KRITIK_UST){ kayma=-2; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (kritik yГјksek) вҖ” misel hДұzlanmДұЕҹ olabilir, hasat ~2 gГјn erkene kayabilir."); }
  else if(ort>KOMPOST_IDEAL_MAX){ kayma=-1; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (ideal ГјstГј) вҖ” hasat ~1 gГјn erkene kayabilir."); }
  else if(ort<=KOMPOST_TEHLIKE_ALT){ kayma=2; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (tehlikeli dГјЕҹГјk) вҖ” misel geliЕҹimi yavaЕҹlamДұЕҹ olabilir, hasat ~2 gГјn gecikebilir."); }
  else if(ort<=KOMPOST_KRITIK_ALT){ kayma=1; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (kritik dГјЕҹГјk) вҖ” hasat ~1 gГјn gecikebilir."); }
  else if(ort<KOMPOST_IDEAL_MIN){ kayma=1; neden.push("KuluГ§ka dГ¶nemi kompost ort. "+ort.toFixed(1)+"В° (ideal altДұ) вҖ” hasat ~1 gГјn gecikebilir."); }
  return {kayma:kayma, neden:neden};
}
function beklenenHasat(c){
  var S=getSet(c);
  var baz;

}
/* kasaMin/kasaMax: kullanДұcДұnДұn verdiДҹi ortalama gГјnlГјk hasat (kasa) aralДұДҹДұ вҖ”

var HASAT_PLAN = [

function hasatBaslangic(c){
  if(c.hasat && c.hasat.length){ var ds=c.hasat.map(function(h){return h.tarih;}).filter(Boolean).sort(); if(ds.length) return ds[0]; }
  return beklenenHasat(c);

/* Sadece hangi flaЕҹ/gГјn'e denk geldiДҹini (saf tarih aritmetiДҹi) dГ¶ndГјrГјr вҖ”
   kasa miktarДұ Д°ГҮERMEZ. hasatGercekVeriIstatistik()'in hasatAsama()'ya deДҹil
   BUNA baДҹlДұ olmasДұ gerekiyor, aksi halde "gerГ§ek kasa geГ§miЕҹini oku" вҶ’
   "her kaydДұn hangi gГјne denk geldiДҹini bul (hasatAsama)" вҶ’ "o gГјnГјn kasa
   aralДұДҹДұnДұ gerГ§ek veriden oku (hasatGercekVeriIstatistik)" dГ¶ngГјsГј sonsuz
   Г¶zyinelemeye girerdi. */
function hasatGunNo(c, iso){
  var bas=hasatBaslangic(c); if(!bas) return null;
  var hd=daysBetween(bas, iso); if(hd===null||hd<0) return null;
  var gun=hd+1, found=null;
  HASAT_PLAN.forEach(function(x){ if(x.gun===gun) found=x; });
  if(!found && gun>16) found={gun:gun, flas:0, asama:"BoЕҹaltmaya hazДұr"};
  if(!found) return null;
  return {gun:gun, flas:found.flas, asama:found.asama};
}
/* KullanДұcДұ isteДҹi: "ileride gerГ§ek verilerle yapmak istesem nasДұl yaparДұm" вҖ”
   hiГ§bir ekstra iЕҹlem gerekmiyor, otomatik: her hasat kaydДұ (c.hasat, tarih+
   kasa) hangi Г§iftliДҹin hangi flaЕҹ/gГјnГјne denk geldiДҹine gГ¶re (hasatGunNo)
   kovalara toplanДұr. Yeterli Г¶rnek biriken bir flaЕҹ/gГјn iГ§in artДұk aЕҹaДҹДұdaki
   sabit HASAT_PLAN tahmini yerine GERГҮEK min-max aralДұДҹДұ kullanДұlДұr вҖ” 3-4
   dГ¶ngГј tamamlandДұkГ§a tahminler kendiliДҹinden gerГ§ek verilere dГ¶ner. */
function hasatGercekVeriIstatistik(){
  var d=loadData();
  var gunlukToplam={};
  (d.cycles||[]).forEach(function(c){
    (c.hasat||[]).forEach(function(h){
      var k=numParse(h.kasa)||0; if(k<=0 || !h.tarih) return;
      var key=c.id+"|"+h.tarih;
      gunlukToplam[key]=(gunlukToplam[key]||0)+k;
    });
  });
  var buckets={};
  Object.keys(gunlukToplam).forEach(function(key){
    var i=key.indexOf("|"); var cid=key.slice(0,i), tarih=key.slice(i+1);
    var c=(d.cycles||[]).find(function(x){return x.id===cid;}); if(!c) return;
    var a=hasatGunNo(c, tarih); if(!a || a.flas<=0) return;
    var bKey=a.flas+"-"+a.gun;
    if(!buckets[bKey]) buckets[bKey]=[];
    buckets[bKey].push(gunlukToplam[key]);
  });
  return buckets;
}
var HASAT_GERCEK_MIN_ORNEK=2; /* bu sayДұnДұn altДұnda Г¶rnek varsa varsayДұlana gГјvenilir */
function hasatGunlukKasaAraligi(flas, gun){
  var varsayilan={min:0,max:0};
  HASAT_PLAN.forEach(function(x){ if(x.gun===gun) varsayilan={min:x.kasaMin||0, max:x.kasaMax||0}; });
  var buckets=hasatGercekVeriIstatistik();
  var ornekler=buckets[flas+"-"+gun];
  if(ornekler && ornekler.length>=HASAT_GERCEK_MIN_ORNEK){
    return {min:Math.min.apply(null,ornekler), max:Math.max.apply(null,ornekler), kaynak:"gercek", n:ornekler.length};
  }
  return {min:varsayilan.min, max:varsayilan.max, kaynak:"varsayilan", n:(ornekler?ornekler.length:0)};
}
function hasatAsama(c, iso){
  var g=hasatGunNo(c, iso); if(!g) return null;
  var ar=hasatGunlukKasaAraligi(g.flas, g.gun);
  return {gun:g.gun, flas:g.flas, asama:g.asama, kasaMin:ar.min, kasaMax:ar.max, kasaKaynak:ar.kaynak, kasaOrnekSayisi:ar.n};
}

/* ============ YГјzdesel Hasat EДҹrisi Analizi ============
   AmaГ§ toplam kasa miktarДұ deДҹil, bir flaЕҹДұn 5 gГјnlГјk hasadДұnДұn GГңNLERE
   YГңZDESEL DAДһILIMI вҖ” doДҹru zamanda, dengeli ve kaliteli hasat edilip
   edilmediДҹinin gГ¶stergesi. HASAT_PLAN'daki kasaMin/kasaMax (haftalДұk hasat
   tahmini raporu iГ§in, mutlak kasa aralДұДҹДұ) ile KARIЕһTIRILMAMALI вҖ” burasДұ
   yГјzde bazlДұ, ayrДұ bir analiz katmanДұ. */
var HASAT_EGRI_REFERANS = [ /* yumuЕҹak/esnek referans вҖ” sabit eЕҹik deДҹil, aЕҹaДҹДұdaki
   hasatEgriOgrenilmisReferans() yeterli geГ§miЕҹ veri birikince bunun yerine
   gerГ§ek (oda/firma/filo) ortalamasДұnДұ kullanДұr */
  {gun:1, min:3,  max:8},
  {gun:2, min:15, max:25},
  {gun:3, min:30, max:40},
  {gun:4, min:25, max:35},
  {gun:5, min:8,  max:18}
];
var HASAT_EGRI_OGRENME_MIN_ORNEK = 3;
/* Bir flaЕҹДұn (1 veya 2) HASAT_PLAN'daki 5 gГјnlГјk penceresi baЕҹlangДұcДұ: flaЕҹ1
   hasatBaslangic() ile aynДұ gГјn, flaЕҹ2 +10 gГјn sonra (5 gГјn flaЕҹ + 5 gГјn
   hazДұrlДұk arasДұ вҖ” HASAT_PLAN gun:6-10). */
function hasatFlasBaslangic(c, flas){
  var bas=hasatBaslangic(c); if(!bas) return null;
  return addDays(bas, flas===1?0:10);
}
/* Bu flaЕҹДұn 5 gГјnlГјk penceresi tamamen geГ§miЕҹ mi (o yГјzden yГјzdeler artДұk
   anlamlДұ вҖ” pencere bitmeden % hesaplamak yanДұltДұcДұ olur, toplam henГјz
   kesinleЕҹmemiЕҹ demektir). */
function hasatFlasTamamlandiMi(c, flas){
  if(c.bosaltimTarihi) return true;
  var bugunGun=hasatGunNo(c, todayISO()); if(!bugunGun) return false;
  var sonGun=(flas===1)?5:15;
  return bugunGun.gun>sonGun;
}
/* Bu flaЕҹДұn 5 gГјnГј iГ§in gerГ§ek hasat kayДұtlarДұndan (c.hasat) toplanan kasa
   miktarДұ вҖ” hasatGunNo (SSOT) ile aynДұ gГјn/flaЕҹ eЕҹlemesini kullanДұr, ayrДұ
   bir tarih hesaplamasДұ TEKRARLANMAZ. */
function hasatFlasGunlukKasa(c, flas){
  var ofs=(flas===1)?0:10;
  var gunler=[0,0,0,0,0];
  (c.hasat||[]).forEach(function(h){
    var g=hasatGunNo(c, h.tarih); if(!g || g.flas!==flas) return;
    var d=g.gun-ofs;
    if(d>=1 && d<=5) gunler[d-1]+=(numParse(h.kasa)||0);
  });
  return gunler;
}
function hasatEgrisiYuzdeleri(c, flas){
  if(!hasatFlasTamamlandiMi(c,flas)) return null;
  var g=hasatFlasGunlukKasa(c,flas);
  var t=g.reduce(function(a,b){return a+b;},0);
  if(t<=0) return null;
  return g.map(function(k){return k/t*100;});
}
/* Referans eДҹri kademeli Г¶Дҹrenme: kullanДұcДұ isteДҹi "sabit eЕҹik deДҹil, tesis
   kendi ideal yГјzde daДҹДұlДұmДұnДұ zamanla Г¶Дҹrensin" вҖ” tahminiVerim()'deki
   firmaвҶ’filo Еҹelalesiyle AYNI desen: Г¶nce bu odanДұn kendi geГ§miЕҹi (en
   gГјvenilir), yoksa aynДұ kompost firmasДұnДұn geГ§miЕҹi, yoksa filo geneli,
   hiГ§biri yeterli deДҹilse sabit varsayДұlan (HASAT_EGRI_REFERANS). Bu uygulamada
   ayrДұ bir "sezon/Гјretim dГ¶nemi" alanДұ tutulmadДұДҹДұndan oda+firma+flaЕҹ en
   yakДұn pratik vekildir (hasatGercekVeriIstatistik'teki gerГ§ek-veri-
   varsayДұlanДұ-geГ§ersiz-kДұlar deseniyle tutarlДұ). */
function hasatEgriOgrenilmisReferans(c, flas){
  var aday=tumTamamlananDongu().filter(function(x){return x.id!==c.id;});
  function ortalama(cycles){
    var egriler=cycles.map(function(x){return hasatEgrisiYuzdeleri(x,flas);}).filter(Boolean);
    if(egriler.length<HASAT_EGRI_OGRENME_MIN_ORNEK) return null;
    var ort=[0,0,0,0,0];
    egriler.forEach(function(e){ e.forEach(function(v,i){ ort[i]+=v; }); });
    return {yuzde: ort.map(function(v){return v/egriler.length;}), n:egriler.length};
  }
  var r=ortalama(aday.filter(function(x){return normalizeOda(x.oda)===normalizeOda(c.oda);}));
  if(r) return {yuzde:r.yuzde, kaynak:"bu odanДұn geГ§miЕҹ dГ¶ngГјleri (n="+r.n+")"};
  if(c.kompostFirma){
    r=ortalama(aday.filter(function(x){return (x.kompostFirma||"")===c.kompostFirma;}));
    if(r) return {yuzde:r.yuzde, kaynak:"aynДұ kompost firmasДұ geГ§miЕҹi (n="+r.n+")"};
  }
  r=ortalama(aday);
  if(r) return {yuzde:r.yuzde, kaynak:"filo geneli geГ§miЕҹ (n="+r.n+")"};
  return {yuzde: HASAT_EGRI_REFERANS.map(function(x){return (x.min+x.max)/2;}), kaynak:"varsayДұlan referans eДҹri (henГјz yeterli geГ§miЕҹ veri birikmedi)"};
}

/* Ana analiz вҖ” 6 gГјnlГјk gerГ§ek kasa daДҹДұlДұmДұnДұ (%) referansla kДұyaslar, 0-100
   yГ¶netim puanДұ Гјretir. Kritik: puan TOPLAM VERД°MД° deДҹil, hasadДұn zamanlama/
   denge kalitesini Г¶lГ§er вҖ” az/Г§ok kasa toplansa da eДҹri dГјzgГјnse puan yГјksek
   kalabilir. */
function hasatEgrisiAnaliz(c, flas){
  if(!hasatFlasTamamlandiMi(c,flas)) return null;
  var gunlukKasa=hasatFlasGunlukKasa(c,flas);
  var toplam=gunlukKasa.reduce(function(a,b){return a+b;},0);
  if(toplam<=0) return null;
  var yuzde=gunlukKasa.map(function(k){return k/toplam*100;});
  var ref=hasatEgriOgrenilmisReferans(c,flas);

  var bulgular=[];
  var puan=100;

  var maxIdx=0;
  for(var i=1;i<5;i++){ if(yuzde[i]>yuzde[maxIdx]) maxIdx=i; }
  var pikGun=maxIdx+1;
  var erkenToplam=yuzde[0]+yuzde[1];
  var gecToplam=yuzde[3]+yuzde[4];
  var erkenBeklenen=ref.yuzde[0]+ref.yuzde[1];
  var gecBeklenen=ref.yuzde[3]+ref.yuzde[4];

  var erkenHasat=false;
  if(erkenToplam>erkenBeklenen+15){
    erkenHasat=true; puan-=15;
    bulgular.push({tip:"erken", aciklama:"1. ve 2. gГјn toplamДұ %"+erkenToplam.toFixed(0)+" (beklenen ~%"+erkenBeklenen.toFixed(0)+") вҖ” MantarlarДұn kГјГ§Гјkken toplanmДұЕҹ olma ihtimali bulunmaktadДұr."});
  }

  var gecHasat=false;
  if(yuzde[2]>ref.yuzde[2]+15 && gecToplam<gecBeklenen-15){
    gecHasat=true; puan-=15;
    bulgular.push({tip:"gec", aciklama:"3. gГјn %"+yuzde[2].toFixed(0)+" ile beklenenin belirgin Гјzerinde, 4.-5. gГјn toplamДұ %"+gecToplam.toFixed(0)+" ile dГјЕҹГјk kalmДұЕҹ вҖ” Hasat gecikmiЕҹ olabilir."});
  }

  var kirilmalar=[];
  for(var d=1; d<5; d++){
    var fark=yuzde[d]-yuzde[d-1];
    if(Math.abs(fark)>20) kirilmalar.push({gunA:d, gunB:d+1, fark:fark});
  }
  if(kirilmalar.length){
    puan-=Math.min(20, kirilmalar.length*8);
    kirilmalar.forEach(function(k){
      bulgular.push({tip:"kirilma", aciklama:k.gunA+"вҶ’"+k.gunB+". gГјn arasДұnda %"+Math.abs(k.fark).toFixed(0)+" puanlДұk ani "+(k.fark>0?"artДұЕҹ":"dГјЕҹГјЕҹ")+" вҖ” olasДұ nedenler: hasat planlamasДұ, personel yetersizliДҹi, klima ayarlarДұ, havalandДұrma, kompost sДұcaklДұДҹДұ, sulama yГ¶netimi."});
    });
  }

  var maxYuzde=yuzde[maxIdx];
  var simetriTip, simetriYorum;

/* DГ¶nemler (Erdal'Дұn tanДұmДұ):
   kuluГ§ka: geliЕҹвҶ’toprak В· toprak dГ¶nemi: toprakвҶ’tДұrmДұk В· 1.misel: tДұrmДұkвҶ’hava
   havadan sonra gГјn 0-5: 2.misel В· 6-8: pimleme В· 9: bezelye В· 10: ceviz В· sonra hasat */
function _mhDates(c){
  var S=getSet(c);
  var toprak = c.toprakTarihi || (c.gelisTarihi?addDays(c.gelisTarihi,S.offToprak):null);
  var tirmik = c.tirmikTarihi || (toprak?addDays(toprak,S.offTirmik):null);
  var hava   = c.havaBaslangic || (toprak?addDays(toprak,S.offHava):null);
  return {toprak:toprak, tirmik:tirmik, hava:hava};
}
function airStarted(c){ return !!c.havaBaslangic && (daysBetween(c.havaBaslangic, todayISO())>=0); }
function phaseCls(t){
  if(t==="KuluГ§ka dГ¶nemi"||t==="Toprak dГ¶nemi") return "b-amber";
  if(t==="1. Misel geliЕҹim"||t==="2. Misel geliЕҹim"||t==="Pimleme dГ¶nemi") return "b-teal";
  return "b-harvest";
}
/* stageOf(c)'Гјn asДұl mantДұДҹДұ вҖ” ama BUGГңN'e (todayISO()) sabit deДҹil, herhangi
   bir tarih iГ§in hesaplanabilir. Puanlama sistemi (odaPerformans) aynДұ hatanДұn
   farklДұ biyolojik dГ¶nemlerde farklДұ aДҹДұrlДұkta puan kДұrmasДұ iГ§in (kullanДұcДұ
   isteДҹi) her gГјnlГјk kaydДұn KENDД° tarihindeki aЕҹamayДұ bilmesi gerekiyor вҖ”
   stageOf sadece "Еҹu an" iГ§in Г§alДұЕҹtДұДҹДұndan bu ihtiyacДұ karЕҹДұlamДұyordu. Kod
   tekrarДұnДұ Г¶nlemek iГ§in stageOf artДұk bu fonksiyonun today=todayISO() ile
   Г§aДҹrДұlmДұЕҹ hali (SSOT, tek mantДұk). */
function stageAtDate(c, iso){
  if(c.bosaltimTarihi) return {t:"BoЕҹaltДұldДұ", cls:"b-gray"};
  if(c.donemManuel) return {t:c.donemManuel, cls:phaseCls(c.donemManuel)};
  var m=_mhDates(c);
  if(!m.toprak || daysBetween(m.toprak,iso)<0) return {t:"KuluГ§ka dГ¶nemi", cls:"b-amber"};
  if(!m.tirmik || daysBetween(m.tirmik,iso)<0) return {t:"Toprak dГ¶nemi", cls:"b-amber"};
  /* KRД°TД°K FIX: Hava aЕҹamasДұna geГ§mek iГ§in GERГҮEKTEN kayДұtlДұ bir Hava BaЕҹlangДұГ§ tarihi
     (c.havaBaslangic) gerekir вҖ” sadece "tahmini" tarihin (toprak+offHava) geГ§miЕҹ olmasДұ
     yetmez. Aksi halde kullanДұcДұ yanlДұЕҹlДұkla girip SД°LSE bile, tahmini tarih geГ§miЕҹte
     kaldДұДҹДұ iГ§in oda hГўlГў "hava baЕҹladДұ" aЕҹamasДұnda gГ¶rГјnmeye devam ediyordu. */
  if(!c.havaBaslangic || daysBetween(c.havaBaslangic,iso)<0) return {t:"1. Misel geliЕҹim", cls:"b-teal"};
  var hd=daysBetween(c.havaBaslangic,iso);
  if(hd<=5) return {t:"2. Misel geliЕҹim", cls:"b-teal"};
  if(hd<=8) return {t:"Pimleme dГ¶nemi", cls:"b-teal"};
  if(hd===9) return {t:"Bezelye boyutu", cls:"b-harvest"};
  if(hd===10) return {t:"Ceviz boyutu", cls:"b-harvest"};
  var ha=hasatAsama(c, iso);
  if(ha){ var lbl=ha.flas>0?("Hasat F"+ha.flas+" В· "+ha.asama):ha.asama; return {t:lbl, cls:"b-harvest"}; }
  return {t:"Hasat", cls:"b-harvest"};
}
function stageOf(c){ return stageAtDate(c, todayISO()); }
function phaseList(c){
  var m=_mhDates(c); var cur=stageOf(c).t;
  function row(ad,tarih,cls){ return {ad:ad, tarih:tarih, cls:cls, current:(ad===cur)}; }
  return [
    row("KuluГ§ka dГ¶nemi", c.gelisTarihi, "b-amber"),
    row("Toprak dГ¶nemi", m.toprak, "b-amber"),
    row("1. Misel geliЕҹim", m.tirmik, "b-teal"),
    row("2. Misel geliЕҹim", m.hava, "b-teal"),
    row("Pimleme dГ¶nemi", m.hava?addDays(m.hava,6):null, "b-teal"),
    row("Bezelye boyutu", m.hava?addDays(m.hava,9):null, "b-harvest"),
    row("Ceviz boyutu", m.hava?addDays(m.hava,10):null, "b-harvest"),
    row("Hasat", m.toprak?addDays(m.toprak,22):null, "b-harvest")
  ];
}
function lastOlcum(c){
  if(c.gunluk && c.gunluk.length){
    var last = c.gunluk[c.gunluk.length-1];
    var parts=[];
    if(last.odaC!=="" && last.odaC!=null) parts.push(last.odaC+"В° oda");
    if(last.kompostC!=="" && last.kompostC!=null) parts.push(last.kompostC+"В° komp.");
    return parts.length? parts.join(" В· ") : "вҖ”";
  }
  return "вҖ”";
}

function gunlukKontrolMesaji(c, tarih, sulamaVarMi){
  var msgs=[];
  if(c.gelisTarihi && tarih && tarih<c.gelisTarihi){
    msgs.push({tip:"blockAll", metin:esc(c.oda||"")+": "+fmtDate(tarih)+" tarihi kompost geliЕҹ tarihinden ("+fmtDate(c.gelisTarihi)+") Г¶nce вҖ” bu odaya henГјz kompost gelmedi."});
  }
  /* KRД°TД°K FIX: Eskiden burada yanlДұЕҹlДұkla c.tiftikTarihi kontrol ediliyordu вҖ” "poЕҹet aГ§ДұldДұ mДұ"
     ile "tiftik yapДұldДұ mДұ" birbirine karДұЕҹmДұЕҹtДұ. ArtДұk gerГ§ek poЕҹet durumuna (posetAcildiMi)
     bakДұyor вҖ” bu da protokoldeki metne gГ¶re deДҹil, iЕҹaretlenen "done" durumuna gГ¶re Г§alДұЕҹДұyor,
     kullanДұcДұ satДұrДұ "PoЕҹet kesimi" gibi yeniden adlandДұrsa bile doДҹru sonuГ§ verir. */
  if(sulamaVarMi && !posetAcildiMi(c)){
    var pg=posetGun(c);
    msgs.push({tip:"blockSulama", metin:esc(c.oda||"")+": poЕҹet henГјz aГ§ДұlmadДұ"+(pg?(" (beklenen: "+fmtDate(pg)+")"):"")+" вҖ” sulama/su bu tarihte girilemez."});
  }
  /* SULAMA YASAДһI: TДұrmДұk tamamlandДұktan Havaya BaЕҹlama gerГ§ekleЕҹene kadar
     hiГ§bir sulama gГ¶revi girilmemeli вҖ” kompost bu dГ¶nemde su almamalДұ. */
  if(sulamaVarMi && c.tirmikTarihi && tarih>=c.tirmikTarihi && (!c.havaBaslangic || tarih<c.havaBaslangic)){
    msgs.push({tip:"blockSulama", metin:esc(c.oda||"")+": Bu Гјretim aЕҹamasДұnda sulama yapДұlmamalДұdДұr (TДұrmДұk sonrasДұ, Havaya BaЕҹlama'ya kadar)."});
  }
  return msgs;
}

function bugunkuGunluk(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var t=todayISO();
  var gunler=c.gunluk.filter(function(g){return g.tarih===t;});
  if(!gunler.length) return null;
  if(gunler.length===1) return gunler[0];
  var birlesik={tarih:t, su:"", sulama:""};

  gunler.forEach(function(g){

    if(g.sulama) birlesik.sulama = birlesik.sulama ? (birlesik.sulama+" В· "+g.sulama) : g.sulama;
    if(g.islemNot) birlesik.islemNot = birlesik.islemNot ? (birlesik.islemNot+" В· "+g.islemNot) : g.islemNot;
    if(g.odaC) birlesik.odaC=g.odaC;
    if(g.kompostC) birlesik.kompostC=g.kompostC;
    if(g.kompostUst) birlesik.kompostUst=g.kompostUst;
    if(g.klimaC) birlesik.klimaC=g.klimaC;
  });
  if(suToplam>0) birlesik.su=String(suToplam);
  return birlesik;

/* Belirli bir TARД°HД°N gГјnlГјk kaydДұna not ekler (dedup'lДұ). GeГ§miЕҹ tarihe de yazabilir.

/* AynДұ "anahtar" ile baЕҹlayan ESKД° notu bulup YENД°SД°YLE DEДһД°ЕһTД°RД°R (gunlukNotTariheEkle
   gibi sonsuza kadar biriktirmez). "TДұrmДұk iГ§in plan ... gГјncellendi" gibi tekrar tekrar

function gunlukNotTariheGuncelle(c, tarih, anahtar, not){

function gunlukNotTariheEkle(c, tarih, not){
  if(!c || !tarih || !not) return;
  not = (""+not).trim(); if(!not) return;
  if(!c.gunluk) c.gunluk=[];
  var ex=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(ex){
    var mevcut=(""+(ex.islemNot||"")).split(" В· ").map(function(x){return x.trim();});
    if(mevcut.indexOf(not)>=0) return;
    ex.islemNot = ex.islemNot ? (ex.islemNot+" В· "+not) : not;
  } else {
    c.gunluk.push({tarih:tarih, odaC:"", kompostC:"", co2alt:"", co2ust:"", su:"", sulama:"", islemNot:not});
    c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  }
}

/* TГјm gГјnlГјk kayДұtlardaki " В· " ile ayrДұlmДұЕҹ tekrar eden notlarДұ temizler.
   Hem eski v173 bozuk kayДұtlarДұnДұ hem de senkronla geri gelen duplicate'leri dГјzeltir.
   loadData sonrasДұ bir kez Г§alДұЕҹДұr. */
function gunlukNotlariTekille(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  function tekille(g, alan){
    var v=g[alan];
    if(!v || (""+v).indexOf(" В· ")<0) return;
    var parcalar=(""+v).split(" В· ").map(function(x){return x.trim();}).filter(function(x){return x;});
    var gorulen={}, temiz=[];
    parcalar.forEach(function(p){
      if(gorulen[p]) return;   /* aynДұ not tekrar ediyorsa atla */
      gorulen[p]=1; temiz.push(p);
    });
    var yeni=temiz.join(" В· ");
    if(yeni!==v){ g[alan]=yeni; degisti=true; }
  }
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){ tekille(g,"sulama"); tekille(g,"islemNot"); });
  });
  return degisti;
}

function posetGun(c){ var i=protokolRolIdx("poset"); if(i>=0){ var t=protokolTarih(c,getProtokol()[i]); if(t) return t; } return (c&&c.gelisTarihi)?addDays(c.gelisTarihi,6):null; }
/* PoЕҹet gerГ§ekten "tamamlandДұ" iЕҹaretlendi mi (sadece takvim gГјnГј deДҹil, ekibin fiilen yaptДұДҹДұ) */
function posetAcildiMi(c){

var _arizaFotoGecici=null;
function arizaFotoSec(file){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      _arizaFotoGecici=cv.toDataURL("image/jpeg",0.6);
      var onz=el("az_foto_onizleme");
      if(onz) onz.innerHTML='<img src="'+_arizaFotoGecici+'" style="width:90px; height:90px; object-fit:cover; border-radius:8px; margin-top:6px;">';
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

/* Genel gГ¶revler listesine tarih+baЕҹlДұk eЕҹleЕҹen BEKLEYEN bir gГ¶rev varsa
   onun atamasДұna ekler (kopya oluЕҹturmaz), yoksa yeni gГ¶rev oluЕҹturur.
   UI yan etkisi (toast/render/saveData) YOK вҖ” hem gorevEkle() (tekli elle
   ekleme) hem topluOnayla() (WhatsApp toplu giriЕҹi) bunu kullanДұr; ikisi de
   ayrДұ ayrДұ aynДұ iЕҹi (Г¶rn. "Oda B-1 В· Oda boЕҹaltma/yДұkama") her tekrarda/
   toplu giriЕҹte kopya "AtanmamДұЕҹ" gГ¶rev olarak biriktiren bugДұ taЕҹДұyordu. */
function gorevEkleVeyaBirlestir(tarih, baslik, atama){
  var d=loadData();
  var mevcut = d.gorevler.find(function(g){ return !g.done && g.tarih===tarih && g.baslik===baslik; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    return false; /* yeni eklenmedi, mevcuda birleЕҹtirildi */
  }
  d.gorevler.push({id:uid(), tarih:tarih, baslik:baslik, atama:atama||"", done:false, at:new Date().toISOString(), by:deviceName()});
  return true;
}
function gorevEkle(tarih,baslik,atama){
  if(!can("edit")) return noPerm();
  baslik=(baslik||"").trim(); if(!baslik){ toast("GГ¶rev baЕҹlДұДҹДұ gir"); return; }
  if(!tarih){ toast("Tarih seГ§"); return; }
  var yeni=gorevEkleVeyaBirlestir(tarih, baslik, atama);
  saveData();
  if(yeni) logAudit("gГ¶rev eklendi", baslik+" ("+fmtDate(tarih)+")");
  toast(yeni?"GГ¶rev eklendi":"Bu gГ¶rev zaten vardДұ вҖ” atama gГјncellendi");
  render();
}

/* YarДұn iГ§in SADE gГ¶rev listesi вҖ” BugГјnkГј GГ¶revler ile aynДұ ruhta ama
   aksiyon butonu yok (henГјz yapДұlamaz, sadece Г¶nizleme). yarinHTML()'in
   karmaЕҹДұk onay/deДҹiЕҹtir/WhatsApp apparatus'u (eski GГ¶revler ekranДұndan
   kalma) burada YOK вҖ” sadece "oda вҖ” iЕҹlem" sade listesi. */
function getTomorrowTasks(){
  var d=loadData(), yarin=addDays(todayISO(),1);
  var tasks=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){return !og.done && og.tarih===yarin;}).forEach(function(og){
      tasks.push({oda:c.oda, islem:og.is, tipo:"oda"});
    });
  });
  (getGorevler()||[]).filter(function(g){return !g.done && g.tarih===yarin;}).forEach(function(g){
    tasks.push({oda:"", islem:g.baslik, tipo:"genel"});
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t===yarin){ tasks.push({oda:c.oda, islem:sd.txt, tipo:"protokol"}); }
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,yarin);
    if(oneri) tasks.push({oda:c.oda, islem:oneri, tipo:"sulama"});
  });
  /* PlanlДұ kompost geliЕҹleri (Kompost PlanДұ) вҖ” odaya Г§evrilmemiЕҹ (done olmayan)
     Г§ДұkДұЕҹДұ YARIN olan kompostlar da yarДұnki iЕҹlerde gГ¶rГјnГјr (kullanДұcДұ raporu:
     "yarДұn kompost gelecek ama yarДұnki iЕҹlemlerde gГ¶rГјnmГјyor"). */
  getPlan().filter(function(x){return !x.done && x.cikis===yarin;}).forEach(function(x){
    tasks.push({oda:x.oda||"вҖ”", islem:"рҹҡҡ Kompost gelecek ("+(x.firma||"firma")+") вҖ” indirme", tipo:"kompost"});
  });
  /* Oda adДұna gГ¶re grupla, odasДұz (genel) en sona */
  tasks.sort(function(a,b){
    if(!!a.oda!==!!b.oda) return a.oda?-1:1;
    return (a.oda||"")<(b.oda||"")?-1:1;
  });
  return tasks;
}
function yarinSadeHTML(){
  var yarin=addDays(todayISO(),1);
  var tasks=getTomorrowTasks();
  var h='<div class="sec-title" style="margin-top:18px;">рҹҢ… YarДұn YapДұlacaklar ('+tasks.length+') вҖ” '+fmtDate(yarin)+' '+gunAdi(yarin)+'</div>';
  if(!tasks.length){
    return h+'<div class="card" style="background:var(--green-soft);border:1px solid var(--green);padding:12px 14px;font-size:13px;color:var(--green-dark);">вң… YarДұn iГ§in planlДұ iЕҹ yok</div>';
  }
  h+='<div class="card" style="padding:0;">';
  tasks.forEach(function(t){
    h+='<div style="padding:10px 14px;border-bottom:1px solid var(--line);font-size:13.5px;">'
      +(t.oda?('<b>'+esc(t.oda)+'</b> вҖ” '):'')+esc(t.islem)
      +'</div>';
  });
  h+='</div>';
  return h;
}
function yarinHTML(){
  var d=loadData(); var tomorrow=addDays(todayISO(),1); var items=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    getProtokol().forEach(function(st,idx){
      if(st.silindi) return;
      if(st.tip==="uyari") return;
      if(st.tip==="ilac" || st.tip==="su") return; /* sulama ziraat iЕҹi вҖ” ekip listesinde yok */
      var base=protokolTarih(c,st); if(!base) return;
      var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
      if(addDays(base,ert)===tomorrow && !adimGercektenYapildiMi(c, idx, st)){
        items.push({cid:c.id, idx:idx, oda:c.oda, txt:adimGosterMetni(c, idx, st, tomorrow), sahip:st.sahip||"", atama:(c.atama&&c.atama["p"+idx])||"", date:tomorrow});
      }
    });
  });
  items.sort(function(a,b){ return cmpOda(a.oda, b.oda); });
  /* YarДұn gelecek kompost вҖ” indirme iЕҹi ekibe atanabilir */
  getPlan().filter(function(x){return !x.done && x.cikis;}).forEach(function(x){
    if(daysBetween(todayISO(), x.cikis)===1){
      items.unshift({plan:true, planId:x.id, oda:x.oda||"вҖ”",
        txt:"рҹҡҡ Kompost gelecek ("+(x.firma||"firma")+") вҖ” indirme",
        sahip:"ekip", atama:x.indirmeAtama||"", date:tomorrow});

function son7GunEnSikSorun(){
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var sinir=addDays(todayISO(),-7);
  var sayac={};
  audit.forEach(function(a){
    var gun=(a.at||"").slice(0,10);
    if(!gun || gun<sinir) return;

    sayac[a.action]=(sayac[a.action]||0)+1;
  });
  var keys=Object.keys(sayac);

  return {action:keys[0], sayi:sayac[keys[0]]};
}

/* Bir oda iГ§in YARIN planlanan tГјm iЕҹlemler (protokol adДұmДұ + manuel oda gГ¶revi).
   "BugГјn iЕҹlem" sГјtununun yanДұna eklenen "YarДұn iЕҹlem" sГјtunu iГ§in kullanДұlДұr. */
function yarinPlanlanan(c){
  if(!c) return [];
  var tomorrow=addDays(todayISO(),1);
  var list=[];
  /* Onay kaydДұ: c.yarinOnay["p12"]="2026-07-08" вҖ” adДұm, O TARД°H iГ§in onaylanmДұЕҹ.
     Tarih eЕҹleЕҹmezse (gГјn geГ§miЕҹse) onay geГ§ersiz вҖ” her gГјn taze onay gerekir.
     MГјhendis deДҹiЕҹikliДҹi: c.yarinDegisiklik["p12"]={t:"2026-07-08", txt:"600 lt su + ..."}
     вҖ” protokol 400 dedi, mГјhendis 600'e Г§evirdi; gГ¶sterilen metin mГјhendisinki olur. */
  function onayliMi(key){ return !!(c.yarinOnay && c.yarinOnay[key]===tomorrow); }
  function degisik(key){ var d=c.yarinDegisiklik&&c.yarinDegisiklik[key]; return (d&&d.t===tomorrow)?d.txt:null; }
  /* KRД°TД°K: sulama/ilaГ§ adДұmlarДұ iГ§in "Д°ptal Et"/"DeДҹiЕҹtir" (BugГјnkГј GГ¶revler'deki
     ile aynДұ kapДұ) doДҹrudan c.gunluk[yarДұn]'a yazДұyor вҖ” ama bu liste sadece
     protokol/onay/ertele durumuna bakДұyordu, c.gunluk'ta zaten bir karar
     verilmiЕҹ olsa bile gГ¶z ardДұ ediyordu. SonuГ§: kullanДұcДұ yarДұnДұn sulamasДұnДұ
     iptal etse bile hem "YarДұn planlanan" kartДұnda hem Odalar listesinin
     "YarДұn iЕҹlem" sГјtununda hiГ§bir Еҹey deДҹiЕҹmiyordu ("iptal ediyorum ama
     gitmiyor" вҖ” kullanДұcДұ raporu). ArtДұk o gГјnГјn kaydДұ varsa ve bir karar
     (sulamaDurum) iГ§eriyorsa, bu bilgi de listeye taЕҹДұnДұr. */
  var yarinGunKaydi=(c.gunluk||[]).find(function(g){return g.tarih===tomorrow;});
  var yarinKarar = (yarinGunKaydi && yarinGunKaydi.sulamaDurum) || "";
  getProtokol().forEach(function(st,idx){
    if(st.silindi) return;
    if(st.tip==="uyari") return;
    /* Agronomik kural: tДұrmДұk-hava arasДұ pencerede kesinlikle sulama
       yapДұlmamalДұ вҖ” yarДұn bu pencereye denk geliyorsa su/ilaГ§ adДұmlarДұ
       "YarДұn planlanan" kartДұnda hiГ§ Г¶nerilmez (bkz. suGoster/tirmikHavaArasiMi). */
    if((st.tip==="ilac"||st.tip==="su") && tirmikHavaArasindaMi(c, tomorrow)) return;

    /* TEKRARLI KURAL (Г¶rn. "PoЕҹet aГ§ДұldДұktan toprak-2'ye kadar HER GГңN Serenade"):
       tek bir "t" tarihi yok, bir ARALIK var (protokolAdimAraligi). "YarДұn" o
       aralДұДҹДұn iГ§ine dГјЕҹГјyorsa, bu da yarДұnДұn planlanan iЕҹi olarak gГ¶sterilmeli.
       Bu kontrol EKSД°KTД° вҖ” tekrarlДұ kurallar hiГ§bir zaman "YarДұn iЕҹlem" kolonunda
       gГ¶rГјnmГјyordu (KRД°TД°K BUG, dГјzeltildi). */
    if(st.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,st);
      if(ar && cmpDate(tomorrow,ar.baslangic)>=0 && cmpDate(tomorrow,ar.bitis)<=0){
        var dgR=degisik("p"+idx);
        list.push({txt:(st.tip==="ilac"||st.tip==="su")&&yarinKarar==="degistirildi"?((yarinGunKaydi.su||yarinGunKaydi.sulama)?((numParse(yarinGunKaydi.su)>0?yarinGunKaydi.su+" lt su":"")+(yarinGunKaydi.sulama?(" "+yarinGunKaydi.sulama):"")).trim():st.txt):(dgR||st.txt), orijinal:st.txt, degisti:!!dgR, key:"p"+idx, onayli:onayliMi("p"+idx), tekrar:true,
          sulamaDurum:(st.tip==="ilac"||st.tip==="su")?yarinKarar:"", sulamaAciklama:(yarinGunKaydi&&yarinGunKaydi.sulamaAciklama)||""});
      }
      return;
    }

    var base=protokolTarih(c,st); if(!base) return;
    /* protokolTarih() kasДұtlДұ olarak adДұmДұn KENDД° ertelemesini dДұЕҹarДұda bДұrakДұr
       (Г§aДҹДұran ekler вҖ” SSOT). "ilac"/"su" tipi kurallar (Г¶rn. Vivando) ZД°NCД°RDEN
       (Г¶rn. toprak ertelendiyse) otomatik kayar, AMA mГјhendis suyu/ilacДұ DOДһRUDAN
       da (zincirden baДҹДұmsДұz) erteleyebilmeli вҖ” protokolOneri() (bugГјnkГј liste)
       bunu zaten bГ¶yle uyguluyor, burada da (yarДұnki liste) aynДұ davranДұЕҹ olmalДұ.
       Zincirin kendi payДұ ile bu adДұmДұn kendi payДұ farklДұ alanlarda tutulur
       (referans adДұmДұn "p"+refIdx'i vs bu adДұmДұn "p"+idx'i) вҖ” Г§ift sayДұm olmaz. */
    var ert=(c.ertele && c.ertele["p"+idx]) ? c.ertele["p"+idx] : 0;
    var t=addDays(base,ert);
    var done=adimGercektenYapildiMi(c, idx, st);
    if(done) return;
    if(t===tomorrow){
      var dg=degisik("p"+idx);
      var suluMu=(st.tip==="ilac"||st.tip==="su");
      var gosterMetin = (suluMu && yarinKarar==="degistirildi" && (yarinGunKaydi.su||yarinGunKaydi.sulama))
        ? ((numParse(yarinGunKaydi.su)>0?yarinGunKaydi.su+" lt su":"")+(yarinGunKaydi.sulama?(" "+yarinGunKaydi.sulama):"")).trim()
        : (dg||st.txt);
      list.push({txt:gosterMetin, orijinal:st.txt, degisti:!!dg, key:"p"+idx, onayli:onayliMi("p"+idx),
        sulamaDurum: suluMu?yarinKarar:"", sulamaAciklama:(yarinGunKaydi&&yarinGunKaydi.sulamaAciklama)||""});
    }
  });
  (c.odaGorevleri||[]).forEach(function(og){
    if(og.done) return;
    var base=og.tarih; if(!base) return;
    var ert=og.ertele||0;
    var t=addDays(base,ert);
    if(t===tomorrow){
      var dg2=degisik("og_"+og.id);
      list.push({txt:dg2||og.is, orijinal:og.is, degisti:!!dg2, key:"og_"+og.id, onayli:onayliMi("og_"+og.id)});
    }
  });
  return list;
}

function getCriticalAlerts(){
