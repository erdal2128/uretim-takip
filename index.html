function restoreJSON(file){
  var r = new FileReader();
  r.onload = function(){
    try{
      var obj = JSON.parse(r.result);
      if(!obj.cycles) throw new Error("geГ§ersiz");
      memData = {cycles:obj.cycles, settings:obj.settings||{}, gorevler:obj.gorevler||[]};
      /* KRД°TД°K: KullanДұcДұ elle bir dosya seГ§ip "bunu kullan" dedi вҖ” bu, buluttaki
         gГјncel hali bekleme gГјvenlik kilidinden (fbPushSettings iГ§indeki
         _settingsFirstSyncDone) daha yetkilidir. Kilit henГјz aГ§ДұlmamДұЕҹsa (Г¶rn.
         sayfa yeni aГ§ДұldДұysa, bulut ilk senkron gelmeden) saveData() sessizce
         hiГ§bir Еҹey gГ¶ndermez вҖ” veri sadece cihazda kalДұr, buluta hiГ§ gitmez, ve
         baЕҹka bir cihaz aГ§ДұldДұДҹДұnda hГўlГў eski buluttaki veri gГ¶rГјnГјr. Bu yГјzden
         restore'da kilidi aГ§ДұkГ§a geГ§ersiz kДұlДұyoruz: kullanДұcДұnДұn seГ§imi, "henГјz
         bulutu gГ¶rmedik" temkinliliДҹinden Г¶nceliklidir. */
      _settingsFirstSyncDone = true;
      saveData();
      if(obj.photos){ Object.keys(obj.photos).forEach(function(id){ saveImgs(id, obj.photos[id]); }); }
      if(obj.formPhotos){ Object.keys(obj.formPhotos).forEach(function(id){ saveFormImgs(id, obj.formPhotos[id]); }); }
      toast("Geri yГјklendi вҖ” buluta gГ¶nderiliyor..."); go("bugun");
    }catch(e){ toast("Dosya okunamadДұ"); }
  };
  r.readAsText(file);
}

/* Ortak gГјnlГјk kayДұt mantДұДҹДұ: hem GГјnlГјk Tur hem Ana Ekran (panoEdit) bunu kullanДұr вҖ”
   bГ¶ylece hangi ekrandan girilirse girilsin AYNI kurallarla AYNI kayda (tarih+vakit) yazДұlДұr.
   patch: {odaC, kompostC, kompostUst, klimaC, co2alt, co2ust, su, sulama} */
/* OlaДҹandДұЕҹДұ sДұcaklДұk deДҹeri (45В°C kompost, eksi deДҹer gibi) sessizce kabul edilmesin вҖ”
   Г§oДҹunlukla fazladan rakam (450вҶ’45) veya yanlДұЕҹ eksi iЕҹareti hatasДұdДұr. GerГ§ek acil
   durumlar da olabileceДҹi iГ§in (ateЕҹlenme 28-30В°ye Г§Дұkabilir) TAM ENGELLEMД°YORUZ,
   sadece "emin misin?" diye soruyoruz. */
function sicaklikSupheliMi(alanlar){
  var supheliler=alanlar.filter(function(a){ return a.deger!==null && (a.deger<0 || a.deger>45); });
  if(!supheliler.length) return null;
  return supheliler.map(function(a){ return a.ad+": "+a.deger+"В°"; }).join(", ");
}
/* Mobil klavyede "ileri" tuЕҹuna basДұnca aynДұ kart iГ§indeki sДұradaki alana otomatik geГ§er.
   GГјnde onlarca oda Г— birkaГ§ alan = yГјzlerce dokunuЕҹ вҖ” kГјГ§Гјk ama birikimli bir hДұz kazancДұ. */
function odakIlerlet(elm){
  var card = elm.closest('.card'); if(!card) return;
  var focusable = card.querySelectorAll('input:not([type=hidden]):not([type=checkbox]):not([type=range]), select');
  var arr = Array.prototype.slice.call(focusable);
  var idx = arr.indexOf(elm);
  if(idx>=0 && idx<arr.length-1){
    var next=arr[idx+1]; next.focus();
    try{ if(next.select) next.select(); }catch(e){}
  }
}
function gunlukKaydet(c, t, vk, patch, warnLines){
  if(!c) return 0;
  var oda=patch.odaC||"", komp=patch.kompostC||"", kompUst=patch.kompostUst||"",
      klima=patch.klimaC||"", a=patch.co2alt||"", u=patch.co2ust||"",
      sul=patch.sulama||"", suV=patch.su||"",
      amonyak=patch.amonyak||"", nem=patch.nem||"";
  if(!oda && !komp && !kompUst && !klima && !a && !u && !sul && !suV && !amonyak && !nem) return 0;
  var supheMetni=sicaklikSupheliMi([
    {ad:"Oda В°C", deger:numParse(oda)}, {ad:"Komp В°C alt", deger:numParse(komp)},
    {ad:"Komp В°C Гјst", deger:numParse(kompUst)}, {ad:"Klima В°C", deger:numParse(klima)}
  ]);
  if(supheMetni && !confirm("вҡ пёҸ OlaДҹandДұЕҹДұ deДҹer(ler):\n"+supheMetni+"\n\nFazladan rakam ya da yanlДұЕҹ eksi iЕҹareti girmiЕҹ olabilirsin.\n\nYine de kaydedilsin mi?")){
    return 0;
  }
  var problems=gunlukKontrolMesaji(c, t, !!(sul||suV));
  if(problems.some(function(p){return p.tip==="blockAll";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    return 0;
  }
  if(problems.some(function(p){return p.tip==="blockSulama";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    sul=""; suV="";
    if(!oda && !komp && !kompUst && !klima && !a && !u){ return 0; }
  }
  if(!c.gunluk) c.gunluk=[];
  if(sul){ ilacTekrarKontrolMesaji(c,t,sul).forEach(function(m){warnLines.push(m);}); }
  /* KRД°TД°K: ArtДұk Sabah/AkЕҹam ayrДұ kayДұt tutulmuyor вҖ” gГјnde TEK kayДұt var.
     Vakit sadece "en son ne zaman girildi" bilgisi olarak saklanДұr, arama/eЕҹleЕҹtirme
     sadece tarihe gГ¶re yapДұlДұr. BГ¶ylece aynДұ gГјn iГ§in iki ayrДұ (biri boЕҹ, biri dolu)
     satДұr oluЕҹmaz. */
  var ex=c.gunluk.find(function(r){return r.tarih===t;});
  if(ex){
    /* Form her zaman gГ¶rГјnen alanlarДұn TAMAMINI gГ¶nderir вҖ” boЕҹ bДұrakДұlan alan
       "dokunma" deДҹil "temizle" demektir. Aksi halde yanlДұЕҹlДұkla eklenmiЕҹ bir
       not (Г¶rn. otomatik "ertelendi" notu) kullanДұcДұ silip kaydetse bile geri gelirdi. */
    /* Sulama daha Г¶nce "deДҹiЕҹtirildi"/"iptal" olarak iЕҹaretlenmiЕҹse ve mГјhendis
       burada (Tur'dan) gerГ§ek bir sulama/ilaГ§ deДҹeri girmiЕҹse, bu YENД° bir
       normal kayДұttДұr вҖ” eski durum etiketi geГ§ersiz kalДұr, silinir. DeДҹer
       deДҹiЕҹmediyse (Г¶rn. sadece sДұcaklДұk gГјncellendi) etiket korunur.
       KRД°TД°K: su karЕҹДұlaЕҹtДұrmasДұ SAYISAL yapДұlmalДұ вҖ” su (lt) slider'Дұ boЕҹ
       bДұrakДұlan bir alanda bile HER ZAMAN "0" string'i dГ¶ndГјrГјr, ama Д°ptal
       Et sonrasДұ saklanan "temiz" deДҹer boЕҹ string ("") idi. Ham metin
       karЕҹДұlaЕҹtДұrmasДұ ("0" !== "") her rutin Tur kaydДұnda (sДұcaklДұk giriЕҹi
       gibi, sulamaya hiГ§ dokunulmasa bile) bunu "deДҹiЕҹti" sanДұp iptal/
       deДҹiЕҹtir etiketini SESSД°ZCE siliyordu вҖ” gГ¶rev "BugГјnkГј GГ¶revler"de
       yeniden bekliyormuЕҹ gibi gГ¶rГјnГјyor, kullanДұcДұ tekrar tekrar Д°ptal
       Et'e basmak zorunda kalДұyordu (her basДұЕҹta yeni zaman damgalДұ bir
       not birikiyordu). SayДұsal karЕҹДұlaЕҹtДұrma "0" ile ""yi eЕҹit sayar. */
    if(ex.sulamaDurum && (sul!==(ex.sulama||"") || (numParse(suV)||0)!==(numParse(ex.su)||0))){
      ex.sulamaDurum=""; ex.sulamaAciklama=""; ex.sulamaOrijinal="";
    }
    ex.vakit=vk;
    ex.odaC=oda; ex.kompostC=komp; ex.kompostUst=kompUst;
    ex.klimaC=klima; ex.co2alt=a; ex.co2ust=u;
    ex.sulama=sul; ex.su=suV;
    ex.amonyak=amonyak; ex.nem=nem;
  } else {
    c.gunluk.push({tarih:t,vakit:vk,odaC:oda,kompostC:komp,kompostUst:kompUst,klimaC:klima,co2alt:a,co2ust:u,su:suV,sulama:sul,amonyak:amonyak,nem:nem});
  }
  c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);});
  return 1;
}
/* Tek bir oda kartДұndaki verileri kaydeder. DГ¶ndГјrГјr: 1 (kaydedildi) / 0 (boЕҹ, atlandДұ) */
function turKaydetKart(card, t, vk, warnLines){
  var d=loadData();

    co2alt: g('.tur_co2a'), co2ust: g('.tur_co2u'), sulama: g('.tur_sulama'), su: g('.tur_su')

/* KullanДұcДұ raporu: "Г¶nce kompost dereceleri ve klimalarДұ giriyorum, sonra
   sulama ve protokolleri girdiДҹim zaman dereceler gidiyor". KГ¶k neden:
   sДұcaklДұk/COвӮӮ alanlarДұ hiГ§bir onchange/onblur ile kaydedilmiyordu вҖ” sadece
   DOM'da yaЕҹДұyordu, turIlerle/turTarihDegis gibi SAYFA DEДһД°ЕһTД°REN aksiyonlar
   flush ediyordu. Ama sulama Onayla/DeДҹiЕҹtir/Д°ptal, protokol iЕҹaretleme,
   sarДұm kontrolГј, gГ¶zlem notu gibi AYNI SAYFADA KALAN aksiyonlar da
   render()'Дұ tetikliyor вҖ” kart gunKaydiBul(c)'tan (henГјz kaydedilmemiЕҹ,
   dolayДұsДұyla eski/boЕҹ) yeniden Г§iziliyor, yazДұlan dereceler kayboluyor.
   Bu fonksiyon her render() Г¶ncesi (tek oda modundayken) o an ekranda aГ§Дұk
   kartlarДұn dolu alanlarДұnДұ SESSД°ZCE (onay/engelleme sorgusu olmadan вҖ”
   gunlukKaydet'in aksine, amaГ§ nihai kayДұt deДҹil ARA KAYIP Г–NLEME) korur.
   BoЕҹ bДұrakДұlan bir alana DOKUNULMAZ (henГјz bitmemiЕҹ form olabilir). */
function turAcikKartlariKoru(){
  var kartlar=document.querySelectorAll('[data-cid]');
  if(!kartlar.length) return;
  var t=_turTarihVal||todayISO();
  var degisti=false;
  kartlar.forEach(function(card){
    try{
      var cid=card.getAttribute('data-cid');
      var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
      function g(sel){ var e=card.querySelector(sel); return e?e.value.trim():null; }
      var oda=g('.tur_oda'), komp=g('.tur_komp'), kompUst=g('.tur_kompust'), klima=g('.tur_klima'), a=g('.tur_co2a'), u=g('.tur_co2u');
      if(!oda && !komp && !kompUst && !klima && !a && !u) return; /* hiГ§bir alan dolu deДҹil, korunacak bir Еҹey yok */
      if(!c.gunluk) c.gunluk=[];
      var ex=c.gunluk.find(function(r){return r.tarih===t;});
      if(!ex){ ex={tarih:t,vakit:"",su:"",sulama:""}; c.gunluk.push(ex); c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);}); }
      if(oda && ex.odaC!==oda){ ex.odaC=oda; degisti=true; }
      if(komp && ex.kompostC!==komp){ ex.kompostC=komp; degisti=true; }
      if(kompUst && ex.kompostUst!==kompUst){ ex.kompostUst=kompUst; degisti=true; }
      if(klima && ex.klimaC!==klima){ ex.klimaC=klima; degisti=true; }
      if(a && ex.co2alt!==a){ ex.co2alt=a; degisti=true; }
      if(u && ex.co2ust!==u){ ex.co2ust=u; degisti=true; }
    }catch(e){ console.error("Tur alanДұ korunamadДұ:", e); }
  });
  if(degisti) saveData();
}

  var card=document.querySelector('[data-cid]');
  /* GГңVENLД°K AДһI: burada (sicaklikSupheliMi, gunlukKontrolMesaji vb. iГ§inde)
     beklenmedik bir hata / bir confirm() penceresinin bazДұ cihazlarda dГјzgГјn
     dГ¶nmemesi gibi bir durum olursa, kaydetme adДұmДұ BГңTГңN "Sonraki oda"

/* ---------- Bulut yedek (Firebase) вҖ” cihaz kДұrДұlsa/kaybolsa bile veri gГјvende ----------
   Yerel yedek (yukarДұdaki autoSnapshot) sadece BU cihazda kalДұr. Bu fonksiyon aynДұ
   anlДұk gГ¶rГјntГјyГј Firestore'a da yazar: farms/{FARM_CODE}/yedekler/{docId}.
   Zamanlama: uygulama aГ§Дұkken her CLOUD_BACKUP_DAKIKA dakikada bir dener (kesin saat
   garantisi deДҹil вҖ” sunucusuz bir PWA'da bu ancak Cloud Functions gibi ayrДұ bir
   arka uГ§ ile mГјmkГјn olur; ama sahada uygulama gГјn boyu defalarca aГ§ДұldДұДҹДұ iГ§in
   pratikte Г§ok yakДұn sonuГ§ verir).
   Rotasyon: her yedekleme ANINA (aktif_<ms>, arsiv_<ms>) Г¶zel bir dokГјman вҖ”
   Г¶nceki yedeДҹi EZMEZ, gerГ§ek geГ§miЕҹ listesi oluЕҹur. SДұnДұrsДұz bГјyГјmesin diye
   gГјnde bir kez otomatik temizlik yapДұlДұr (bkz. cloudYedekEskiSil): hem
   CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayДұsДұnДұ aЕҹan kayДұtlar silinir (hangisi daha kДұsДұtlayДұcДұysa). */
var CLOUD_BACKUP_DAKIKA = 5; /* eskiden 4 saatti вҖ” kullanДұcДұ iste diДҹiyle 5 dakikaya dГјЕҹГјrГјldГј */
var CLOUD_BACKUP_RETENTION_GUN = 7; /* bu kadar gГјnden eski bulut yedekleri otomatik silinir */
var CLOUD_BACKUP_MAX_KAYIT = 30; /* en fazla bu kadar yedek noktasДұ tutulur (7 gГјn iГ§inde bile olsa) */
var CLOUD_YEDEK_LIMIT = 700000; /* gГјvenli karakter sДұnДұrДұ вҖ” Firestore'un 1MB dokГјman limitine karЕҹДұ tampon */
function getLastCloudBackup(){ try{ return localStorage.getItem("utp_cloudbak_last")||null; }catch(e){ return null; } }
function setLastCloudBackup(){ try{ localStorage.setItem("utp_cloudbak_last", ""+Date.now()); }catch(e){ console.warn("bulut yedek zamanДұ kaydedilemedi", e); } updateCloudBakBadge(); }
/* Header'daki kГјГ§Гјk "вҳҒпёҸ X Г¶nce" rozeti вҖ” gГ¶reli zaman, dakikada bir tazelenir (bkz. setInterval) */
function zamanOnce(ms){
  if(!ms) return "";
  var fark=Date.now()-ms;
  if(fark<60000) return "az Г¶nce";
  var dk=Math.floor(fark/60000);
  if(dk<60) return dk+" dk Г¶nce";
  var sa=Math.floor(dk/60);
  if(sa<24) return sa+" saat Г¶nce";
  var gun=Math.floor(sa/24);
  return gun+" gГјn Г¶nce";
}
function updateCloudBakBadge(){
  var e=document.getElementById("cloudBakBadge"); if(!e) return;
  var lb=getLastCloudBackup();
  e.textContent = lb ? ("вҳҒпёҸ "+zamanOnce(+lb)) : "вҳҒпёҸ henГјz yedek yok";
}
function cloudYedekGerekliMi(){
  var lb=getLastCloudBackup();
  if(!lb) return true;
  return (Date.now()-(+lb)) > CLOUD_BACKUP_DAKIKA*60*1000;
}
function cloudYedekYaz(docId, payload){
  if(!FB.ready || !FB.db) return Promise.reject(new Error("bulut hazДұr deДҹil"));
  var json;
  try{ json=JSON.stringify(payload); }catch(e){ console.warn("bulut yedek: JSON hatasДұ ("+docId+")", e); return Promise.reject(e); }
  if(json.length > CLOUD_YEDEK_LIMIT){
    console.warn("bulut yedek: '"+docId+"' Г§ok bГјyГјk ("+json.length+" karakter) вҖ” atlandДұ, cihaz yedeДҹi hГўlГў Г§alДұЕҹДұyor.");
    return Promise.reject(new Error("veri Г§ok bГјyГјk"));
  }
  return FB.db.collection("farms").doc(FARM_CODE).collection("yedekler").doc(docId)
    .set({ts:new Date().toISOString(), gun:todayISO(), veri:payload})
    .catch(function(e){ console.warn("bulut yedek yazДұlamadДұ ("+docId+")", e); throw e; });
}
/* Hem CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayДұsДұnДұ aЕҹan aktif_/arsiv_ dokГјmanlarДұnДұ siler (hangisi Г¶nce tetiklenirse).
   DokГјman sayДұsДұ zaten bu politikayla sДұnДұrlДұ tutulduДҹu iГ§in tГјm koleksiyonu
   Г§ekip JS tarafДұnda sДұralamak (ekstra Firestore index'i gerektirmeden) yeterli.
   GГјnde bir kez denenir (gereksiz okuma/silme trafiДҹini Г¶nlemek iГ§in). */
var TEMIZLIK_GUN_KEY = "utp_cloudbak_temizlikGun";
function cloudYedekEskiSil(){
  if(!FB.ready || !FB.db) return;
  var bugun=todayISO();
  try{ if(localStorage.getItem(TEMIZLIK_GUN_KEY)===bugun) return; }catch(e){}
  var cutoff=addDays(bugun, -CLOUD_BACKUP_RETENTION_GUN);
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  ["aktif_","arsiv_"].forEach(function(prefix){
    refBase.where(firebase.firestore.FieldPath.documentId(), ">=", prefix)
      .where(firebase.firestore.FieldPath.documentId(), "<", prefix+"~")
      .get().then(function(snap){
        var docs=[]; snap.forEach(function(d){ docs.push(d); });
        docs.sort(function(a,b){ return (b.data().ts||"").localeCompare(a.data().ts||""); }); /* en yeni Г¶nce */
        docs.forEach(function(d, idx){
          var tooOld = (d.data().gun||"") < cutoff;
          var tooMany = idx >= CLOUD_BACKUP_MAX_KAYIT;
          if(tooOld || tooMany) d.ref.delete().catch(function(e){ console.warn("eski bulut yedeДҹi silinemedi", d.id, e); });
        });
      }).catch(function(e){ console.warn("eski bulut yedekleri sorgulanamadДұ", e); });
  });
  try{ localStorage.setItem(TEMIZLIK_GUN_KEY, bugun); }catch(e){ console.warn("temizlik gГјnГј kaydedilemedi", e); }
}
function cloudYedekTetikle(){
  if(!cloudYedekGerekliMi()) return;
  if(!FB.ready) return; /* internet yoksa sessizce atla, bir sonraki fДұrsatta dener */
  var d=loadData();
  var olayId=""+Date.now(); /* her yedekleme anДұ ayrДұ dokГјman вҖ” Г¶nceki yedeДҹi ezmez */
  var aktifP=cloudYedekYaz("aktif_"+olayId, {cycles:d.cycles||[], gorevler:d.gorevler||[], settings:d.settings||{}});
  cloudYedekYaz("arsiv_"+olayId, {arsiv:d.arsiv||[]}).catch(function(){}); /* arЕҹiv ayrДұ, best-effort вҖ” bГјyГјkse atlanДұr, ana yedeДҹi engellemez */
  cloudYedekEskiSil();
  aktifP.then(function(){
    /* KRД°TД°K: zaman damgasДұnДұ ancak yazma GERГҮEKTEN baЕҹarДұlДұ olduktan sonra kaydet.
       Eskiden yazma denemesi baЕҹlar baЕҹlamaz (sonucu beklemeden) kaydediliyordu вҖ”
       yazma sessizce baЕҹarДұsДұz olsa bile "az Г¶nce yedeklendi" gГ¶rГјnГјyordu. */
    setLastCloudBackup();
    /* Yedekleme ekranДұ o an aГ§Дұksa, orada da anДұnda gГ¶rГјnsГјn вҖ” arka planda otomatik
       tetiklenince ekran kendini yenilemiyordu, Гјstteki rozetle "farklДұ saat" gГ¶steriyordu. */
    if(typeof view!=="undefined" && view && view.name==="yedekleme") render();
  }).catch(function(){ /* ana yedek de baЕҹarДұsДұz oldu вҖ” zaman kaydedilmedi, bir sonraki dГ¶ngГјde tekrar dener */ });
}
/* ---------- Otomatik yedek (cihaz iГ§i) + hatДұrlatma ---------- */
function setLastBackup(){ try{ localStorage.setItem("utp_meta", JSON.stringify({lastFileBackup:new Date().toISOString()})); }catch(e){ console.warn("yedek zamanДұ kaydedilemedi", e); } }

function autoSnapshot(){
  try{
    var snap={ts:new Date().toISOString(), data:loadData()};
    localStorage.setItem("utp_autobak", JSON.stringify(snap));
    _autoBk=snap;
    var log=loadAutoBackupLog();
    var day=todayISO();
    var idx=-1; for(var i=0;i<log.length;i++){ if(log[i].day===day){ idx=i; break; } }
    var entry={day:day, ts:snap.ts, data:snap.data};
    if(idx>=0) log[idx]=entry; else log.push(entry);
    log.sort(function(a,b){ return a.day<b.day?-1:(a.day>b.day?1:0); });
    if(log.length>14) log=log.slice(log.length-14);
    try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }
    catch(e2){
      log=log.slice(Math.ceil(log.length/2));
      try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }catch(e3){ console.warn("otomatik yedek kГјГ§ГјltГјlerek de yazДұlamadДұ", e3); }
    }
  }catch(e){ console.warn("otomatik yedek alДұnamadДұ", e); }
}

var HASTALIK_KB = [
  {kw:["yeЕҹil kГјf","yesil kuf","trichoderma"], ad:"Trichoderma (yeЕҹil kГјf)", oneri:"BulaЕҹДұk bГ¶lgeyi izole et; o bГ¶lgeye dokunan alet/elleri dezenfekte et; nem ve havalandДұrmayДұ gГ¶zden geГ§ir (genelde nem/hijyen kaynaklДұ yayДұlДұr). Etkilenen alanДұ kurutmadan/daДҹДұtmadan nazikГ§e kapat ve uzaklaЕҹtДұr."},
  {kw:["kuru Г§ГјrГјk","kuru curuk","mycogone"], ad:"Mycogone (kuru Г§ГјrГјklГјk)", oneri:"Еһekilsiz/kabarДұk dokulu mantarlarДұ hemen uzaklaЕҹtДұr; o bГ¶lgeye tuz ya da uygun dezenfektan uygulamayДұ deДҹerlendir; izolasyon ve el/alet hijyeni kritik, sulama suyuyla sДұГ§ratmamaya dikkat et."},
  {kw:["Дұslak Г§ГјrГјk","islak curuk","verticillium"], ad:"Verticillium (Дұslak Г§ГјrГјklГјk)", oneri:"Etkilenen mantarlarДұ dokunmadan uzaklaЕҹtДұr; elleri ve aletleri dezenfekte et; yГјzey nemini/yoДҹuЕҹmayДұ azalt, hava akДұЕҹДұnДұ artДұr."},
  {kw:["Г¶rГјmcek aДҹДұ","orumcek agi","cobweb"], ad:"Cobweb (Г¶rГјmcek aДҹДұ kГјfГј)", oneri:"Etkilenen alanДұ tuz ya da uygun dezenfektanla kapat; nemi dГјЕҹГјr, hava sirkГјlasyonunu artДұr; hДұzlДұ yayДұlДұr, erken mГјdahale Г¶nemli."},
  {kw:["bakteriyel leke","kahverengi leke","bacterial blotch","pseudomonas"], ad:"Bakteriyel leke (kahverengi leke)", oneri:"YГјzey nemini azalt, havalandДұrmayДұ artДұr, sulama sonrasДұ kuruma sГјresini uzat; su damlacДұklarДұnДұn Еҹapkada uzun sГјre kalmamasДұ Г¶nemli."}

function hastalikTaraKB(txt){

function uretimIslemSatirlari(c){
  var rows=[];
  if(c.gelisTarihi) rows.push({g:gunNo(c,c.gelisTarihi), tarih:c.gelisTarihi, t:"Kompost geldi"+(c.kompostFirma?(" ("+c.kompostFirma+")"):"")});
  if(c.kompostIndirme && c.kompostIndirme.tarih){
    var ki=c.kompostIndirme; var kiParts=[];
    if(ki.makine) kiParts.push("Makine: "+ki.makine);
    if(ki.halat) kiParts.push("Halat: "+ki.halat);
    if(ki.ekip1) kiParts.push("1.Ekip: "+ki.ekip1);
    if(ki.ekip2) kiParts.push("2.Ekip: "+ki.ekip2);
    rows.push({g:gunNo(c,ki.tarih), tarih:ki.tarih, t:"Kompost indirildi"+(kiParts.length?(" вҖ” "+kiParts.join(", ")):"")});
  }
  if(c.tiftikTarihi) rows.push({g:gunNo(c,c.tiftikTarihi), tarih:c.tiftikTarihi, t:"Tiftik"});
  if(c.toprakTarihi) rows.push({g:gunNo(c,c.toprakTarihi), tarih:c.toprakTarihi, t:"Toprak serimi"});
  if(c.tirmikTarihi) rows.push({g:gunNo(c,c.tirmikTarihi), tarih:c.tirmikTarihi, t:"TДұrmДұk"});
  if(c.havaBaslangic){
    var _hi=protokolRolIdx("hava");
    var _hDetay=_hi>=0 && c.adimDetay && c.adimDetay["p"+_hi];
    rows.push({g:gunNo(c,c.havaBaslangic), tarih:c.havaBaslangic, t:"Havaya baЕҹlandДұ"+(_hDetay&&_hDetay.not?(" вҖ” "+_hDetay.not):"")});
  }
  var dedIdx=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdx[idx]) return;
    if(!(c.done && c.done["p"+idx])) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];

    if(!tarih) return;
    rows.push({g:gunNo(c,tarih), tarih:tarih, t:s.txt+(detay.not?(" вҖ” "+detay.not):"")});
  });
  return rows.filter(function(x){ return x.g!=="" && x.g!==null && x.g!==undefined; });
}

function kompostChartSVG(c){
  var T=[], CO=[], S=[];
  /* Sulama/ilaГ§lama Г§ubuklarДұ artДұk maddeye gГ¶re renklendiriliyor (kullanДұcДұ
     isteДҹi: "ilaГ§larДұ farklДұ, suyu farklДұ, hepsini farklДұ renklerde yap") вҖ”
     su hep sabit mavi, her farklДұ ilaГ§/madde adДұ kendi rengini alДұr (ilk
     gГ¶rГјldГјДҹГј sДұrayla paletten atanДұr, aynДұ madde her zaman aynДұ renk). */
  var SU_RENK="#3b82c4";
  var RENK_PALETI=["#8b5cf6","#e0559b","#b5651d","#0e7490","#ca8a04","#64748b","#c026d3","#15803d","#be123c","#4338ca"];

      var renkS = renkAta(anaIsim);

  });
  if(!T.length && !CO.length) return '<div style="color:#777;font-size:11px;">Grafik i\u00e7in \u00f6l\u00e7\u00fcm yok.</div>';
  var W=760,H=320,padL=44,padR=54,padT=16,padB=64;
  var odaPts=T.filter(function(p){return p.oda!==null;}).map(function(p){return{g:p.g,v:p.oda};}).sort(function(a,b){return a.g-b.g;});
  var kompPts=T.filter(function(p){return p.komp!==null;}).map(function(p){return{g:p.g,v:p.komp};}).sort(function(a,b){return a.g-b.g;});
  CO.sort(function(a,b){return a.g-b.g;});
  var gall=[]; T.forEach(function(p){gall.push(p.g);}); CO.forEach(function(p){gall.push(p.g);}); S.forEach(function(s){gall.push(s.g);});
  var gmin=Math.min.apply(null,gall), gmax=Math.max.apply(null,gall); if(gmax===gmin) gmax=gmin+1;
  var tv=[]; odaPts.concat(kompPts).forEach(function(p){tv.push(p.v);});
  var tmin,tmax; if(tv.length){tmin=Math.floor(Math.min.apply(null,tv)-1);tmax=Math.ceil(Math.max.apply(null,tv)+1);}else{tmin=18;tmax=28;} if(tmax===tmin)tmax=tmin+1;
  var cvals=[]; CO.forEach(function(p){cvals.push(p.alt);cvals.push(p.ust);});
  var hasCo=cvals.length>0, cmin=0,cmax=1;
  if(hasCo){cmin=Math.floor(Math.min.apply(null,cvals));cmax=Math.ceil(Math.max.apply(null,cvals));if(cmax===cmin)cmax=cmin+100;}
  function X(g){return padL+(g-gmin)/(gmax-gmin)*(W-padL-padR);}

  var svg='';

  [21,28,30].forEach(function(lim){ if(lim>=tmin&&lim<=tmax){ var col=lim>=30?"#c0291f":"#d98a1f"; svg+='<line x1="'+padL+'" y1="'+YT(lim)+'" x2="'+(W-padR)+'" y2="'+YT(lim)+'" stroke="'+col+'" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>'; } });
  var tstep=Math.max(1,Math.round((tmax-tmin)/5));
  for(var t=tmin;t<=tmax;t+=tstep){var y=YT(t);svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#ececec"/><text x="'+(padL-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#2f6b4f">'+t+'\u00b0</text>';}
  if(hasCo){var cstep=Math.max(1,Math.round((cmax-cmin)/5));for(var cc=cmin;cc<=cmax;cc+=cstep){var yc=YC(cc);svg+='<text x="'+(W-padR+5)+'" y="'+(yc+3)+'" font-size="9" text-anchor="start" fill="#c47a1a">'+cc+'</text>';}}
  /* Sulama/ilaГ§lama: gГјn ekseninde kГјГ§Гјk Г§ubuklar (yГјkseklik = verilen su
     miktarДұ, 0 lt ise minimum gГ¶rГјnГјr yГјkseklik) вҖ” ГјstГјnde o gГјn ne verildiДҹi
     yazar (ilaГ§lama varsa ilaГ§ adlarДұ, yoksa "su"). */
  if(S.length){
    var barBase=H-padB, barMaxH=54, barW=6;
    var suMax=Math.max.apply(null, S.map(function(s){return s.su;}).concat([1]));
    S.forEach(function(s){

  var everyX=Math.ceil(allg.length/14)||1;
  allg.forEach(function(g,i){if(i%everyX===0)svg+='<text x="'+X(g)+'" y="'+(H-padB+29)+'" font-size="9" text-anchor="middle" fill="#555">'+g+'</text>';});
  /* DГ¶nem Еҹeritleri: gГјn ekseninin hemen altДұnda hangi gГјnlerin hangi Гјretim
     dГ¶neminde (KuluГ§ka, Toprak dГ¶nemi, 1./2. Misel, Hava dГ¶nemi vb.) olduДҹunu
     gГ¶steren renkli bant + etiket вҖ” kullanДұcДұ isteДҹi: "gГјnlerin altДұna
     dГ¶nemleri ayДұrmak gerekir, kuluГ§ka dГ¶nemi toprak dГ¶nemi gibi". */
  var faz=phaseList(c).map(function(f){
    if(!f.tarih) return null;
    var fg=gunNo(c,f.tarih); if(fg==="") return null;
    return {ad:f.ad, g:fg};
  }).filter(Boolean).sort(function(a,b){return a.g-b.g;});
  var fazTemiz=[]; faz.forEach(function(f){ if(!fazTemiz.length || fazTemiz[fazTemiz.length-1].g!==f.g) fazTemiz.push(f); });
  /* Her dГ¶nem KENDД° rengini alДұr (eskiden sadece 3 grup rengi vardДұ вҖ” KuluГ§ka
     ve Toprak aynДұ sarДұ, 1./2. Misel ve Pimleme aynДұ yeЕҹil gibi gГ¶rГјnГјyordu вҖ”
     kullanДұcДұ isteДҹi: "dГ¶nemlerin rengini de deДҹiЕҹtirsen daha gГјzel olmaz mДұ"). */
  var FAZ_RENK_AD={
    "KuluГ§ka dГ¶nemi":"#f5e2b8", "Toprak dГ¶nemi":"#f0c090",
    "1. Misel geliЕҹim":"#bfe3d6", "2. Misel geliЕҹim":"#9ed4e8",

  if(fazTemiz.length){

  }

  if(hasCo && CO.length>=1){
    var top=CO.map(function(p){return X(p.g)+","+YC(p.ust);});

    svg+='<polyline points="'+CO.map(function(p){return X(p.g)+","+YC(p.ust);}).join(" ")+'" fill="none" stroke="#d98a1f" stroke-width="1.2"/>';

  if(hasCo) svg+='<line x1="'+(W-padR)+'" y1="'+padT+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#d98a1f"/>';
  svg+='<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">G\u00fcn (geli\u015ften)</text>';
  var lg='<div style="font-size:10px;margin-top:4px;">'

/* PDF/rapor iГ§in: "Sulama/Д°laГ§lama" alanДұ aslДұnda 3 farklДұ Еҹeyin karДұЕҹДұmДұ вҖ”
   Гјretim iЕҹlemi tamamlama notlarДұ (gunlukGorevNotEkle ile eklenen "Tiftik yapДұldДұ" gibi),
   gerГ§ek ilaГ§lama (bilinen ilaГ§ adДұ geГ§en kДұsДұmlar) ve dГјz sulama notu. " В· " ile ayrДұlmДұЕҹ
   parГ§alara bakДұp ГјГ§e ayДұrДұyoruz вҖ” bГ¶ylece PDF'te Гјretim iЕҹlemleri hem Гјstteki Г¶zet hem de
   gГјnlГјk tabloda kendi sГјtununda, ilaГ§lama SADECE kendi sГјtununda gГ¶rГјnГјr. */
/* Su alanДұ normalde sadece sayДұ olmalДұ (slider'dan gelir) ama eski/legacy kayДұtlarda
   serbest metin de olabilir ("250 ml serenade" gibi) вҖ” bГ¶yle durumda "lt su" ekleyip
   anlamsДұz bir birleЕҹim oluЕҹturmak yerine, metni olduДҹu gibi (etiketsiz) gГ¶steriyoruz. */
function suDegeriGoster(su){
  if(numParse(su)<=0) return "";
  var temizMi=/^\d+([.,]\d+)?$/.test((""+su).trim());
  return temizMi ? ('<b>'+esc(su)+' lt su</b>') : esc(su);
}
/* PDF/rapor'daki Sulama sГјtunu iГ§in вҖ” suDegeriGoster'Дұn aksine, sayДұsal
   OLMAYAN (eski/legacy, yanlДұЕҹlДұkla ilaГ§ metni girilmiЕҹ) Su deДҹerini burada
   AYRICA gГ¶stermez: o metin artДұk gunlukSatirAyristir tarafДұndan Sulama/Д°laГ§
   metniyle birlikte sДұnДұflandДұrДұlДұp doДҹru sГјtuna (ayr.sulama/ayr.ilac)
   ekleniyor вҖ” burada tekrar gГ¶sterilirse hem yanlДұЕҹ sГјtunda hem de iki kez
   gГ¶rГјnГјrdГј. suDegeriGoster'Дұn kendisi diДҹer (GГјnlГјk listesi) ekranda ham
   alanДұ olduДҹu gibi gГ¶stermeye devam ettiДҹi iГ§in deДҹiЕҹtirilmedi. */
function suDegeriTemiz(su){
  var temizMi=/^\d+([.,]\d+)?$/.test((""+(su||"")).trim());
  if(!temizMi) return "";
  var n=numParse(su);
  return (n>0) ? ('<b>'+esc(su)+' lt su</b>') : "";
}
/* Sulama deДҹiЕҹtirildi/iptal edildiДҹinde raporlarda (GГјnlГјk kayДұt tablosu, CSV,
   PDF) "yapДұlmadДұ" gibi boЕҹ gГ¶rГјnmesin вҖ” ГјГ§ durum (YapДұldДұ/DeДҹiЕҹtirildi/Д°ptal
   Edildi) her yerde ayrДұ okunabilsin diye tek yerden metin/rozet Гјretilir. */

function gunlukSatirAyristir(r){
  /* Su alanДұ normalde sadece sayДұ olmalДұ (slider'dan gelir) ama eski/legacy
     kayДұtlarda serbest metin de olabilir ("250 ml serenade" gibi, yanlДұЕҹlДұkla
     Su kutusuna yazДұlmДұЕҹ) вҖ” bГ¶yle bir metin varsa Sulama/Д°laГ§lama metniyle
     BД°RLД°KTE aynДұ sДұnДұflandДұrmadan geГ§irilir. Eskiden bu metin suDegeriGoster
     ile olduДҹu gibi (etiketsiz) Sulama sГјtununda gГ¶steriliyordu вҖ” bu yГјzden
     "Su" kutusuna yanlДұЕҹlДұkla girilmiЕҹ bir ilaГ§ adДұ hep Sulama'da, buna
     karЕҹДұlДұk asДұl sulama miktarДұ (Sulama/Д°laГ§ kutusuna "500 lt" diye
     girilmiЕҹ) yanlДұЕҹlДұkla Д°laГ§lama'da gГ¶rГјnГјyordu. */
  var suRaw=(r&&r.su)||"";
  var suSayisalMi=/^\d+([.,]\d+)?$/.test((""+suRaw).trim());
  var metin=(r&&r.sulama)||"";
  if(!suSayisalMi && suRaw) metin = metin ? (metin+" В· "+suRaw) : (""+suRaw);
  /* "+" sadece boЕҹluklu kullanДұldДұДҹДұnda ayraГ§ sayДұlДұr вҖ” "Hava+1:" gibi
     protokol referans etiketlerinin ortasДұndaki bitiЕҹik "+" bГ¶lГјnmesin. */
  var segments=metin.split(/\s*В·\s*|\s+\+\s+/).map(function(s){return s.trim();}).filter(Boolean);
  var uretim=[], ilac=[], sulama=[];
  var ilacAdlari=getIlacList().map(function(x){return (x.ad||"").toLocaleLowerCase("tr");}).filter(Boolean);
  segments.forEach(function(seg){
    var segL=seg.toLocaleLowerCase("tr");
    var uretimMi = /yap[Дұi]ld[Дұi]\s*$|ertelendi|erken Г§ekildi|kontrol sonucu/i.test(seg);
    if(uretimMi){ uretim.push(seg); return; }
    if(ilacAdlari.some(function(ad){ return segL.indexOf(ad)>=0; })){ ilac.push(seg); return; }
    /* Miktar + (varsa) birim + (varsa) madde adДұ ayrДұЕҹtДұrДұlДұr: "500 lt" gibi
       SADECE miktar+birim (arkasДұnda madde adДұ YOK) dГјz sulama okumasДұdДұr;
       "250 ml serenade" veya "2 lt formaldehit" gibi miktardan SONRA bir
       madde adДұ geГ§iyorsa ilaГ§lamadДұr вҖ” birim ml/gr/kg/lt fark etmez
       (formaldehit gibi litreyle dozlanan kimyasallar da dahil). */
    var m=/^(\d+(?:[.,]\d+)?)\s*(ml|gr|kg|lt|litre)?\s*(.*)$/i.exec(seg);
    if(m){
      var isim=(m[3]||"").trim().toLocaleLowerCase("tr");
      if(!isim || isim==="su" || /^su\b/.test(isim)){ sulama.push(seg); }
      else { ilac.push(seg); }
      return;
    }
    if(/\bml\b|\bgr\b|\bkg\b/i.test(seg)){ ilac.push(seg); return; }
    sulama.push(seg);
  });
  return {uretim:uretim, ilac:ilac, sulama:sulama};
}
/* Grafikteki sulama Г§ubuДҹunun yГјksekliДҹi iГ§in "gerГ§ek" litre miktarДұ вҖ” Su
   alanДұ temiz sayДұysa doДҹrudan o, deДҹilse (eski/legacy kayДұt, Su kutusuna
   yanlДұЕҹlДұkla ilaГ§ metni girilmiЕҹ) Sulama/Д°laГ§ metnindeki dГјz sulama
   parГ§alarДұndan (yukarДұdaki ayrДұЕҹtДұrmanДұn "sulama" kovasДұ) miktar okunur вҖ”
   aksi halde aynДұ "500 lt" etiketli gГјnler farklДұ (ve YANLIЕһ) yГјksekliklerde
   Г§ubuk Г§iziyordu, Г§ГјnkГј yГјkseklik hep ham r.su'dan geliyordu. */
function gunlukSuMiktari(r){
  var suRaw=(r&&r.su)||"";
  var temizMi=/^\d+([.,]\d+)?$/.test((""+suRaw).trim());
  if(temizMi){ var n=numParse(suRaw); return n>0?n:0; }
  var ayr=gunlukSatirAyristir(r);
  var best=0;
  ayr.sulama.forEach(function(seg){
    var m=/^(\d+(?:[.,]\d+)?)/.exec(seg.trim());
    if(m){ var v=parseFloat(m[1].replace(",",".")); if(v>best) best=v; }
  });
  return best;
}
/* Bir ilaГ§lama parГ§asДұndan ("250 ml serenade", "2 lt formaldehit (KRД°TД°K: ...)")
   sadece madde ADINI Г§ДұkarДұr вҖ” grafikte her maddeyi kendi rengiyle
   gГ¶sterebilmek iГ§in (miktar/doz farklДұ olsa da aynДұ madde aynДұ renk olsun). */
function ilacIsmiCikar(seg){
  var m=/^(\d+(?:[.,]\d+)?)\s*(ml|gr|kg|lt|litre)?\s*(.*)$/i.exec((seg||"").trim());
  var isim = m ? (m[3]||"").trim() : (seg||"").trim();
  isim = isim.replace(/\(.*/,"").trim();
  return isim || (seg||"").trim();
}

/* ============ PLANLAMA вҖ” ГңRETД°M TAKVД°MД° / YAKLAЕһAN Д°ЕһLER / ODA TAKVД°MД° ============
   HiГ§bir yeni veri modeli gerektirmez: beklenenTakvim(c) protokol offsetlerinden
   zaten hesaplДұyordu, Г¶nceden sadece tek oda detayДұnda gГ¶mГјlГјydГј. Burada tГјm
   aktif odalara geniЕҹletilip Planlama ekranДұnda gГ¶steriliyor (SSOT). */

/* Bir adДұmДұn durumu: gerГ§ekleЕҹti mi, gecikti mi, ne zaman bekleniyor */
function takvimAdimDurum(adim, bugun){
  if(adim.ger) return "yapildi";
  if(!adim.beklenen) return "bilinmiyor";
  if(adim.beklenen < bugun) return "gecikti";
  return "bekleniyor";
}

/* 1. ГңRETД°M TAKVД°MД° вҖ” tГјm odalar, kompakt yatay zaman Г§izgisi (Kompost dahil).
   BoЕҹaltma artДұk protokoldeki flaЕҹ zincirinden (Hava+11 вҶ’ 1.FlaЕҹ вҶ’ 1.FlaЕҹ
   BitiЕҹi+5 вҶ’ FlaЕҹ ArasДұ (5g hazДұrlДұk) вҶ’ 2.FlaЕҹ вҶ’ 2.FlaЕҹ BitiЕҹi+5 вҶ’ BoЕҹaltma+1)
   tahmin edilip diДҹer sГјtunlarla aynДұ Еҹekilde (gerГ§ekleЕҹene kadar tahmini,
   sonra вң“ ile) gГ¶sterilir. */
function uretimTakvimiHTML(active){
  if(!active.length) return '<div class="muted" style="padding:8px 0;">Aktif oda yok.</div>';
  var bugun=todayISO();
  var arr=active.slice().sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var h='<div style="overflow-x:auto;"><table style="font-size:12.5px;"><thead><tr>'
    +'<th>Oda</th><th>Kompost</th><th>Tiftik</th><th>Toprak</th><th>TДұrmДұk</th><th>Hava</th><th>1. FlaЕҹ</th><th>2. FlaЕҹ</th><th>BoЕҹaltma</th>'
    +'</tr></thead><tbody>';
  arr.forEach(function(c){
    var tk=beklenenTakvim(c);
    var byAd={}; tk.forEach(function(a){ byAd[a.ad]=a; });
    function hucre(adim){
      if(!adim) return '<td class="note">вҖ”</td>';
      var durum=takvimAdimDurum(adim,bugun);
      var tarih=adim.ger||adim.beklenen;
      if(!tarih) return '<td class="note">вҖ”</td>';
      var renk = durum==="yapildi"?"var(--green)":(durum==="gecikti"?"var(--red)":"var(--muted)");
      var isim = durum==="yapildi"?"вң“ ":(durum==="gecikti"?"вҡ пёҸ ":"");
      var pazarMi=(gunKisa(tarih)==="Paz");
      return '<td style="color:'+renk+';white-space:nowrap;">'+isim+fmtDate(tarih).substring(0,5)+(pazarMi?' <span style="color:var(--red);font-weight:700;font-size:10px;" title="Pazar">P</span>':'')+'</td>';
    }
    h+='<tr onclick="odaTakvimAcKapa(\''+c.id+'\')" style="cursor:pointer;">'
      +'<td><b>'+esc(c.oda)+'</b></td>'
      +'<td style="white-space:nowrap;">'+(c.gelisTarihi?fmtDate(c.gelisTarihi).substring(0,5):'вҖ”')+'</td>'
      +hucre(byAd["Tiftik"])+hucre(byAd["Toprak"])+hucre(byAd["TДұrmДұk"])+hucre(byAd["Hava"])+hucre(byAd["1. FlaЕҹ"])+hucre(byAd["2. FlaЕҹ"])
      +hucre(byAd["BoЕҹaltma"])
      +'</tr>';
    /* GeniЕҹleyen oda takvimi satДұrДұ вҖ” aГ§Дұk/kapalДұ durumu _planTakvimAcik'te
       kalДұcДұ tutulur (sadece DOM'da tutulsaydДұ, checkbox iЕҹaretlenince
       render() tГјm ekranДұ yenileyip satДұrДұ sessizce kapatДұrdДұ). */
    var acikMi = !!(_planTakvimAcik && _planTakvimAcik[c.id]);
    h+='<tr id="odatakvim_'+c.id+'" style="'+(acikMi?'':'display:none;')+'"><td colspan="9" style="padding:0;">'+odaTakvimiHTML(c)+'</td></tr>';
  });
  h+='</tbody></table></div>'
    +'<div class="muted" style="margin-top:6px;font-size:12px;">SatДұra dokun: odanДұn detaylДұ takvimini aГ§/kapat. вҡ пёҸ = beklenen tarih geГ§ti, henГјz yapДұlmadДұ.</div>';
  return h;
}

/* 5. ODA DOLULUK PLANI вҖ” gerГ§ek veriden 3 durum (Гңretimde/Beklemede/BoЕҹ).
   NOT: "HazДұrlДұkta" ve "Temizlikte" dokГјman istese de sistemde hiГ§ izlenmiyor
   (PHASES listesinde yok, ayrДұ bir alan da yok) вҖ” burada UYDURULMAZ. BoЕҹ

/* Kompakt tek satДұr: bu odada son yapДұlan olay + sДұradaki olay + aksiyon
   butonlarДұ. Sulama/ilaГ§lama HARД°ГҮ вҖ” sadece protokol kilometre taЕҹlarДұ
   (tiftik/toprak/tДұrmДұk/hava/hasat/poЕҹet/kompost indirme). Erteleme/planlama

/* Sade tarih dГјzenleme вҖ” tiftik/toprak/tДұrmДұk'Дұn "kim yaptДұ/doДҹru mu" modalДұndan
   farklДұ, sadece tarih. PoЕҹet/hava/hasat/kompost indirme gibi adДұmlarda ve
   zaten yapДұlmДұЕҹ herhangi bir adДұmДұn tarihini dГјzeltmede kullanДұlДұr. Yazma
   yine adimTamamla Гјzerinden (SSOT), tarihi opts.tarih ile geГ§irir. */
function adimTarihDuzenleAc(cid, idx){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var detay=c.adimDetay && c.adimDetay["p"+idx];
  var mevcutTarih=detay?detay.tarih:(_turTarihVal||todayISO());
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(s.txt)+'</div>'
    +'<label>Tarih</label><input type="date" id="atd_tarih" value="'+mevcutTarih+'">'
    +'<div class="row" style="margin-top:14px;"><button class="btn" onclick="adimTarihKaydet(\''+cid+'\','+idx+')">Kaydet</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">VazgeГ§</button></div>'
    +'</div></div>';

function adimTarihKaydet(cid, idx){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var tarih=(el("atd_tarih")&&el("atd_tarih").value)||todayISO();
  if(!adimTamamla(c, idx, {tarih:tarih})){ closeWarnBox(); toast("Kaydedilmedi вҖ” Г¶nceki adДұm henГјz tamamlanmamДұЕҹ"); render(); return; }
  touchCycle(c); saveData(); closeWarnBox(); toast("Tarih kaydedildi"); render();
}

/* Sadece "son yapДұlan"Дұ deДҹil, TAMAMLANMIЕһ TГңM olay-tipi adДұmlarДұ listeler вҖ”
   herhangi birinin tarihini/detayДұnДұ dГјzeltmek iГ§in. Ana kartДұ kalabalДұklaЕҹtДұrmaz
   (talep Гјzerine aГ§ДұlДұr), ama geГ§miЕҹteki bir hatayДұ dГјzeltme imkГўnДұ saДҹlar. */
function gecmisIslemleriGosterAc(cid){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var rows=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay") return;
    if(!adimGercektenYapildiMi(c,idx,s)) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    rows.push({idx:idx, txt:s.txt, tarih:detay?detay.tarih:null});
  });
  rows.sort(function(a,b){ return (a.tarih||"")<(b.tarih||"")?-1:((a.tarih||"")>(b.tarih||"")?1:0); });
  var body = rows.length ? rows.map(function(r){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:13.5px;">'
      +'<span>'+esc(r.txt)+' вҖ” '+(r.tarih?fmtDate(r.tarih):'вҖ”')+'</span>'
      +'<button class="btn ghost small" onclick="closeWarnBox();adimDuzenleAc(\''+cid+'\','+r.idx+')">DГјzelt</button>'
      +'</div>';
  }).join('') : '<div class="muted" style="padding:8px 0;">HenГјz tamamlanmДұЕҹ iЕҹlem yok.</div>';
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(c.oda)+' вҖ” geГ§miЕҹ iЕҹlemler</div>'
    +body
    +'<div class="row" style="margin-top:14px;"><button class="btn ghost" onclick="closeWarnBox()">Kapat</button></div>'
    +'</div></div>';
}
/* Tiftik/Toprak/TДұrmДұk DIЕһINDAKД° olay-tipi adДұmlar iГ§in zengin dГјzenleme вҖ”
   aynДұ gГ¶rГјnГјm (kim yaptДұ/doДҹru mu/tarih/not), ama c.adimDetay["p"+idx] iГ§ine
   yazar (rapor okumadДұДҹДұ iГ§in gГјvenli, tiftik/toprak/tДұrmДұk'Дұn rapor-okunan
   Г¶zel alanlarДұna dokunmaz). "Гңretim protokolГјnГјn kalbi" вҖ” her adДұmda aynДұ
   zenginlikte dГјzeltme imkГўnДұ. */
function adimTamDuzenleAc(cid, idx){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var detay=(c.adimDetay && c.adimDetay["p"+idx])||{};
  var L=getPersonelList();
  var chips = L.length
    ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;">'
      + L.map(function(p){ return '<button type="button" class="btn ghost small" style="padding:4px 10px;" onclick="atdPersonelEkle(\''+esc(p.ad).replace(/'/g,"\\'")+'\')">+ '+esc(p.ad)+'</button>'; }).join('')
      + '</div>'
    : '<div class="muted" style="font-size:12px;margin:4px 0;">Ayarlar вҶ’ Personel\'e kiЕҹi eklersen burada dokunarak seГ§ersin.</div>';
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(s.txt)+' вҖ” detaylar</div>'
    +'<label>Tarih</label><input type="date" id="atd_tarih" value="'+(detay.tarih||_turTarihVal||todayISO())+'">'
    +'<label style="margin-top:8px;">Kim yaptДұ? (listeden dokun veya elle yaz)</label>'
    +chips
    +'<input type="text" id="atd_personel" value="'+esc(detay.personel||"")+'" placeholder="Г¶r. Ahmet, Mehmet, dДұЕҹ ekip 2 kiЕҹi">'
    +'<div class="chk" style="margin-top:8px;"><input type="checkbox" id="atd_dogru" '+(detay.dogru?"checked":"")+'><label>DoДҹru yapДұldДұ</label></div>'
    +'<input type="text" id="atd_not" value="'+esc(detay.not||"")+'" placeholder="Not (neresi yanlДұЕҹ oldu, gГ¶zlem...)" style="margin-top:6px;">'
    +'<div class="row" style="margin-top:14px;"><button class="btn" onclick="adimTamKaydet(\''+cid+'\','+idx+')">Kaydet</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">VazgeГ§</button></div>'
    +'</div></div>';
}
function atdPersonelEkle(ad){
  var inp=el("atd_personel"); if(!inp) return;
  var mevcut=inp.value.trim();
  if(mevcut.split(",").map(function(x){return x.trim();}).indexOf(ad)>=0) return;
  inp.value = mevcut ? (mevcut+", "+ad) : ad;
}
function adimTamKaydet(cid, idx){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var tarih=(el("atd_tarih")&&el("atd_tarih").value)||todayISO();
  var personel=(el("atd_personel")&&el("atd_personel").value.trim())||"";
  var dogru=!!(el("atd_dogru")&&el("atd_dogru").checked);
  var not=(el("atd_not")&&el("atd_not").value.trim())||"";
  if(!adimTamamla(c, idx, {tarih:tarih, personel:personel, dogru:dogru, not:not})){
    closeWarnBox(); toast("Kaydedilmedi вҖ” Г¶nceki adДұm henГјz tamamlanmamДұЕҹ"); render(); return;
  }
  touchCycle(c); saveData(); closeWarnBox(); toast("Kaydedildi"); render();
}
/* Bir adДұm idx'i iГ§in doДҹru dГјzenleme modalДұnДұ aГ§ar: tiftik/toprak/tДұrmДұk
   kendi rapor-okunan zengin modalДұnДұ (adimDetayKutusuAc) kullanДұr, diДҹer
   TГңM adДұmlar (poЕҹet/hava/hasat/kompost indirme/vb.) aynДұ zenginlikte ama
   c.adimDetay tabanlДұ genel modalДұ (adimTamDuzenleAc) kullanДұr. Tek yerden
   karar verilir вҖ” "hangi adДұmda hangi modal" sorusu burada Г§Г¶zГјlГјr. */
function adimDuzenleAc(cid, idx){
  var s=getProtokol()[idx]; if(!s) return;
  var alanKey=s.rol||protokolAdimAlanKey(s.txt);
  if(alanKey==="tiftik"||alanKey==="toprak"||alanKey==="tirmik"){
    adimDetayKutusuAc(cid, idx, alanKey);
  } else {
    adimTamDuzenleAc(cid, idx);
  }
}
function odaProtokolOzetSatiriHTML(c){
  var son=sonYapilanOlayAdimi(c);
  var sd=siradakiProtokolAdimi(c);
  var today=todayISO();
  var gecikti = sd && sd.t<today;
  var bugunMu = sd && sd.t===today;
  var nokta = gecikti?"рҹ”ҙ":(bugunMu?"рҹҹЎ":"рҹҹў");
  var seritRenk = gecikti?"var(--red)":(bugunMu?"var(--amber)":"var(--line)");

  var h='<div style="padding:12px;border-left:4px solid '+seritRenk+';border-bottom:8px solid var(--bg);background:'+(gecikti?'#fdf3f3':'#fff')+';border-radius:10px;margin-bottom:2px;">';

  /* BaЕҹlДұk: durum noktasДұ + oda adДұ */
  h+='<div style="font-weight:700;font-size:15px;">'+nokta+' '+esc(c.oda)+'</div>';

  /* Son yapДұlan вҖ” kГјГ§Гјk, ikincil satДұr */
  if(son){
    h+='<div style="font-size:12px;color:var(--muted);margin-top:2px;">Son yapДұlan: '+esc(son.txt)+' вҖ” '+fmtDate(son.tarih)+gunKisaHTML(son.tarih)
      +(can("edit")?' <span onclick="adimDuzenleAc(\''+c.id+'\','+son.idx+')" style="text-decoration:underline;cursor:pointer;">dГјzelt</span>':'')
      +(can("edit")?' В· <span onclick="gecmisIslemleriGosterAc(\''+c.id+'\')" style="text-decoration:underline;cursor:pointer;">diДҹer geГ§miЕҹ iЕҹlemler</span>':'')
      +'</div>';
  }

  if(sd){
    var sdStep=getProtokol()[sd.idx];
    var sdAlanKey=(sdStep&&sdStep.rol)||protokolAdimAlanKey(sdStep?sdStep.txt:"");
    var zenginModal=(sdAlanKey==="tiftik"||sdAlanKey==="toprak"||sdAlanKey==="tirmik");
    var onaylaFonk = zenginModal ? ("toggleTask('"+c.id+"',"+sd.idx+")") : ("adimTamDuzenleAc('"+c.id+"',"+sd.idx+")");
    var gecikmisVeyaBugun = sd.t<=today;

    h+='<div style="border-top:1px solid var(--line);margin-top:8px;padding-top:8px;">'
      +'<div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;">SДұradaki Д°Еҹ</div>'
      +'<div style="font-weight:700;font-size:16px;margin-top:2px;">'+esc(sd.txt)+'</div>'
      +'<div style="font-size:12.5px;color:var(--muted);margin-top:3px;">рҹ“… Planlanan: <b>'+fmtDate(sd.t)+'</b>'+gunKisaHTML(sd.t)+'</div>';

    h+='<div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;margin-top:8px;">Durum</div>';
    if(gecikmisVeyaBugun && can("edit")){
      /* SДұrasДұ gelmiЕҹ: "Durum" satДұrДұ kendisi dokunulabilir aksiyon вҖ”
         tДұklayДұnca yapДұldДұ iЕҹaretlenir (tiftik/toprak/tДұrmДұk'ta detay kutusu,
         diДҹerlerinde sade tarih kutusu aГ§ДұlДұr). */
      h+='<div onclick="'+onaylaFonk+'" style="cursor:pointer;margin-top:3px;padding:8px 10px;background:var(--green-soft);color:var(--green-dark);border-radius:8px;font-weight:600;font-size:13.5px;">'
        +(gecikti?'вҡ пёҸ Gecikti вҖ” YapДұldДұ mДұ? Dokun':'BugГјn вҖ” YapДұldДұ mДұ? Dokun')
        +'</div>';
    } else {
      h+='<div style="margin-top:3px;font-size:13px;color:var(--muted);">HenГјz zamanДұ gelmedi</div>';
    }

    /* KullanДұcДұ isteДҹi: erteleme/planlama iЕҹlemleri sadece Oda DetayДұ вҶ’
       Гңretim ProtokolГј sayfasДұnda yapДұlabilir вҖ” "Ertele (1 gГјn)" ve "Tarihi
       deДҹiЕҹtir" buradan kaldДұrДұldДұ, "Erken Yap" (tamamlama, erteleme deДҹil)
       kalДұyor. */
    if(can("edit") && !gecikmisVeyaBugun){
      h+='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">';
      h+='<button class="btn small" style="flex:1;" onclick="'+onaylaFonk+'">Erken Yap</button>';
      h+='</div>';
    }
    h+='</div>';
  } else if(!son){
    h+='<div class="muted" style="font-size:13px;margin-top:4px;">Protokol adДұmДұ yok</div>';
  }

  h+='</div>';
  return h;
}
function odaProtokolOzetListesiHTML(active){
  if(!active.length) return '<div class="muted" style="padding:8px 0;">Dolu oda yok.</div>';
  var today=todayISO();
  /* Aciliyete gГ¶re sДұrala: en gecikmiЕҹ en Гјstte, sonra bugГјn, sonra en yakДұn
     gelecek tarih. SДұradaki adДұmДұ olmayan odalar (protokol bitmiЕҹ vb.) en sona. */
  var arr=active.slice().sort(function(a,b){
    var sa=siradakiProtokolAdimi(a), sb=siradakiProtokolAdimi(b);
    var ta = sa?daysBetween(today,sa.t):99999;
    var tb = sb?daysBetween(today,sb.t):99999;
    return ta-tb;
  });
  var h='';
  arr.forEach(function(c){ h+=odaProtokolOzetSatiriHTML(c); });
  return h;
}

function odaDolulukPlaniHTML(active, tumOdaAdlari){
  var d=loadData();
  var plan=getPlan().filter(function(x){return !x.done;});
  var byOda={}; active.forEach(function(c){ byOda[normalizeOda(c.oda)]=c; });
  var uretimde=[], beklemede=[], bos=[];
  tumOdaAdlari.forEach(function(o){
    var c=byOda[normalizeOda(o)];
    if(c){
      var st=stageOf(c);
      var hasatAsamasi = /^Hasat/.test(st.t);
      uretimde.push({oda:o, durum:st.t, hasat:hasatAsamasi});
    } else {
      var pl=plan.find(function(x){return normalizeOda(x.oda)===normalizeOda(o);});
      if(pl){ beklemede.push({oda:o, tarih:pl.cikis, firma:pl.firma}); }

  var h='';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">'
    +'<span class="badge b-harvest">рҹҢұ Гңretimde ('+uretimde.length+')</span>'
    +'<span class="badge b-amber">вҸі Beklemede ('+beklemede.length+')</span>'
    +'<span class="badge b-gray">в—» BoЕҹ ('+bos.length+')</span>'
    +'</div>';
  if(uretimde.length){
    h+='<div style="font-weight:600;font-size:13px;margin-top:8px;margin-bottom:4px;">рҹҢұ Гңretimde</div>';
    uretimde.forEach(function(x){
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;">'
        +'<span><b>'+esc(x.oda)+'</b></span>'
        +'<span class="note">'+esc(x.durum)+(x.hasat?' <span style="color:var(--red);font-weight:600;">рҹ”ң yakДұnda boЕҹalabilir</span>':'')+'</span>'
        +'</div>';
    });
  }
  if(beklemede.length){
    h+='<div style="font-weight:600;font-size:13px;margin-top:12px;margin-bottom:4px;">вҸі Beklemede (planlДұ geliЕҹ var)</div>';
    beklemede.forEach(function(x){
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;">'
        +'<span><b>'+esc(x.oda)+'</b></span>'
        +'<span class="note">'+fmtDate(x.tarih)+(x.firma?(' В· '+esc(x.firma)):'')+'</span>'
        +'</div>';
    });
  }
  if(bos.length){
    h+='<div style="font-weight:600;font-size:13px;margin-top:12px;margin-bottom:4px;">в—» BoЕҹ (plansДұz)</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px;">';
    bos.forEach(function(x){
      h+='<button class="card tap" style="padding:8px 4px;text-align:center;cursor:pointer;border:2px dashed var(--gray);font-size:13px;" onclick="openForm(null,\''+esc(x.oda).replace(/'/g,"\\'")+'\')">'+esc(x.oda)+'</button>';
    });
    h+='</div>';
  }
  h+='<div class="muted" style="margin-top:10px;font-size:11.5px;">"HazДұrlДұkta" ve "Temizlikte" durumlarДұ sistemde ayrДұca izlenmiyor, bu yГјzden burada gГ¶sterilmiyor.</div>';
  return h;
}

/* ГңST Г–ZET: kaГ§ oda hangi aЕҹamada вҖ” stageOf() zaten her odanДұn gerГ§ek
   aЕҹamasДұnДұ biliyor, burada sadece sayДұlДұyor. Uydurma kategori yok. */
function odaAsamaOzetiHTML(active, tumOdaAdlari){
  var sayim={};
  var sira=["KuluГ§ka dГ¶nemi","Toprak dГ¶nemi","1. Misel geliЕҹim","2. Misel geliЕҹim","Pimleme dГ¶nemi","Bezelye boyutu","Ceviz boyutu"];
  active.forEach(function(c){
    var t=stageOf(c).t;
    var key=/^Hasat/.test(t)?"Hasat":t;
    sayim[key]=(sayim[key]||0)+1;
  });
  var bosSayi=tumOdaAdlari.length-active.length;
  function kutu(etiket,sayi,renk){
    return '<div style="flex:1;min-width:64px;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px 4px;background:'+(sayi>0?renk:'transparent')+';">'
      +'<div style="font-size:20px;font-weight:700;">'+sayi+'</div>'
      +'<div class="muted" style="font-size:10.5px;line-height:1.2;">'+etiket+'</div>'
      +'</div>';
  }
  var h='<div style="display:flex;gap:6px;flex-wrap:wrap;">';
  sira.forEach(function(ad){
    if(sayim[ad]) h+=kutu(ad.replace(" dГ¶nemi","").replace(" geliЕҹim","").replace(" boyutu",""), sayim[ad], "var(--amber-soft)");
  });
  Object.keys(sayim).forEach(function(k){
    if(sira.indexOf(k)<0 && k!=="Hasat"){ h+=kutu(k, sayim[k], "var(--teal-soft)"); }
  });
  if(sayim["Hasat"]) h+=kutu("Hasat", sayim["Hasat"], "var(--harvest-soft)");
  h+=kutu("BoЕҹ", bosSayi, "var(--gray-soft)");
  h+='</div>';
  return h;
}

function planToOda(id){
  if(!can("edit")) return noPerm();
  var x=getPlan().find(function(p){return p.id===id;});
  if(!x){ toast("Plan bulunamadДұ"); return; }
  /* Merkezi gГјvenlik aДҹДұ (DRY): kompost henГјz gelmediyse oda aГ§ma erken olur вҖ”
     Гјretim takvimi ve gГјnlГјk Г¶lГ§Гјmler yanlДұЕҹ tarihten baЕҹlar. Onay iste. */
  var dg = x.cikis ? daysBetween(todayISO(), x.cikis) : 0;
  if(dg && dg>0){
    if(!confirm("Kompost henГјz gelmedi ("+dg+" gГјn sonra: "+fmtDate(x.cikis)+").\n\nOda oluЕҹturursan Гјretim takvimi bu tarihten baЕҹlar ve gГјnlГјk Г¶lГ§Гјm ekranДұ erken aГ§ДұlДұr.\n\nYine de Еҹimdi oluЕҹturulsun mu?")){
      return;
    }
  }
  var odaN=normalizeOda(x.oda||"");
  var d=loadData();
  var cakisan = d.cycles.find(function(c){ return normalizeOda(c.oda)===odaN && !c.bosaltimTarihi; });
  if(cakisan){
    toast(odaN+" odasДұnda zaten aktif kompost var вҖ” Г¶nce o dГ¶ngГјyГј boЕҹalt");
    return;
  }
  var m2=odaM2Get(odaN);
  var c={id:uid(), oda:odaN, kompostFirma:x.firma||"", gelisTarihi:x.cikis, partiNo:partiFromDate(x.cikis), alanM2:(m2!==null?String(m2):""), gunluk:[], hava:[], hasat:[]};
  /* Kompost BUGГңN/geГ§miЕҹte geldiyse: oda oluЕҹturmak = kompostu koymak =
     kompostu indirmek вҖ” ayrДұ bir "kompost indirme" gГ¶revi beklememeli.
     Ama Д°LERД° TARД°HLД° (henГјz gelmemiЕҹ) kompost iГ§in indirme GERГҮEKLEЕһMEDД°;
     kompostIndirme'yi baЕҹtan "yapДұldДұ" yaparsak "yarДұn kompost gelecek /
     indirme" hem YarДұn yapДұlacaklar'da hem yaklaЕҹan-kompost hatДұrlatДұcДұsДұnda
     GД°ZLENД°R (kullanДұcДұ raporu: "A-7 yarДұn kompost gelecek ama yarДұnki
     iЕҹlemlerde gГ¶rГјnmГјyor"). Bu yГјzden ileri tarihte boЕҹ bДұrakДұlДұr вҖ” kompost
     gelince (tarih bugГјne dГ¶nГјnce) indirme adДұmДұ normal Еҹekilde gГ¶rГјnГјr. */
  if(!(dg>0)) c.kompostIndirme={tarih:c.gelisTarihi};
  d.cycles.push(c);
  touchCycle(c);
  x.done=true;
  saveData(); logAudit("oda oluЕҹturuldu (plandan)", c.oda); toast("Oda oluЕҹturuldu вҖ” bilgileri tamamla");
  openForm(c.id);
}

function _pad2(n){ return ("0"+n).slice(-2); }
function parsePlanDate(v){
  if(v==null||v==="") return null;
  if(Object.prototype.toString.call(v)==="[object Date]" && !isNaN(v)) return v.getFullYear()+"-"+_pad2(v.getMonth()+1)+"-"+_pad2(v.getDate());
  if(typeof v==="number"){ var dt=new Date(Math.round((v-25569)*86400000)); return dt.getUTCFullYear()+"-"+_pad2(dt.getUTCMonth()+1)+"-"+_pad2(dt.getUTCDate()); }
  var str=(""+v).trim(); var m=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+_pad2(+m[2])+"-"+_pad2(+m[3]);
  m=str.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ var y=m[3]; if(y.length===2) y="20"+y; return y+"-"+_pad2(+m[2])+"-"+_pad2(+m[1]); }
  return null;
}
function parseSep(text){
  return text.split(/\r?\n/).filter(function(l){return l.trim()!=="";}).map(function(l){
    var sep = l.indexOf("\t")>=0?"\t":(l.indexOf(";")>=0?";":",");
    return l.split(sep).map(function(c){return c.trim().replace(/^"|"$/g,"");});
  });
}
function ensureXLSX(cb){
  if(window.XLSX) return cb(true);
  var sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload=function(){ cb(!!window.XLSX); };
  sc.onerror=function(){ cb(false); };
  document.head.appendChild(sc);
}
function planImportFile(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var name=(f.name||"").toLowerCase();
  if(/\.csv$/.test(name)){
    var rd=new FileReader();
    rd.onload=function(e){ planAddRows(parseSep(e.target.result)); };
    rd.readAsText(f,"utf-8");
  } else {
    toast("Excel okunuyorвҖҰ");
    ensureXLSX(function(ok){
      if(!ok){ toast("Excel kГјtГјphanesi yГјklenemedi (Г§evrimdДұЕҹДұ). CSV ya da kopyala-yapДұЕҹtДұr kullan."); return; }
      var rd=new FileReader();
      rd.onload=function(e){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"}); /* cellDates yok: tarihler ham seri olarak gelir, parsePlanDate UTC ile Г§evirir (gГјn kaymasДұ olmaz) */
          var names=wb.SheetNames, sheet=names[0];
          if(names.length>1){
            var pick=prompt("Hangi ay sayfasДұ iГ§e aktarДұlsДұn?\nSayfalar: "+names.join(", "), names[0]);
            if(pick===null) return;
            pick=pick.trim();
            if(names.indexOf(pick)>=0) sheet=pick;
            else { var lc=names.map(function(n){return n.toLowerCase();}).indexOf(pick.toLowerCase()); if(lc>=0) sheet=names[lc]; }
          }
          var ws=wb.Sheets[sheet];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
          planAddRows(rows);
        }catch(err){ toast("Excel okunamadДұ"); }
      };
      rd.readAsArrayBuffer(f);
    });
  }
  input.value="";
}
function planImportPaste(){
  var elT=el("pl_paste"); if(!elT||!elT.value.trim()){ toast("Г–nce yapДұЕҹtДұr"); return; }
  planAddRows(parseSep(elT.value));
}
function planAddRows(rows){
  if(!rows||!rows.length){ toast("SatДұr bulunamadДұ"); return; }
  /* ГҮok bloklu plan: tekrarlanan baЕҹlДұk + boЕҹ satДұrlar olabilir.
     BaЕҹlДұk satДұrДұ gГ¶rГјlГјnce sГјtun eЕҹlemesi (tarih/oda/firma) gГјncellenir. */
  var ci=-1, oi=-1, fi=-1;        // tarih, oda, firma sГјtun indexleri
  var dci=1, doi=2, dfi=0;        // baЕҹlДұk yoksa varsayДұlan: firmaВ·tarihВ·oda
  function isHeader(r){ var j=r.map(function(x){return (""+(x==null?"":x)).toLowerCase();}).join("|"); return /tarih/.test(j) && /oda/.test(j); }
  var pl=getPlan(), add=0, skip=0, dup=0;
  rows.forEach(function(r){
    if(!r||!r.length) return;
    if(isHeader(r)){
      ci=oi=fi=-1;
      r.forEach(function(hd,ix){ hd=(""+(hd==null?"":hd)).toLowerCase().trim();
        if(/tarih|Г§Дұk/.test(hd)) ci=ix; else if(/oda/.test(hd)) oi=ix; else if(/firma/.test(hd)) fi=ix; });
      return;
    }
    var ti=(ci>=0?ci:dci), oo=(oi>=0?oi:doi), ff=(fi>=0?fi:dfi);
    var cikis=parsePlanDate(r[ti]);
    var oda=(r[oo]!=null?(""+r[oo]).trim():"");
    var firma=(ff>=0 && r[ff]!=null)?(""+r[ff]).trim():"";
    if(!cikis || !oda){ skip++; return; }
    var no=normalizeOda(oda);
    if(pl.some(function(q){return q.cikis===cikis && (q.oda||"").toLowerCase()===no.toLowerCase();})){ dup++; return; }
    pl.push({id:uid(), cikis:cikis, oda:no, firma:firma, done:false}); add++;
  });
  saveData();
  toast(add+" plan satДұrДұ eklendi"+(dup?(" В· "+dup+" zaten vardДұ"):"")+((!add&&!dup)?" В· uygun satДұr yok":"")); render();
}

/* ---- Parola gГјvenliДҹi: SHA-256 hash ---- */
/* Eskiden Еҹifreler dГјz metin (plaintext) saklanДұyordu вҖ” hem localStorage'da
   hem Firestore'da. ArtДұk SHA-256 hash'i saklanДұyor. GeГ§iЕҹ dГ¶nemi iГ§in: eski
   plaintext parola ile giriЕҹi hГўlГў kabul ediyoruz, ama baЕҹarДұlДұ giriЕҹte
   otomatik olarak hash'e yГјkseltiyoruz (kullanДұcДұ hiГ§bir Еҹey fark etmez). */
async function hashPass(pass){
  try{
    if(!window.crypto || !window.crypto.subtle){
      /* HTTP (gГјvensiz baДҹlam) veya Г§ok eski tarayДұcДұ вҖ” crypto.subtle yok.
         Cloudflare Pages HTTPS olduДҹu iГ§in normalde buraya dГјЕҹmez. */
      console.error("crypto.subtle yok вҖ” HTTPS baДҹlantДұ gerekli");
      return null;
    }
    var enc=new TextEncoder().encode(pass);
    var buf=await crypto.subtle.digest("SHA-256", enc);
    return Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }catch(e){ console.error("hash hatasДұ", e); return null; }
}
function isHashedPass(s){ return typeof s==="string" && /^[a-f0-9]{64}$/.test(s); }

/* PIN kilidi KALDIRILDI (kullanДұcДұ isteДҹi: "her seferinde PIN girmek Г§ok zor
   oluyor"). Veri artДұk dГјz metin olarak IndexedDB'de tutuluyor.
   GEГҮД°Еһ: bu gГјncellemeden Г–NCE PIN ile ЕҹifrelenmiЕҹ veri barДұndДұran
   cihazlarda ({enc:1,...} zarfДұ) вҖ” sekmede hГўlГў geГ§erli bir oturum anahtarДұ
   varsa (sessionStorage'da, henГјz silinmemiЕҹse) veriyi SESSД°ZCE Г§Г¶zГјp dГјz
   metne taЕҹДұrДұz, kullanДұcДұ hiГ§bir Еҹey fark etmez. Oturum anahtarДұ yoksa
   (kilit zaten kapanmДұЕҹ/sГјresi dolmuЕҹsa) veriyi Г§Г¶zecek bir yol kalmaz вҖ”
   yerel zarfДұ atДұp boЕҹ baЕҹlarДұz; gerГ§ek veri Firestore'da (bulutta, hiГ§
   ЕҹifrelenmemiЕҹ) zaten gГјvende, bulut baДҹlantДұsДұ kurulur kurulmaz saniyeler
   iГ§inde otomatik geri gelir (bkz. FB.coll/gorevColl/arizaColl onSnapshot). */
var PIN_CFG_KEY_ESKI = "utp_pinCfg";
var PIN_SESSION_KEY_ESKI = "utp_pinOturum";
function bufFromB64(b64){
  var bin=atob(b64), bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}
async function eskiSifreliZarfiCozmeyeCalis(env){
  try{
    if(!window.crypto || !window.crypto.subtle) return null;
    var cfg=JSON.parse(localStorage.getItem(PIN_CFG_KEY_ESKI)||"null");
    var sess=JSON.parse(sessionStorage.getItem(PIN_SESSION_KEY_ESKI)||"null");
    if(!cfg || !sess || sess.salt!==cfg.salt) return null;
    var key=await crypto.subtle.importKey("raw", bufFromB64(sess.raw), {name:"AES-GCM"}, true, ["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:bufFromB64(env.iv)}, key, bufFromB64(env.ct));
    return new TextDecoder().decode(pt);
  }catch(e){ console.warn("eski Еҹifreli veri Г§Г¶zГјlemedi (oturum geГ§ersiz)", e); return null; }
}

function getArsiv(){ var d=loadData(); if(!Array.isArray(d.arsiv)) d.arsiv=[]; return d.arsiv; }

  if(!can("manage")) return noPerm();

}
function arsivGeri(id){
  if(!can("manage")) return noPerm();
  var ar=getArsiv(); var c=ar.find(function(x){return x.id===id;}); if(!c) return;
  ar.splice(ar.indexOf(c),1);

  saveData(); logAudit("arЕҹivden geri alДұndДұ", c.oda); toast("Geri alДұndДұ"); render();
}

/* ---------- GГјn Sonu Г–zeti: bugГјn ne oldu + yarДұnДұn planДұ ---------- */
function renderGunSonu(){
  el("hdrTitle").textContent = "GГјn Sonu Г–zeti";
  var d=loadData();
  var active = d.cycles.filter(function(c){return !c.bosaltimTarihi;});
  var today=todayISO(), yarin=addDays(today,1);

  var h = '<div class="card"><div class="sec-title" style="margin-top:0;">рҹ“… BugГјn вҖ” '+fmtDate(today)+' '+gunAdi(today)+'</div>';

  /* Kontrol durumu: bugГјn eksik odalar вҖ” "vakit" (Sabah/AkЕҹam) ayrДұmДұ artДұk
     hiГ§bir formda doldurulmuyor (o Г¶zellik kaldДұrДұldДұ, teke dГјЕҹГјrГјldГј), o
     yГјzden burada da tek kontrol: bugГјn HД°ГҮ gГјnlГјk kaydДұ var mДұ. */
  var eksikKontrol=[];
  active.forEach(function(c){
    var bg=(c.gunluk||[]).some(function(r){return r.tarih===today;});
    if(!bg) eksikKontrol.push(c.oda);
  });
  if(!active.length){
    h += '<div class="muted">Aktif oda yok.</div>';
  } else if(!eksikKontrol.length){
    h += '<div style="color:var(--green); font-weight:600;">вң“ TГјm odalar bugГјn kontrol edildi</div>';
  } else {
    h += '<div>рҹ“Ӣ GГјnlГјk kontrol eksik: <b>'+eksikKontrol.map(esc).join(", ")+'</b></div>';
  }

  /* BugГјn yapДұlan iЕҹler вҖ” SSOT: hem bugГјn iЕҹaretlenen protokol adДұmlarДұ (tiftik/toprak/tДұrmДұk/
     hava tarihleri, poЕҹet/hasat kutucuklarДұ) hem gГјnlГјk kayДұttaki notlar, tek yerden tГјretilir. */
  var yapilanlar=[];
  active.forEach(function(c){
    odaYapilanlar(c, today).forEach(function(not){
      yapilanlar.push({oda:c.oda, not:not});
    });
  });
  if(yapilanlar.length){
    h += '<div style="font-weight:700; margin-top:10px;">вң“ BugГјn yapДұlanlar</div>';
    yapilanlar.forEach(function(y){
      h += '<div style="padding:4px 0; border-bottom:1px solid #f0f0ec; font-size:14px;"><b>'+esc(y.oda)+'</b> вҖ” '+esc(y.not)+'</div>';
    });
  }

  /* BugГјnkГј kritikler */
  var kritikler=[];
  active.forEach(function(c){
    var dt=deltaTDurum(c);
    if(dt==="kritik") kritikler.push('рҹ”ҙ '+esc(c.oda)+': kompost Г§alДұЕҹmДұyor (oda > kompost)');
    else if(dt==="esit") kritikler.push('рҹҹ  '+esc(c.oda)+': О” T eЕҹit, kompost ДұsДұnmДұyor');
    if(kompostAltUstDurum(c)==="kritik") kritikler.push('рҹҢ¬пёҸ '+esc(c.oda)+': kompost alt-Гјst farkДұ yГјksek вҖ” hava sirkГјlasyonu gerekir');
    if(odaHastalikRiskli(c)) kritikler.push('рҹҰ  '+esc(c.oda)+': hastalДұk riski (son 14 gГјn)');
  });
  (tempAlerts()||[]).forEach(function(a){ kritikler.push((a.lvl===2?'рҹҢЎпёҸрҹ”ҙ ':'рҹҢЎпёҸрҹҹ  ')+esc(a.txt)); });
  if(kritikler.length){
    h += '<div style="font-weight:700; margin-top:10px; color:#c0291f;">вҡ пёҸ BugГјnkГј kritikler</div>';
    kritikler.forEach(function(k){ h += '<div style="padding:4px 0; border-bottom:1px solid #f0f0ec; font-size:14px;">'+k+'</div>'; });
  }
  h += '</div>';

  /* YarДұnДұn planДұ */
  h += '<div class="card"><div class="sec-title" style="margin-top:0;">рҹҢ… YarДұnДұn planДұ вҖ” '+fmtDate(yarin)+' '+gunAdi(yarin)+'</div>';

  /* YarДұn iГ§in Kontrol/GГ¶zlem notlarДұ (protokoldeki "uyari" adДұmlarДұ) */
  var yarinKontrol=[];
  active.forEach(function(c){
    getProtokol().forEach(function(s){
      if(s.silindi || s.tip!=="uyari") return;
      var t=protokolTarih(c,s);
      if(t===yarin) yarinKontrol.push(esc(c.oda)+': '+esc(s.txt));
    });
  });
  if(yarinKontrol.length){
    h += '<div style="font-weight:700;">рҹ‘ҒпёҸ Dikkat edilmesi gerekenler</div>';
    yarinKontrol.forEach(function(k){ h += '<div style="padding:4px 0; border-bottom:1px solid #f0f0ec; font-size:14px;">'+k+'</div>'; });
  }

  /* Devam eden kritikler (bugГјnden yarДұna muhtemelen sГјrecek) */
  if(kritikler.length){
    h += '<div style="font-weight:700; margin-top:10px; color:#c0291f;">вҡ пёҸ BugГјnden devam edebilecek kritikler</div>'
      + '<div class="muted" style="font-size:13px; margin-bottom:4px;">DГјzeltilmezse yarДұn da geГ§erli olur:</div>';
    kritikler.forEach(function(k){ h += '<div style="padding:4px 0; border-bottom:1px solid #f0f0ec; font-size:14px;">'+k+'</div>'; });
  }

  var yy=yarinHTML();
  h += yy ? ('<div style="margin-top:10px;">'+yy+'</div>') : '<div class="muted" style="margin-top:8px;">YarДұn iГ§in planlДұ bir gГ¶rev yok.</div>';
  h += '</div>';

  h += '<button class="btn ghost" style="width:100%; margin-top:4px;" onclick="go(\'list\')">вҖ№ Ana ekrana dГ¶n</button>';
  el("app").innerHTML=h;
}

/* ---------- Гңretim Г¶Дҹrenmesi (geГ§miЕҹ dГ¶ngГј istatistik analizi, gerГ§ek veri вҖ” AI deДҹil) ---------- */
function tumTamamlananDongu(){
  return loadData().cycles.filter(function(c){ return c.bosaltimTarihi && (c.hasat||[]).length; });
}
function ortKompostSicaklik(c){
  var vals=(c.gunluk||[]).filter(function(r){ return (!c.toprakTarihi || r.tarih<c.toprakTarihi) && numParse(r.kompostC)!=null; }).map(function(r){return numParse(r.kompostC);});
  if(!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function uretimOgrenmesiVeri(){
  var all=tumTamamlananDongu();
  var bulgular=[];
  var withTemp=all.map(function(c){ return {sic:ortKompostSicaklik(c), v:verimOzet(c)}; }).filter(function(x){return x.sic!=null && x.v.kgTon!=null;});
  if(withTemp.length>=4){
    var esik=26;
    var ust=withTemp.filter(function(x){return x.sic>=esik;});
    var alt=withTemp.filter(function(x){return x.sic<esik;});
    if(ust.length>=2 && alt.length>=2){
      var avgU=ust.reduce(function(s,x){return s+x.v.kgTon;},0)/ust.length;
      var avgA=alt.reduce(function(s,x){return s+x.v.kgTon;},0)/alt.length;
      var fark=avgA>0?((avgA-avgU)/avgA*100):0;
      bulgular.push({baslik:"Kompost sДұcaklДұДҹДұ ve verim", metin: esik+"В°C ГјstГј ortalama kompost sДұcaklДұДҹДұ olan "+ust.length+" dГ¶ngГјde ortalama verim "+avgU.toFixed(0)+" kg/ton; "+esik+"В°C altДұ "+alt.length+" dГ¶ngГјde "+avgA.toFixed(0)+" kg/ton"+(fark>3?(" вҖ” yГјksek sДұcaklДұk dГ¶ngГјlerinde verim yaklaЕҹДұk %"+fark.toFixed(0)+" daha dГјЕҹГјk gГ¶rГјnГјyor."):(fark<-3?(" вҖ” yГјksek sДұcaklДұk dГ¶ngГјlerinde verim daha yГјksek gГ¶rГјnГјyor, Г¶rnek sayДұsДұ azken tesadГјf olabilir."):" вҖ” belirgin bir fark gГ¶rГјnmГјyor."))});
    }
  }
  var firmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var f=c.kompostFirma||"Bilinmiyor"; if(!firmaGroups[f]) firmaGroups[f]=[]; firmaGroups[f].push(v.kgTon); });
  var firmaListe=Object.keys(firmaGroups).filter(function(f){return firmaGroups[f].length>=2;});
  if(firmaListe.length>=2){
    var firmaOrt=firmaListe.map(function(f){ var arr=firmaGroups[f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    firmaOrt.sort(function(a,b){return b.ort-a.ort;});
    bulgular.push({baslik:"Firma bazlДұ verim karЕҹДұlaЕҹtДұrmasДұ (kg/ton)", metin: firmaOrt.map(function(x){return esc(x.f)+": "+x.ort.toFixed(0)+" (n="+x.n+")";}).join(" В· ")});
  }
  var withSu=all.map(function(c){ var t=tuketimOzet(c); var v=verimOzet(c); return {suTon:t.suTon, kgTon:v.kgTon}; }).filter(function(x){return x.suTon!=null && x.kgTon!=null;});
  if(withSu.length>=4){
    var suSirali=withSu.slice().sort(function(a,b){return a.suTon-b.suTon;});
    var medyanSu=suSirali[Math.floor(suSirali.length/2)].suTon;
    var dusukSu=withSu.filter(function(x){return x.suTon<medyanSu;});
    var yuksekSu=withSu.filter(function(x){return x.suTon>=medyanSu;});
    if(dusukSu.length>=2 && yuksekSu.length>=2){
      var ortD=dusukSu.reduce(function(s,x){return s+x.kgTon;},0)/dusukSu.length;
      var ortY=yuksekSu.reduce(function(s,x){return s+x.kgTon;},0)/yuksekSu.length;
      bulgular.push({baslik:"Su miktarДұ ve verim", metin:"Ton kompost baЕҹДұna su medyanДұ ~"+medyanSu.toFixed(0)+" lt. Bunun altДұnda sulanan "+dusukSu.length+" dГ¶ngГјde ortalama verim "+ortD.toFixed(0)+" kg/ton; ГјstГјnde sulanan "+yuksekSu.length+" dГ¶ngГјde "+ortY.toFixed(0)+" kg/ton."});
    }
  }
  var partiGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null || !c.gelisTarihi) return; var p=partiFromDate(c.gelisTarihi); if(!partiGroups[p]) partiGroups[p]=[]; partiGroups[p].push({oda:c.oda, kgTon:v.kgTon}); });
  var partiListe=Object.keys(partiGroups).filter(function(p){return partiGroups[p].length>=2;});
  if(partiListe.length){
    partiListe.sort(function(a,b){
      var oa=partiGroups[a].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[a].length;
      var ob=partiGroups[b].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[b].length;
      return ob-oa;
    });
    bulgular.push({baslik:"Parti bazlДұ karЕҹДұlaЕҹtДұrma (aynДұ gГјn gelen kompost partileri)", metin: partiListe.slice(0,6).map(function(p){
      var arr=partiGroups[p]; var ort=arr.reduce(function(s,x){return s+x.kgTon;},0)/arr.length;
      return "Parti "+esc(p)+" ("+arr.map(function(x){return esc(x.oda);}).join(", ")+"): ort. "+ort.toFixed(0)+" kg/ton";
    }).join(" В· ")});
  }
  var odaFirmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var o=normalizeOda(c.oda); var f=c.kompostFirma||"Bilinmiyor"; if(!odaFirmaGroups[o]) odaFirmaGroups[o]={}; if(!odaFirmaGroups[o][f]) odaFirmaGroups[o][f]=[]; odaFirmaGroups[o][f].push(v.kgTon); });
  var odaFirmaSatir=[];
  Object.keys(odaFirmaGroups).forEach(function(o){
    var firmalar=Object.keys(odaFirmaGroups[o]);
    if(firmalar.length<2) return;
    var ortlar=firmalar.map(function(f){ var arr=odaFirmaGroups[o][f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    ortlar.sort(function(a,b){return b.ort-a.ort;});
    var iyi=ortlar[0], kotu=ortlar[ortlar.length-1];
    var odaAdi=all.find(function(c){return normalizeOda(c.oda)===o;}).oda;
    odaFirmaSatir.push(esc(odaAdi)+"'da en iyi "+esc(iyi.f)+" ("+iyi.ort.toFixed(0)+" kg/ton), en kГ¶tГј "+esc(kotu.f)+" ("+kotu.ort.toFixed(0)+" kg/ton)");
  });
  if(odaFirmaSatir.length){
    bulgular.push({baslik:"Oda bazДұnda firma performansДұ", metin: odaFirmaSatir.join(" В· ")});
  }
  return {n: all.length, bulgular: bulgular};
}
/* ---------- KГ¶k neden analizi: tamamlanmДұЕҹ, dГјЕҹГјk verimli dГ¶ngГјlerde olasДұ nedenler ---------- */
function donguKokNeden(c){
  var bulgular=[];
  var kritikGun=0, tehlikeGun=0, amonyakGun=0, nemYuksekGun=0;
  (c.gunluk||[]).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null){
      if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeGun++;
      else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
    }
    if(r.amonyak==="Var") amonyakGun++;
    if(r.nem==="YГјksek") nemYuksekGun++;
  });
  if(tehlikeGun>0) bulgular.push(tehlikeGun+" gГјn tehlikeli kompost sДұcaklДұДҹДұ kaydedilmiЕҹ.");
  if(kritikGun>0) bulgular.push(kritikGun+" gГјn kritik kompost sДұcaklДұДҹДұ kaydedilmiЕҹ.");
  if(amonyakGun>0) bulgular.push(amonyakGun+" gГјn amonyak kokusu bildirilmiЕҹ.");

/* Hasat raporu вҖ” GEГҮMД°ЕһE DГ–NГңK gerГ§ek kayДұtlar (tahmin deДҹil). GГјnlГјk/haftalДұk/
   aylДұk toplam + oda bazДұnda (son 30 gГјn) + tamamlanmДұЕҹ dГ¶ngГјlerde ortalama verim. */
function hasatRaporuHTML(){

/* HaftalДұk Hasat Tahmini вҖ” Г¶nГјmГјzdeki 7 gГјn iГ§in hangi odanДұn hangi flaЕҹ
   gГјnГјnde olacaДҹДұnДұ (hasatAsama) ve o gГјne ait ortalama kasa aralДұДҹДұnДұ
   (HASAT_PLAN.kasaMin/kasaMax) birleЕҹtirip gГјn gГјn + oda oda + haftalДұk
   toplam tahmini kasa (ve kg) gГ¶sterir. KullanДұcДұnДұn verdiДҹi ortalama
   gГјnlГјk hasat rakamlarДұna dayalДұ kaba bir tahmindir, kesin deДҹildir. */
function haftalikHasatTahminiHTML(){
  var d=loadData();
  var S=getSet();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var today=todayISO();
  var gunler=[];
  for(var i=0;i<7;i++) gunler.push(addDays(today,i));

  var toplamMin=0, toplamMax=0;
  var body='';
  var hicHasatYok=true;
  var gercekVeriKullanildiMi=false;
  /* Hafta 7 gГјn, cumartesi/pazar dahil вҖ” Г§iftlik 7 gГјn Г§alДұЕҹДұyor, hafta sonu
     ATLANMAZ. Hasat olmayan bir gГјn de (cumartesi/pazar dahil) listeden
     GД°ZLENMEZ вҖ” aksi halde "cumartesi/pazar hiГ§ gГ¶sterilmiyor, hesaba
     katДұlmamДұЕҹ" izlenimi veriyordu (kullanДұcДұ raporu). BoЕҹ bir gГјn aГ§ДұkГ§a
     "planlДұ hasat yok" diye gГ¶sterilir; sessizce atlanmaz. */
  gunler.forEach(function(iso){
    var satirlar=[];
    var gunMin=0, gunMax=0;
    aktif.forEach(function(c){
      var a=hasatAsama(c, iso);
      if(!a || a.flas<=0 || (a.kasaMin<=0 && a.kasaMax<=0)) return;
      if(a.kasaKaynak==="gercek") gercekVeriKullanildiMi=true;
      satirlar.push({oda:c.oda, flas:a.flas, gun:a.gun, min:a.kasaMin, max:a.kasaMax, kaynak:a.kasaKaynak, n:a.kasaOrnekSayisi});
      gunMin+=a.kasaMin; gunMax+=a.kasaMax;
