<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f7a4d">
<title>Üretim Takip</title>
<style>
  :root{
    --green:#1f7a4d; --green-dark:#14583a; --green-soft:#e6f3ec;
    --amber:#b87514; --amber-soft:#faeeda;
    --teal:#0f6e56; --teal-soft:#e1f5ee;
    --harvest:#3b6d11; --harvest-soft:#eaf3de;
    --gray:#5f5e5a; --gray-soft:#f1efe8;
    --red:#a32d2d; --red-soft:#fceaea;
    --bg:#f4f5f3; --card:#ffffff; --line:#dcdcd6;
    --text:#1c1c1a; --muted:#6b6b66;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); font-size:17px; line-height:1.5;
    padding-bottom:130px;
  }
  .bottomnav{position:fixed; left:0; right:0; bottom:0; z-index:40; background:#fff; border-top:1px solid var(--line); display:flex; box-shadow:0 -2px 8px rgba(0,0,0,.08); padding-bottom:env(safe-area-inset-bottom);}
  .bottomnav button{flex:1; background:none; border:none; padding:11px 2px 10px; font-size:12px; color:var(--muted); font-family:inherit; line-height:1.3; min-height:58px;}
  .bottomnav button .ic{display:block; font-size:24px; line-height:1.15; margin-bottom:2px;}
  .bottomnav button.active{color:var(--green); font-weight:700;}
  .bottomnav button:active{background:var(--green-soft);}
  header{
    position:sticky; top:0; z-index:30; background:var(--green); color:#fff;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  header .title{font-size:20px; font-weight:600; flex:1;}
  header button.hbtn{
    background:rgba(255,255,255,.16); color:#fff; border:none; border-radius:10px;
    padding:9px 12px; font-size:15px; font-weight:500;
  }
  header button.hbtn:active{background:rgba(255,255,255,.3);}
  #app{max-width:900px; margin:0 auto; padding:14px;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;}
  .card.tap:active{background:#fafafa;}
  .sec-title{font-size:14px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:22px 4px 8px;}
  .oda-name{font-size:22px; font-weight:700;}
  .badge{display:inline-block; font-size:13px; font-weight:600; padding:4px 11px; border-radius:9px;}
  .b-amber{background:var(--amber-soft); color:var(--amber);}
  .b-teal{background:var(--teal-soft); color:var(--teal);}
  .b-harvest{background:var(--harvest-soft); color:var(--harvest);}
  .b-gray{background:var(--gray-soft); color:var(--gray);}
  .kv{display:flex; justify-content:space-between; gap:12px; padding:5px 0; font-size:16px; border-bottom:1px solid #f0f0ec;}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);}
  .kv .v{font-weight:500; text-align:right;}
  label{display:block; font-size:14px; color:var(--muted); margin:12px 0 5px; font-weight:600;}
  input,select,textarea{
    width:100%; font-size:18px; font-family:inherit; padding:14px 14px;
    border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text);
    min-height:50px; box-sizing:border-box;
  }
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  .field-row{display:flex; gap:10px;}
  .field-row > div{flex:1;}
  .chk{display:flex; align-items:center; gap:8px; margin-top:8px;}
  .chk input{width:28px; height:28px; min-height:28px;}
  .chk label{margin:0;}
  button.btn{
    border:none; border-radius:12px; padding:16px 20px; font-size:18px; font-weight:700;
    font-family:inherit; background:var(--green); color:#fff; min-height:52px;
  }
  button.btn:active{background:var(--green-dark);}
  button.btn.sec{background:#fff; color:var(--green); border:2px solid var(--green);}
  button.btn.ghost{background:#fff; color:var(--text); border:2px solid var(--line);}
  button.btn.danger{background:#fff; color:var(--red); border:2px solid var(--red);}
  button.small{padding:12px 16px; font-size:16px; min-height:44px;}
  table{width:100%; border-collapse:collapse; font-size:15px;}
  th,td{padding:9px 8px; text-align:center; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:600; font-size:13px; text-transform:uppercase;}
  td.note{text-align:left;}
  .tbl-input{padding:8px 8px; font-size:15px; border:1px solid var(--line); border-radius:8px;}
  .del-x{color:var(--red); font-weight:700; background:none; border:none; font-size:20px; padding:9px 13px; min-height:40px;}
  .fab{
    position:fixed; right:18px; bottom:78px; z-index:40;
    background:var(--green); color:#fff; border:none; border-radius:30px;
    padding:16px 22px; font-size:18px; font-weight:700; box-shadow:0 4px 14px rgba(0,0,0,.22);
  }
  .fab:active{background:var(--green-dark);}
  .empty{text-align:center; color:var(--muted); padding:50px 20px;}
  .empty .big{font-size:54px; margin-bottom:10px;}
  .toast{
    position:fixed; left:50%; bottom:150px; transform:translateX(-50%); z-index:60;
    background:#222; color:#fff; padding:12px 20px; border-radius:24px; font-size:15px;
    opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%;
  }
  .toast.show{opacity:1;}
  .pill{font-size:13px; color:var(--muted);}
  .hava-temp{font-weight:700; color:var(--teal);}
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal{background:#fff; border-radius:16px; padding:20px; max-width:420px; width:100%;}
  hr{border:none; border-top:1px solid var(--line); margin:18px 0;}
  .muted{color:var(--muted); font-size:14px;}
  .red{color:#c0291f; font-weight:600;}
  .warn{background:#fff6e5; border-left:4px solid var(--amber); padding:10px 12px; border-radius:8px; font-size:14px; margin:8px 0;}
</style>
</head>
<body>
<header>
  <button id="hdrBack" onclick="hdrGeri()" style="display:none; background:rgba(255,255,255,.18); color:#fff; border:none; border-radius:10px; padding:8px 14px; font-size:18px; font-weight:600; cursor:pointer; flex:none;">‹</button>
  <span class="title" id="hdrTitle" onclick="goHome()" style="cursor:pointer;">Üretim Takip</span>
  <span id="hdrVer" style="font-size:12px; opacity:.75;"></span>
  <span id="syncDot" style="font-size:12px; margin-left:8px;"></span>
  <input type="file" id="fileRestore" accept=".json" style="display:none">
</header>
<div id="app"></div>
<div id="bottomnav"></div>
<div id="warnModal"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
<script>
"use strict";

/* ===================== SENKRON (Firebase Firestore) =====================
   Bo\u015f b\u0131rak\u0131rsan uygulama yaln\u0131zca bu cihazda \u00e7al\u0131\u015f\u0131r (offline, mevcut h\u00e2li).
   Senkron i\u00e7in: Firebase'de \u00fccretsiz proje a\u00e7 -> Firestore Database ba\u015flat ->
   Proje Ayarlar\u0131 > "Web app" yap\u0131land\u0131rmas\u0131n\u0131 a\u015fa\u011f\u0131ya yap\u0131\u015ft\u0131r. FARM_CODE: i\u015fletme kodu. */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyDzG6DG2Z1xbGIBIy7gRM2yTENfrSq7Kh4",
  authDomain: "dirican-mantar.firebaseapp.com",
  projectId: "dirican-mantar",
  storageBucket: "dirican-mantar.firebasestorage.app",
  messagingSenderId: "854408068861",
  appId: "1:854408068861:web:7b358e97db38620d83c894"
};
var FARM_CODE = "merkez";
/* ======================================================================= */

var FB = { ready:false, coll:null, gorevColl:null, hasatColl:null, firstServer:false, firstServerG:false };
var _synced = {};
var _syncedG = {};
function cycleJSON(c){ return JSON.stringify(c); }
function fbClean(c){ return JSON.parse(JSON.stringify(c)); }
function rebuildSynced(){ _synced={}; ((memData&&memData.cycles)||[]).forEach(function(c){ _synced[c.id]=cycleJSON(c); }); }
function rebuildSyncedG(){ _syncedG={}; ((memData&&memData.gorevler)||[]).forEach(function(g){ _syncedG[g.id]=cycleJSON(g); }); }
function isTyping(){ var a=document.activeElement; return !!(a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)); }
function fbPendingCount(){
  var n=0;
  ((memData&&memData.cycles)||[]).forEach(function(c){ if(_synced[c.id]!==cycleJSON(c)) n++; });
  ((memData&&memData.gorevler)||[]).forEach(function(g){ if(_syncedG[g.id]!==cycleJSON(g)) n++; });
  return n;
}
function fbSetStatus(s){
  var e=document.getElementById("syncDot"); if(!e) return;
  var bekleyen = (s==="offline"||s==="hata") ? fbPendingCount() : 0;
  var bek = bekleyen>0 ? (" \u00b7 "+bekleyen+" kay\u0131t bekliyor") : "";
  if(s==="synced"){ e.textContent="\u25cf senkron"; e.style.color="#bff5dc"; }
  else if(s==="offline"){ e.textContent="\u25cf \u00e7evrimd\u0131\u015f\u0131"+bek; e.style.color="#ffe0a3"; }
  else if(s==="local"){ e.textContent="\u25cf yerel"; e.style.color="#cfe3ff"; }
  else if(s==="hata"){ e.textContent="\u25cf senkron bekliyor"+bek; e.style.color="#ffb3b3"; }
  else { e.textContent=""; }
}
var _syncFailCount=0;
function fbPushDirty(){
  if(!FB.ready) return;
  ((memData&&memData.cycles)||[]).forEach(function(c){
    var j=cycleJSON(c);
    if(_synced[c.id]!==j){
      FB.coll.doc(c.id).set(fbClean(c)).then(function(){
        _synced[c.id]=j; /* sadece gerçekten başarılı olursa işaretle */
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("set",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDelete(id){ if(FB.ready){ delete _synced[id]; FB.coll.doc(id).delete().catch(function(e){ console.warn("delete",e); fbSetStatus("hata"); }); } }
function fbPushDirtyGorev(){
  if(!FB.ready || !FB.gorevColl) return;
  ((memData&&memData.gorevler)||[]).forEach(function(g){
    var j=cycleJSON(g);
    if(_syncedG[g.id]!==j){
      FB.gorevColl.doc(g.id).set(fbClean(g)).then(function(){
        _syncedG[g.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setG",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteGorev(id){ if(FB.ready && FB.gorevColl){ delete _syncedG[id]; FB.gorevColl.doc(id).delete().catch(function(e){ console.warn("deleteG",e); fbSetStatus("hata"); }); } }
/* ---- Eşzamanlı düzenleme: döngü birleştirme (veri kaybı olmasın) ---- */
function mergeArr(localArr, remoteArr, keyFn, preferLocal){
  var map={}, order=[];
  function add(arr){ (arr||[]).forEach(function(e){ var k=keyFn(e); if(!(k in map)) order.push(k); map[k]=e; }); }
  if(preferLocal){ add(remoteArr); add(localArr); } else { add(localArr); add(remoteArr); }
  return order.map(function(k){ return map[k]; });
}
function mergeCycle(localC, remoteC){
  if(!localC) return remoteC; if(!remoteC) return localC;
  var lAt=localC._at||"", rAt=remoteC._at||"", preferLocal=lAt>rAt;
  var merged=JSON.parse(JSON.stringify(preferLocal?localC:remoteC));
  merged.gunluk=mergeArr(localC.gunluk, remoteC.gunluk, function(e){return (e.tarih||"")+"|"+(e.vakit||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hava  =mergeArr(localC.hava,   remoteC.hava,   function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hasat =mergeArr(localC.hasat,  remoteC.hasat,  function(e){return (e.tarih||"")+"|"+(e.tip||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged._at=(lAt>rAt?lAt:rAt)||merged._at;
  return merged;
}
function fbInit(){
  if(!FIREBASE_CONFIG.projectId){ fbSetStatus("local"); return; }
  if(typeof firebase==="undefined"){ fbSetStatus("local"); console.warn("Firebase SDK y\u00fcklenmedi (ilk a\u00e7\u0131l\u0131\u015fta internet gerekir)."); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    var db=firebase.firestore();
    db.enablePersistence({synchronizeTabs:true}).catch(function(e){ console.warn("persistence", e); });
    FB.coll=db.collection("farms").doc(FARM_CODE).collection("cycles");
    FB.gorevColl=db.collection("farms").doc(FARM_CODE).collection("gorevler");
    FB.ready=true;
    rebuildSynced();
    rebuildSyncedG();
    FB.coll.onSnapshot({includeMetadataChanges:true}, function(snap){
      loadData();
      var realChange=false, needPush=false;
      snap.docChanges().forEach(function(ch){
        var data=ch.doc.data();
        if(ch.type==="removed"){
          if(_synced[data.id]!==undefined) realChange=true;
          memData.cycles=memData.cycles.filter(function(x){return x.id!==data.id;});
          delete _synced[data.id];
        } else {
          var nj=cycleJSON(data);
          if(_synced[data.id]!==nj) realChange=true;
          var li=-1;
          for(var i=0;i<memData.cycles.length;i++){ if(memData.cycles[i].id===data.id){ li=i; break; } }
          if(li>=0){ var mg=mergeCycle(memData.cycles[li], data); memData.cycles[li]=mg; if(cycleJSON(mg)!==nj) needPush=true; }
          else memData.cycles.push(data);
          _synced[data.id]=nj;
        }
      });
      if(needPush) fbPushDirty();
      if(!FB.firstServer && !snap.metadata.fromCache){
        FB.firstServer=true;
        var cloud={}; snap.forEach(function(dd){ cloud[dd.id]=1; });
        ((memData.cycles)||[]).forEach(function(c){ if(!cloud[c.id]){ _synced[c.id]=cycleJSON(c); FB.coll.doc(c.id).set(fbClean(c)).catch(function(e){ console.warn("ilk senkron set",e); _syncFailCount++; fbSetStatus("hata"); }); } });
      }
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(memData)); }catch(e){ console.warn("senkron sonrası yerel kayıt yazılamadı", e); }
      fbSetStatus(snap.metadata.fromCache?"offline":"synced");
      if(realChange && !isTyping()) render();
    }, function(err){ console.warn("snapshot",err); fbSetStatus("offline"); });

    FB.gorevColl.onSnapshot({includeMetadataChanges:true}, function(snap){
      loadData();
      var realChange=false;
      snap.docChanges().forEach(function(ch){
        var data=ch.doc.data();
        if(ch.type==="removed"){
          if(_syncedG[data.id]!==undefined) realChange=true;
          memData.gorevler=memData.gorevler.filter(function(x){return x.id!==data.id;});
          delete _syncedG[data.id];
        } else {
          var nj=cycleJSON(data);
          if(_syncedG[data.id]!==nj) realChange=true;
          var li=-1;
          for(var i=0;i<memData.gorevler.length;i++){ if(memData.gorevler[i].id===data.id){ li=i; break; } }
          if(li>=0) memData.gorevler[li]=data; else memData.gorevler.push(data);
          _syncedG[data.id]=nj;
        }
      });
      if(!FB.firstServerG && !snap.metadata.fromCache){
        FB.firstServerG=true;
        var cloud={}; snap.forEach(function(dd){ cloud[dd.id]=1; });
        ((memData.gorevler)||[]).forEach(function(g){ if(!cloud[g.id]){ _syncedG[g.id]=cycleJSON(g); FB.gorevColl.doc(g.id).set(fbClean(g)).catch(function(e){ console.warn("ilk senkron setG",e); _syncFailCount++; fbSetStatus("hata"); }); } });
      }
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(memData)); }catch(e){ console.warn("senkron sonrası yerel kayıt yazılamadı", e); }
      if(realChange && !isTyping()) render();
    }, function(err){ console.warn("snapshotG",err); });

    /* Hasat Takip'ten gelen tartı verileri (salt-okunur) */
    FB.hasatColl = db.collection("farms").doc(FARM_CODE).collection("hasat_tarti");
    FB.hasatColl.onSnapshot({includeMetadataChanges:true}, function(snap){
      if(!window._hasatTarti) window._hasatTarti = {};
      var changed=false;
      snap.docChanges().forEach(function(ch){
        var data=ch.doc.data();
        var key=ch.doc.id;
        if(ch.type==="removed"){ delete window._hasatTarti[key]; changed=true; }
        else { window._hasatTarti[key]=data; changed=true; }
      });
      if(changed && !isTyping()) render();
    }, function(err){ console.warn("snapshotHasat",err); });

    /* Ayarlar (firmalar, protokol, oda m², sıcaklık sınırları, konumlar, görev türleri, personel vb.)
       — tek bir belge olarak senkronize edilir, tüm cihazlar aynı ayarları görür. */
    FB.settingsDoc = db.collection("farms").doc(FARM_CODE).collection("meta").doc("settings");
    FB.settingsDoc.onSnapshot({includeMetadataChanges:true}, function(snap){
      if(!snap.exists){
        /* Bulutta henüz ayar yok — yereldekini ilk kez gönder */
        _settingsFirstSyncDone = true;
        fbPushSettings();
        return;
      }
      var remote = snap.data();
      if(!remote){ _settingsFirstSyncDone = true; return; }
      var j = JSON.stringify(remote);
      _settingsFirstSyncDone = true; /* buluttan en az bir kez veri aldık — artık göndermek güvenli */
      if(_syncedSettings===j) return; /* kendi yazdığımızın yankısı */
      _syncedSettings = j;
      var d=loadData();
      d.settings = remote;
      try{ localStorage.setItem(STORE_KEY, JSON.stringify(memData)); }catch(e){ console.warn("senkron sonrası yerel kayıt yazılamadı", e); }
      if(!isTyping()) render();
    }, function(err){ console.warn("snapshotSettings",err); _settingsFirstSyncDone = true; });
    /* NOT: Önceden burada "6 sn sonra ne olursa olsun izin ver" diye bir güvenlik ağı vardı.
       Bu, zayıf sinyalli bir cihazın henüz güncel bulut ayarlarını görmeden kendi eski/yerel
       ayarlarını buluta basmasına ve başka bir cihazın az önce yaptığı değişikliği ezmesine
       yol açıyordu (Ayarlar'daki değişikliklerin "yutulması" sorunu). Artık KALDIRILDI —
       cihaz gerçek bulut verisini görmeden (ya da net bir hata almadan) ayar göndermez.
       Yerel değişiklikler yine de localStorage'a hemen kaydedilir, sadece buluta gönderim
       gerçek veri gelene kadar bekletilir. */
  }catch(e){ console.warn("fbInit",e); fbSetStatus("local"); }
}
var _syncedSettings=null;
var _settingsFirstSyncDone=false; /* buluttan en az bir kez güncel ayar alınana kadar YEREL ayarları buluta göndermeyi engeller — eski veri yeniyi ezmesin */
function fbPushSettings(){
  if(!FB.ready || !FB.settingsDoc) return;
  if(!_settingsFirstSyncDone) return; /* henüz buluttaki güncel hali görmedik — göndermek riskli, bekle */
  var d=loadData(); if(!d.settings) d.settings={};
  var j=JSON.stringify(d.settings);
  if(_syncedSettings===j) return;
  FB.settingsDoc.set(fbClean(d.settings)).then(function(){
    _syncedSettings=j;
  }).catch(function(e){ console.warn("setSettings",e); fbSetStatus("hata"); });
}

/* Belirli oda+tur için Hasat Takip kayıtlarını getir (tarihe göre sıralı) */
function hasatTartiGetir(oda, tur){
  var out=[];
  var store=window._hasatTarti||{};
  Object.keys(store).forEach(function(k){
    var d=store[k];
    if(d && d.oda===oda && String(d.tur)===String(tur)) out.push(d);
  });
  out.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  return out;
}


/* ---------- Depolama (offline, localStorage + bellek yedeği) ---------- */
var STORE_KEY = "uretim_takip_v1";
var APP_VER = "v139";
var memData = null;
var _veriOkumaHatasi=false;
function loadData(){
  if(memData) return memData;
  var raw=null;
  try{ raw = localStorage.getItem(STORE_KEY); }
  catch(e){ console.error("localStorage okunamadı", e); }
  if(raw){
    try{
      memData = JSON.parse(raw);
    }catch(e){
      console.error("Kayıtlı veri bozuk — JSON.parse hatası", e);
      /* Bozuk ham veriyi ASLA kaybetme: ayrı bir anahtara yedekle ki elle kurtarılabilsin.
         Aksi halde ilk saveData() bozuk veriyi ezerdi ve geri dönüşü olmazdı. */
      try{ localStorage.setItem(STORE_KEY+"_bozuk_"+Date.now(), raw); }catch(e2){ console.error("bozuk veri yedeklenemedi", e2); }
      _veriOkumaHatasi=true;
      memData = {cycles:[]};
    }
  } else {
    memData = {cycles:[]};
  }
  if(!memData || typeof memData !== "object") memData = {cycles:[]};
  if(!Array.isArray(memData.cycles)) memData.cycles = [];
  if(!memData.settings || typeof memData.settings !== "object") memData.settings = {};
  if(!Array.isArray(memData.gorevler)) memData.gorevler = [];
  return memData;
}
function saveData(){

function normalizeOda(s){
  if(!s) return "";
  var x = s.toString().trim().toUpperCase().replace(/İ/g,"I").replace(/Ş/g,"S").replace(/Ç/g,"C").replace(/Ğ/g,"G").replace(/Ü/g,"U").replace(/Ö/g,"O");
  var m = x.match(/([A-Z]+)\s*[-\/ .]?\s*(\d+)/);
  if(m) return m[1] + "-" + parseInt(m[2],10);
  return x.replace(/\s+/g,"");
}

/* Çoklu atama: değer virgülle ayrılmış (ör. "grup:ic" veya "kisi:a,kisi:b") */
function atamaParse(val){ return (val||"").split(",").map(function(s){return s.trim();}).filter(Boolean); }
/* Çoklu kişi seçim arayüzü — onclickExpr: butona val gömülü tam onclick ifadesi üreten fonksiyon */
function atamaCokluHTML(mevcut, onclickExpr){
  var secili=atamaParse(mevcut);
  var ekipler=getEkipler();
  function rozet(val,label,renk){
    var on=secili.indexOf(val)>=0;
    return '<button type="button" onclick="'+onclickExpr(val)+'" '
      +'style="display:inline-block; margin:3px; padding:4px 10px; border-radius:14px; border:1.5px solid '+renk+'; font-size:13px; cursor:pointer; '
      +(on?('background:'+renk+'; color:#fff;'):('background:#fff; color:'+renk+';'))+'">'+esc(label)+'</button>';
  }
  var h='<div style="margin-top:4px;">';
  h+='<div style="font-size:12px; color:#888; margin:2px;">Grup:</div>';
  ekipler.forEach(function(ek){ h+=rozet("grup:"+ek.id, "👥 "+ek.ad, ekipRenk(ek.id)); });
  ekipler.forEach(function(ek){
    var uyeler=getPersonelList().filter(function(p){return p.grup===ek.id;});
    if(uyeler.length){
      h+='<div style="font-size:12px; color:#888; margin:4px 2px 2px;">'+esc(ek.ad)+':</div>';
      uyeler.forEach(function(p){ h+=rozet("kisi:"+p.id, p.ad, ekipRenk(ek.id)); });
    }
  });
  h+='</div>';
  return h;
}
function atamaLabel(val){
  if(!val) return "";
  var parts=atamaParse(val);
  if(!parts.length) return "";
  return parts.map(function(v){
    if(v.indexOf("grup:")===0) return "👥 "+ekipAdi(v.slice(5));
    if(v.indexOf("kisi:")===0){ var p=personelBul(v.slice(5)); return p?("👤 "+esc(p.ad)):"👤 (silinmiş)"; }
    return "";
  }).filter(Boolean).join(" · ");
}
/* Atanan grup/kişi kodlarını gerçek isim listesine çevirir (WhatsApp mesajı için) */
function atamaIsimListesi(val){
  var parts=atamaParse(val); var isimler=[];
  parts.forEach(function(p){
    if(p.indexOf("grup:")===0){
      var gid=p.slice(5);
      getPersonelList().filter(function(x){return x.grup===gid;}).forEach(function(x){ if(isimler.indexOf(x.ad)<0) isimler.push(x.ad); });
    }
    else if(p.indexOf("kisi:")===0){ var per=personelBul(p.slice(5)); if(per && isimler.indexOf(per.ad)<0) isimler.push(per.ad); }
  });
  return isimler;
}

/* Seçili görevlerin tamamını, oda + iş + atanan kişilerle tek mesajda birleştirir. */
function gorevTopluMesajOlustur(){
  var items=nextTasks();
  var lines=[];
  items.forEach(function(i){
    if(i.odaGorev) return; /* manuel oda işlemleri toplu gönderime dahil değil */
    if(!gorevSecili(i)) return;
    var isimler=atamaIsimListesi(i.atama||"");
    var satir=(i.oda||"")+": "+kisaGorevAdi(i.txt||"");
    if(isimler.length) satir+=" — "+isimler.join(", ");
    lines.push(satir);
  });
  if(!lines.length) return null;
  return "📋 GÖREV PLANI\n\n"+lines.join("\n");
}
function gorevTopluGonder(){
  var msg=gorevTopluMesajOlustur();
  if(!msg){ toast("Önce en az bir görev seç"); return; }
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }
  _gorevSecili={};
  toast("✓ Gönderildi — seçim temizlendi");
  render();
}
function gorevPlanlaGonder(oda, txt, atamaVal){
  var isimler=atamaIsimListesi(atamaVal);
  if(!isimler.length){ toast("Önce personel/ekip seç"); return; }
  var mesaj=(oda||"")+" "+kisaGorevAdi(txt)+" "+isimler.join(" ");
  /* Not: chat.whatsapp.com grup davet linkleri metin ön-doldurmayı desteklemiyor.
     wa.me/?text= WhatsApp'ı mesaj hazır açar, hangi sohbete gönderileceğini kullanıcı seçer. */
  window.open("https://wa.me/?text="+encodeURIComponent(mesaj), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(mesaj).catch(function(e){ console.warn("clipboard", e); }); }
}

function protokolTarih(c, step){

  if(c.gelisTarihi) return addDays(c.gelisTarihi,getSet(c).offToprak+step.gun);

}

/* ---- Sıcaklık üst sınırları (havadan önceki dönem) ---- */
var ODA_MAX = 21, KOMPOST_IDEAL_MAX = 26, KOMPOST_IDEAL_MIN = 24, KOMPOST_KRITIK_ALT = 21, KOMPOST_KRITIK_UST = 28, KOMPOST_TEHLIKELI = 30, KOMPOST_TEHLIKE_ALT = 18;
var SICAKLIK_VARSAYILAN = { odaMax:21, idealMin:24, idealMax:26, kritikAlt:21, kritikUst:28, tehlikeAlt:18, tehlikeUst:30 };
function getSicaklik(){
  var d=loadData(); var s=(d.settings&&d.settings.sicaklik)||{};
  function g(v,def){ var n=numParse(v); return (n!=null)?n:def; }
  return {
    odaMax:    g(s.odaMax,    SICAKLIK_VARSAYILAN.odaMax),
    idealMin:  g(s.idealMin,  SICAKLIK_VARSAYILAN.idealMin),
    idealMax:  g(s.idealMax,  SICAKLIK_VARSAYILAN.idealMax),
    kritikAlt: g(s.kritikAlt, SICAKLIK_VARSAYILAN.kritikAlt),
    kritikUst: g(s.kritikUst, SICAKLIK_VARSAYILAN.kritikUst),
    tehlikeAlt:g(s.tehlikeAlt,SICAKLIK_VARSAYILAN.tehlikeAlt),
    tehlikeUst:g(s.tehlikeUst,SICAKLIK_VARSAYILAN.tehlikeUst)
  };
}
function refreshSicaklik(){
  var S=getSicaklik();
  ODA_MAX=S.odaMax; KOMPOST_IDEAL_MIN=S.idealMin; KOMPOST_IDEAL_MAX=S.idealMax;
  KOMPOST_KRITIK_ALT=S.kritikAlt; KOMPOST_KRITIK_UST=S.kritikUst;
  KOMPOST_TEHLIKE_ALT=S.tehlikeAlt; KOMPOST_TEHLIKELI=S.tehlikeUst;
}
function numParse(s){ if(s===""||s==null) return null; var n=parseFloat((""+s).replace(",",".")); return isNaN(n)?null:n; }
function lastVal(c, field){
  if(!c.gunluk) return null;
  for(var i=c.gunluk.length-1;i>=0;i--){
    var n=numParse(c.gunluk[i][field]);
    if(n!==null) return n;
  }
  return null;
}
function lastTxt(c, field){
  if(!c.gunluk) return "";
  for(var i=c.gunluk.length-1;i>=0;i--){ var v=c.gunluk[i][field]; if(v) return v; }
  return "";
}
function gunMeta(r){
  var b="";
  if(r.amonyak==="Var") b+='<span style="color:#b45309;">amonyak ✓</span> ';
  if(r.nem==="Yüksek") b+='<span style="color:#1d6fb8;">nem ↑</span> ';
  else if(r.nem==="Düşük") b+='<span style="color:#b45309;">nem ↓</span> ';
  return b;
}
function tempAlerts(){
  var d=loadData(); var out=[];
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi) return;
    var ko=lastVal(c,"kompostC"), od=lastVal(c,"odaC");
    if(!airStarted(c)){
      if(ko!==null){
        if(ko>=KOMPOST_TEHLIKELI) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:2, txt:"Kompost "+ko+"\u00b0 \u2014 TEHL\u0130KEL\u0130 (30\u00b0+), hemen m\u00fcdahale"});
        else if(ko>=KOMPOST_KRITIK_UST) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:1, txt:"Kompost "+ko+"\u00b0 \u2014 KR\u0130T\u0130K (28\u00b0+), d\u00fc\u015f\u00fcr"});
        else if(ko>KOMPOST_IDEAL_MAX) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:0, txt:"Kompost "+ko+"\u00b0 \u2014 ideal 24-26\u00b0, hafif y\u00fcksek"});
        else if(ko<=KOMPOST_TEHLIKE_ALT) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:2, txt:"Kompost "+ko+"\u00b0 \u2014 TEHL\u0130KEL\u0130 (18\u00b0 alt\u0131), acil m\u00fcdahale"});
        else if(ko<=KOMPOST_KRITIK_ALT) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:1, txt:"Kompost "+ko+"\u00b0 \u2014 KR\u0130T\u0130K (21\u00b0 alt\u0131), misel \u00e7ok yava\u015flar"});
        else if(ko<KOMPOST_IDEAL_MIN) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:0, txt:"Kompost "+ko+"\u00b0 \u2014 ideal 24-26\u00b0, hafif d\u00fc\u015f\u00fck"});
      }
      if(od!==null && od>ODA_MAX) out.push({cid:c.id, oda:c.oda, key:"oda", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 \u00fcst s\u0131n\u0131r "+ODA_MAX+"\u00b0, d\u00fc\u015f\u00fcr"});
    } else {
      var hed=havaHedef(c);
      if(hed!==null && od!==null){
        var diff=od-hed;
        if(diff>1) out.push({cid:c.id, oda:c.oda, key:"odaHedef", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 bug\u00fcnk\u00fc hedef "+hed+"\u00b0, "+diff.toFixed(1)+"\u00b0 y\u00fcksek, d\u00fc\u015f\u00fcr"});
        else if(diff<-1) out.push({cid:c.id, oda:c.oda, key:"odaHedef", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 bug\u00fcnk\u00fc hedef "+hed+"\u00b0, "+(-diff).toFixed(1)+"\u00b0 d\u00fc\u015f\u00fck, y\u00fckselt"});
      }
    }
  });
  return out;
}
/* ---- Kritik/tehlikeli sıcaklık ikazları: rol bazlı "gördüm" işareti ---- */
function tempAckGet(c,key){ return c && c.tempAck && c.tempAck[key] && c.tempAck[key][currentRole]; }
function tempAckOthers(c,key,sig){
  if(!c || !c.tempAck || !c.tempAck[key]) return [];
  var out=[];
  Object.keys(c.tempAck[key]).forEach(function(r){
    if(r!==currentRole && c.tempAck[key][r] && c.tempAck[key][r].sig===sig && ROLE_DEFS[r]) out.push(ROLE_DEFS[r].ad);
  });
  return out;
}
function tempAckSet(cid,key){
  if(!currentRole) return;
  var alerts=tempAlerts();
  var match=alerts.find(function(x){return x.cid===cid && x.key===key;});
  if(!match) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  if(!c.tempAck) c.tempAck={};
  if(!c.tempAck[key]) c.tempAck[key]={};
  c.tempAck[key][currentRole]={sig:match.txt, at:new Date().toISOString()};
  saveData(); render();
}

/* Tek seferlik ikazlar: "Yapıldı" (bu döngü için bir daha gösterme) / "Ertele" (yarına kadar gizle) */
function oneTimeActive(c, field){
  if(c[field+"Yapildi"]) return false;
  var er=c[field+"Ertele"];
  if(er && er>=todayISO()) return false;
  return true;
}
function oneTimeDone(field, cid){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  c[field+"Yapildi"]=true; delete c[field+"Ertele"]; saveData(); toast("İşaretlendi"); render();
}
function oneTimeErtele(field, cid){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  c[field+"Ertele"]=addDays(todayISO(),1); saveData(); toast("Yarına ertelendi"); render();
}

/* Ateşlenme (kompostta ısınma): gelişten 7-8. gün ziraat mühendisi kontrolü */
function atesAlerts(){
  var d=loadData(); var out=[]; var today=todayISO();
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi || !c.gelisTarihi) return;
    if(c.toprakTarihi && daysBetween(c.toprakTarihi,today)>=0) return; /* toprak serildiyse geçti */
    if(!oneTimeActive(c,"ates")) return;
    var g=daysBetween(c.gelisTarihi, today);
    if(g!==null && g>=7 && g<=8) out.push({cid:c.id, oda:c.oda, gun:g});
  });
  return out;
}

/* Erken poşet: gelişten 3-5. gün nem/sıcaklık/amonyak kötüyse misel patlayınca poşet erken açılabilir */
function posetAlerts(){
  var d=loadData(); var out=[]; var today=todayISO();
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi || !c.gelisTarihi || c.toprakTarihi) return;
    if(!oneTimeActive(c,"poset")) return;
    var g=daysBetween(c.gelisTarihi,today); if(g===null || g<3 || g>=6) return;
    var nem=lastTxt(c,"nem"), am=lastTxt(c,"amonyak"), ko=lastVal(c,"kompostC");
    var sebep=[];
    if(nem==="Yüksek"||nem==="Düşük") sebep.push("nem "+nem.toLowerCase());
    if(am==="Var") sebep.push("amonyak kokusu");
    if(ko!==null && ko>=KOMPOST_KRITIK_UST) sebep.push("yüksek sıcaklık");
    if(sebep.length) out.push({cid:c.id, oda:c.oda, gun:g, sebep:sebep.join(", ")});
  });
  return out;
}

function nextTasks(){
  var d=loadData(); var today=todayISO(); var items=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.tip==="uyari") return; /* ateşlenme üstte ayrı kutuda gösteriliyor */
      if(s.tip==="ilac" || s.tip==="su") return; /* sulamalar görev listesinde değil, oda içinde */
      var base=protokolTarih(c,s); if(!base) return;
      var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
      var t = ert ? addDays(base,ert) : base;
      var sure = parseInt(s.sure,10)||1;         /* işin kaç gün sürdüğü (hasat=5 gibi) */
      var tekrarG = parseInt(s.tekrar,10)||0;    /* periyodik iş: kaç günde bir tekrar */
      /* Tekrarlı iş (örn. oda yıkama): ✓'lanınca kalıcı bitmez, tekrarG gün sonra yeniden çıkar */
      if(tekrarG>0){
        var son=(c.doneSon&&c.doneSon["p"+idx])||null;
        var tNext = son ? addDays(son,tekrarG) : t;
        var offT=daysBetween(today,tNext); if(offT===null) return;
        if((offT>=0 && offT<=1) || (offT<0 && offT>=-7)){
          items.push({cid:c.id, idx:idx, off:offT, date:tNext, oda:c.oda, txt:s.txt, tip:s.tip, sahip:s.sahip||"", done:false, overdue:offT<0, ertelendi:false, tekrarli:true, tekrarG:tekrarG, atama:(c.atama&&c.atama["p"+idx])||""});
        }
        return;
      }
      var off=daysBetween(today,t); if(off===null) return;
      var done = !!(c.done && c.done["p"+idx]);
      /* Çok günlük iş (örn. hasat 5 gün): başlangıç geçse de son güne kadar "devam ediyor" sayılır,
         gecikmiş DEĞİL. Ancak son gün de geçtiyse gerçekten gecikmiştir. */
      var sonGun = addDays(t, sure-1);
      var offEnd = daysBetween(today, sonGun);
      var devamEdiyor = (!done && sure>1 && off<0 && offEnd>=0);
      var overdue = (!done && offEnd<0);
      var goster = (off>=0 && off<=1)                 /* bugün + yarın */
                || devamEdiyor                         /* çok günlük iş sürüyor */
                || (overdue && offEnd>=-7);            /* gecikmiş (7 güne kadar göster) */
      if(goster){
        var kacinciGun = devamEdiyor ? (daysBetween(t,today)+1) : 0;
        items.push({cid:c.id, idx:idx, off:off, date:t, oda:c.oda, txt:s.txt, tip:s.tip, sahip:s.sahip||"", done:done, overdue:overdue, devamGun:kacinciGun, sureGun:sure, ertelendi:!!ert, atama:(c.atama&&c.atama["p"+idx])||""});
      }
    });
  });
  /* Odaya özel, tek seferlik işlemler (Görevler sekmesinden manuel eklenen) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).forEach(function(og){
      if(og.done) return; /* tamamlananlar listede kalmasın */
      var base=og.tarih; if(!base) return;
      var ert=og.ertele||0;
      var t = ert ? addDays(base,ert) : base;
      var off=daysBetween(today,t); if(off===null) return;
      if((off>=0 && off<=1) || (off<0 && off>=-7)){
        items.push({cid:c.id, ogId:og.id, off:off, date:t, oda:c.oda, txt:og.is, tip:"olay", sahip:og.atama?"":"", odaGorev:true, done:false, overdue:off<0, ertelendi:!!ert});
      }
    });
  });
  getPlan().filter(function(x){return !x.done && x.cikis;}).forEach(function(x){
    var off=daysBetween(today, x.cikis);
    if(off===null) return;
    if(off===1){
      items.push({plan:true, planId:x.id, off:1, date:x.cikis, oda:x.oda||"—",
        txt:"Yarın kompost gelecek ("+(x.firma||"firma")+") — bugün firma ile görüşülecek",
        tip:"olay", sahip:"ziraat", done:!!x.irtibat, overdue:false, komGorusme:true});
    } else if(off===0){
      items.push({plan:true, planId:x.id, off:0, date:x.cikis, oda:x.oda||"—",
        txt:"Kompost BUGÜN geliyor ("+(x.firma||"firma")+") — karşıla, oda oluştur",
        tip:"olay", sahip:"ekip", done:false, overdue:false, komGelis:true});
    } else if(off<0 && off>=-2){
      items.push({plan:true, planId:x.id, off:off, date:x.cikis, oda:x.oda||"—",
        txt:"Kompost geldi ama oda oluşturulmadı ("+(x.firma||"firma")+")",
        tip:"olay", sahip:"ekip", done:false, overdue:true, komGelis:true});
    }
  });
  items.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:(a.oda<b.oda?-1:1)); });
  return items;
}
/* Protokol adımının metnine göre hangi tarih alanına (tiftikTarihi/toprakTarihi/
   tirmikTarihi/havaBaslangic) karşılık geldiğini bulur. toggleTask'ta kullanılır. */
function protokolAdimAlanKey(txt){
  if(!txt) return null;
  if(/tiftik/i.test(txt)) return "tiftik";
  if(/tırmık/i.test(txt)) return "tirmik";
  if(/toprak/i.test(txt)) return "toprak";
  if(/hava/i.test(txt)) return "hava";
  return null;
}
/* Bir odanın SIRADAKİ (henüz yapılmamış, en yakın tarihli) protokol adımını bulur.
   Günlük Tur ekranında ziraat mühendisinin gözlemine göre "yarın yapalım" diyebilmesi için. */
function siradakiProtokolAdimi(c){
  var best=null;
  getProtokol().forEach(function(s,idx){
    if(s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return;
    var done=!!(c.done && c.done["p"+idx]); if(done) return;
    var base=protokolTarih(c,s); if(!base) return;
    var ert=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var t=ert?addDays(base,ert):base;
    if(!best || t<best.t){ best={idx:idx, t:t, txt:s.txt}; }
  });
  return best;
}
/* Günlük Tur'da "Yarın X yapılsın" — mevcut Ertele mekanizmasını TERS yönde kullanır
   (Ertele +gün ekler, bu -gün ekleyerek tarihi öne çeker). Yeni bir veri modeli gerekmez,
   aynı c.ertele alanı okunur; Görevler listesi ve puanlama otomatik olarak günceli görür. */
function protokolYarinaCek(cid, idx){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  if(!confirm('"'+s.txt+'" yarın için planlansın mı?')) return;
  var base=protokolTarih(c,s); if(!base) return;
  var yarin=addDays(todayISO(),1);
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var mevcutTarih=addDays(base,mevcutErt);
  var fark=daysBetween(mevcutTarih, yarin);
  if(!c.ertele) c.ertele={};
  c.ertele["p"+idx]=mevcutErt+fark;
  gunlukGorevNotEkle(c, s.txt+" için yarın planlandı (günlük turda ziraat mühendisi kararı)");
  touchCycle(c); saveData(); toast("Yarın için planlandı: "+s.txt); render();
}
/* "Dün ne yaptıysan aynısı" — sulama/ilaçlama genelde birkaç gün aynı gidiyor,
   dropdown'dan tekrar seçmek yerine dünkü kaydı tek dokunuşla kopyalar. */
function peKopyalaDun(cid){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var dun=addDays(todayISO(),-1);
  var dr=(c.gunluk||[]).find(function(r){return r.tarih===dun;});
  if(!dr || (!dr.sulama && !dr.su)){ toast("Dün için sulama/ilaç kaydı yok"); return; }
  if(el("pe_islem")) el("pe_islem").value = dr.sulama||"";
  if(el("pe_su")){ el("pe_su").value = dr.su||0; if(el("pe_su_lbl")) el("pe_su_lbl").textContent=(dr.su||0)+" lt"; }
  toast("Dünkü sulama/ilaç kopyalandı — kontrol et");
}
function turKopyalaDun(cid){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var dun=addDays(todayISO(),-1);
  var dr=(c.gunluk||[]).find(function(r){return r.tarih===dun;});
  if(!dr || (!dr.sulama && !dr.su)){ toast("Dün için sulama/ilaç kaydı yok"); return; }
  var card=document.querySelector('[data-cid="'+cid+'"]'); if(!card) return;
  var sE=card.querySelector('.tur_sulama'); if(sE) sE.value=dr.sulama||"";
  var suE=card.querySelector('.tur_su'); if(suE){ suE.value=dr.su||0; var lbl=el(suE.id+"_lbl"); if(lbl) lbl.textContent=(dr.su||0)+" lt"; }
  toast("Dünkü sulama/ilaç kopyalandı — kontrol et");
}
/* Günlük Tur / panoEdit ekranında, sulamanın altında sıradaki adımı gösterir.
   Adım BUGÜN (ya da daha erken/gecikmiş) ise direkt işaretlenebilir bir kutucuk
   çıkar — Görevler sekmesine ayrıca gitmeye gerek kalmaz. İleri bir tarihse
   "yarına çek" butonu gösterilir. */
function turSiradakiAdimHTML(c){
  var sd=siradakiProtokolAdimi(c);
  if(!sd) return "";
  var today=todayISO();
  if(sd.t<=today){
    var done=!!(c.done && c.done["p"+sd.idx]);
    return '<div style="margin-top:8px; padding-top:8px; border-top:1px solid #eee;">'
      + '<label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer;">'
      + '<input type="checkbox" '+(done?'checked':'')+' onchange="toggleTask(\''+c.id+'\','+sd.idx+')" style="width:22px;height:22px; flex:none;">'
      + '<span>'+(sd.t<today?'<span style="color:#c0291f;">Gecikmiş —</span> ':'<b>Bugün:</b> ')+esc(sd.txt)+' — yapıldı mı?</span>'
      + '</label></div>';
  }
  var yarin=addDays(today,1);
  return '<div style="margin-top:8px; padding-top:8px; border-top:1px solid #eee;">'
    + '<div class="muted" style="font-size:12px;">Sıradaki adım: <b>'+esc(sd.txt)+'</b> — beklenen '+fmtDate(sd.t)+(sd.t===yarin?' (yarın)':'')+'</div>'
    + '<button class="btn ghost small" style="margin-top:4px;" onclick="protokolYarinaCek(\''+c.id+'\','+sd.idx+')">✓ Yarın '+esc(sd.txt)+' yapılsın</button>'
    + '</div>';
}
function toggleTask(cid, idx){
  var c=loadData().cycles.find(function(x){return x.id===cid;});
  if(!c) return;
  var P=getProtokol();
  var st=P[idx];
  /* Tekrarlı iş (örn. oda yıkama, tekrar:N): kalıcı "bitti" yok —
     bugünü son-yapılma olarak kaydet, N gün sonra görev yeniden çıkar. */
  var tekrarG = st ? (parseInt(st.tekrar,10)||0) : 0;
  if(tekrarG>0){
    if(!c.doneSon) c.doneSon={};
    c.doneSon["p"+idx]=todayISO();
    gunlukGorevNotEkle(c, st.txt+" yapıldı ("+tekrarG+" gün sonra tekrar hatırlatılacak)");
    saveData(); render(); return;
  }
  if(!c.done) c.done={};
  var yeniDurum=!c.done["p"+idx];
  c.done["p"+idx]=yeniDurum;
  if(yeniDurum){
    if(st) gunlukGorevNotEkle(c, st.txt+" yap\u0131ld\u0131");
    /* KRİTİK: Tiftik/Toprak/Tırmık/Hava gibi adımlar için ilgili tarih alanını da
       otomatik doldur. Aksi halde sulama/ilaçlama engeli ("poşet açılmadı") kalkmaz —
       o kontrol bu işaret kutusuna değil, gerçek tiftikTarihi vb. alanına bakıyor. */
    if(st){
      var alanKey=protokolAdimAlanKey(st.txt);
      if(alanKey && !c[alanKey+"Tarihi"] && alanKey!=="hava"){
        c[alanKey+"Tarihi"]=todayISO();
        touchCycle(c);
      } else if(alanKey==="hava" && !c.havaBaslangic){
        c.havaBaslangic=todayISO();
        touchCycle(c);
      }
    }
  }
  saveData(); render();
}
/* Protokol görevini (Tiftik/Toprak/Poşet kesimi vb.) 1 gün ertele.
   sebep: "biyolojik" (sarım/gelişme zayıf — haklı sebep, puan kırılmaz) veya
   "diger" (ekip yetişmedi/unutuldu vb. — önlenebilir, puan kırılır). Sebep, o
   protokol adımına kalıcı olarak kaydedilir ve odaPerformans() bunu okur. */
function protokolGorevErtele(cid, idx, sebep){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var P=getProtokol(); var adimTxt=(P[idx]?P[idx].txt:"bu işlem");
  var sebepTxt = (sebep==="biyolojik") ? "gelişme/sarım yavaş olduğu için" : "başka bir sebeple";
  if(!confirm('"'+adimTxt+'" — '+sebepTxt+' 1 gün ertelensin mi?')) return;
  if(!c.ertele) c.ertele={};
  c.ertele["p"+idx]=(c.ertele["p"+idx]||0)+1;
  if(!c.erteleSebep) c.erteleSebep={};
  c.erteleSebep["p"+idx]=sebep||"diger";
  var sebepNot = (sebep==="biyolojik") ? " (gelişme/sarım nedeniyle — puan kırılmaz)" : " (ertelendi)";
  if(P[idx]) gunlukGorevNotEkle(c, P[idx].txt+" ertelendi (+1 gün)"+sebepNot);
  touchCycle(c); saveData(); toast("Ertelendi (+1 gün)"); render();
}

function fmtDate(iso){
  if(!iso) return "—";
  var p = iso.split("-");
  if(p.length!==3) return iso;
  return p[2]+"."+p[1]+"."+p[0];
}
function todayISO(){
  var d=new Date(); var m=("0"+(d.getMonth()+1)).slice(-2); var dd=("0"+d.getDate()).slice(-2);
  return d.getFullYear()+"-"+m+"-"+dd;
}
function parseISO(iso){ var p=(iso||"").split("-"); if(p.length!==3) return null; var y=+p[0],m=+p[1],d=+p[2]; if(isNaN(y)||isNaN(m)||isNaN(d)) return null; return Date.UTC(y,m-1,d); }
function cmpDate(a,b){ a=a||""; b=b||""; return a<b?-1:(a>b?1:0); }
function daysBetween(a,b){
  var da=parseISO(a), db=parseISO(b);
  if(da===null||db===null) return null;
  return Math.round((db-da)/86400000);
}
function gunNo(cycle, iso){
  var base = cycle.gelisTarihi;
  if(!base && cycle.gunluk && cycle.gunluk.length) base = cycle.gunluk[0].tarih;
  var d = daysBetween(base, iso);
  return d===null ? "" : d;   /* geliş = 0. gün */
}
function ortuGun(cycle, iso){
  if(!cycle.toprakTarihi) return null;
  var d = daysBetween(cycle.toprakTarihi, iso);
  return (d===null||d<0) ? null : d; /* toprak = 0. gün; öncesi boş */
}
function gunEtiket(c){
  var g=gunNo(c, todayISO());
  if(g==="") return "";
  var t=ortuGun(c, todayISO());
  return g + "/" + (t===null ? "\u2014" : t);
}
function addDays(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t + n*86400000);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* ---------- Oda performans puanı (100 üzerinden, kural tabanlı) ----------
   20 yıllık ziraat mühendisi mantığı: her gecikme veya her sıcaklık sapması
   otomatik puan kırmaz / otomatik affetmez. İki temel ilke:
   1) Gecikme, HAKLI bir biyolojik sebeple (sarım/gelişme zayıf) ertelendiyse
      puan kırılmaz — bu doğru bir karardı. Sebepsiz/önlenebilir gecikme
      (ekip yetişmedi, unutuldu vb.) puan kırar.
   2) Kompost sıcaklığı kritik/tehlikeli seviyede GEÇMİŞTE kaldıysa, daha sonra
      düzeltilmiş olsa bile o günlerin etkisi kalıcıdır — misel o günlerde
      zarar görmüş olabilir. Bu yüzden sadece ANLIK son ölçüme değil, kuluçka
      dönemindeki TÜM geçmiş kayıtlara bakılır. */
function odaPerformans(c){
  if(c.bosaltimTarihi) return null;
  var puan=100, nedenler=[];

  /* 1) Şu anki (canlı) sıcaklık durumu — küçük, anlık bir uyarı payı */
  tempAlerts().filter(function(a){return a.cid===c.id;}).forEach(function(a){
    if(a.lvl===2){ puan-=5; nedenler.push({tip:"kritik", metin:"Şu an tehlikeli sıcaklık: "+a.txt}); }
    else if(a.lvl===1){ puan-=3; nedenler.push({tip:"kritik", metin:"Şu an kritik sıcaklık: "+a.txt}); }
  });

  /* 2) GEÇMİŞ sıcaklık maruziyeti (kuluçka dönemi — toprak serilene kadar).
     Düzeltilmiş olsa bile kalıcı olarak puanı etkiler. */
  var kulucka = (c.gunluk||[]).filter(function(r){ return !c.toprakTarihi || r.tarih < c.toprakTarihi; });
  var tehlikeliGun=0, kritikGun=0;
  kulucka.forEach(function(r){
    var ko=numParse(r.kompostC); if(ko==null) return;
    if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeliGun++;
    else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
  });
  if(tehlikeliGun>0){
    var dT=Math.min(30, tehlikeliGun*8);
    puan-=dT;
    nedenler.push({tip:"kritik", metin:"Kuluçka döneminde "+tehlikeliGun+" gün tehlikeli sıcaklıkta kaldı — düzeltilmiş olsa bile misel o günlerde zarar görmüş olabilir (kalıcı puan kırılması)."});
  }
  if(kritikGun>0){
    var dK=Math.min(20, kritikGun*4);
    puan-=dK;
    nedenler.push({tip:"kritik", metin:"Kuluçka döneminde "+kritikGun+" gün kritik sıcaklıkta kaldı (kalıcı puan kırılması)."});
  }

  /* 3) Gecikmiş işlemler — sebebine göre değerlendirilir */
  var today=todayISO(), gecikmisListe=[], haklıGecikme=[];
  getProtokol().forEach(function(s,idx){
    if(s.tip==="uyari") return;
    if(s.tip==="ilac" || s.tip==="su") return; /* sulama günlük kayıttan takip edilir, puan hesabına dahil edilmez */
    var t=protokolTarih(c,s); if(!t) return;
    var done=!!(c.done && c.done["p"+idx]);
    if(t<today && !done){
      var sebep = c.erteleSebep && c.erteleSebep["p"+idx];
      if(sebep==="biyolojik") haklıGecikme.push(s.txt);
      else gecikmisListe.push(s.txt);
    }
  });
  if(gecikmisListe.length>0){
    var d1=Math.min(20,gecikmisListe.length*5); puan-=d1;
    nedenler.push({tip:"gecikme", metin:gecikmisListe.length+" gecikmiş işlem (sebepsiz/önlenebilir): "+gecikmisListe.join(" · ")});
  }
  if(haklıGecikme.length>0){
    nedenler.push({tip:"bilgi", metin:haklıGecikme.length+" işlem haklı sebeple (gelişme/sarım) ertelendi — puan kırılmadı: "+haklıGecikme.join(" · ")});
  }

  var son=sonGunluk(c);
  if(son && son.amonyak==="Var"){ puan-=5; nedenler.push({tip:"gozlem", metin:"Amonyak kokusu bildirilmiş."}); }
  ilacGecmisi(c).forEach(function(g){
    if(g.uyari.some(function(u){return u.indexOf("⚠️")===0;})){ puan-=10; nedenler.push({tip:"ilac", metin:g.ad+": hasat öncesi bekleme ihlali riski."}); }
  });
  puan=Math.max(0, Math.min(100, Math.round(puan)));
  return {puan:puan, nedenler:nedenler};
}
function puanRenk(p){ return p>=85?"var(--green)":(p>=70?"var(--amber)":"#c0291f"); }

  var p=odaPerformans(c); if(!p) return "";

    +'<div style="flex:1;">'

        }).join(''))
    +'</div></div>';
  return sectionCard('🎯 Üretim performans puanı', body);
}
function hasatKaymasi(c){
  var ort=ortKompostSicaklik(c);
  if(ort==null) return {kayma:0, neden:[]};
  var kayma=0, neden=[];
  if(ort>=KOMPOST_TEHLIKELI){ kayma=-3; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (tehlikeli yüksek) — misel çok hızlanmış olabilir, hasat ~3 gün erkene kayabilir."); }
  else if(ort>=KOMPOST_KRITIK_UST){ kayma=-2; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (kritik yüksek) — misel hızlanmış olabilir, hasat ~2 gün erkene kayabilir."); }
  else if(ort>KOMPOST_IDEAL_MAX){ kayma=-1; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (ideal üstü) — hasat ~1 gün erkene kayabilir."); }
  else if(ort<=KOMPOST_TEHLIKE_ALT){ kayma=2; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (tehlikeli düşük) — misel gelişimi yavaşlamış olabilir, hasat ~2 gün gecikebilir."); }
  else if(ort<=KOMPOST_KRITIK_ALT){ kayma=1; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (kritik düşük) — hasat ~1 gün gecikebilir."); }
  else if(ort<KOMPOST_IDEAL_MIN){ kayma=1; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (ideal altı) — hasat ~1 gün gecikebilir."); }
  return {kayma:kayma, neden:neden};
}
function beklenenHasat(c){
  var S=getSet(c);
  var baz;
  if(c.toprakTarihi) baz=addDays(c.toprakTarihi,S.offHasat);
  else if(c.gelisTarihi) baz=addDays(c.gelisTarihi,S.offToprak+S.offHasat);
  else return null;
  var k=hasatKaymasi(c);
  return k.kayma ? addDays(baz,k.kayma) : baz;
}

function hasatBaslangic(c){
  if(c.hasat && c.hasat.length){ var ds=c.hasat.map(function(h){return h.tarih;}).filter(Boolean).sort(); if(ds.length) return ds[0]; }
  return beklenenHasat(c);
}
function hasatAsama(c, iso){
  var bas=hasatBaslangic(c); if(!bas) return null;
  var hd=daysBetween(bas, iso); if(hd===null||hd<0) return null;
  var gun=hd+1, found=null;
  HASAT_PLAN.forEach(function(x){ if(x.gun===gun) found=x; });
  if(!found && gun>17) found={gun:gun, flas:0, asama:"Boşaltmaya hazır"};
  if(!found) return null;
  return {gun:gun, flas:found.flas, asama:found.asama};
}
function hasatTakvimHTML(c){
  var bas=hasatBaslangic(c); if(!bas) return "";
  var today=todayISO();
  var k=(!c.hasat||!c.hasat.length)?hasatKaymasi(c):{kayma:0,neden:[]};
  var h='<div class="sec-title">Hasat takvimi (flaş)</div><div class="card" style="padding:8px;">';
  if(k.neden.length) h+='<div class="muted" style="padding:2px 4px 8px;">🔄 Dinamik tahmin: '+k.neden.map(esc).join(" ")+'</div>';
  h+='<table><thead><tr><th>Gün</th><th>Tarih</th><th>Flaş</th><th>Aşama</th></tr></thead><tbody>';
  HASAT_PLAN.forEach(function(x){
    var dt=addDays(bas, x.gun-1), cur=(dt===today);
    h+='<tr'+(cur?' style="background:var(--green-soft);"':'')+'><td>'+(cur?'<b>▶</b> ':'')+x.gun+'</td><td class="red">'+fmtDate(dt)+'</td><td>'+(x.flas>0?x.flas:'—')+'</td><td class="note">'+esc(x.asama)+'</td></tr>';
  });
  h+='</tbody></table><div class="muted" style="padding:6px 4px;">1. flaş 5 gün, ara 6 gün, 2. flaş 5 gün. Başlangıç: ilk hasat kaydı ya da beklenen hasat. Tarihler tahminî.</div></div>';
  return h;
}
function beklenenTakvim(c){
  var S=getSet(c); var g=c.gelisTarihi, t=c.toprakTarihi;
  function exp(fromToprak){ if(t) return addDays(t, fromToprak); if(g) return addDays(g, S.offToprak+fromToprak); return null; }
  return [
    {ad:"Tiftik",   beklenen: g?addDays(g,S.offTiftik):null, ger:c.tiftikTarihi},
    {ad:"Toprak",   beklenen: g?addDays(g,S.offToprak):null, ger:c.toprakTarihi},
    {ad:"Tırmık",   beklenen: exp(S.offTirmik),  ger:c.tirmikTarihi},
    {ad:"Hava",     beklenen: exp(S.offHava), ger:c.havaBaslangic},
    {ad:"1. Hasat", beklenen: exp(S.offHasat), ger:null}
  ];
}
function esc(s){ return (s===null||s===undefined)?"":(""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  var cur = stageOf(c).t;
  var rows = [
    {ph:"2. Misel gelişim", oda:"21-22 → 18° (4-5 günde)", komp:"düşüyor", co2:"2100-2400'e iner"},
    {ph:"Pimleme dönemi",   oda:"18°", komp:"19-20°", co2:"2100-2400"},
    {ph:"Bezelye boyutu",   oda:"18°", komp:"20-21°", co2:"2100-2400"},
    {ph:"Ceviz boyutu",     oda:"17-18°", komp:"20-21°", co2:"2100-2400 · son su"},
    {ph:"Hasat / flaş",     oda:"17° (personel girer)", komp:"sıfırlama 23° → her gün −1°", co2:"1.flaş 2100-2400 · 2.flaş 3000-3300"}
  ];
  var h='<div class="sec-title">Havalandırma dönemi hedefleri</div><div class="card" style="padding:8px;">'

  rows.forEach(function(r){

    h+='<tr'+(on?' style="background:var(--green-soft);"':'')+'><td class="note" style="font-weight:600;">'+(on?'▶ ':'')+r.ph+'</td><td>'+r.oda+'</td><td>'+r.komp+'</td><td class="note">'+r.co2+'</td></tr>';
  });
  h+='</tbody></table></div>'
    +'<div class="muted" style="padding:6px 2px 0;">Kök temizliği günü kompost 23° + 2000 lt su (2.1000 lt H₂O₂); +2 gün sonra 1000+1000 lt su (2.1000 lt gübre).</div></div>';
  return h;
}

/* ---------- Aşama / durum ---------- */
/* Dönemler (Erdal'ın tanımı):
   kuluçka: geliş→toprak · toprak dönemi: toprak→tırmık · 1.misel: tırmık→hava
   havadan sonra gün 0-5: 2.misel · 6-8: pimleme · 9: bezelye · 10: ceviz · sonra hasat */
function _mhDates(c){
  var S=getSet(c);
  var toprak = c.toprakTarihi || (c.gelisTarihi?addDays(c.gelisTarihi,S.offToprak):null);
  var tirmik = c.tirmikTarihi || (toprak?addDays(toprak,S.offTirmik):null);
  var hava   = c.havaBaslangic || (toprak?addDays(toprak,S.offHava):null);
  return {toprak:toprak, tirmik:tirmik, hava:hava};
}
function airStarted(c){ return !!c.havaBaslangic && (daysBetween(c.havaBaslangic, todayISO())>=0); }
function phaseCls(t){
  if(t==="Kuluçka dönemi"||t==="Toprak dönemi") return "b-amber";
  if(t==="1. Misel gelişim"||t==="2. Misel gelişim"||t==="Pimleme dönemi") return "b-teal";
  return "b-harvest";
}
function stageOf(c){
  if(c.bosaltimTarihi) return {t:"Boşaltıldı", cls:"b-gray"};
  if(c.donemManuel) return {t:c.donemManuel, cls:phaseCls(c.donemManuel)};
  var today=todayISO(); var m=_mhDates(c);
  if(!m.toprak || daysBetween(m.toprak,today)<0) return {t:"Kuluçka dönemi", cls:"b-amber"};
  if(!m.tirmik || daysBetween(m.tirmik,today)<0) return {t:"Toprak dönemi", cls:"b-amber"};
  if(!m.hava   || daysBetween(m.hava,today)<0)   return {t:"1. Misel gelişim", cls:"b-teal"};
  var hd=daysBetween(m.hava,today);
  if(hd<=5) return {t:"2. Misel gelişim", cls:"b-teal"};
  if(hd<=8) return {t:"Pimleme dönemi", cls:"b-teal"};
  if(hd===9) return {t:"Bezelye boyutu", cls:"b-harvest"};
  if(hd===10) return {t:"Ceviz boyutu", cls:"b-harvest"};
  var ha=hasatAsama(c, todayISO());
  if(ha){ var lbl=ha.flas>0?("Hasat F"+ha.flas+" · "+ha.asama):ha.asama; return {t:lbl, cls:"b-harvest"}; }
  return {t:"Hasat", cls:"b-harvest"};
}
function phaseList(c){
  var m=_mhDates(c); var cur=stageOf(c).t;
  function row(ad,tarih,cls){ return {ad:ad, tarih:tarih, cls:cls, current:(ad===cur)}; }
  return [
    row("Kuluçka dönemi", c.gelisTarihi, "b-amber"),
    row("Toprak dönemi", m.toprak, "b-amber"),
    row("1. Misel gelişim", m.tirmik, "b-teal"),
    row("2. Misel gelişim", m.hava, "b-teal"),
    row("Pimleme dönemi", m.hava?addDays(m.hava,6):null, "b-teal"),
    row("Bezelye boyutu", m.hava?addDays(m.hava,9):null, "b-harvest"),
    row("Ceviz boyutu", m.hava?addDays(m.hava,10):null, "b-harvest"),
    row("Hasat", m.toprak?addDays(m.toprak,22):null, "b-harvest")
  ];
}
function lastOlcum(c){
  if(c.gunluk && c.gunluk.length){
    var last = c.gunluk[c.gunluk.length-1];
    var parts=[];
    if(last.odaC!=="" && last.odaC!=null) parts.push(last.odaC+"° oda");
    if(last.kompostC!=="" && last.kompostC!=null) parts.push(last.kompostC+"° komp.");
    return parts.length? parts.join(" · ") : "—";
  }
  return "—";
}

function gunAdi(iso){ if(!iso) return ""; var p=(""+iso).split("-"); if(p.length<3) return ""; var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); if(isNaN(d.getTime())) return ""; var g=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"]; return g[d.getUTCDay()]; }
function sonGunluk(c){ if(c.gunluk&&c.gunluk.length){ var a=c.gunluk.slice().sort(function(x,y){return cmpDate(x.tarih,y.tarih);}); return a[a.length-1]; } return null; }
/* "Bugün işlem" sütunu için: SADECE bugünün kaydı/kayıtları — sonGunluk() gibi
   "en son ne zaman olduysa o" değil, kesinlikle bugüne ait olanı getirir.
   Aynı gün birden fazla kayıt varsa (örn. sabah+akşam), sulama notlarını birleştirir. */
function bugunkuGunluk(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var t=todayISO();
  var gunler=c.gunluk.filter(function(g){return g.tarih===t;});
  if(!gunler.length) return null;
  if(gunler.length===1) return gunler[0];
  var birlesik={tarih:t, su:"", sulama:""};
  var suToplam=0;
  gunler.forEach(function(g){
    var sv=numParse(g.su); if(sv) suToplam+=sv;
    if(g.sulama) birlesik.sulama = birlesik.sulama ? (birlesik.sulama+" · "+g.sulama) : g.sulama;
    if(g.odaC) birlesik.odaC=g.odaC;
    if(g.kompostC) birlesik.kompostC=g.kompostC;
    if(g.kompostUst) birlesik.kompostUst=g.kompostUst;
    if(g.klimaC) birlesik.klimaC=g.klimaC;
  });
  if(suToplam>0) birlesik.su=String(suToplam);
  return birlesik;
}

function posetGun(c){ var P=getProtokol(); for(var i=0;i<P.length;i++){ if(P[i].tip!=="uyari" && /po\u015fet.*a\u00e7/i.test(P[i].txt)){ var t=protokolTarih(c,P[i]); if(t) return t; } } return (c&&c.gelisTarihi)?addDays(c.gelisTarihi,6):null; }
/* Poşet gerçekten "tamamlandı" işaretlendi mi (sadece takvim günü değil, ekibin fiilen yaptığı) */

  for(var i=0;i<P.length;i++){
    if(P[i].tip!=="uyari" && /po\u015fet.*a\u00e7/i.test(P[i].txt)){

var _arizaFotoGecici=null;
function arizaFotoSec(file){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      _arizaFotoGecici=cv.toDataURL("image/jpeg",0.6);
      var onz=el("az_foto_onizleme");
      if(onz) onz.innerHTML='<img src="'+_arizaFotoGecici+'" style="width:90px; height:90px; object-fit:cover; border-radius:8px; margin-top:6px;">';
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

function gorevEkle(tarih,baslik,atama){
  if(!can("edit")) return noPerm();
  baslik=(baslik||"").trim(); if(!baslik){ toast("Görev başlığı gir"); return; }
  if(!tarih){ toast("Tarih seç"); return; }
  var d=loadData();
  d.gorevler.push({id:uid(), tarih:tarih, baslik:baslik, atama:atama||"", done:false, at:new Date().toISOString(), by:deviceName()});
  saveData(); logAudit("görev eklendi", baslik+" ("+fmtDate(tarih)+")"); toast("Görev eklendi"); render();
}
function gorevToggle(id){
  if(!can("edit")) return noPerm();
  var g=getGorevler().find(function(x){return x.id===id;}); if(!g) return;
  g.done=!g.done;
  if(g.done){ g.doneAt=new Date().toISOString(); }
  saveData(); render();
}
function gorevErtele(id){
  if(!can("edit")) return noPerm();
  var g=getGorevler().find(function(x){return x.id===id;}); if(!g) return;
  g.tarih=addDays(g.tarih||todayISO(),1);
  g.done=false;
  saveData(); logAudit("genel görev ertelendi (+1g)", g.baslik); toast("Yarına ertelendi"); render();
}
function gorevSil(id){
  if(!can("edit")) return noPerm();
  var d=loadData();
  d.gorevler=d.gorevler.filter(function(x){return x.id!==id;});
  fbDeleteGorev(id);
  saveData(); toast("Görev silindi"); render();
}

/* Çoklu atama toggle: bir değeri ekler/çıkarır */
function _toggleInList(mevcut, val){
  var arr=atamaParse(mevcut);
  var i=arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
  return arr.join(",");
}
function atamaTaskToggle(cid,idx,btn,val){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  if(!c.atama) c.atama={};
  c.atama["p"+idx]=_toggleInList(c.atama["p"+idx]||"", val);
  saveData(); render();
}
function gorevAtamaToggle(id,btn,val){
  if(!can("edit")) return noPerm();
  var g=getGorevler().find(function(x){return x.id===id;}); if(!g) return;
  g.atama=_toggleInList(g.atama||"", val);
  saveData(); render();
}
function planIndirmeToggle(planId,btn,val){
  if(!can("edit")) return noPerm();
  var plan=getPlan(); var x=plan.find(function(p){return p.id===planId;}); if(!x) return;
  x.indirmeAtama=_toggleInList(x.indirmeAtama||"", val);
  saveData(); render();
}

function son7GunEnSikSorun(){
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var sinir=addDays(todayISO(),-7);
  var sayac={};
  audit.forEach(function(a){
    var gun=(a.at||"").slice(0,10);
    if(!gun || gun<sinir) return;
    if(!/ertelendi|gecik/i.test(a.action)) return;
    sayac[a.action]=(sayac[a.action]||0)+1;
  });
  var keys=Object.keys(sayac);
  if(!keys.length) return null;
  keys.sort(function(a,b){return sayac[b]-sayac[a];});
  return {action:keys[0], sayi:sayac[keys[0]]};
}

    +'<div style="font-size:20px;font-weight:700;'+(color?('color:'+color+';'):'')+'">'+val+'</div>'
    +'<div class="muted" style="font-size:11px;">'+esc(lbl)+'</div></div>';
}
function bugunOzetiHTML(active){
  if(!active || !active.length) return "";
  var riskli=0, enRiskliOda=null, enDusukPuan=101, puanToplam=0, puanSayisi=0, hasatta=0, hazirBosaltim=0;
  active.forEach(function(c){
    var p=odaPerformans(c);
    if(p){ puanToplam+=p.puan; puanSayisi++; if(p.puan<70) riskli++; if(p.puan<enDusukPuan){ enDusukPuan=p.puan; enRiskliOda=c.oda; } }
    var st=stageOf(c);
    if(/hasat/i.test(st.t)) hasatta++;
    if(st.t==="Boşaltmaya hazır") hazirBosaltim++;
  });
  var ortPuan = puanSayisi? Math.round(puanToplam/puanSayisi) : null;
  var bugunIslem = nextTasks().filter(function(i){return i.off===0;}).length;
  var sorun = son7GunEnSikSorun();
  var h='<div class="card" style="padding:14px;background:linear-gradient(135deg,#eef7ee,#fff);border:1.5px solid var(--green);margin-bottom:10px;">'
    +'<div style="font-weight:700;font-size:16px;margin-bottom:10px;">📊 Bugün özeti</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">'
    +(ortPuan!=null?statBox(ortPuan,"üretim puanı",puanRenk(ortPuan)):'')
    +statBox(riskli,"riskli oda",riskli>0?"#c0291f":"var(--muted)")
    +statBox(hasatta,"hasatta")
    +statBox(hazirBosaltim,"boşaltmaya hazır")
    +statBox(bugunIslem,"bugün işlem")
    +'</div>';
  if(enRiskliOda) h+='<div style="font-size:14px;">En riskli oda: <b>'+esc(enRiskliOda)+'</b> ('+enDusukPuan+'/100) <button class="btn ghost small" style="padding:2px 10px;margin-left:4px;" onclick="openDetail(findCycleByOda(\''+esc(enRiskliOda)+'\'))">›</button></div>';
  if(sorun) h+='<div class="muted" style="font-size:13px;margin-top:4px;">Son 7 günde en sık: '+esc(sorun.action)+' ('+sorun.sayi+' kez)</div>';
  h+='<div style="margin-top:8px; padding-top:8px; border-top:1px solid #e3ede3;"><button class="btn ghost small" onclick="go(\'gunsonu\')">🌙 Gün Sonu Özeti — bugün + yarının planı ›</button></div>';
  h+='</div>';
  return h;
}
function findCycleByOda(oda){
  var n=normalizeOda(oda);
  var c=loadData().cycles.find(function(x){return !x.bosaltimTarihi && normalizeOda(x.oda)===n;});
  return c?c.id:null;
}
/* Bir oda için YARIN planlanan tüm işlemler (protokol adımı + manuel oda görevi).
   "Bugün işlem" sütununun yanına eklenen "Yarın işlem" sütunu için kullanılır. */
function yarinPlanlanan(c){
  if(!c) return "";
  var tomorrow=addDays(todayISO(),1);
  var list=[];
  getProtokol().forEach(function(st,idx){
    if(st.tip==="uyari") return;
    var base=protokolTarih(c,st); if(!base) return;
    var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var t=addDays(base,ert);
    var done=!!(c.done&&c.done["p"+idx]);
    if(done) return;
    if(t===tomorrow) list.push(st.txt);
  });
  (c.odaGorevleri||[]).forEach(function(og){
    if(og.done) return;
    var base=og.tarih; if(!base) return;
    var ert=og.ertele||0;
    var t=addDays(base,ert);
    if(t===tomorrow) list.push(og.is);
  });
  return list.join(" + ");
}

/* Ana ekranda: bekleyen görev + kritik ikaz varsa Görevler sekmesine yönlendiren özet */
function gorevOzetRozet(){
  var items=nextTasks();
  var bugun=items.filter(function(i){return i.overdue||i.off===0;});
  var warns=(typeof tempAlerts==="function")?tempAlerts().filter(function(w){return w.lvl>=1;}):[];
  var parts=[];
  var kompostBekleyen=(typeof kompostGelisIkazlariHTML==="function" && kompostGelisIkazlariHTML()!=="");
  if(kompostBekleyen) parts.push('<span style="color:#c0291f;">🚚 kompost kontrolü</span>');
  if(warns.length) parts.push('<span style="color:#c0291f;">🌡️ '+warns.length+' kritik ikaz</span>');
  if(bugun.length) parts.push('<span style="color:#1f6b38;">📋 '+bugun.length+' bugünkü görev</span>');
  if(!parts.length) return "";
  return '<div class="card tap" onclick="go(\'gorevler\')" style="border:1.5px solid #e0a800; background:#fffbe9; display:flex; justify-content:space-between; align-items:center;">'
    + '<div style="font-weight:600;">'+parts.join(' · ')+'</div>'
    + '<div style="color:#8a6d00; font-size:13px;">Görevler →</div>'
    + '</div>';
}

/* Odaya özel, tek seferlik işlemler — Görevler sekmesinden manuel eklenir */
function odaGorevEkle(cid, tarih, is, atama){
  if(!can("edit")) return noPerm();
  is=(is||"").trim(); if(!is){ toast("İşlem açıklaması gir"); return; }
  if(!tarih){ toast("Tarih seç"); return; }
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  if(!c.odaGorevleri) c.odaGorevleri=[];
  c.odaGorevleri.push({id:uid(), tarih:tarih, is:is, atama:atama||"", done:false, ertele:0});
  touchCycle(c); saveData(); logAudit("oda işlemi eklendi", c.oda+" · "+is); toast("Eklendi"); render();
}
function odaGorevOnayla(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var og=(c.odaGorevleri||[]).find(function(x){return x.id===ogId;}); if(!og) return;
  og.done=true;
  gunlukGorevNotEkle(c, og.is+" yapıldı");
  touchCycle(c); saveData(); toast("Tamamlandı"); render();
}
function odaGorevErtele(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var og=(c.odaGorevleri||[]).find(function(x){return x.id===ogId;}); if(!og) return;
  if(!confirm('"'+og.is+'" 1 gün ertelensin mi?')) return;
  og.ertele=(og.ertele||0)+1;
  gunlukGorevNotEkle(c, og.is+" başlandı, yetişmedi — ertelendi");
  touchCycle(c); saveData(); toast("Ertelendi (+1 gün)"); render();
}
function odaGorevSil(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  if(!confirm("Bu oda işlemi silinsin mi?")) return;
  c.odaGorevleri=(c.odaGorevleri||[]).filter(function(x){return x.id!==ogId;});
  touchCycle(c); saveData(); toast("Silindi"); render();
}

function genelGorevKaydet(){
  if(!can("edit")) return noPerm();
  var t=el("gg_tarih").value;
  var konum=el("gg_konum").value;
  var tur=el("gg_tur").value;
  var not=(el("gg_not").value||"").trim();
  if(!konum){ toast("Konum seç"); return; }
  if(!tur){ toast("İş türü seç"); return; }
  var is=tur+(not?(" ("+not+")"):"");
  /* AKILLI YÖNLENDİRME: konum bir "Oda X" ise ve o odanın açık bir döngüsü varsa,
     görev otomatik olarak o odanın RESMİ kaydına (odaGorevleri) işlenir — tamamlanınca
     günlük kayıt/pano/PDF'de otomatik görünür. Değilse (depo, saha, ya da odanın açık
     döngüsü yoksa) normal bir hatırlatma görevi olarak kalır. Kullanıcıya ayrıca soru
     sorulmaz — konum seçimine göre otomatik karar verilir. */
  var odaAdi = konum.match(/^Oda (.+)$/);
  var hedefCycle = odaAdi ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(odaAdi[1]); }) : null;
  if(hedefCycle){
    odaGorevEkle(hedefCycle.id, t, is, _genelGorevAtama);
  } else {
    var baslik=konum+" · "+is;
    gorevEkle(t, baslik, _genelGorevAtama);
  }
  _genelGorevAcik=false; _genelGorevAtama="";
  render();
}

/* ================= TOPLU GÖREV GİRİŞİ — WhatsApp'tan yapıştır ================= */

var _topluAcik=false;

var TOPLU_AYLAR={"ocak":1,"şubat":2,"subat":2,"mart":3,"nisan":4,"mayıs":5,"mayis":5,"haziran":6,"temmuz":7,"ağustos":8,"agustos":8,"eylül":9,"eylul":9,"ekim":10,"kasım":11,"kasim":11,"aralık":12,"aralik":12};
function topluAc(){ if(!can("edit")) return noPerm(); _topluAcik=true; _topluTaslak=null; render(); }

/* Ekrandaki (henüz taslağa yazılmamış) düzenlemeleri taslağa senkronla — satır
   silme/atama değişikliği gibi yapısal güncellemeler diğer satırlardaki elle
   yapılmış düzenlemeleri kaybetmesin diye önce bu çağrılır. */
function topluDOMdanSenkronla(){
  if(!_topluTaslak) return;
  _topluTaslak.forEach(function(t,i){
    var tE=el("tg_tarih_"+i), kE=el("tg_konum_"+i), iE=el("tg_is_"+i);
    if(tE) t.tarih=tE.value;
    if(kE) t.konum=kE.value;
    if(iE) t.is=iE.value;
  });
}
function topluSatirSil(i){
  topluDOMdanSenkronla();
  _topluTaslak.splice(i,1);
  render();
}
function topluTarihBul(text){
  var m = text.toLowerCase().match(/(\d{1,2})\s+(ocak|şubat|subat|mart|nisan|mayıs|mayis|haziran|temmuz|ağustos|agustos|eylül|eylul|ekim|kasım|kasim|aralık|aralik)/i);
  if(!m) return null;
  var gun=parseInt(m[1],10), ay=TOPLU_AYLAR[m[2]];
  if(!ay || !gun) return null;
  var yil=new Date().getFullYear();
  var mm=(ay<10?"0":"")+ay, dd=(gun<10?"0":"")+gun;
  return {tarih: yil+"-"+mm+"-"+dd, satir: m[0]};
}
function topluOdaBul(text){
  var bulunan=[];
  getOdaList().forEach(function(o){
    var m=o.match(/([A-Za-z]+)-(\d+)/); if(!m) return;
    var re=new RegExp("\\b"+m[1]+"\\s*-{0,3}\\s*"+m[2]+"\\b","i");
    if(re.test(text)) bulunan.push(o);
  });
  return bulunan;
}
function topluAtamaBul(text){
  var out=[];
  getEkipler().forEach(function(ek){
    var re=new RegExp("\\b"+ek.ad.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")+"\\b","i");
    if(re.test(text)) out.push("grup:"+ek.id);
  });
  getPersonelList().forEach(function(p){
    var ilkAd=(p.ad||"").trim().split(/\s+/)[0]; if(!ilkAd) return;
    var re=new RegExp("\\b"+ilkAd.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(text)) out.push("kisi:"+p.id);
  });
  return out.filter(function(v,idx){ return out.indexOf(v)===idx; });
}
function topluAyristir(){
  var metin=el("tg_metin").value||"";
  if(!metin.trim()){ toast("Metin boş"); return; }
  var varsayilanTarih=todayISO();
  var tb=topluTarihBul(metin);
  var satirlar=metin.split("\n");
  if(tb){
    varsayilanTarih=tb.tarih;
    /* Tarihin geçtiği satırı (başka içerik taşımıyorsa) metinden çıkar,
       yoksa her işlemin açıklamasında tarih satırı kalıntı olarak kalır */
    satirlar=satirlar.filter(function(s){ return s.toLowerCase().indexOf(tb.satir.toLowerCase())<0 || s.trim().length>tb.satir.length+15; });
  }
  metin=satirlar.join("\n");
  var bloklar=metin.split(/\n\s*\n+/).map(function(b){return b.trim();}).filter(Boolean);
  var taslak=[];
  bloklar.forEach(function(b){
    var odalar=topluOdaBul(b);
    var konum=odalar.length?odalar[0]:"";
    var atama=topluAtamaBul(b).join(",");
    taslak.push({tarih:varsayilanTarih, konum:konum, is:b.replace(/\n/g," / ").trim(), atama:atama});
  });
  if(!taslak.length){ toast("Hiç işlem ayrıştırılamadı"); return; }
  _topluTaslak=taslak;
  render();
}
function topluOnayla(){
  if(!can("edit")) return noPerm();
  topluDOMdanSenkronla();
  var eklenen=0, resmiKayit=0;
  _topluTaslak.forEach(function(t){
    var konum=(t.konum||"").trim();
    var is=(t.is||"").trim();
    if(!is) return;
    /* Aynı akıllı yönlendirme: konum kayıtlı bir odaya denk geliyorsa ve o odanın
       açık döngüsü varsa, görev otomatik olarak odanın resmi kaydına işlenir. */
    var hedefCycle = konum ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(konum); }) : null;
    if(hedefCycle){
      odaGorevEkle(hedefCycle.id, (t.tarih||todayISO()), is, (t.atama||""));
      resmiKayit++;
    } else {
      var baslik = konum ? (konum+" · "+is) : is;
      var d=loadData();
      d.gorevler.push({id:uid(), tarih:(t.tarih||todayISO()), baslik:baslik, atama:(t.atama||""), done:false, at:new Date().toISOString(), by:deviceName()});
    }
    eklenen++;
  });
  saveData(); logAudit("toplu görev girişi", eklenen+" işlem eklendi ("+resmiKayit+" oda kaydına)");
  toast(eklenen+" görev eklendi"+(resmiKayit?(" ("+resmiKayit+" odanın resmi kaydına)"):""));
  _topluAcik=false; _topluTaslak=null;
  render();
}
