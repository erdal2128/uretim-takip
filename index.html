function topluTarihBul(text){
  var m = text.toLowerCase().match(/(\d{1,2})\s+(ocak|Ňüubat|subat|mart|nisan|mayńĪs|mayis|haziran|temmuz|ańüustos|agustos|eyl√ľl|eylul|ekim|kasńĪm|kasim|aralńĪk|aralik)/i);
  if(!m) return null;
  var gun=parseInt(m[1],10), ay=TOPLU_AYLAR[m[2]];
  if(!ay || !gun) return null;
  var yil=new Date().getFullYear();
  var mm=(ay<10?"0":"")+ay, dd=(gun<10?"0":"")+gun;
  return {tarih: yil+"-"+mm+"-"+dd, satir: m[0]};
}
function topluOdaBul(text){
  var bulunan=[];
  getOdaList().forEach(function(o){
    var m=o.match(/([A-Za-z]+)-(\d+)/); if(!m) return;
    var re=new RegExp("\\b"+m[1]+"\\s*-{0,3}\\s*"+m[2]+"\\b","i");
    if(re.test(text)) bulunan.push(o);
  });
  return bulunan;
}
function topluAtamaBul(text){
  var out=[];
  getEkipler().forEach(function(ek){
    var re=new RegExp("\\b"+ek.ad.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")+"\\b","i");
    if(re.test(text)) out.push("grup:"+ek.id);
  });
  getPersonelList().forEach(function(p){
    var ilkAd=(p.ad||"").trim().split(/\s+/)[0]; if(!ilkAd) return;
    var re=new RegExp("\\b"+ilkAd.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(text)) out.push("kisi:"+p.id);
  });
  return out.filter(function(v,idx){ return out.indexOf(v)===idx; });
}
function topluAyristir(){
  var metin=el("tg_metin").value||"";
  if(!metin.trim()){ toast("Metin boŇü"); return; }
  var varsayilanTarih=todayISO();
  var tb=topluTarihBul(metin);
  var satirlar=metin.split("\n");
  if(tb){
    varsayilanTarih=tb.tarih;
    /* Tarihin ge√ßtińüi satńĪrńĪ (baŇüka i√ßerik taŇüńĪmńĪyorsa) metinden √ßńĪkar,
       yoksa her iŇülemin a√ßńĪklamasńĪnda tarih satńĪrńĪ kalńĪntńĪ olarak kalńĪr */
    satirlar=satirlar.filter(function(s){ return s.toLowerCase().indexOf(tb.satir.toLowerCase())<0 || s.trim().length>tb.satir.length+15; });
  }
  metin=satirlar.join("\n");
  var bloklar=metin.split(/\n\s*\n+/).map(function(b){return b.trim();}).filter(Boolean);
  var taslak=[];
  bloklar.forEach(function(b){
    var odalar=topluOdaBul(b);
    var konum=odalar.length?odalar[0]:"";
    var atama=topluAtamaBul(b).join(",");
    taslak.push({tarih:varsayilanTarih, konum:konum, is:b.replace(/\n/g," / ").trim(), atama:atama});
  });
  if(!taslak.length){ toast("Hi√ß iŇülem ayrńĪŇütńĪrńĪlamadńĪ"); return; }
  _topluTaslak=taslak;
  render();
}
function topluOnayla(){
  if(!can("edit")) return noPerm();
  topluDOMdanSenkronla();
  var eklenen=0, resmiKayit=0, birlesen=0;
  _topluTaslak.forEach(function(t){
    var konum=(t.konum||"").trim();
    var is=(t.is||"").trim();
    if(!is) return;
    /* AynńĪ akńĪllńĪ y√∂nlendirme: konum kayńĪtlńĪ bir odaya denk geliyorsa ve o odanńĪn
       a√ßńĪk d√∂ng√ľs√ľ varsa, g√∂rev otomatik olarak odanńĪn resmi kaydńĪna iŇülenir.
       Her ikisi de VeyaBirlestir √ßekirdeńüini kullanńĪr ‚ÄĒ aynńĪ iŇü (√∂rn. pasteden
       metinde birden fazla satńĪrda ge√ßen "Oda B-1 ¬∑ Oda boŇüaltma/yńĪkama")
       kopya kopya "AtanmamńĪŇü" g√∂rev olarak birikmesin, mevcuda birleŇüsin. */
    var hedefCycle = konum ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(konum); }) : null;
    if(hedefCycle){
      var yeni1=odaGorevEkleVeyaBirlestir(hedefCycle.id, (t.tarih||todayISO()), is, (t.atama||""));
      if(yeni1) resmiKayit++; else birlesen++;
    } else {
      var baslik = konum ? (konum+" ¬∑ "+is) : is;
      var yeni2=gorevEkleVeyaBirlestir((t.tarih||todayISO()), baslik, (t.atama||""));
      if(!yeni2) birlesen++;
    }
    eklenen++;
  });
  saveData(); logAudit("toplu g√∂rev giriŇüi", eklenen+" iŇülem iŇülendi ("+resmiKayit+" oda kaydńĪna, "+birlesen+" zaten vardńĪ)");
  toast(eklenen+" iŇülem iŇülendi"+(resmiKayit?(" ("+resmiKayit+" odanńĪn resmi kaydńĪna)"):"")+(birlesen?(", "+birlesen+" zaten vardńĪ"):""));
  _topluAcik=false; _topluTaslak=null;
  render();
}

   bug√ľn de Bildirimler'de g√∂r√ľnmeye devam eder, d√ľzelten yeni bir kayńĪt girilene kadar s√∂nmez. */

/* ---------- Sesli not (ses kaydńĪ) ‚ÄĒ genel ama√ßlńĪ, herhangi bir formda kullanńĪlabilir ----------
   TarayńĪcńĪnńĪn mikrofon eriŇüimiyle (MediaRecorder) kńĪsa bir ses kaydńĪ alńĪr, base64 olarak
   ge√ßici bellekte tutar; ilgili "kaydet" fonksiyonu bunu okuyup kalńĪcńĪ depoya yazar. */
var _sesKayitAktif=null; /* {recorder, hedefId} */
var _sesKayitSonuc={};   /* hedefId -> base64 data URL */
function sesKayitWidgetHTML(hedefId){
  return '<div style="margin-top:8px;">'
    + '<button type="button" class="btn ghost small" id="ses_btn_'+hedefId+'" onclick="sesKayitToggle(\''+hedefId+'\')">ūüé§ Sesli not kaydet</button>'
    + '<div id="ses_onizleme_'+hedefId+'"></div>'
    + '</div>';
}
function sesKayitToggle(hedefId){
  if(_sesKayitAktif && _sesKayitAktif.hedefId===hedefId){ sesKayitDurdur(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder==="undefined"){
    toast("Bu cihaz/tarayńĪcńĪ ses kaydńĪnńĪ desteklemiyor"); return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var chunks=[];
    var rec;
    try{ rec=new MediaRecorder(stream); }catch(e){ toast("Ses kaydńĪ baŇülatńĪlamadńĪ"); return; }
    rec.ondataavailable=function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };
    rec.onstop=function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob=new Blob(chunks, {type: rec.mimeType||"audio/webm"});
      var reader=new FileReader();
      reader.onload=function(){
        _sesKayitSonuc[hedefId]=reader.result;
        var onz=el("ses_onizleme_"+hedefId);
        if(onz) onz.innerHTML='<audio controls src="'+reader.result+'" style="width:100%; margin-top:6px;"></audio>'
          + '<div class="muted" style="font-size:12px;">KayńĪt hazńĪr ‚ÄĒ kaydet/ekle butonuna basńĪnca not ile birlikte saklanńĪr.</div>';
      };
      reader.readAsDataURL(blob);
      var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="ūüé§ Yeniden kaydet";
      _sesKayitAktif=null;
    };
    rec.start();
    _sesKayitAktif={recorder:rec, hedefId:hedefId};
    var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="‚ŹĻ Durdur";
    toast("KayńĪt baŇüladńĪ, bitirince ‚ŹĻ Durdur'a bas");
  }).catch(function(){ toast("Mikrofon izni verilmedi"); });
}
function sesKayitDurdur(){
  if(_sesKayitAktif && _sesKayitAktif.recorder && _sesKayitAktif.recorder.state!=="inactive"){ _sesKayitAktif.recorder.stop(); }
}

function addMuhendisFoto(id, file){
  if(!can("edit")) return noPerm();
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var data=cv.toDataURL("image/jpeg",0.6);
      var ekler=loadNotEkler(id);
      ekler.push({ts:new Date().toISOString(), tip:"foto", data:data});
      if(saveNotEkler(id, ekler)){ toast("Fotońüraf eklendi"); renderDetail(id); }
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- Risk deńüerlendirmesi / muhtemel neden (kural tabanlńĪ ipucu) ---------- */
function riskDegerlendir(c){
  if(c.bosaltimTarihi) return null;
  var son3=(c.gunluk||[]).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).slice(-3);
  if(!son3.length) return null;
  var last=son3[son3.length-1];
  var ko=numParse(last.kompostC), od=numParse(last.odaC);
  var nedenler=[], puan=0;
  var yuksekKomp = ko!=null && ko>=KOMPOST_KRITIK_UST;
  var dusukKomp = ko!=null && ko<=KOMPOST_KRITIK_ALT;
  var yuksekOda = od!=null && od>ODA_MAX;
  var co2Val = numParse(last.co2ust); if(co2Val==null) co2Val=numParse(last.co2alt);
  var yuksekCO2 = co2Val!=null && co2Val>3500;
  var nemYuksek = last.nem==="Y√ľksek";
  var amonyakVar = last.amonyak==="Var";
  var artiyor=false;
  if(son3.length>=2){
    var vals=son3.map(function(r){return numParse(r.kompostC);}).filter(function(v){return v!=null;});
    if(vals.length>=2 && (vals[vals.length-1]-vals[0])>=2) artiyor=true;
  }
  if(yuksekKomp && yuksekCO2 && (nemYuksek||amonyakVar)){
    nedenler.push("Kompost sńĪcak + CO‚āā y√ľksek"+(nemYuksek?" + nem y√ľksek":(amonyakVar?" + amonyak var":""))+" birlikte g√∂r√ľl√ľyor ‚ÄĒ havalandńĪrma yetersiz olabilir.");
    puan+=3;
  } else if(yuksekKomp && yuksekCO2){
    nedenler.push("Kompost sńĪcak ve CO‚āā y√ľksek ‚ÄĒ havalandńĪrmayńĪ artńĪrmayńĪ deńüerlendir.");
    puan+=2;
  }
  if(yuksekKomp && !yuksekCO2 && artiyor){ nedenler.push("Kompost sńĪcaklńĪńüńĪ son √∂l√ß√ľmlerde y√ľkseliyor ‚ÄĒ ateŇülenme g√ľ√ßleniyor olabilir, kompost aktivitesi fazla olabilir."); puan+=2; }
  if(dusukKomp){ nedenler.push("Kompost sńĪcaklńĪńüńĪ d√ľŇü√ľk ‚ÄĒ misel geliŇüimi yavaŇülayabilir; oda ńĪsńĪtmasńĪ/izolasyonu kontrol et."); puan+=1; }
  if(amonyakVar && !yuksekCO2){ nedenler.push("Amonyak kokusu bildirilmiŇü ‚ÄĒ kompost fazla ńĪslak ya da azot dengesi bozuk olabilir, havalandńĪrmayńĪ kontrol et."); puan+=2; }
  if(nemYuksek && yuksekKomp){ nedenler.push("Nem y√ľksek + kompost sńĪcak birlikte ‚ÄĒ sulama fazla ka√ßmńĪŇü olabilir."); puan+=1; }
  if(yuksekOda && !airStarted(c)){ nedenler.push("Oda sńĪcaklńĪńüńĪ √ľst sńĪnńĪrńĪn √ľzerinde ‚ÄĒ dńĪŇü ortam/klima ayarńĪnńĪ kontrol et."); puan+=1; }
  if(!nedenler.length) return {seviye:"D√ľŇü√ľk", nedenler:[], puan:0};
  var seviye = puan>=4?"Y√ľksek":(puan>=2?"Orta":"D√ľŇü√ľk");
  return {seviye:seviye, nedenler:nedenler, puan:puan};
}
function riskCardHTML(c){
  var r=riskDegerlendir(c);

  var renk = r.seviye==="Y√ľksek"?"#c0291f":(r.seviye==="Orta"?"var(--amber)":"var(--muted)");
  var bg = r.seviye==="Y√ľksek"?"#fceaea":(r.seviye==="Orta"?"#fff6e5":"#f7f7f5");

/* Bir odanńĪn kompost geliŇü kontrol√ľnde eksik/sorunlu maddelerinin kńĪsa listesi */
/* Kompost sńĪcaklńĪńüńĪ i√ßin en g√ľncel √∂l√ß√ľm√ľ bul (geliŇü g√ľn√ľ ilk deńüer mi, yoksa sonraki g√ľn√ľn tur √∂l√ß√ľm√ľ m√ľ) */
function kgGuncelSicaklik(c){
  var sonOlcum=null;
  if(c.gunluk && c.gunluk.length){
    for(var gi=c.gunluk.length-1; gi>=0; gi--){
      var ga=numParse(c.gunluk[gi].kompostC), gu=numParse(c.gunluk[gi].kompostUst);
      if(ga!==null || gu!==null){ sonOlcum={alt:ga, ust:gu, tarih:c.gunluk[gi].tarih}; break; }
    }
  }
  /* KRńįTńįK FIX: ">" yerine ">=" ‚ÄĒ geliŇü G√úN√ú m√ľhendis √∂nce "ńįlk g√ľn kontrol√ľ" widget'ńĪndan
     y√ľksek bir sńĪcaklńĪk girmiŇü olabilir, sonra AYNI G√úN G√ľnl√ľk Tur'dan d√ľŇü√ľk bir √∂l√ß√ľm eklerse
     (tarihler eŇüit), eski ">" ŇüartńĪ bunu g√∂rmezden gelip eski/y√ľksek deńüere takńĪlńĪ kalńĪyordu. */
  if(sonOlcum && (!c.gelisTarihi || sonOlcum.tarih>=c.gelisTarihi)){
    return {alt:sonOlcum.alt, ust:sonOlcum.ust, kaynak:"tur ("+fmtDate(sonOlcum.tarih)+")"};
  }
  return {alt:numParse(c.kgDereceAlt), ust:numParse(c.kgDereceUst), kaynak:"geliŇü g√ľn√ľ"};
}
/* Nem 3 se√ßeneńüe indirildi (Y√ľksek/Normal/D√ľŇü√ľk). Eski kayńĪtlarda h√Ęl√Ę
   ńįyi/Kuru/√áok kuru/Islak/√áok ńĪslak olabilir ‚ÄĒ veri g√∂√ß√ľ yapmadan burada
   normalize ediyoruz ki hem eski hem yeni kayńĪtlar aynńĪ mantńĪkla okunsun. */
function nemNormalize(v){
  if(v==="yuksek"||v==="islak"||v==="cok_islak") return "yuksek";
  if(v==="dusuk"||v==="kuru"||v==="cok_kuru") return "dusuk";
  if(v==="normal"||v==="iyi") return "normal";
  return v||"";
}
/* Kompost geliŇü sńĪcaklńĪńüńĪ i√ßin 3 kademe (kritikUst'ten AYRI ‚ÄĒ bu ikisi farklńĪ
   ama√ßlar): 28¬į'ye kadar sorun yok (madde kapalńĪ). 28-35¬į arasńĪ h√Ęl√Ę sońüuyor,
   hafif ikaz kalńĪr. 35¬į √ľst√ľ ACńįL: kompost torbalarńĪ ńĪslatńĪlmalńĪ. 35¬į'nin
   altńĪna d√ľŇü√ľnce acil ikaz kalkar, hafif ikaza d√∂ner (28¬į altńĪna d√ľŇüene kadar
   madde tam kapanmaz). */
var KG_SICAK_ORTA = 28, KG_SICAK_YUKSEK = 35;
function kompostEksikMaddeler(c){
  var eksik=[];
  var sic=kgGuncelSicaklik(c); var ko=sic.alt, kou=sic.ust;
  if(ko===null && kou===null) eksik.push("sńĪcaklńĪk girilmedi");
  else {
    var enY=(ko!==null&&kou!==null)?Math.max(ko,kou):(ko!==null?ko:kou);
    if(enY > KG_SICAK_YUKSEK) eksik.push("sńĪcaklńĪk √áOK y√ľksek ‚ÄĒ kompost torbalarńĪnńĪ ńĪslat");
    else if(enY > KG_SICAK_ORTA) eksik.push("sńĪcaklńĪk h√Ęl√Ę y√ľksek");
  }
  if(!c.kgIrsaliye) eksik.push("irsaliye?");
  else if(c.kgIrsaliye==="hayir") eksik.push("irsaliye alńĪnmadńĪ");
  if(!(c.kestaneKat && c.kestaneTaraf)) eksik.push("kestane yeri?");
  if(!c.kgNem) eksik.push("nem?");
  else if(nemNormalize(c.kgNem)!=="normal") eksik.push("nem: "+c.kgNem);
  if(!c.kgAmonyak) eksik.push("amonyak?");
  else if(c.kgAmonyak==="belirsiz") eksik.push("amonyak belirsiz ‚ÄĒ yarńĪnki tur'da bak");
  else if(c.kgAmonyak==="var" && !c.kgAmonyakHavalandirildi){
    var amGun=c.kgAmonyakVarTarihi?(daysBetween(c.kgAmonyakVarTarihi,todayISO())||0):0;
    eksik.push(amGun>=3 ? "amonyak 3+ g√ľnd√ľr ge√ßmedi ‚ÄĒ poŇüeti kes, kompostu havalandńĪr" : "amonyak var ‚ÄĒ havalandńĪrńĪlńĪyor");
  }
  if(!c.kgDuzeltme) eksik.push("d√ľzeltme?");
  else if(c.kgDuzeltme==="gerek") eksik.push("kompost d√ľzeltilmeli");
  return eksik;
}

function setKG3(id,field,val){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;}); if(!c) return;
  if(field==="kgAmonyak"){
    if(val==="var"){
      /* ńįlk kez "Var" iŇüaretleniyorsa g√ľn sayacńĪ baŇülar ‚ÄĒ tekrar "Var"a
         basńĪlńĪrsa (zaten var'ken) tarihi SIFIRLAMAYIZ, aksi halde 3 g√ľnl√ľk
         saya√ß hi√ß ilerlemez. */
      if(c.kgAmonyak!=="var") c.kgAmonyakVarTarihi=todayISO();
    } else {
      /* yok/belirsiz'e d√∂n√ľl√ľrse havalandńĪrma onayńĪnńĪ ve g√ľn sayacńĪnńĪ temizle */
      c.kgAmonyakHavalandirildi=false;
      c.kgAmonyakVarTarihi="";
    }
  }
  /* Kompost "D√ľzeltilmeli" iŇüaretlenince kompost indirmeden 1 g√ľn sonraya
     "Kompost d√ľzenleme" planńĪ eklenir (G√∂revler sekmesinde g√∂r√ľn√ľr, ekip
     atanńĪr). Dińüer se√ßeneklerde (D√ľzg√ľn serilmiŇü / D√ľzelttik) hi√ßbir Ňüey
     yapńĪlmaz. AynńĪ plan zaten (tamamlanmamńĪŇü olarak) varsa tekrar eklenmez. */
  if(field==="kgDuzeltme" && val==="gerek"){
    var kiTarih=(c.kompostIndirme&&c.kompostIndirme.tarih)||c.gelisTarihi;
    if(kiTarih){
      var planTarih=addDays(kiTarih,1);
      var zatenVar=(c.odaGorevleri||[]).some(function(g){return g.is==="Kompost d√ľzenleme" && !g.done;});
      if(!zatenVar) odaGorevEkle(id, planTarih, "Kompost d√ľzenleme", "");
    }
  }
  c[field]=val;
  touchCycle(c); saveData(); renderDetail(id);
}
function setTurNumarasi(id, val){
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;});
  if(!c) return;
  var varOlan = !!c.tur;
  if(varOlan && !can("manage")){ noPerm(); return; }
  if(!varOlan && !can("edit")){ noPerm(); return; }
  var n = parseInt(val,10);
  if(isNaN(n) || n<=0){ toast("Ge√ßerli bir tur sayńĪsńĪ gir"); return; }
  c.tur = n;
  if(window._turDegistirAcik) delete window._turDegistirAcik[id];
  /* Tur numarasńĪ az √∂nce girildi ‚ÄĒ oda+tur eŇüleŇümesi ARTIK m√ľmk√ľn. Hasat
     Takip'ten bu oda+tur i√ßin tur girilmeden √ĖNCE gelmiŇü olabilecek tartńĪ
     verisi varsa hemen yakala; aksi halde sadece BńįR SONRAKńį Firestore
     deńüiŇüiklińüine (onSnapshot) kadar g√∂r√ľnmezdi. */
  try{ hasatTartiTumDonguleriSenkronEt(); }catch(e){}
  touchCycle(c); saveData(); toast("Tur "+n+" olarak kaydedildi"); renderDetail(id);
}
function turDegistirToggle(id){
  if(!can("manage")) return noPerm();
  window._turDegistirAcik = window._turDegistirAcik || {};
  if(window._turDegistirAcik[id]) delete window._turDegistirAcik[id];
  else window._turDegistirAcik[id]=true;
  renderDetail(id);
}
function kgTekrarAc(id){
  /* Tekrar d√ľzenlemek i√ßin: kayńĪtlarńĪ koru ama yeniden sormak yerine mevcut deńüerleri g√∂sterip d√ľzenlemeye izin ver.
     Basit yol: bir alanńĪ sńĪfńĪrla ki maddeler tekrar a√ßńĪlsńĪn ‚ÄĒ ama veri kaybńĪ olmasńĪn diye sadece "g√∂zden ge√ßir" modu. */
  window._kgReview=window._kgReview||{}; window._kgReview[id]=true; renderDetail(id);
}
function kgTekrarKapat(id){

   dińüer rollerde hi√ß g√∂r√ľnmesin ‚ÄĒ yanlńĪŇülńĪkla iki role se√ßilmesin diye. */
function indBaskaYerdeSecili(ad, haricGrup){
  if(haricGrup!=="makine" && _indMakine===ad) return true;
  var gruplar=["halat","ekip1","ekip2"];
  for(var i=0;i<gruplar.length;i++){
    if(gruplar[i]===haricGrup) continue;
    if((_indSecim[gruplar[i]]||[]).indexOf(ad)>=0) return true;
  }
  return false;
}
function indChipHTML(grup){
  var secili=_indSecim[grup]||[];
  var h='';
  var uygun = getPersonelList().filter(function(p){ return !indBaskaYerdeSecili(p.ad, grup); });
  uygun.forEach(function(p){
    var on=secili.indexOf(p.ad)>=0;
    h+='<button type="button" onclick="indChipToggle(\''+grup+'\',\''+esc(p.ad).replace(/'/g,"\\'")+'\')" '
      +'style="display:inline-block; margin:3px; padding:6px 12px; border-radius:16px; border:1.5px solid var(--green); font-size:14px; min-height:36px; cursor:pointer; '
      +(on?'background:var(--green); color:#fff;':'background:#fff; color:var(--green);')+'">'+esc(p.ad)+'</button>';
  });
  if(!getPersonelList().length) h='<div class="muted" style="padding:4px 2px;">√Ėnce Ayarlar ‚Üí Firmalar & Personel\'den personel ekle.</div>';
  else if(!uygun.length) h='<div class="muted" style="padding:4px 2px;">Uygun kiŇüi yok ‚ÄĒ herkes baŇüka bir role se√ßili.</div>';
  return h;
}
function indChipToggle(grup, ad){

  var i=arr.indexOf(ad);

  _indSecim[grup]=arr;
  /* Bir kiŇüi bir role girince dińüer 3 kutunun se√ßenek listesi de deńüiŇümeli (o kiŇüi oralardan kaybolmalńĪ) */
  render();
}

function kompostPlanMesajOlustur(){
  var tarih=el("ind_tarih").value||"";
  var kompost=el("ind_kompost").value||"";
  var makine=el("ind_makine").value||"";
  var halat=_indSecim.halat||[], ekip1=_indSecim.ekip1||[], ekip2=_indSecim.ekip2||[];
  if(!tarih){ toast("Tarih gir"); return null; }
  if(!kompost){ toast("Kompost gir"); return null; }
  /* √áakńĪŇüma kontrol√ľ: aynńĪ kiŇüi hem halatta hem indirme ekibinde olamaz */
  var halatSet={}; halat.forEach(function(h){ halatSet[h]=1; });
  var ekip1Cak=ekip1.find(function(e){ return halatSet[e]; });
  if(ekip1Cak){ toast("‚ö†ÔłŹ Halat ekibindeki kiŇüi ("+ekip1Cak+") 1. Ekipe se√ßilemiyor"); return null; }
  var ekip1Set={}; ekip1.forEach(function(e){ ekip1Set[e]=1; });
  var ekip2Cak=ekip2.find(function(e){ return ekip1Set[e]||halatSet[e]; });
  if(ekip2Cak){ toast("‚ö†ÔłŹ "+ekip2Cak+" baŇüka bir ekipte zaten se√ßili ‚ÄĒ 2. Ekipe eklenemez"); return null; }
  var msg="ūü•¨ KOMPOST ńįNDńįRME PLANI\n\n";
  msg+="ūüďÖ "+fmtDate(tarih)+"\n";
  msg+="ūüď¶ "+kompost+" Kompost Geliyor\n\n";
  msg+="ūüĎ∑ EKńįPLER:\n";
  if(makine) msg+="ūüĒß Makine Operat√∂r√ľ: "+makine+"\n";
  if(halat.length) msg+="ūü™Ę Halat Ekibi: "+halat.join(", ")+"\n";
  if(ekip1.length) msg+="\n1ÔłŹ‚É£ 1. ńįndirme Ekibi: "+ekip1.join(", ")+"\n";
  if(ekip2.length) msg+="2ÔłŹ‚É£ 2. ńįndirme Ekibi: "+ekip2.join(", ")+"\n";
  msg+="\nSaatler:\nSabah 08:00'de baŇülayacańüńĪz ‚úď";
  /* Bu bilgi eskiden sadece WhatsApp mesajńĪnda kalńĪp kayboluyordu ‚ÄĒ artńĪk eŇüleŇüen
     aktif odaya kalńĪcńĪ olarak yazńĪlńĪyor ki PDF/rapor'da da g√∂r√ľns√ľn. */
  var hedefC=loadData().cycles.find(function(x){ return !x.bosaltimTarihi && normalizeOda(x.oda)===normalizeOda(kompost); });
  if(hedefC){

    saveData();
  }
  return msg;
}
function kopostPlanWhatsapp(){
  var msg=kompostPlanMesajOlustur(); if(msg===null) return;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(msg).then(function(){
      toast("‚úď Mesaj kopyalandńĪ ‚ÄĒ WhatsApp'ta yapńĪŇütńĪr");
    }).catch(function(e){
      console.warn("clipboard", e);
      alert("Kopyala baŇüarńĪsńĪz. Manuel olarak kopyala:\n\n"+msg);
    });
  } else {
    alert("Kopyala desteklenmiyor. Manuel olarak kopyala:\n\n"+msg);
  }
}
function kompostPlanWhatsappAc(){
  var msg=kompostPlanMesajOlustur(); if(msg===null) return;

     wa.me/?text= WhatsApp'ńĪ mesaj hazńĪr a√ßar, hangi sohbete g√∂nderileceńüini kullanńĪcńĪ se√ßer. */
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");

/* B√ľy√ľk/k√ľ√ß√ľk harf farkńĪyla ("√Ėzdal" / "√∂zdal") aynńĪ firmanńĪn ikiye
   b√∂l√ľnmesini √∂nler ‚ÄĒ firmalar listesinde ya da mevcut odalarda aynńĪ
   (case-insensitive) ada rastlarsa ONUN yazńĪmńĪnńĪ d√∂nd√ľr√ľr, yoksa verileni
   olduńüu gibi kullanńĪr. Senkrondan gelen firma adńĪnńĪ yazmadan √∂nce
   hasatTartiSenkronEt bunu √ßańüńĪrńĪr (bkz. firmaCasingBirlestir). */
function firmaAdiCanonik(ad){
  if(!ad) return ad;
  var lc=(""+ad).toLowerCase();
  var bulunan=null;
  firmaList().some(function(f){ if(f.toLowerCase()===lc){ bulunan=f; return true; } return false; });
  if(bulunan) return bulunan;
  (loadData().cycles||[]).some(function(c){ if(c.kompostFirma && c.kompostFirma.toLowerCase()===lc){ bulunan=c.kompostFirma; return true; } return false; });
  return bulunan || ad;
}

/* Bu d√∂ng√ľde hangi ila√ß ne zaman uygulanmńĪŇü, sonraki en erken tekrar tarihi, hasat √∂ncesi bekleme uyarńĪsńĪ */
function ilacGecmisi(c){
  var L=getIlacList(); if(!L.length) return [];
  var gunluk=(c.gunluk||[]).filter(function(r){return r.sulama;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  var out=[];
  L.forEach(function(ilac){
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    var kullanim=gunluk.filter(function(r){return re.test(r.sulama);});
    if(!kullanim.length) return;
    var son=kullanim[kullanim.length-1].tarih;
    var sonrakiTekrar = (ilac.tekrarGun!=null) ? addDays(son, ilac.tekrarGun) : null;
    var uyari=[];
    if(sonrakiTekrar && sonrakiTekrar>todayISO() && !c.bosaltimTarihi) uyari.push("En erken tekrar: "+fmtDate(sonrakiTekrar)+" (min "+ilac.tekrarGun+" g√ľn ara)");
    if(ilac.hasatGun!=null){
      (c.hasat||[]).forEach(function(h){
        /* Her hasat tarihi i√ßin O TARńįHTEN √ĖNCEKńį en yakńĪn uygulamayńĪ bul.
           Eskiden d√∂ng√ľn√ľn en son uygulamasńĪ (son) her hasada karŇüńĪ kńĪyaslanńĪyordu ‚ÄĒ
           ila√ß birden fazla kez uygulandńĪńüńĪnda (yaygńĪn), erken bir flaŇütaki ger√ßek
           bekleme ihlali, ileride yapńĪlan bir uygulama y√ľz√ľnden fark negatif √ßńĪkńĪp
           sessizce g√∂zden ka√ßńĪyordu (kullanńĪcńĪ raporu / kod incelemesi). */
        var oncekiUygulama=null;
        kullanim.forEach(function(r){ if(cmpDate(r.tarih, h.tarih)<=0) oncekiUygulama=r.tarih; });
        var fark=oncekiUygulama? daysBetween(oncekiUygulama, h.tarih) : null;
        if(fark!=null && fark>=0 && fark<ilac.hasatGun){
          uyari.push("‚ö†ÔłŹ "+fmtDate(h.tarih)+" hasadńĪ, son uygulamadan "+fark+" g√ľn sonra ‚ÄĒ hasat √∂ncesi bekleme ("+ilac.hasatGun+" g√ľn) dolmamńĪŇü olabilir");
        }
      });
    }
    out.push({ad:ilac.ad, son:son, sayi:kullanim.length, uyari:uyari});
  });
  return out;
}
function ilacTekrarKontrolMesaji(c, tarih, sulamaTxt){
  if(!sulamaTxt) return [];
  var out=[];
  getIlacList().forEach(function(ilac){
    if(ilac.tekrarGun==null) return;
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    if(!re.test(sulamaTxt)) return;
    var gecmis=(c.gunluk||[]).filter(function(r){return r.sulama && re.test(r.sulama) && r.tarih!==tarih;});
    if(!gecmis.length) return;
    var sonOnceki=gecmis.slice().sort(function(a,b){return cmpDate(b.tarih,a.tarih);})[0];
    var fark=daysBetween(sonOnceki.tarih, tarih);
    if(fark!=null && fark>=0 && fark<ilac.tekrarGun){
      out.push(esc(c.oda||"")+": "+esc(ilac.ad)+" son uygulamadan ("+fmtDate(sonOnceki.tarih)+") "+fark+" g√ľn sonra tekrar giriliyor ‚ÄĒ √∂nerilen min. ara "+ilac.tekrarGun+" g√ľn.");
    }
  });
  return out;
}

/* Tiftik/Toprak/TńĪrmńĪk/Hava'nńĪn "Bilgileri d√ľzenle" formunda ZATEN √∂zel alanlarńĪ var
   (c.tiftikTarihi vb.) ‚ÄĒ bunlarńĪn protokoldeki karŇüńĪlńĪk geldińüi satńĪr index'lerini bulur,
   b√∂ylece "Dińüer √úretim ńįŇülemleri" listesi bu 4'√ľn√ľ TEKRAR g√∂stermez. */

function saveForm(id){
  if(!can("edit")) return noPerm();
  var d = loadData();
  var c = id ? d.cycles.find(function(x){return x.id===id;}) : {id:uid(), gunluk:[], hava:[]};
  if(id && c && formBase.at && c._at && c._at!==formBase.at && c._by!==whoTag()){
    if(!confirm("Bu oda '"+(c._by||"?")+"' tarafńĪndan "+fmtDateTime(c._at)+" deńüiŇütirildi.\nSenin kaydńĪn onun deńüiŇüikliklerini ezecek.\n\nTamam = yine de kaydet ¬∑ ńįptal = g√ľncel halini g√∂ster")){
      openDetail(c.id); return;
    }
  }
  var odaRaw = el("f_oda").value;
  if(!odaRaw.trim()){ toast("Oda se√ß"); return; }
  var odaN = normalizeOda(odaRaw);
  /* M√úKERRER ENGELńį: yeni d√∂ng√ľde (veya oda deńüiŇütirilirken) aynńĪ odada aktif d√∂ng√ľ varsa engelle */
  var mevcutBosaltim = el("f_bosalt").value;
  if(!mevcutBosaltim){ /* bu d√∂ng√ľ aktif olacaksa */
    var cakisan = d.cycles.filter(function(x){
      return normalizeOda(x.oda)===odaN && !x.bosaltimTarihi && x.id!==(id||"");
    })[0];
    if(cakisan){
      toast(odaN+" odasńĪnda zaten aktif kompost var ‚ÄĒ √∂nce boŇüalt");
      return;
    }
  }
  c.oda = odaN;
  var _fv=el("f_firma").value; c.kompostFirma=(_fv==="__new__"?"":_fv);
  c.tonaj = el("f_tonaj").value.trim();
  var alanGirilen = el("f_alan").value.trim();
  /* m¬≤ boŇü bńĪrakńĪldńĪysa oda tanńĪmńĪndaki sabit m¬≤'yi kullan */
  if(!alanGirilen){
    var sabitM2 = odaM2Get(odaN);
    c.alanM2 = sabitM2!==null ? String(sabitM2) : "";
  } else {
    c.alanM2 = alanGirilen;
  }
  c.gelisTarihi = el("f_gelis").value;
  c.partiNo = partiFromDate(c.gelisTarihi);
  /* Tiftik/Toprak/TńĪrmńĪk artńĪk bu formdan yazńĪlmńĪyor ‚ÄĒ SSOT: tek giriŇü kapńĪsńĪ
     G√ľnl√ľk Tur'un detay kutusu (adimDetayKaydet). Burada sadece stepBlock ile
     salt-okunur g√∂steriliyor. */
  /* Dińüer √úretim ńįŇülemleri (poŇüet, oda yńĪkama, hasat vb.) ‚ÄĒ ge√ßmiŇüe y√∂nelik d√ľzenleme.
     SSOT: her adńĪm tek kapńĪdan (adimTamamla/adimGeriAl) yazńĪlńĪr. */
  if(!c.done) c.done={};
  if(!c.adimDetay) c.adimDetay={};
  var dedIdxSave=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdxSave[idx]) return;
    var dEl=el("f_adim_"+idx+"_d"); if(!dEl) return;
    var tEl=el("f_adim_"+idx+"_t"), nEl=el("f_adim_"+idx+"_n");
    var yeniTarih=(tEl?tEl.value:"")||todayISO();
    var notDeg=(nEl?nEl.value.trim():"");
    var eskiDone=adimGercektenYapildiMi(c, idx, s);
    if(dEl.checked){
      /* adimTamamla sńĪra engelini kendi d√∂nd√ľr√ľr; hasat sńĪrasńĪ tutmuyorsa iŇüareti geri al */
      if(!adimTamamla(c, idx, {tarih:yeniTarih, not:notDeg, sessiz:true})){
        dEl.checked=false;
      } else if(yeniTarih){
        /* Ana Ekran "Bug√ľn iŇülem" s√ľtunu g√ľnl√ľk kayńĪttan beslenir ‚ÄĒ o tarihe not d√ľŇü */
        gunlukNotTariheEkle(c, yeniTarih, s.txt+" yapńĪldńĪ");
      }
    } else if(eskiDone){
      adimGeriAl(c, idx);
    }
  });
  /* Hava baŇülangńĪcńĪ: √∂zel alan + bayrak SSOT senkronu ‚ÄĒ tek kaynak, iki g√∂sterim tutarlńĪ */
  var eskiHava = c.havaBaslangic;
  var yeniHava = el("f_hava").value;
  if(yeniHava && yeniHava!==eskiHava){
    var hiA=protokolRolIdx("hava");
    if(hiA>=0) adimTamamla(c, hiA, {tarih:yeniHava, sessiz:(yeniHava!==todayISO())});
    else c.havaBaslangic=yeniHava;
  } else if(!yeniHava && eskiHava){
    var hiB=protokolRolIdx("hava");
    if(hiB>=0) adimGeriAl(c, hiB); else c.havaBaslangic="";
  }
  c.kestaneKat = el("f_kkat").value.trim();
  c.kestaneTaraf = el("f_ktaraf").value;
  c.bosaltimTarihi = el("f_bosalt").value;
  c.offsets={};
  [["offTiftik","f_o_tiftik"],["offToprak","f_o_toprak"],["offTirmik","f_o_tirmik"],["offHava","f_o_hava"],["offHasat","f_o_hasat"]].forEach(function(pr){
    var e2=el(pr[1]); var vv=e2?e2.value.trim():""; if(vv!=="" && !isNaN(parseInt(vv,10))) c.offsets[pr[0]]=parseInt(vv,10);
  });
  if(!id){
    /* Oda oluŇüturmak = kompostu koymak = kompostu indirmek. Kompost ńįndirme PlanńĪ
       (WhatsApp) formu daha √∂nce/sonra daha detaylńĪ bilgiyle (makine/ekip) √ľzerine
       yazabilir; burada sadece zaten boŇüsa dolduruyoruz. */
    if(!c.kompostIndirme || !c.kompostIndirme.tarih) c.kompostIndirme={tarih:c.gelisTarihi};
    d.cycles.push(c);
  }
  touchCycle(c);
  saveData();
  logAudit(id?"oda bilgisi g√ľncellendi":"oda oluŇüturuldu", c.oda);
  toast("Kaydedildi");
  openDetail(c.id);
}

function sulamaMetniGuncelle(selectId, dozId, targetTextId){
  var sel=el(selectId), doz=el(dozId), target=el(targetTextId);
  if(!sel || !doz || !target) return;
  var ilac=sel.value, d=parseInt(doz.value,10)||0;
  if(ilac && d>0) target.value = d+" ml "+ilac;
  else if(ilac && d===0) target.value = ilac;
  /* KRńįTńįK: dropdown "‚ÄĒ ila√ß yok / elle yaz ‚ÄĒ"e (boŇü deńüer) geri alńĪnńĪrsa metni
     TEMńįZLE. Eskiden burada hi√ßbir Ňüey yapńĪlmńĪyordu ("elle not girilebilsin"
     diye) ‚ÄĒ ama o ana kadar zaten bu picker'ńĪn kendisi metni ezmiŇü oluyordu
     (yukarńĪdaki satńĪrlar), yani o noktada korunacak "elle yazńĪlmńĪŇü" bir metin
     kalmńĪyordu. Sonu√ß: yanlńĪŇü ila√ß/doz se√ßilince ńįPTAL ETMENńįN hi√ßbir yolu
     yoktu ‚ÄĒ kullanńĪcńĪ elle metin kutusuna girip silmek zorunda kalńĪyordu. */
  else if(!ilac) target.value = "";
}
/* "DeńüiŇütir" kutusuna kullanńĪcńĪ tek bir serbest metin yazńĪyor (√∂rn. "250 lt su"
   veya "250 lt su + 100 ml Vivando") ‚ÄĒ ama Toplam Su / grafik / t√ľketim √∂zeti
   gibi hesaplar (tuketimOzet, gunlukSuMiktari) suyu HER ZAMAN gun.su alanńĪndaki
   TEMńįZ SAYIDAN okur (normal Tur giriŇüinde su slider'dan, ila√ß adńĪ ayrńĪ metin
   kutusundan gelir ‚ÄĒ ikisi hi√ß karńĪŇümaz). Bu metni olduńüu gibi gun.sulama'ya
   yazńĪp gun.su'yu boŇü bńĪrakmak, "Toplam Su" ile o g√ľn ger√ßekte verilen su
   arasńĪnda tutarsńĪzlńĪńüa yol a√ßńĪyordu (kullanńĪcńĪ raporu). Bu y√ľzden "+" ile
   ayrńĪlan par√ßalar arasńĪndan SADECE su olanlar (rakam + lt/litre, madde adńĪ
   YOK) ayńĪklanńĪp gun.su'ya, kalan (ila√ß) kńĪsmńĪ gun.sulama'ya yazńĪlńĪr. */
function sulamaMetniSuAyir(txt){
  txt=(""+(txt||"")).trim();
  if(!txt) return {su:"", sulama:""};
  /* Tek baŇüńĪna yazńĪlmńĪŇü √ßńĪplak bir sayńĪ (birim/madde adńĪ yok) ‚ÄĒ normal
     Tur'daki su slider'ńĪyla birebir aynńĪ kural: tek alanda baŇüka anlamńĪ
     olamayacańüńĪ i√ßin dońürudan litre sayńĪlńĪr. */
  if(/^\d+(?:[.,]\d+)?$/.test(txt)) return {su:txt.replace(",","."), sulama:""};
  /* Geri kalanńĪ i√ßin tekerleńüi yeniden icat etmek yerine, raporlarńĪn zaten
     kullandńĪńüńĪ aynńĪ sńĪnńĪflandńĪrńĪcńĪyńĪ (gunlukSatirAyristir) kullanńĪyoruz ‚ÄĒ
     "1000 lt su (ila√ßsńĪz, neme g√∂re artabilir)" gibi parantezli protokol
     metinlerini de dońüru ayńĪrt eder (madde adńĪ yoksa/"su" ile baŇülńĪyorsa
     su, deńüilse ila√ß sayńĪlńĪr). */
  var ayr=gunlukSatirAyristir({sulama:txt, su:""});
  var suToplam=0;
  ayr.sulama.forEach(function(seg){
    var m=/^(\d+(?:[.,]\d+)?)/.exec(seg.trim());
    if(m) suToplam+=parseFloat(m[1].replace(",","."));
  });
  var kalan=ayr.ilac.concat(ayr.uretim).join(" + ");
  return {su: suToplam>0?(""+suToplam):"", sulama: kalan};
}

   ‚ÄĒ sulama iptal/deńüiŇütir modalinde hangi neden setinin (ūüíß sulama vs ūüß™
   kimyasal) g√∂sterileceńüine karar vermek i√ßin. ńįla√ß varsa kimyasal seti
   g√∂sterilir (daha sonu√ßlu karar sayńĪlńĪr). */
function _sulamaGunTuru(c, tarih){
  var ilacVar=false;
  getProtokol().forEach(function(s,idx){
    if(s.silindi || (s.tip!=="su" && s.tip!=="ilac")) return;
    if(s.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,s);
      if(ar && cmpDate(tarih,ar.baslangic)>=0 && cmpDate(tarih,ar.bitis)<=0 && s.tip==="ilac") ilacVar=true;
      return;
    }
    var dt=protokolTarih(c,s); if(!dt) return;
    var ert=(c.ertele&&c.ertele["p"+idx])||0; if(ert) dt=addDays(dt,ert);
    if(dt===tarih && s.tip==="ilac") ilacVar=true;

}

function topluKaydet(id, bas, son){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("KayńĪt bulunamadńĪ"); return; }
  if(!c.gunluk) c.gunluk=[];
  var eklenen=0, guncellenen=0, islemSayisi=0; var warnLines=[]; var warnSet={};
  var islemSecenekleri = getProtokol().map(function(s,idx){return {s:s,idx:idx};})
    .filter(function(x){ return !x.s.silindi && x.s.tip==="olay"; });
  for(var i=bas;i<=son;i++){
    var oda=el("tp_oda_"+i).value.trim(), komp=el("tp_komp_"+i).value.trim(), sul=el("tp_sul_"+i).value.trim(), su=el("tp_su_"+i).value.trim();
    var islemSecEl=el("tp_islem_"+i); var islemIdxStr=islemSecEl?islemSecEl.value:"";
    var tarih = addDays(c.gelisTarihi, i);
    /* √úretim iŇülemi se√ßildiyse SSOT kapńĪsńĪndan kaydet ‚ÄĒ Tur'daki detay kutusuyla
       AYNI fonksiyon (adimTamamla), sadece giriŇü yeri farklńĪ. Ge√ßmiŇü g√ľn√ľ unutmuŇüsan
       buradan hńĪzlńĪca tamamlarsńĪn. */
    if(islemIdxStr){
      var secX=islemSecenekleri.find(function(x){return (""+x.idx)===islemIdxStr;});
      if(secX && adimYapilmaTarihi(c, secX.idx, secX.s)!==tarih){
        if(adimTamamla(c, secX.idx, {tarih:tarih})) islemSayisi++;
        else warnLines.push(fmtDate(tarih)+": "+secX.s.txt+" kaydedilmedi ‚ÄĒ √∂nceki adńĪm hen√ľz tamamlanmamńĪŇü");
      }
    }
    if(!oda && !komp && !sul && !su) continue; /* g√ľnl√ľk √∂l√ß√ľm satńĪrńĪ boŇü, atla (iŇülem yine de yukarńĪda kaydedildi) */
    var problems=gunlukKontrolMesaji(c, tarih, !!(sul||su));
    var blockAll=problems.some(function(p){return p.tip==="blockAll";});
    var blockSulama=problems.some(function(p){return p.tip==="blockSulama";});
    problems.forEach(function(p){ if(!warnSet[p.metin]){ warnSet[p.metin]=true; warnLines.push(p.metin); } });
    if(blockAll) continue; /* bu g√ľn tamamen atlandńĪ */
    if(blockSulama){ sul=""; su=""; if(!oda && !komp) continue; }
    var idx=-1; for(var k=0;k<c.gunluk.length;k++){ if(c.gunluk[k].tarih===tarih){ idx=k; break; } }
    var rec = idx>=0 ? c.gunluk[idx] : {tarih:tarih};
    if(rec.sulamaDurum && (sul!==(rec.sulama||"") || (numParse(su)||0)!==(numParse(rec.su)||0))){
      rec.sulamaDurum=""; rec.sulamaAciklama=""; rec.sulamaOrijinal="";
    }
    rec.odaC=oda; rec.kompostC=komp; rec.sulama=sul; rec.su=su;
    if(idx>=0){ c.gunluk[idx]=rec; guncellenen++; } else { c.gunluk.push(rec); eklenen++; }
  }
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("toplu veri giriŇüi", c.oda+" ¬∑ "+eklenen+" yeni, "+guncellenen+" g√ľncellendi"+(islemSayisi?", "+islemSayisi+" √ľretim iŇülemi":""));

  if(warnLines.length) showWarnBox("BazńĪ g√ľnler/iŇülemler atlandńĪ", warnLines);
  _topluRange=null; go("detail",id);

function download(filename, text, mime){
  var blob = new Blob([text], {type:mime||"text/plain;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

function restoreJSON(file){

      memData = {cycles:obj.cycles, settings:obj.settings||{}, gorevler:obj.gorevler||[]};
      /* KRńįTńįK: KullanńĪcńĪ elle bir dosya se√ßip "bunu kullan" dedi ‚ÄĒ bu, buluttaki
         g√ľncel hali bekleme g√ľvenlik kilidinden (fbPushSettings i√ßindeki
         _settingsFirstSyncDone) daha yetkilidir. Kilit hen√ľz a√ßńĪlmamńĪŇüsa (√∂rn.
         sayfa yeni a√ßńĪldńĪysa, bulut ilk senkron gelmeden) saveData() sessizce
         hi√ßbir Ňüey g√∂ndermez ‚ÄĒ veri sadece cihazda kalńĪr, buluta hi√ß gitmez, ve
         baŇüka bir cihaz a√ßńĪldńĪńüńĪnda h√Ęl√Ę eski buluttaki veri g√∂r√ľn√ľr. Bu y√ľzden
         restore'da kilidi a√ßńĪk√ßa ge√ßersiz kńĪlńĪyoruz: kullanńĪcńĪnńĪn se√ßimi, "hen√ľz
         bulutu g√∂rmedik" temkinlilińüinden √∂nceliklidir. */
      _settingsFirstSyncDone = true;
      saveData();
      if(obj.photos){ Object.keys(obj.photos).forEach(function(id){ saveImgs(id, obj.photos[id]); }); }
      if(obj.formPhotos){ Object.keys(obj.formPhotos).forEach(function(id){ saveFormImgs(id, obj.formPhotos[id]); }); }

/* OlańüandńĪŇüńĪ sńĪcaklńĪk deńüeri (45¬įC kompost, eksi deńüer gibi) sessizce kabul edilmesin ‚ÄĒ
   √ßońüunlukla fazladan rakam (450‚Üí45) veya yanlńĪŇü eksi iŇüareti hatasńĪdńĪr. Ger√ßek acil

function odakIlerlet(elm){
  var card = elm.closest('.card'); if(!card) return;
  var focusable = card.querySelectorAll('input:not([type=hidden]):not([type=checkbox]):not([type=range]), select');
  var arr = Array.prototype.slice.call(focusable);
  var idx = arr.indexOf(elm);
  if(idx>=0 && idx<arr.length-1){
    var next=arr[idx+1]; next.focus();
    try{ if(next.select) next.select(); }catch(e){}
  }
}
function gunlukKaydet(c, t, vk, patch, warnLines){
  if(!c) return 0;
  var oda=patch.odaC||"", komp=patch.kompostC||"", kompUst=patch.kompostUst||"",
      klima=patch.klimaC||"", a=patch.co2alt||"", u=patch.co2ust||"",
      sul=patch.sulama||"", suV=patch.su||"",
      amonyak=patch.amonyak||"", nem=patch.nem||"";
  if(!oda && !komp && !kompUst && !klima && !a && !u && !sul && !suV && !amonyak && !nem) return 0;
  var supheMetni=sicaklikSupheliMi([
    {ad:"Oda ¬įC", deger:numParse(oda)}, {ad:"Komp ¬įC alt", deger:numParse(komp)},
    {ad:"Komp ¬įC √ľst", deger:numParse(kompUst)}, {ad:"Klima ¬įC", deger:numParse(klima)}
  ]);
  if(supheMetni && !confirm("‚ö†ÔłŹ OlańüandńĪŇüńĪ deńüer(ler):\n"+supheMetni+"\n\nFazladan rakam ya da yanlńĪŇü eksi iŇüareti girmiŇü olabilirsin.\n\nYine de kaydedilsin mi?")){
    return 0;
  }
  var problems=gunlukKontrolMesaji(c, t, !!(sul||suV));
  if(problems.some(function(p){return p.tip==="blockAll";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    return 0;
  }
  if(problems.some(function(p){return p.tip==="blockSulama";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    sul=""; suV="";
    if(!oda && !komp && !kompUst && !klima && !a && !u){ return 0; }
  }
  if(!c.gunluk) c.gunluk=[];
  if(sul){ ilacTekrarKontrolMesaji(c,t,sul).forEach(function(m){warnLines.push(m);}); }
  /* KRńįTńįK: ArtńĪk Sabah/AkŇüam ayrńĪ kayńĪt tutulmuyor ‚ÄĒ g√ľnde TEK kayńĪt var.
     Vakit sadece "en son ne zaman girildi" bilgisi olarak saklanńĪr, arama/eŇüleŇütirme
     sadece tarihe g√∂re yapńĪlńĪr. B√∂ylece aynńĪ g√ľn i√ßin iki ayrńĪ (biri boŇü, biri dolu)
     satńĪr oluŇümaz. */
  var ex=c.gunluk.find(function(r){return r.tarih===t;});
  if(ex){
    /* Form her zaman g√∂r√ľnen alanlarńĪn TAMAMINI g√∂nderir ‚ÄĒ boŇü bńĪrakńĪlan alan
       "dokunma" deńüil "temizle" demektir. Aksi halde yanlńĪŇülńĪkla eklenmiŇü bir
       not (√∂rn. otomatik "ertelendi" notu) kullanńĪcńĪ silip kaydetse bile geri gelirdi. */
    /* Sulama daha √∂nce "deńüiŇütirildi"/"iptal" olarak iŇüaretlenmiŇüse ve m√ľhendis
       burada (Tur'dan) ger√ßek bir sulama/ila√ß deńüeri girmiŇüse, bu YENńį bir
       normal kayńĪttńĪr ‚ÄĒ eski durum etiketi ge√ßersiz kalńĪr, silinir. Deńüer
       deńüiŇümediyse (√∂rn. sadece sńĪcaklńĪk g√ľncellendi) etiket korunur.
       KRńįTńįK: su karŇüńĪlaŇütńĪrmasńĪ SAYISAL yapńĪlmalńĪ ‚ÄĒ su (lt) slider'ńĪ boŇü
       bńĪrakńĪlan bir alanda bile HER ZAMAN "0" string'i d√∂nd√ľr√ľr, ama ńįptal
       Et sonrasńĪ saklanan "temiz" deńüer boŇü string ("") idi. Ham metin
       karŇüńĪlaŇütńĪrmasńĪ ("0" !== "") her rutin Tur kaydńĪnda (sńĪcaklńĪk giriŇüi
       gibi, sulamaya hi√ß dokunulmasa bile) bunu "deńüiŇüti" sanńĪp iptal/
       deńüiŇütir etiketini SESSńįZCE siliyordu ‚ÄĒ g√∂rev "Bug√ľnk√ľ G√∂revler"de
       yeniden bekliyormuŇü gibi g√∂r√ľn√ľyor, kullanńĪcńĪ tekrar tekrar ńįptal
       Et'e basmak zorunda kalńĪyordu (her basńĪŇüta yeni zaman damgalńĪ bir
       not birikiyordu). SayńĪsal karŇüńĪlaŇütńĪrma "0" ile ""yi eŇüit sayar. */
    if(ex.sulamaDurum && (sul!==(ex.sulama||"") || (numParse(suV)||0)!==(numParse(ex.su)||0))){
      ex.sulamaDurum=""; ex.sulamaAciklama=""; ex.sulamaOrijinal="";
    }
    ex.vakit=vk;
    ex.odaC=oda; ex.kompostC=komp; ex.kompostUst=kompUst;
    ex.klimaC=klima; ex.co2alt=a; ex.co2ust=u;
    ex.sulama=sul; ex.su=suV;
    ex.amonyak=amonyak; ex.nem=nem;
  } else {
    c.gunluk.push({tarih:t,vakit:vk,odaC:oda,kompostC:komp,kompostUst:kompUst,klimaC:klima,co2alt:a,co2ust:u,su:suV,sulama:sul,amonyak:amonyak,nem:nem});
  }
  c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);});
  return 1;
}
/* Tek bir oda kartńĪndaki verileri kaydeder. D√∂nd√ľr√ľr: 1 (kaydedildi) / 0 (boŇü, atlandńĪ) */
function turKaydetKart(card, t, vk, warnLines){
  var d=loadData();
  var cid=card.getAttribute('data-cid');
  var c=d.cycles.find(function(x){return x.id===cid;}); if(!c) return 0;
  var g=function(sel){ var e=card.querySelector(sel); return e?e.value.trim():""; };
  var patch={
    odaC: g('.tur_oda'), kompostC: g('.tur_komp'), kompostUst: g('.tur_kompust'), klimaC: g('.tur_klima'),
    co2alt: g('.tur_co2a'), co2ust: g('.tur_co2u'), sulama: g('.tur_sulama'), su: g('.tur_su')
  };
  return gunlukKaydet(c, t, vk, patch, warnLines);
}
/* KullanńĪcńĪ raporu: "√∂nce kompost dereceleri ve klimalarńĪ giriyorum, sonra
   sulama ve protokolleri girdińüim zaman dereceler gidiyor". K√∂k neden:
   sńĪcaklńĪk/CO‚āā alanlarńĪ hi√ßbir onchange/onblur ile kaydedilmiyordu ‚ÄĒ sadece
   DOM'da yaŇüńĪyordu, turIlerle/turTarihDegis gibi SAYFA DEńěńįŇěTńįREN aksiyonlar
   flush ediyordu. Ama sulama Onayla/DeńüiŇütir/ńįptal, protokol iŇüaretleme,
   sarńĪm kontrol√ľ, g√∂zlem notu gibi AYNI SAYFADA KALAN aksiyonlar da
   render()'ńĪ tetikliyor ‚ÄĒ kart gunKaydiBul(c)'tan (hen√ľz kaydedilmemiŇü,
   dolayńĪsńĪyla eski/boŇü) yeniden √ßiziliyor, yazńĪlan dereceler kayboluyor.
   Bu fonksiyon her render() √∂ncesi (tek oda modundayken) o an ekranda a√ßńĪk
   kartlarńĪn dolu alanlarńĪnńĪ SESSńįZCE (onay/engelleme sorgusu olmadan ‚ÄĒ
   gunlukKaydet'in aksine, ama√ß nihai kayńĪt deńüil ARA KAYIP √ĖNLEME) korur.
   BoŇü bńĪrakńĪlan bir alana DOKUNULMAZ (hen√ľz bitmemiŇü form olabilir). */
function turAcikKartlariKoru(){
  var kartlar=document.querySelectorAll('[data-cid]');
  if(!kartlar.length) return;
  var t=_turTarihVal||todayISO();
  var degisti=false;
  kartlar.forEach(function(card){
    try{
      var cid=card.getAttribute('data-cid');
      var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
      function g(sel){ var e=card.querySelector(sel); return e?e.value.trim():null; }
      var oda=g('.tur_oda'), komp=g('.tur_komp'), kompUst=g('.tur_kompust'), klima=g('.tur_klima'), a=g('.tur_co2a'), u=g('.tur_co2u');
      if(!oda && !komp && !kompUst && !klima && !a && !u) return; /* hi√ßbir alan dolu deńüil, korunacak bir Ňüey yok */
      if(!c.gunluk) c.gunluk=[];
      var ex=c.gunluk.find(function(r){return r.tarih===t;});
      if(!ex){ ex={tarih:t,vakit:"",su:"",sulama:""}; c.gunluk.push(ex); c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);}); }
      if(oda && ex.odaC!==oda){ ex.odaC=oda; degisti=true; }
      if(komp && ex.kompostC!==komp){ ex.kompostC=komp; degisti=true; }
      if(kompUst && ex.kompostUst!==kompUst){ ex.kompostUst=kompUst; degisti=true; }
      if(klima && ex.klimaC!==klima){ ex.klimaC=klima; degisti=true; }
      if(a && ex.co2alt!==a){ ex.co2alt=a; degisti=true; }
      if(u && ex.co2ust!==u){ ex.co2ust=u; degisti=true; }
    }catch(e){ console.error("Tur alanńĪ korunamadńĪ:", e); }
  });
  if(degisti) saveData();
}
function turIlerle(delta){
  var t=el("tur_tarih").value;
  if(!t){ toast("Tarih se√ß"); return; }
  var vk=el("tur_vakit")?el("tur_vakit").value:"";
  _turTarihVal=t; _turVakitVal=vk;
  var card=document.querySelector('[data-cid]');
  /* G√úVENLńįK AńěI: burada (sicaklikSupheliMi, gunlukKontrolMesaji vb. i√ßinde)
     beklenmedik bir hata / bir confirm() penceresinin bazńĪ cihazlarda d√ľzg√ľn
     d√∂nmemesi gibi bir durum olursa, kaydetme adńĪmńĪ B√úT√úN "Sonraki oda"
     iŇülemini durdurup kullanńĪcńĪya hi√ßbir tepki vermeden takńĪlńĪ bńĪrakńĪyordu
     (kullanńĪcńĪ raporu: "Sonraki odaya basńĪyorum tepki yok"). ArtńĪk kaydetme
     hata verse bile oda deńüiŇütirme/ilerleme YńįNE DE ger√ßekleŇüir ‚ÄĒ en k√∂t√ľ
     ihtimalle o kartńĪn verisi kaydedilmez (kullanńĪcńĪ geri d√∂n√ľp tekrar
     girebilir), ama uygulama asla "tepkisiz" kalmaz. */
  try{
    if(card){
      var warnLines=[];
      var n=turKaydetKart(card, t, vk, warnLines);
      if(n) saveData();
      if(warnLines.length) showWarnBox("Bu oda i√ßin uyarńĪ", warnLines);
    }
  }catch(e){
    console.error("Tur kaydńĪ sńĪrasńĪnda hata (oda deńüiŇütirme yine de devam ediyor):", e);
    toast("‚ö†ÔłŹ Bu odanńĪn verisi kaydedilemedi, kontrol et");
  }
  turIndex += delta;
  render();  /* render() ‚Üí renderTur() ‚Üí header otomatik g√ľncellenir */
}

/* ---------- Bulut yedek (Firebase) ‚ÄĒ cihaz kńĪrńĪlsa/kaybolsa bile veri g√ľvende ----------
   Yerel yedek (yukarńĪdaki autoSnapshot) sadece BU cihazda kalńĪr. Bu fonksiyon aynńĪ
   anlńĪk g√∂r√ľnt√ľy√ľ Firestore'a da yazar: farms/{FARM_CODE}/yedekler/{docId}.
   Zamanlama: uygulama a√ßńĪkken her CLOUD_BACKUP_DAKIKA dakikada bir dener (kesin saat
   garantisi deńüil ‚ÄĒ sunucusuz bir PWA'da bu ancak Cloud Functions gibi ayrńĪ bir
   arka u√ß ile m√ľmk√ľn olur; ama sahada uygulama g√ľn boyu defalarca a√ßńĪldńĪńüńĪ i√ßin
   pratikte √ßok yakńĪn sonu√ß verir).
   Rotasyon: her yedekleme ANINA (aktif_<ms>, arsiv_<ms>) √∂zel bir dok√ľman ‚ÄĒ
   √∂nceki yedeńüi EZMEZ, ger√ßek ge√ßmiŇü listesi oluŇüur. SńĪnńĪrsńĪz b√ľy√ľmesin diye
   g√ľnde bir kez otomatik temizlik yapńĪlńĪr (bkz. cloudYedekEskiSil): hem
   CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayńĪsńĪnńĪ aŇüan kayńĪtlar silinir (hangisi daha kńĪsńĪtlayńĪcńĪysa). */
var CLOUD_BACKUP_DAKIKA = 5; /* eskiden 4 saatti ‚ÄĒ kullanńĪcńĪ iste dińüiyle 5 dakikaya d√ľŇü√ľr√ľld√ľ */
var CLOUD_BACKUP_RETENTION_GUN = 7; /* bu kadar g√ľnden eski bulut yedekleri otomatik silinir */
var CLOUD_BACKUP_MAX_KAYIT = 30; /* en fazla bu kadar yedek noktasńĪ tutulur (7 g√ľn i√ßinde bile olsa) */
var CLOUD_YEDEK_LIMIT = 700000; /* g√ľvenli karakter sńĪnńĪrńĪ ‚ÄĒ Firestore'un 1MB dok√ľman limitine karŇüńĪ tampon */
function getLastCloudBackup(){ try{ return localStorage.getItem("utp_cloudbak_last")||null; }catch(e){ return null; } }
function setLastCloudBackup(){ try{ localStorage.setItem("utp_cloudbak_last", ""+Date.now()); }catch(e){ console.warn("bulut yedek zamanńĪ kaydedilemedi", e); } updateCloudBakBadge(); }
/* Header'daki k√ľ√ß√ľk "‚ėĀÔłŹ X √∂nce" rozeti ‚ÄĒ g√∂reli zaman, dakikada bir tazelenir (bkz. setInterval) */
function zamanOnce(ms){
  if(!ms) return "";
  var fark=Date.now()-ms;
  if(fark<60000) return "az √∂nce";
  var dk=Math.floor(fark/60000);
  if(dk<60) return dk+" dk √∂nce";
  var sa=Math.floor(dk/60);
  if(sa<24) return sa+" saat √∂nce";
  var gun=Math.floor(sa/24);
  return gun+" g√ľn √∂nce";
}
function updateCloudBakBadge(){
  var e=document.getElementById("cloudBakBadge"); if(!e) return;
  var lb=getLastCloudBackup();
  e.textContent = lb ? ("‚ėĀÔłŹ "+zamanOnce(+lb)) : "‚ėĀÔłŹ hen√ľz yedek yok";
}
function cloudYedekGerekliMi(){
  var lb=getLastCloudBackup();
  if(!lb) return true;
  return (Date.now()-(+lb)) > CLOUD_BACKUP_DAKIKA*60*1000;
}
function cloudYedekYaz(docId, payload){
  if(!FB.ready || !FB.db) return Promise.reject(new Error("bulut hazńĪr deńüil"));
  var json;
  try{ json=JSON.stringify(payload); }catch(e){ console.warn("bulut yedek: JSON hatasńĪ ("+docId+")", e); return Promise.reject(e); }
  if(json.length > CLOUD_YEDEK_LIMIT){
    console.warn("bulut yedek: '"+docId+"' √ßok b√ľy√ľk ("+json.length+" karakter) ‚ÄĒ atlandńĪ, cihaz yedeńüi h√Ęl√Ę √ßalńĪŇüńĪyor.");
    return Promise.reject(new Error("veri √ßok b√ľy√ľk"));
  }
  /* KRńįTńįK: ham payload nesnesi Firestore SDK'ya DOńěRUDAN verilirse, i√ßinde
     herhangi bir "undefined" alan varsa (JSON.stringify bunu sessizce atlar
     ama Firestore SDK'nńĪn kendi dońürulamasńĪ senkron/yakalanamaz bir hata
     fńĪrlatńĪr ‚ÄĒ kullanńĪcńĪ raporu: konsolda tekrar tekrar "Uncaught
     FirebaseError ... Unsupported field value: undefined") ‚ÄĒ az √∂nce
     hesapladńĪńüńĪmńĪz json string'ini geri JSON.parse ile nesneye √ßevirip
     kullanńĪyoruz; bu, undefined alanlarńĪ KESńįN olarak temizler (fbClean()'in
     ana cycles senkronunda yaptńĪńüńĪ JSON round-trip ile aynńĪ desen). */
  var temizPayload=JSON.parse(json);
  return FB.db.collection("farms").doc(FARM_CODE).collection("yedekler").doc(docId)
    .set({ts:new Date().toISOString(), gun:todayISO(), veri:temizPayload})
    .catch(function(e){ console.warn("bulut yedek yazńĪlamadńĪ ("+docId+")", e); throw e; });
}
/* Hem CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayńĪsńĪnńĪ aŇüan aktif_/arsiv_ dok√ľmanlarńĪnńĪ siler (hangisi √∂nce tetiklenirse).
   Dok√ľman sayńĪsńĪ zaten bu politikayla sńĪnńĪrlńĪ tutulduńüu i√ßin t√ľm koleksiyonu
   √ßekip JS tarafńĪnda sńĪralamak (ekstra Firestore index'i gerektirmeden) yeterli.
   G√ľnde bir kez denenir (gereksiz okuma/silme trafińüini √∂nlemek i√ßin). */
var TEMIZLIK_GUN_KEY = "utp_cloudbak_temizlikGun";
function cloudYedekEskiSil(){
  if(!FB.ready || !FB.db) return;
  var bugun=todayISO();
  try{ if(localStorage.getItem(TEMIZLIK_GUN_KEY)===bugun) return; }catch(e){}
  var cutoff=addDays(bugun, -CLOUD_BACKUP_RETENTION_GUN);
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  ["aktif_","arsiv_"].forEach(function(prefix){
    refBase.where(firebase.firestore.FieldPath.documentId(), ">=", prefix)
      .where(firebase.firestore.FieldPath.documentId(), "<", prefix+"~")
      .get().then(function(snap){
        var docs=[]; snap.forEach(function(d){ docs.push(d); });
        docs.sort(function(a,b){ return (b.data().ts||"").localeCompare(a.data().ts||""); }); /* en yeni √∂nce */
        docs.forEach(function(d, idx){
          var tooOld = (d.data().gun||"") < cutoff;
          var tooMany = idx >= CLOUD_BACKUP_MAX_KAYIT;
          if(tooOld || tooMany) d.ref.delete().catch(function(e){ console.warn("eski bulut yedeńüi silinemedi", d.id, e); });
        });
      }).catch(function(e){ console.warn("eski bulut yedekleri sorgulanamadńĪ", e); });
  });
  try{ localStorage.setItem(TEMIZLIK_GUN_KEY, bugun); }catch(e){ console.warn("temizlik g√ľn√ľ kaydedilemedi", e); }
}
function cloudYedekTetikle(){
  if(!cloudYedekGerekliMi()) return;
  if(!FB.ready) return; /* internet yoksa sessizce atla, bir sonraki fńĪrsatta dener */
  var d=loadData();
  var olayId=""+Date.now(); /* her yedekleme anńĪ ayrńĪ dok√ľman ‚ÄĒ √∂nceki yedeńüi ezmez */
  var aktifP=cloudYedekYaz("aktif_"+olayId, {cycles:d.cycles||[], gorevler:d.gorevler||[], settings:d.settings||{}});
  cloudYedekYaz("arsiv_"+olayId, {arsiv:d.arsiv||[]}).catch(function(){}); /* arŇüiv ayrńĪ, best-effort ‚ÄĒ b√ľy√ľkse atlanńĪr, ana yedeńüi engellemez */
  cloudYedekEskiSil();
  aktifP.then(function(){
    /* KRńįTńįK: zaman damgasńĪnńĪ ancak yazma GER√áEKTEN baŇüarńĪlńĪ olduktan sonra kaydet.
       Eskiden yazma denemesi baŇülar baŇülamaz (sonucu beklemeden) kaydediliyordu ‚ÄĒ
       yazma sessizce baŇüarńĪsńĪz olsa bile "az √∂nce yedeklendi" g√∂r√ľn√ľyordu. */
    setLastCloudBackup();
    /* Yedekleme ekranńĪ o an a√ßńĪksa, orada da anńĪnda g√∂r√ľns√ľn ‚ÄĒ arka planda otomatik
       tetiklenince ekran kendini yenilemiyordu, √ľstteki rozetle "farklńĪ saat" g√∂steriyordu. */
    if(typeof view!=="undefined" && view && view.name==="yedekleme") render();
  }).catch(function(){ /* ana yedek de baŇüarńĪsńĪz oldu ‚ÄĒ zaman kaydedilmedi, bir sonraki d√∂ng√ľde tekrar dener */ });
}

function autoSnapshot(){
  try{
    var snap={ts:new Date().toISOString(), data:loadData()};
    localStorage.setItem("utp_autobak", JSON.stringify(snap));
    _autoBk=snap;
    var log=loadAutoBackupLog();

    var idx=-1; for(var i=0;i<log.length;i++){ if(log[i].day===day){ idx=i; break; } }
    var entry={day:day, ts:snap.ts, data:snap.data};
    if(idx>=0) log[idx]=entry; else log.push(entry);
    log.sort(function(a,b){ return a.day<b.day?-1:(a.day>b.day?1:0); });
    if(log.length>14) log=log.slice(log.length-14);
    try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }
    catch(e2){
      log=log.slice(Math.ceil(log.length/2));
      try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }catch(e3){ console.warn("otomatik yedek k√ľ√ß√ľlt√ľlerek de yazńĪlamadńĪ", e3); }

}

var HASTALIK_KB = [

function uretimIslemSatirlari(c){

  }
  if(c.tiftikTarihi) rows.push({g:gunNo(c,c.tiftikTarihi), tarih:c.tiftikTarihi, t:"Tiftik"});

  if(c.tirmikTarihi) rows.push({g:gunNo(c,c.tirmikTarihi), tarih:c.tirmikTarihi, t:"TńĪrmńĪk"});
  if(c.havaBaslangic){
    var _hi=protokolRolIdx("hava");
    var _hDetay=_hi>=0 && c.adimDetay && c.adimDetay["p"+_hi];
    rows.push({g:gunNo(c,c.havaBaslangic), tarih:c.havaBaslangic, t:"Havaya baŇülandńĪ"+(_hDetay&&_hDetay.not?(" ‚ÄĒ "+_hDetay.not):"")});
  }
  var dedIdx=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdx[idx]) return;

  });
  return rows.filter(function(x){ return x.g!=="" && x.g!==null && x.g!==undefined; });
}
function kompostChartSVG(c){
  var T=[], CO=[], S=[];
  /* Sulama/ila√ßlama √ßubuklarńĪ artńĪk maddeye g√∂re renklendiriliyor (kullanńĪcńĪ
     isteńüi: "ila√ßlarńĪ farklńĪ, suyu farklńĪ, hepsini farklńĪ renklerde yap") ‚ÄĒ
     su hep sabit mavi, her farklńĪ ila√ß/madde adńĪ kendi rengini alńĪr (ilk
     g√∂r√ľld√ľńü√ľ sńĪrayla paletten atanńĪr, aynńĪ madde her zaman aynńĪ renk). */
  var SU_RENK="#3b82c4";
  var RENK_PALETI=["#8b5cf6","#e0559b","#b5651d","#0e7490","#ca8a04","#64748b","#c026d3","#15803d","#be123c","#4338ca"];
  var renkMap={}, renkSira=[];
  function renkAta(isim){
    if(!isim || isim.toLocaleLowerCase("tr")==="su") return SU_RENK;
    var key=isim.toLocaleLowerCase("tr");
    if(!renkMap[key]){ renkMap[key]=RENK_PALETI[renkSira.length % RENK_PALETI.length]; renkSira.push({isim:isim, renk:renkMap[key]}); }
    return renkMap[key];
  }
  (c.gunluk||[]).forEach(function(r){
    var g=gunNo(c,r.tarih); if(g==="") return;
    var od=numParse(r.odaC), ko=numParse(r.kompostC);
    if(od!==null||ko!==null) T.push({g:g,oda:od,komp:ko});
    var a=numParse(r.co2alt),u=numParse(r.co2ust);
    if(a!==null||u!==null) CO.push({g:g,alt:(a!==null?a:u),ust:(u!==null?u:a)});
    if(r.sulama || r.su){
      var ayrS=gunlukSatirAyristir(r);
      var suMik=gunlukSuMiktari(r);
      var etiketS = ayrS.ilac.length ? ayrS.ilac.join(", ") : (suMik>0 ? "su" : "");
      var anaIsim = ayrS.ilac.length ? ilacIsmiCikar(ayrS.ilac[0]) : "su";
      var renkS = renkAta(anaIsim);
      if(suMik>0 || etiketS) S.push({g:g, su:suMik, etiket:etiketS, renk:renkS});
    }
  });
  if(!T.length && !CO.length) return '<div style="color:#777;font-size:11px;">Grafik i\u00e7in \u00f6l\u00e7\u00fcm yok.</div>';
  var W=760,H=320,padL=44,padR=54,padT=16,padB=64;
  var odaPts=T.filter(function(p){return p.oda!==null;}).map(function(p){return{g:p.g,v:p.oda};}).sort(function(a,b){return a.g-b.g;});
  var kompPts=T.filter(function(p){return p.komp!==null;}).map(function(p){return{g:p.g,v:p.komp};}).sort(function(a,b){return a.g-b.g;});
  CO.sort(function(a,b){return a.g-b.g;});
  var gall=[]; T.forEach(function(p){gall.push(p.g);}); CO.forEach(function(p){gall.push(p.g);}); S.forEach(function(s){gall.push(s.g);});
  var gmin=Math.min.apply(null,gall), gmax=Math.max.apply(null,gall); if(gmax===gmin) gmax=gmin+1;
  var tv=[]; odaPts.concat(kompPts).forEach(function(p){tv.push(p.v);});
  var tmin,tmax; if(tv.length){tmin=Math.floor(Math.min.apply(null,tv)-1);tmax=Math.ceil(Math.max.apply(null,tv)+1);}else{tmin=18;tmax=28;} if(tmax===tmin)tmax=tmin+1;
  var cvals=[]; CO.forEach(function(p){cvals.push(p.alt);cvals.push(p.ust);});
  var hasCo=cvals.length>0, cmin=0,cmax=1;
  if(hasCo){cmin=Math.floor(Math.min.apply(null,cvals));cmax=Math.ceil(Math.max.apply(null,cvals));if(cmax===cmin)cmax=cmin+100;}
  function X(g){return padL+(g-gmin)/(gmax-gmin)*(W-padL-padR);}
  function YT(v){return H-padB-(v-tmin)/(tmax-tmin)*(H-padT-padB);}
  function YC(v){return H-padB-(v-cmin)/(cmax-cmin)*(H-padT-padB);}
  var svg='';
  if(26<=tmax&&24>=tmin) svg+='<rect x="'+padL+'" y="'+YT(26)+'" width="'+(W-padL-padR)+'" height="'+(YT(24)-YT(26))+'" fill="#dcefe2"/>';
  [21,28,30].forEach(function(lim){ if(lim>=tmin&&lim<=tmax){ var col=lim>=30?"#c0291f":"#d98a1f"; svg+='<line x1="'+padL+'" y1="'+YT(lim)+'" x2="'+(W-padR)+'" y2="'+YT(lim)+'" stroke="'+col+'" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>'; } });
  var tstep=Math.max(1,Math.round((tmax-tmin)/5));
  for(var t=tmin;t<=tmax;t+=tstep){var y=YT(t);svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#ececec"/><text x="'+(padL-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#2f6b4f">'+t+'\u00b0</text>';}
  if(hasCo){var cstep=Math.max(1,Math.round((cmax-cmin)/5));for(var cc=cmin;cc<=cmax;cc+=cstep){var yc=YC(cc);svg+='<text x="'+(W-padR+5)+'" y="'+(yc+3)+'" font-size="9" text-anchor="start" fill="#c47a1a">'+cc+'</text>';}}
  /* Sulama/ila√ßlama: g√ľn ekseninde k√ľ√ß√ľk √ßubuklar (y√ľkseklik = verilen su
     miktarńĪ, 0 lt ise minimum g√∂r√ľn√ľr y√ľkseklik) ‚ÄĒ √ľst√ľnde o g√ľn ne verildińüi
     yazar (ila√ßlama varsa ila√ß adlarńĪ, yoksa "su"). */
  if(S.length){
    var barBase=H-padB, barMaxH=54, barW=6;
    var suMax=Math.max.apply(null, S.map(function(s){return s.su;}).concat([1]));
    S.forEach(function(s){
      var x=X(s.g);
      var barH=s.su>0 ? Math.max(4,(s.su/suMax)*barMaxH) : 4;
      var y=barBase-barH;
      svg+='<rect x="'+(x-barW/2)+'" y="'+y+'" width="'+barW+'" height="'+barH+'" fill="'+s.renk+'" fill-opacity="0.6" stroke="'+s.renk+'" stroke-width="0.8"/>';
      if(s.etiket) svg+='<text x="'+(x+3)+'" y="'+(y-3)+'" font-size="8" fill="'+s.renk+'" text-anchor="start" transform="rotate(-60 '+(x+3)+' '+(y-3)+')">'+esc(s.etiket)+'</text>';
    });
  }
  var allg=[]; odaPts.concat(kompPts).forEach(function(p){allg.push(p.g);}); CO.forEach(function(p){allg.push(p.g);}); allg=allg.filter(function(v,i,a){return a.indexOf(v)===i;}).sort(function(a,b){return a-b;});
  var everyX=Math.ceil(allg.length/14)||1;
  allg.forEach(function(g,i){if(i%everyX===0)svg+='<text x="'+X(g)+'" y="'+(H-padB+29)+'" font-size="9" text-anchor="middle" fill="#555">'+g+'</text>';});
  /* D√∂nem Ňüeritleri: g√ľn ekseninin hemen altńĪnda hangi g√ľnlerin hangi √ľretim
     d√∂neminde (Kulu√ßka, Toprak d√∂nemi, 1./2. Misel, Hava d√∂nemi vb.) olduńüunu
     g√∂steren renkli bant + etiket ‚ÄĒ kullanńĪcńĪ isteńüi: "g√ľnlerin altńĪna
     d√∂nemleri ayńĪrmak gerekir, kulu√ßka d√∂nemi toprak d√∂nemi gibi". */
  var faz=phaseList(c).map(function(f){
    if(!f.tarih) return null;
    var fg=gunNo(c,f.tarih); if(fg==="") return null;
    return {ad:f.ad, g:fg};
  }).filter(Boolean).sort(function(a,b){return a.g-b.g;});

function gunlukSatirAyristir(r){
  /* Su alanńĪ normalde sadece sayńĪ olmalńĪ (slider'dan gelir) ama eski/legacy
     kayńĪtlarda serbest metin de olabilir ("250 ml serenade" gibi, yanlńĪŇülńĪkla
     Su kutusuna yazńĪlmńĪŇü) ‚ÄĒ b√∂yle bir metin varsa Sulama/ńįla√ßlama metniyle
     BńįRLńįKTE aynńĪ sńĪnńĪflandńĪrmadan ge√ßirilir. Eskiden bu metin suDegeriGoster
     ile olduńüu gibi (etiketsiz) Sulama s√ľtununda g√∂steriliyordu ‚ÄĒ bu y√ľzden
     "Su" kutusuna yanlńĪŇülńĪkla girilmiŇü bir ila√ß adńĪ hep Sulama'da, buna
     karŇüńĪlńĪk asńĪl sulama miktarńĪ (Sulama/ńįla√ß kutusuna "500 lt" diye
     girilmiŇü) yanlńĪŇülńĪkla ńįla√ßlama'da g√∂r√ľn√ľyordu. */
  var suRaw=(r&&r.su)||"";
  var suSayisalMi=/^\d+([.,]\d+)?$/.test((""+suRaw).trim());
  var metin=(r&&r.sulama)||"";
  if(!suSayisalMi && suRaw) metin = metin ? (metin+" ¬∑ "+suRaw) : (""+suRaw);
  /* "+" sadece boŇüluklu kullanńĪldńĪńüńĪnda ayra√ß sayńĪlńĪr ‚ÄĒ "Hava+1:" gibi
     protokol referans etiketlerinin ortasńĪndaki bitiŇüik "+" b√∂l√ľnmesin. */
  var segments=metin.split(/\s*¬∑\s*|\s+\+\s+/).map(function(s){return s.trim();}).filter(Boolean);
  var uretim=[], ilac=[], sulama=[];
  var ilacAdlari=getIlacList().map(function(x){return (x.ad||"").toLocaleLowerCase("tr");}).filter(Boolean);
  segments.forEach(function(seg){
    var segL=seg.toLocaleLowerCase("tr");
    var uretimMi = /yap[ńĪi]ld[ńĪi]\s*$|ertelendi|erken √ßekildi|kontrol sonucu/i.test(seg);
    if(uretimMi){ uretim.push(seg); return; }
    if(ilacAdlari.some(function(ad){ return segL.indexOf(ad)>=0; })){ ilac.push(seg); return; }
    /* Miktar + (varsa) birim + (varsa) madde adńĪ ayrńĪŇütńĪrńĪlńĪr: "500 lt" gibi
       SADECE miktar+birim (arkasńĪnda madde adńĪ YOK) d√ľz sulama okumasńĪdńĪr;
       "250 ml serenade" veya "2 lt formaldehit" gibi miktardan SONRA bir
       madde adńĪ ge√ßiyorsa ila√ßlamadńĪr ‚ÄĒ birim ml/gr/kg/lt fark etmez
       (formaldehit gibi litreyle dozlanan kimyasallar da dahil). */
    var m=/^(\d+(?:[.,]\d+)?)\s*(ml|gr|kg|lt|litre)?\s*(.*)$/i.exec(seg);
    if(m){
      var isim=(m[3]||"").trim().toLocaleLowerCase("tr");
      if(!isim || isim==="su" || /^su\b/.test(isim)){ sulama.push(seg); }
      else { ilac.push(seg); }
      return;
    }
    if(/\bml\b|\bgr\b|\bkg\b/i.test(seg)){ ilac.push(seg); return; }
    sulama.push(seg);
  });
  return {uretim:uretim, ilac:ilac, sulama:sulama};
}
/* Grafikteki sulama √ßubuńüunun y√ľkseklińüi i√ßin "ger√ßek" litre miktarńĪ ‚ÄĒ Su
   alanńĪ temiz sayńĪysa dońürudan o, deńüilse (eski/legacy kayńĪt, Su kutusuna

   par√ßalarńĪndan (yukarńĪdaki ayrńĪŇütńĪrmanńĪn "sulama" kovasńĪ) miktar okunur ‚ÄĒ

  /* Tonaj: "21160" -> "21.160" (binlik ayra√ß, sadece PDF g√∂r√ľn√ľm√ľ i√ßin) */

/* √úST √ĖZET: ka√ß oda hangi aŇüamada ‚ÄĒ stageOf() zaten her odanńĪn ger√ßek
   aŇüamasńĪnńĪ biliyor, burada sadece sayńĪlńĪyor. Uydurma kategori yok. */
function odaAsamaOzetiHTML(active, tumOdaAdlari){
  var sayim={};
  var sira=["Kulu√ßka d√∂nemi","Toprak d√∂nemi","1. Misel geliŇüim","2. Misel geliŇüim","Pimleme d√∂nemi","Bezelye boyutu","Ceviz boyutu"];
  active.forEach(function(c){
    var t=stageOf(c).t;
    var key=/^Hasat/.test(t)?"Hasat":t;
    sayim[key]=(sayim[key]||0)+1;
  });
  var bosSayi=tumOdaAdlari.length-active.length;
  function kutu(etiket,sayi,renk){
    return '<div style="flex:1;min-width:64px;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px 4px;background:'+(sayi>0?renk:'transparent')+';">'
      +'<div style="font-size:20px;font-weight:700;">'+sayi+'</div>'
      +'<div class="muted" style="font-size:10.5px;line-height:1.2;">'+etiket+'</div>'
      +'</div>';
  }
  var h='<div style="display:flex;gap:6px;flex-wrap:wrap;">';
  sira.forEach(function(ad){
    if(sayim[ad]) h+=kutu(ad.replace(" d√∂nemi","").replace(" geliŇüim","").replace(" boyutu",""), sayim[ad], "var(--amber-soft)");
  });
  Object.keys(sayim).forEach(function(k){
    if(sira.indexOf(k)<0 && k!=="Hasat"){ h+=kutu(k, sayim[k], "var(--teal-soft)"); }
  });
  if(sayim["Hasat"]) h+=kutu("Hasat", sayim["Hasat"], "var(--harvest-soft)");
  h+=kutu("BoŇü", bosSayi, "var(--gray-soft)");
  h+='</div>';
  return h;
}

function addPlan(){
  if(!can("edit")) return noPerm();
  var cikis=el("pl_cikis").value, oda=el("pl_oda").value, firma=el("pl_firma").value; if(firma==="__new__") firma=""; firma=firma.trim();
  if(!cikis){ toast("√áńĪkńĪŇü tarihi gir"); return; }
  if(!oda){ toast("Oda se√ß"); return; }
  getPlan().push({id:uid(), cikis:cikis, oda:normalizeOda(oda), firma:firma, done:false});
  saveData(); toast("Plana eklendi"); render();
}
function delPlan(id){
  if(!can("manage")) return noPerm();
  var pl=getPlan(); var i=-1; pl.forEach(function(x,ix){ if(x.id===id) i=ix; });
  if(i<0) return;
  if(!confirm("Plan satńĪrńĪ silinsin mi?")) return;
  pl.splice(i,1); saveData(); render();
}
function planToOda(id){
  if(!can("edit")) return noPerm();
  var x=getPlan().find(function(p){return p.id===id;});
  if(!x){ toast("Plan bulunamadńĪ"); return; }
  /* Merkezi g√ľvenlik ańüńĪ (DRY): kompost hen√ľz gelmediyse oda a√ßma erken olur ‚ÄĒ
     √ľretim takvimi ve g√ľnl√ľk √∂l√ß√ľmler yanlńĪŇü tarihten baŇülar. Onay iste. */
  var dg = x.cikis ? daysBetween(todayISO(), x.cikis) : 0;
  if(dg && dg>0){
    if(!confirm("Kompost hen√ľz gelmedi ("+dg+" g√ľn sonra: "+fmtDate(x.cikis)+").\n\nOda oluŇüturursan √ľretim takvimi bu tarihten baŇülar ve g√ľnl√ľk √∂l√ß√ľm ekranńĪ erken a√ßńĪlńĪr.\n\nYine de Ňüimdi oluŇüturulsun mu?")){
      return;
    }
  }
  var odaN=normalizeOda(x.oda||"");
  var d=loadData();
  var cakisan = d.cycles.find(function(c){ return normalizeOda(c.oda)===odaN && !c.bosaltimTarihi; });
  if(cakisan){
    toast(odaN+" odasńĪnda zaten aktif kompost var ‚ÄĒ √∂nce o d√∂ng√ľy√ľ boŇüalt");
    return;
  }
  var m2=odaM2Get(odaN);
  var c={id:uid(), oda:odaN, kompostFirma:x.firma||"", gelisTarihi:x.cikis, partiNo:partiFromDate(x.cikis), alanM2:(m2!==null?String(m2):""), gunluk:[], hava:[], hasat:[]};
  /* Kompost BUG√úN/ge√ßmiŇüte geldiyse: oda oluŇüturmak = kompostu koymak =
     kompostu indirmek ‚ÄĒ ayrńĪ bir "kompost indirme" g√∂revi beklememeli.
     Ama ńįLERńį TARńįHLńį (hen√ľz gelmemiŇü) kompost i√ßin indirme GER√áEKLEŇěMEDńį;
     kompostIndirme'yi baŇütan "yapńĪldńĪ" yaparsak "yarńĪn kompost gelecek /
     indirme" hem YarńĪn yapńĪlacaklar'da hem yaklaŇüan-kompost hatńĪrlatńĪcńĪsńĪnda
     GńįZLENńįR (kullanńĪcńĪ raporu: "A-7 yarńĪn kompost gelecek ama yarńĪnki
     iŇülemlerde g√∂r√ľnm√ľyor"). Bu y√ľzden ileri tarihte boŇü bńĪrakńĪlńĪr ‚ÄĒ kompost
     gelince (tarih bug√ľne d√∂n√ľnce) indirme adńĪmńĪ normal Ňüekilde g√∂r√ľn√ľr. */
  if(!(dg>0)) c.kompostIndirme={tarih:c.gelisTarihi};
  d.cycles.push(c);
  touchCycle(c);
  x.done=true;
  saveData(); logAudit("oda oluŇüturuldu (plandan)", c.oda); toast("Oda oluŇüturuldu ‚ÄĒ bilgileri tamamla");
  openForm(c.id);
}

function _pad2(n){ return ("0"+n).slice(-2); }
function parsePlanDate(v){
  if(v==null||v==="") return null;
  if(Object.prototype.toString.call(v)==="[object Date]" && !isNaN(v)) return v.getFullYear()+"-"+_pad2(v.getMonth()+1)+"-"+_pad2(v.getDate());
  if(typeof v==="number"){ var dt=new Date(Math.round((v-25569)*86400000)); return dt.getUTCFullYear()+"-"+_pad2(dt.getUTCMonth()+1)+"-"+_pad2(dt.getUTCDate()); }
  var str=(""+v).trim(); var m=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+_pad2(+m[2])+"-"+_pad2(+m[3]);
  m=str.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ var y=m[3]; if(y.length===2) y="20"+y; return y+"-"+_pad2(+m[2])+"-"+_pad2(+m[1]); }
  return null;
}
function parseSep(text){
  return text.split(/\r?\n/).filter(function(l){return l.trim()!=="";}).map(function(l){
    var sep = l.indexOf("\t")>=0?"\t":(l.indexOf(";")>=0?";":",");
    return l.split(sep).map(function(c){return c.trim().replace(/^"|"$/g,"");});
  });
}
function ensureXLSX(cb){
  if(window.XLSX) return cb(true);
  var sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload=function(){ cb(!!window.XLSX); };
  sc.onerror=function(){ cb(false); };
  document.head.appendChild(sc);
}
function planImportFile(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var name=(f.name||"").toLowerCase();
  if(/\.csv$/.test(name)){
    var rd=new FileReader();
    rd.onload=function(e){ planAddRows(parseSep(e.target.result)); };
    rd.readAsText(f,"utf-8");
  } else {
    toast("Excel okunuyor‚Ä¶");
    ensureXLSX(function(ok){
      if(!ok){ toast("Excel k√ľt√ľphanesi y√ľklenemedi (√ßevrimdńĪŇüńĪ). CSV ya da kopyala-yapńĪŇütńĪr kullan."); return; }
      var rd=new FileReader();
      rd.onload=function(e){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"}); /* cellDates yok: tarihler ham seri olarak gelir, parsePlanDate UTC ile √ßevirir (g√ľn kaymasńĪ olmaz) */
          var names=wb.SheetNames, sheet=names[0];
          if(names.length>1){

function planAddRows(rows){
  if(!rows||!rows.length){ toast("SatńĪr bulunamadńĪ"); return; }
  /* √áok bloklu plan: tekrarlanan baŇülńĪk + boŇü satńĪrlar olabilir.
     BaŇülńĪk satńĪrńĪ g√∂r√ľl√ľnce s√ľtun eŇülemesi (tarih/oda/firma) g√ľncellenir. */
  var ci=-1, oi=-1, fi=-1;        // tarih, oda, firma s√ľtun indexleri
  var dci=1, doi=2, dfi=0;        // baŇülńĪk yoksa varsayńĪlan: firma¬∑tarih¬∑oda
  function isHeader(r){ var j=r.map(function(x){return (""+(x==null?"":x)).toLowerCase();}).join("|"); return /tarih/.test(j) && /oda/.test(j); }
  var pl=getPlan(), add=0, skip=0, dup=0;
  rows.forEach(function(r){
    if(!r||!r.length) return;
    if(isHeader(r)){
      ci=oi=fi=-1;
      r.forEach(function(hd,ix){ hd=(""+(hd==null?"":hd)).toLowerCase().trim();
        if(/tarih|√ßńĪk/.test(hd)) ci=ix; else if(/oda/.test(hd)) oi=ix; else if(/firma/.test(hd)) fi=ix; });
      return;
    }
    var ti=(ci>=0?ci:dci), oo=(oi>=0?oi:doi), ff=(fi>=0?fi:dfi);
    var cikis=parsePlanDate(r[ti]);
    var oda=(r[oo]!=null?(""+r[oo]).trim():"");
    var firma=(ff>=0 && r[ff]!=null)?(""+r[ff]).trim():"";
    if(!cikis || !oda){ skip++; return; }
    var no=normalizeOda(oda);
    if(pl.some(function(q){return q.cikis===cikis && (q.oda||"").toLowerCase()===no.toLowerCase();})){ dup++; return; }
    pl.push({id:uid(), cikis:cikis, oda:no, firma:firma, done:false}); add++;
  });
  saveData();
  toast(add+" plan satńĪrńĪ eklendi"+(dup?(" ¬∑ "+dup+" zaten vardńĪ"):"")+((!add&&!dup)?" ¬∑ uygun satńĪr yok":"")); render();
}

/* ============ ROLLER + AUDIT ============ */
/* ---- Parola g√ľvenlińüi: SHA-256 hash ---- */
/* Eskiden Ňüifreler d√ľz metin (plaintext) saklanńĪyordu ‚ÄĒ hem localStorage'da
   hem Firestore'da. ArtńĪk SHA-256 hash'i saklanńĪyor. Ge√ßiŇü d√∂nemi i√ßin: eski
   plaintext parola ile giriŇüi h√Ęl√Ę kabul ediyoruz, ama baŇüarńĪlńĪ giriŇüte
   otomatik olarak hash'e y√ľkseltiyoruz (kullanńĪcńĪ hi√ßbir Ňüey fark etmez). */
async function hashPass(pass){
  try{
    if(!window.crypto || !window.crypto.subtle){
      /* HTTP (g√ľvensiz bańülam) veya √ßok eski tarayńĪcńĪ ‚ÄĒ crypto.subtle yok.
         Cloudflare Pages HTTPS olduńüu i√ßin normalde buraya d√ľŇümez. */
      console.error("crypto.subtle yok ‚ÄĒ HTTPS bańülantńĪ gerekli");
      return null;
    }
    var enc=new TextEncoder().encode(pass);
    var buf=await crypto.subtle.digest("SHA-256", enc);
    return Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }catch(e){ console.error("hash hatasńĪ", e); return null; }
}
function isHashedPass(s){ return typeof s==="string" && /^[a-f0-9]{64}$/.test(s); }
var ROLE_DEFS={ ziraat:{ad:"Ziraat M√ľhendisi", edit:true, manage:false}, yonetici:{ad:"Y√∂netici", edit:true, manage:true}, sahip:{ad:"Firma Sahibi", edit:false, manage:false}, teknisyen:{ad:"Teknisyen", edit:false, manage:false, ariza:true, kisitli:true} };

function rolePass(){ var d=loadData(); if(!d.settings) d.settings={}; if(!d.settings.roles) d.settings.roles={ziraat:"ziraat", yonetici:"", sahip:"", teknisyen:"teknisyen"}; if(!d.settings.roles.teknisyen) d.settings.roles.teknisyen="teknisyen"; return d.settings.roles; }

/* KRńįTńįK: YENńį bir cihazda (√∂rn. teknisyenin kendi telefonu, √ßiftlik zaten
   kurulu) isSetupNeeded() SADECE yereldeki veriye bakńĪyordu ‚ÄĒ bulut hen√ľz
   ilk ayar senkronunu g√∂ndermeden (Firestore round-trip birka√ß y√ľz ms bile
   s√ľrse) yerel veri boŇü olduńüu i√ßin "kurulum gerekli" sanńĪp dońürudan "ńįlk
   Kurulum" (yeni Y√∂netici/Firma Sahibi parolasńĪ) ekranńĪnńĪ g√∂steriyordu ‚ÄĒ
   oysa √ßiftlińüin GER√áEK ayarlarńĪ buluttan yolda. Biri bu ekrana yanlńĪŇülńĪkla
   yeni parola girip kaydederse, ger√ßek √ßiftlik ayarlarńĪnńĪn (re√ßete, roller,

   b√ľy√ľt√ľyordu). Bulut yapńĪlandńĪrńĪlmńĪŇüsa VE ilk ayar senkronu hen√ľz

   kurulum), eski davranńĪŇüa (yerel karara) d√∂ner, hi√ßbir kullanńĪm senaryosu
   kilitlenmez. */
var _bootWaitPending=false;

    if(isSetupNeeded()){
      if(firebaseYapilandirilmisMi() && !_settingsFirstSyncDone){
        view={name:"bootwait", id:null};

        }, BOOT_WAIT_TIMEOUT_MS);

      }
      view={name:"setup", id:null};
      return;
    }
    /* Kurulum gerekmiyor ‚ÄĒ ama view h√Ęl√Ę "bootwait"ta kalmńĪŇü olabilir (bu
       fonksiyon _bootWaitResolveIfNeeded() √ľzerinden, bulut cevabńĪ GER√áEKTEN
       kurulu bir √ßiftlik olduńüunu dońüruladńĪńüńĪ i√ßin √ßańürńĪlmńĪŇü olabilir).
       view'ńĪ normal akńĪŇüa (login/uygulama) d√∂nd√ľr, aksi halde ekran sonsuza

    if(view.name==="bootwait" || view.name==="setup") view={name:"bugun", id:null};
    currentRole=localStorage.getItem("utp_role")||null;
    currentKullaniciId=localStorage.getItem("utp_kullaniciId")||null;

      var _u=kullaniciListesi().find(function(x){return x.id===currentKullaniciId;});
      if(!_u){
        /* Bu kullanńĪcńĪ Ayarlar > KullanńĪcńĪlar'dan kaldńĪrńĪlmńĪŇü (kullanńĪcńĪ isteńüi:
           "kullanńĪcńĪ kaldńĪr" ger√ßekten eriŇüimi kesmeli) ‚ÄĒ oturumu kapat. */
        currentRole=null; currentKullaniciId=null;
        try{ localStorage.removeItem("utp_role"); localStorage.removeItem("utp_kullaniciId"); }catch(e){ console.warn("oturum temizlenemedi", e); }
      } else {
        currentKullaniciAd=_u.ad;
        currentRole=_u.rol; /* rol√ľ sonradan deńüiŇütirilmiŇüse (bkz. kullaniciRolDegistir) senkron tutulur */

async function doLogin(role){
  var passEl=el("lg_pass"); var pass=(passEl?passEl.value:"").trim();
  var want=(rolePass()[role]||"").trim();
  if(!want){ toast("‚ĚĆ "+ROLE_DEFS[role].ad+" parolasńĪ hen√ľz kurulmamńĪŇü ‚ÄĒ Ayarlar'dan belirle"); return; }
  var ok=false;
  if(isHashedPass(want)){
    var inputHash=await hashPass(pass);
    if(inputHash===null){ toast("‚ĚĆ BańülantńĪ hatasńĪ (HTTPS gerekli), tekrar dene"); return; }
    ok=(inputHash===want);
  } else {
    /* Eski plaintext kayńĪt ‚ÄĒ ge√ßiŇü d√∂nemi karŇüńĪlaŇütńĪrmasńĪ */
    ok=(pass===want);
    if(ok){
      /* BaŇüarńĪlńĪ giriŇü ‚Üí otomatik hash'e y√ľkselt, kullanńĪcńĪ fark etmez */
      var newHash=await hashPass(pass);
      if(newHash){
        var d=loadData(); if(!d.settings) d.settings={}; if(!d.settings.roles) d.settings.roles={};
        d.settings.roles[role]=newHash; saveData();
      }
    }
  }
  if(!ok){
    var er=el("lg_err"); if(er) er.textContent="Ňěifre yanlńĪŇü. B√ľy√ľk/k√ľ√ß√ľk harfe dikkat ‚ÄĒ 'Ňěifreyi g√∂ster' ile kontrol et.";
    toast("Ňěifre yanlńĪŇü"); return;
  }
  currentRole=role; currentKullaniciId=null; currentKullaniciAd=null;
  try{ localStorage.setItem("utp_role",role); localStorage.removeItem("utp_kullaniciId"); }catch(e){ console.warn("rol kaydedilemedi", e); }
  _loginRol=null; _loginKullaniciId=null;
  logAudit("giriŇü", ROLE_DEFS[role].ad); render();
}
async function doLoginKullanici(userId){
  var passEl=el("lg_pass"); var pass=(passEl?passEl.value:"").trim();
  var u=kullaniciListesi().find(function(x){return x.id===userId;});
  if(!u){ toast("KullanńĪcńĪ bulunamadńĪ"); _loginRol=null; _loginKullaniciId=null; render(); return; }
  if(!u.parolaHash){ toast("‚ĚĆ "+esc(u.ad)+" i√ßin Ňüifre hen√ľz kurulmamńĪŇü ‚ÄĒ Ayarlar'dan belirle"); return; }
  var inputHash=await hashPass(pass);
  if(inputHash===null){ toast("‚ĚĆ BańülantńĪ hatasńĪ (HTTPS gerekli), tekrar dene"); return; }
  if(inputHash!==u.parolaHash){
    var er=el("lg_err"); if(er) er.textContent="Ňěifre yanlńĪŇü. B√ľy√ľk/k√ľ√ß√ľk harfe dikkat ‚ÄĒ 'Ňěifreyi g√∂ster' ile kontrol et.";

/* PIN kilidi KALDIRILDI (kullanńĪcńĪ isteńüi: "her seferinde PIN girmek √ßok zor
   oluyor"). Veri artńĪk d√ľz metin olarak IndexedDB'de tutuluyor.
   GE√áńįŇě: bu g√ľncellemeden √ĖNCE PIN ile ŇüifrelenmiŇü veri barńĪndńĪran
   cihazlarda ({enc:1,...} zarfńĪ) ‚ÄĒ sekmede h√Ęl√Ę ge√ßerli bir oturum anahtarńĪ
   varsa (sessionStorage'da, hen√ľz silinmemiŇüse) veriyi SESSńįZCE √ß√∂z√ľp d√ľz
   metne taŇüńĪrńĪz, kullanńĪcńĪ hi√ßbir Ňüey fark etmez. Oturum anahtarńĪ yoksa
   (kilit zaten kapanmńĪŇü/s√ľresi dolmuŇüsa) veriyi √ß√∂zecek bir yol kalmaz ‚ÄĒ
   yerel zarfńĪ atńĪp boŇü baŇülarńĪz; ger√ßek veri Firestore'da (bulutta, hi√ß
   ŇüifrelenmemiŇü) zaten g√ľvende, bulut bańülantńĪsńĪ kurulur kurulmaz saniyeler
   i√ßinde otomatik geri gelir (bkz. FB.coll/gorevColl/arizaColl onSnapshot). */
var PIN_CFG_KEY_ESKI = "utp_pinCfg";
var PIN_SESSION_KEY_ESKI = "utp_pinOturum";
function bufFromB64(b64){
  var bin=atob(b64), bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}
async function eskiSifreliZarfiCozmeyeCalis(env){
  try{
    if(!window.crypto || !window.crypto.subtle) return null;
    var cfg=JSON.parse(localStorage.getItem(PIN_CFG_KEY_ESKI)||"null");
    var sess=JSON.parse(sessionStorage.getItem(PIN_SESSION_KEY_ESKI)||"null");
    if(!cfg || !sess || sess.salt!==cfg.salt) return null;
    var key=await crypto.subtle.importKey("raw", bufFromB64(sess.raw), {name:"AES-GCM"}, true, ["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:bufFromB64(env.iv)}, key, bufFromB64(env.ct));
    return new TextDecoder().decode(pt);
  }catch(e){ console.warn("eski Ňüifreli veri √ß√∂z√ľlemedi (oturum ge√ßersiz)", e); return null; }
}

function arsivGeri(id){
  if(!can("manage")) return noPerm();
