    satirlar.sort(function(x,y){ return y.max-x.max; });
    body+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">'
      +'<div style="font-weight:700;">'+fmtDate(iso)+' '+esc(gunAdi(iso))+(iso===today?' <span class="muted" style="font-weight:400;">(bugГјn)</span>':'')+'</div>';
    if(!satirlar.length){
      body+='<div class="muted" style="font-size:13px;padding:3px 0;">PlanlДұ hasat yok.</div></div>';
      return;
    }
    hicHasatYok=false;
    toplamMin+=gunMin; toplamMax+=gunMax;
    satirlar.forEach(function(s){
      var flasGunGoreli = (s.flas===1?s.gun:s.gun-10); /* 2.flaЕҹ iГ§in HASAT_PLAN'daki 11-15 -> "1-5. gГјn" olarak gГ¶ster */
      body+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px;">'
        +'<span><b>'+esc(s.oda)+'</b> <span class="muted">('+s.flas+'. FlaЕҹ, '+flasGunGoreli+'. gГјn)</span></span>'
        +'<span class="note">'+s.min+'-'+s.max+' kasa'+(s.kaynak==="gercek"?(' <span style="color:var(--green);" title="'+s.n+' geГ§miЕҹ kayda dayalДұ gerГ§ek veri">рҹҢұ</span>'):'')+'</span></div>';
    });
    body+='<div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-top:3px;"><span>GГјn toplamДұ</span><span>'+gunMin+'-'+gunMax+' kasa</span></div></div>';
  });

  if(hicHasatYok){
    return sectionCard('рҹ“Ұ HaftalДұk Hasat Tahmini (Г¶nГјmГјzdeki 7 gГјn)', body+'<div class="muted" style="margin-top:10px;">Г–nГјmГјzdeki 7 gГјnde hiГ§bir odada tahmini hasat gГјnГј yok.</div>');
  }
  body+='<div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:2px solid var(--green);font-size:15px;font-weight:700;">'
    +'<span>HaftalДұk toplam tahmini</span><span>'+toplamMin+'-'+toplamMax+' kasa</span></div>'
    +'<div class="muted" style="text-align:right;font-size:12px;">(~'+(toplamMin*S.kasaAgirlik).toFixed(0)+'-'+(toplamMax*S.kasaAgirlik).toFixed(0)+' kg)</div>'
    +'<div class="muted" style="margin-top:8px;font-size:11.5px;">FlaЕҹ gГјnГјne gГ¶re ortalama kasa aralДұklarДұna dayalДұ kaba tahmindir, kesin deДҹildir.'
    +(gercekVeriKullanildiMi
      ? ' рҹҢұ iЕҹaretli satДұrlar artДұk senin geГ§miЕҹ hasat kayДұtlarДұna dayanДұyor (varsayДұlan tahmin deДҹil).'
      : ' HenГјz yeterli geГ§miЕҹ hasat kaydДұ yok вҖ” en az '+HASAT_GERCEK_MIN_ORNEK+' dГ¶ngГј tamamlanДұnca aynДұ gГјnler iГ§in otomatik olarak kendi gerГ§ek verilerine geГ§er, hiГ§bir Еҹey yapman gerekmez.')
    +'</div>';
  return sectionCard('рҹ“Ұ HaftalДұk Hasat Tahmini (Г¶nГјmГјzdeki 7 gГјn)', body);
}
/* Protokol UygunluДҹu вҖ” firma bazlДұ + oda bazlДұ. "BaЕҹarДұ" = erken + zamanДұnda +
   geГ§-ama-haklДұ-sebepli (c.erteleSebep="biyolojik" вҖ” sarДұm/geliЕҹme yavaЕҹsa puan
   kДұrДұlmaz, odaPerformans() ile AYNI mantДұk). Sadece FД°Д°LEN YAPILMIЕһ adДұmlar
   deДҹerlendirilir; henГјz sДұrasДұ gelmemiЕҹ adДұmlar rapora girmez. */
function protokolUygunlukHTML(){
  var d=loadData();
  var firmaStats={}, odaStats={};
  function bosSayac(){ return {erken:0, zamaninda:0, gecSebep:0, gecSebepsiz:0, toplam:0}; }
  (d.cycles||[]).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi || s.tip!=="olay") return;
      var beklenen=protokolTarih(c,s); if(!beklenen) return;
      var gercek=adimYapilmaTarihi(c,idx,s); if(!gercek) return;
      var firma=c.kompostFirma||"Bilinmiyor", oda=c.oda||"Bilinmiyor";
      if(!firmaStats[firma]) firmaStats[firma]=bosSayac();
      if(!odaStats[oda]) odaStats[oda]=bosSayac();
      var fS=firmaStats[firma], oS=odaStats[oda];
      fS.toplam++; oS.toplam++;
      if(gercek<beklenen){ fS.erken++; oS.erken++; }
      else if(gercek===beklenen){ fS.zamaninda++; oS.zamaninda++; }
      else {
        var sebep=c.erteleSebep && c.erteleSebep["p"+idx];
        if(sebep==="biyolojik"){ fS.gecSebep++; oS.gecSebep++; }
        else { fS.gecSebepsiz++; oS.gecSebepsiz++; }
      }
    });
  });
  function tabloYaz(stats, baslik){
    var keys=Object.keys(stats);
    if(!keys.length) return '';
    var h='<div class="muted" style="margin-top:10px;margin-bottom:4px;">'+baslik+'</div>';
    keys.sort(function(a,b){return stats[b].toplam-stats[a].toplam;}).forEach(function(k){
      var x=stats[k];
      var basari = x.toplam>0 ? Math.round(((x.erken+x.zamaninda+x.gecSebep)/x.toplam)*100) : 0;
      h+='<div style="padding:7px 0;border-bottom:1px solid #eee;">'
        +'<div style="display:flex;justify-content:space-between;"><b>'+esc(k)+'</b><span style="font-weight:700;'+(basari<80?'color:var(--red);':'color:var(--green);')+'">%'+basari+'</span></div>'
        +'<div style="font-size:12px;color:var(--muted);margin-top:2px;">'
        +x.erken+' erken В· '+x.zamaninda+' zamanДұnda В· '+x.gecSebep+' geГ§ (haklДұ sebep) В· '+x.gecSebepsiz+' geГ§ (sebepsiz)'
        +'</div></div>';
    });
    return h;
  }
  var body=tabloYaz(firmaStats,'Firma bazДұnda')+tabloYaz(odaStats,'Oda bazДұnda');
  if(!body) body='<div class="muted">HenГјz deДҹerlendirilecek tamamlanmДұЕҹ protokol adДұmДұ yok.</div>';
  return sectionCard('рҹ“Ӣ Protokol UygunluДҹu', body);
}
/* ============ ГңRETД°M MГңDГңRГң ANALД°Z MOTORU (cihazda, kural tabanlДұ) ============
   KullanДұcДұ isteДҹi: sДұradan veri gГ¶sterimi deДҹil, 20 yДұllДұk Гјretim mГјdГјrГј gibi
   tГјm verileri BД°RLД°KTE deДҹerlendiren bir karar destek raporu. Mevcut analiz
   fonksiyonlarДұnДұ (odaPerformans, tempAlerts, hasatKaymasi, aktifSartliKurallar,
   getTodaysTasks, odaHastalikRiskli, stageOf, siradakiProtokolAdimi,
   beklenenHasat) TEK bir yГ¶netici bakДұЕҹДұnda birleЕҹtirir. Kesin teЕҹhis KOYMAZ вҖ”
   her zaman "mevcut verilere gГ¶re" yorumdur, eksik veri varsa onu sГ¶yler. */

/* Uzun metinleri (Г¶rn. onlarca gecikmiЕҹ adДұmДұn listesi) rapor iГ§in kДұsaltДұr. */
function _analizKisalt(s, n){ s=""+(s||""); n=n||150; return s.length>n ? (s.slice(0,n-1).replace(/\s+\S*$/,'')+"вҖҰ") : s; }
/* Bir Г¶lГ§Гјm alanДұnДұn son n kaydДұndaki eДҹilim (artДұyor/azalДұyor/sabit). */
function analizTrend(c, field, n){
  n = n || 4;
  var recs = (c.gunluk||[]).filter(function(r){ return numParse(r[field])!==null; })
    .sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  if(recs.length < 2) return null;
  recs = recs.slice(-n);
  var ilk = numParse(recs[0][field]), son = numParse(recs[recs.length-1][field]);
  var fark = son - ilk;
  var yon = Math.abs(fark) < 0.6 ? "sabit" : (fark > 0 ? "artДұyor" : "azalДұyor");
  return {yon:yon, ilk:ilk, son:son, fark:fark, n:recs.length};
}
/* OdanДұn son gГјnlГјk Г¶lГ§ГјmГј kaГ§ gГјn Г¶nce (veri tazeliДҹi / eksik veri tespiti). */
function analizSonOlcumGun(c){
  var son = sonGunluk(c);
  if(!son || !son.tarih) return null;
  return daysBetween(son.tarih, todayISO());
}
/* Her aktif odanДұn Г¶nГјmГјzdeki 7 gГјndeki Д°LK hasat gГјnГјnГј dГ¶ndГјrГјr. */
function analizYaklasanHasatlar(){
  var d=loadData(); var today=todayISO();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var out=[];
  aktif.forEach(function(c){
    for(var k=0;k<7;k++){
      var iso=addDays(today,k);
      var a=hasatAsama(c,iso);
      if(a && a.flas>0 && (a.kasaMin>0||a.kasaMax>0)){
        out.push({oda:c.oda, iso:iso, gunSonra:k, flas:a.flas, gun:a.gun, min:a.kasaMin, max:a.kasaMax});
        break; /* sadece bu odanДұn SONRAKД° hasat gГјnГј */
      }
    }
  });
  out.sort(function(a,b){return a.gunSonra-b.gunSonra;});
  return out;
}
/* Tek bir odanДұn tam analizi вҖ” hem "Oda Analizi" hem de mГјdГјr raporu bunu kullanДұr. */
function odaAnalizVeri(c){
  var today=todayISO();
  var perf=odaPerformans(c);
  var puan=perf?perf.puan:null;
  var odaAlerts=tempAlerts().filter(function(a){return a.cid===c.id;});
  var stage=stageOf(c).t, gun=gunNo(c,today);
  var son=sonGunluk(c);
  var sog=analizSonOlcumGun(c);
  var kritik=[], dikkat=[], olumlu=[], eksik=[], sonraki=[], trendler=[];

  /* KRД°TД°K: tehlikeli sДұcaklДұk (lvl 2) */
  odaAlerts.filter(function(a){return a.lvl===2;}).forEach(function(a){
    kritik.push({neden:a.txt, sonuc:"Misel/ГјrГјn zarar gГ¶rebilir, geliЕҹim durabilir.", oneri:"HavalandДұrma/ДұsДұtmayДұ hemen ayarla; 1-2 saat sonra tekrar Г¶lГ§."});
  });
  /* KRД°TД°K: hastalДұk/zararlДұ (son 14 gГјn) */
  if(odaHastalikRiskli(c)){
    var sonH=(c.hastalikKayitlar||[]).slice().sort(function(x,y){return cmpDate(y.tarih,x.tarih);})[0];
    kritik.push({neden:"Son 14 gГјnde hastalДұk/zararlДұ kaydДұ"+(sonH?(" вҖ” "+esc(sonH.tur)):""), sonuc:"YayДұlДұrsa komЕҹu odalara bulaЕҹabilir, verim dГјЕҹer.", oneri:"BГ¶lgeyi izole et, uygun ilaГ§lama/temizlik uygula, komЕҹu odalarДұ da kontrol et."});
  }
  /* KRД°TД°K: sebepsiz/Г¶nlenebilir gecikmeler + kalДұcДұ kritik hatalar вҖ” artДұk
     nedenler listesinde metin/regex arayarak DEДһД°L, odaPerformans'Дұn
     yapДұlandДұrДұlmДұЕҹ alanlarДұndan (SSOT, aynДұ veri Puan DetayДұ'nda da
     kullanДұlДұyor) doДҹrudan okunuyor. */
  if(perf && perf.gecikmisAdimlar.length){
    kritik.push({neden:_analizKisalt(perf.gecikmisAdimlar.length+" gecikmiЕҹ/atlanmДұЕҹ iЕҹlem: "+perf.gecikmisAdimlar.join(", "),150), sonuc:"Protokol sДұrasДұ bozulur, sonraki adДұmlar da kayar.", oneri:"Geciken adДұmДұ bugГјn tamamla ya da haklДұ sebebi (geliЕҹme/sarДұm) iЕҹaretle."});
  }
  if(perf) perf.kritikHatalar.forEach(function(h){
    kritik.push({neden:_analizKisalt(h,150), sonuc:"KalДұcДұ etkisi olabilecek bir hata вҖ” geri alДұnamaz.", oneri:"Bir sonraki dГ¶ngГјde bu adДұmДұn zamanlamasДұna Г¶zellikle dikkat et."});
  });

  /* DД°KKAT: hafif/kritik sДұcaklДұk (lvl 0-1) */
  odaAlerts.filter(function(a){return a.lvl<=1;}).forEach(function(a){ dikkat.push(a.txt); });
  /* DД°KKAT: amonyak */
  if(son && son.amonyak==="Var") dikkat.push("Amonyak kokusu bildirildi вҖ” havalandДұrmayДұ kontrol et.");
  /* DД°KKAT: geГ§miЕҹ sДұcaklДұk maruziyeti (kalДұcДұ, artДұk dГјzeltilemez ama bilgi) вҖ” рҹҢЎпёҸ Д°klim kategorisinin negatif kalemleri */
  if(perf){
    var iklimKat=perf.kategoriler.filter(function(k){return k.key==="iklim";})[0];
    if(iklimKat) iklimKat.kalemler.filter(function(kl){return kl.delta<0;}).forEach(function(kl){ dikkat.push(_analizKisalt(kl.aciklama,150)); });
  }
  /* DД°KKAT: ЕҹartlДұ kurallar (kompost 28В°+ vb.) */
  aktifSartliKurallar(c).forEach(function(ak){ dikkat.push(ak.kural.aciklama||ak.kuralHedefTxt); });

  /* TREND: kompost / oda / COвӮӮ eДҹilimleri */
  [["kompostC","Kompost В°C"],["odaC","Oda В°C"],["co2ust","COвӮӮ"]].forEach(function(f){
    var t=analizTrend(c,f[0],4);
    if(t && t.yon!=="sabit") trendler.push(f[1]+" son "+t.n+" Г¶lГ§Гјmde "+t.yon+" ("+t.ilk+"вҶ’"+t.son+")");
  });

  /* EKSД°K VERД° */
  if(sog===null) eksik.push("HiГ§ gГјnlГјk Г¶lГ§Гјm kaydДұ yok вҖ” analiz sДұnДұrlДұ.");
  else if(sog>=2) eksik.push("Son Г¶lГ§Гјm "+sog+" gГјn Г¶nce вҖ” gГјncel sДұcaklДұk/COвӮӮ gir.");

  /* OLUMLU вҖ” kategorilerin Г¶dГјl (pozitif) kalemleri, SSOT */
  if(puan!=null && puan>=85 && !odaAlerts.length && !odaHastalikRiskli(c)) olumlu.push("Sorunsuz ilerliyor (puan "+puan+"/100).");
  if(perf) perf.kategoriler.forEach(function(k){ k.kalemler.filter(function(kl){return kl.delta>0;}).forEach(function(kl){ olumlu.push(kl.aciklama); }); });

  /* SONRAKД° KRД°TД°K ADIMLAR */
  var sd=siradakiProtokolAdimi(c);
  if(sd){
    var gg=daysBetween(today, sd.t);
    sonraki.push(sd.txt+" вҖ” "+(gg>0?(gg+" gГјn sonra"):(gg===0?"bugГјn":((-gg)+" gГјn gecikti"))));
  }
  var kayma=hasatKaymasi(c);
  if(kayma.neden.length) sonraki.push(kayma.neden[0]);
  var bh=beklenenHasat(c);
  if(bh){ var hgg=daysBetween(today,bh); if(hgg!=null && hgg>=0 && hgg<=14) sonraki.push("Tahmini 1. FlaЕҹ: "+fmtDate(bh)+" ("+hgg+" gГјn sonra)"); }

  return {oda:c.oda, stage:stage, gun:gun, son:son, sonOlcumGun:sog, puan:puan,
    kritik:kritik, dikkat:dikkat, olumlu:olumlu, eksik:eksik, trendler:trendler, sonraki:sonraki, perf:perf};
}
/* TГјm tesis iГ§in gГјnlГјk Гңretim MГјdГјrГј Raporu verisi. */
function uretimMuduruRaporVeri(){
  var d=loadData(); var today=todayISO();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var kritik=[], dikkat=[], olumlu=[], eksik=[], oneriler=[], riskli=[];
  aktif.forEach(function(c){
    var v=odaAnalizVeri(c);
    v.kritik.forEach(function(k){ kritik.push({oda:c.oda, neden:k.neden, sonuc:k.sonuc, oneri:k.oneri}); });
    v.dikkat.forEach(function(x){ dikkat.push({oda:c.oda, metin:x}); });
    v.olumlu.forEach(function(x){ olumlu.push(esc(c.oda)+" ("+v.gun+". gГјn): "+x); });
    v.eksik.forEach(function(x){ eksik.push(esc(c.oda)+": "+x); });
    if(v.puan!=null){
      var neden = v.kritik.length ? v.kritik[0].neden : (v.dikkat.length ? v.dikkat[0] : "");
      riskli.push({oda:c.oda, puan:v.puan, gun:v.gun, neden:neden});
    }
  });
  riskli.sort(function(a,b){ return a.puan-b.puan; });

  /* BugГјn + geciken (getTodaysTasks ile вҖ” SSOT) */
  var tasks=getTodaysTasks();
  var bugun=[], geciken=[];
  tasks.forEach(function(t){
    if(t.done) return;
    var etk = t.tipo==="genel" ? (t.baslik||"") : ((t.oda?t.oda+": ":"")+(t.islem||""));
    if(!etk) return;
    if(t.geciken) geciken.push({metin:etk, gun:daysBetween(t.tarih, today)});
    else bugun.push({metin:etk});
  });
  geciken.sort(function(a,b){return b.gun-a.gun;});

  var hasatlar=analizYaklasanHasatlar();
  kritik.slice(0,5).forEach(function(k){ oneriler.push(esc(k.oda)+": "+k.oneri); });

  var puanlar=riskli.map(function(r){return r.puan;});
  var ortPuan = puanlar.length ? Math.round(puanlar.reduce(function(a,b){return a+b;},0)/puanlar.length) : null;

  return {
    aktifSayi: aktif.length,
    kritik: kritik.slice(0,5),
    dikkat: dikkat,
    olumlu: olumlu,
    eksik: eksik,
    bugun: bugun,
    geciken: geciken,
    hasatlar: hasatlar,
    riskli: riskli.filter(function(r){return r.puan<85;}).slice(0,6),
    oneriler: oneriler,
    ortPuan: ortPuan
  };
}

function akilliAnalizHTML(aktif){
  var bul=[];
  tempAlerts().filter(function(a){return a.lvl>=1;}).forEach(function(a){
    bul.push({sev:"warn", txt:esc(a.oda)+": "+esc(a.txt)});
  });
  aktif.forEach(function(c){

    if(son && son.amonyak==="Var") bul.push({sev:"warn", txt:esc(c.oda)+": amonyak kokusu bildirildi вҖ” havalandДұrmayДұ kontrol et."});
  });
  var vArr=aktif.map(function(c){ var v=verimOzet(c); return {oda:c.oda, verim:v.verim}; }).filter(function(x){return x.verim!=null;});
  if(vArr.length>=2){
    vArr.sort(function(a,b){return a.verim-b.verim;});
    var dusuk=vArr[0], yuksek=vArr[vArr.length-1];
    if(yuksek.verim>0 && dusuk.verim/yuksek.verim<0.7){
      bul.push({sev:"info", txt:esc(dusuk.oda)+" verimi ("+dusuk.verim.toFixed(1)+" kasa/ton) "+esc(yuksek.oda)+"'dan ("+yuksek.verim.toFixed(1)+") belirgin dГјЕҹГјk вҖ” kДұyaslama ekranДұndan kompost/sДұcaklДұk geГ§miЕҹini karЕҹДұlaЕҹtДұr."});

  if(!bul.length) return '<div class="muted">Еһu an dikkat Г§eken bir bulgu yok.</div>';
  return bul.map(function(b){
    return '<div class="kv" style="border-bottom:1px solid #f0f0ec;"><span style="'+(b.sev==="warn"?'color:var(--red);':'color:var(--muted);')+'">'+(b.sev==="warn"?"вҡ пёҸ ":"в„№пёҸ ")+b.txt+'</span></div>';
  }).join('');

  memData={cycles:(entry.data&&entry.data.cycles)||[], settings:(entry.data&&entry.data.settings)||{}, gorevler:(entry.data&&entry.data.gorevler)||[], arsiv:(entry.data&&entry.data.arsiv)||[]};

/* AГҮILIЕһTA SESSД°Z YEDEK: kullanДұcДұ "her aГ§ДұlДұЕҹta buluta yedekle" istedi вҖ” normal
   cloudYedekTetikle() 4 saatlik gate'e takДұlДұyor (art arda aГ§ДұlДұЕҹlarda hep
   yedeklemez). Bu fonksiyon gate'i BYPASS eder ama toast GГ–STERMEZ (sessiz,

var _acilisYedekSonDeneme = 0;
function cloudYedekAcilista(){

  var d=loadData();

  var aktifP=cloudYedekYaz("aktif_"+olayId, {cycles:d.cycles||[], gorevler:d.gorevler||[], settings:d.settings||{}});
  cloudYedekYaz("arsiv_"+olayId, {arsiv:d.arsiv||[]}).catch(function(){});

    setLastCloudBackup();
    if(typeof view!=="undefined" && view && view.name==="yedekleme") render();

var _cloudBakFetching=false;
var _cloudBakErr=null;
/* sessiz: renderYedekleme() ekrana girer girmez otomatik Г§aДҹДұrdДұДҹДұnda true вҖ”
   "YГјkleniyor..." toast'Дұ basmaz, sadece elle "рҹ”„ Bulut yedeklerini listele"
   tДұklanДұnca gГ¶sterilir. Hem otomatik hem elle Г§aДҹrДұda hata olursa _cloudBakErr
   set edilir ve renderYedekleme() bunu KALICI bir mesaj+"Tekrar dene" olarak
   gГ¶sterir вҖ” eskiden hata olunca 1.8sn'lik toast dДұЕҹДұnda hiГ§bir Еҹey gГ¶rГјnmГјyordu,
   kullanДұcДұ ekranДұ sonradan aГ§tДұДҹДұnda (toast kaybolduktan sonra) "liste hiГ§
   Г§ДұkmДұyor" gibi gГ¶rГјnГјyordu (bkz. kullanДұcДұ raporu). */
function cloudYedekleriGetir(sessiz){
  if(!FB.ready || !FB.db){ if(!sessiz) toast("Bulut baДҹlantДұsДұ yok"); _cloudBakErr="Bulut baДҹlantДұsДұ yok"; return; }
  if(_cloudBakFetching) return;
  _cloudBakFetching=true;
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  if(!sessiz) toast("YГјkleniyor...");
  refBase.where(firebase.firestore.FieldPath.documentId(), ">=", "aktif_")
    .where(firebase.firestore.FieldPath.documentId(), "<", "aktif_~")
    .get().then(function(snap){
      var list=[];
      snap.forEach(function(doc){ list.push({olayId:doc.id.replace("aktif_",""), ts:doc.data().ts, gun:doc.data().gun}); });
      _cloudBakList=list.sort(function(a,b){ return (b.ts||"").localeCompare(a.ts||""); });
      _cloudBakErr=null;
      _cloudBakFetching=false;
      render();
    }).catch(function(e){
      console.warn("bulut yedekleri listelenemedi", e);
      _cloudBakErr=(e&&e.message)||"bilinmeyen hata";
      _cloudBakFetching=false;
      if(!sessiz) toast("Bulut yedekleri listelenemedi");
      render();
    });
}
function cloudYedektenGeriYukle(olayId){
  if(!can("manage")) return noPerm();
  if(!FB.ready || !FB.db){ toast("Bulut baДҹlantДұsДұ yok"); return; }
  if(!confirm("Bu bulut yedeДҹi ile cihazdaki TГңM veri (aktif + arЕҹiv) deДҹiЕҹtirilecek. Emin misin?")) return;
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  Promise.all([
    refBase.doc("aktif_"+olayId).get(),
    refBase.doc("arsiv_"+olayId).get()
  ]).then(function(snaps){
    var aktifSnap=snaps[0], arsivSnap=snaps[1];
    if(!aktifSnap.exists){ toast("Bu yedek bulunamadДұ"); return; }
    var av=aktifSnap.data().veri||{};
    var ar=arsivSnap.exists ? (arsivSnap.data().veri||{}) : {};
    /* Eski bir bulut yedeДҹi, o tarihten SONRA silinmiЕҹ hayalet kayДұtlarДұ hГўlГў
       iГ§erebilir вҖ” tombstone listesiyle filtrele, geri gelmesinler. */
    var av_cycles=(av.cycles||[]).filter(function(c){ return !silinenIdMi(c.id); });
    memData={cycles:av_cycles, settings:av.settings||{}, gorevler:av.gorevler||[], arsiv:ar.arsiv||[]};
    _settingsFirstSyncDone = true; /* elle geri yГјkleme вҖ” buluta gГ¶ndermeyi engelleyen kilidi aГ§, bkz. restoreJSON */
    saveData(); toast("вҳҒпёҸ Bulut yedeДҹinden geri yГјklendi"); go("bugun");
  }).catch(function(e){ console.warn("bulut yedek okunamadДұ", e); toast("Bulut yedeДҹi okunamadДұ вҖ” internet baДҹlantДұnДұ kontrol et"); });
}

/* BAKIM: "olay" tipi olmayan (ilaГ§/su) adДұmlarda ertele ASLA olmamalДұ вҖ” hiГ§bir
   UI akДұЕҹДұ bu tiplere ertele yazmaz. Ama eski/buglДұ kod yollarДұndan (v247
   Г¶ncesi) kalДұntДұ veri olabilir ve bu, protokolOneri/yarinPlanlanan gibi
   yerlerde yanlДұЕҹ tarihe sebep olur (kod dГјzeltildi ama eski veri kalabilir).
   Bu tarayДұcДұ+temizleyici o kalДұntДұyДұ bulup gГјvenle siler. */
function bozukErteleTara(){
  var d=loadData();
  var P=getProtokol();
  var bulunan=[];
  (d.cycles||[]).forEach(function(c){
    if(!c.ertele) return;
    Object.keys(c.ertele).forEach(function(key){
      var idx=parseInt(key.substring(1),10);
      var s=P[idx];
      if(!s || s.tip!=="olay"){
        bulunan.push({cid:c.id, oda:c.oda, key:key, deger:c.ertele[key], adim:s?s.txt:"(bilinmeyen adДұm)"});
      }
    });
  });
  return bulunan;
}
function bozukErteleTemizle(){
  if(!can("manage")) return noPerm();
  var bulunan=bozukErteleTara();
  if(!bulunan.length){ toast("Temiz вҖ” bozuk kayДұt yok"); return; }
  var ozet=bulunan.slice(0,3).map(function(b){return b.oda+" вҖ” "+b.adim;}).join(", ");
  if(!confirm(bulunan.length+" adet geГ§ersiz sulama/ilaГ§ plan kaydДұ bulundu ("+ozet+(bulunan.length>3?", ...":"")+"). Bunlar GГјnlГјk Tur Г¶nerilerinde yanlДұЕҹ tarihlere sebep oluyor. Temizlensin mi?")) return;
  var d=loadData();
  bulunan.forEach(function(b){
    var c=d.cycles.find(function(x){return x.id===b.cid;});
    if(c && c.ertele) delete c.ertele[b.key];
  });
  saveData(); logAudit("bozuk sulama plan verisi temizlendi", bulunan.length+" kayДұt"); toast(bulunan.length+" kayДұt temizlendi"); render();
}
/* BAKIM: v253 Г¶ncesi, her "Planla" iЕҹlemi eskiyi silmeden yeni not ekliyordu
   ("TДұrmДұk iГ§in plan X В· TДұrmДұk iГ§in plan Y В· ..."). v253 bunu dГјzeltti (artДұk
   aynДұ adДұm iГ§in sadece SONUNCUSU tutulur) ama GEГҮMД°ЕһTE birikmiЕҹ notlar
   otomatik temizlenmez. Bu araГ§, aynДұ "X iГ§in plan" Г¶nekiyle birden fazla kez
   tekrarlanan notlarДұ bulup sadece en sonuncusunu bДұrakДұr вҖ” "iГ§in plan"
   olmayan diДҹer notlara (Г¶rn. "yapДұldДұ" tamamlama kayДұtlarДұ) dokunmaz. */
function tekrarliPlanNotlariTara(){
  var d=loadData();
  var bulunan=[];
  (d.cycles||[]).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var v=g.islemNot; if(!v) return;
      var parcalar=(""+v).split(" В· ").map(function(x){return x.trim();}).filter(Boolean);
      var gruplar={};
      parcalar.forEach(function(p,i){
        var m=/^(.+?) iГ§in plan /.exec(p);
        if(m){ (gruplar[m[1]]=gruplar[m[1]]||[]).push(i); }
      });
      if(Object.keys(gruplar).some(function(k){return gruplar[k].length>1;})){
        bulunan.push({cid:c.id, oda:c.oda, tarih:g.tarih});
      }
    });
  });
  return bulunan;
}
function tekrarliPlanNotlariTemizle(){
  if(!can("manage")) return noPerm();
  var bulunan=tekrarliPlanNotlariTara();
  if(!bulunan.length){ toast("Temiz вҖ” tekrarlayan plan notu yok"); return; }
  var ozet=bulunan.slice(0,3).map(function(b){return b.oda+" ("+fmtDate(b.tarih)+")";}).join(", ");
  if(!confirm(bulunan.length+" gГјndeki tekrarlayan plan notlarДұ tek satДұra indirilecek ("+ozet+(bulunan.length>3?", ...":"")+"). Devam edilsin mi?")) return;
  var d=loadData();
  bulunan.forEach(function(b){
    var c=d.cycles.find(function(x){return x.id===b.cid;}); if(!c) return;
    var g=(c.gunluk||[]).find(function(x){return x.tarih===b.tarih;}); if(!g || !g.islemNot) return;
    var parcalar=(""+g.islemNot).split(" В· ").map(function(x){return x.trim();}).filter(Boolean);
    var sonIdx={};
    parcalar.forEach(function(p,i){ var m=/^(.+?) iГ§in plan /.exec(p); if(m) sonIdx[m[1]]=i; });
    var yeni=parcalar.filter(function(p,i){
      var m=/^(.+?) iГ§in plan /.exec(p);
      return !m || sonIdx[m[1]]===i; /* "iГ§in plan" deДҹilse hep kalДұr; Г¶yleyse sadece en son gГ¶rГјleni */
    });
    g.islemNot=yeni.join(" В· ");
  });
  saveData(); logAudit("tekrarlayan plan notlarДұ temizlendi", bulunan.length+" kayДұt"); toast(bulunan.length+" kayДұt temizlendi"); render();
}

/* ReГ§ete satДұrlarДұnДұ Ayarlar'da gГ¶sterirken kronolojik/iЕҹ akДұЕҹДұ sДұrasДұna gГ¶re
   sДұralamak iГ§in ortak anahtar. ESKД°DEN sadece "gelis" ve "toprak" referanslarДұ
   doДҹru normalize ediliyordu вҖ” "poЕҹet"e, "tiftik"e, "tДұrmДұk"a referans veren
   satДұrlar (Г¶rn. Serenade: poЕҹet+8) ham gГјn sayДұsДұyla (8) sДұralanДұyordu, sanki
   geliЕҹ+8'miЕҹ gibi вҖ” oysa gerГ§ekte poЕҹet zaten geliЕҹ+6-7 civarДұ olduДҹundan
   gerГ§ek sДұrasДұ Г§ok daha geriydi. ArtДұk TГңM referans zinciri (kompost indirme вҶ’
   poЕҹet вҶ’ tiftik/toprak вҶ’ tДұrmДұk вҶ’ hava вҶ’ hasat) Г¶zyinelemeli olarak "geliЕҹ
   ekseni"ne Г§Г¶zГјlГјyor вҖ” dГ¶ngГј/sonsuz Г¶zyineleme korumasДұ var. */
function protokolSiraAnahtari(s, _derinlik){
  _derinlik = _derinlik||0;
  if(_derinlik>8) return 90000+(s.gun||0); /* dГ¶ngГј korumasДұ */
  if(!s || !s.ref || s.ref==="gelis") return (s&&s.gun)||0;
  if(s.ref==="toprak"){
    var offToprak=getSet().offToprak||13;
    return offToprak+(s.gun||0);
  }
  /* poset/tiftik/tirmik/hava/kompostindirme/Г¶zel referanslar: o rolГјn KENDД°
     satДұrДұnДұ bul, onun ekseni + bu satДұrДұn gГјn farkДұ */
  var refIdx=protokolRolIdx(s.ref);
  /* SAHД°PSД°Z REFERANS: bu referansДұ (Г¶rn. Г¶zel eklenen "1. FlaЕҹ") hiГ§bir satДұr
     henГјz Rol olarak almamДұЕҹsa, sistem "bu ne zaman?" bilemiyor demektir.
     ESKД°DEN bu durumda ham gГјn sayДұsДұyla (Г¶rn. 5) sДұralanДұyordu вҖ” sanki
     geliЕҹten 5 gГјn sonraymДұЕҹ gibi listenin EN BAЕһINA Г§ДұkДұyordu, oysa gerГ§ekte
     Г§ok daha geГ§ bir aЕҹama olabilir (Г¶rn. "1. FlaЕҹ" hasat civarДұ). ArtДұk
     sahipsiz referanslar listenin SONUNA atДұlДұyor (90000+) вҖ” en azДұndan
     yanlДұЕҹ yere deДҹil, gГ¶ze Г§arpan/kontrol edilmesi gereken bir yere dГјЕҹer. */
  if(refIdx<0) return 90000+(s.gun||0);
  var refStep=getProtokol()[refIdx];
  if(!refStep) return 90000+(s.gun||0);
  return protokolSiraAnahtari(refStep, _derinlik+1) + (s.gun||0);
}

function protokolSatirKaydet(idx){
  if(!can("manage")) return noPerm();
  var d=loadData(); ensureProtokol();
  var P=d.settings.protokol; if(!P||!P[idx]) return;
  var txt=el("pr_txt_"+idx).value;
  var gun=parseInt(el("pr_gun_"+idx).value,10);
  if(!isNaN(gun)) P[idx].gun=gun;
  if(txt!=null) P[idx].txt=txt;
  var se=el("pr_sahip_"+idx); if(se) P[idx].sahip=se.value;
  var sre=el("pr_sure_"+idx); if(sre){ var sv=parseInt(sre.value,10); P[idx].sure=(isNaN(sv)||sv<1)?1:sv; }
  var tk=el("pr_tekrar_"+idx); if(tk){ var tv=parseInt(tk.value,10); P[idx].tekrar=(isNaN(tv)||tv<0)?0:tv; }
  var rl=el("pr_rol_"+idx); if(rl) P[idx].rol=rl.value||"";
  /* ГҮД°FT ROL ATAMASI KORUMASI: aynДұ Rol (Г¶rn. "2. FlaЕҹ") yanlДұЕҹlДұkla birden
     fazla satДұra atanmДұЕҹsa, protokolRolIdx() sadece Д°LK bulduДҹunu kullanДұr вҖ”
     kullanДұcДұ ikinci satДұra Rol atadДұДҹДұnДұ sanДұr ama sistem hГўlГў eskisini
     baz alДұr, kafa karДұЕҹtДұrДұcДұ/Г§eliЕҹkili sonuГ§lar Гјretir. Burada yeni Rol
     atanДұrken, AYNI Rol'Гј taЕҹДұyan BAЕһKA satДұrlardan otomatik kaldДұrДұlДұr вҖ”
     "bu rolГј artДұk BEN taЕҹДұyorum" mantДұДҹДұyla tek sahip garanti edilir. */
  if(rl && rl.value){
    var yeniRol=rl.value, tasindi=0;
    P.forEach(function(diger,dIdx){
      if(dIdx!==idx && !diger.silindi && diger.rol===yeniRol){ diger.rol=""; tasindi++; }
    });
    if(tasindi>0) toast('вҡ пёҸ "'+refEtiketi(yeniRol)+'" rolГј baЕҹka '+tasindi+' satДұrdan kaldДұrДұlДұp buraya taЕҹДұndДұ');
  }
  /* Referans noktasДұ (Kompost indirme/PoЕҹet/Tiftik/Toprak/TДұrmДұk/Hava/GeliЕҹ) вҖ”
     eskiden bu satДұrlarda hiГ§ dГјzenlenemiyordu, sadece yeni satДұr eklerken
     (ve orada da sadece GeliЕҹ/Toprak seГ§eneДҹi vardДұ) ayarlanabiliyordu. Bu,
     "PoЕҹetten sonra sulama vermedi" ve "sДұradaki iЕҹlem sДұra atlДұyor" gibi
     hatalarДұn temel sebebiydi вҖ” kullanДұcДұ referansДұ gГ¶remiyor/deДҹiЕҹtiremiyordu. */
  var refEl=el("pr_ref_"+idx);
  if(refEl && refEl.value){
    var eskiRef=P[idx].ref;
    P[idx].ref=refEl.value;
    if(refEl.value!==eskiRef && protokolRefDongusuVarMi(idx)){
      /* Bu referans zinciri kendine geri dГ¶nГјyor вҖ” kaydedilirse uygulama her
         bu adДұmДұn tarihi hesaplanmaya Г§alДұЕҹДұldДұДҹДұnda Г§Г¶kerdi (sonsuz
         Г¶zyineleme). DeДҹiЕҹikliДҹi geri al, kullanДұcДұyДұ net bir Еҹekilde uyar. */
      P[idx].ref=eskiRef;
      refEl.value=eskiRef;
      showWarnBox("вқҢ DГ¶ngГјsel Referans", [
        '"'+esc(refEtiketi(refEl.value))+'" referansДұ seГ§ilemedi вҖ” bu adДұmДұn referans zinciri dolaЕҹДұp kendine geri dГ¶nГјyor.',
        "Г–rnek: A adДұmДұ B'ye bakДұyor, B de (dolaylДұ olarak) A'ya bakДұyorsa dГ¶ngГј oluЕҹur.",
        "DeДҹiЕҹiklik kaydedilmedi, Г¶nceki referans korundu."
      ]);
    }
  }
  var scEl=el("pr_sonuc_"+idx);
  if(scEl){ P[idx].sonucSecenekleri = scEl.value.split(",").map(function(x){return x.trim();}).filter(Boolean); }
  /* TekrarlДұ sulama/ilaГ§ kuralДұ (MГјhendis ProtokolГј satДұrlarДұ): "HER GГңN
     tekrarlansДұn" kutusu iЕҹaretliyse tekrarBitisRef/tekrarBitisGun kaydedilir,
     deДҹilse (daha Г¶nce varsa) TEMД°ZLENД°R. Bu alan eskiden mevcut satДұrlarda
     hiГ§ dГјzenlenemiyordu вҖ” sadece yeni eklenirken ayarlanabiliyordu. Bir kez
     eksik kaydedilmiЕҹ satДұrlar bu formdan artДұk dГјzeltilebilir. */
  var trChk=el("pr_tekrar_chk_"+idx);
  if(trChk){
    if(trChk.checked){
      var trRef=el("pr_tekrar_ref_"+idx); var trGun=el("pr_tekrar_gun_"+idx);
      var trGunV=trGun?parseInt(trGun.value,10):0;
      P[idx].tekrarBitisRef=trRef?trRef.value:"toprak";
      P[idx].tekrarBitisGun=isNaN(trGunV)?0:trGunV;
    } else {
      delete P[idx].tekrarBitisRef;
      delete P[idx].tekrarBitisGun;
    }

  d.settings.protokolOzellestirildi=true;
  saveData(); toast("Kaydedildi"); render();
}

/* ---------- GГјnlГјk tur: protokolden sulama Г¶nerisi ---------- */
/* Bir protokol adДұmДұnДұn uygulandДұДҹДұ TARД°H ARALIДһINI dГ¶ndГјrГјr.
   Normal (tekil) adДұmlarda baЕҹlangДұГ§=bitiЕҹ=protokolTarih(c,step).
   "tekrarBitisRef" tanДұmlДұ adДұmlarda (Г¶rn. poЕҹetten toprak-2'ye kadar HER GГңN
   500 lt su + Serenade) baЕҹlangДұГ§ poЕҹetin tarihi, bitiЕҹ topraДҹДұn (tekrarBitisGun
   kadar kaydДұrДұlmДұЕҹ) tarihidir вҖ” toprak ertelenirse bitiЕҹ de otomatik kayar. */
function protokolAdimAraligi(c, step){
  if(!step) return null;
  var baslangic=protokolTarih(c, step);
  if(!baslangic) return null;
  if(!step.tekrarBitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitisRef=protokolReferansTarihi(c, step.tekrarBitisRef, step.rol);
  if(!bitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitis=addDays(bitisRef, step.tekrarBitisGun||0);
  if(cmpDate(bitis, baslangic) < 0) return null; /* aralДұk bu partide anlamsДұzsa (toprak Г§ok erken vb.) gГ¶sterme */
  return {baslangic:baslangic, bitis:bitis};
}
function protokolOneri(c, iso){
  var out=[];
  /* Oda Еҹu an hangi aЕҹamada? Sulama/ilaГ§ Г¶nerisi SADECE oda o aЕҹamada veya
     daha sonraki aЕҹamadaysa gГ¶sterilsin. Г–rn: Toprak aЕҹamasДұndayken "Hava+3 su"
     Г¶nerisi gelmemeli вҖ” Г§ГјnkГј henГјz Hava aЕҹamasДұna gelmedi. */
  var odaAsamasi = stageOf(c).t; /* "Toprak dГ¶nemi", "1. Misel geliЕҹim", vb */
  
  getProtokol().forEach(function(s,idx){
    if(s.silindi || (s.tip!=="ilac" && s.tip!=="su")) return;
    if(s.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,s);
      if(ar && cmpDate(iso,ar.baslangic)>=0 && cmpDate(iso,ar.bitis)<=0) out.push(adimGosterMetni(c, idx, s, iso));
      return;
    }
    var dt=protokolTarih(c,s); if(!dt) return;
    /* KRД°TД°K: ilaГ§/su adДұmlarДұnДұn KENDД° ertelemesi (c.ertele["p"+idx]) eskiden
       hiГ§ uygulanmДұyordu вҖ” sarДұm topraДҹa geГ§mediyse formaldehit gГјnГјnГј 1 gГјn
       ertelemek gibi bir aksiyonun hiГ§bir etkisi olmuyordu (bkz.
       sarimSoruCevapla). protokolTarih() SADECE referans zincirindeki Г–NCEKД°
       adДұmlarДұn ertelemesini taЕҹДұr, adДұmДұn KENDД° ertelemesini SSOT deseni
       gereДҹi Г§aДҹДұran ekler вҖ” burada da aynДұ desen uygulanДұyor. */
    var _ert=(c.ertele && c.ertele["p"+idx])||0;
    if(_ert) dt=addDays(dt,_ert);

    /* YALNIZCA bugГјn iГ§in sulama/ilaГ§ вҖ” eski tarihlerde deДҹil */
    if(dt!==iso) return;
    
    /* AЕҹama kontrolГј: Sulama/ilaГ§ ref'Дұ oda'nДұn bulunduДҹu aЕҹamaya uygun mu?
       Toprak dГ¶nemindeyken вҶ’ ref:"toprak" sulamalar вң“
       Hava dГ¶nemindeyken вҶ’ ref:"hava" sulamalar вң“
       Ama Toprak dГ¶nemindeyken ref:"hava" sulamalar gГ¶sterilmemeli вң— */
    var refAsamaPiramidi = {
      gelis:0, poset:1, tiftik:2, toprak:3, tirmik:4, hava:5, hasat:6
    };
    var sulamaRefSeviye = refAsamaPiramidi[s.ref] || -1;
    var odaAsamaSeviye = odaAsamasi.includes("KuluГ§ka") ? 0
      : odaAsamasi.includes("Toprak dГ¶nemi") ? 3
      : odaAsamasi.includes("1. Misel") ? 4
      : odaAsamasi.includes("2. Misel") ? 5
      : odaAsamasi.includes("Pimleme") ? 5
      : odaAsamasi.includes("Bezelye") ? 5
      : odaAsamasi.includes("Ceviz") ? 5
      : odaAsamasi.includes("Hasat") ? 6
      : -1;
    
    /* Sulama ref'Дұ oda'nДұn aЕҹamasДұndan SONRASINA referans veriyorsa, henГјz
       o aЕҹamaya gelmediДҹinden sulamayДұ gizle. */
    if(sulamaRefSeviye > odaAsamaSeviye) return;
    
    var metin = adimGosterMetni(c, idx, s, iso);
    /* Placeholder/sentinel metin kontrolГј: kullanДұcДұ protokole "bu gГјn hiГ§bir
       Еҹey verilmeyecek" anlamДұnda "boЕҹ" gibi bir yer tutucu metin girmiЕҹ
       olabilir (Г¶rn. Toprak+2 satДұrДұ). Bu, GERГҮEK bir sulama/ilaГ§ Г¶nerisi
       DEДһД°LDД°R вҖ” gГ¶reve Г§evrilmemeli, aksi halde "A-1 вҖ” boЕҹ" gibi anlamsДұz
       gГ¶revler oluЕҹur. */
    var PLACEHOLDER_RE = /^(boЕҹ|yok|hiГ§ ?bir ?Еҹey|hiГ§bir Еҹey verilmeyecek|-|вҖ”)$/i;
    if(PLACEHOLDER_RE.test((metin||"").trim())) return;
    out.push(metin);
  });
  return out.join(" + ");
}
/* "SarДұm kontrolГј" gereken ilaГ§ adДұmДұ: formaldehit uygulamasДұ, sarДұm
   topraДҹa henГјz geГ§mediyse 1 gГјn ertelenmeli (kullanДұcДұ isteДҹi). Metin
   eЕҹleЕҹmesi (protokol satДұrДұnДұn txt'inde "formaldehit" geГ§iyorsa) вҖ” bu satДұr
   varsayДұlan protokolde zaten tek, kullanДұcДұ yeniden adlandДұrДұrsa da "kГ¶k
   kelime" korunduДҹu sГјrece Г§alДұЕҹmaya devam eder. */
function sarimKontrolluMu(s){ return !!(s && s.tip==="ilac" && /formaldehit/i.test(s.txt||"")); }
/* BugГјn iГ§in sarДұm-kontrollГј bir ilaГ§ adДұmДұ var mДұ (ertele dahil edilmiЕҹ
   gerГ§ek tarihiyle) вҖ” varsa {idx,s} dГ¶ner, yoksa null. */
function bugunSarimKontroluGerekliMi(c, iso){
  var out=null;
  getProtokol().forEach(function(s,idx){
    if(out || s.silindi || !sarimKontrolluMu(s)) return;
    var base=protokolTarih(c,s); if(!base) return;
    var ert=(c.ertele && c.ertele["p"+idx])||0;
    var dt=ert?addDays(base,ert):base;
    if(dt===iso) out={idx:idx, s:s};
  });
  return out;
}
/* Evet/HayДұr cevabДұ вҖ” HayДұr ise adДұmДұn KENDД° ertelemesini +1 gГјn artДұrДұr
   (protokolOneri artДұk bunu okuyor, bkz. yukarДұdaki yorum). Ertesi gГјn adДұm
   yine bugГјne denk geleceДҹi iГ§in (yeni ertelenmiЕҹ tarihiyle), sarДұm hГўlГў
   geГ§mediyse soru tekrar sorulur вҖ” "geГ§ene kadar ertelenir" tam olarak
   bГ¶yle saДҹlanДұyor. Evet ise sadece bugГјne cevap kaydedilir, adДұm normal
   Еҹekilde (protokolOneri ile) Г¶nerilir. */
function sarimSoruCevapla(cid, idx, cevap){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var st=getProtokol()[idx];
  if(!c.sarimKontrol) c.sarimKontrol={};
  c.sarimKontrol["p"+idx]={tarih:todayISO(), cevap:cevap};
  if(cevap==="hayir"){
    if(!c.ertele) c.ertele={};
    c.ertele["p"+idx]=(c.ertele["p"+idx]||0)+1;
    gunlukGorevNotEkle(c, (st?st.txt:"Formaldehit")+" вҖ” sarДұm topraДҹa geГ§mediДҹi iГ§in 1 gГјn ertelendi вҖ” "+kimNeZamanEtiketi());
    touchCycle(c); saveData(); toast("YarДұna ertelendi"); render();
  } else {
    touchCycle(c); saveData(); toast("Kaydedildi вҖ” bugГјnkГј uygulama devam edebilir"); render();
  }
}

/* ---------- FlaЕҹ bazlДұ verim (F1 vs F2 kg/kasa) ---------- */
function verimFlasOzet(c){
  var S=getSet(); var out={};
  (c.hasat||[]).forEach(function(h){
    var ha=hasatAsama(c,h.tarih);
    var key=(ha&&ha.flas>0)?("F"+ha.flas):"diДҹer";
    if(!out[key]) out[key]={kasa:0};
    out[key].kasa+=(numParse(h.kasa)||0);
  });
  Object.keys(out).forEach(function(k){ out[k].kg=out[k].kasa*S.kasaAgirlik; });
  return out;
}
/* ---------- Tahmini verim (aktif odalar iГ§in, firma/filo geГ§miЕҹine gГ¶re) ---------- */
function firmaOrtalamaKgTon(firma){
  var vals=tumTamamlananDongu().filter(function(c){return (c.kompostFirma||"")===firma;}).map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function filoOrtalamaKgTon(){
  var vals=tumTamamlananDongu().map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function tahminiVerim(c){
  if(c.bosaltimTarihi) return null;
  var ton=(numParse(c.tonaj)||0)/1000; if(ton<=0) return null;
  var f=firmaOrtalamaKgTon(c.kompostFirma||"");
  var kaynak;
  if(f && f.n>=2){ kaynak="firma ortalamasДұ ("+esc(c.kompostFirma||"")+", n="+f.n+")"; }
  else { f=filoOrtalamaKgTon(); kaynak=f?("filo geneli ortalamasДұ, n="+f.n):null; }
  if(!f) return null;
  return {kg: f.ort*ton, kaynak: kaynak};
}
/* ============ Kompost Firma Performans Analizi ============
   Her firma, geГ§miЕҹ TГңM tamamlanmДұЕҹ (boЕҹaltДұlmДұЕҹ + hasat kaydДұ olan) odalarДұ
   Гјzerinden 7 kategoride 100 puan Гјzerinden deДҹerlendirilir. HiГ§bir puan
   kalДұcДұ olarak SAKLANMAZ вҖ” odaPerformans/hasatEgrisiAnaliz'le aynДұ mimari:
   her render'da mevcut veriden CANLI hesaplanДұr, bu yГјzden "her yeni oda
   tamamlandДұДҹДұnda puan gГјncellensin" isteДҹi ekstra bir tetikleyici kodu
   gerektirmeden kendiliДҹinden saДҹlanДұr. Kategori fonksiyonlarДұ mГјmkГјn olan
   yerde MEVCUT oda-bazlДұ fonksiyonlarДұ (SSOT) yeniden kullanДұr:
   _puanIklim/_puanMiselGelisimi (v382), hasatEgrisiAnaliz (v385),
   firmaOrtalamaKgTon/filoOrtalamaKgTon вҖ” tekrar hesaplama YAPILMAZ. */

/* рҹ“Ӣ Protokol Uyumu (20) вҖ” kompost ortalama kaГ§ДұncДұ gГјnde tiftik/toprak/
   hava/ilk flaЕҹa ulaЕҹДұyor. Tek baЕҹДұna erken ya da geГ§ olmak CEZALANDIRILMAZ
   (tutarlДұ bir erken firma hДұzlДұ geliЕҹim demek olabilir) вҖ” asДұl Г¶lГ§Гјlen
   TUTARLILIK (sapma): aynДұ firma bazen Г§ok erken bazen Г§ok geГ§ kalДұyorsa
   (Г¶ngГ¶rГјlemezlik) puan kДұrДұlДұr. */
function _firmaProtokolUyumu(cycles){
  var maks=20, puanPerCheckpoint=5;
  var checkpoints=[
    {key:'tiftik', ad:'Tiftik', takAd:'Tiftik', gercek:function(c){return c.tiftikTarihi;}},
    {key:'toprak', ad:'Toprak serimi', takAd:'Toprak', gercek:function(c){return c.toprakTarihi;}},
    {key:'hava', ad:'Hava baЕҹlangДұcДұ', takAd:'Hava', gercek:function(c){return c.havaBaslangic;}},
    {key:'flas1', ad:'Д°lk flaЕҹ baЕҹlangДұcДұ', takAd:'1. FlaЕҹ', gercek:function(c){return (c.hasat&&c.hasat.length)?hasatBaslangic(c):null;}}
  ];
  var puanToplam=0, kalemler=[], bulgular=[];
  checkpoints.forEach(function(cp){
    var farklar=[];
    cycles.forEach(function(c){
      var tak=beklenenTakvim(c);
      var row=tak.filter(function(r){return r.ad===cp.takAd;})[0];
      var beklenen=row?row.beklenen:null, gercek=cp.gercek(c);
      if(beklenen && gercek){ var d=daysBetween(beklenen,gercek); if(d!=null) farklar.push(d); }
    });
    if(farklar.length<2){ puanToplam+=puanPerCheckpoint; return; } /* yeterli veri yok вҖ” nГ¶tr (tam puan) */
    var ort=farklar.reduce(function(a,b){return a+b;},0)/farklar.length;
    var sapma=Math.sqrt(farklar.reduce(function(s,x){return s+Math.pow(x-ort,2);},0)/farklar.length);
    var puan=Math.max(0, puanPerCheckpoint-Math.min(puanPerCheckpoint, sapma*1.1));
    if(Math.abs(ort)>4) puan=Math.max(0, puan-1); /* Г§ok bГјyГјk ortalama sapma (tutarlДұ olsa da) kГјГ§Гјk ek not */
    puanToplam+=puan;
    if(puan<puanPerCheckpoint-0.5){
      kalemler.push(_kalem(Math.round((puan-puanPerCheckpoint)*10)/10, cp.ad+" zamanlamasДұ tutarsДұz (ort. "+(ort>=0?"+":"")+ort.toFixed(1)+" gГјn, sapma Вұ"+sapma.toFixed(1)+" gГјn, n="+farklar.length+")"));
    }
    bulgular.push({ad:cp.ad, ortalama:ort, sapma:sapma, n:farklar.length});
  });
  if(!kalemler.length) kalemler.push(_kalem(0,"Protokol kilometre taЕҹlarДұ Г¶ngГ¶rГјlebilir zamanlamayla ilerliyor"));
  puanToplam=Math.max(0,Math.min(maks,Math.round(puanToplam*10)/10));
  return {puan:puanToplam, maks:maks, kalemler:kalemler, bulgular:bulgular};
}
/* рҹҢЎпёҸ Kompost Kalitesi (20) вҖ” sДұcaklДұk stabilitesi (_puanIklim, 12p) + amonyak
   sГјresi (4p) + misel geliЕҹim dГјzenliliДҹi/homojenliДҹi (_puanMiselGelisimi, 4p). */
function _firmaKompostKalitesi(cycles){
  var maks=20;
  var sicaklikPuanlar=cycles.map(function(c){return _puanIklim(c).puan;});
  var miselPuanlar=cycles.map(function(c){return _puanMiselGelisimi(c).puan;});
  var amonyakGunler=cycles.map(function(c){return (c.gunluk||[]).filter(function(r){return r.amonyak==="Var";}).length;});
  var ortSicaklikPuan=sicaklikPuanlar.length?(sicaklikPuanlar.reduce(function(a,b){return a+b;},0)/sicaklikPuanlar.length):25;
  var ortMiselPuan=miselPuanlar.length?(miselPuanlar.reduce(function(a,b){return a+b;},0)/miselPuanlar.length):20;
  var ortAmonyak=amonyakGunler.length?(amonyakGunler.reduce(function(a,b){return a+b;},0)/amonyakGunler.length):0;

  var sicaklikKismi=(ortSicaklikPuan/25)*12;
  var miselKismi=(ortMiselPuan/20)*4;
  var amonyakKismi=4;
  var kalemler=[];
  if(ortAmonyak>4){ var d=Math.min(4,(ortAmonyak-4)*0.8); amonyakKismi-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "Ortalama amonyak sГјresi "+ortAmonyak.toFixed(1)+" gГјn вҖ” uzun")); }
  else kalemler.push(_kalem(0,"Amonyak sГјresi ortalama "+ortAmonyak.toFixed(1)+" gГјn вҖ” normal aralДұkta"));
  if(sicaklikKismi<12*0.8) kalemler.push(_kalem(Math.round((sicaklikKismi-12)*10)/10, "Kompost/oda sДұcaklДұДҹДұ yГ¶netimi ortalamanДұn altДұnda (dГ¶ngГј baЕҹДұna ort. iklim puanДұ "+ortSicaklikPuan.toFixed(0)+"/25)"));
  if(miselKismi<4*0.8) kalemler.push(_kalem(Math.round((miselKismi-4)*10)/10, "Misel geliЕҹimi dГјzensizliДҹi gГ¶rГјlГјyor (dГ¶ngГј baЕҹДұna ort. misel puanДұ "+ortMiselPuan.toFixed(0)+"/20)"));

  var puan=Math.max(0,Math.round((sicaklikKismi+miselKismi+amonyakKismi)*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, ortSicaklikPuan:ortSicaklikPuan, ortMiselPuan:ortMiselPuan, ortAmonyak:ortAmonyak};
}
/* рҹҢҰпёҸ Д°klim ToleransДұ (10) вҖ” kГјГ§Гјk iklim sapmalarДұnДұn olduДҹu dГ¶ngГјlerle
   olmadДұДҹДұ dГ¶ngГјler arasДұnda verim farkДұ var mДұ (uretimOgrenmesiVeri'deki
   medyan-bГ¶lme deseniyle AYNI yaklaЕҹДұm). Fark kГјГ§Гјkse firma dayanДұklДұ,
   bГјyГјkse kГјГ§Гјk hatalarda bile Гјretim bozuluyor demektir. */
function _firmaIklimToleransi(cycles){
  var maks=10;
  var veri=cycles.map(function(c){
    var sapmaGun=0;
    (c.gunluk||[]).forEach(function(r){
      var ko=numParse(r.kompostC); if(ko==null) return;
      if(ko>=KOMPOST_KRITIK_UST||ko<=KOMPOST_KRITIK_ALT||ko>=KOMPOST_TEHLIKELI||ko<=KOMPOST_TEHLIKE_ALT) sapmaGun++;
    });
    return {sapmaGun:sapmaGun, kgTon:verimOzet(c).kgTon};
  }).filter(function(x){return x.kgTon!=null;});
  if(veri.length<4) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Yeterli veri yok (n="+veri.length+") вҖ” nГ¶tr puan verildi")]};
  var sirali=veri.slice().sort(function(a,b){return a.sapmaGun-b.sapmaGun;});
  var medyan=sirali[Math.floor(sirali.length/2)].sapmaGun;
  var az=veri.filter(function(x){return x.sapmaGun<=medyan;});
  var cok=veri.filter(function(x){return x.sapmaGun>medyan;});
  if(az.length<2||cok.length<2) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Sapma daДҹДұlДұmДұ yetersiz вҖ” nГ¶tr puan verildi")]};
  var ortAz=az.reduce(function(s,x){return s+x.kgTon;},0)/az.length;
  var ortCok=cok.reduce(function(s,x){return s+x.kgTon;},0)/cok.length;
  var fark=ortAz>0?((ortAz-ortCok)/ortAz*100):0;
  var puan, aciklama;
  if(fark<=5){ puan=maks; aciklama="Az sapmalДұ ve Г§ok sapmalДұ dГ¶ngГјler arasДұnda verim farkДұ yok denecek kadar az вҖ” kГјГ§Гјk iklim dalgalanmalarДұnda Гјretim stabil kalДұyor."; }
  else if(fark<=15){ puan=maks-3; aciklama="ГҮok sapmalДұ dГ¶ngГјlerde verim ortalama %"+fark.toFixed(0)+" daha dГјЕҹГјk вҖ” orta dГјzey iklim toleransДұ."; }
  else { puan=maks-6; aciklama="ГҮok sapmalДұ dГ¶ngГјlerde verim ortalama %"+fark.toFixed(0)+" daha dГјЕҹГјk ("+ortAz.toFixed(0)+" вҶ’ "+ortCok.toFixed(0)+" kg/ton) вҖ” kГјГ§Гјk iklim hatalarДұnda bile Гјretim belirgin bozuluyor."; }
  puan=Math.max(0,puan);
  return {puan:puan, maks:maks, kalemler:[_kalem(puan-maks, aciklama)]};
}
/* рҹ“Ҳ Hasat EДҹrisi (20) вҖ” v385'teki hasatEgrisiAnaliz() (0-100/flaЕҹ) firma
   genelinde ortalanДұp 20 puana Г¶lГ§eklenir; ayrДұ bir eДҹri analizi TEKRARLANMAZ. */
function _firmaHasatEgrisi(cycles){
  var maks=20;
  var puanlar=[];
  cycles.forEach(function(c){ [1,2].forEach(function(f){ var a=hasatEgrisiAnaliz(c,f); if(a) puanlar.push(a.puan); }); });
  if(!puanlar.length) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Hasat eДҹrisi verisi yetersiz вҖ” nГ¶tr puan verildi")]};
  var ort=puanlar.reduce(function(a,b){return a+b;},0)/puanlar.length;
  var puan=Math.round((ort/100)*maks*10)/10;
  return {puan:puan, maks:maks, kalemler:[_kalem(Math.round((puan-maks)*10)/10, "Analiz edilen "+puanlar.length+" flaЕҹ eДҹrisinin ortalama yГ¶netim puanДұ "+ort.toFixed(0)+"/100")]};
}
/* вҡ–пёҸ Verim (15) вҖ” tek baЕҹДұna belirleyici deДҹil (toplam 100'Гјn %15'i);
   firmaOrtalamaKgTon/filoOrtalamaKgTon (mevcut) ile filo geneline kДұyaslanДұr. */
function _firmaVerim(firma){
  var maks=15;
  var f=firmaOrtalamaKgTon(firma);
  if(!f||f.n<2) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Yeterli tamamlanmДұЕҹ dГ¶ngГј yok вҖ” nГ¶tr puan verildi")]};
  var filo=filoOrtalamaKgTon();
  var puan=maks*0.75, aciklama="Ortalama verim "+f.ort.toFixed(0)+" kg/ton (n="+f.n+")";
  if(filo&&filo.n>=2){
    var fark=((f.ort-filo.ort)/filo.ort)*100;
    if(fark>=10){ puan=maks; aciklama+=", filo ortalamasДұnДұn %"+fark.toFixed(0)+" Гјzerinde"; }
    else if(fark>=-5){ puan=maks*0.85; aciklama+=", filo ortalamasДұna yakДұn"; }
    else if(fark>=-15){ puan=maks*0.6; aciklama+=", filo ortalamasДұnДұn %"+Math.abs(fark).toFixed(0)+" altДұnda"; }
    else { puan=maks*0.35; aciklama+=", filo ortalamasДұnДұn belirgin (%"+Math.abs(fark).toFixed(0)+") altДұnda"; }
  }
  puan=Math.round(puan*10)/10;
  return {puan:puan, maks:maks, kalemler:[_kalem(Math.round((puan-maks)*10)/10, aciklama)]};
}
/* рҹ§ә Kalite ve Fire (10) вҖ” VARSA (Hasat Takip tartДұ programДұndan gelen
   ana90/kestane/duble/dokme/ikinci kayДұtlarДұ, bkz. hasatTartiGetir)
   deДҹerlendirilir; kayДұt yoksa nГ¶tr bДұrakДұlДұr ("varsa deДҹerlendir" isteДҹi). */
function _firmaKaliteFire(cycles){
  var maks=10;
  var toplam=0, kestane=0, duble=0, dokme=0, ikinci=0, kayitSayisi=0;
  cycles.forEach(function(c){
    hasatTartiGetir(c.oda, c.tur).forEach(function(k){
      var t=(k.ana90||0)+(k.kestane||0)+(k.duble||0)+(k.dokme||0)+(k.ikinci||0);
      toplam+=t; kestane+=(k.kestane||0); duble+=(k.duble||0); dokme+=(k.dokme||0); ikinci+=(k.ikinci||0);
      kayitSayisi++;
    });
  });
  if(!kayitSayisi||toplam<=0) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Hasat Takip (tartДұ) verisi bulunmuyor вҖ” bu kategori nГ¶tr bДұrakДұldДұ")]};
  var kucukOrani=(kestane/toplam)*100;
  var fireOrani=((duble+dokme+ikinci)/toplam)*100;
  var puan=maks, kalemler=[];
  if(kucukOrani>15){ var d=Math.min(4,(kucukOrani-15)*0.3); puan-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "KГјГ§Гјk mantar (kestane) oranДұ %"+kucukOrani.toFixed(0)+" вҖ” yГјksek")); }
  if(fireOrani>20){ var d2=Math.min(6,(fireOrani-20)*0.3); puan-=d2; kalemler.push(_kalem(-Math.round(d2*10)/10, "Fire/alt sДұnДұf (duble+dГ¶kme+ikinci) oranДұ %"+fireOrani.toFixed(0)+" вҖ” yГјksek")); }
  if(!kalemler.length) kalemler.push(_kalem(0,"Fire ve kГјГ§Гјk mantar oranДұ dГјЕҹГјk, kalite sДұnДұflarДұ dengeli (n="+kayitSayisi+" tartДұ kaydДұ)"));
  puan=Math.max(0,Math.round(puan*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, kucukOrani:kucukOrani, fireOrani:fireOrani};
}
/* рҹҺҜ Гңretim KolaylДұДҹДұ (5) вҖ” dГ¶ngГј baЕҹДұna mГјdahale (erteleme/plan deДҹiЕҹikliДҹi)
   sДұklДұДҹДұ + sulama iptal/deДҹiЕҹikliklerinin AI KontrolГј'nden (v383) geГ§en
   verdict oranДұ ("sulama toleransДұ"). */
function _firmaUretimKolayligi(cycles){
  var maks=5;
  if(!cycles.length) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Yeterli veri yok вҖ” nГ¶tr puan verildi")], sulamaToleransEtiket:"вҖ”"};
  var mudahaleToplam=0, sulamaKararToplam=0, sulamaRiskliToplam=0, sulamaUyumluToplam=0;
  cycles.forEach(function(c){
    mudahaleToplam+=c.ertele?Object.keys(c.ertele).filter(function(k){return c.ertele[k];}).length:0;
    (c.gunluk||[]).forEach(function(r){
      if(r.sulamaDurum==="iptal"||r.sulamaDurum==="degistirildi"){
        sulamaKararToplam++;
        if(r.sulamaAIVerdict==="kirmizi") sulamaRiskliToplam++;
        else if(r.sulamaAIVerdict==="yesil") sulamaUyumluToplam++;
      }
    });
  });
  var mudahaleOrani=mudahaleToplam/cycles.length;
  var puan=maks, kalemler=[];
  if(mudahaleOrani>3){ var d=Math.min(2,(mudahaleOrani-3)*0.4); puan-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "DГ¶ngГј baЕҹДұna ortalama "+mudahaleOrani.toFixed(1)+" erteleme/plan deДҹiЕҹikliДҹi вҖ” sДұk mГјdahale gerektiriyor")); }
  var sulamaToleransEtiket="вҖ”";
  if(sulamaKararToplam>0){
    var riskliOran=(sulamaRiskliToplam/sulamaKararToplam)*100;
    if(riskliOran>30){ var d2=Math.min(2,riskliOran*0.02); puan-=d2; sulamaToleransEtiket="DГјЕҹГјk"; kalemler.push(_kalem(-Math.round(d2*10)/10, "Sulama iptal/deДҹiЕҹikliklerinin %"+riskliOran.toFixed(0)+"'i verilerle Г§eliЕҹen gerekГ§eyle yapДұlmДұЕҹ")); }
    else if(sulamaUyumluToplam>=2){ sulamaToleransEtiket="YГјksek"; kalemler.push(_kalem(0,"Sulama kararlarДұnДұn Г§oДҹu verilerle doДҹrulanmДұЕҹ вҖ” sulama toleransДұ yГјksek")); }
    else sulamaToleransEtiket="Orta";
  } /* sulamaKararToplam===0: hiГ§ sulama iptal/deДҹiЕҹikliДҹi kaydДұ yok вҖ” "yГјksek tolerans" iddia etmek yerine
       veri yetersiz (вҖ”) bДұrakДұlДұr, "varsa deДҹerlendir" ilkesiyle tutarlДұ. */
  if(!kalemler.length) kalemler.push(_kalem(0,"DГ¶ngГј baЕҹДұna mГјdahale sayДұsДұ dГјЕҹГјk вҖ” kolay yГ¶netilen bir kompost"));
  puan=Math.max(0,Math.round(puan*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, mudahaleOrani:mudahaleOrani, sulamaToleransEtiket:sulamaToleransEtiket};
}
function _firmaYorumUret(kategoriler, protokol, kalite, kolaylik){
  var cumleler=[];
  (protokol.bulgular||[]).forEach(function(b){
    if(b.sapma<=1.2 && Math.abs(b.ortalama)>=0.5){
      cumleler.push(b.ad+" ortalama "+Math.abs(b.ortalama).toFixed(0)+" gГјn "+(b.ortalama<0?"erkene alДұnabilmektedir":"geГ§ kalmaktadДұr")+".");
    } else if(b.sapma>1.6){
      cumleler.push(b.ad+" zamanlamasДұ sДұk sДұk tutarsДұzlaЕҹmaktadДұr (sapma Вұ"+b.sapma.toFixed(1)+" gГјn).");
    }
  });
  if(kalite.ortAmonyak>4) cumleler.push("KompostlarДұnda amonyak sГјresi ortalama "+kalite.ortAmonyak.toFixed(1)+" gГјn ile uzun sГјrmektedir.");
  else cumleler.push("Kompost sДұcaklДұДҹДұ oldukГ§a stabildir.");

  var sorunluKat=kategoriler.filter(function(k){return k.kalemler.some(function(kl){return kl.delta<0;});}).sort(function(a,b){return (a.puan/a.maks)-(b.puan/b.maks);})[0];
  if(sorunluKat){
    var kotuKalem=sorunluKat.kalemler.filter(function(kl){return kl.delta<0;})[0];
    if(kotuKalem) cumleler.push(kotuKalem.aciklama+".");
  }
  var enIyiKat=kategoriler.slice().sort(function(a,b){return (b.puan/b.maks)-(a.puan/a.maks);})[0];
  if(enIyiKat && (enIyiKat.puan/enIyiKat.maks)>=0.9) cumleler.push(enIyiKat.ad.replace(/^\S+\s/,"")+" gГјГ§lГј bir yГ¶n.");

  if(kolaylik.puan/kolaylik.maks>=0.85) cumleler.push("Гңretimi yГ¶netmesi kolaydДұr.");
  else if(kolaylik.puan/kolaylik.maks<0.55) cumleler.push("Гңretim sГјrekli mГјdahale istemektedir, yГ¶netimi zordur.");

  if(!cumleler.length) return "Yeterli veri birikince bu firma iГ§in daha ayrДұntДұlДұ bir deДҹerlendirme oluЕҹacaktДұr.";
  return cumleler.slice(0,5).join(" ");
}
/* Ana fonksiyon: firma adДұna gГ¶re 7 kategori + genel puan + yorum + karne.
   Veri yoksa (bu firmadan tamamlanmДұЕҹ dГ¶ngГј yok) null dГ¶ner. */
function firmaPerformans(firma){
  var tamam=tumTamamlananDongu().filter(function(c){return (c.kompostFirma||"")===firma;});
  if(!tamam.length) return null;

  var protokol=_firmaProtokolUyumu(tamam);
  var kalite=_firmaKompostKalitesi(tamam);
  var iklim=_firmaIklimToleransi(tamam);
  var hasategri=_firmaHasatEgrisi(tamam);
  var verim=_firmaVerim(firma);
  var kalitefire=_firmaKaliteFire(tamam);
  var kolaylik=_firmaUretimKolayligi(tamam);

  var kategoriler=[
    {key:"protokol",   ad:"рҹ“Ӣ Protokol Uyumu",   maks:protokol.maks,   puan:protokol.puan,   kalemler:protokol.kalemler},
    {key:"kompost",    ad:"рҹҢЎпёҸ Kompost Kalitesi", maks:kalite.maks,     puan:kalite.puan,     kalemler:kalite.kalemler},
    {key:"iklimtol",   ad:"рҹҢҰпёҸ Д°klim ToleransДұ",  maks:iklim.maks,      puan:iklim.puan,      kalemler:iklim.kalemler},
    {key:"hasategri",  ad:"рҹ“Ҳ Hasat EДҹrisi",     maks:hasategri.maks,  puan:hasategri.puan,  kalemler:hasategri.kalemler},
    {key:"verim",      ad:"вҡ–пёҸ Verim",            maks:verim.maks,      puan:verim.puan,      kalemler:verim.kalemler},
    {key:"kalitefire", ad:"рҹ§ә Kalite ve Fire",   maks:kalitefire.maks, puan:kalitefire.puan, kalemler:kalitefire.kalemler},
    {key:"kolaylik",   ad:"рҹҺҜ Гңretim KolaylДұДҹДұ", maks:kolaylik.maks,   puan:kolaylik.puan,   kalemler:kolaylik.kalemler}
  ];
  var toplamPuan=Math.max(0,Math.min(100,Math.round(kategoriler.reduce(function(s,k){return s+k.puan;},0)*10)/10));
  var yorum=_firmaYorumUret(kategoriler, protokol, kalite, kolaylik);

  var kgM2Vals=tamam.map(function(c){return verimOzet(c).kgM2;}).filter(function(v){return v!=null;});
  var kasaVals=tamam.map(function(c){return verimOzet(c).toplam;});
  var flasToplam={F1:0,F1n:0,F2:0,F2n:0};
  tamam.forEach(function(c){
    var fo=verimFlasOzet(c);
    if(fo.F1){ flasToplam.F1+=fo.F1.kasa; flasToplam.F1n++; }
    if(fo.F2){ flasToplam.F2+=fo.F2.kasa; flasToplam.F2n++; }
  });

  return {
    firma:firma, n:tamam.length, puan:toplamPuan, kategoriler:kategoriler, yorum:yorum,
    karne:{
      ortKgM2: kgM2Vals.length?(kgM2Vals.reduce(function(a,b){return a+b;},0)/kgM2Vals.length):null,
      ortToplamKasa: kasaVals.length?(kasaVals.reduce(function(a,b){return a+b;},0)/kasaVals.length):null,
      ortFlas1Kasa: flasToplam.F1n?(flasToplam.F1/flasToplam.F1n):null,
      ortFlas2Kasa: flasToplam.F2n?(flasToplam.F2/flasToplam.F2n):null,
      ortMiselPuan: kalite.ortMiselPuan,
      ortAmonyak: kalite.ortAmonyak,
      sulamaToleransEtiket: kolaylik.sulamaToleransEtiket
    }
  };
}

function odaGecmisIstatistik(oda, excludeId){
  var n=normalizeOda(oda);
  var gecmis=tumTamamlananDongu().filter(function(c){return c.id!==excludeId && normalizeOda(c.oda)===n;});
  var vals=gecmis.map(function(c){ return {c:c, kgTon:verimOzet(c).kgTon}; }).filter(function(x){return x.kgTon!=null;});
  if(!vals.length) return null;
  var ort=vals.reduce(function(s,x){return s+x.kgTon;},0)/vals.length;
  var en_iyi=vals.slice().sort(function(a,b){return b.kgTon-a.kgTon;})[0];
  var en_kotu=vals.slice().sort(function(a,b){return a.kgTon-b.kgTon;})[0];
  return {n: vals.length, ort: ort, enIyi:{tarih:en_iyi.c.gelisTarihi, kgTon:en_iyi.kgTon}, enKotu:{tarih:en_kotu.c.gelisTarihi, kgTon:en_kotu.kgTon}};
}

  var toplam=kes+nor; var ton=(numParse(c.tonaj)||0)/1000;
  var S=getSet(); var kg=toplam*S.kasaAgirlik;
  var alan=numParse(c.alanM2);
  return {kestane:kes, normal:nor, toplam:toplam, ton:ton, verim:(ton>0?toplam/ton:null), kg:kg, kgTon:(ton>0?kg/ton:null), kgM2:(alan&&alan>0?kg/alan:null), alan:alan};
}

/* ---------- TГјketim Г¶zeti ---------- */
function tuketimOzet(c){
  var su=0, kim={}, n=0, approx=false; var suGunSayisi=0; var flasSu={};
  (c.gunluk||[]).forEach(function(r){
    var sn=numParse(r.su); var hasText=!!r.sulama;
    if(sn===null && !hasText) return;
    n++;
    var buSu=0;
    if(sn!==null){ buSu=sn; su+=sn; }
    else if(hasText){ var m=(""+r.sulama).match(/(\d+(?:[.,]\d+)?)\s*lt/gi); if(m){ approx=true; m.forEach(function(x){ var num=parseFloat(x.replace(/[^\d.,]/g,'').replace(',','.')); if(!isNaN(num)){ su+=num; buSu+=num; } }); } }
    if(buSu>0){ suGunSayisi++; var ha=hasatAsama(c,r.tarih); var key=(ha&&ha.flas>0)?("F"+ha.flas):"hazДұrlДұk/kuluГ§ka"; flasSu[key]=(flasSu[key]||0)+buSu; }
    if(hasText){ ["Serenade","Vivando","Tezguard","insektisit","formaldehit","Asena","kalsiyum","sodyum"].forEach(function(kw){ if(new RegExp(kw,"i").test(r.sulama)) kim[kw]=(kim[kw]||0)+1; }); }
  });
  var ton=(numParse(c.tonaj)||0)/1000; var alan=numParse(c.alanM2);
  return {su:su, islem:n, kim:kim, approx:approx, suTon:(ton>0?su/ton:null), suM2:(alan&&alan>0?su/alan:null), suGunOrt:(suGunSayisi>0?su/suGunSayisi:null), flasSu:flasSu};
}
function tuketimCardHTML(c){
  var t=tuketimOzet(c);
  var kimStr=Object.keys(t.kim).map(function(k){return k+" ("+t.kim[k]+")";}).join(", ")||"вҖ”";
  var flasStr=Object.keys(t.flasSu).map(function(k){return k+": "+t.flasSu[k].toFixed(0)+" lt";}).join(" В· ")||"вҖ”";

    +(t.suTon!=null?'<div class="kv"><span class="k">Ton kompost baЕҹДұna su</span><span class="v">'+t.suTon.toFixed(0)+' lt/ton</span></div>':'')
    +(t.suM2!=null?'<div class="kv"><span class="k">mВІ baЕҹДұna su</span><span class="v">'+t.suM2.toFixed(1)+' lt/mВІ</span></div>':'')
    +(t.suGunOrt!=null?'<div class="kv"><span class="k">Sulama gГјnГј ortalamasДұ</span><span class="v">'+t.suGunOrt.toFixed(0)+' lt/gГјn</span></div>':'')
    +'<div class="kv"><span class="k">FlaЕҹ bazДұnda su</span><span class="v" style="text-align:right;max-width:60%;">'+esc(flasStr)+'</span></div>'
    +'<div class="kv"><span class="k">Sulama/ilaГ§ iЕҹlemi</span><span class="v">'+t.islem+'</span></div>'
    +'<div class="kv"><span class="k">KullanДұlan ilaГ§lar</span><span class="v" style="text-align:right;max-width:60%;">'+esc(kimStr)+'</span></div>'
    +(t.approx?'<div class="muted" style="margin-top:6px;">Su, sayДұ kutusuna girilenlerden toplanДұr; girilmeyen satДұrlarda metindeki "lt" tahmin edilir.</div>':'')+'</div>';
}

/* ---------- GeГ§miЕҹ kДұyas ---------- */
function overlayChartSVG(list){
  var colors=["#14583a","#1f9e75","#d98a1f","#3b82c4","#a3408a","#888"];
  var series=[];
  list.forEach(function(c,idx){
    var pts=[]; (c.gunluk||[]).forEach(function(r){ var v=numParse(r.kompostC), g=gunNo(c,r.tarih); if(v!==null&&g!=="") pts.push({g:g,v:v}); });
    pts.sort(function(a,b){return a.g-b.g;});
    if(pts.length) series.push({pts:pts, col:colors[idx%colors.length], lbl:fmtDate(c.gelisTarihi)+(c.tur?(" ("+c.tur+".tur)"):"")});
  });
  if(!series.length) return '<div class="muted">Kompost Г¶lГ§ГјmГј yok.</div>';
  var W=720,H=300,pad=42,gmin=Infinity,gmax=-Infinity,vmin=Infinity,vmax=-Infinity;
  series.forEach(function(s){ s.pts.forEach(function(p){ if(p.g<gmin)gmin=p.g; if(p.g>gmax)gmax=p.g; if(p.v<vmin)vmin=p.v; if(p.v>vmax)vmax=p.v; }); });
  vmin=Math.floor(vmin-1); vmax=Math.ceil(vmax+1); if(gmax===gmin)gmax=gmin+1; if(vmax===vmin)vmax=vmin+1;
  function X(g){return pad+(g-gmin)/(gmax-gmin)*(W-2*pad);}
  function Y(v){return H-pad-(v-vmin)/(vmax-vmin)*(H-2*pad);}
  var svg=''; if(26<=vmax&&24>=vmin) svg+='<rect x="'+pad+'" y="'+Y(26)+'" width="'+(W-2*pad)+'" height="'+(Y(24)-Y(26))+'" fill="#dcefe2"/>';
  var step=Math.max(1,Math.round((vmax-vmin)/5));
  for(var t=vmin;t<=vmax;t+=step){var y=Y(t);svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#eee"/><text x="'+(pad-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#555">'+t+'В°</text>';}
  series.forEach(function(s){ var d=s.pts.map(function(p){return X(p.g)+","+Y(p.v);}).join(" "); svg+='<polyline points="'+d+'" fill="none" stroke="'+s.col+'" stroke-width="2"/>'; });
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#888"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#888"/>';
  var leg=series.map(function(s){return '<span style="color:'+s.col+';">\u25cf '+s.lbl+'</span>';}).join(" &nbsp; ");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="max-width:100%;border:1px solid #ccc;" xmlns="http://www.w3.org/2000/svg">'+svg+'<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">GГјn (geliЕҹten)</text></svg><div style="font-size:11px;margin-top:4px;">'+leg+'</div>';
}

/* ---------- HavalandДұrma gГјnlГјk hedefi (dinamik ikaz) ---------- */
/* BugГјne ait havalandДұrma planДұ satДұrДұnДұn TAMAMINI dГ¶ner (hedefC +
   co2alt/co2ust) вҖ” havaHedef() bunun sadece sДұcaklДұk sayДұsДұnДұ istediДҹi iГ§in
   ayrДұ tutuluyor, ikisi de aynДұ satДұrДұ bulur.
   KRД°TД°K: Plan sadece mГјhendisin seГ§tiДҹi gГјn sayДұsДұ kadar (Г¶rn. 4 gГјn)
   kademeli dГјЕҹГјЕҹ iГ§indir вҖ” bugГјn, plandaki EN SON tarihten sonraysa (kademeli
   dГјЕҹГјЕҹ sГјresi bittiyse) null dГ¶neriz. Aksi halde son gГјnГјn hedefi (Г¶rn. 18В°)
   sГјresiz gГ¶sterilmeye devam eder вҖ” hГўlbuki o noktadan sonra artДұk "kademeli
   hedef" deДҹil, sabit rejim dГ¶nemidir; ayrДұ bir uyarДұ kapsamДұ olmamalДұ. */
/* tarih (opsiyonel): hangi gГјne ait hedefin isteneceДҹi вҖ” verilmezse bugГјn.
   GГјnlГјk Tur'da mГјhendis Гјstteki tarihi deДҹiЕҹtirip "o gГјn ne olacaktДұ"
   Г¶nizlemesi yapabilsin diye (kullanДұcДұ isteДҹi: "tarihi deДҹiЕҹtiriyorum ama
   aЕҹaДҹДұdaki bilgiler deДҹiЕҹmiyor") вҖ” gerГ§ek aksiyonlar (plan kaydДұ vb.) her
   zaman todayISO() ile Г§aДҹrДұlmaya devam eder, sadece GГ–RГңNTГңLEME buradan tarih alДұr. */
function havaHedefSatiri(c, tarih){
  if(!c.hava||!c.hava.length) return null;
  var today=tarih||todayISO(), best=null, sonTarih=null;
  c.hava.forEach(function(r){
    if(!sonTarih || r.tarih>sonTarih) sonTarih=r.tarih;
    if(r.tarih<=today && (!best||r.tarih>best.tarih)) best=r;
  });
  if(sonTarih && today>sonTarih) return null; /* kademeli dГјЕҹГјЕҹ sГјresi bitti */
  if(!best) c.hava.forEach(function(r){ if(!best||r.tarih<best.tarih) best=r; });
  return best;
}
function havaHedef(c, tarih){
  var best=havaHedefSatiri(c, tarih);
  return best?numParse(best.hedefC):null;
}

/* ---------- Olaylar ---------- */
/* Uygulama arka plandan/kapalДұyken Г¶ne gelince (Г¶zellikle iOS'ta) tarayДұcДұ
   bazen JS'i hiГ§ yeniden Г§alДұЕҹtДұrmadan, kapanmadan Г–NCEKД° donmuЕҹ ekran
   gГ¶rГјntГјsГјnГј gГ¶sterir (bfcache) вҖ” bu yГјzden diskteki EN GГңNCEL veriyi
   okuyup yeniden render etmemiz gerekiyor (belki baЕҹka cihaz senkronla
   deДҹiЕҹtirmiЕҹtir). storeKeyOku() IndexedDB'den okuduДҹu iГ§in asenkron olmak
   zorunda, ama artДұk Еҹifre Г§Г¶zme yok вҖ” sadece JSON.parse. Herhangi bir hata
   olursa mevcut bellek verisi OLDUДһU GД°BД° bДұrakДұlДұr, ASLA boЕҹaltДұlmaz. */
async function resumeYenidenYukle(){
  try{
    var raw = await storeKeyOku();
    if(raw){
      var parsed = JSON.parse(raw);
      if(parsed && parsed.enc!==1){
        memData = parsed;
        memDataNormalizeVeGoc();
      }
    }
  }catch(e){
    console.error("arka plandan dГ¶nГјЕҹte veri yenilenemedi вҖ” mevcut bellek verisi korunuyor", e);
    return;
  }
  try{ render(); }catch(e){ console.error("resume render error:", e); }
  cloudYedekAcilista();
}
function bootApp(){
try{
  el("fileRestore").onchange = function(e){ if(e.target.files[0]) restoreJSON(e.target.files[0]); e.target.value=""; };
  el("hdrVer").textContent = APP_VER;
  updateCloudBakBadge();
  fbInit();  // Firebase devre dДұЕҹДұ
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState==="hidden"){
      saveData(); autoSnapshot();
    } else if(document.visibilityState==="visible"){
      if(!isTyping()) resumeYenidenYukle();
    }
  });
  window.addEventListener("pageshow", function(e){
    /* bfcache'den geri geldiyse (e.persisted true) вҖ” visibilitychange bazen
       tetiklenmeyebiliyor, bu ikinci bir gГјvenlik aДҹДұ. */
    if(e.persisted) resumeYenidenYukle();
  });
  window.addEventListener("pagehide", function(){ saveData(); autoSnapshot(); });
  try{
    loadRole();
  }catch(e){
    console.error("loadRole error:", e);
    currentRole = null;
  }
  render();
}catch(e){

  if(el("app")){
    el("app").innerHTML='<div class="card" style="border:1.5px solid #c0291f;background:#fceaea;padding:20px;">'
      +'<div style="font-weight:700;color:#c0291f;font-size:16px;">вҡ пёҸ BaЕҹlatma hatasДұ</div>'
      +'<div style="font-size:11px;color:#666;margin:8px 0;font-family:monospace;word-break:break-all;">'+esc(""+e.message)+'</div>'
      +'<button class="btn small" style="width:100%;margin-top:12px;" onclick="location.reload()">Yenile</button>'
      +'</div>';
  }
}
