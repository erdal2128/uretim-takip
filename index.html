function planToOda(id){
  if(!can("edit")) return noPerm();
  var x=getPlan().find(function(p){return p.id===id;});
  if(!x){ toast("Plan bulunamadı"); return; }
  /* Merkezi güvenlik ağı (DRY): kompost henüz gelmediyse oda açma erken olur —
     üretim takvimi ve günlük ölçümler yanlış tarihten başlar. Onay iste. */
  var dg = x.cikis ? daysBetween(todayISO(), x.cikis) : 0;
  if(dg && dg>0){
    if(!confirm("Kompost henüz gelmedi ("+dg+" gün sonra: "+fmtDate(x.cikis)+").\n\nOda oluşturursan üretim takvimi bu tarihten başlar ve günlük ölçüm ekranı erken açılır.\n\nYine de şimdi oluşturulsun mu?")){
      return;
    }
  }
  var odaN=normalizeOda(x.oda||"");
  var d=loadData();
  var cakisan = d.cycles.find(function(c){ return normalizeOda(c.oda)===odaN && !c.bosaltimTarihi; });
  if(cakisan){
    toast(odaN+" odasında zaten aktif kompost var — önce o döngüyü boşalt");
    return;
  }
  var m2=odaM2Get(odaN);
  var c={id:uid(), oda:odaN, kompostFirma:x.firma||"", gelisTarihi:x.cikis, partiNo:partiFromDate(x.cikis), alanM2:(m2!==null?String(m2):""), gunluk:[], hava:[], hasat:[]};
  /* Oda oluşturmak = kompostu koymak = kompostu indirmek. Ayrı bir "kompost indirme"
     görevi beklememeli — Kompost İndirme Planı (WhatsApp) formu daha detaylı bilgiyle
     (makine/ekip) üzerine yazabilir, ama en azından tarih baştan dolu, "yarın planlı"
     diye kırmızı görünmez. */
  c.kompostIndirme={tarih:c.gelisTarihi};
  d.cycles.push(c);
  touchCycle(c);
  x.done=true;
  saveData(); logAudit("oda oluşturuldu (plandan)", c.oda); toast("Oda oluşturuldu — bilgileri tamamla");
  openForm(c.id);
}

function _pad2(n){ return ("0"+n).slice(-2); }
function parsePlanDate(v){
  if(v==null||v==="") return null;
  if(Object.prototype.toString.call(v)==="[object Date]" && !isNaN(v)) return v.getFullYear()+"-"+_pad2(v.getMonth()+1)+"-"+_pad2(v.getDate());
  if(typeof v==="number"){ var dt=new Date(Math.round((v-25569)*86400000)); return dt.getUTCFullYear()+"-"+_pad2(dt.getUTCMonth()+1)+"-"+_pad2(dt.getUTCDate()); }
  var str=(""+v).trim(); var m=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+_pad2(+m[2])+"-"+_pad2(+m[3]);
  m=str.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ var y=m[3]; if(y.length===2) y="20"+y; return y+"-"+_pad2(+m[2])+"-"+_pad2(+m[1]); }
  return null;
}
function parseSep(text){
  return text.split(/\r?\n/).filter(function(l){return l.trim()!=="";}).map(function(l){
    var sep = l.indexOf("\t")>=0?"\t":(l.indexOf(";")>=0?";":",");
    return l.split(sep).map(function(c){return c.trim().replace(/^"|"$/g,"");});
  });
}
function ensureXLSX(cb){
  if(window.XLSX) return cb(true);
  var sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload=function(){ cb(!!window.XLSX); };
  sc.onerror=function(){ cb(false); };
  document.head.appendChild(sc);
}
function planImportFile(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var name=(f.name||"").toLowerCase();
  if(/\.csv$/.test(name)){
    var rd=new FileReader();
    rd.onload=function(e){ planAddRows(parseSep(e.target.result)); };
    rd.readAsText(f,"utf-8");
  } else {
    toast("Excel okunuyor…");
    ensureXLSX(function(ok){
      if(!ok){ toast("Excel kütüphanesi yüklenemedi (çevrimdışı). CSV ya da kopyala-yapıştır kullan."); return; }
      var rd=new FileReader();
      rd.onload=function(e){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"}); /* cellDates yok: tarihler ham seri olarak gelir, parsePlanDate UTC ile çevirir (gün kayması olmaz) */
          var names=wb.SheetNames, sheet=names[0];
          if(names.length>1){
            var pick=prompt("Hangi ay sayfası içe aktarılsın?\nSayfalar: "+names.join(", "), names[0]);
            if(pick===null) return;
            pick=pick.trim();
            if(names.indexOf(pick)>=0) sheet=pick;
            else { var lc=names.map(function(n){return n.toLowerCase();}).indexOf(pick.toLowerCase()); if(lc>=0) sheet=names[lc]; }
          }
          var ws=wb.Sheets[sheet];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
          planAddRows(rows);
        }catch(err){ toast("Excel okunamadı"); }
      };
      rd.readAsArrayBuffer(f);
    });
  }
  input.value="";
}
function planImportPaste(){
  var elT=el("pl_paste"); if(!elT||!elT.value.trim()){ toast("Önce yapıştır"); return; }
  planAddRows(parseSep(elT.value));
}
function planAddRows(rows){
  if(!rows||!rows.length){ toast("Satır bulunamadı"); return; }
  /* Çok bloklu plan: tekrarlanan başlık + boş satırlar olabilir.
     Başlık satırı görülünce sütun eşlemesi (tarih/oda/firma) güncellenir. */
  var ci=-1, oi=-1, fi=-1;        // tarih, oda, firma sütun indexleri
  var dci=1, doi=2, dfi=0;        // başlık yoksa varsayılan: firma·tarih·oda
  function isHeader(r){ var j=r.map(function(x){return (""+(x==null?"":x)).toLowerCase();}).join("|"); return /tarih/.test(j) && /oda/.test(j); }
  var pl=getPlan(), add=0, skip=0, dup=0;
  rows.forEach(function(r){
    if(!r||!r.length) return;
    if(isHeader(r)){
      ci=oi=fi=-1;
      r.forEach(function(hd,ix){ hd=(""+(hd==null?"":hd)).toLowerCase().trim();
        if(/tarih|çık/.test(hd)) ci=ix; else if(/oda/.test(hd)) oi=ix; else if(/firma/.test(hd)) fi=ix; });
      return;
    }
    var ti=(ci>=0?ci:dci), oo=(oi>=0?oi:doi), ff=(fi>=0?fi:dfi);
    var cikis=parsePlanDate(r[ti]);
    var oda=(r[oo]!=null?(""+r[oo]).trim():"");
    var firma=(ff>=0 && r[ff]!=null)?(""+r[ff]).trim():"";
    if(!cikis || !oda){ skip++; return; }
    var no=normalizeOda(oda);
    if(pl.some(function(q){return q.cikis===cikis && (q.oda||"").toLowerCase()===no.toLowerCase();})){ dup++; return; }
    pl.push({id:uid(), cikis:cikis, oda:no, firma:firma, done:false}); add++;
  });
  saveData();
  toast(add+" plan satırı eklendi"+(dup?(" · "+dup+" zaten vardı"):"")+((!add&&!dup)?" · uygun satır yok":"")); render();
}

/* ---- Parola güvenliği: SHA-256 hash ---- */
/* Eskiden şifreler düz metin (plaintext) saklanıyordu — hem localStorage'da
   hem Firestore'da. Artık SHA-256 hash'i saklanıyor. Geçiş dönemi için: eski
   plaintext parola ile girişi hâlâ kabul ediyoruz, ama başarılı girişte
   otomatik olarak hash'e yükseltiyoruz (kullanıcı hiçbir şey fark etmez). */
async function hashPass(pass){
  try{
    if(!window.crypto || !window.crypto.subtle){
      /* HTTP (güvensiz bağlam) veya çok eski tarayıcı — crypto.subtle yok.
         Cloudflare Pages HTTPS olduğu için normalde buraya düşmez. */
      console.error("crypto.subtle yok — HTTPS bağlantı gerekli");
      return null;
    }
    var enc=new TextEncoder().encode(pass);
    var buf=await crypto.subtle.digest("SHA-256", enc);
    return Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }catch(e){ console.error("hash hatası", e); return null; }
}
function isHashedPass(s){ return typeof s==="string" && /^[a-f0-9]{64}$/.test(s); }
var ROLE_DEFS={ ziraat:{ad:"Ziraat Mühendisi", edit:true, manage:false}, yonetici:{ad:"Yönetici", edit:true, manage:true}, sahip:{ad:"Firma Sahibi", edit:false, manage:false}, teknisyen:{ad:"Teknisyen", edit:false, manage:false, ariza:true, kisitli:true} };
var currentRole=null;
/* GÜVENLİK: yönetici/sahip parolaları ARTIK sabit kodda YOK — ilk açılışta Setup Wizard
   ile kullanıcı kendi parolasını belirler (bkz. isSetupNeeded/renderSetup). Sabit
   "yonetim2026" gibi bir şifre GitHub'da/kaynak kodda görünür olur ve güvenlik riski
   taşır — bu satır bir daha ASLA sabit şifre içermemeli. */
function rolePass(){ var d=loadData(); if(!d.settings) d.settings={}; if(!d.settings.roles) d.settings.roles={ziraat:"ziraat", yonetici:"", sahip:"", teknisyen:"teknisyen"}; if(!d.settings.roles.teknisyen) d.settings.roles.teknisyen="teknisyen"; return d.settings.roles; }
function isSetupNeeded(){
  try{ if(localStorage.getItem("utp_setup_done")) return false; }catch(e){ console.warn("setup bayrağı okunamadı", e); }
  /* KRİTİK: localStorage bayrağı bir şekilde kaydedilememiş/okunamıyor olsa bile
     (bazı tarayıcı/gizli sekme kısıtlamaları), ayarlarda zaten bir yönetici parolası
     kayıtlıysa kurulum fiilen tamamlanmış demektir — tekrar tekrar kurulum ekranına
     dönülmesin ("parola giriyorum, kaydet basıyorum, hiçbir şey olmuyor" sorunu buydu). */
  try{
    var d=loadData();
    if(d && d.settings && d.settings.roles && d.settings.roles.yonetici){ markSetupDone(); return false; }
  }catch(e){ console.warn("kurulum durumu kontrol edilemedi", e); }
  return true;
}

async function doLogin(role){
  var passEl=el("lg_pass"); var pass=(passEl?passEl.value:"").trim();
  var want=(rolePass()[role]||"").trim();
  if(!want){ toast("❌ "+ROLE_DEFS[role].ad+" parolası henüz kurulmamış — Ayarlar'dan belirle"); return; }
  var ok=false;
  if(isHashedPass(want)){
    var inputHash=await hashPass(pass);
    if(inputHash===null){ toast("❌ Bağlantı hatası (HTTPS gerekli), tekrar dene"); return; }
    ok=(inputHash===want);
  } else {
    /* Eski plaintext kayıt — geçiş dönemi karşılaştırması */
    ok=(pass===want);
    if(ok){
      /* Başarılı giriş → otomatik hash'e yükselt, kullanıcı fark etmez */
      var newHash=await hashPass(pass);
      if(newHash){
        var d=loadData(); if(!d.settings) d.settings={}; if(!d.settings.roles) d.settings.roles={};
        d.settings.roles[role]=newHash; saveData();
      }
    }
  }
  if(!ok){
    var er=el("lg_err"); if(er) er.textContent="Şifre yanlış. Büyük/küçük harfe dikkat — 'Şifreyi göster' ile kontrol et.";
    toast("Şifre yanlış"); return;
  }
  currentRole=role; try{ localStorage.setItem("utp_role",role); }catch(e){ console.warn("rol kaydedilemedi", e); }
  logAudit("giriş", ROLE_DEFS[role].ad); render();
}

  if(!cfg || !cfg.salt){ renderPinSetup(false); return; }
  try{
    var key=await pinAnahtarTuret(p.trim(), cfg.salt);
    var raw=await storeKeyOku();
    var env = raw ? JSON.parse(raw) : null;
    var plaintext = "{\"cycles\":[]}";
    if(env && env.enc===1){ plaintext = await pinCoz(key, env.iv, env.ct); }
    memData = JSON.parse(plaintext);
    _pinKey = key;
    memDataNormalizeVeGoc();
    try{
      var rawKey=await crypto.subtle.exportKey("raw", key);
      sessionStorage.setItem(PIN_SESSION_KEY, JSON.stringify({salt:cfg.salt, raw:b64FromBuf(rawKey)}));
    }catch(e){ console.warn("oturum anahtarı kaydedilemedi", e); }
    bootApp();
  }catch(e){
    console.warn("PIN açma hatası", e);
    renderPinUnlock("PIN yanlış, tekrar dene.");
  }
}
function pinKilitle(){
  _pinKey=null;
  try{ sessionStorage.removeItem(PIN_SESSION_KEY); }catch(e){ console.warn("oturum anahtarı silinemedi", e); }
  memData=null;
  renderPinUnlock();
}
async function pinDegistir(){
  if(!can("manage")) return noPerm();
  var eski=(el("pin_eski")||{}).value||"";
  var yeni=(el("pin_yeni_d")||{}).value||"";
  if(yeni.trim().length<4){ toast("Yeni PIN en az 4 haneli olmalı"); return; }
  var cfg=pinCfgOku();
  if(!cfg || !cfg.salt){ toast("PIN kurulumu bulunamadı"); return; }
  try{
    var eskiKey=await pinAnahtarTuret(eski.trim(), cfg.salt);
    var raw=await storeKeyOku();
    var env = raw ? JSON.parse(raw) : null;
    if(!env || env.enc!==1){ toast("Şifreli veri bulunamadı"); return; }
    await pinCoz(eskiKey, env.iv, env.ct); /* çözülmezse (yanlış PIN) catch'e düşer */
    var yeniSalt=b64FromBuf(crypto.getRandomValues(new Uint8Array(16)).buffer);
    var yeniKey=await pinAnahtarTuret(yeni.trim(), yeniSalt);
    localStorage.setItem(PIN_CFG_KEY, JSON.stringify({salt:yeniSalt}));
    _pinKey=yeniKey;
    try{
      var rawKey=await crypto.subtle.exportKey("raw", yeniKey);
      sessionStorage.setItem(PIN_SESSION_KEY, JSON.stringify({salt:yeniSalt, raw:b64FromBuf(rawKey)}));
    }catch(e){ console.warn("oturum anahtarı kaydedilemedi", e); }
    persistEncrypted(JSON.stringify(memData));
    if(el("pin_eski")) el("pin_eski").value="";
    if(el("pin_yeni_d")) el("pin_yeni_d").value="";
    logAudit("PIN değiştirildi","");
    toast("PIN değiştirildi");
  }catch(e){
    console.warn("PIN değiştirme hatası", e);
    toast("❌ Mevcut PIN yanlış");
  }
}
async function pinBoot(){
  el("app").innerHTML='<div class="card" style="text-align:center; padding:40px 20px;" ><span class="muted">Yükleniyor…</span></div>';
  if(!window.crypto || !window.crypto.subtle){
    /* Eski tarayıcı / güvensiz bağlam (HTTP): şifreleme yapılamaz. Kilidi
       tamamen atlayıp düz metin modunda devam — veri erişimini tümden
       engellemek bundan daha kötü bir sonuç olurdu. */
    console.error("crypto.subtle yok — PIN kilidi devre dışı, düz metin modunda devam");
    loadData();
    bootApp();
    return;
  }
  var cfg=pinCfgOku();
  if(!cfg){
    /* Bu cihazda PIN hiç kurulmamış. Var olan (eski, düz metin) veri varsa
       kaybetmeden PIN kurulumuna taşı. */
    var raw=null;
    try{ raw=localStorage.getItem(STORE_KEY); }catch(e){ console.warn("localStorage okunamadı", e); }
    var legacy=null;
    if(raw){
      try{
        var parsed=JSON.parse(raw);
        if(!parsed || parsed.enc!==1) legacy=parsed;
      }catch(e){
        console.error("Kayıtlı veri bozuk — JSON.parse hatası", e);
        try{ localStorage.setItem(STORE_KEY+"_bozuk_"+Date.now(), raw); }catch(e2){ console.error("bozuk veri yedeklenemedi", e2); }
        _veriOkumaHatasi=true;
      }
    }
    memData = legacy || {cycles:[]};
    memDataNormalizeVeGoc();
    renderPinSetup(!!legacy);
    return;
  }
  /* PIN daha önce kurulmuş. Bu sekmede zaten açılmışsa (sessionStorage)
     tekrar sorma — sayfa yenilemede kullanıcıyı rahatsız etmesin. */
  try{
    var sess=JSON.parse(sessionStorage.getItem(PIN_SESSION_KEY)||"null");
    if(sess && sess.salt===cfg.salt){
      var key=await crypto.subtle.importKey("raw", bufFromB64(sess.raw), {name:"AES-GCM"}, true, ["encrypt","decrypt"]);
      var raw2=await storeKeyOku();
      var env2 = raw2 ? JSON.parse(raw2) : null;
      if(env2 && env2.enc===1){
        var plaintext2 = await pinCoz(key, env2.iv, env2.ct);
        memData = JSON.parse(plaintext2);
        _pinKey = key;
        memDataNormalizeVeGoc();
        bootApp();
        return;
      }
    }
  }catch(e){ console.warn("oturum kilidi geçersiz, PIN tekrar sorulacak", e); }
  renderPinUnlock();
}

/* ---------- Raporlar ---------- */
/* ---------- Üretim öğrenmesi (geçmiş döngü istatistik analizi, gerçek veri — AI değil) ---------- */
function tumTamamlananDongu(){
  return loadData().cycles.filter(function(c){ return c.bosaltimTarihi && (c.hasat||[]).length; });
}
function ortKompostSicaklik(c){
  var vals=(c.gunluk||[]).filter(function(r){ return (!c.toprakTarihi || r.tarih<c.toprakTarihi) && numParse(r.kompostC)!=null; }).map(function(r){return numParse(r.kompostC);});
  if(!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function uretimOgrenmesiVeri(){
  var all=tumTamamlananDongu();
  var bulgular=[];
  var withTemp=all.map(function(c){ return {sic:ortKompostSicaklik(c), v:verimOzet(c)}; }).filter(function(x){return x.sic!=null && x.v.kgTon!=null;});
  if(withTemp.length>=4){
    var esik=26;
    var ust=withTemp.filter(function(x){return x.sic>=esik;});
    var alt=withTemp.filter(function(x){return x.sic<esik;});
    if(ust.length>=2 && alt.length>=2){
      var avgU=ust.reduce(function(s,x){return s+x.v.kgTon;},0)/ust.length;
      var avgA=alt.reduce(function(s,x){return s+x.v.kgTon;},0)/alt.length;
      var fark=avgA>0?((avgA-avgU)/avgA*100):0;
      bulgular.push({baslik:"Kompost sıcaklığı ve verim", metin: esik+"°C üstü ortalama kompost sıcaklığı olan "+ust.length+" döngüde ortalama verim "+avgU.toFixed(0)+" kg/ton; "+esik+"°C altı "+alt.length+" döngüde "+avgA.toFixed(0)+" kg/ton"+(fark>3?(" — yüksek sıcaklık döngülerinde verim yaklaşık %"+fark.toFixed(0)+" daha düşük görünüyor."):(fark<-3?(" — yüksek sıcaklık döngülerinde verim daha yüksek görünüyor, örnek sayısı azken tesadüf olabilir."):" — belirgin bir fark görünmüyor."))});
    }
  }
  var firmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var f=c.kompostFirma||"Bilinmiyor"; if(!firmaGroups[f]) firmaGroups[f]=[]; firmaGroups[f].push(v.kgTon); });
  var firmaListe=Object.keys(firmaGroups).filter(function(f){return firmaGroups[f].length>=2;});
  if(firmaListe.length>=2){
    var firmaOrt=firmaListe.map(function(f){ var arr=firmaGroups[f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    firmaOrt.sort(function(a,b){return b.ort-a.ort;});
    bulgular.push({baslik:"Firma bazlı verim karşılaştırması (kg/ton)", metin: firmaOrt.map(function(x){return esc(x.f)+": "+x.ort.toFixed(0)+" (n="+x.n+")";}).join(" · ")});
  }
  var withSu=all.map(function(c){ var t=tuketimOzet(c); var v=verimOzet(c); return {suTon:t.suTon, kgTon:v.kgTon}; }).filter(function(x){return x.suTon!=null && x.kgTon!=null;});
  if(withSu.length>=4){
    var suSirali=withSu.slice().sort(function(a,b){return a.suTon-b.suTon;});
    var medyanSu=suSirali[Math.floor(suSirali.length/2)].suTon;
    var dusukSu=withSu.filter(function(x){return x.suTon<medyanSu;});
    var yuksekSu=withSu.filter(function(x){return x.suTon>=medyanSu;});
    if(dusukSu.length>=2 && yuksekSu.length>=2){
      var ortD=dusukSu.reduce(function(s,x){return s+x.kgTon;},0)/dusukSu.length;
      var ortY=yuksekSu.reduce(function(s,x){return s+x.kgTon;},0)/yuksekSu.length;
      bulgular.push({baslik:"Su miktarı ve verim", metin:"Ton kompost başına su medyanı ~"+medyanSu.toFixed(0)+" lt. Bunun altında sulanan "+dusukSu.length+" döngüde ortalama verim "+ortD.toFixed(0)+" kg/ton; üstünde sulanan "+yuksekSu.length+" döngüde "+ortY.toFixed(0)+" kg/ton."});
    }
  }
  var partiGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null || !c.gelisTarihi) return; var p=partiFromDate(c.gelisTarihi); if(!partiGroups[p]) partiGroups[p]=[]; partiGroups[p].push({oda:c.oda, kgTon:v.kgTon}); });
  var partiListe=Object.keys(partiGroups).filter(function(p){return partiGroups[p].length>=2;});
  if(partiListe.length){
    partiListe.sort(function(a,b){
      var oa=partiGroups[a].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[a].length;
      var ob=partiGroups[b].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[b].length;
      return ob-oa;
    });
    bulgular.push({baslik:"Parti bazlı karşılaştırma (aynı gün gelen kompost partileri)", metin: partiListe.slice(0,6).map(function(p){
      var arr=partiGroups[p]; var ort=arr.reduce(function(s,x){return s+x.kgTon;},0)/arr.length;
      return "Parti "+esc(p)+" ("+arr.map(function(x){return esc(x.oda);}).join(", ")+"): ort. "+ort.toFixed(0)+" kg/ton";
    }).join(" · ")});
  }
  var odaFirmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var o=normalizeOda(c.oda); var f=c.kompostFirma||"Bilinmiyor"; if(!odaFirmaGroups[o]) odaFirmaGroups[o]={}; if(!odaFirmaGroups[o][f]) odaFirmaGroups[o][f]=[]; odaFirmaGroups[o][f].push(v.kgTon); });
  var odaFirmaSatir=[];
  Object.keys(odaFirmaGroups).forEach(function(o){
    var firmalar=Object.keys(odaFirmaGroups[o]);
    if(firmalar.length<2) return;
    var ortlar=firmalar.map(function(f){ var arr=odaFirmaGroups[o][f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    ortlar.sort(function(a,b){return b.ort-a.ort;});
    var iyi=ortlar[0], kotu=ortlar[ortlar.length-1];
    var odaAdi=all.find(function(c){return normalizeOda(c.oda)===o;}).oda;
    odaFirmaSatir.push(esc(odaAdi)+"'da en iyi "+esc(iyi.f)+" ("+iyi.ort.toFixed(0)+" kg/ton), en kötü "+esc(kotu.f)+" ("+kotu.ort.toFixed(0)+" kg/ton)");
  });
  if(odaFirmaSatir.length){
    bulgular.push({baslik:"Oda bazında firma performansı", metin: odaFirmaSatir.join(" · ")});
  }
  return {n: all.length, bulgular: bulgular};
}
/* ---------- Kök neden analizi: tamamlanmış, düşük verimli döngülerde olası nedenler ---------- */
function donguKokNeden(c){
  var bulgular=[];
  var kritikGun=0, tehlikeGun=0, amonyakGun=0, nemYuksekGun=0;
  (c.gunluk||[]).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null){
      if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeGun++;
      else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
    }
    if(r.amonyak==="Var") amonyakGun++;
    if(r.nem==="Yüksek") nemYuksekGun++;
  });
  if(tehlikeGun>0) bulgular.push(tehlikeGun+" gün tehlikeli kompost sıcaklığı kaydedilmiş.");
  if(kritikGun>0) bulgular.push(kritikGun+" gün kritik kompost sıcaklığı kaydedilmiş.");
  if(amonyakGun>0) bulgular.push(amonyakGun+" gün amonyak kokusu bildirilmiş.");
  if(nemYuksekGun>=3) bulgular.push(nemYuksekGun+" gün yüksek nem bildirilmiş.");
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var ertelenen=audit.filter(function(a){
    if(!/ertelendi/i.test(a.action)) return false;
    if(!a.detail || a.detail.indexOf(c.oda||"\u0000")!==0) return false;
    var g=(a.at||"").slice(0,10);
    return g>=(c.gelisTarihi||"") && (!c.bosaltimTarihi || g<=c.bosaltimTarihi);
  }).length;
  if(ertelenen>0) bulgular.push(ertelenen+" işlem ertelenmiş.");
  return bulgular;
}

  var all=tumTamamlananDongu();

/* Hasat raporu — GEÇMİŞE DÖNÜK gerçek kayıtlar (tahmin değil). Günlük/haftalık/
   aylık toplam + oda bazında (son 30 gün) + tamamlanmış döngülerde ortalama verim. */
function hasatRaporuHTML(){
  var d=loadData();
  var S=getSet();
  var today=todayISO();
  var haftaBasi=addDays(today,-6), ayBasi=addDays(today,-29);
  var gunlukKasa=0, haftalikKasa=0, aylikKasa=0;
  var odaToplam={}; /* son 30 gün, oda bazında */
  (d.cycles||[]).forEach(function(c){
    (c.hasat||[]).forEach(function(h){
      var k=numParse(h.kasa)||0;
      if(h.tarih===today) gunlukKasa+=k;
      if(h.tarih>=haftaBasi) haftalikKasa+=k;
      if(h.tarih>=ayBasi){ aylikKasa+=k; odaToplam[c.oda]=(odaToplam[c.oda]||0)+k; }
    });
  });
  function box(lbl,val,unit){ return '<div style="flex:1;min-width:84px;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px;"><div class="muted" style="font-size:12px;">'+lbl+'</div><div style="font-size:19px;font-weight:700;">'+val+(unit?'<span style="font-size:11px;"> '+unit+'</span>':'')+'</div></div>'; }
  var body='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">'
    +box("Bugün",gunlukKasa,"kasa")+box("Son 7 gün",haftalikKasa,"kasa")+box("Son 30 gün",aylikKasa,"kasa")
    +box("Bugün",(gunlukKasa*S.kasaAgirlik).toFixed(0),"kg")+box("Son 30 gün",(aylikKasa*S.kasaAgirlik).toFixed(0),"kg")
    +'</div>';

  var odaKeys=Object.keys(odaToplam).sort(function(a,b){return odaToplam[b]-odaToplam[a];});
  if(odaKeys.length){
    body+='<div class="muted" style="margin-bottom:4px;">Oda bazında (son 30 gün):</div>';
    odaKeys.forEach(function(o){
      body+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:13px;"><span><b>'+esc(o)+'</b></span><span class="note">'+odaToplam[o]+' kasa ('+(odaToplam[o]*S.kasaAgirlik).toFixed(0)+' kg)</span></div>';
    });
  }

  var tamam=tumTamamlananDongu();
  var verimler=tamam.map(function(c){return verimOzet(c).kgTon;}).filter(function(x){return x!=null;});
  if(verimler.length){
    var ortVerim=verimler.reduce(function(a,b){return a+b;},0)/verimler.length;
    body+='<div class="muted" style="margin-top:10px;">Tamamlanmış '+verimler.length+' döngüde ortalama verim: <b>'+ortVerim.toFixed(0)+' kg/ton</b></div>';
  }
  if(!odaKeys.length && !gunlukKasa && !haftalikKasa && !aylikKasa){
    body='<div class="muted">Son 30 günde kayıtlı hasat yok.</div>'+body;
  }
  return sectionCard('🌾 Hasat Raporu (geçmişe dönük)', body);
}
/* Protokol Uygunluğu — firma bazlı + oda bazlı. "Başarı" = erken + zamanında +
   geç-ama-haklı-sebepli (c.erteleSebep="biyolojik" — sarım/gelişme yavaşsa puan
   kırılmaz, odaPerformans() ile AYNI mantık). Sadece FİİLEN YAPILMIŞ adımlar
   değerlendirilir; henüz sırası gelmemiş adımlar rapora girmez. */
function protokolUygunlukHTML(){
  var d=loadData();
  var firmaStats={}, odaStats={};
  function bosSayac(){ return {erken:0, zamaninda:0, gecSebep:0, gecSebepsiz:0, toplam:0}; }
  (d.cycles||[]).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi || s.tip!=="olay") return;
      var beklenen=protokolTarih(c,s); if(!beklenen) return;
      var gercek=adimYapilmaTarihi(c,idx,s); if(!gercek) return;
      var firma=c.kompostFirma||"Bilinmiyor", oda=c.oda||"Bilinmiyor";
      if(!firmaStats[firma]) firmaStats[firma]=bosSayac();
      if(!odaStats[oda]) odaStats[oda]=bosSayac();
      var fS=firmaStats[firma], oS=odaStats[oda];
      fS.toplam++; oS.toplam++;
      if(gercek<beklenen){ fS.erken++; oS.erken++; }
      else if(gercek===beklenen){ fS.zamaninda++; oS.zamaninda++; }
      else {
        var sebep=c.erteleSebep && c.erteleSebep["p"+idx];
        if(sebep==="biyolojik"){ fS.gecSebep++; oS.gecSebep++; }
        else { fS.gecSebepsiz++; oS.gecSebepsiz++; }
      }
    });
  });
  function tabloYaz(stats, baslik){
    var keys=Object.keys(stats);
    if(!keys.length) return '';
    var h='<div class="muted" style="margin-top:10px;margin-bottom:4px;">'+baslik+'</div>';
    keys.sort(function(a,b){return stats[b].toplam-stats[a].toplam;}).forEach(function(k){
      var x=stats[k];
      var basari = x.toplam>0 ? Math.round(((x.erken+x.zamaninda+x.gecSebep)/x.toplam)*100) : 0;
      h+='<div style="padding:7px 0;border-bottom:1px solid #eee;">'
        +'<div style="display:flex;justify-content:space-between;"><b>'+esc(k)+'</b><span style="font-weight:700;'+(basari<80?'color:var(--red);':'color:var(--green);')+'">%'+basari+'</span></div>'
        +'<div style="font-size:12px;color:var(--muted);margin-top:2px;">'
        +x.erken+' erken · '+x.zamaninda+' zamanında · '+x.gecSebep+' geç (haklı sebep) · '+x.gecSebepsiz+' geç (sebepsiz)'
        +'</div></div>';
    });
    return h;
  }
  var body=tabloYaz(firmaStats,'Firma bazında')+tabloYaz(odaStats,'Oda bazında');
  if(!body) body='<div class="muted">Henüz değerlendirilecek tamamlanmış protokol adımı yok.</div>';
  return sectionCard('📋 Protokol Uygunluğu', body);
}

/* sessiz: renderYedekleme() ekrana girer girmez otomatik çağırdığında true —
   "Yükleniyor..." toast'ı basmaz, sadece elle "🔄 Bulut yedeklerini listele"
   tıklanınca gösterilir. Hem otomatik hem elle çağrıda hata olursa _cloudBakErr
   set edilir ve renderYedekleme() bunu KALICI bir mesaj+"Tekrar dene" olarak
   gösterir — eskiden hata olunca 1.8sn'lik toast dışında hiçbir şey görünmüyordu,
   kullanıcı ekranı sonradan açtığında (toast kaybolduktan sonra) "liste hiç
   çıkmıyor" gibi görünüyordu (bkz. kullanıcı raporu). */
function cloudYedekleriGetir(sessiz){
  if(!FB.ready || !FB.db){ if(!sessiz) toast("Bulut bağlantısı yok"); _cloudBakErr="Bulut bağlantısı yok"; return; }
  if(_cloudBakFetching) return;
  _cloudBakFetching=true;
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  if(!sessiz) toast("Yükleniyor...");
  refBase.where(firebase.firestore.FieldPath.documentId(), ">=", "aktif_")
    .where(firebase.firestore.FieldPath.documentId(), "<", "aktif_~")
    .get().then(function(snap){
      var list=[];
      snap.forEach(function(doc){ list.push({olayId:doc.id.replace("aktif_",""), ts:doc.data().ts, gun:doc.data().gun}); });
      _cloudBakList=list.sort(function(a,b){ return (b.ts||"").localeCompare(a.ts||""); });
      _cloudBakErr=null;
      _cloudBakFetching=false;
      render();
    }).catch(function(e){
      console.warn("bulut yedekleri listelenemedi", e);
      _cloudBakErr=(e&&e.message)||"bilinmeyen hata";
      _cloudBakFetching=false;
      if(!sessiz) toast("Bulut yedekleri listelenemedi");
      render();
    });
}
function cloudYedektenGeriYukle(olayId){
  if(!can("manage")) return noPerm();
  if(!FB.ready || !FB.db){ toast("Bulut bağlantısı yok"); return; }
  if(!confirm("Bu bulut yedeği ile cihazdaki TÜM veri (aktif + arşiv) değiştirilecek. Emin misin?")) return;
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  Promise.all([
    refBase.doc("aktif_"+olayId).get(),
    refBase.doc("arsiv_"+olayId).get()
  ]).then(function(snaps){
    var aktifSnap=snaps[0], arsivSnap=snaps[1];
    if(!aktifSnap.exists){ toast("Bu yedek bulunamadı"); return; }
    var av=aktifSnap.data().veri||{};
    var ar=arsivSnap.exists ? (arsivSnap.data().veri||{}) : {};
    /* Eski bir bulut yedeği, o tarihten SONRA silinmiş hayalet kayıtları hâlâ
       içerebilir — tombstone listesiyle filtrele, geri gelmesinler. */
    var av_cycles=(av.cycles||[]).filter(function(c){ return !silinenIdMi(c.id); });
    memData={cycles:av_cycles, settings:av.settings||{}, gorevler:av.gorevler||[], arsiv:ar.arsiv||[]};
    _settingsFirstSyncDone = true; /* elle geri yükleme — buluta göndermeyi engelleyen kilidi aç, bkz. restoreJSON */
    saveData(); toast("☁️ Bulut yedeğinden geri yüklendi"); go("bugun");
  }).catch(function(e){ console.warn("bulut yedek okunamadı", e); toast("Bulut yedeği okunamadı — internet bağlantını kontrol et"); });
}

function bozukErteleTara(){

}

/* BAKIM: v253 öncesi, her "Planla" işlemi eskiyi silmeden yeni not ekliyordu
   ("Tırmık için plan X · Tırmık için plan Y · ..."). v253 bunu düzeltti (artık
   aynı adım için sadece SONUNCUSU tutulur) ama GEÇMİŞTE birikmiş notlar
   otomatik temizlenmez. Bu araç, aynı "X için plan" önekiyle birden fazla kez
   tekrarlanan notları bulup sadece en sonuncusunu bırakır — "için plan"
   olmayan diğer notlara (örn. "yapıldı" tamamlama kayıtları) dokunmaz. */
function tekrarliPlanNotlariTara(){
  var d=loadData();
  var bulunan=[];
  (d.cycles||[]).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var v=g.islemNot; if(!v) return;
      var parcalar=(""+v).split(" · ").map(function(x){return x.trim();}).filter(Boolean);
      var gruplar={};
      parcalar.forEach(function(p,i){
        var m=/^(.+?) için plan /.exec(p);
        if(m){ (gruplar[m[1]]=gruplar[m[1]]||[]).push(i); }
      });
      if(Object.keys(gruplar).some(function(k){return gruplar[k].length>1;})){
        bulunan.push({cid:c.id, oda:c.oda, tarih:g.tarih});
      }
    });
  });
  return bulunan;
}
function tekrarliPlanNotlariTemizle(){
  if(!can("manage")) return noPerm();
  var bulunan=tekrarliPlanNotlariTara();
  if(!bulunan.length){ toast("Temiz — tekrarlayan plan notu yok"); return; }
  var ozet=bulunan.slice(0,3).map(function(b){return b.oda+" ("+fmtDate(b.tarih)+")";}).join(", ");
  if(!confirm(bulunan.length+" gündeki tekrarlayan plan notları tek satıra indirilecek ("+ozet+(bulunan.length>3?", ...":"")+"). Devam edilsin mi?")) return;
  var d=loadData();
  bulunan.forEach(function(b){
    var c=d.cycles.find(function(x){return x.id===b.cid;}); if(!c) return;
    var g=(c.gunluk||[]).find(function(x){return x.tarih===b.tarih;}); if(!g || !g.islemNot) return;
    var parcalar=(""+g.islemNot).split(" · ").map(function(x){return x.trim();}).filter(Boolean);
    var sonIdx={};
    parcalar.forEach(function(p,i){ var m=/^(.+?) için plan /.exec(p); if(m) sonIdx[m[1]]=i; });
    var yeni=parcalar.filter(function(p,i){
      var m=/^(.+?) için plan /.exec(p);
      return !m || sonIdx[m[1]]===i; /* "için plan" değilse hep kalır; öyleyse sadece en son görüleni */
    });
    g.islemNot=yeni.join(" · ");
  });
  saveData(); logAudit("tekrarlayan plan notları temizlendi", bulunan.length+" kayıt"); toast(bulunan.length+" kayıt temizlendi"); render();
}

/* Reçete satırlarını Ayarlar'da gösterirken kronolojik/iş akışı sırasına göre
   sıralamak için ortak anahtar. ESKİDEN sadece "gelis" ve "toprak" referansları
   doğru normalize ediliyordu — "poşet"e, "tiftik"e, "tırmık"a referans veren
   satırlar (örn. Serenade: poşet+8) ham gün sayısıyla (8) sıralanıyordu, sanki
   geliş+8'miş gibi — oysa gerçekte poşet zaten geliş+6-7 civarı olduğundan
   gerçek sırası çok daha geriydi. Artık TÜM referans zinciri (kompost indirme →
   poşet → tiftik/toprak → tırmık → hava → hasat) özyinelemeli olarak "geliş
   ekseni"ne çözülüyor — döngü/sonsuz özyineleme koruması var. */
function protokolSiraAnahtari(s, _derinlik){
  _derinlik = _derinlik||0;
  if(_derinlik>8) return 90000+(s.gun||0); /* döngü koruması */
  if(!s || !s.ref || s.ref==="gelis") return (s&&s.gun)||0;
  if(s.ref==="toprak"){
    var offToprak=getSet().offToprak||13;
    return offToprak+(s.gun||0);
  }
  /* poset/tiftik/tirmik/hava/kompostindirme/özel referanslar: o rolün KENDİ
     satırını bul, onun ekseni + bu satırın gün farkı */
  var refIdx=protokolRolIdx(s.ref);
  /* SAHİPSİZ REFERANS: bu referansı (örn. özel eklenen "1. Flaş") hiçbir satır
     henüz Rol olarak almamışsa, sistem "bu ne zaman?" bilemiyor demektir.
     ESKİDEN bu durumda ham gün sayısıyla (örn. 5) sıralanıyordu — sanki
     gelişten 5 gün sonraymış gibi listenin EN BAŞINA çıkıyordu, oysa gerçekte
     çok daha geç bir aşama olabilir (örn. "1. Flaş" hasat civarı). Artık
     sahipsiz referanslar listenin SONUNA atılıyor (90000+) — en azından
     yanlış yere değil, göze çarpan/kontrol edilmesi gereken bir yere düşer. */
  if(refIdx<0) return 90000+(s.gun||0);
  var refStep=getProtokol()[refIdx];
  if(!refStep) return 90000+(s.gun||0);
  return protokolSiraAnahtari(refStep, _derinlik+1) + (s.gun||0);
}

function protokolSatirKaydet(idx){
  if(!can("manage")) return noPerm();
  var d=loadData(); ensureProtokol();
  var P=d.settings.protokol; if(!P||!P[idx]) return;
  var txt=el("pr_txt_"+idx).value;
  var gun=parseInt(el("pr_gun_"+idx).value,10);
  if(!isNaN(gun)) P[idx].gun=gun;
  if(txt!=null) P[idx].txt=txt;
  var se=el("pr_sahip_"+idx); if(se) P[idx].sahip=se.value;
  var sre=el("pr_sure_"+idx); if(sre){ var sv=parseInt(sre.value,10); P[idx].sure=(isNaN(sv)||sv<1)?1:sv; }
  var tk=el("pr_tekrar_"+idx); if(tk){ var tv=parseInt(tk.value,10); P[idx].tekrar=(isNaN(tv)||tv<0)?0:tv; }
  var rl=el("pr_rol_"+idx); if(rl) P[idx].rol=rl.value||"";
  /* ÇİFT ROL ATAMASI KORUMASI: aynı Rol (örn. "2. Flaş") yanlışlıkla birden
     fazla satıra atanmışsa, protokolRolIdx() sadece İLK bulduğunu kullanır —
     kullanıcı ikinci satıra Rol atadığını sanır ama sistem hâlâ eskisini
     baz alır, kafa karıştırıcı/çelişkili sonuçlar üretir. Burada yeni Rol
     atanırken, AYNI Rol'ü taşıyan BAŞKA satırlardan otomatik kaldırılır —
     "bu rolü artık BEN taşıyorum" mantığıyla tek sahip garanti edilir. */
  if(rl && rl.value){
    var yeniRol=rl.value, tasindi=0;
    P.forEach(function(diger,dIdx){
      if(dIdx!==idx && !diger.silindi && diger.rol===yeniRol){ diger.rol=""; tasindi++; }
    });
    if(tasindi>0) toast('⚠️ "'+refEtiketi(yeniRol)+'" rolü başka '+tasindi+' satırdan kaldırılıp buraya taşındı');
  }
  /* Referans noktası (Kompost indirme/Poşet/Tiftik/Toprak/Tırmık/Hava/Geliş) —
     eskiden bu satırlarda hiç düzenlenemiyordu, sadece yeni satır eklerken
     (ve orada da sadece Geliş/Toprak seçeneği vardı) ayarlanabiliyordu. Bu,
     "Poşetten sonra sulama vermedi" ve "sıradaki işlem sıra atlıyor" gibi
     hataların temel sebebiydi — kullanıcı referansı göremiyor/değiştiremiyordu. */
  var refEl=el("pr_ref_"+idx);
  if(refEl && refEl.value){
    var eskiRef=P[idx].ref;
    P[idx].ref=refEl.value;
    if(refEl.value!==eskiRef && protokolRefDongusuVarMi(idx)){
      /* Bu referans zinciri kendine geri dönüyor — kaydedilirse uygulama her
         bu adımın tarihi hesaplanmaya çalışıldığında çökerdi (sonsuz
         özyineleme). Değişikliği geri al, kullanıcıyı net bir şekilde uyar. */
      P[idx].ref=eskiRef;
      refEl.value=eskiRef;
      showWarnBox("❌ Döngüsel Referans", [
        '"'+esc(refEtiketi(refEl.value))+'" referansı seçilemedi — bu adımın referans zinciri dolaşıp kendine geri dönüyor.',
        "Örnek: A adımı B'ye bakıyor, B de (dolaylı olarak) A'ya bakıyorsa döngü oluşur.",
        "Değişiklik kaydedilmedi, önceki referans korundu."
      ]);
    }
  }
  var scEl=el("pr_sonuc_"+idx);
  if(scEl){ P[idx].sonucSecenekleri = scEl.value.split(",").map(function(x){return x.trim();}).filter(Boolean); }
  /* Tekrarlı sulama/ilaç kuralı (Mühendis Protokolü satırları): "HER GÜN
     tekrarlansın" kutusu işaretliyse tekrarBitisRef/tekrarBitisGun kaydedilir,
     değilse (daha önce varsa) TEMİZLENİR. Bu alan eskiden mevcut satırlarda
     hiç düzenlenemiyordu — sadece yeni eklenirken ayarlanabiliyordu. Bir kez
     eksik kaydedilmiş satırlar bu formdan artık düzeltilebilir. */
  var trChk=el("pr_tekrar_chk_"+idx);
  if(trChk){
    if(trChk.checked){
      var trRef=el("pr_tekrar_ref_"+idx); var trGun=el("pr_tekrar_gun_"+idx);
      var trGunV=trGun?parseInt(trGun.value,10):0;
      P[idx].tekrarBitisRef=trRef?trRef.value:"toprak";
      P[idx].tekrarBitisGun=isNaN(trGunV)?0:trGunV;
    } else {
      delete P[idx].tekrarBitisRef;
      delete P[idx].tekrarBitisGun;
    }
  }
  d.settings.protokolOzellestirildi=true;
  saveData(); toast("Kaydedildi"); render();
}

/* ---------- Günlük tur: protokolden sulama önerisi ---------- */
/* Bir protokol adımının uygulandığı TARİH ARALIĞINI döndürür.
   Normal (tekil) adımlarda başlangıç=bitiş=protokolTarih(c,step).
   "tekrarBitisRef" tanımlı adımlarda (örn. poşetten toprak-2'ye kadar HER GÜN
   500 lt su + Serenade) başlangıç poşetin tarihi, bitiş toprağın (tekrarBitisGun
   kadar kaydırılmış) tarihidir — toprak ertelenirse bitiş de otomatik kayar. */
function protokolAdimAraligi(c, step){
  if(!step) return null;
  var baslangic=protokolTarih(c, step);
  if(!baslangic) return null;
  if(!step.tekrarBitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitisRef=protokolReferansTarihi(c, step.tekrarBitisRef, step.rol);
  if(!bitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitis=addDays(bitisRef, step.tekrarBitisGun||0);
  if(cmpDate(bitis, baslangic) < 0) return null; /* aralık bu partide anlamsızsa (toprak çok erken vb.) gösterme */
  return {baslangic:baslangic, bitis:bitis};
}
function protokolOneri(c, iso){
  var out=[];
  /* Oda şu an hangi aşamada? Sulama/ilaç önerisi SADECE oda o aşamada veya
     daha sonraki aşamadaysa gösterilsin. Örn: Toprak aşamasındayken "Hava+3 su"
     önerisi gelmemeli — çünkü henüz Hava aşamasına gelmedi. */
  var odaAsamasi = stageOf(c).t; /* "Toprak dönemi", "1. Misel gelişim", vb */
  
  getProtokol().forEach(function(s,idx){
    if(s.silindi || (s.tip!=="ilac" && s.tip!=="su")) return;
    if(s.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,s);
      if(ar && cmpDate(iso,ar.baslangic)>=0 && cmpDate(iso,ar.bitis)<=0) out.push(adimGosterMetni(c, idx, s, iso));
      return;
    }
    var dt=protokolTarih(c,s); if(!dt) return;
    
    /* YALNIZCA bugün için sulama/ilaç — eski tarihlerde değil */
    if(dt!==iso) return;
    
    /* Aşama kontrolü: Sulama/ilaç ref'ı oda'nın bulunduğu aşamaya uygun mu?
       Toprak dönemindeyken → ref:"toprak" sulamalar ✓
       Hava dönemindeyken → ref:"hava" sulamalar ✓
       Ama Toprak dönemindeyken ref:"hava" sulamalar gösterilmemeli ✗ */
    var refAsamaPiramidi = {
      gelis:0, poset:1, tiftik:2, toprak:3, tirmik:4, hava:5, hasat:6
    };
    var sulamaRefSeviye = refAsamaPiramidi[s.ref] || -1;
    var odaAsamaSeviye = odaAsamasi.includes("Kuluçka") ? 0
      : odaAsamasi.includes("Toprak dönemi") ? 3
      : odaAsamasi.includes("1. Misel") ? 4
      : odaAsamasi.includes("2. Misel") ? 5
      : odaAsamasi.includes("Pimleme") ? 5
      : odaAsamasi.includes("Bezelye") ? 5
      : odaAsamasi.includes("Ceviz") ? 5
      : odaAsamasi.includes("Hasat") ? 6
      : -1;
    
    /* Sulama ref'ı oda'nın aşamasından SONRASINA referans veriyorsa, henüz
       o aşamaya gelmediğinden sulamayı gizle. */
    if(sulamaRefSeviye > odaAsamaSeviye) return;
    
    var metin = adimGosterMetni(c, idx, s, iso);
    /* Placeholder/sentinel metin kontrolü: kullanıcı protokole "bu gün hiçbir
       şey verilmeyecek" anlamında "boş" gibi bir yer tutucu metin girmiş
       olabilir (örn. Toprak+2 satırı). Bu, GERÇEK bir sulama/ilaç önerisi
       DEĞİLDİR — göreve çevrilmemeli, aksi halde "A-1 — boş" gibi anlamsız
       görevler oluşur. */
    var PLACEHOLDER_RE = /^(boş|yok|hiç ?bir ?şey|hiçbir şey verilmeyecek|-|—)$/i;
    if(PLACEHOLDER_RE.test((metin||"").trim())) return;
    out.push(metin);
  });
  return out.join(" + ");
}

  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;

}

/* ---------- Flaş bazlı verim (F1 vs F2 kg/kasa) ---------- */
function verimFlasOzet(c){
  var S=getSet(); var out={};
  (c.hasat||[]).forEach(function(h){
    var ha=hasatAsama(c,h.tarih);
    var key=(ha&&ha.flas>0)?("F"+ha.flas):"diğer";
    if(!out[key]) out[key]={kasa:0};
    out[key].kasa+=(numParse(h.kasa)||0);
  });
  Object.keys(out).forEach(function(k){ out[k].kg=out[k].kasa*S.kasaAgirlik; });
  return out;
}
/* ---------- Tahmini verim (aktif odalar için, firma/filo geçmişine göre) ---------- */
function firmaOrtalamaKgTon(firma){
  var vals=tumTamamlananDongu().filter(function(c){return (c.kompostFirma||"")===firma;}).map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function filoOrtalamaKgTon(){
  var vals=tumTamamlananDongu().map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function tahminiVerim(c){
  if(c.bosaltimTarihi) return null;
  var ton=(numParse(c.tonaj)||0)/1000; if(ton<=0) return null;
  var f=firmaOrtalamaKgTon(c.kompostFirma||"");
  var kaynak;
  if(f && f.n>=2){ kaynak="firma ortalaması ("+esc(c.kompostFirma||"")+", n="+f.n+")"; }
  else { f=filoOrtalamaKgTon(); kaynak=f?("filo geneli ortalaması, n="+f.n):null; }
  if(!f) return null;
  return {kg: f.ort*ton, kaynak: kaynak};
}
/* ---------- Oda bazlı geçmiş istatistik ---------- */
function odaGecmisIstatistik(oda, excludeId){
  var n=normalizeOda(oda);
  var gecmis=tumTamamlananDongu().filter(function(c){return c.id!==excludeId && normalizeOda(c.oda)===n;});
  var vals=gecmis.map(function(c){ return {c:c, kgTon:verimOzet(c).kgTon}; }).filter(function(x){return x.kgTon!=null;});
  if(!vals.length) return null;
  var ort=vals.reduce(function(s,x){return s+x.kgTon;},0)/vals.length;
  var en_iyi=vals.slice().sort(function(a,b){return b.kgTon-a.kgTon;})[0];
  var en_kotu=vals.slice().sort(function(a,b){return a.kgTon-b.kgTon;})[0];
  return {n: vals.length, ort: ort, enIyi:{tarih:en_iyi.c.gelisTarihi, kgTon:en_iyi.kgTon}, enKotu:{tarih:en_kotu.c.gelisTarihi, kgTon:en_kotu.kgTon}};
}
function verimOzet(c){
  var kes=0,nor=0;
  (c.hasat||[]).forEach(function(h){ var k=numParse(h.kasa)||0; if(h.tip==="kestane")kes+=k; else nor+=k; });

  var alan=numParse(c.alanM2);
  return {kestane:kes, normal:nor, toplam:toplam, ton:ton, verim:(ton>0?toplam/ton:null), kg:kg, kgTon:(ton>0?kg/ton:null), kgM2:(alan&&alan>0?kg/alan:null), alan:alan};
}

/* ---------- Tüketim özeti ---------- */
function tuketimOzet(c){
  var su=0, kim={}, n=0, approx=false; var suGunSayisi=0; var flasSu={};
  (c.gunluk||[]).forEach(function(r){
    var sn=numParse(r.su); var hasText=!!r.sulama;
    if(sn===null && !hasText) return;
    n++;
    var buSu=0;
    if(sn!==null){ buSu=sn; su+=sn; }
    else if(hasText){ var m=(""+r.sulama).match(/(\d+(?:[.,]\d+)?)\s*lt/gi); if(m){ approx=true; m.forEach(function(x){ var num=parseFloat(x.replace(/[^\d.,]/g,'').replace(',','.')); if(!isNaN(num)){ su+=num; buSu+=num; } }); } }
    if(buSu>0){ suGunSayisi++; var ha=hasatAsama(c,r.tarih); var key=(ha&&ha.flas>0)?("F"+ha.flas):"hazırlık/kuluçka"; flasSu[key]=(flasSu[key]||0)+buSu; }
    if(hasText){ ["Serenade","Vivando","Tezguard","insektisit","formaldehit","Asena","kalsiyum","sodyum"].forEach(function(kw){ if(new RegExp(kw,"i").test(r.sulama)) kim[kw]=(kim[kw]||0)+1; }); }
  });
  var ton=(numParse(c.tonaj)||0)/1000; var alan=numParse(c.alanM2);
  return {su:su, islem:n, kim:kim, approx:approx, suTon:(ton>0?su/ton:null), suM2:(alan&&alan>0?su/alan:null), suGunOrt:(suGunSayisi>0?su/suGunSayisi:null), flasSu:flasSu};
}

/* ---------- Geçmiş kıyas ---------- */
function overlayChartSVG(list){
  var colors=["#14583a","#1f9e75","#d98a1f","#3b82c4","#a3408a","#888"];
  var series=[];
  list.forEach(function(c,idx){
    var pts=[]; (c.gunluk||[]).forEach(function(r){ var v=numParse(r.kompostC), g=gunNo(c,r.tarih); if(v!==null&&g!=="") pts.push({g:g,v:v}); });
    pts.sort(function(a,b){return a.g-b.g;});
    if(pts.length) series.push({pts:pts, col:colors[idx%colors.length], lbl:fmtDate(c.gelisTarihi)+(c.tur?(" ("+c.tur+".tur)"):"")});
  });
  if(!series.length) return '<div class="muted">Kompost ölçümü yok.</div>';
  var W=720,H=300,pad=42,gmin=Infinity,gmax=-Infinity,vmin=Infinity,vmax=-Infinity;
  series.forEach(function(s){ s.pts.forEach(function(p){ if(p.g<gmin)gmin=p.g; if(p.g>gmax)gmax=p.g; if(p.v<vmin)vmin=p.v; if(p.v>vmax)vmax=p.v; }); });
  vmin=Math.floor(vmin-1); vmax=Math.ceil(vmax+1); if(gmax===gmin)gmax=gmin+1; if(vmax===vmin)vmax=vmin+1;
  function X(g){return pad+(g-gmin)/(gmax-gmin)*(W-2*pad);}
  function Y(v){return H-pad-(v-vmin)/(vmax-vmin)*(H-2*pad);}
  var svg=''; if(26<=vmax&&24>=vmin) svg+='<rect x="'+pad+'" y="'+Y(26)+'" width="'+(W-2*pad)+'" height="'+(Y(24)-Y(26))+'" fill="#dcefe2"/>';
  var step=Math.max(1,Math.round((vmax-vmin)/5));
  for(var t=vmin;t<=vmax;t+=step){var y=Y(t);svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#eee"/><text x="'+(pad-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#555">'+t+'°</text>';}
  series.forEach(function(s){ var d=s.pts.map(function(p){return X(p.g)+","+Y(p.v);}).join(" "); svg+='<polyline points="'+d+'" fill="none" stroke="'+s.col+'" stroke-width="2"/>'; });
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#888"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#888"/>';
  var leg=series.map(function(s){return '<span style="color:'+s.col+';">\u25cf '+s.lbl+'</span>';}).join(" &nbsp; ");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="max-width:100%;border:1px solid #ccc;" xmlns="http://www.w3.org/2000/svg">'+svg+'<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">Gün (gelişten)</text></svg><div style="font-size:11px;margin-top:4px;">'+leg+'</div>';
}

/* ---------- Havalandırma günlük hedefi (dinamik ikaz) ---------- */
/* Bugüne ait havalandırma planı satırının TAMAMINI döner (hedefC +
   co2alt/co2ust) — havaHedef() bunun sadece sıcaklık sayısını istediği için
   ayrı tutuluyor, ikisi de aynı satırı bulur.
   KRİTİK: Plan sadece mühendisin seçtiği gün sayısı kadar (örn. 4 gün)
   kademeli düşüş içindir — bugün, plandaki EN SON tarihten sonraysa (kademeli
   düşüş süresi bittiyse) null döneriz. Aksi halde son günün hedefi (örn. 18°)
   süresiz gösterilmeye devam eder — hâlbuki o noktadan sonra artık "kademeli
   hedef" değil, sabit rejim dönemidir; ayrı bir uyarı kapsamı olmamalı. */
function havaHedefSatiri(c){
  if(!c.hava||!c.hava.length) return null;
  var today=todayISO(), best=null, sonTarih=null;
  c.hava.forEach(function(r){
    if(!sonTarih || r.tarih>sonTarih) sonTarih=r.tarih;
    if(r.tarih<=today && (!best||r.tarih>best.tarih)) best=r;
  });
  if(sonTarih && today>sonTarih) return null; /* kademeli düşüş süresi bitti */
  if(!best) c.hava.forEach(function(r){ if(!best||r.tarih<best.tarih) best=r; });
  return best;
}
function havaHedef(c){
  var best=havaHedefSatiri(c);
  return best?numParse(best.hedefC):null;
}

/* ---------- Olaylar ---------- */
/* Uygulama arka plandan/kapalıyken öne gelince (özellikle iOS'ta) tarayıcı
   bazen JS'i hiç yeniden çalıştırmadan, kapanmadan ÖNCEKİ donmuş ekran
   görüntüsünü gösterir (bfcache) — bu yüzden diskteki EN GÜNCEL veriyi
   okuyup yeniden render etmemiz gerekiyor (belki başka cihaz senkronla
   değiştirmiştir).
   KRİTİK GÜVENLİK AĞI: Veri artık PIN ile şifreli olduğu için bu okuma
   ASENKRON (storeKeyOku + pinCoz) yapılmak ZORUNDA. Önceki sürüm burada
   memData'yı ÖNCE null'a çekip SENKRON eski loadData() ile dolduruyordu —
   bu, diskteki şifreli zarfı ({enc:1,...}) çözülmemiş haliyle gerçek veriymiş
   gibi yorumlayıp memData.cycles'ı SESSİZCE BOŞALTIYORDU (kullanıcı "odalar
   silindi" görüyordu), üstüne bir de bu boş hal sonraki kayıtta diske geri
   yazılabiliyordu. Bu yüzden burada memData'ya ancak başarılı bir çözme
   sonrasında dokunuyoruz; herhangi bir hata olursa mevcut bellek verisi
   OLDUĞU GİBİ bırakılır, ASLA boşaltılmaz. */
async function resumeYenidenYukle(){
  if(!_pinKey){ return; } /* kilit açık değilse (giriş ekranındayız) dokunma */
  try{
    var raw = await storeKeyOku();
    if(raw){
      var env = JSON.parse(raw);
      if(env && env.enc===1){
        var plaintext = await pinCoz(_pinKey, env.iv, env.ct);
        memData = JSON.parse(plaintext);
        memDataNormalizeVeGoc();
      }
    }
  }catch(e){
    console.error("arka plandan dönüşte veri yenilenemedi — mevcut bellek verisi korunuyor", e);
    return;
  }
  try{ render(); }catch(e){ console.error("resume render error:", e); }
  cloudYedekAcilista();
}

  console.error("Init fatal error:", e);

    el("app").innerHTML='<div class="card" style="border:1.5px solid #c0291f;background:#fceaea;padding:20px;">'
      +'<div style="font-weight:700;color:#c0291f;font-size:16px;">⚠️ Başlatma hatası</div>'
      +'<div style="font-size:11px;color:#666;margin:8px 0;font-family:monospace;word-break:break-all;">'+esc(""+e.message)+'</div>'
      +'<button class="btn small" style="width:100%;margin-top:12px;" onclick="location.reload()">Yenile</button>'
      +'</div>';
  }
}
/* Açılışta kayıtlı veri bozuksa kullanıcıyı sessizce değil, açıkça uyar.
   Ham veri _bozuk_ anahtarına yedeklendi — üzerine yazılmadan kurtarılabilir. */
if(_veriOkumaHatasi){
  setTimeout(function(){
    showWarnBox("Veri okunamadı", [
      "Cihazdaki kayıtlı veri bozuk görünüyordu ve açılamadı.",
      "Bozuk veri güvenli bir yere yedeklendi (silinmedi).",
      "Buluttan (Firebase) senkron açıksa verilerin birazdan geri gelecektir.",
      "Emin değilsen, veri girmeden önce durumu kontrol et veya yöneticine haber ver."
    ]);
  }, 800);
}
autoSnapshotThrottled();
/* Başarısız senkron denemelerini periyodik olarak tekrar dene (internet geri gelince otomatik kurtarır) */
setInterval(function(){ if(FB.ready){ fbPushDirty(); fbPushDirtyGorev(); fbPushDirtyAriza(); fbPushSettings(); cloudYedekTetikle(); gorevMukerrerBulutTemizle(); } }, 30000);
setInterval(updateCloudBakBadge, 60000);
}
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(e){ console.warn("sw register", e); });
  });
}
pinBoot();
</script>
