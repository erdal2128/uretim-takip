<script>
"use strict";

/* ===================== SENKRON (Firebase Firestore) =====================
   Bo\u015f b\u0131rak\u0131rsan uygulama yaln\u0131zca bu cihazda \u00e7al\u0131\u015f\u0131r (offline, mevcut h\u00e2li).
   Senkron i\u00e7in: Firebase'de \u00fccretsiz proje a\u00e7 -> Firestore Database ba\u015flat ->
   Proje Ayarlar\u0131 > "Web app" yap\u0131land\u0131rmas\u0131n\u0131 a\u015fa\u011f\u0131ya yap\u0131\u015ft\u0131r. FARM_CODE: i\u015fletme kodu. */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyDzG6DG2Z1xbGIBIy7gRM2yTENfrSq7Kh4",
  authDomain: "dirican-mantar.firebaseapp.com",
  projectId: "dirican-mantar",
  storageBucket: "dirican-mantar.firebasestorage.app",
  messagingSenderId: "854408068861",
  appId: "1:854408068861:web:7b358e97db38620d83c894"
};
var FARM_CODE = "merkez";
/* ======================================================================= */

var FB = { ready:false, coll:null, gorevColl:null, arizaColl:null, yoklamaColl:null, hasatColl:null, firstServer:false, firstServerG:false, firstServerA:false, firstServerY:false };
var _synced = {};
var _syncedG = {};
var _syncedA = {};
var _syncedY = {};
function cycleJSON(c){ return JSON.stringify(c); }
function fbClean(c){ return JSON.parse(JSON.stringify(c)); }
function rebuildSynced(){ _synced={}; ((memData&&memData.cycles)||[]).forEach(function(c){ _synced[c.id]=cycleJSON(c); }); }
function rebuildSyncedG(){ _syncedG={}; ((memData&&memData.gorevler)||[]).forEach(function(g){ _syncedG[g.id]=cycleJSON(g); }); }
function rebuildSyncedA(){ _syncedA={}; ((memData&&memData.arizalar)||[]).forEach(function(a){ _syncedA[a.id]=cycleJSON(a); }); }
function rebuildSyncedY(){ _syncedY={}; ((memData&&memData.yoklamalar)||[]).forEach(function(y){ _syncedY[y.id]=cycleJSON(y); }); }
function isTyping(){ var a=document.activeElement; return !!(a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)); }
function fbPendingCount(){
  var n=0;
  ((memData&&memData.cycles)||[]).forEach(function(c){ if(_synced[c.id]!==cycleJSON(c)) n++; });
  ((memData&&memData.gorevler)||[]).forEach(function(g){ if(_syncedG[g.id]!==cycleJSON(g)) n++; });
  ((memData&&memData.arizalar)||[]).forEach(function(a){ if(_syncedA[a.id]!==cycleJSON(a)) n++; });
  ((memData&&memData.yoklamalar)||[]).forEach(function(y){ if(_syncedY[y.id]!==cycleJSON(y)) n++; });
  return n;
}
function fbSetStatus(s){
  var e=document.getElementById("syncDot"); if(!e) return;
  var bekleyen = (s==="offline"||s==="hata") ? fbPendingCount() : 0;
  var bek = bekleyen>0 ? (" \u00b7 "+bekleyen+" kay\u0131t bekliyor") : "";
  if(s==="synced"){ e.textContent="\u25cf senkron"; e.style.color="#bff5dc"; }
  else if(s==="offline"){ e.textContent="\u25cf \u00e7evrimd\u0131\u015f\u0131"+bek; e.style.color="#ffe0a3"; }
  else if(s==="local"){ e.textContent="\u25cf yerel"; e.style.color="#cfe3ff"; }
  else if(s==="hata"){ e.textContent="\u25cf senkron bekliyor"+bek; e.style.color="#ffb3b3"; }
  else { e.textContent=""; }
}
var _syncFailCount=0;
function fbPushDirty(){
  if(!FB.ready) return;
  ((memData&&memData.cycles)||[]).forEach(function(c){
    var j=cycleJSON(c);
    if(_synced[c.id]!==j){
      FB.coll.doc(c.id).set(fbClean(c)).then(function(){
        _synced[c.id]=j; /* sadece gerГ§ekten baЕҹarДұlДұ olursa iЕҹaretle */
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("set",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDelete(id){
  if(!FB.ready) return Promise.resolve();
  delete _synced[id];
  return FB.coll.doc(id).delete()
    .then(function(){
      /* Silme baЕҹarДұlДұ вҖ” tombstone listesinden Г§Дұkar (tekrar gelmez) */
      silinenIdTemizle(id);
    })
    .catch(function(e){
      console.warn("delete hatasДұ", e);
      fbSetStatus("hata");
      /* Hata olsa bile tombstone'da kalДұr вҖ” sonra retry'Дұ otomatik deneyecek */
      throw e;
    });
}
/* KALICI SД°LД°NEN KAYIT LД°STESД° (tombstone): bir dГ¶ngГј silindiДҹinde ID'si buraya
   eklenir. Silme isteДҹi buluta ulaЕҹamadan (yavaЕҹ baДҹlantДұ, uygulama erken
   kapatДұlДұrsa) cihaz kapanДұrsa, bulut o kaydДұ hГўlГў tutar ve bir sonraki
   senkronda GERД° GELД°R вҖ” kullanДұcДұ "her kapattДұДҹДұmda eski veri geliyor" diye
   defalarca aynДұ hayalet kayДұtlarДұ elle siliyordu. ArtДұk silinen ID'ler ayrДұ
   bir listede kalДұcДұ tutuluyor; senkronda bu ID'lerden biri tekrar gelirse
   sessizce YOK SAYILIP buluttan bir daha silinir вҖ” kullanДұcДұya hiГ§ gГ¶rГјnmez. */
var SILINEN_KEY = "utp_silinenIdler";
function silinenIdlerGetir(){ try{ return JSON.parse(localStorage.getItem(SILINEN_KEY)||"[]"); }catch(e){ return []; } }
function silinenIdEkle(id){
  try{
    var L=silinenIdlerGetir();
    if(L.indexOf(id)<0){ L.push(id); if(L.length>500) L=L.slice(-500); localStorage.setItem(SILINEN_KEY, JSON.stringify(L)); }
  }catch(e){ console.warn("silinen id kaydedilemedi", e); }
}
function silinenIdMi(id){ return silinenIdlerGetir().indexOf(id)>=0; }
/* Silinen ID'sini listeden kaldДұr (buluta baЕҹarДұyla gittikten sonra) */
function silinenIdTemizle(id){
  try{
    var L=silinenIdlerGetir();
    L = L.filter(function(x){return x!==id;});
    localStorage.setItem(SILINEN_KEY, JSON.stringify(L));
  }catch(e){ console.warn("silinen id temizleme hatasДұ", e); }
}
function fbPushDirtyGorev(){
  if(!FB.ready || !FB.gorevColl) return;
  ((memData&&memData.gorevler)||[]).forEach(function(g){
    var j=cycleJSON(g);
    if(_syncedG[g.id]!==j){
      FB.gorevColl.doc(g.id).set(fbClean(g)).then(function(){
        _syncedG[g.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setG",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteGorev(id){ if(FB.ready && FB.gorevColl){ delete _syncedG[id]; FB.gorevColl.doc(id).delete().catch(function(e){ console.warn("deleteG",e); fbSetStatus("hata"); }); } }
/* ArДұzalar (d.arizalar) вҖ” KRД°TД°K: eskiden hiГ§ buluta senkronize edilmiyordu,
   sadece o anki cihazДұn localStorage'Дұnda kalДұyordu. Teknisyenin ekranДұ,
   ArДұzalar sekmesinin TEK amacДұ olduДҹu iГ§in bu, "yГ¶neticinin bildirdiДҹi arДұza
   teknisyende hiГ§ gГ¶rГјnmГјyor" hatasДұnДұn doДҹrudan sebebiydi вҖ” iki cihaz aynДұ
   veriyi paylaЕҹmДұyordu. gorevler ile birebir aynДұ desen: kendi Firestore
   koleksiyonu, her arДұza kendi dokГјmanДұ. */
function fbPushDirtyAriza(){
  if(!FB.ready || !FB.arizaColl) return;
  ((memData&&memData.arizalar)||[]).forEach(function(a){
    var j=cycleJSON(a);
    if(_syncedA[a.id]!==j){
      FB.arizaColl.doc(a.id).set(fbClean(a)).then(function(){
        _syncedA[a.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setA",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteAriza(id){ if(FB.ready && FB.arizaColl){ delete _syncedA[id]; FB.arizaColl.doc(id).delete().catch(function(e){ console.warn("deleteA",e); fbSetStatus("hata"); }); } }
/* Yoklama (d.yoklamalar) вҖ” gorevler/arizalar ile birebir aynДұ desen: kendi
   Firestore koleksiyonu, her gГјn+personel kaydДұ kendi dokГјmanДұ. Г–zlГјk
   haklarДұ iГ§in tutulan bir kayДұt olduДҹundan her cihaz aynДұ veriyi gГ¶rmeli. */
function fbPushDirtyYoklama(){
  if(!FB.ready || !FB.yoklamaColl) return;
  ((memData&&memData.yoklamalar)||[]).forEach(function(y){
    var j=cycleJSON(y);
    if(_syncedY[y.id]!==j){
      FB.yoklamaColl.doc(y.id).set(fbClean(y)).then(function(){
        _syncedY[y.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setY",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteYoklama(id){ if(FB.ready && FB.yoklamaColl){ delete _syncedY[id]; FB.yoklamaColl.doc(id).delete().catch(function(e){ console.warn("deleteY",e); fbSetStatus("hata"); }); } }
/* gorevlerMukerrerleriBirlestir()'in kuyruДҹa aldДұДҹДұ fazlalДұk bulut dokГјmanlarДұnДұ
   siler вҖ” bkz. o fonksiyondaki yorum. Bulut hazДұr deДҹilse sessizce vazgeГ§er,
   kuyruk (memData._gorevMukerrerSil) diskte kalДұr, bir sonraki fДұrsatta
   (30sn'lik senkron dГ¶ngГјsГј / bulut baДҹlantДұsДұ kurulunca) tekrar denenir. */
function gorevMukerrerBulutTemizle(){
  if(!FB.ready || !FB.gorevColl) return;
  var d=loadData();
  if(!Array.isArray(d._gorevMukerrerSil) || !d._gorevMukerrerSil.length) return;
  d._gorevMukerrerSil.forEach(function(id){ fbDeleteGorev(id); });
  d._gorevMukerrerSil=[];
  saveData();
}
/* ---- EЕҹzamanlДұ dГјzenleme: dГ¶ngГј birleЕҹtirme (veri kaybДұ olmasДұn) ---- */
function mergeArr(localArr, remoteArr, keyFn, preferLocal){
  var map={}, order=[];
  function add(arr){ (arr||[]).forEach(function(e){ var k=keyFn(e); if(!(k in map)) order.push(k); map[k]=e; }); }
  if(preferLocal){ add(remoteArr); add(localArr); } else { add(localArr); add(remoteArr); }
  return order.map(function(k){ return map[k]; });
}
/* Д°ki dГјz obje (key -> deДҹer) iГ§in birleЕҹtirme: her iki taraftaki TГңM anahtarlar
   korunur, aynДұ anahtar ikisinde de varsa "tercih edilen" (daha yeni _at'lДұ) taraf
   kazanДұr. mergeArr'Дұn obje versiyonu вҖ” dizi olmayan alanlar (done/ertele/
   adimDetay/kontrolKarar) iГ§in de aynДұ "hiГ§bir taraf sessizce kaybolmasДұn"
   prensibi geГ§erli olsun diye. */
function mergeFlatObj(localObj, remoteObj, preferLocal){
  var out={};
  var alt=preferLocal?remoteObj:localObj, ust=preferLocal?localObj:remoteObj;
  if(alt) Object.keys(alt).forEach(function(k){ out[k]=alt[k]; });
  if(ust) Object.keys(ust).forEach(function(k){ out[k]=ust[k]; });
  return out;
}
function mergeCycle(localC, remoteC){
  if(!localC) return remoteC; if(!remoteC) return localC;
  var lAt=localC._at||"", rAt=remoteC._at||"", preferLocal=lAt>rAt;
  var merged=JSON.parse(JSON.stringify(preferLocal?localC:remoteC));
  merged.gunluk=mergeArr(localC.gunluk, remoteC.gunluk, function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hava  =mergeArr(localC.hava,   remoteC.hava,   function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hasat =mergeArr(localC.hasat,  remoteC.hasat,  function(e){return (e.tarih||"")+"|"+(e.tip||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.odaGorevleri=mergeArr(localC.odaGorevleri, remoteC.odaGorevleri, function(e){return e.id||"";}, preferLocal);
  /* KRД°TД°K: eskiden bu alanlar SADECE daha yeni _at'lДұ tarafДұn bГјtГјn objesinden
     kopyalanДұyordu вҖ” iki cihaz aynДұ anda farklДұ protokol adДұmlarДұnДұ (Г¶rn. biri
     "Toprak serildi", diДҹeri "TДұrmДұk yapДұldДұ") iЕҹaretlerse, geГ§ senkron olan
     cihazДұn iЕҹareti sessizce kaybolabiliyordu (bkz. adimTamamla/c.done). ArtДұk
     her iki taraftaki anahtarlar da korunuyor, sadece ГҮAKIЕһAN anahtarlarda
     "tercih edilen" taraf kazanДұyor. */
  merged.done      = mergeFlatObj(localC.done,      remoteC.done,      preferLocal);
  merged.doneSon   = mergeFlatObj(localC.doneSon,   remoteC.doneSon,   preferLocal);
  merged.ertele    = mergeFlatObj(localC.ertele,    remoteC.ertele,    preferLocal);
  merged.adimDetay = mergeFlatObj(localC.adimDetay, remoteC.adimDetay, preferLocal);
  merged.kontrolKarar = mergeFlatObj(localC.kontrolKarar, remoteC.kontrolKarar, preferLocal);
  var tempAckKeys={};
  Object.keys(localC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  Object.keys(remoteC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  merged.tempAck={};
  Object.keys(tempAckKeys).forEach(function(k){
    merged.tempAck[k]=mergeFlatObj((localC.tempAck||{})[k], (remoteC.tempAck||{})[k], preferLocal);
  });
  merged._at=(lAt>rAt?lAt:rAt)||merged._at;
  return merged;
}

/* farms/{FARM_CODE}/meta/settings dokГјmanДұnДұn onSnapshot iЕҹleyicisi вҖ” test
   edilebilsin diye adlandДұrДұlmДұЕҹ bir fonksiyon olarak ayrДұldДұ (sahte bir
   "snap" objesiyle doДҹrudan Г§aДҹrДұlabilir). */
function handleSettingsSnapshot(snap){
  if(!snap.exists){
    /* Bulutta henГјz ayar yok вҖ” GERГҮEKTEN yeni bir Г§iftlik demektir, bootwait
       (varsa) artДұk gГјvenle "Д°lk Kurulum"a Г§Г¶zГјlebilir вҖ” yereldekini ilk
       kez gГ¶nder */
    _settingsFirstSyncDone = true;
    fbPushSettings();
    _bootWaitResolveIfNeeded();
    return;
  }
  var remote = snap.data();
  if(!remote){ _settingsFirstSyncDone = true; _bootWaitResolveIfNeeded(); return; }
  var j = JSON.stringify(remote);
  _settingsFirstSyncDone = true; /* buluttan en az bir kez veri aldДұk вҖ” artДұk gГ¶ndermek gГјvenli */
  if(_syncedSettings===j){ _bootWaitResolveIfNeeded(); return; } /* kendi yazdДұДҹДұmДұzДұn yankДұsДұ */
  /* KRД°TД°K: d.settings TEK bir bulut dokГјmanДұ olarak, hiГ§bir alan-bazlДұ
     birleЕҹtirme YAPILMADAN (mergeCycle'Дұn aksine) senkronize ediliyor.
     Yerelde henГјz buluta ULAЕһMAMIЕһ bir deДҹiЕҹiklik varsa (fbPushSettings
     hГўlГў bekliyor вҖ” Г¶rn. reГ§ete satДұrДұna az Г¶nce "su" eklendi, Kaydet'e
     basДұldДұ ama .set() henГјz dГ¶nmedi), buluttan bu anda gelen anlДұk
     gГ¶rГјntГј bГјyГјk ihtimalle O DEДһД°ЕһД°KLД°KTEN Г–NCEKД° hali taЕҹДұyor. Eskiden
     burada koЕҹulsuz "d.settings=remote" yapДұlДұyordu вҖ” kullanДұcДұ Kaydet'e
     basДұp "Kaydedildi" gГ¶rse bile, hemen ardДұndan gelen bu eski anlДұk
     gГ¶rГјntГј deДҹiЕҹikliДҹi SESSД°ZCE siliyordu ("kaydediyorum ama yine eski
     hГўline dГ¶nГјyor" raporu tam olarak buradan geliyordu). Bekleyen yerel
     bir deДҹiЕҹiklik varsa buluttan geleni KABUL ETMД°YORUZ, bunun yerine
     kendi deДҹiЕҹikliДҹimizi yeniden gГ¶ndermeyi deniyoruz. */
  if(_settingsPendingSince){ fbPushSettings(); _bootWaitResolveIfNeeded(); return; }
  _syncedSettings = j;
  var d=loadData();
  d.settings = remote;
  persistData(JSON.stringify(memData));
  /* d.settings ARTIK gerГ§ek bulut verisini taЕҹДұyor вҖ” bootwait (varsa) bu
     GГңNCEL veriyle Г§Г¶zГјlsГјn ki isSetupNeeded() doДҹru karar versin. ГҮГ¶zГјldГјyse
     loadRole()+render() zaten Г§aДҹrДұldДұ, alttaki render()'Дұ tekrar etmeye
     gerek yok. */
  if(_bootWaitResolveIfNeeded()) return;
  if(!isTyping()) render();
}
function fbPushSettings(){
  if(!FB.ready || !FB.settingsDoc) return;
  if(!_settingsFirstSyncDone) return; /* henГјz buluttaki gГјncel hali gГ¶rmedik вҖ” gГ¶ndermek riskli, bekle */
  var d=loadData(); if(!d.settings) d.settings={};
  var j=JSON.stringify(d.settings);
  if(_syncedSettings===j) return;
  if(!_settingsPendingSince) _settingsPendingSince=Date.now();
  FB.settingsDoc.set(fbClean(d.settings)).then(function(){
    _syncedSettings=j;
    _settingsPendingSince=0;
  }).catch(function(e){ console.warn("setSettings",e); fbSetStatus("hata"); });
}

/* Belirli oda+tur iГ§in Hasat Takip kayДұtlarДұnДұ getir (tarihe gГ¶re sДұralДұ) */
function hasatTartiGetir(oda, tur){
  var out=[];
  var store=window._hasatTarti||{};
  Object.keys(store).forEach(function(k){
    var d=store[k];
    if(d && d.oda===oda && String(d.tur)===String(tur)) out.push(d);
  });
  out.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  return out;
}
/* KullanДұcДұ raporu: "Hasat Takip senkronu geldi ama Raporlar > Hasat/Firma/
   Analiz hiГ§ deДҹiЕҹmedi." KГ¶k neden: hasatTartiGetir() SADECE Oda DetayДұ'ndaki
   kГјГ§Гјk "Hasat Takip" kartДұnДұ besliyordu вҖ” Verim/Firma/Analiz/Excel'in
   GERГҮEKTEN okuduДҹu tek kaynak c.hasat dizisi (elle "+ Hasat ekle" ile
   doldurulan) hiГ§ gГјncellenmiyordu, senkronla baДҹlantДұsДұ yoktu.
   Bu fonksiyon, senkronlanan her tartДұ kaydДұnДұ (ana90+duble+dokme+ikinci вҶ’
   "normal", kestane вҶ’ "kestane") c.hasat'a birebir aynДұ formatta yazar вҖ”
   bГ¶ylece TГңM mevcut rapor/verim/analiz fonksiyonlarДұ (hiГ§biri deДҹiЕҹtirilmeden)
   senkronu otomatik gГ¶rГјr. SatДұrlar source:"hasat_tarti_sync" + sourceKey
   (oda+tarih) ile iЕҹaretlenir: aynДұ gГјn yeniden senkronlanДұnca ESKД° satДұrДұn
   YERД°NE geГ§er (Г§ift sayДұm olmaz), 0'a dГјЕҹen bir kategori satДұrДұ silinir.
   Elle girilmiЕҹ ("+ Hasat ekle") kayДұtlara ASLA dokunulmaz, ayrДұ kalДұr. */
function hasatTartiSenkronEt(c){
  if(!c || !c.oda || c.tur==null || c.tur==="") return false;
  var kayitlar = hasatTartiGetir(c.oda, c.tur);
  if(!kayitlar.length) return false;
  if(!c.hasat) c.hasat=[];
  var degisti=false;
  kayitlar.forEach(function(k){
    var srcKey = k.oda+"__"+k.tarih;
    var normalKasa = (numParse(k.ana90)||0)+(numParse(k.duble)||0)+(numParse(k.dokme)||0)+(numParse(k.ikinci)||0);
    var kestaneKasa = numParse(k.kestane)||0;
    [["normal",normalKasa],["kestane",kestaneKasa]].forEach(function(pair){
      var tip=pair[0], kasa=pair[1];
      var idx=-1;
      for(var i=0;i<c.hasat.length;i++){ if(c.hasat[i].sourceKey===srcKey && c.hasat[i].tip===tip){ idx=i; break; } }
      if(kasa<=0){
        if(idx>=0){ c.hasat.splice(idx,1); degisti=true; }
        return;
      }
      var kasaStr=""+kasa;
      if(idx>=0){
        if(c.hasat[idx].kasa!==kasaStr){ c.hasat[idx].kasa=kasaStr; degisti=true; }
      } else {
        c.hasat.push({tarih:k.tarih, tip:tip, kasa:kasaStr, personel:"Hasat Takip (senkron)", source:"hasat_tarti_sync", sourceKey:srcKey});
        degisti=true;
      }
    });
  });
  return degisti;
}
/* KullanДұcДұ isteДҹi: "sadece 16. tur ve 17. turun hasat deДҹerlerini al ama

   (cycle) olarak yok (uygulama 18. turdan itibaren kullanДұlmaya baЕҹlanmДұЕҹ),
   bu yГјzden senkronlanan veri hiГ§bir yere yazДұlamДұyordu. Bu fonksiyon,
   SADECE bu iki tur iГ§in, karЕҹДұlДұДҹДұ olmayan her oda+tur kombinasyonuna
   otomatik ve DOДһRUDAN ARЕһД°VLENMД°Еһ (bosaltimTarihi dolu) minimal bir kayДұt
   aГ§ar вҖ” elle "Oda OluЕҹtur" akДұЕҹДұna hiГ§ girilmez, bosaltimTarihi baЕҹtan
   dolu olduДҹu iГ§in GГјnlГјk Tur/BugГјn/protokol ekranlarДұnda da hiГ§ gГ¶rГјnmez,
   sadece geГ§miЕҹe dГ¶nГјk Hasat/Analiz raporlarДұnda sayДұlДұr. 18. tur ve
   sonrasДұ kasДұtlДұ olarak KAPSAM DIЕһI вҖ” odalar orada zaten elle aГ§ДұlДұyor,
   unutulan bir oda varsa sessizce "hayali oda" oluЕҹturmasДұn diye liste
   sabit tutuluyor. */
var HASAT_GECMIS_OTO_TUR = [16,17];
function hasatTartiEksikOdalariOlustur(){
  var d=loadData();
  var mevcutSet={};
  (d.cycles||[]).forEach(function(c){ mevcutSet[normalizeOda(c.oda)+"__"+String(c.tur)]=true; });
  var gruplar={};
  Object.keys(window._hasatTarti||{}).forEach(function(key){
    var k=window._hasatTarti[key];
    if(!k || !k.oda || k.tur==null || k.tur==="") return;
    var turNo=Number(k.tur);
    if(HASAT_GECMIS_OTO_TUR.indexOf(turNo)<0) return;
    var gk=normalizeOda(k.oda)+"__"+String(turNo);
    if(mevcutSet[gk]) return;
    if(!gruplar[gk]) gruplar[gk]={oda:k.oda, tur:turNo, tarihler:[], gelis:""};
    gruplar[gk].tarihler.push(k.tarih);
    if(k.gelis_tarihi) gruplar[gk].gelis=k.gelis_tarihi;
  });
  var eklendi=false;
  Object.keys(gruplar).forEach(function(gk){
    var g=gruplar[gk];
    if(!g.tarihler.length) return;
    var sirali=g.tarihler.slice().sort();
    var c={id:uid(), oda:g.oda, tur:g.tur, gelisTarihi:(g.gelis||sirali[0]), gunluk:[], hava:[], hasat:[],
      bosaltimTarihi:sirali[sirali.length-1], source:"hasat_tarti_sync"};
    d.cycles.push(c);
    mevcutSet[gk]=true;
    eklendi=true;
  });
  if(eklendi) saveData();
  return eklendi;
}
/* TГјm dГ¶ngГјler iГ§in hasatTartiSenkronEt Г§alДұЕҹtДұrДұr вҖ” hasat_tarti koleksiyonu
   her gГјncellendiДҹinde (onSnapshot) Г§aДҹrДұlДұr. Sadece gerГ§ekten deДҹiЕҹiklik
   olduysa saveData() tetikler (gereksiz yazma/senkron trafiДҹi olmasДұn). */
function hasatTartiTumDonguleriSenkronEt(){
  var otoEklendi = hasatTartiEksikOdalariOlustur();
  var d=loadData(); var degisti=otoEklendi;
  (d.cycles||[]).forEach(function(c){ if(hasatTartiSenkronEt(c)) degisti=true; });
  if(degisti){ d.cycles.forEach(function(c){ if(c.hasat) c.hasat.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); }); }); saveData(); }
  return degisti;
}

var STORE_KEY = "uretim_takip_v1";

var memData = null;
var _veriOkumaHatasi=false;
function loadData(){
  if(memData) return memData;

  try{ raw = localStorage.getItem(STORE_KEY); }
  catch(e){ console.error("localStorage okunamadДұ", e); }
  if(raw){
    try{
      memData = JSON.parse(raw);
      /* GГңVENLД°K AДһI: raw, eski (PIN kilidi kaldДұrДұlmadan Г¶nceki) Еҹifreli zarf
         ({enc:1,salt,iv,ct}) olabilir вҖ” bu senkron yol onu ГҮГ–ZEMEZ. ZarfДұ
         gerГ§ek veriymiЕҹ gibi kabul edip memData.cycles'Дұ sessizce
         boЕҹaltmak yerine (geГ§miЕҹte "odalar silindi" gГ¶rГјnГјmГјne yol aГ§an bir
         veri kaybДұ bugДұ yaratmДұЕҹtДұ) burada NET biГ§imde reddedip appBoot'un
         doДҹru (asenkron, gГ¶Г§ mantДұklДұ) yoldan doldurmasДұnДұ bekleriz. */
      if(memData && memData.enc===1){
        console.error("loadData(): eski Еҹifreli zarf senkron yoldan okunmaya Г§alДұЕҹДұldДұ вҖ” Г§Г¶zГјlmeden kullanДұlmayacak");
        memData = null;

    }catch(e){
      console.error("KayДұtlДұ veri bozuk вҖ” JSON.parse hatasДұ", e);
      /* Bozuk ham veriyi ASLA kaybetme: ayrДұ bir anahtara yedekle ki elle kurtarДұlabilsin.
         Aksi halde ilk saveData() bozuk veriyi ezerdi ve geri dГ¶nГјЕҹГј olmazdДұ. */
      try{ localStorage.setItem(STORE_KEY+"_bozuk_"+Date.now(), raw); }catch(e2){ console.error("bozuk veri yedeklenemedi", e2); }
      _veriOkumaHatasi=true;

/* loadData()'nДұn alan-varsayДұlanДұ + tek seferlik gГ¶Г§ mantДұДҹДұ вҖ” appBoot/

   GEГҮMEDEN doДҹrudan atadДұДҹДұ iГ§in (IndexedDB okumasДұ asenkron olduДҹu iГ§in
   zorunlu), bu adДұmДұ KENDД°LERД° de Г§aДҹДұrmalДұ вҖ” aksi halde Г¶rn. yeni bir
   kurulumda memData={cycles:[]} kalДұr, memData.gorevler hiГ§ oluЕҹmaz ve ilk
   "GГ¶rev ekle" TypeError ile Г§Г¶ker (KRД°TД°K BUG, dГјzeltildi). */
function memDataNormalizeVeGoc(){

/* DГңZELTME (her aГ§ДұlДұЕҹta Г§alДұЕҹДұr, idempotent): gunlukKaydet()'teki eski bir
   kДұyaslama hatasДұ yГјzГјnden (su slider'Дұ boЕҹ alanda "0" dГ¶ndГјrГјr ama Д°ptal
   Et sonrasДұ saklanan temiz deДҹer "" idi вҖ” sayДұsal olarak aynДұ ama metin
   olarak farklДұ), bir odada normal Tur kaydДұ (Г¶rn. sadece sДұcaklДұk giriЕҹi)
   yapДұlДұnca sulama "iptal edildi"/"deДҹiЕҹtirildi" etiketi SESSД°ZCE siliniyor,
   gГ¶rev tekrar "bekliyor" gibi gГ¶rГјnГјyor, kullanДұcДұ tekrar Д°ptal Et'e basmak
   zorunda kalДұyordu вҖ” her basДұЕҹta yeni zaman damgalДұ bir not birikip aynДұ
   gГјnГјn kaydДұnda "Sulama iptal edildi ... В· Sulama iptal edildi ..." diye
   3-4 kez tekrarlanДұyordu (kullanДұcДұ raporu). KГ¶k neden ayrДұca dГјzeltildi
   (bkz. gunlukKaydet/topluKaydet), bu fonksiyon sadece DAHA Г–NCE birikmiЕҹ
   tekrarlarДұ temizler вҖ” aynДұ "Sulama iptal edildi (neden: ...)" veya
   "Sulama deДҹiЕҹtirildi: ..." metninin zaman damgasДұ hariГ§ aynДұ olan
   kopyalarДұnДұ, en sonuncusu hariГ§ siler. */
function sulamaIptalDegistirNotlariniTekille(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  var cДұplakTarih=/^\d{2}\.\d{2}\.\d{4}\s+\d{2}:\d{2}$/;
  d.cycles.forEach(function(c){
    if(!Array.isArray(c.gunluk)) return;
    c.gunluk.forEach(function(g){
      if(!g.islemNot) return;
      var parcalar=(""+g.islemNot).split(" В· ").map(function(x){return x.trim();}).filter(Boolean);
      var oncekiUzunluk=parcalar.length;
      var sulamaVarMi = parcalar.some(function(p){ return /^Sulama (?:iptal edildi|deДҹiЕҹtirildi)/.test(p); });
      /* v368'den Г–NCE kimNeZamanEtiketi() ayraГ§ olarak (yanlДұЕҹlДұkla) aynДұ
         " В· " karakterini kullanДұyordu вҖ” her tekrar tДұklamada "Sulama iptal
         edildi... вҖ” Rol (cihaz)" ile ardДұndan gelen Г§Дұplak "GG.AA.YYYY SS:DD"
         BД°RBД°RД°NDEN KOPUP tek baЕҹДұna kalan parГ§alara dГ¶nГјЕҹГјyordu, bunlar da
         dedup'tan kaГ§Дұp sonsuza kadar birikiyordu. Bu gГјnde en az bir sulama
         notu varsa, sahipsiz Г§Дұplak tarih parГ§alarДұ atДұlДұr (hangi tДұklamaya
         ait olduklarДұ gГјvenilir Еҹekilde bilinemiyor, korunacak bir deДҹerleri
         yok вҖ” asДұl bilgi zaten kalan son notta ve satДұrДұn kendi tarihinde var). */
      var temiz = sulamaVarMi ? parcalar.filter(function(p){ return !cДұplakTarih.test(p); }) : parcalar;
      /* AynДұ Г¶n eke (zaman damgasДұ hariГ§) sahip notlardan sadece SONUNCUSU kalДұr. */
      var byOnEk={}, sira=[];
      temiz.forEach(function(p){
        var m=/^(Sulama (?:iptal edildi|deДҹiЕҹtirildi)[^вҖ”]*)вҖ”/.exec(p);
        var onEk = m ? m[1].trim() : p; /* eЕҹleЕҹmeyenler kendi baЕҹДұna benzersiz kalДұr, dokunulmaz */
        if(!(onEk in byOnEk)) sira.push(onEk);
        byOnEk[onEk]=p; /* aynДұ Г¶n ek tekrar gelirse en SON gГ¶rГјleni tutulur */
      });
      var yeniParcalar = sira.map(function(k){return byOnEk[k];});
      if(yeniParcalar.length!==oncekiUzunluk){
        g.islemNot = yeniParcalar.join(" В· ");
        degisti=true;
      }
    });
  });
  return degisti;
}

function flasAkisiVarsayilanEkle(d){

/* DГңZELTME (her aГ§ДұlДұЕҹta Г§alДұЕҹДұr, tek seferlik bayrak GEREKMEZ вҖ” idempotent):

   ediyordu (bkz. ekran gГ¶rГјntГјsГј raporu). AynДұ tarih+baЕҹlДұk(+is)+done durumundaki
   satДұrlarДұ TEK satДұrda birleЕҹtirir (atamalarДұ birleЕҹtirerek), fazlalДұklarДұ siler.
   Д°dempotent вҖ” mГјkerrer kalmayДұnca hiГ§bir Еҹeyi deДҹiЕҹtirmez, her yГјklemede gГјvenle
   Г§alДұЕҹДұr. */
function gorevlerMukerrerleriBirlestir(d){
  if(!d) return false;
  var degisti=false;
  if(Array.isArray(d.gorevler) && d.gorevler.length>1){
    var gruplar={}, sira=[];
    d.gorevler.forEach(function(g){
      var k=(g.tarih||"")+"||"+(g.baslik||"")+"||"+(g.done?"1":"0");
      if(!gruplar[k]){ gruplar[k]=[]; sira.push(k); }
      gruplar[k].push(g);
    });
    var yeni=[];
    sira.forEach(function(k){
      var grup=gruplar[k];
      if(grup.length===1){ yeni.push(grup[0]); return; }
      degisti=true;
      var ana=grup[0];
      var arr=atamaParse(ana.atama||"");
      for(var i=1;i<grup.length;i++){
        atamaParse(grup[i].atama||"").forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
        /* KRД°TД°K: genel gГ¶revler tek tek ayrДұ Firestore dokГјmanДұ olarak da
           senkronize ediliyor (gorevColl). Burada sadece memData.gorevler'den
           silmek YETMEZ вҖ” buluttaki fazlalДұk dokГјman duruyor olsa, bir sonraki
           onSnapshot'ta (Г¶zellikle her aГ§ДұlДұЕҹДұn Д°LK anlДұk gГ¶rГјntГјsГјnde, "added"
           olarak) sessizce GERД° GELД°YORDU вҖ” kullanДұcДұ dГјzeltmenin hiГ§ iЕҹe
           yaramadДұДҹДұnДұ gГ¶rГјyordu ("bu dГјzelmemiЕҹ"). Silinecek fazlalДұk ID'leri
           kuyruДҹa al, buluta baДҹlantДұ olur olmaz gorevMukerrerBulutTemizle()
           gerГ§ek silmeyi yapsДұn. */
        if(grup[i].id){ if(!d._gorevMukerrerSil) d._gorevMukerrerSil=[]; if(d._gorevMukerrerSil.indexOf(grup[i].id)<0) d._gorevMukerrerSil.push(grup[i].id); }
      }
      ana.atama=arr.join(",");
      yeni.push(ana);
    });
    if(degisti) d.gorevler=yeni;
  }
  (d.cycles||[]).forEach(function(c){
    if(!Array.isArray(c.odaGorevleri) || c.odaGorevleri.length<2) return;
    var gruplar={}, sira=[];
    c.odaGorevleri.forEach(function(g){
      var k=(g.tarih||"")+"||"+(g.is||"")+"||"+(g.done?"1":"0");
      if(!gruplar[k]){ gruplar[k]=[]; sira.push(k); }
      gruplar[k].push(g);
    });
    var yeni=[]; var buDegisti=false;
    sira.forEach(function(k){
      var grup=gruplar[k];
      if(grup.length===1){ yeni.push(grup[0]); return; }
      buDegisti=true;
      var ana=grup[0];
      var arr=atamaParse(ana.atama||"");
      for(var i=1;i<grup.length;i++){
        atamaParse(grup[i].atama||"").forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      }
      ana.atama=arr.join(",");
      yeni.push(ana);
    });
    if(buDegisti){ c.odaGorevleri=yeni; degisti=true; }
  });
  return degisti;
}
/* TEK SEFERLД°K GEГҮД°Еһ: Zaten aktif olan (kompost iГ§inde, gГјnlГјk Г¶lГ§Гјm giriliyor)
   odalarda kompostIndirme hiГ§ set edilmemiЕҹ olabilir (bu dГјzeltmeden Г¶nce oluЕҹturulmuЕҹ
   odalar). "Oda var = kompost zaten konmuЕҹ = indirilmiЕҹ" mantДұДҹДұyla geriye dГ¶nГјk
   dolduruyoruz вҖ” bГ¶ylece "YarДұn planlanan"da anlamsДұz bir "kompost indirme" gГ¶revi
   kДұrmДұzДұ gГ¶rГјnmeye devam etmez. Д°dempotent, zaten dolu olanlara dokunmaz. */
function kompostIndirmeGeriyeDonukDoldur(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi) return; /* boЕҹaltДұlmДұЕҹ eski odalarДұ geriye dГ¶nГјk deДҹiЕҹtirmeye gerek yok */
    /* Д°leri tarihli (henГјz gelmemiЕҹ) kompostu geriye dГ¶nГјk "indirildi" SAYMAYIZ
       вҖ” yoksa bu migration her aГ§ДұlДұЕҹta, planToOda'nДұn kasДұtlДұ olarak boЕҹ
       bДұraktДұДҹДұ ileri tarihli kompost indirmeyi tekrar doldurup "yarДұn kompost
       gelecek"i YarДұn yapДұlacaklar'dan gizlerdi (kullanДұcДұ raporu: "A-7 yarДұn
       kompost gelecek ama yarДұnki iЕҹlemlerde gГ¶rГјnmГјyor"). */
    if((!c.kompostIndirme || !c.kompostIndirme.tarih) && c.gelisTarihi && c.gelisTarihi<=todayISO()){
      c.kompostIndirme={tarih:c.gelisTarihi};
      degisti=true;
    }
  });
  return degisti;
}
/* TEK SEFERLД°K GEГҮД°Еһ (v187 Г¶ncesi kayДұtlar iГ§in): eskiden protokol notlarДұ
   ("X yapДұldДұ", "X ertelendi" vb.) sulama alanДұna karДұЕҹДұk yazДұlДұyordu. BunlarДұ
   islemNot'a ayДұrДұr. Desen eЕҹleЕҹmeyen (gerГ§ek sulama/ilaГ§ metni) sulama'da kalДұr.
   "YarДұn iГ§in deДҹiЕҹiklik: ..." notlarДұ TAЕһINMAZ, tamamen SД°LД°NД°R вҖ” o bilgi zaten
   c.yarinDegisiklik iГ§inde ayrДұca saklДұ ve YarДұn sГјtununda mavi gГ¶steriliyor;
   BugГјn Д°Еҹlem kutusunda tekrar gГ¶stermek sadece kalabalДұk yapДұyordu.
   Д°dempotent вҖ” zaten temiz kayДұtlarda hiГ§bir Еҹeyi deДҹiЕҹtirmez, her seferinde
   Г§alДұЕҹtДұrmak gГјvenlidir. */
function gunlukEskiNotlariAyir(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  var silDeseni=/^(deДҹiЕҹiklik|yarДұn iГ§in deДҹiЕҹiklik)\s*:/i;
  var tasiDeseni=/(yapДұldДұ|ertelendi|planlandДұ|Г§ekildi|hatДұrlatДұlacak)\s*(\([^)]*\))?\s*$/i;
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){
      if(g.sulama){
        var parcalar=(""+g.sulama).split(" В· ").map(function(x){return x.trim();}).filter(Boolean);
        var kalanSulama=[], tasinacak=[];
        parcalar.forEach(function(p){
          if(silDeseni.test(p)){ degisti=true; return; } /* tamamen at */
          (tasiDeseni.test(p)?tasinacak:kalanSulama).push(p);
        });
        var yeniSulama=kalanSulama.join(" В· ");
        if(yeniSulama!==g.sulama){ g.sulama=yeniSulama; degisti=true; }
        tasinacak.forEach(function(t){
          var mevcut=(""+(g.islemNot||"")).split(" В· ").map(function(x){return x.trim();});
          if(mevcut.indexOf(t)>=0) return;
          g.islemNot = g.islemNot ? (g.islemNot+" В· "+t) : t;
          degisti=true;
        });
      }
      /* islemNot'ta zaten "deДҹiЕҹiklik:" notu varsa (v187-v189 arasДұ kДұsa sГјre
         bГ¶yle yazДұlmДұЕҹtДұ) onu da temizle */
      if(g.islemNot){
        var inP=(""+g.islemNot).split(" В· ").map(function(x){return x.trim();}).filter(Boolean);
        var inK=inP.filter(function(p){ return !silDeseni.test(p); });
        if(inK.length!==inP.length){ g.islemNot=inK.join(" В· "); degisti=true; }
      }
    });
  });
  return degisti;
}
/* KRД°TД°K GГ–ГҮ: Eskiden Sabah/AkЕҹam ayrДұ kayДұt tutuluyordu вҖ” aynДұ gГјn iГ§in iki satДұr
   oluЕҹabiliyordu (biri dolu, biri boЕҹ), bu da PDF/rapor'da anlamsДұz tekrar gibi
   gГ¶rГјnГјyordu. ArtДұk gГјnde TEK kayДұt var. Bu fonksiyon var olan mГјkerrer kayДұtlarДұ
   BД°R KEZ birleЕҹtirir (boЕҹ olmayan alanlarДұ korur, metinleri birleЕҹtirir), sonra
   bir daha Г§alДұЕҹmaz (bayrakla iЕҹaretlenir). */
function gunlukKayitlariniBirlestir(){
  if(!memData || memData._gunlukBirlestirildi) return;
  var degisti=false;
  (memData.cycles||[]).forEach(function(c){
    if(!Array.isArray(c.gunluk) || c.gunluk.length<2) return;
    var byTarih={}; var yeni=[];
    c.gunluk.forEach(function(r){
      var t=r&&r.tarih; if(!t) return;
      if(!byTarih[t]){ byTarih[t]=r; yeni.push(r); }
      else{
        degisti=true;
        var mevcut=byTarih[t];
        ["odaC","kompostC","kompostUst","klimaC","co2alt","co2ust","su"].forEach(function(k){
          if(!mevcut[k] && r[k]) mevcut[k]=r[k];
        });
        if(r.sulama && r.sulama!==mevcut.sulama){
          mevcut.sulama = mevcut.sulama ? (mevcut.sulama+" В· "+r.sulama) : r.sulama;
        }
        if(r.vakit) mevcut.vakit=r.vakit;
      }
    });
    if(degisti) c.gunluk=yeni;
  });
  memData._gunlukBirlestirildi=true;
  if(degisti) saveData();
}

/* ================= IndexedDB (ana veri deposu) =================
   localStorage'Дұn ~5-10MB sДұnДұrДұ bГјyГјdГјkГ§e (yДұllar boyu biriken gГјnlГјk
   kayДұtlar) yetersiz kalabilir. Ana veri bloДҹu (STORE_KEY) IndexedDB'de
   tutuluyor вҖ” Г§ok daha bГјyГјk kota. IndexedDB kullanДұlamazsa (eski tarayДұcДұ,
   kДұsДұtlДұ baДҹlam) localStorage'a sessizce dГјЕҹГјlГјr. */
var IDB_NAME = "utp_db", IDB_STORE = "kv", IDB_VERSION = 1;
var _idbPromise = null;
function idbAc(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise(function(resolve, reject){
    if(!window.indexedDB){ reject(new Error("indexedDB yok")); return; }
    var req;
    try{ req = indexedDB.open(IDB_NAME, IDB_VERSION); }catch(e){ reject(e); return; }
    req.onupgradeneeded = function(){ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
  return _idbPromise;
}
function idbGet(key){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var req;
      try{ req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(key); }catch(e){ reject(e); return; }
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  });
}
function idbSet(key, val){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var tx;
      try{ tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).put(val, key); }catch(e){ reject(e); return; }
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
      tx.onabort = function(){ reject(tx.error||new Error("iЕҹlem iptal edildi")); };
    });
  });
}
/* STORE_KEY'i okur; IndexedDB'de yoksa localStorage'a bakar (eski vвүӨ310
   kurulumlarДұ ya da IndexedDB'nin henГјz tarafДұna hiГ§ yazДұlmamДұЕҹ olmasДұ) ve
   bulursa TEK SEFERLД°K IndexedDB'ye taЕҹДұr (baЕҹarДұlДұ taЕҹДұmadan SONRA
   localStorage'dan siler вҖ” asДұl kazanДұlan alan bu). */
async function storeKeyOku(){
  try{
    var v = await idbGet(STORE_KEY);
    if(v!=null) return v;
  }catch(e){ console.warn("IndexedDB okunamadДұ, localStorage'a bakДұlДұyor", e); }
  var raw=null;
  try{ raw=localStorage.getItem(STORE_KEY); }catch(e){ console.warn("localStorage okunamadДұ", e); }
  if(raw!=null){
    try{
      await idbSet(STORE_KEY, raw);
      try{ localStorage.removeItem(STORE_KEY); }catch(e){ console.warn("eski localStorage kaydДұ silinemedi (Г¶nemli deДҹil)", e); }
    }catch(e){ console.warn("IndexedDB'ye taЕҹДұnamadДұ, localStorage'da kalmaya devam ediyor", e); }
  }
  return raw;
}
function storeKeyYaz(str){
  return idbSet(STORE_KEY, str).catch(function(e){
    console.warn("IndexedDB'ye yazДұlamadДұ, localStorage'a dГјЕҹГјlГјyor", e);
    localStorage.setItem(STORE_KEY, str); /* kota hatasДұ burada fДұrlarsa Г§aДҹДұran yakalar */
  });
}
/* Гңst Гјste gelen saveData() Г§aДҹrДұlarДұ birbirini yarДұЕҹta ezmesin diye
   yazmalar bir zincirde (kuyrukta) sДұrayla iЕҹlenir. */
var _pinSaveChain = Promise.resolve();
function persistData(jsonStr){
  _pinSaveChain = _pinSaveChain.then(function(){
    return storeKeyYaz(jsonStr);
  }).then(function(){
    _quotaWarnShown=false; /* bir sonraki dolma anДұnda tekrar uyarabilelim */
  }).catch(function(e){
    console.error("kayДұt yazДұlamadДұ", e);
    /* KRД°TД°K: Depolama dolduДҹunda sessizce geГ§mek veri kaybДұna yol aГ§ar вҖ”
       kullanДұcДұ "kaydettim" sanДұr ama deДҹiЕҹiklik sadece bellekte (memData)
       kalДұr, sayfa kapanДұnca kaybolur. Kota dolma hatasДұ Г¶zel olarak
       yakalanДұp AГҮIKГҮA bildirilir вҖ” sadece console'a deДҹil. */
    var isQuota = (e && (e.name==="QuotaExceededError" || e.code===22 || e.code===1014 || /quota/i.test(e.message||"")));
    if(isQuota && !_quotaWarnShown){
      _quotaWarnShown=true;
      showWarnBox("вҡ пёҸ Depolama Doldu", [
        "CihazДұn hafДұzasДұ doldu вҖ” <b>son deДҹiЕҹiklik cihaza kaydedilemedi.</b>",
        FB.ready ? "Bulut senkronu aГ§Дұk вҖ” az Г¶nceki deДҹiЕҹiklik oradan kurtarДұlabilir, ama emin olmak iГ§in hemen bir yedek al." : "вҡ пёҸ Bulut senkronu KAPALI вҖ” bu deДҹiЕҹiklik kaybolmuЕҹ olabilir!",
        "ГҮГ¶zГјm: Ayarlar вҶ’ Yedekleme'den JSON indir, sonra eski fotoДҹraflarДұ (Г¶zellikle sesli/fotoДҹraflДұ kayДұtlarДұ) sil.",
        "Silme sonrasДұ tekrar dene вҖ” bu uyarДұ kaybolursa kayДұt baЕҹarДұlДұ demektir."
      ]);
    }
  });
}

/* Ertele/erken Г§ekme gibi iЕҹlemler her zaman bir kullanДұcДұnДұn onayladДұДҹДұ (confirm())

function normalizeOda(s){
  if(!s) return "";
  var x = s.toString().trim().toUpperCase().replace(/Д°/g,"I").replace(/Еһ/g,"S").replace(/ГҮ/g,"C").replace(/Дһ/g,"G").replace(/Гң/g,"U").replace(/Г–/g,"O");
  var m = x.match(/([A-Z]+)\s*[-\/ .]?\s*(\d+)/);
  if(m) return m[1] + "-" + parseInt(m[2],10);
  return x.replace(/\s+/g,"");
}

/* Ekip sistemi: artДұk sadece iГ§/dДұЕҹ deДҹil, istenildiДҹi kadar Г¶zel ekip (Hasat, Sevkiyat, vb.) tanДұmlanabilir.

var EKIP_RENK=["#1a56b8","#8a5a1f","#1f6b38","#7a1fa2","#b8341a","#0f7d7d","#a3841a","#5a3d99","#c0392b","#16697a"];

  var d=loadData(); if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.ekipler) || !d.settings.ekipler.length){
    d.settings.ekipler=[{id:"ic",ad:"Д°Г§ Ekip"},{id:"dis",ad:"DДұЕҹ Ekip"}];

  return d.settings.ekipler;
}
function ekipAdi(id){ var e=getEkipler().find(function(x){return x.id===id;}); return e?e.ad:(id||"вҖ”"); }
function ekipRenk(id){ var L=getEkipler(); var i=L.map(function(e){return e.id;}).indexOf(id); return EKIP_RENK[(i>=0?i:0)%EKIP_RENK.length]; }

/* Atama deДҹeri kodlamasДұ: "" (atanmadДұ) | "grup:<ekipId>" | "kisi:<personelId>" */
/* ГҮoklu atama: deДҹer virgГјlle ayrДұlmДұЕҹ (Г¶r. "grup:ic" veya "kisi:a,kisi:b") */
function atamaParse(val){ return (val||"").split(",").map(function(s){return s.trim();}).filter(Boolean); }
/* ГҮoklu kiЕҹi seГ§im arayГјzГј вҖ” onclickExpr: butona val gГ¶mГјlГј tam onclick ifadesi Гјreten fonksiyon */
function atamaCokluHTML(mevcut, onclickExpr){
  var secili=atamaParse(mevcut);
  var ekipler=getEkipler();
  function rozet(val,label,renk){
    var on=secili.indexOf(val)>=0;
    return '<button type="button" onclick="'+onclickExpr(val)+'" '
      +'style="display:inline-block; margin:3px; padding:4px 10px; border-radius:14px; border:1.5px solid '+renk+'; font-size:13px; cursor:pointer; '
      +(on?('background:'+renk+'; color:#fff;'):('background:#fff; color:'+renk+';'))+'">'+esc(label)+'</button>';
  }
  var h='<div style="margin-top:4px;">';
  h+='<div style="font-size:12px; color:#888; margin:2px;">Grup:</div>';
  ekipler.forEach(function(ek){ h+=rozet("grup:"+ek.id, "рҹ‘Ҙ "+ek.ad, ekipRenk(ek.id)); });
  ekipler.forEach(function(ek){
    var uyeler=getPersonelList().filter(function(p){return p.grup===ek.id;});
    if(uyeler.length){
      h+='<div style="font-size:12px; color:#888; margin:4px 2px 2px;">'+esc(ek.ad)+':</div>';
      uyeler.forEach(function(p){ h+=rozet("kisi:"+p.id, p.ad, ekipRenk(ek.id)); });
    }
  });
  h+='</div>';
  return h;
}
function atamaLabel(val){
  if(!val) return "";
  var parts=atamaParse(val);
  if(!parts.length) return "";
  return parts.map(function(v){
    if(v.indexOf("grup:")===0) return "рҹ‘Ҙ "+ekipAdi(v.slice(5));
    if(v.indexOf("kisi:")===0){ var p=personelBul(v.slice(5)); return p?("рҹ‘Ө "+esc(p.ad)):"рҹ‘Ө (silinmiЕҹ)"; }
    return "";
  }).filter(Boolean).join(" В· ");
}
/* Atanan grup/kiЕҹi kodlarДұnДұ gerГ§ek isim listesine Г§evirir (WhatsApp mesajДұ iГ§in) */
function atamaIsimListesi(val){
  var parts=atamaParse(val); var isimler=[];
  parts.forEach(function(p){
    if(p.indexOf("grup:")===0){
      var gid=p.slice(5);
      getPersonelList().filter(function(x){return x.grup===gid;}).forEach(function(x){ if(isimler.indexOf(x.ad)<0) isimler.push(x.ad); });
    }
    else if(p.indexOf("kisi:")===0){ var per=personelBul(p.slice(5)); if(per && isimler.indexOf(per.ad)<0) isimler.push(per.ad); }
  });
  return isimler;
}
/* GГ¶rev metnini kДұsaltДұr: parantez/tire sonrasДұ uzun aГ§ДұklamalarДұ atar (WhatsApp mesajДұ kДұsa olsun) */
function kisaGorevAdi(txt){
  if(!txt) return "";
  var t=(""+txt).split(" (")[0].split(" вҖ” ")[0].split(" В· ")[0];
  return t.trim();
}
/* Oda + gГ¶rev + atanan personel isimlerini WhatsApp'a gГ¶ndermek Гјzere hazДұrlar */
/* --- Toplu gГ¶rev seГ§imi: birden fazla gГ¶revi iЕҹaretleyip TEK WhatsApp mesajДұnda gГ¶nder ---
   Anahtar: protokol gГ¶revi iГ§in "cid|idx", kompost indirme gГ¶revi iГ§in "plan|planId". */
var _gorevSecili={};
function gorevSecAnahtar(i){
  if(i.plan) return "plan|"+i.planId;
  if(i.odaGorev) return "og|"+i.ogId;
  if(i.gg) return "gg|"+i.ggId;
  return i.cid+"|"+i.idx;
}
function gorevSecili(i){ return !!_gorevSecili[gorevSecAnahtar(i)]; }
function gorevSecToggle(anahtar){
  if(_gorevSecili[anahtar]) delete _gorevSecili[anahtar]; else _gorevSecili[anahtar]=true;
  render();
}
function gorevSecSayisi(){ return Object.keys(_gorevSecili).length; }
function gorevSecTemizle(){ _gorevSecili={}; render(); }
function gorevSecBarHTML(){
  var n=gorevSecSayisi();
  if(!n) return "";
  return '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; background:#eafbef; border:1.5px solid var(--green); border-radius:8px; padding:8px 10px; margin-bottom:10px; flex-wrap:wrap;">'
    +'<span style="font-weight:700; font-size:14px;">рҹ“Ӣ '+n+' gГ¶rev seГ§ili</span>'
    +'<span style="display:flex; gap:6px;"><button class="btn small" onclick="gorevTopluGonder()">WhatsApp\'a GГ¶nder</button> <button class="btn ghost small" onclick="gorevSecTemizle()">Temizle</button></span>'
    +'</div>';
}
/* SeГ§ili gГ¶revlerin tamamДұnДұ, oda + iЕҹ + atanan kiЕҹilerle tek mesajda birleЕҹtirir.
   Protokol gГ¶revleri + oda iЕҹlemleri (odaGorev) + genel/serbest gГ¶revler hepsi dahil. */
function gorevTopluMesajOlustur(){
  var items=nextTasks();
  var lines=[];
  items.forEach(function(i){
    if(!gorevSecili(i)) return;
    if(i.odaGorev){
      lines.push("рҹ“… "+fmtDate(i.date)+" В· рҹҸ  "+(i.oda||"")+": "+kisaGorevAdi(i.txt||""));
      return;
    }
    var isimler=atamaIsimListesi(i.atama||"");
    var satir="рҹ“… "+fmtDate(i.date)+" В· рҹҸ  "+(i.oda||"")+": "+kisaGorevAdi(i.txt||"");
    if(isimler.length) satir+="\n   рҹ‘Ө "+isimler.join(", ");
    lines.push(satir);
  });
  getGorevler().filter(function(g){return !g.done && g.tarih;}).forEach(function(g){
    if(!_gorevSecili["gg|"+g.id]) return;
    var isimler=atamaIsimListesi(g.atama||"");
    /* "Oda B-1 В· Oda boЕҹaltma/yДұkama" kalДұbДұndaki genel gГ¶rev baЕҹlДұklarДұ вҖ”
       kisaGorevAdi() " В· "de Д°LK eЕҹleЕҹmede kestiДҹi iГ§in asДұl iЕҹ tГјrГјnГј
       sessizce atДұyordu (bkz. gorevPlanlaGonder'daki aynДұ dГјzeltme). */
    var _baslik=g.baslik||"", _gOda="", _gIs=_baslik;
    if(_baslik.indexOf(" В· ")>=0){ var _p=_baslik.split(" В· "); _gOda=_p[0]; _gIs=_p.slice(1).join(" В· "); }
    var satir="рҹ“… "+fmtDate(g.tarih)+" В· рҹ§№ "+(_gOda?("рҹҸ "+_gOda+": "):"")+kisaGorevAdi(_gIs);
    if(isimler.length) satir+="\n   рҹ‘Ө "+isimler.join(", ");
    lines.push(satir);
  });
  if(!lines.length) return null;
  return "рҹ“Ӣ GГ–REV PLANI\n\n"+lines.join("\n\n");
}
function gorevTopluGonder(){
  var msg=gorevTopluMesajOlustur();
  if(!msg){ toast("Г–nce en az bir gГ¶rev seГ§"); return; }
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }
  _gorevSecili={};
  toast("вң“ GГ¶nderildi вҖ” seГ§im temizlendi");
  render();
}
function gorevPlanlaGonder(oda, txt, atamaVal, tarihISO){
  var isimler=atamaIsimListesi(atamaVal);
  if(!isimler.length){ toast("Г–nce personel/ekip seГ§"); return; }
  /* Genel (oda'ya baДҹlДұ olmayan) gГ¶revlerin baЕҹlДұДҹДұ "konum В· iЕҹ" kalДұbДұnda
     kaydediliyor (bkz. gorevEkleForm: baslik=konum+" В· "+is) вҖ” bu tip
     gГ¶revlerde oda parametresi hep boЕҹ geliyordu. kisaGorevAdi() " В· "de
     Д°LK eЕҹleЕҹmede kesiyordu, bu da konumu tutup asДұl Д°Еһ TГңRГңNГң sessizce
     atДұyordu (kullanДұcДұ raporu: "gГ¶rev yeri Г§ДұkДұyor ama iЕҹ tГјrГј Г§ДұkmДұyor").
     Konum boЕҹsa ve metin bu kalДұbДұ taЕҹДұyorsa, ikisini burada ayДұrДұyoruz. */
  var gosterOda=oda, gosterIs=txt;
  if(!gosterOda && txt && txt.indexOf(" В· ")>=0){
    var _parcalar=(""+txt).split(" В· ");
    gosterOda=_parcalar[0];
    gosterIs=_parcalar.slice(1).join(" В· ");
  }
  var mesaj="рҹ“Ӣ GГ–REV\n\n"
    +"рҹ“… "+fmtDate(tarihISO||todayISO())+"\n"
    +"рҹҸ  "+(gosterOda||"")+"\n"
    +"рҹ”§ "+kisaGorevAdi(gosterIs)+"\n"
    +"рҹ‘Ө "+isimler.join(", ");
  /* Not: chat.whatsapp.com grup davet linkleri metin Г¶n-doldurmayДұ desteklemiyor.
     wa.me/?text= WhatsApp'Дұ mesaj hazДұr aГ§ar, hangi sohbete gГ¶nderileceДҹini kullanДұcДұ seГ§er. */
  window.open("https://wa.me/?text="+encodeURIComponent(mesaj), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(mesaj).catch(function(e){ console.warn("clipboard", e); }); }
}

/* Parti no = geliЕҹ tarihi (ddmmyyyy) */
function partiFromDate(iso){
  if(!iso) return "";
  var p=iso.split("-"); if(p.length!==3) return "";
  return p[2]+p[1]+p[0];
}

var PROTOKOL_SURUM = 6; /* v6: Гңretim zinciri yeniden kuruldu вҖ” Kompost indirme (gelis+0, YENД°) вҶ’ PoЕҹet (indirmeden+6, artДұk geliЕҹ yerine indirmeye baДҹlДұ) вҶ’ Tiftik (gelis+7, baДҹДұmsДұz) вҶ’ Toprak (offToprak, baДҹДұmsДұz) вҶ’ TДұrmДұk (toprak+7) вҶ’ Hava (artДұk tДұrmДұk+3, eskiden toprak+10 sabitti) вҶ’ Hasat (artДұk hava+11, eskiden toprak+20 sabitti). PoЕҹet/tiftik gecikmesi sonrakini ETKД°LEMEZ; kompost indirme/toprak/tДұrmДұk/hava gecikmesi bir SONRAKД° adДұmДұ ETKД°LER (otomatik kayar). */
/* KRД°TД°K FIX: KullanДұcДұ protokolГјnГј v158'den (rol sistemi) Г–NCE Г¶zelleЕҹtirmiЕҹse,
   protokolOzellestirildi bayraДҹДұ zaten true olduДҹu iГ§in normal senkron mekanizmasДұ
   bir daha Г§alДұЕҹmaz вҖ” bu da "rol" alanДұnДұn hiГ§ eklenmemesine yol aГ§ar! SonuГ§: sistem
   hГўlГў eski, kДұrДұlgan metin eЕҹleЕҹmesine (regex) dГјЕҹer, "Tiftik yapДұldДұ" gibi durumlar
   GГ¶revler ile Bilgileri DГјzenle arasДұnda tutarsДұz gГ¶rГјnГјr.
   Bu fonksiyon SADECE eksik rol etiketlerini, mevcut metne bakarak BД°R KERELД°K tahmin
   edip doldurur вҖ” metni/gГјnГј/hiГ§bir Еҹeyi deДҹiЕҹtirmez, protokolOzellestirildi'den
   baДҹДұmsДұz olarak HER ZAMAN Г§alДұЕҹДұr (Г§ГјnkГј sadece eksiДҹi tamamlar, asla Гјzerine yazmaz). */
function protokolRolleriTamamla(P){
  if(!Array.isArray(P)) return;
  var atanmis={};
  P.forEach(function(s){ if(s && s.rol) atanmis[s.rol]=true; });
  ["poset","tiftik","toprak","tirmik","hasat","hava","kompostindirme"].forEach(function(rol){
    if(atanmis[rol]) return;
    var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return;
    var sahipGerekli=(rol==="tiftik"||rol==="toprak"||rol==="tirmik")?"ekip":null;
    var bulunanIdx=-1;
    /* 1. deneme: metin + sahip ikisi de uysun (en kesin eЕҹleЕҹme) */
    for(var i=0;i<P.length;i++){
      if(P[i] && !P[i].silindi && P[i].tip==="olay" && re.test(P[i].txt||"") && (!sahipGerekli||P[i].sahip===sahipGerekli)){ bulunanIdx=i; break; }
    }
    /* 2. deneme: bulunamadДұysa (kullanДұcДұ sahip'i deДҹiЕҹtirmiЕҹ/farklДұ bДұrakmДұЕҹ olabilir),
       sadece metne bak вҖ” hiГ§ rol atanmamaktansa daha toleranslДұ eЕҹleЕҹme daha gГјvenli */
    if(bulunanIdx<0){
      for(var j=0;j<P.length;j++){
        if(P[j] && !P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt||"")){ bulunanIdx=j; break; }
      }
    }
    if(bulunanIdx>=0){ P[bulunanIdx].rol=rol; return; }
    /* 3. SATIR HД°ГҮ YOK: kullanДұcДұnДұn donmuЕҹ (protokolOzellestirildi) protokolГј bu
       adДұmДұn eklenmesinden Г–NCE oluЕҹturulmuЕҹ olabilir (Г¶rn. "Kompost indirme"
       v6'da eklendi вҖ” daha eski kopyalarda hiГ§ satДұr yok). Bu durumda "sДұradaki
       iЕҹlem" hesaplamasДұ bu adДұmДұn referans tarihini bulamaz (null dГ¶ner), adДұm
       SESSД°ZCE atlanДұr ve sДұra bozulur (Г¶rn. PoЕҹet/Tiftik atlanДұp doДҹrudan
       Toprak "sДұradaki" gГ¶sterilir вҖ” KRД°TД°K BUG, dГјzeltildi). Eksik zorunlu
       adДұm varsayДұlandan (PROTOKOL dizisi) SONA eklenir вҖ” mevcut index'leri
       (c.ertele, c.done) bozmaz. */
    var varsayilan=null;
    for(var k=0;k<PROTOKOL.length;k++){ if(PROTOKOL[k].rol===rol){ varsayilan=PROTOKOL[k]; break; } }
    if(varsayilan){ P.push(protokolSatirKopyala(varsayilan)); }
  });
}
function getProtokol(){
  var d=loadData();
  if(d.settings && Array.isArray(d.settings.protokol) && d.settings.protokol.length){
    /* KRД°TД°K: kullanДұcДұ bir kez elle dГјzenleme yaptДұysa (protokolOzellestirildi),
       kod gГјncellemesi (PROTOKOL_SURUM artДұЕҹДұ) bir daha ASLA onun listesinin Гјzerine yazmaz.
       Aksi halde her yazДұlДұm gГјncellemesinde kullanДұcДұnДұn sildiДҹi/eklediДҹi satДұrlar
       sessizce geri gelirdi вҖ” bu gerГ§ekten yaЕҹanmДұЕҹ bir hataydДұ. */
    if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
      d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
      d.settings.protokolSurum = PROTOKOL_SURUM;
      saveData();
    }
    protokolRolleriTamamla(d.settings.protokol);
    return d.settings.protokol;
  }
  return PROTOKOL;
}
/* Bir protokol satДұrДұnДұn TAM kopyasДұnДұ Г§ДұkarДұr вҖ” tГјm alanlar dahil.
   TEK KAYNAK: ensureProtokol() ve protokolVarsayilan() burayДұ kullanДұr.
   Eskiden ГјГ§ yerde ayrДұ ayrДұ elle alan listesi vardДұ; yeni bir alan (Г¶rn.
   tekrarBitisRef) eklendiДҹinde ГјГ§ГјnГј de gГјncellemek unutulabiliyordu вҖ”
   tam da "poЕҹetten sonra sulama vermedi" hatasДұnДұn sebebi buydu: varsayДұlana
   dГ¶nГјnce/otomatik gГјncellenince tekrarBitisRef sessizce dГјЕҹГјyordu. */
function protokolSatirKopyala(x){
  return {ref:x.ref, gun:x.gun, tip:x.tip, sahip:x.sahip, txt:x.txt, sure:x.sure, tekrar:x.tekrar, rol:x.rol,
    sonucSecenekleri:x.sonucSecenekleri, tekrarBitisRef:x.tekrarBitisRef, tekrarBitisGun:x.tekrarBitisGun};
}
function ensureProtokol(){
  var d=loadData(); if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.protokol) || !d.settings.protokol.length){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  } else if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  }
  protokolRolleriTamamla(d.settings.protokol);
  return d.settings.protokol;
}
/* Bir referans noktasДұnДұn (gelis/poset/tiftik/toprak/tirmik/hava) TARД°HД°NД° bulur.
   GerГ§ek tarih girilmiЕҹse onu, girilmemiЕҹse protokoldeki kendi tanДұmДұndan tahmin
   eder вҖ” tahmine o adДұmДұn kendi ertelemesi de eklenir. BГ¶ylece "tiftikten 2 gГјn
   sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar (toprak/su'da
   yaptДұДҹДұmДұz dГјzeltmenin genel hГўli).
   Not: "toprak" Г¶zel durumdur вҖ” protokoldeki kendi satДұrДұ kendine referans verir
   (ref:"toprak"), bu yГјzden dГ¶ngГјye girmemesi iГ§in ayrДұ ele alДұnДұr; tahmini
   ayarlardaki offToprak'tan gelir. poset/tiftik/tДұrmДұk/hava satДұrlarДұ gelis veya
   toprak'a referans verdiДҹi iГ§in Г¶zyinelemeli Г§Г¶zГјm gГјvenlidir (dГ¶ngГј olmaz). */
function protokolReferansTarihi(c, ref, callerRol, _visiting){
  var visiting = _visiting || [];
  if(!c || !ref) return null;
  if(ref==="gelis") return c.gelisTarihi||null;
  if(ref==="toprak"){
    if(c.toprakTarihi) return c.toprakTarihi;
    if(!c.gelisTarihi) return null;
    var ti=protokolRolIdx("toprak");
    var base=null;
    /* KullanДұcДұ toprak satДұrДұnДұ Г¶zelleЕҹtirmiЕҹse (Г¶rn. ref:"gelis" + kendi gun
       deДҹeri, offToprak ayarДұndan FARKLI) o satДұrДұn KENDД° tanДұmДұna gГ¶re
       hesaplarДұz вҖ” offToprak ayarДұnДұ gГ¶rmezden geliriz. BГ¶ylece topraДҹДұn
       kendi hesabДұ ile ona referans veren adДұmlar (Г¶rn. Vivando/toprakвҲ’2)
       HER ZAMAN aynДұ tarihi baz alДұr. VarsayДұlan dizide toprak'Дұn kendi satДұrДұ
       ref:"toprak" (kendine referans) olduДҹu iГ§in sonsuz dГ¶ngГјye girmemek
       adДұna SADECE ref baЕҹka bir Еҹeyse (Г¶zelleЕҹtirilmiЕҹse) bu yolu kullanДұrДұz. */
    if(ti>=0 && getProtokol()[ti].ref!=="toprak"){
      if(visiting.indexOf(ti)<0){
        base=protokolTarih(c, getProtokol()[ti], visiting.concat([ti]));
      }
      /* visiting'de zaten varsa (dГ¶ngГј) base=null kalДұr, alttaki varsayДұlana dГјЕҹer */
    }
    if(!base){
      base=addDays(c.gelisTarihi,getSet(c).offToprak); /* varsayДұlan/self-referential durum */
    }
    /* AdДұmДұn kendisi TOPRAK ise kendi ertelemesini burada eklemeyiz вҖ” Г§aДҹДұran
       (_adimiYarinaTasi vb.) bunu ayrДұca ekliyor. Eklersek
       erteleme Г§ift sayДұlДұr. Sadece BAЕһKA bir adДұm (Г¶rn. "1000 lt su") topraДҹa
       referans veriyorsa, topraДҹДұn ertelemesini bu adДұma da yansДұtДұrДұz. */
    if(callerRol!=="toprak"){
      if(ti>=0){
        var te=(c.ertele&&c.ertele["p"+ti])||0;
        if(te) base=addDays(base,te);
      }
    }
    return base;
  }
  /* poset / tiftik / tДұrmДұk / hava: gerГ§ek tarih varsa onu, yoksa protokoldeki
     kendi tanДұmДұndan (ref:gelis veya ref:toprak вҖ” dГ¶ngГј olmaz) tahmin ediyoruz,
     tahmine o adДұmДұn kendi ertelemesi de eklenir. BГ¶ylece "tiftikten 2 gГјn
     sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar.
     GГңVENLД°K: kullanДұcДұ Ayarlar'dan iki adДұmДұ birbirine referans verecek
     Еҹekilde ayarlarsa (AвҶ’B, BвҶ’A), bu zincir sonsuz dГ¶ngГјye girip tarayДұcДұyДұ
     Г§Г¶kertebilirdi ("Maximum call stack size exceeded"). "visiting" dizisi
     Еҹu ana kadar ziyaret edilen adДұm indekslerini tutar; aynДұ indekse tekrar
     gelinirse dГ¶ngГј tespit edilmiЕҹ demektir вҖ” hesaplama sessizce durdurulur
     (null dГ¶ner, uygulama Г§Г¶kmez). KullanДұcДұya asДұl uyarДұ Ayarlar ekranДұnda
     protokol satДұrДұ kaydedilirken (protokolDongriVarMi) gГ¶sterilir. */
  var idx=protokolRolIdx(ref);
  if(idx<0) return null;
  if(visiting.indexOf(idx)>=0){
    console.error("вҡ пёҸ Protokol referans dГ¶ngГјsГј tespit edildi (adДұm #"+idx+") вҖ” hesaplama durduruldu, Г§Г¶kme engellendi");
    return null;
  }
  var st=getProtokol()[idx];
  if(!st) return null;
  if(adimGercektenYapildiMi(c, idx, st)){
    var real=adimYapilmaTarihi(c, idx, st);
    if(real) return real;
  }
  var est=protokolTarih(c, st, visiting.concat([idx]));
  if(!est) return null;
  var ert=(c.ertele && c.ertele["p"+idx]) || 0;
  return ert ? addDays(est, ert) : est;
}
function protokolTarih(c, step, _visiting){
  if(!step) return null;
  var refDate=protokolReferansTarihi(c, step.ref, step.rol, _visiting);
  if(!refDate) return null;
  return addDays(refDate, step.gun);
}

        else if(ko<=KOMPOST_TEHLIKE_ALT) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:2, txt:"Kompost "+ko+"\u00b0 \u2014 TEHL\u0130KEL\u0130 (18\u00b0 alt\u0131), acil m\u00fcdahale"});
        else if(ko<=KOMPOST_KRITIK_ALT) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:1, txt:"Kompost "+ko+"\u00b0 \u2014 KR\u0130T\u0130K (21\u00b0 alt\u0131), misel \u00e7ok yava\u015flar"});
        else if(ko<KOMPOST_IDEAL_MIN) out.push({cid:c.id, oda:c.oda, key:"kompost", lvl:0, txt:"Kompost "+ko+"\u00b0 \u2014 ideal 24-26\u00b0, hafif d\u00fc\u015f\u00fck"});
      }
      if(od!==null && od>ODA_MAX) out.push({cid:c.id, oda:c.oda, key:"oda", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 \u00fcst s\u0131n\u0131r "+ODA_MAX+"\u00b0, d\u00fc\u015f\u00fcr"});
    } else {
      var hed=havaHedef(c);
      if(hed!==null && od!==null){
        var diff=od-hed;
        if(diff>1) out.push({cid:c.id, oda:c.oda, key:"odaHedef", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 bug\u00fcnk\u00fc hedef "+hed+"\u00b0, "+diff.toFixed(1)+"\u00b0 y\u00fcksek, d\u00fc\u015f\u00fcr"});
        else if(diff<-1) out.push({cid:c.id, oda:c.oda, key:"odaHedef", lvl:0, txt:"Oda "+od+"\u00b0 \u2014 bug\u00fcnk\u00fc hedef "+hed+"\u00b0, "+(-diff).toFixed(1)+"\u00b0 d\u00fc\u015f\u00fck, y\u00fckselt"});
      }
    }
  });
  return out;
}
/* ---- Kritik/tehlikeli sДұcaklДұk ikazlarДұ: rol bazlДұ "gГ¶rdГјm" iЕҹareti ---- */
function tempAckGet(c,key){ return c && c.tempAck && c.tempAck[key] && c.tempAck[key][currentRole]; }

/* Tek seferlik ikazlar: "YapДұldДұ" (bu dГ¶ngГј iГ§in bir daha gГ¶sterme) / "Ertele" (yarДұna kadar gizle) */

/* AteЕҹlenme (kompostta ДұsДұnma): geliЕҹten 7-8. gГјn ziraat mГјhendisi kontrolГј */
function atesAlerts(){

/* SON GГңVENLД°K AДһI: Rol eЕҹleЕҹmesi (veya c.done bayraДҹДұ) her nasДұlsa senkron kaГ§ДұrmДұЕҹsa bile,
   Tiftik/Toprak/TДұrmДұk/Hava'nДұn kendi Г–ZEL tarih alanДұ (c.tiftikTarihi vb.) zaten doluysa,
   bu adДұm HER ZAMAN "yapДұldДұ" sayДұlДұr. Bu iki ayrДұ bayraДҹДұn (c.done ile c.tiftikTarihi)
   birbirinden kopmasДұna karЕҹДұ kesin bir Г§Г¶zГјmdГјr вҖ” hangi sebepten kopmuЕҹ olursa olsun. */
function adimGercektenYapildiMi(c, idx, s){
  if(c.done && c.done["p"+idx]) return true;
  var rol=(s&&s.rol)||"";
  /* Kompost indirme, tarihi GELECEKTE ise "yapДұldДұ" SAYILMAZ вҖ” kompost daha
     gelmediyse indirilmiЕҹ olamaz. Aksi halde ileri tarihli (Г¶rn. yarДұn geliЕҹli,
     dГјzeltmeden Г–NCE oluЕҹturulmuЕҹ) bir odada kompostIndirme={tarih:yarДұn}
     olduДҹu iГ§in indirme "yapДұldДұ" sayДұlДұp "YarДұn yapДұlacaklar"da gizleniyordu
     (kullanДұcДұ raporu: "A-7 yarДұn kompost gelecek ama yarДұnki iЕҹlemlerde
     gГ¶rГјnmГјyor / yine gГ¶rГјnmГјyor"). Tarih bugГјne dГ¶nГјnce normal "yapДұldДұ" olur.
     Ekip/makine detayДұ (Д°ndirme PlanДұ formundan) korunur; sadece done durumu
     tarihe baДҹlanДұr. */
  if(rol==="kompostindirme") return !!(c.kompostIndirme && c.kompostIndirme.tarih && c.kompostIndirme.tarih<=todayISO());
  if(rol==="tiftik") return !!c.tiftikTarihi;
  if(rol==="toprak") return !!c.toprakTarihi;
  if(rol==="tirmik") return !!c.tirmikTarihi;
  if(rol==="hava") return !!c.havaBaslangic;
  return false;
}
/* ==================== SSOT: Bir protokol adДұmДұnДұn TEK yazma kapДұsДұ ====================
   Bir iЕҹi "yapДұldДұ" yapmanДұn tek yolu budur. Hangi ekrandan Г§aДҹrДұlДұrsa Г§aДҹrДұlsДұn
   (GГ¶revler вң“, Bilgileri DГјzenle formu, protokol tamamlama, GГјnlГјk Tur) aynДұ sonucu Гјretir.
   BГ¶ylece aynДұ bilgi ГјГ§ ayrДұ yere farklДұ biГ§imde yazДұlmaz вҖ” kafa karДұЕҹДұklДұДҹДұ biter.
     вҖў c.done["p"+idx]                вҶ’ kanonik "yapДұldДұ" bayraДҹДұ
     вҖў rol'e gГ¶re Г¶zel tarih alanДұ    вҶ’ rapor/PDF/performans bunlarДұ okuduДҹu iГ§in senkron tutulur
       (tiftikTarihi / toprakTarihi / tirmikTarihi / havaBaslangic)
     вҖў c.adimDetay["p"+idx]           вҶ’ geГ§miЕҹe dГ¶nГјk tarih + serbest not
     вҖў o tarihin gГјnlГјk kaydДұna not   вҶ’ Ana Ekran "BugГјn iЕҹlem" sГјtunu buradan besleniyor
   opts: {tarih (vars. bugГјn), not, sessiz (gГјnlГјk nota yazma)}
   DГ¶ner: true (yapДұldДұ) / false (sДұra engeli вҖ” Г¶nceki zorunlu adДұm eksik) */
function adimTamamla(c, idx, opts){
  if(!c) return false;
  opts = opts || {};
  var st=getProtokol()[idx]; if(!st) return false;
  var tarih = opts.tarih || todayISO();
  var alanKey = st.rol || protokolAdimAlanKey(st.txt);

  /* TekrarlДұ iЕҹ (oda yДұkama vb.): kalДұcДұ bitmez вҖ” son yapДұlmayДұ iЕҹaretle, N gГјn sonra yine Г§Дұkar */
  var tekrarG = parseInt(st.tekrar,10)||0;
  if(tekrarG>0){
    if(!c.doneSon) c.doneSon={};
    c.doneSon["p"+idx]=tarih;
    if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapДұldДұ ("+tekrarG+" gГјn sonra tekrar hatДұrlatДұlacak)");
    touchCycle(c);
    return true;
  }

  /* SДұra kontrolГј: Г¶nceki zorunlu adДұm yapДұlmadДұysa engelle */
  if(alanKey==="toprak" && !oncekiAdimTamamMi(c,"toprak")) return false;
  if(alanKey==="tirmik" && !oncekiAdimTamamMi(c,"tirmik")) return false;
  if((alanKey==="hasat" || (!alanKey && /hasat/i.test(st.txt))) && !oncekiAdimTamamMi(c,"hasat")) return false;

  if(!c.done) c.done={};
  c.done["p"+idx]=true;

  /* Rol'e gГ¶re Г¶zel tarih alanДұ вҖ” rapor/PDF/performans bunlarДұ okur, senkron Еҹart.
     "kompostindirme" hariГ§: onun gerГ§ek verisi Kompost Д°ndirme PlanДұ formundan
     (c.kompostIndirme) gelir, burada ayrДұca yazmДұyoruz вҖ” SSOT tek kaynakta kalsДұn.
     "bosaltma": c.bosaltimTarihi UYGULAMANIN HER YERД°NDE "aktif mi" kontrolГј iГ§in
     kullanДұlan KANONД°K alan вҖ” bu adДұm tamamlanДұnca onu da senkron tutuyoruz, aksi
     halde oda hem "boЕҹaltДұldДұ" (protokolde) hem "hГўlГў aktif" (her yerde) gГ¶rГјnГјr.
     FlaЕҹ adДұmlarДұ (flas1/flas1bitis/flasarasi/flas2/flas2bitis) ayrДұ Гјst-seviye
     alana ihtiyaГ§ duymaz, c.adimDetay zaten SSOT olarak yeterli. */
  if(alanKey==="hava"){
    if(!c.havaBaslangic) c.havaBaslangic=tarih;
    /* SSOT: havaya baЕҹlama TEK yazma kapДұsДұndan geГ§tiДҹi iГ§in (GГјnlГјk Tur'daki
       BaЕҹlat kartДұ, Bilgileri DГјzenle formu, ileride eklenecek her yeni yol),
       varsayДұlan havalandДұrma planДұ burada, merkezi olarak kurulur вҖ” sadece
       BaЕҹlat kartДұna baДҹlДұ kalДұrsa "Bilgileri DГјzenle"den girilen hava tarihi
       planДұ hiГ§ oluЕҹturmazdДұ (kullanДұcДұ raporu: "otomatik havalandДұrma planДұ
       Г§ДұkmДұyor"). havaPlaniOtomatikOlustur zaten var olan bir planДұn Гјzerine
       yazmaz (idempotent). */
    havaPlaniOtomatikOlustur(c);
  }
  else if(alanKey==="bosaltma"){ if(!c.bosaltimTarihi) c.bosaltimTarihi=tarih; }
  else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=tarih; }

  /* GeГ§miЕҹe dГ¶nГјk tarih + not + (tiftik/toprak/tДұrmДұk DIЕһINDAKД° adДұmlar iГ§in)
     kim yaptДұ / doДҹru mu вҖ” bunlar rapor okumadДұДҹДұ iГ§in buraya YAZILABД°LД°R,
     tiftik/toprak/tДұrmДұk'Дұn kendi Г¶zel alanlarДұna (rapor okur) DOKUNULMAZ. */
  if(!c.adimDetay) c.adimDetay={};
  var oncekiDetay=c.adimDetay["p"+idx]||{};
  c.adimDetay["p"+idx]={
    tarih:tarih,
    not:(opts.not!=null?opts.not:oncekiDetay.not)||"",
    personel:(opts.personel!=null?opts.personel:oncekiDetay.personel)||"",
    dogru:(opts.dogru!=null?opts.dogru:oncekiDetay.dogru)||false
  };

  if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapДұldДұ");
  touchCycle(c);
  return true;
}
/* SSOT: Bir adДұmДұ "yapДұlmadДұ"ya geri alДұr вҖ” bayraДҹДұ VE rol'e baДҹlДұ Г¶zel tarihi birlikte temizler.
   Tek yerden geri alДұnca her ekrandan kalkar (yarДұm "yapДұldДұ" durumu kalmaz). */
function adimGeriAl(c, idx){
  if(!c) return;
  var st=getProtokol()[idx];
  if(c.done) c.done["p"+idx]=false;
  if(st){
    var alanKey = st.rol || protokolAdimAlanKey(st.txt);
    if(alanKey==="hava"){ c.havaBaslangic=""; }
    else if(alanKey==="bosaltma"){ c.bosaltimTarihi=""; }
    else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=""; }
  }
  if(c.adimDetay) delete c.adimDetay["p"+idx];
  touchCycle(c);
}
/* Bir protokol adДұmДұnДұn fiilen YAPILDIДһI tarihi dГ¶ndГјrГјr (Г¶zel alan veya adimDetay). */
function adimYapilmaTarihi(c, idx, s){
  var rol=(s&&s.rol)||protokolAdimAlanKey(s&&s.txt);
  if(rol==="kompostindirme") return (c.kompostIndirme&&c.kompostIndirme.tarih)||"";
  if(rol==="tiftik") return c.tiftikTarihi||"";
  if(rol==="toprak") return c.toprakTarihi||"";
  if(rol==="tirmik") return c.tirmikTarihi||"";
  if(rol==="hava")   return c.havaBaslangic||"";
  var ad=c.adimDetay && c.adimDetay["p"+idx];
  return (ad&&ad.tarih)||"";
}
/* Bir odada BELД°RLД° GГңN yapДұlan tГјm iЕҹleri tek yerden tГјretir (SSOT gГ¶sterim):
   hem bugГјn yapДұldДұ iЕҹaretlenen protokol adДұmlarДұ (tarih alanДұna gГ¶re),
   hem o gГјnГјn gГјnlГјk kaydДұndaki sulama/ilaГ§/manuel notlar вҖ” tekilleЕҹtirilmiЕҹ. */
function odaYapilanlar(c, gun){
  var out=[], gorulen={};
  function ekle(not){ not=(""+not).trim(); if(!not||gorulen[not]) return; gorulen[not]=1; out.push(not); }
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(!adimGercektenYapildiMi(c, idx, s)) return;
    if(adimYapilmaTarihi(c, idx, s)===gun) ekle(s.txt+" yapДұldДұ");
  });
  (c.gunluk||[]).forEach(function(r){
    if(r.tarih!==gun) return;
    /* Sulama bilinГ§li olarak iptal/deДҹiЕҹtirilmiЕҹse "yapДұlmadДұ" gibi sessizce
       kaybolmasДұn вҖ” ГјГ§ГјncГј bir durum olarak ayrДұ bir not dГјЕҹГјlГјr. */
    if(r.sulamaDurum==="iptal"){ ekle("Sulama iptal edildi"+(r.sulamaOrijinal?(" (plan: "+r.sulamaOrijinal+")"):"")+(r.sulamaAciklama?(" вҖ” "+r.sulamaAciklama):"")); }
    else if(r.sulamaDurum==="degistirildi"){ ekle("Sulama deДҹiЕҹtirildi"+(r.sulama?(": "+r.sulama):"")+(r.sulamaAciklama?(" вҖ” "+r.sulamaAciklama):"")); }
    else if(r.sulama) (""+r.sulama).split(" В· ").forEach(function(p){ ekle(p); });
    /* islemNot'taki "Sulama iptal edildi/deДҹiЕҹtirildi ..." parГ§alarДұ, sulamaDurum
       Гјzerinden yukarДұda ZATEN eklendi (kim/ne zaman dahil daha kДұsa haliyle) вҖ”
       burada tekrar eklenirse aynДұ karar iki kez (biri kДұsa, biri uzun) listelenir. */
    if(r.islemNot) (""+r.islemNot).split(" В· ").forEach(function(p){
      if(r.sulamaDurum && /^Sulama (iptal edildi|deДҹiЕҹtirildi)/.test(p)) return;
      ekle(p);
    });
  });
  return out;
}
function nextTasks(){
  var d=loadData(); var today=todayISO(); var items=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi) return; /* soft-silinmiЕҹ satДұr вҖ” index kaymasДұn diye array'den hiГ§ Г§ДұkarДұlmДұyor */
      if(s.rol==="kompostindirme") return; /* SSOT: gerГ§ek kaydДұ Kompost Д°ndirme PlanДұ formunda tutuluyor (c.kompostIndirme) вҖ” burada sadece tarih zinciri iГ§in referans, ayrДұca gГ¶rev olarak gГ¶sterilmez */
      if(s.tip==="uyari") return; /* ateЕҹlenme Гјstte ayrДұ kutuda gГ¶steriliyor */
      if(s.tip==="ilac" || s.tip==="su") return; /* sulamalar gГ¶rev listesinde deДҹil, oda iГ§inde */
      var base=protokolTarih(c,s); if(!base) return;
      var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
      var t = ert ? addDays(base,ert) : base;
      var sure = parseInt(s.sure,10)||1;         /* iЕҹin kaГ§ gГјn sГјrdГјДҹГј (hasat=5 gibi) */
      var tekrarG = parseInt(s.tekrar,10)||0;    /* periyodik iЕҹ: kaГ§ gГјnde bir tekrar */
      /* TekrarlДұ iЕҹ (Г¶rn. oda yДұkama): вң“'lanДұnca kalДұcДұ bitmez, tekrarG gГјn sonra yeniden Г§Дұkar */
      if(tekrarG>0){
        var son=(c.doneSon&&c.doneSon["p"+idx])||null;
        var tNext = son ? addDays(son,tekrarG) : t;
        var offT=daysBetween(today,tNext); if(offT===null) return;
        if((offT>=0 && offT<=1) || (offT<0 && offT>=-7)){
          items.push({cid:c.id, idx:idx, off:offT, date:tNext, oda:c.oda, txt:s.txt, tip:s.tip, sahip:s.sahip||"", done:false, overdue:offT<0, ertelendi:false, tekrarli:true, tekrarG:tekrarG, atama:(c.atama&&c.atama["p"+idx])||""});
        }
        return;
      }
      var off=daysBetween(today,t); if(off===null) return;
      var done = adimGercektenYapildiMi(c, idx, s);
      /* ГҮok gГјnlГјk iЕҹ (Г¶rn. hasat 5 gГјn): baЕҹlangДұГ§ geГ§se de son gГјne kadar "devam ediyor" sayДұlДұr,
         gecikmiЕҹ DEДһД°L. Ancak son gГјn de geГ§tiyse gerГ§ekten gecikmiЕҹtir. */
      var sonGun = addDays(t, sure-1);
      var offEnd = daysBetween(today, sonGun);
      var devamEdiyor = (!done && sure>1 && off<0 && offEnd>=0);
      var overdue = (!done && offEnd<0);
      var goster = (off>=0 && off<=1)                 /* bugГјn + yarДұn */
                || devamEdiyor                         /* Г§ok gГјnlГјk iЕҹ sГјrГјyor */
                || (overdue && offEnd>=-7);            /* gecikmiЕҹ (7 gГјne kadar gГ¶ster) */
      if(goster){
        var kacinciGun = devamEdiyor ? (daysBetween(t,today)+1) : 0;
        items.push({cid:c.id, idx:idx, off:off, date:t, oda:c.oda, txt:adimGosterMetni(c, idx, s, t), tip:s.tip, sahip:s.sahip||"", done:done, overdue:overdue, devamGun:kacinciGun, sureGun:sure, ertelendi:!!ert, atama:(c.atama&&c.atama["p"+idx])||""});
      }
    });
  });
  /* Odaya Г¶zel, tek seferlik iЕҹlemler (GГ¶revler sekmesinden manuel eklenen) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).forEach(function(og){
      if(og.done) return; /* tamamlananlar listede kalmasДұn */
      var base=og.tarih; if(!base) return;

      var t = ert ? addDays(base,ert) : base;
      var off=daysBetween(today,t); if(off===null) return;

        items.push({cid:c.id, ogId:og.id, off:off, date:t, oda:c.oda, txt:og.is, tip:"olay", sahip:"", atama:og.atama||"", odaGorev:true, done:false, overdue:off<0, ertelendi:!!ert});
      }
    });
  });
  getPlan().filter(function(x){return !x.done && x.cikis;}).forEach(function(x){
    var off=daysBetween(today, x.cikis);
    if(off===null) return;
    if(off===1){
      items.push({plan:true, planId:x.id, off:1, date:x.cikis, oda:x.oda||"вҖ”",
        txt:"YarДұn kompost gelecek ("+(x.firma||"firma")+") вҖ” bugГјn firma ile gГ¶rГјЕҹГјlecek",
        tip:"olay", sahip:"ziraat", done:!!x.irtibat, overdue:false, komGorusme:true});
    } else if(off===0){
      items.push({plan:true, planId:x.id, off:0, date:x.cikis, oda:x.oda||"вҖ”",
        txt:"Kompost BUGГңN geliyor ("+(x.firma||"firma")+") вҖ” karЕҹДұla, oda oluЕҹtur",
        tip:"olay", sahip:"ekip", done:false, overdue:false, komGelis:true});
    } else if(off<0 && off>=-2){
      items.push({plan:true, planId:x.id, off:off, date:x.cikis, oda:x.oda||"вҖ”",
        txt:"Kompost geldi ama oda oluЕҹturulmadДұ ("+(x.firma||"firma")+")",
        tip:"olay", sahip:"ekip", done:false, overdue:true, komGelis:true});
    }
  });
  items.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:(a.oda<b.oda?-1:1)); });
  return items;
}
/* Protokol adДұmДұnДұn metnine gГ¶re hangi tarih alanДұna (tiftikTarihi/toprakTarihi/
   tirmikTarihi/havaBaslangic) karЕҹДұlДұk geldiДҹini bulur. toggleTask'ta kullanДұlДұr. */
function protokolAdimAlanKey(txt){
  if(!txt) return null;
  if(/tiftik/i.test(txt)) return "tiftik";
  if(/tДұrmДұk/i.test(txt)) return "tirmik";
  if(/toprak/i.test(txt)) return "toprak";
  if(/hava/i.test(txt)) return "hava";
  return null;
}
/* MERKEZД° ROL BULUCU вҖ” kullanДұcДұ bir satДұrДұ istediДҹi gibi yeniden adlandДұrabilir
   (Г¶rn. "PoЕҹet aГ§ДұlДұr" вҶ’ "PoЕҹet kesimi"); sistem artДұk metne deДҹil, satДұra aГ§ДұkГ§a
   atanmДұЕҹ "rol" etiketine bakДұyor. BГ¶ylece yeniden adlandДұrma hiГ§bir hesaplamayДұ bozmaz.
   Eski (henГјz rol atanmamДұЕҹ) kayДұtlar iГ§in metin eЕҹleЕҹmesine geriye dГ¶nГјk dГјЕҹer. */
var PROTOKOL_ROL_REGEX = {poset:/po\u015fet/i, tiftik:/tiftik/i, toprak:/toprak/i, tirmik:/t\u0131rm\u0131k/i, hasat:/hasat/i, hava:/hava/i, kompostindirme:/kompost indirme/i};
function protokolRolIdx(rol){
  var P=getProtokol();
  for(var i=0;i<P.length;i++){ if(!P[i].silindi && P[i].tip==="olay" && P[i].rol===rol) return i; }
  var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return -1;
  var sahipGerekli = (rol==="tiftik"||rol==="toprak"||rol==="tirmik") ? "ekip" : null;
  for(var j=0;j<P.length;j++){ if(!P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt) && (!sahipGerekli || P[j].sahip===sahipGerekli)) return j; }
  /* Sahip ЕҹartДұyla bulunamadДұysa (kullanДұcДұ bu alanДұ deДҹiЕҹtirmiЕҹ olabilir), sadece metne bak */
  for(var k=0;k<P.length;k++){ if(!P[k].silindi && P[k].tip==="olay" && re.test(P[k].txt)) return k; }
  return -1;
}
/* Bir adДұmДұn (startIdx) referans zinciri takip edildiДҹinde kendine geri dГ¶nГјp
   dГ¶nmediДҹini kontrol eder. protokolTarih()'teki dГ¶ngГј korumasДұ bir GГңVENLД°K
   AДһI'dДұr (Г§Г¶kmeyi engeller) вҖ” ama en doДҹrusu dГ¶ngГјyГј hiГ§ KAYDETMEMEK. Bu
   fonksiyon, Ayarlar'da bir referans deДҹiЕҹtirilirken (henГјz kaydedilmeden
   hemen Г¶nce, o deДҹerle) Г§aДҹrДұlДұr. */
function protokolRefDongusuVarMi(startIdx){
  var P=getProtokol();
  var idx=startIdx, guard=0;
  while(true){
    if(guard++ > P.length+2) return true; /* aЕҹДұrДұ uzun zincir, gГјvenlik iГ§in dГ¶ngГј say */
    var st=P[idx];
    if(!st || !st.ref) return false;
    if(st.ref==="gelis") return false;
    var nextIdx;
    if(st.ref==="toprak"){
      var ti=protokolRolIdx("toprak");
      if(ti<0 || !P[ti] || P[ti].ref==="toprak" || !P[ti].ref) return false; /* kendine referans = gГјvenli taban */
      nextIdx=ti;
    } else {
      nextIdx=protokolRolIdx(st.ref);
      if(nextIdx<0) return false; /* tanДұmsДұz referans, dГ¶ngГј deДҹil */
    }
    if(nextIdx===startIdx) return true; /* zincir baЕҹa dГ¶ndГј вҖ” dГ¶ngГј! */
    idx=nextIdx;
  }
}
/* Bir odanДұn SIRADAKД° (henГјz yapДұlmamДұЕҹ, en yakДұn tarihli) protokol adДұmДұnДұ bulur.
   GГјnlГјk Tur ekranДұnda ziraat mГјhendisinin gГ¶zlemine gГ¶re "yarДұn yapalДұm" diyebilmesi iГ§in. */
/* Bir adДұmДұn BELД°RLД° TARД°H iГ§in gГ¶sterilecek metni: mГјhendis o tarih iГ§in
   "deДҹiЕҹtirerek onayla" yaptДұysa (yarinDegisiklik) ekip protokol metnini deДҹil
   mГјhendisin dГјzelttiДҹi metni gГ¶rГјr вҖ” protokol 400 dese de gГ¶revde 600 yazar. */
function adimGosterMetni(c, idx, st, tarih){
  var d=c && c.yarinDegisiklik && c.yarinDegisiklik["p"+idx];
  if(d && d.txt && d.t===tarih) return d.txt;
  return st.txt;
}
/* siradakiProtokolAdimi'nin tersi: en son TAMAMLANMIЕһ olay tipi adДұm.
   c.adimDetay["p"+idx].tarih her tamamlanan adДұmda evrensel olarak tutulur
   (poЕҹet dahil, rol'e Г¶zel alanlara ihtiyaГ§ yok) вҖ” SSOT'tan okunur. */
function sonYapilanOlayAdimi(c){
  var best=null;
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay") return;
    if(!adimGercektenYapildiMi(c,idx,s)) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    var tarih=detay?detay.tarih:null;
    if(!tarih) return;
    if(!best || tarih>best.tarih){ best={idx:idx, tarih:tarih, txt:s.txt}; }
  });
  return best;
}
function siradakiProtokolAdimi(c){
  /* KГ–K MД°MARД° DГңZELTME: eskiden bu fonksiyon adaylar arasДұndan en ERKEN
     TARД°HLД° olanДұ seГ§iyordu (t<best.t). Bu, referans zinciri bir yerde
     bozuksa (Г¶rn. eksik/sahipsiz bir referans вҶ’ tarihi yanlДұЕҹ/erken
     hesaplanДұyor) PoЕҹet/Tiftik gibi Г–NCEKД° zorunlu adДұmlar hГўlГў yapДұlmamДұЕҹken
     sistemin Toprak gibi SONRAKД° bir adДұmДұ "sДұradaki" gГ¶stermesine yol
     aГ§Дұyordu вҖ” kullanДұcДұ defalarca aynДұ hatayДұ bildirdi (PoЕҹet/Tiftik atlanДұp
     Toprak'a sДұГ§rama). ArtДұk seГ§im, Ayarlar вҶ’ GГ¶revler'de TANIMLI GERГҮEK Д°Еһ
     AKIЕһI SIRASINA (protokolSiraAnahtari вҖ” tГјm referans zincirini kompost
     indirmeвҶ’poЕҹetвҶ’tiftik/toprakвҶ’tДұrmДұkвҶ’havaвҶ’hasat Еҹeklinde Г§Г¶zer) gГ¶re
     yapДұlДұyor: yapДұlmamДұЕҹ adДұmlar arasДұnda SIRA numarasДұ en KГңГҮГңK olan asla
     atlanmaz, tarih sadece gГ¶rГјntГјleme/gecikme hesabДұ iГ§in kullanДұlДұr. */
  var adaylar=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return;
    var done=adimGercektenYapildiMi(c, idx, s); if(done) return;
    adaylar.push({idx:idx, s:s, sira:protokolSiraAnahtari(s)});
  });
  if(!adaylar.length) return null;
  adaylar.sort(function(a,b){ return a.sira-b.sira; });
  var secilen=adaylar[0];
  var base=protokolTarih(c,secilen.s);
  var t;
  if(base){
    var ert=(c.ertele && c.ertele["p"+secilen.idx])?c.ertele["p"+secilen.idx]:0;
    t=ert?addDays(base,ert):base;
  } else {
    /* Tarih hesaplanamДұyor (referans hГўlГў sahipsiz) вҖ” sessizce atlamak yerine
       bugГјnГјn tarihiyle gГ¶ster, en azДұndan adДұm kaybolmasДұn ve kullanДұcДұ
       Ayarlar'da referansДұ dГјzeltmesi gerektiДҹini fark etsin. */
    t=todayISO();
  }
  return {idx:secilen.idx, t:t, txt:adimGosterMetni(c, secilen.idx, secilen.s, t)};
}
/* GГјnlГјk Tur'da "YarДұn X yapДұlsДұn" вҖ” mevcut Ertele mekanizmasДұnДұ TERS yГ¶nde kullanДұr
   (Ertele +gГјn ekler, bu -gГјn ekleyerek tarihi Г¶ne Г§eker). Yeni bir veri modeli gerekmez,
   aynДұ c.ertele alanДұ okunur; GГ¶revler listesi ve puanlama otomatik olarak gГјnceli gГ¶rГјr. */
/* PLANLANAN TARД°H вҖ” henГјz yapДұlmamДұЕҹ bir adДұmДұn hedef tarihini DOДһRUDAN
   istenen gГјne taЕҹДұr (sadece yarДұn veya +1 gГјn deДҹil, herhangi bir tarih).
   c.ertele["p"+idx] zaten var olan zincir-mekanizmasДұnДұ kullanДұr вҖ” yeni bir

/* Tarih seГ§ildikten sonra: deДҹiЕҹmediyse sessizce kapat, deДҹiЕҹtiyse yГ¶n

function planTarihiOnayla(cid, idx){

  var s=getProtokol()[idx]; if(!s) return;

/* GerekГ§e giriЕҹi вҖ” iЕҹleme Г¶zgГј hazДұr seГ§eneklerden (bkz. ERTELE_NEDEN_KATALOG/

function planGerekceUygula(cid, idx, yeniTarih, ileriMi, neden){

/* GГјnlГјk Tur / panoEdit ekranДұnda, sulamanДұn altДұnda sДұradaki adДұmДұ gГ¶sterir.
   AdДұm BUGГңN (ya da daha erken/gecikmiЕҹ) ise direkt iЕҹaretlenebilir bir kutucuk

/* ЕһartlДұ Kurallar: Ayarlar вҶ’ GГ¶revler вҶ’ Kontrol ProtokolГј altДұnda ayrДұ olarak yГ¶netilir.
   Her kural: {id, aciklama, ref(gelis/toprak), gun(eЕҹik), hedefTxt(hangi olay adДұmДұnДұ bugГјne Г§ekecek)}.
