/* Kompost geliş kontrolünde çözülmemiş maddesi olan (yeni gelmiş) odalar — Görevler sekmesi ikazı */
function kompostGelisIkazlariHTML(){
  var d=loadData(); var today=todayISO();
  var problemliOdalar=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(!c.gelisTarihi) return;
    var off=daysBetween(today, c.gelisTarihi); /* geliş - bugün */
    if(off===null || off>0) return; /* henüz gelmedi */
    if(off < -3) return; /* gelişten 3 günden fazla geçtiyse artık ilk gün ikazı gösterme */
    var eksik=kompostEksikMaddeler(c);
    if(eksik.length) problemliOdalar.push({oda:c.oda, id:c.id, eksik:eksik});
  });
  if(!problemliOdalar.length) return "";
  var h='<div class="card" style="border:2px solid #c0291f; background:#fdf3f2; margin-bottom:10px;">'
    +'<div style="font-weight:700; color:#c0291f; margin-bottom:6px;">🚚 Kompost geliş kontrolü bekliyor</div>';
  problemliOdalar.forEach(function(p){
    h+='<div style="padding:6px 0; border-bottom:1px solid #f0dede;"><b>'+esc(p.oda)+'</b> — '+p.eksik.join(" · ")
      +'<br><button class="btn small" style="margin-top:4px;" onclick="openDetail(\''+p.id+'\')">Odayı aç →</button></div>';
  });
  h+='</div>';
  return h;
}
/* Bir odanın kompost geliş kontrolünde eksik/sorunlu maddelerinin kısa listesi */
/* Kompost sıcaklığı için en güncel ölçümü bul (geliş günü ilk değer mi, yoksa sonraki günün tur ölçümü mü) */
function kgGuncelSicaklik(c){
  var sonOlcum=null;
  if(c.gunluk && c.gunluk.length){
    for(var gi=c.gunluk.length-1; gi>=0; gi--){
      var ga=numParse(c.gunluk[gi].kompostC), gu=numParse(c.gunluk[gi].kompostUst);
      if(ga!==null || gu!==null){ sonOlcum={alt:ga, ust:gu, tarih:c.gunluk[gi].tarih}; break; }
    }
  }
  /* KRİTİK FIX: ">" yerine ">=" — geliş GÜNÜ mühendis önce "İlk gün kontrolü" widget'ından
     yüksek bir sıcaklık girmiş olabilir, sonra AYNI GÜN Günlük Tur'dan düşük bir ölçüm eklerse
     (tarihler eşit), eski ">" şartı bunu görmezden gelip eski/yüksek değere takılı kalıyordu. */
  if(sonOlcum && (!c.gelisTarihi || sonOlcum.tarih>=c.gelisTarihi)){
    return {alt:sonOlcum.alt, ust:sonOlcum.ust, kaynak:"tur ("+fmtDate(sonOlcum.tarih)+")"};
  }
  return {alt:numParse(c.kgDereceAlt), ust:numParse(c.kgDereceUst), kaynak:"geliş günü"};
}
/* Nem 3 seçeneğe indirildi (Yüksek/Normal/Düşük). Eski kayıtlarda hâlâ
   İyi/Kuru/Çok kuru/Islak/Çok ıslak olabilir — veri göçü yapmadan burada
   normalize ediyoruz ki hem eski hem yeni kayıtlar aynı mantıkla okunsun. */
function nemNormalize(v){
  if(v==="yuksek"||v==="islak"||v==="cok_islak") return "yuksek";
  if(v==="dusuk"||v==="kuru"||v==="cok_kuru") return "dusuk";
  if(v==="normal"||v==="iyi") return "normal";
  return v||"";
}
/* Kompost geliş sıcaklığı için 3 kademe (kritikUst'ten AYRI — bu ikisi farklı
   amaçlar): 28°'ye kadar sorun yok (madde kapalı). 28-35° arası hâlâ soğuyor,
   hafif ikaz kalır. 35° üstü ACİL: kompost torbaları ıslatılmalı. 35°'nin
   altına düşünce acil ikaz kalkar, hafif ikaza döner (28° altına düşene kadar
   madde tam kapanmaz). */
var KG_SICAK_ORTA = 28, KG_SICAK_YUKSEK = 35;
function kompostEksikMaddeler(c){
  var eksik=[];
  var sic=kgGuncelSicaklik(c); var ko=sic.alt, kou=sic.ust;
  if(ko===null && kou===null) eksik.push("sıcaklık girilmedi");
  else {
    var enY=(ko!==null&&kou!==null)?Math.max(ko,kou):(ko!==null?ko:kou);
    if(enY > KG_SICAK_YUKSEK) eksik.push("sıcaklık ÇOK yüksek — kompost torbalarını ıslat");
    else if(enY > KG_SICAK_ORTA) eksik.push("sıcaklık hâlâ yüksek");
  }
  if(!c.kgIrsaliye) eksik.push("irsaliye?");
  else if(c.kgIrsaliye==="hayir") eksik.push("irsaliye alınmadı");
  if(!(c.kestaneKat && c.kestaneTaraf)) eksik.push("kestane yeri?");
  if(!c.kgNem) eksik.push("nem?");
  else if(nemNormalize(c.kgNem)!=="normal") eksik.push("nem: "+c.kgNem);
  if(!c.kgAmonyak) eksik.push("amonyak?");
  else if(c.kgAmonyak==="belirsiz") eksik.push("amonyak belirsiz — yarınki tur'da bak");
  else if(c.kgAmonyak==="var" && !c.kgAmonyakHavalandirildi){
    var amGun=c.kgAmonyakVarTarihi?(daysBetween(c.kgAmonyakVarTarihi,todayISO())||0):0;
    eksik.push(amGun>=3 ? "amonyak 3+ gündür geçmedi — poşeti kes, kompostu havalandır" : "amonyak var — havalandırılıyor");
  }
  if(!c.kgDuzeltme) eksik.push("düzeltme?");
  else if(c.kgDuzeltme==="gerek") eksik.push("kompost düzeltilmeli");
  return eksik;
}
/* TUR NUMARASI — ortak fonksiyon (SSOT). Bir kez girilir, sonra sadece
   yönetici değiştirebilir. Hasat Takip eşleşmesi (oda+tur) için gereklidir —
   bu girilmeden hasat verisi eşleşmez. Hem renderDetail hem Günlük Tur
   ekranında (turOdaKartIcHTML) aynı mantıkla kullanılır. */
function turNumarasiHTML(c){
  if(!c.tur){
    return '<div style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #f0dede;">'
      + '<b>Tur numarası</b> <span class="muted" style="font-size:12px;">— bir kez girilir, Hasat Takip eşleşmesi için gerekli</span>'
      + '<div style="display:flex; gap:6px; align-items:center; margin-top:6px;">'
      + '<input type="number" inputmode="numeric" id="kg_tur_'+c.id+'" placeholder="örn. 18" style="width:90px; padding:6px;">'
      + '<button class="btn small" onclick="setTurNumarasi(\''+c.id+'\', el(\'kg_tur_'+c.id+'\').value)">Kaydet</button>'
      + '</div></div>';
  }
  var turEditAcik = !!(window._turDegistirAcik && window._turDegistirAcik[c.id]);
  var out = '<div style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #f0dede;">'
    + '<div style="display:flex; justify-content:space-between; align-items:center;">'
    + '<div><b>Tur:</b> '+c.tur+'. tur</div>'
    + (can("manage") ? '<button class="btn ghost small" onclick="turDegistirToggle(\''+c.id+'\')">'+(turEditAcik?"Vazgeç":"Değiştir (yönetici)")+'</button>' : '')
    + '</div>';
  if(turEditAcik){
    out += '<div style="display:flex; gap:6px; align-items:center; margin-top:6px;">'
      + '<input type="number" inputmode="numeric" id="kg_tur_edit_'+c.id+'" value="'+c.tur+'" style="width:90px; padding:6px;">'
      + '<button class="btn small" onclick="setTurNumarasi(\''+c.id+'\', el(\'kg_tur_edit_'+c.id+'\').value)">Güncelle</button>'
      + '</div>';
  }
  out += '</div>';
  return out;
}
/* Tek bir odanın işlem geçmişi (tiftik, toprak, tırmık, ilaçlama vb.) —
   Bugün ekranındaki getRecentActions ile AYNI kaynak/mantık (SSOT), tek
   odaya daraltılmış. "Kim yaptı" bilgisi sistemde tutulmuyor (günlük
   kayıtlarda kişi alanı yok, sadece rol var) — bu yüzden sadece tarih
   gösterilir, kişi uydurulmaz. */
function odaIslemGecmisi(c){
  var out=[];
  (c.gunluk||[]).forEach(function(g){
    var sulama=(g.sulama||"").trim();
    var suVar=(numParse(g.su)>0);
    var islemNot=(g.islemNot||"").trim();
    if(!sulama && !suVar && !islemNot) return;
    var parca=[];
    if(suVar) parca.push(g.su+" lt su"+(sulama?(" + "+sulama):""));
    else if(sulama) parca.push(sulama);
    if(islemNot) parca.push(islemNot);
    out.push({tarih:g.tarih, metin:parca.join(" · ")});
  });
  out.sort(function(a,b){ return cmpDate(b.tarih, a.tarih); });
  return out;
}
function odaIslemGecmisiHTML(c){
  var kayitlar=odaIslemGecmisi(c);
  if(!kayitlar.length){
    return '<div class="muted" style="padding:8px 0;font-style:italic;">Henüz işlem kaydı yok</div>';
  }
  var h='<div style="max-height:260px;overflow-y:auto;">';
  kayitlar.forEach(function(k){
    h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:baseline;font-size:13px;">'
      +'<span style="color:var(--muted);white-space:nowrap;min-width:70px;">'+fmtDate(k.tarih)+'</span>'
      +'<span style="flex:1;">'+esc(k.metin)+'</span>'
      +'</div>';
  });
  h+='</div>';
  return h;
}

function komposGelisKontrolHTML(c){

    }
  }
  var maddeler=[]; /* çözülmemiş (aksiyon gereken) maddeler */

  var sic = kgGuncelSicaklik(c);

    + '<span class="muted">°C</span></div>'
    + '<div class="muted" style="font-size:12px; margin-top:3px;">Not: sonraki günlerde günlük tur ölçümü girersen (Oda kartı → Günlük Kayıt), buradaki ikaz otomatik güncellenir — ayrıca girmene gerek yok.</div>';
  if(ko===null && kou===null){
    maddeler.push(mddSor("1. Kompost sıcaklığı", "Geldiği gün ölç ve gir:", dereceInput));

    var enYuksek = (ko!==null&&kou!==null)?Math.max(ko,kou):(ko!==null?ko:kou);
    var dereceMetni = (ko!==null?ko:"")+(kou!==null?("-"+kou):"")+"° ("+olcumKaynak+")";
    /* KRİTİK: Kompost sıcak gelir (28-35°, hatta üstü), 1-2 günde soğur.
       3 kademe: 28° altı sorun yok · 28-35° hâlâ soğuyor (hafif ikaz kalır) ·
       35° üstü ACİL (kompost torbaları ıslatılmalı) — 35° altına düşünce acil
       ikaz kalkar, hafif ikaza döner (28° altına düşene kadar madde tam kapanmaz). */
    if(enYuksek > KG_SICAK_YUKSEK){

    } else if(enYuksek > KG_SICAK_ORTA){
      maddeler.push(mddBekle("1. Kompost sıcaklığı", dereceMetni+" · hâlâ sıcak — soğuması bekleniyor ("+KG_SICAK_ORTA+"° altına düşünce kapanır)", dereceInput));

    + '<option value="Sağ" '+(c.kestaneTaraf==="Sağ"?"selected":"")+'>Sağ</option>'

function setKG3(id,field,val){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;}); if(!c) return;
  if(field==="kgAmonyak"){
    if(val==="var"){
      /* İlk kez "Var" işaretleniyorsa gün sayacı başlar — tekrar "Var"a
         basılırsa (zaten var'ken) tarihi SIFIRLAMAYIZ, aksi halde 3 günlük
         sayaç hiç ilerlemez. */
      if(c.kgAmonyak!=="var") c.kgAmonyakVarTarihi=todayISO();
    } else {
      /* yok/belirsiz'e dönülürse havalandırma onayını ve gün sayacını temizle */
      c.kgAmonyakHavalandirildi=false;
      c.kgAmonyakVarTarihi="";
    }
  }
  /* Kompost "Düzeltilmeli" işaretlenince kompost indirmeden 1 gün sonraya
     "Kompost düzenleme" planı eklenir (Görevler sekmesinde görünür, ekip
     atanır). Diğer seçeneklerde (Düzgün serilmiş / Düzelttik) hiçbir şey
     yapılmaz. Aynı plan zaten (tamamlanmamış olarak) varsa tekrar eklenmez. */
  if(field==="kgDuzeltme" && val==="gerek"){
    var kiTarih=(c.kompostIndirme&&c.kompostIndirme.tarih)||c.gelisTarihi;
    if(kiTarih){
      var planTarih=addDays(kiTarih,1);
      var zatenVar=(c.odaGorevleri||[]).some(function(g){return g.is==="Kompost düzenleme" && !g.done;});
      if(!zatenVar) odaGorevEkle(id, planTarih, "Kompost düzenleme", "");
    }
  }
  c[field]=val;
  touchCycle(c); saveData(); renderDetail(id);
}

function kompostPlanMesajOlustur(){
  var tarih=el("ind_tarih").value||"";

  var makine=el("ind_makine").value||"";
  var halat=_indSecim.halat||[], ekip1=_indSecim.ekip1||[], ekip2=_indSecim.ekip2||[];
  if(!tarih){ toast("Tarih gir"); return null; }
  if(!kompost){ toast("Kompost gir"); return null; }
  /* Çakışma kontrolü: aynı kişi hem halatta hem indirme ekibinde olamaz */
  var halatSet={}; halat.forEach(function(h){ halatSet[h]=1; });
  var ekip1Cak=ekip1.find(function(e){ return halatSet[e]; });
  if(ekip1Cak){ toast("⚠️ Halat ekibindeki kişi ("+ekip1Cak+") 1. Ekipe seçilemiyor"); return null; }
  var ekip1Set={}; ekip1.forEach(function(e){ ekip1Set[e]=1; });
  var ekip2Cak=ekip2.find(function(e){ return ekip1Set[e]||halatSet[e]; });
  if(ekip2Cak){ toast("⚠️ "+ekip2Cak+" başka bir ekipte zaten seçili — 2. Ekipe eklenemez"); return null; }
  var msg="🥬 KOMPOST İNDİRME PLANI\n\n";
  msg+="📅 "+fmtDate(tarih)+"\n";
  msg+="📦 "+kompost+" Kompost Geliyor\n\n";
  msg+="👷 EKİPLER:\n";
  if(makine) msg+="🔧 Makine Operatörü: "+makine+"\n";
  if(halat.length) msg+="🪢 Halat Ekibi: "+halat.join(", ")+"\n";
  if(ekip1.length) msg+="\n1️⃣ 1. İndirme Ekibi: "+ekip1.join(", ")+"\n";
  if(ekip2.length) msg+="2️⃣ 2. İndirme Ekibi: "+ekip2.join(", ")+"\n";
  msg+="\nSaatler:\nSabah 08:00'de başlayacağız ✓";
  /* Bu bilgi eskiden sadece WhatsApp mesajında kalıp kayboluyordu — artık eşleşen
     aktif odaya kalıcı olarak yazılıyor ki PDF/rapor'da da görünsün. */
  var hedefC=loadData().cycles.find(function(x){ return !x.bosaltimTarihi && normalizeOda(x.oda)===normalizeOda(kompost); });
  if(hedefC){
    hedefC.kompostIndirme={tarih:tarih, makine:makine, halat:halat.join(", "), ekip1:ekip1.join(", "), ekip2:ekip2.join(", ")};
    saveData();
  }
  return msg;
}

/* Bu döngüde hangi ilaç ne zaman uygulanmış, sonraki en erken tekrar tarihi, hasat öncesi bekleme uyarısı */
function ilacGecmisi(c){
  var L=getIlacList(); if(!L.length) return [];
  var gunluk=(c.gunluk||[]).filter(function(r){return r.sulama;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  var out=[];
  L.forEach(function(ilac){
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    var kullanim=gunluk.filter(function(r){return re.test(r.sulama);});
    if(!kullanim.length) return;
    var son=kullanim[kullanim.length-1].tarih;
    var sonrakiTekrar = (ilac.tekrarGun!=null) ? addDays(son, ilac.tekrarGun) : null;
    var uyari=[];
    if(sonrakiTekrar && sonrakiTekrar>todayISO() && !c.bosaltimTarihi) uyari.push("En erken tekrar: "+fmtDate(sonrakiTekrar)+" (min "+ilac.tekrarGun+" gün ara)");
    if(ilac.hasatGun!=null){
      (c.hasat||[]).forEach(function(h){
        var fark=daysBetween(son, h.tarih);
        if(fark!=null && fark>=0 && fark<ilac.hasatGun){
          uyari.push("⚠️ "+fmtDate(h.tarih)+" hasadı, son uygulamadan "+fark+" gün sonra — hasat öncesi bekleme ("+ilac.hasatGun+" gün) dolmamış olabilir");
        }
      });
    }
    out.push({ad:ilac.ad, son:son, sayi:kullanim.length, uyari:uyari});
  });
  return out;
}
function ilacTekrarKontrolMesaji(c, tarih, sulamaTxt){
  if(!sulamaTxt) return [];
  var out=[];
  getIlacList().forEach(function(ilac){
    if(ilac.tekrarGun==null) return;
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    if(!re.test(sulamaTxt)) return;
    var gecmis=(c.gunluk||[]).filter(function(r){return r.sulama && re.test(r.sulama) && r.tarih!==tarih;});
    if(!gecmis.length) return;
    var sonOnceki=gecmis.slice().sort(function(a,b){return cmpDate(b.tarih,a.tarih);})[0];
    var fark=daysBetween(sonOnceki.tarih, tarih);
    if(fark!=null && fark>=0 && fark<ilac.tekrarGun){
      out.push(esc(c.oda||"")+": "+esc(ilac.ad)+" son uygulamadan ("+fmtDate(sonOnceki.tarih)+") "+fark+" gün sonra tekrar giriliyor — önerilen min. ara "+ilac.tekrarGun+" gün.");
    }
  });
  return out;
}

   tüm formu sıfırlamadan (girilen diğer alanları kaybetmeden) günceller. */
function formOdaDegisti(){
  var sel = el("f_oda"); var box = el("f_hastalik_uyari");
  if(!sel || !box) return;
  box.innerHTML = odaGecmisHastalikHTML(sel.value, _formEditId||null);

/* SSOT: Tiftik/Toprak/Tırmık artık BURADAN girilmiyor — tek giriş kapısı Günlük Tur'un
   "detay kutusu". Eskiden burada da ayrı bir form vardı; iki giriş noktası aynı veriye
   farklı şekilde yazınca (biri sessizce reddedebiliyordu — bkz. oncekiAdimTamamMi)
   kafa karıştırıyordu. Şimdi sadece son durumu gösterir. */
function stepBlock(key,label,c){
  function v(k){ return c && c[k]!=null ? c[k] : ""; }
  var tarih=v(key+"Tarihi"), personel=v(key+"Personel"), dogru=v(key+"Dogru"), not_=v(key+"Not");
  var h='<div style="font-weight:600;margin-bottom:4px;">'+esc(label)+'</div>';
  if(!tarih){
    h+='<div class="muted" style="font-size:13px;margin-bottom:6px;">Henüz yapılmadı.</div>';
  } else {
    h+='<div style="font-size:14.5px;">'+fmtDate(tarih)+(dogru?' <span style="color:#1f7a4d;">✓</span>':'')
      +(personel?(' · <span class="muted">'+esc(personel)+'</span>'):'')+'</div>';
    if(not_) h+='<div class="muted" style="font-size:12.5px;margin-top:2px;">'+esc(not_)+'</div>';
  }
  if(c && c.id) h+='<button class="btn ghost small" style="margin-top:6px;" onclick="turOdadaAc(\''+c.id+'\')">📋 '+(tarih?"Tur\u2019dan d\u00fczenle":"Tur\u2019dan gir")+'</button>';
  return h;
}
function opt(value,c,key,label){
  var sel = (c && (c[key]||"")===value) ? "selected" : "";
  return '<option value="'+esc(value)+'" '+sel+'>'+esc(label)+'</option>';
}

/* Üst sabit geri butonu — alt sayfalarda görünür, mantıklı yere döner */
var HDR_BACK_HEDEF={

/* Tiftik/toprak/tırmık/hava alanı ilk kez set edilince ilgili protokol görevini
   tamamlandı işaretler ve (tarih bugünse) günlük kayda otomatik not düşer.
   "Bilgileri düzenle" formu ve hızlı tur ekranındaki "işaretle" butonları
   bu TEK fonksiyonu ortak kullanır — iki yerde ayrı ayrı yazılıp birbirinden
   kopmasınlar diye (daha önce tam bu yüzden bir hata olmuştu). */
function protokolGoreviTamamla(c, key, tarih){
  var pi=protokolRolIdx(key); if(pi<0) return;
  /* SSOT: tek yazma kapısından geç — bayrak, özel tarih ve günlük not birlikte yazılır */
  adimTamamla(c, pi, {tarih:tarih});
}
/* Tiftik/Toprak/Tırmık/Hava'nın "Bilgileri düzenle" formunda ZATEN özel alanları var
   (c.tiftikTarihi vb.) — bunların protokoldeki karşılık geldiği satır index'lerini bulur,
   böylece "Diğer Üretim İşlemleri" listesi bu 4'ünü TEKRAR göstermez. */
function dedicatedAdimIdx(){
  var out={};
  ["tiftik","toprak","tirmik","hava"].forEach(function(key){
    var pi=protokolRolIdx(key);
    if(pi>=0) out[pi]=key;
  });
  return out;
}
/* Diğer Üretim İşlemleri (poşet, oda yıkama, hasat vb.) için geçmişe yönelik düzenlenebilir satır.
   c.done["p"+idx] = yapıldı mı, c.adimDetay["p"+idx] = {tarih, not} — tarihi geçmişe de ayarlayabilirsin. */
function genericStepBlock(idx, s, c){
  var ad=(c && c.adimDetay && c.adimDetay["p"+idx]) || {};
  var done=!!(c && c.done && c.done["p"+idx]);
  return '<div style="padding:8px 0;border-bottom:1px solid #eee;">'
    +'<div class="chk" style="margin-bottom:4px;"><input type="checkbox" id="f_adim_'+idx+'_d" '+(done?"checked":"")+'><label>'+esc(s.txt)+'</label></div>'
    +'<div class="field-row"><div><label>Tarih (yapıldıysa)</label><input type="date" id="f_adim_'+idx+'_t" value="'+esc(ad.tarih||"")+'"></div>'
    +'<div><label>Not</label><input type="text" id="f_adim_'+idx+'_n" value="'+esc(ad.not||"")+'" placeholder="opsiyonel"></div></div>'
    +'</div>';
}
function saveForm(id){
  if(!can("edit")) return noPerm();
  var d = loadData();
  var c = id ? d.cycles.find(function(x){return x.id===id;}) : {id:uid(), gunluk:[], hava:[]};
  if(id && c && formBase.at && c._at && c._at!==formBase.at && c._by!==deviceName()){
    if(!confirm("Bu oda '"+(c._by||"?")+"' tarafından "+fmtDateTime(c._at)+" değiştirildi.\nSenin kaydın onun değişikliklerini ezecek.\n\nTamam = yine de kaydet · İptal = güncel halini göster")){
      openDetail(c.id); return;
    }
  }
  var odaRaw = el("f_oda").value;
  if(!odaRaw.trim()){ toast("Oda seç"); return; }
  var odaN = normalizeOda(odaRaw);
  /* MÜKERRER ENGELİ: yeni döngüde (veya oda değiştirilirken) aynı odada aktif döngü varsa engelle */
  var mevcutBosaltim = el("f_bosalt").value;
  if(!mevcutBosaltim){ /* bu döngü aktif olacaksa */
    var cakisan = d.cycles.filter(function(x){
      return normalizeOda(x.oda)===odaN && !x.bosaltimTarihi && x.id!==(id||"");
    })[0];
    if(cakisan){
      toast(odaN+" odasında zaten aktif kompost var — önce boşalt");
      return;
    }
  }
  c.oda = odaN;
  var _fv=el("f_firma").value; c.kompostFirma=(_fv==="__new__"?"":_fv);
  c.tonaj = el("f_tonaj").value.trim();
  var alanGirilen = el("f_alan").value.trim();
  /* m² boş bırakıldıysa oda tanımındaki sabit m²'yi kullan */
  if(!alanGirilen){
    var sabitM2 = odaM2Get(odaN);
    c.alanM2 = sabitM2!==null ? String(sabitM2) : "";
  } else {
    c.alanM2 = alanGirilen;
  }
  c.gelisTarihi = el("f_gelis").value;
  c.partiNo = partiFromDate(c.gelisTarihi);
  /* Tiftik/Toprak/Tırmık artık bu formdan yazılmıyor — SSOT: tek giriş kapısı
     Günlük Tur'un detay kutusu (adimDetayKaydet). Burada sadece stepBlock ile
     salt-okunur gösteriliyor. */
  /* Diğer Üretim İşlemleri (poşet, oda yıkama, hasat vb.) — geçmişe yönelik düzenleme.
     SSOT: her adım tek kapıdan (adimTamamla/adimGeriAl) yazılır. */
  if(!c.done) c.done={};
  if(!c.adimDetay) c.adimDetay={};
  var dedIdxSave=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdxSave[idx]) return;
    var dEl=el("f_adim_"+idx+"_d"); if(!dEl) return;
    var tEl=el("f_adim_"+idx+"_t"), nEl=el("f_adim_"+idx+"_n");
    var yeniTarih=(tEl?tEl.value:"")||todayISO();
    var notDeg=(nEl?nEl.value.trim():"");
    var eskiDone=adimGercektenYapildiMi(c, idx, s);
    if(dEl.checked){
      /* adimTamamla sıra engelini kendi döndürür; hasat sırası tutmuyorsa işareti geri al */
      if(!adimTamamla(c, idx, {tarih:yeniTarih, not:notDeg, sessiz:true})){
        dEl.checked=false;
      } else if(yeniTarih){
        /* Ana Ekran "Bugün işlem" sütunu günlük kayıttan beslenir — o tarihe not düş */
        gunlukNotTariheEkle(c, yeniTarih, s.txt+" yapıldı");
      }
    } else if(eskiDone){
      adimGeriAl(c, idx);
    }
  });
  /* Hava başlangıcı: özel alan + bayrak SSOT senkronu — tek kaynak, iki gösterim tutarlı */
  var eskiHava = c.havaBaslangic;
  var yeniHava = el("f_hava").value;
  if(yeniHava && yeniHava!==eskiHava){
    var hiA=protokolRolIdx("hava");
    if(hiA>=0) adimTamamla(c, hiA, {tarih:yeniHava, sessiz:(yeniHava!==todayISO())});
    else c.havaBaslangic=yeniHava;
  } else if(!yeniHava && eskiHava){
    var hiB=protokolRolIdx("hava");
    if(hiB>=0) adimGeriAl(c, hiB); else c.havaBaslangic="";
  }
  c.kestaneKat = el("f_kkat").value.trim();
  c.kestaneTaraf = el("f_ktaraf").value;
  c.bosaltimTarihi = el("f_bosalt").value;
  c.offsets={};
  [["offTiftik","f_o_tiftik"],["offToprak","f_o_toprak"],["offTirmik","f_o_tirmik"],["offHava","f_o_hava"],["offHasat","f_o_hasat"]].forEach(function(pr){
    var e2=el(pr[1]); var vv=e2?e2.value.trim():""; if(vv!=="" && !isNaN(parseInt(vv,10))) c.offsets[pr[0]]=parseInt(vv,10);
  });
  if(!id){
    /* Oda oluşturmak = kompostu koymak = kompostu indirmek. Kompost İndirme Planı
       (WhatsApp) formu daha önce/sonra daha detaylı bilgiyle (makine/ekip) üzerine
       yazabilir; burada sadece zaten boşsa dolduruyoruz. */
    if(!c.kompostIndirme || !c.kompostIndirme.tarih) c.kompostIndirme={tarih:c.gelisTarihi};
    d.cycles.push(c);
  }
  touchCycle(c);
  saveData();
  logAudit(id?"oda bilgisi güncellendi":"oda oluşturuldu", c.oda);
  toast("Kaydedildi");
  openDetail(c.id);
}

/* Su miktarı — kaydırmalı (slider), 100 lt adımlarla */

    +'<span id="'+id+'_lbl" style="min-width:66px; font-weight:600; text-align:right;">'+v+' lt</span>'

/* İlaç seçimi + doz — kaydırmalı (slider), 50 ml adımlarla. Seçilince metin alanını otomatik doldurur. */
function ilacDozPickerHTML(selectId, dozId, targetTextId){
  var IL=getIlacList();
  var opts='<option value="">— ilaç yok / elle yaz —</option>'
    + IL.map(function(x){ return '<option value="'+esc(x.ad)+'">'+esc(x.ad)+'</option>'; }).join("");
  return '<label>İlaç / ürün (opsiyonel)</label>'
    +'<select id="'+selectId+'" onchange="sulamaMetniGuncelle(\''+selectId+'\',\''+dozId+'\',\''+targetTextId+'\')">'+opts+'</select>'
    +'<label>Doz (ml)</label>'
    +'<div style="display:flex; align-items:center; gap:10px;">'
    +'<input type="range" id="'+dozId+'" min="0" max="2000" step="50" value="0" '
    +'oninput="el(\''+dozId+'_lbl\').textContent=this.value+\' ml\'; sulamaMetniGuncelle(\''+selectId+'\',\''+dozId+'\',\''+targetTextId+'\');" style="flex:1; height:34px;">'
    +'<span id="'+dozId+'_lbl" style="min-width:66px; font-weight:600; text-align:right;">0 ml</span>'
    +'</div>';
}
function sulamaMetniGuncelle(selectId, dozId, targetTextId){
  var sel=el(selectId), doz=el(dozId), target=el(targetTextId);
  if(!sel || !doz || !target) return;
  var ilac=sel.value, d=parseInt(doz.value,10)||0;
  if(ilac && d>0) target.value = d+" ml "+ilac;
  else if(ilac && d===0) target.value = ilac;
  /* KRİTİK: dropdown "— ilaç yok / elle yaz —"e (boş değer) geri alınırsa metni
     TEMİZLE. Eskiden burada hiçbir şey yapılmıyordu ("elle not girilebilsin"
     diye) — ama o ana kadar zaten bu picker'ın kendisi metni ezmiş oluyordu
     (yukarıdaki satırlar), yani o noktada korunacak "elle yazılmış" bir metin
     kalmıyordu. Sonuç: yanlış ilaç/doz seçilince İPTAL ETMENİN hiçbir yolu
     yoktu — kullanıcı elle metin kutusuna girip silmek zorunda kalıyordu. */
  else if(!ilac) target.value = "";
}
/* Sulama/İlaçlama alanını + picker'ı (ilaç seçimi, doz slider'ı) tek dokunuşla
   sıfırlar — yanlış girilen bir değeri elle metin kutusuna girip silmek yerine
   tek bir "✕ Temizle" butonuyla iptal edebilmek için. */
function sulamaTemizle(selectId, dozId, targetTextId){
  var sel=el(selectId), doz=el(dozId), target=el(targetTextId), lbl=el(dozId+"_lbl");
  if(target) target.value="";
  if(sel) sel.value="";
  if(doz) doz.value="0";
  if(lbl) lbl.textContent="0 ml";
}
function addGunluk(id){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("Kayıt bulunamadı"); return; }
  var t = el("g_tarih").value;
  if(!t){ toast("Tarih seç"); return; }
  if(!c.gunluk) c.gunluk=[];
  var prev = (editGun>=0 && c.gunluk[editGun]) ? c.gunluk[editGun] : {};
  var caEl=el("g_co2a"), cuEl=el("g_co2u"), vkEl=el("g_vakit"), suEl=el("g_su"), amEl=el("g_amonyak"), nemEl=el("g_nem");
  var sulamaTxt=el("g_sulama").value.trim(), suTxt=(suEl?suEl.value.trim():(prev.su||""));
  var problems=gunlukKontrolMesaji(c, t, !!(sulamaTxt||suTxt));
  if(problems.some(function(p){return p.tip==="blockAll";})){
    showWarnBox("Kaydedilemedi", problems.map(function(p){return p.metin;}));
    return;
  }
  var blockSulama=problems.some(function(p){return p.tip==="blockSulama";});
  var rec = {tarih:t, vakit:(vkEl?vkEl.value:(prev.vakit||"")), odaC:el("g_oda").value.trim(), kompostC:el("g_komp").value.trim(), kompostUst:(el("g_kompust")?el("g_kompust").value.trim():(prev.kompostUst||"")), klimaC:(el("g_klima")?el("g_klima").value.trim():""), co2alt:(caEl?caEl.value.trim():(prev.co2alt||"")), co2ust:(cuEl?cuEl.value.trim():(prev.co2ust||"")), amonyak:(amEl?amEl.value:(prev.amonyak||"")), nem:(nemEl?nemEl.value:(prev.nem||"")), su:(blockSulama?"":suTxt), sulama:(blockSulama?"":sulamaTxt)};
  if(editGun>=0 && c.gunluk[editGun]){ c.gunluk[editGun]=rec; editGun=-1; toast(blockSulama?"Güncellendi (sulama hariç)":"Kayıt güncellendi"); }
  else { c.gunluk.push(rec); toast(blockSulama?"Eklendi (sulama hariç)":"Kayıt eklendi"); }
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("günlük kaydı", c.oda+" · "+t);
  if(blockSulama) showWarnBox("Kısmen kaydedildi", problems.map(function(p){return p.metin;}));
  else { var ilacWarn=ilacTekrarKontrolMesaji(c,t,rec.sulama); if(ilacWarn.length) showWarnBox("İlaç tekrar aralığı uyarısı", ilacWarn); }
  renderDetail(id);
}
function delGunluk(id,i){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c||!c.gunluk) return;
  c.gunluk.splice(i,1); editGun=-1; saveData(); renderDetail(id);
}

  /* Üretim protokolündeki TÜM olay adımları — dinamik, kod değişmeden yeni
     bir protokol satırı eklenirse (rol atanmış olsun ya da olmasın, örn.
     "+ Yeni görev ekle"den eklenen özel bir adım) burada da otomatik çıkar.
     Not: eskiden sadece rol'ü OLAN satırlar listeleniyordu — kullanıcının

  var islemSecenekleri = getProtokol().map(function(s,idx){return {s:s,idx:idx};})

  for(var i=bas;i<=son;i++){

    var seciliIdx="";
    islemSecenekleri.forEach(function(x){
      if(seciliIdx!=="") return;
      if(adimYapilmaTarihi(c, x.idx, x.s)===tarih) seciliIdx=x.idx;

function topluRangeUygula(id){
  var bas=parseInt(el("tp_bas").value,10), son=parseInt(el("tp_son").value,10);
  if(isNaN(bas)) bas=0; if(isNaN(son)) son=bas;
  if(bas<0){ bas=0; toast("Geliş tarihinden önceki günler girilemez (0'dan başlar)"); }
  if(son<bas) son=bas;

}
function topluKaydet(id, bas, son){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("Kayıt bulunamadı"); return; }
  if(!c.gunluk) c.gunluk=[];
  var eklenen=0, guncellenen=0, islemSayisi=0; var warnLines=[]; var warnSet={};
  var islemSecenekleri = getProtokol().map(function(s,idx){return {s:s,idx:idx};})
    .filter(function(x){ return !x.s.silindi && x.s.tip==="olay"; });
  for(var i=bas;i<=son;i++){
    var oda=el("tp_oda_"+i).value.trim(), komp=el("tp_komp_"+i).value.trim(), sul=el("tp_sul_"+i).value.trim(), su=el("tp_su_"+i).value.trim();
    var islemSecEl=el("tp_islem_"+i); var islemIdxStr=islemSecEl?islemSecEl.value:"";
    var tarih = addDays(c.gelisTarihi, i);
    /* Üretim işlemi seçildiyse SSOT kapısından kaydet — Tur'daki detay kutusuyla
       AYNI fonksiyon (adimTamamla), sadece giriş yeri farklı. Geçmiş günü unutmuşsan
       buradan hızlıca tamamlarsın. */
    if(islemIdxStr){
      var secX=islemSecenekleri.find(function(x){return (""+x.idx)===islemIdxStr;});
      if(secX && adimYapilmaTarihi(c, secX.idx, secX.s)!==tarih){
        if(adimTamamla(c, secX.idx, {tarih:tarih})) islemSayisi++;
        else warnLines.push(fmtDate(tarih)+": "+secX.s.txt+" kaydedilmedi — önceki adım henüz tamamlanmamış");
      }
    }
    if(!oda && !komp && !sul && !su) continue; /* günlük ölçüm satırı boş, atla (işlem yine de yukarıda kaydedildi) */
    var problems=gunlukKontrolMesaji(c, tarih, !!(sul||su));
    var blockAll=problems.some(function(p){return p.tip==="blockAll";});
    var blockSulama=problems.some(function(p){return p.tip==="blockSulama";});
    problems.forEach(function(p){ if(!warnSet[p.metin]){ warnSet[p.metin]=true; warnLines.push(p.metin); } });
    if(blockAll) continue; /* bu gün tamamen atlandı */
    if(blockSulama){ sul=""; su=""; if(!oda && !komp) continue; }
    var idx=-1; for(var k=0;k<c.gunluk.length;k++){ if(c.gunluk[k].tarih===tarih){ idx=k; break; } }
    var rec = idx>=0 ? c.gunluk[idx] : {tarih:tarih};
    rec.odaC=oda; rec.kompostC=komp; rec.sulama=sul; rec.su=su;
    if(idx>=0){ c.gunluk[idx]=rec; guncellenen++; } else { c.gunluk.push(rec); eklenen++; }
  }
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("toplu veri girişi", c.oda+" · "+eklenen+" yeni, "+guncellenen+" güncellendi"+(islemSayisi?", "+islemSayisi+" üretim işlemi":""));
  toast((eklenen+guncellenen+islemSayisi) ? (eklenen+" yeni, "+guncellenen+" güncellendi"+(islemSayisi?", "+islemSayisi+" işlem kaydedildi":"")) : "Hiçbir satır dolu değildi");
  if(warnLines.length) showWarnBox("Bazı günler/işlemler atlandı", warnLines);
  _topluRange=null; go("detail",id);
}
function addHava(id){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("Kayıt bulunamadı"); return; }
  var t = el("h_tarih").value;
  if(!t){ toast("Tarih seç"); return; }
  if(!c.hava) c.hava=[];
  /* Aynı tarihe ikinci kez elle satır girilirse (örn. düzeltme) üzerine yazar —
     havaPlaniOlustur() ile aynı desen. Aksi halde aynı tarihte iki satır oluşur
     ve havaHedefSatiri() ilk (eski) satırı seçmeye devam eder, düzeltme sessizce
     yok sayılmış gibi görünür. */
  var satir={tarih:t, hedefC:el("h_temp").value.trim(), co2alt:el("h_alt").value.trim(), co2ust:el("h_ust").value.trim()};
  var haIdx=c.hava.findIndex(function(r){ return r.tarih===t; });
  if(haIdx>=0) c.hava[haIdx]=satir; else c.hava.push(satir);
  c.hava.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  saveData(); toast(haIdx>=0?"Havalandırma satırı güncellendi":"Havalandırma satırı eklendi"); renderDetail(id);
}
/* Havaya başlama kademeli plan: başlangıçtan hedefe, seçilen gün sayısında
   doğrusal (eşit adımlarla) düşürülür — hem oda sıcaklığı hem CO₂ için aynı
   gün sayısı kullanılır (mühendis kararı, tipik 4 veya 5 gün). Gün 0 =
   c.havaBaslangic (henüz işaretlenmediyse bugün); gün N = hedef değerler.
   Aynı tarihte satır zaten varsa üzerine yazılır (kopya oluşmaz), böylece
   plan yanlış girilirse tekrar oluşturup düzeltilebilir. */
function havaPlaniOlustur(id){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("Kayıt bulunamadı"); return; }
  var gunSayisi = parseInt(el("hp_gun").value,10);
  var odaBas = numParse(el("hp_oda_bas").value), odaHedef = numParse(el("hp_oda_hedef").value);
  if(!gunSayisi || gunSayisi<1){ toast("Gün sayısı gir (örn. 4 veya 5)"); return; }
  if(odaBas===null || odaHedef===null){ toast("Başlangıç ve hedef Oda °C gir"); return; }
  var co2AltBas = numParse(el("hp_co2alt_bas").value), co2AltHedef = numParse(el("hp_co2alt_hedef").value);
  var co2UstBas = numParse(el("hp_co2ust_bas").value), co2UstHedef = numParse(el("hp_co2ust_hedef").value);
  var baz = c.havaBaslangic || todayISO();
  if(!c.hava) c.hava=[];
  for(var i=0;i<=gunSayisi;i++){
    var t = addDays(baz, i);
    var oran = i/gunSayisi;
    var satir = { tarih:t, hedefC: ""+(Math.round((odaBas+(odaHedef-odaBas)*oran)*10)/10), co2alt:"", co2ust:"" };
    if(co2AltBas!==null && co2AltHedef!==null) satir.co2alt = ""+Math.round(co2AltBas+(co2AltHedef-co2AltBas)*oran);
    if(co2UstBas!==null && co2UstHedef!==null) satir.co2ust = ""+Math.round(co2UstBas+(co2UstHedef-co2UstBas)*oran);
    var idx = c.hava.findIndex(function(r){ return r.tarih===t; });
    if(idx>=0) c.hava[idx]=satir; else c.hava.push(satir);
  }
  c.hava.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("havalandırma planı oluşturuldu", c.oda+" · "+gunSayisi+" gün, "+odaBas+"°→"+odaHedef+"°");
  toast(gunSayisi+" günlük plan oluşturuldu"); renderDetail(id);
}

/* ---------- Dışa / İçe aktarım ---------- */
function download(filename, text, mime){
  var blob = new Blob([text], {type:mime||"text/plain;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}
function backupJSON(){
  var photos={}, formPhotos={};
  ((memData&&memData.cycles)||[]).forEach(function(c){
    var arr=loadImgs(c.id); if(arr&&arr.length) photos[c.id]=arr;
    var farr=loadFormImgs(c.id); if(farr&&farr.length) formPhotos[c.id]=farr;
  });
  var out={cycles:(memData.cycles||[]), settings:(memData.settings||{}), gorevler:(memData.gorevler||[]), photos:photos, formPhotos:formPhotos};
  download("uretim_takip_yedek_"+todayISO()+".json", JSON.stringify(out,null,2), "application/json");
  setLastBackup();
  toast("Yedek indirildi (fotoğraflar dahil)");
}
function restoreJSON(file){
  var r = new FileReader();
  r.onload = function(){
    try{
      var obj = JSON.parse(r.result);
      if(!obj.cycles) throw new Error("geçersiz");
      memData = {cycles:obj.cycles, settings:obj.settings||{}, gorevler:obj.gorevler||[]};
      /* KRİTİK: Kullanıcı elle bir dosya seçip "bunu kullan" dedi — bu, buluttaki
         güncel hali bekleme güvenlik kilidinden (fbPushSettings içindeki
         _settingsFirstSyncDone) daha yetkilidir. Kilit henüz açılmamışsa (örn.
         sayfa yeni açıldıysa, bulut ilk senkron gelmeden) saveData() sessizce
         hiçbir şey göndermez — veri sadece cihazda kalır, buluta hiç gitmez, ve
         başka bir cihaz açıldığında hâlâ eski buluttaki veri görünür. Bu yüzden
         restore'da kilidi açıkça geçersiz kılıyoruz: kullanıcının seçimi, "henüz
         bulutu görmedik" temkinliliğinden önceliklidir. */
      _settingsFirstSyncDone = true;
      saveData();
      if(obj.photos){ Object.keys(obj.photos).forEach(function(id){ saveImgs(id, obj.photos[id]); }); }
      if(obj.formPhotos){ Object.keys(obj.formPhotos).forEach(function(id){ saveFormImgs(id, obj.formPhotos[id]); }); }
      toast("Geri yüklendi — buluta gönderiliyor..."); go("bugun");
    }catch(e){ toast("Dosya okunamadı"); }
  };
  r.readAsText(file);
}

   aynı veri kaynağı — c.odaGorevleri — sadece bu odaya daraltılmış). */
function odaBugunGorevleriHTML(c){

  var gorevler=(c.odaGorevleri||[]).filter(function(og){return !og.done && og.tarih<=bugun;});
  if(!gorevler.length) return '';
  gorevler.sort(function(a,b){return (a.tarih<b.tarih)?-1:1;});
  var h='<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line);">'
    +'<div style="font-weight:600;font-size:13px;margin-bottom:6px;">📋 Bugünkü İşler</div>';

/* Ortak günlük kayıt mantığı: hem Günlük Tur hem Ana Ekran (panoEdit) bunu kullanır —
   böylece hangi ekrandan girilirse girilsin AYNI kurallarla AYNI kayda (tarih+vakit) yazılır.
   patch: {odaC, kompostC, kompostUst, klimaC, co2alt, co2ust, su, sulama} */
/* Olağandışı sıcaklık değeri (45°C kompost, eksi değer gibi) sessizce kabul edilmesin —
   çoğunlukla fazladan rakam (450→45) veya yanlış eksi işareti hatasıdır. Gerçek acil
   durumlar da olabileceği için (ateşlenme 28-30°ye çıkabilir) TAM ENGELLEMİYORUZ,
   sadece "emin misin?" diye soruyoruz. */
function sicaklikSupheliMi(alanlar){
  var supheliler=alanlar.filter(function(a){ return a.deger!==null && (a.deger<0 || a.deger>45); });
  if(!supheliler.length) return null;
  return supheliler.map(function(a){ return a.ad+": "+a.deger+"°"; }).join(", ");
}
/* Mobil klavyede "ileri" tuşuna basınca aynı kart içindeki sıradaki alana otomatik geçer.
   Günde onlarca oda × birkaç alan = yüzlerce dokunuş — küçük ama birikimli bir hız kazancı. */
function odakIlerlet(elm){
  var card = elm.closest('.card'); if(!card) return;
  var focusable = card.querySelectorAll('input:not([type=hidden]):not([type=checkbox]):not([type=range]), select');
  var arr = Array.prototype.slice.call(focusable);
  var idx = arr.indexOf(elm);
  if(idx>=0 && idx<arr.length-1){
    var next=arr[idx+1]; next.focus();
    try{ if(next.select) next.select(); }catch(e){}
  }
}
function gunlukKaydet(c, t, vk, patch, warnLines){
  if(!c) return 0;
  var oda=patch.odaC||"", komp=patch.kompostC||"", kompUst=patch.kompostUst||"",
      klima=patch.klimaC||"", a=patch.co2alt||"", u=patch.co2ust||"",
      sul=patch.sulama||"", suV=patch.su||"",
      amonyak=patch.amonyak||"", nem=patch.nem||"";
  if(!oda && !komp && !kompUst && !klima && !a && !u && !sul && !suV && !amonyak && !nem) return 0;
  var supheMetni=sicaklikSupheliMi([
    {ad:"Oda °C", deger:numParse(oda)}, {ad:"Komp °C alt", deger:numParse(komp)},
    {ad:"Komp °C üst", deger:numParse(kompUst)}, {ad:"Klima °C", deger:numParse(klima)}
  ]);
  if(supheMetni && !confirm("⚠️ Olağandışı değer(ler):\n"+supheMetni+"\n\nFazladan rakam ya da yanlış eksi işareti girmiş olabilirsin.\n\nYine de kaydedilsin mi?")){
    return 0;
  }
  var problems=gunlukKontrolMesaji(c, t, !!(sul||suV));
  if(problems.some(function(p){return p.tip==="blockAll";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    return 0;
  }
  if(problems.some(function(p){return p.tip==="blockSulama";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    sul=""; suV="";
    if(!oda && !komp && !kompUst && !klima && !a && !u){ return 0; }
  }
  if(!c.gunluk) c.gunluk=[];
  if(sul){ ilacTekrarKontrolMesaji(c,t,sul).forEach(function(m){warnLines.push(m);}); }
  /* KRİTİK: Artık Sabah/Akşam ayrı kayıt tutulmuyor — günde TEK kayıt var.
     Vakit sadece "en son ne zaman girildi" bilgisi olarak saklanır, arama/eşleştirme
     sadece tarihe göre yapılır. Böylece aynı gün için iki ayrı (biri boş, biri dolu)
     satır oluşmaz. */
  var ex=c.gunluk.find(function(r){return r.tarih===t;});
  if(ex){
    /* Form her zaman görünen alanların TAMAMINI gönderir — boş bırakılan alan
       "dokunma" değil "temizle" demektir. Aksi halde yanlışlıkla eklenmiş bir
       not (örn. otomatik "ertelendi" notu) kullanıcı silip kaydetse bile geri gelirdi. */
    ex.vakit=vk;
    ex.odaC=oda; ex.kompostC=komp; ex.kompostUst=kompUst;
    ex.klimaC=klima; ex.co2alt=a; ex.co2ust=u;
    ex.sulama=sul; ex.su=suV;
    ex.amonyak=amonyak; ex.nem=nem;
  } else {
    c.gunluk.push({tarih:t,vakit:vk,odaC:oda,kompostC:komp,kompostUst:kompUst,klimaC:klima,co2alt:a,co2ust:u,su:suV,sulama:sul,amonyak:amonyak,nem:nem});
  }
  c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);});
  return 1;
}
/* Tek bir oda kartındaki verileri kaydeder. Döndürür: 1 (kaydedildi) / 0 (boş, atlandı) */
function turKaydetKart(card, t, vk, warnLines){
  var d=loadData();
  var cid=card.getAttribute('data-cid');
  var c=d.cycles.find(function(x){return x.id===cid;}); if(!c) return 0;
  var g=function(sel){ var e=card.querySelector(sel); return e?e.value.trim():""; };
  var patch={
    odaC: g('.tur_oda'), kompostC: g('.tur_komp'), kompostUst: g('.tur_kompust'), klimaC: g('.tur_klima'),
    co2alt: g('.tur_co2a'), co2ust: g('.tur_co2u'), sulama: g('.tur_sulama'), su: g('.tur_su')
  };
  return gunlukKaydet(c, t, vk, patch, warnLines);
}

/* ---------- Bulut yedek (Firebase) — cihaz kırılsa/kaybolsa bile veri güvende ----------
   Yerel yedek (yukarıdaki autoSnapshot) sadece BU cihazda kalır. Bu fonksiyon aynı
   anlık görüntüyü Firestore'a da yazar: farms/{FARM_CODE}/yedekler/{docId}.
   Zamanlama: uygulama açıkken her CLOUD_BACKUP_DAKIKA dakikada bir dener (kesin saat
   garantisi değil — sunucusuz bir PWA'da bu ancak Cloud Functions gibi ayrı bir
   arka uç ile mümkün olur; ama sahada uygulama gün boyu defalarca açıldığı için
   pratikte çok yakın sonuç verir).
   Rotasyon: her yedekleme ANINA (aktif_<ms>, arsiv_<ms>) özel bir doküman —
   önceki yedeği EZMEZ, gerçek geçmiş listesi oluşur. Sınırsız büyümesin diye
   günde bir kez otomatik temizlik yapılır (bkz. cloudYedekEskiSil): hem
   CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayısını aşan kayıtlar silinir (hangisi daha kısıtlayıcıysa). */
var CLOUD_BACKUP_DAKIKA = 5; /* eskiden 4 saatti — kullanıcı iste diğiyle 5 dakikaya düşürüldü */
var CLOUD_BACKUP_RETENTION_GUN = 7; /* bu kadar günden eski bulut yedekleri otomatik silinir */
var CLOUD_BACKUP_MAX_KAYIT = 30; /* en fazla bu kadar yedek noktası tutulur (7 gün içinde bile olsa) */
var CLOUD_YEDEK_LIMIT = 700000; /* güvenli karakter sınırı — Firestore'un 1MB doküman limitine karşı tampon */
function getLastCloudBackup(){ try{ return localStorage.getItem("utp_cloudbak_last")||null; }catch(e){ return null; } }
function setLastCloudBackup(){ try{ localStorage.setItem("utp_cloudbak_last", ""+Date.now()); }catch(e){ console.warn("bulut yedek zamanı kaydedilemedi", e); } updateCloudBakBadge(); }
/* Header'daki küçük "☁️ X önce" rozeti — göreli zaman, dakikada bir tazelenir (bkz. setInterval) */
function zamanOnce(ms){
  if(!ms) return "";
  var fark=Date.now()-ms;
  if(fark<60000) return "az önce";
  var dk=Math.floor(fark/60000);
  if(dk<60) return dk+" dk önce";
  var sa=Math.floor(dk/60);
  if(sa<24) return sa+" saat önce";
  var gun=Math.floor(sa/24);
  return gun+" gün önce";
}
function updateCloudBakBadge(){
  var e=document.getElementById("cloudBakBadge"); if(!e) return;
  var lb=getLastCloudBackup();
  e.textContent = lb ? ("☁️ "+zamanOnce(+lb)) : "☁️ henüz yedek yok";
}
function cloudYedekGerekliMi(){
  var lb=getLastCloudBackup();
  if(!lb) return true;
  return (Date.now()-(+lb)) > CLOUD_BACKUP_DAKIKA*60*1000;
}
function cloudYedekYaz(docId, payload){
  if(!FB.ready || !FB.db) return Promise.reject(new Error("bulut hazır değil"));
  var json;
  try{ json=JSON.stringify(payload); }catch(e){ console.warn("bulut yedek: JSON hatası ("+docId+")", e); return Promise.reject(e); }
  if(json.length > CLOUD_YEDEK_LIMIT){
    console.warn("bulut yedek: '"+docId+"' çok büyük ("+json.length+" karakter) — atlandı, cihaz yedeği hâlâ çalışıyor.");
    return Promise.reject(new Error("veri çok büyük"));
  }
  return FB.db.collection("farms").doc(FARM_CODE).collection("yedekler").doc(docId)
    .set({ts:new Date().toISOString(), gun:todayISO(), veri:payload})
    .catch(function(e){ console.warn("bulut yedek yazılamadı ("+docId+")", e); throw e; });

/* Hem CLOUD_BACKUP_RETENTION_GUN'dan eski hem de en yeni CLOUD_BACKUP_MAX_KAYIT
   sayısını aşan aktif_/arsiv_ dokümanlarını siler (hangisi önce tetiklenirse).
   Doküman sayısı zaten bu politikayla sınırlı tutulduğu için tüm koleksiyonu
   çekip JS tarafında sıralamak (ekstra Firestore index'i gerektirmeden) yeterli.
   Günde bir kez denenir (gereksiz okuma/silme trafiğini önlemek için). */
var TEMIZLIK_GUN_KEY = "utp_cloudbak_temizlikGun";
function cloudYedekEskiSil(){
  if(!FB.ready || !FB.db) return;
  var bugun=todayISO();
  try{ if(localStorage.getItem(TEMIZLIK_GUN_KEY)===bugun) return; }catch(e){}
  var cutoff=addDays(bugun, -CLOUD_BACKUP_RETENTION_GUN);
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  ["aktif_","arsiv_"].forEach(function(prefix){
    refBase.where(firebase.firestore.FieldPath.documentId(), ">=", prefix)
      .where(firebase.firestore.FieldPath.documentId(), "<", prefix+"~")
      .get().then(function(snap){
        var docs=[]; snap.forEach(function(d){ docs.push(d); });
        docs.sort(function(a,b){ return (b.data().ts||"").localeCompare(a.data().ts||""); }); /* en yeni önce */
        docs.forEach(function(d, idx){
          var tooOld = (d.data().gun||"") < cutoff;
          var tooMany = idx >= CLOUD_BACKUP_MAX_KAYIT;
          if(tooOld || tooMany) d.ref.delete().catch(function(e){ console.warn("eski bulut yedeği silinemedi", d.id, e); });
        });
      }).catch(function(e){ console.warn("eski bulut yedekleri sorgulanamadı", e); });
  });
  try{ localStorage.setItem(TEMIZLIK_GUN_KEY, bugun); }catch(e){ console.warn("temizlik günü kaydedilemedi", e); }
}
function cloudYedekTetikle(){
  if(!cloudYedekGerekliMi()) return;
  if(!FB.ready) return; /* internet yoksa sessizce atla, bir sonraki fırsatta dener */
  var d=loadData();
  var olayId=""+Date.now(); /* her yedekleme anı ayrı doküman — önceki yedeği ezmez */
  var aktifP=cloudYedekYaz("aktif_"+olayId, {cycles:d.cycles||[], gorevler:d.gorevler||[], settings:d.settings||{}});
  cloudYedekYaz("arsiv_"+olayId, {arsiv:d.arsiv||[]}).catch(function(){}); /* arşiv ayrı, best-effort — büyükse atlanır, ana yedeği engellemez */
  cloudYedekEskiSil();
  aktifP.then(function(){
    /* KRİTİK: zaman damgasını ancak yazma GERÇEKTEN başarılı olduktan sonra kaydet.
       Eskiden yazma denemesi başlar başlamaz (sonucu beklemeden) kaydediliyordu —
       yazma sessizce başarısız olsa bile "az önce yedeklendi" görünüyordu. */
    setLastCloudBackup();
    /* Yedekleme ekranı o an açıksa, orada da anında görünsün — arka planda otomatik
       tetiklenince ekran kendini yenilemiyordu, üstteki rozetle "farklı saat" gösteriyordu. */
    if(typeof view!=="undefined" && view && view.name==="yedekleme") render();
  }).catch(function(){ /* ana yedek de başarısız oldu — zaman kaydedilmedi, bir sonraki döngüde tekrar dener */ });
}

function setLastBackup(){ try{ localStorage.setItem("utp_meta", JSON.stringify({lastFileBackup:new Date().toISOString()})); }catch(e){ console.warn("yedek zamanı kaydedilemedi", e); } }

function autoSnapshot(){
  try{
    var snap={ts:new Date().toISOString(), data:loadData()};
    localStorage.setItem("utp_autobak", JSON.stringify(snap));
    _autoBk=snap;
    var log=loadAutoBackupLog();
    var day=todayISO();
    var idx=-1; for(var i=0;i<log.length;i++){ if(log[i].day===day){ idx=i; break; } }
    var entry={day:day, ts:snap.ts, data:snap.data};
    if(idx>=0) log[idx]=entry; else log.push(entry);
    log.sort(function(a,b){ return a.day<b.day?-1:(a.day>b.day?1:0); });
    if(log.length>14) log=log.slice(log.length-14);
    try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }
    catch(e2){
      log=log.slice(Math.ceil(log.length/2));
      try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }catch(e3){ console.warn("otomatik yedek küçültülerek de yazılamadı", e3); }
    }
  }catch(e){ console.warn("otomatik yedek alınamadı", e); }
}

var HASTALIK_KB = [

  {kw:["kuru çürük","kuru curuk","mycogone"], ad:"Mycogone (kuru çürüklük)", oneri:"Şekilsiz/kabarık dokulu mantarları hemen uzaklaştır; o bölgeye tuz ya da uygun dezenfektan uygulamayı değerlendir; izolasyon ve el/alet hijyeni kritik, sulama suyuyla sıçratmamaya dikkat et."},
  {kw:["ıslak çürük","islak curuk","verticillium"], ad:"Verticillium (ıslak çürüklük)", oneri:"Etkilenen mantarları dokunmadan uzaklaştır; elleri ve aletleri dezenfekte et; yüzey nemini/yoğuşmayı azalt, hava akışını artır."},
  {kw:["örümcek ağı","orumcek agi","cobweb"], ad:"Cobweb (örümcek ağı küfü)", oneri:"Etkilenen alanı tuz ya da uygun dezenfektanla kapat; nemi düşür, hava sirkülasyonunu artır; hızlı yayılır, erken müdahale önemli."},
  {kw:["bakteriyel leke","kahverengi leke","bacterial blotch","pseudomonas"], ad:"Bakteriyel leke (kahverengi leke)", oneri:"Yüzey nemini azalt, havalandırmayı artır, sulama sonrası kuruma süresini uzat; su damlacıklarının şapkada uzun süre kalmaması önemli."}
];
function hastalikTaraKB(txt){
  if(!txt) return [];

  return HASTALIK_KB.filter(function(h){ return h.kw.some(function(k){ return t.indexOf(k)>=0; }); });

/* ---------- PDF / Yazdır (ODA TAKİP FORMU) ---------- */
/* Özet ("Yapılan İşlemler") ve günlük tablonun "Üretim İşlemi" sütunu AYNI kaynağı
   kullansın diye ortak fonksiyon — böylece ikisi arasında tutarsızlık olmaz. */
function uretimIslemSatirlari(c){
  var rows=[];
  if(c.gelisTarihi) rows.push({g:gunNo(c,c.gelisTarihi), tarih:c.gelisTarihi, t:"Kompost geldi"+(c.kompostFirma?(" ("+c.kompostFirma+")"):"")});
  if(c.kompostIndirme && c.kompostIndirme.tarih){
    var ki=c.kompostIndirme; var kiParts=[];
    if(ki.makine) kiParts.push("Makine: "+ki.makine);
    if(ki.halat) kiParts.push("Halat: "+ki.halat);
    if(ki.ekip1) kiParts.push("1.Ekip: "+ki.ekip1);
    if(ki.ekip2) kiParts.push("2.Ekip: "+ki.ekip2);
    rows.push({g:gunNo(c,ki.tarih), tarih:ki.tarih, t:"Kompost indirildi"+(kiParts.length?(" — "+kiParts.join(", ")):"")});
  }
  if(c.tiftikTarihi) rows.push({g:gunNo(c,c.tiftikTarihi), tarih:c.tiftikTarihi, t:"Tiftik"});
  if(c.toprakTarihi) rows.push({g:gunNo(c,c.toprakTarihi), tarih:c.toprakTarihi, t:"Toprak serimi"});
  if(c.tirmikTarihi) rows.push({g:gunNo(c,c.tirmikTarihi), tarih:c.tirmikTarihi, t:"Tırmık"});
  if(c.havaBaslangic) rows.push({g:gunNo(c,c.havaBaslangic), tarih:c.havaBaslangic, t:"Havaya başlandı"});
  var dedIdx=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdx[idx]) return;
    if(!(c.done && c.done["p"+idx])) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    var tarih=detay&&detay.tarih;
    if(!tarih) return;
    rows.push({g:gunNo(c,tarih), tarih:tarih, t:s.txt+(detay.not?(" — "+detay.not):"")});
  });
  return rows.filter(function(x){ return x.g!=="" && x.g!==null && x.g!==undefined; });
}
function islemlerHTML(c){
  var rows=uretimIslemSatirlari(c);
  (c.gunluk||[]).forEach(function(r){
    var ayr=gunlukSatirAyristir(r);
    if(ayr.uretim.length) rows.push({g:gunNo(c,r.tarih), tarih:r.tarih, t:ayr.uretim.join(" · ")});
  });
  rows.sort(function(a,b){ return a.g-b.g; });
  if(!rows.length) return '<div style="color:#777;font-size:11px;">İşlem kaydı yok.</div>';

    + rows.map(function(r){ return '<div><b>'+r.g+'. gün:</b> '+esc(r.t)+'</div>'; }).join("")
    + '</div>';
}
function kompostChartSVG(c){
  var T=[], CO=[], S=[];
  (c.gunluk||[]).forEach(function(r){
    var g=gunNo(c,r.tarih); if(g==="") return;
    var od=numParse(r.odaC), ko=numParse(r.kompostC);
    if(od!==null||ko!==null) T.push({g:g,oda:od,komp:ko});
    var a=numParse(r.co2alt),u=numParse(r.co2ust);
    if(a!==null||u!==null) CO.push({g:g,alt:(a!==null?a:u),ust:(u!==null?u:a)});
    if(r.sulama) S.push(g);
  });
  if(!T.length && !CO.length) return '<div style="color:#777;font-size:11px;">Grafik i\u00e7in \u00f6l\u00e7\u00fcm yok.</div>';
  var W=760,H=320,padL=44,padR=54,padT=16,padB=48;
  var odaPts=T.filter(function(p){return p.oda!==null;}).map(function(p){return{g:p.g,v:p.oda};}).sort(function(a,b){return a.g-b.g;});
  var kompPts=T.filter(function(p){return p.komp!==null;}).map(function(p){return{g:p.g,v:p.komp};}).sort(function(a,b){return a.g-b.g;});
  CO.sort(function(a,b){return a.g-b.g;});
  var gall=[]; T.forEach(function(p){gall.push(p.g);}); CO.forEach(function(p){gall.push(p.g);}); S.forEach(function(g){gall.push(g);});
  var gmin=Math.min.apply(null,gall), gmax=Math.max.apply(null,gall); if(gmax===gmin) gmax=gmin+1;
  var tv=[]; odaPts.concat(kompPts).forEach(function(p){tv.push(p.v);});
  var tmin,tmax; if(tv.length){tmin=Math.floor(Math.min.apply(null,tv)-1);tmax=Math.ceil(Math.max.apply(null,tv)+1);}else{tmin=18;tmax=28;} if(tmax===tmin)tmax=tmin+1;
  var cvals=[]; CO.forEach(function(p){cvals.push(p.alt);cvals.push(p.ust);});
  var hasCo=cvals.length>0, cmin=0,cmax=1;
  if(hasCo){cmin=Math.floor(Math.min.apply(null,cvals));cmax=Math.ceil(Math.max.apply(null,cvals));if(cmax===cmin)cmax=cmin+100;}
  function X(g){return padL+(g-gmin)/(gmax-gmin)*(W-padL-padR);}
  function YT(v){return H-padB-(v-tmin)/(tmax-tmin)*(H-padT-padB);}
  function YC(v){return H-padB-(v-cmin)/(cmax-cmin)*(H-padT-padB);}
  var svg='';
  if(26<=tmax&&24>=tmin) svg+='<rect x="'+padL+'" y="'+YT(26)+'" width="'+(W-padL-padR)+'" height="'+(YT(24)-YT(26))+'" fill="#dcefe2"/>';
  [21,28,30].forEach(function(lim){ if(lim>=tmin&&lim<=tmax){ var col=lim>=30?"#c0291f":"#d98a1f"; svg+='<line x1="'+padL+'" y1="'+YT(lim)+'" x2="'+(W-padR)+'" y2="'+YT(lim)+'" stroke="'+col+'" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>'; } });
  var tstep=Math.max(1,Math.round((tmax-tmin)/5));
  for(var t=tmin;t<=tmax;t+=tstep){var y=YT(t);svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#ececec"/><text x="'+(padL-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#2f6b4f">'+t+'\u00b0</text>';}
  if(hasCo){var cstep=Math.max(1,Math.round((cmax-cmin)/5));for(var cc=cmin;cc<=cmax;cc+=cstep){var yc=YC(cc);svg+='<text x="'+(W-padR+5)+'" y="'+(yc+3)+'" font-size="9" text-anchor="start" fill="#c47a1a">'+cc+'</text>';}}
  S.forEach(function(g){var x=X(g);svg+='<line x1="'+x+'" y1="'+padT+'" x2="'+x+'" y2="'+(H-padB)+'" stroke="#bcdcff" stroke-dasharray="3,3"/><circle cx="'+x+'" cy="'+(H-padB)+'" r="3" fill="#3b82c4"/>';});
  var allg=[]; odaPts.concat(kompPts).forEach(function(p){allg.push(p.g);}); CO.forEach(function(p){allg.push(p.g);}); allg=allg.filter(function(v,i,a){return a.indexOf(v)===i;}).sort(function(a,b){return a-b;});
  var everyX=Math.ceil(allg.length/14)||1;
  allg.forEach(function(g,i){if(i%everyX===0)svg+='<text x="'+X(g)+'" y="'+(H-padB+15)+'" font-size="9" text-anchor="middle" fill="#555">'+g+'</text>';});
  /* CO2 band (alt-ust) */
  if(hasCo && CO.length>=1){
    var top=CO.map(function(p){return X(p.g)+","+YC(p.ust);});
    var bot=CO.map(function(p){return X(p.g)+","+YC(p.alt);}).reverse();
    svg+='<polygon points="'+top.concat(bot).join(" ")+'" fill="#f2c98a" fill-opacity="0.45" stroke="none"/>';
    svg+='<polyline points="'+CO.map(function(p){return X(p.g)+","+YC(p.ust);}).join(" ")+'" fill="none" stroke="#d98a1f" stroke-width="1.2"/>';
    svg+='<polyline points="'+CO.map(function(p){return X(p.g)+","+YC(p.alt);}).join(" ")+'" fill="none" stroke="#d98a1f" stroke-width="1.2"/>';
  }
  function poly(pts,col,dash){if(pts.length<1)return '';var d=pts.map(function(p){return X(p.g)+","+YT(p.v);}).join(" ");var dd=pts.map(function(p){return '<circle cx="'+X(p.g)+'" cy="'+YT(p.v)+'" r="2.2" fill="'+col+'"/>';}).join("");return '<polyline points="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"'+(dash?' stroke-dasharray="5,4"':'')+'/>'+dd;}

/* PDF/rapor için: "Sulama/İlaçlama" alanı aslında 3 farklı şeyin karışımı —
   üretim işlemi tamamlama notları (gunlukGorevNotEkle ile eklenen "Tiftik yapıldı" gibi),
   gerçek ilaçlama (bilinen ilaç adı geçen kısımlar) ve düz sulama notu. " · " ile ayrılmış
   parçalara bakıp üçe ayırıyoruz — böylece PDF'te üretim işlemleri hem üstteki özet hem de
   günlük tabloda kendi sütununda, ilaçlama SADECE kendi sütununda görünür. */
/* Su alanı normalde sadece sayı olmalı (slider'dan gelir) ama eski/legacy kayıtlarda
   serbest metin de olabilir ("250 ml serenade" gibi) — böyle durumda "lt su" ekleyip
   anlamsız bir birleşim oluşturmak yerine, metni olduğu gibi (etiketsiz) gösteriyoruz. */
function suDegeriGoster(su){
  if(numParse(su)<=0) return "";
  var temizMi=/^\d+([.,]\d+)?$/.test((""+su).trim());
  return temizMi ? ('<b>'+esc(su)+' lt su</b>') : esc(su);
}
function gunlukSatirAyristir(r){
  var segments=(r&&r.sulama||"").split(/\s*(?:·|\+)\s*/).map(function(s){return s.trim();}).filter(Boolean);
  var uretim=[], ilac=[], sulama=[];
  var ilacAdlari=getIlacList().map(function(x){return (x.ad||"").toLocaleLowerCase("tr");}).filter(Boolean);
  segments.forEach(function(seg){
    var segL=seg.toLocaleLowerCase("tr");
    var uretimMi = /yap[ıi]ld[ıi]\s*$|ertelendi|erken çekildi|kontrol sonucu/i.test(seg);
    if(uretimMi){ uretim.push(seg); return; }
    var ilacMi = ilacAdlari.some(function(ad){ return segL.indexOf(ad)>=0; }) || /\bml\b|\bgr\b|\bkg\b/i.test(seg);
    if(ilacMi){ ilac.push(seg); }
    else { sulama.push(seg); }
  });
  return {uretim:uretim, ilac:ilac, sulama:sulama};
}

    var ne = r.dg<0?"dün geldi (girilmedi)":(r.dg===0?"BUGÜN geliyor":(r.dg===1?"yarın geliyor":r.dg+" gün sonra"));
    h+='<div style="padding:5px 0; font-size:15px; border-bottom:1px solid #dcecdc;"><b>'+esc(r.x.oda||"—")+'</b> · '+esc(r.x.firma||"")+' — '+ne
      +' <span class="muted">(çıkış '+fmtDate(r.x.cikis)+')</span><br>'
      +'<label style="display:inline-flex; align-items:center; gap:4px; font-weight:normal; margin-top:3px;">'
      +'<input type="checkbox" '+(r.x.irtibat?"checked":"")+' onchange="togglePlanIrtibat(\''+r.x.id+'\')" style="width:18px;height:18px;">'
      +'Firma ile irtibata geçildi</label> '
      +(r.dg<=0
          ? '<button class="btn small" style="margin-left:4px;" onclick="planToOda(\''+r.x.id+'\')">Oda oluştur</button>'
          : '<span class="muted" style="margin-left:4px; font-size:13px;">↳ kompost gelince oda açılır</span>')
      +'</div>';
  });
  h+='</div>';
  return h;
}

/* ============ PLANLAMA — ÜRETİM TAKVİMİ / YAKLAŞAN İŞLER / ODA TAKVİMİ ============
   Hiçbir yeni veri modeli gerektirmez: beklenenTakvim(c) protokol offsetlerinden
   zaten hesaplıyordu, önceden sadece tek oda detayında gömülüydü. Burada tüm
   aktif odalara genişletilip Planlama ekranında gösteriliyor (SSOT). */

/* Bir adımın durumu: gerçekleşti mi, gecikti mi, ne zaman bekleniyor */
function takvimAdimDurum(adim, bugun){
  if(adim.ger) return "yapildi";
  if(!adim.beklenen) return "bilinmiyor";
  if(adim.beklenen < bugun) return "gecikti";
  return "bekleniyor";
}

/* 1. ÜRETİM TAKVİMİ — tüm odalar, kompakt yatay zaman çizgisi (Kompost dahil,
   Boşaltma protokolde tanımlı olmadığı için sadece gerçekleştiyse gösterilir —
   tahmini boşaltma tarihi UYDURULMAZ). */
function uretimTakvimiHTML(active){
  if(!active.length) return '<div class="muted" style="padding:8px 0;">Aktif oda yok.</div>';
  var bugun=todayISO();
  var arr=active.slice().sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var h='<div style="overflow-x:auto;"><table style="font-size:12.5px;"><thead><tr>'
    +'<th>Oda</th><th>Kompost</th><th>Tiftik</th><th>Toprak</th><th>Tırmık</th><th>Hava</th><th>Hasat</th><th>Boşaltma</th>'
    +'</tr></thead><tbody>';
  arr.forEach(function(c){
    var tk=beklenenTakvim(c);
    var byAd={}; tk.forEach(function(a){ byAd[a.ad]=a; });
    function hucre(adim){
      if(!adim) return '<td class="note">—</td>';
      var durum=takvimAdimDurum(adim,bugun);
      var tarih=adim.ger||adim.beklenen;
      if(!tarih) return '<td class="note">—</td>';
      var renk = durum==="yapildi"?"var(--green)":(durum==="gecikti"?"var(--red)":"var(--muted)");
      var isim = durum==="yapildi"?"✓ ":(durum==="gecikti"?"⚠️ ":"");
      var pazarMi=(gunKisa(tarih)==="Paz");
      return '<td style="color:'+renk+';white-space:nowrap;">'+isim+fmtDate(tarih).substring(0,5)+(pazarMi?' <span style="color:var(--red);font-weight:700;font-size:10px;" title="Pazar">P</span>':'')+'</td>';
    }
    h+='<tr onclick="odaTakvimAcKapa(\''+c.id+'\')" style="cursor:pointer;">'
      +'<td><b>'+esc(c.oda)+'</b></td>'
      +'<td style="white-space:nowrap;">'+(c.gelisTarihi?fmtDate(c.gelisTarihi).substring(0,5):'—')+'</td>'
      +hucre(byAd["Tiftik"])+hucre(byAd["Toprak"])+hucre(byAd["Tırmık"])+hucre(byAd["Hava"])+hucre(byAd["1. Hasat"])
      +'<td class="note">'+(c.bosaltimTarihi?('✓ '+fmtDate(c.bosaltimTarihi).substring(0,5)):'—')+'</td>'
      +'</tr>';
    /* Genişleyen oda takvimi satırı — açık/kapalı durumu _planTakvimAcik'te
       kalıcı tutulur (sadece DOM'da tutulsaydı, checkbox işaretlenince
       render() tüm ekranı yenileyip satırı sessizce kapatırdı). */
    var acikMi = !!(_planTakvimAcik && _planTakvimAcik[c.id]);
    h+='<tr id="odatakvim_'+c.id+'" style="'+(acikMi?'':'display:none;')+'"><td colspan="8" style="padding:0;">'+odaTakvimiHTML(c)+'</td></tr>';
  });
  h+='</tbody></table></div>'
    +'<div class="muted" style="margin-top:6px;font-size:12px;">Satıra dokun: odanın detaylı takvimini aç/kapat. ⚠️ = beklenen tarih geçti, henüz yapılmadı.</div>';
  return h;
}
var _planTakvimAcik={};
function odaTakvimAcKapa(cid){
  _planTakvimAcik[cid] = !_planTakvimAcik[cid];
  render();
}

/* 3. ODA TAKVİMİ — tek odanın geleceği, "Bugün / X gün sonra" göreceli dille. */
function odaTakvimiHTML(c){
  var bugun=todayISO();
  var tk=beklenenTakvim(c);
  var h='<div style="padding:10px 14px;background:var(--gray-soft);">';
  tk.forEach(function(a){
    var tarih=a.ger||a.beklenen;
    if(!tarih){ return; }
    var durum=takvimAdimDurum(a,bugun);
    var fark=daysBetween(bugun,tarih);
    var etiket = durum==="yapildi" ? ("✓ Yapıldı — "+fmtDate(tarih))
      : (fark===0?"Bugün":(fark>0?(fark+" gün sonra"):((-fark)+" gün önce — GECİKTİ")));
    var renk = durum==="yapildi"?"var(--green)":(durum==="gecikti"?"var(--red)":"var(--text)");
    h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #ddd;font-size:13px;">'
      +'<span>'+esc(a.ad)+'</span>'
      +'<span style="color:'+renk+';font-weight:600;">'+etiket+'</span>'
      +'</div>';
  });
  if(c.bosaltimTarihi){
    h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;">'
      +'<span>Boşaltma</span><span style="color:var(--green);font-weight:600;">✓ '+fmtDate(c.bosaltimTarihi)+'</span></div>';
  } else {
    h+='<div class="muted" style="font-size:12px;padding-top:4px;">Boşaltma tarihi için protokolde tahmini offset tanımlı değil — gerçekleşince burada görünecek.</div>';
  }
  h+='</div>';
  return h;
}

/* 2. YAKLAŞAN İŞLER — tüm odalardan, seçili gün aralığında (3/7/15), henüz
   yapılmamış protokol adımları. Tarihe göre gruplanıp sıralanır. */
var _yaklasanGunAraligi = 7;
function yaklasanGunAraligiSec(n){ _yaklasanGunAraligi=n; render(); }
function yaklasanIslerHTML(active){
  var bugun=todayISO();
  var sinir=addDays(bugun,_yaklasanGunAraligi);
  var liste=[];
  active.forEach(function(c){
    beklenenTakvim(c).forEach(function(a){
      if(a.ger || !a.beklenen) return; /* zaten yapılmış veya tarihsiz — atla */
      if(a.beklenen>=bugun && a.beklenen<=sinir){
        liste.push({tarih:a.beklenen, oda:c.oda, islem:a.ad});
      }
    });
  });
  liste.sort(function(x,y){ return cmpDate(x.tarih,y.tarih); });
  var h='<div style="display:flex;gap:6px;margin-bottom:10px;">'
    +[3,7,15,30].map(function(n){
      return '<button class="btn '+(_yaklasanGunAraligi===n?'':'ghost')+' small" onclick="yaklasanGunAraligiSec('+n+')">'+n+' gün</button>';
    }).join('')
    +'</div>';
  if(!liste.length){
    h+='<div class="muted" style="padding:8px 0;">Önümüzdeki '+_yaklasanGunAraligi+' gün içinde planlı işlem yok.</div>';
    return h;
  }
  var sonTarih=null;
  liste.forEach(function(x){
    if(x.tarih!==sonTarih){
      h+='<div style="font-weight:700;margin-top:10px;font-size:13px;color:var(--muted);">'+fmtDate(x.tarih)+' '+gunAdi(x.tarih)+'</div>';
      sonTarih=x.tarih;
    }
    h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);">'
      +'<span><b>'+esc(x.oda)+'</b></span><span class="note">'+esc(x.islem)+'</span>'
      +'</div>';
  });
  return h;
}

/* 5. ODA DOLULUK PLANI — gerçek veriden 3 durum (Üretimde/Beklemede/Boş).
   NOT: "Hazırlıkta" ve "Temizlikte" doküman istese de sistemde hiç izlenmiyor
   (PHASES listesinde yok, ayrı bir alan da yok) — burada UYDURULMAZ. Boş
   odalar için Kompost Planlaması'na bakılıp planlı gelişi olan "Beklemede"
   sayılır, olmayan "Boş" kalır. Hasat aşamasındaki dolu odalar ayrıca
   işaretlenir — boşaltma için kesin tarih yok ama hasat = boşaltmaya en
   yakın aşama olduğu protokolden biliniyor (kesin tarih uydurulmadan sinyal). */
/* Kompakt tek satır: bu odada son yapılan olay + sıradaki olay + aksiyon
   butonları. Sulama/ilaçlama HARİÇ — sadece protokol kilometre taşları
   (tiftik/toprak/tırmık/hava/hasat/poşet/kompost indirme). Aksiyon butonları
   toggleTask/protokolGorevErtele/protokolYarinaCek'i AYNEN çağırır (SSOT,
   Günlük Tur'daki ile birebir aynı mantık, kod tekrarı yok). */
/* Sade tarih düzenleme — tiftik/toprak/tırmık'ın "kim yaptı/doğru mu" modalından
   farklı, sadece tarih. Poşet/hava/hasat/kompost indirme gibi adımlarda ve
   zaten yapılmış herhangi bir adımın tarihini düzeltmede kullanılır. Yazma
   yine adimTamamla üzerinden (SSOT), tarihi opts.tarih ile geçirir. */
function adimTarihDuzenleAc(cid, idx){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var detay=c.adimDetay && c.adimDetay["p"+idx];
  var mevcutTarih=detay?detay.tarih:(_turTarihVal||todayISO());
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(s.txt)+'</div>'
    +'<label>Tarih</label><input type="date" id="atd_tarih" value="'+mevcutTarih+'">'
    +'<div class="row" style="margin-top:14px;"><button class="btn" onclick="adimTarihKaydet(\''+cid+'\','+idx+')">Kaydet</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">Vazgeç</button></div>'
    +'</div></div>';
}
function adimTarihKaydet(cid, idx){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var tarih=(el("atd_tarih")&&el("atd_tarih").value)||todayISO();
  if(!adimTamamla(c, idx, {tarih:tarih})){ closeWarnBox(); toast("Kaydedilmedi — önceki adım henüz tamamlanmamış"); render(); return; }
  touchCycle(c); saveData(); closeWarnBox(); toast("Tarih kaydedildi"); render();
}

/* Sadece "son yapılan"ı değil, TAMAMLANMIŞ TÜM olay-tipi adımları listeler —
   herhangi birinin tarihini/detayını düzeltmek için. Ana kartı kalabalıklaştırmaz
   (talep üzerine açılır), ama geçmişteki bir hatayı düzeltme imkânı sağlar. */
function gecmisIslemleriGosterAc(cid){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var rows=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay") return;
    if(!adimGercektenYapildiMi(c,idx,s)) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    rows.push({idx:idx, txt:s.txt, tarih:detay?detay.tarih:null});
  });
  rows.sort(function(a,b){ return (a.tarih||"")<(b.tarih||"")?-1:((a.tarih||"")>(b.tarih||"")?1:0); });
  var body = rows.length ? rows.map(function(r){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:13.5px;">'
      +'<span>'+esc(r.txt)+' — '+(r.tarih?fmtDate(r.tarih):'—')+'</span>'
      +'<button class="btn ghost small" onclick="closeWarnBox();adimDuzenleAc(\''+cid+'\','+r.idx+')">Düzelt</button>'
      +'</div>';
  }).join('') : '<div class="muted" style="padding:8px 0;">Henüz tamamlanmış işlem yok.</div>';
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(c.oda)+' — geçmiş işlemler</div>'
    +body
    +'<div class="row" style="margin-top:14px;"><button class="btn ghost" onclick="closeWarnBox()">Kapat</button></div>'
    +'</div></div>';
}
/* Tiftik/Toprak/Tırmık DIŞINDAKİ olay-tipi adımlar için zengin düzenleme —
   aynı görünüm (kim yaptı/doğru mu/tarih/not), ama c.adimDetay["p"+idx] içine
   yazar (rapor okumadığı için güvenli, tiftik/toprak/tırmık'ın rapor-okunan
   özel alanlarına dokunmaz). "Üretim protokolünün kalbi" — her adımda aynı
   zenginlikte düzeltme imkânı. */
function adimTamDuzenleAc(cid, idx){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var detay=(c.adimDetay && c.adimDetay["p"+idx])||{};
  var L=getPersonelList();
  var chips = L.length
    ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;">'
      + L.map(function(p){ return '<button type="button" class="btn ghost small" style="padding:4px 10px;" onclick="atdPersonelEkle(\''+esc(p.ad).replace(/'/g,"\\'")+'\')">+ '+esc(p.ad)+'</button>'; }).join('')
      + '</div>'
    : '<div class="muted" style="font-size:12px;margin:4px 0;">Ayarlar → Personel\'e kişi eklersen burada dokunarak seçersin.</div>';
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:8px;">'+esc(s.txt)+' — detaylar</div>'
    +'<label>Tarih</label><input type="date" id="atd_tarih" value="'+(detay.tarih||_turTarihVal||todayISO())+'">'
    +'<label style="margin-top:8px;">Kim yaptı? (listeden dokun veya elle yaz)</label>'
    +chips
    +'<input type="text" id="atd_personel" value="'+esc(detay.personel||"")+'" placeholder="ör. Ahmet, Mehmet, dış ekip 2 kişi">'
    +'<div class="chk" style="margin-top:8px;"><input type="checkbox" id="atd_dogru" '+(detay.dogru?"checked":"")+'><label>Doğru yapıldı</label></div>'
    +'<input type="text" id="atd_not" value="'+esc(detay.not||"")+'" placeholder="Not (neresi yanlış oldu, gözlem...)" style="margin-top:6px;">'
    +'<div class="row" style="margin-top:14px;"><button class="btn" onclick="adimTamKaydet(\''+cid+'\','+idx+')">Kaydet</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">Vazgeç</button></div>'
    +'</div></div>';
}
function atdPersonelEkle(ad){
  var inp=el("atd_personel"); if(!inp) return;
  var mevcut=inp.value.trim();
  if(mevcut.split(",").map(function(x){return x.trim();}).indexOf(ad)>=0) return;
  inp.value = mevcut ? (mevcut+", "+ad) : ad;
}
function adimTamKaydet(cid, idx){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var tarih=(el("atd_tarih")&&el("atd_tarih").value)||todayISO();
  var personel=(el("atd_personel")&&el("atd_personel").value.trim())||"";
  var dogru=!!(el("atd_dogru")&&el("atd_dogru").checked);
  var not=(el("atd_not")&&el("atd_not").value.trim())||"";
  if(!adimTamamla(c, idx, {tarih:tarih, personel:personel, dogru:dogru, not:not})){
    closeWarnBox(); toast("Kaydedilmedi — önceki adım henüz tamamlanmamış"); render(); return;
  }
  touchCycle(c); saveData(); closeWarnBox(); toast("Kaydedildi"); render();
}
/* Bir adım idx'i için doğru düzenleme modalını açar: tiftik/toprak/tırmık
   kendi rapor-okunan zengin modalını (adimDetayKutusuAc) kullanır, diğer
   TÜM adımlar (poşet/hava/hasat/kompost indirme/vb.) aynı zenginlikte ama
   c.adimDetay tabanlı genel modalı (adimTamDuzenleAc) kullanır. Tek yerden
   karar verilir — "hangi adımda hangi modal" sorusu burada çözülür. */
function adimDuzenleAc(cid, idx){
  var s=getProtokol()[idx]; if(!s) return;
  var alanKey=s.rol||protokolAdimAlanKey(s.txt);
  if(alanKey==="tiftik"||alanKey==="toprak"||alanKey==="tirmik"){
    adimDetayKutusuAc(cid, idx, alanKey);
  } else {
    adimTamDuzenleAc(cid, idx);
  }
}
function odaProtokolOzetSatiriHTML(c){
  var son=sonYapilanOlayAdimi(c);
  var sd=siradakiProtokolAdimi(c);
  var today=todayISO();
  var gecikti = sd && sd.t<today;
  var bugunMu = sd && sd.t===today;
  var nokta = gecikti?"🔴":(bugunMu?"🟡":"🟢");
  var seritRenk = gecikti?"var(--red)":(bugunMu?"var(--amber)":"var(--line)");

  var h='<div style="padding:12px;border-left:4px solid '+seritRenk+';border-bottom:8px solid var(--bg);background:'+(gecikti?'#fdf3f3':'#fff')+';border-radius:10px;margin-bottom:2px;">';

  /* Başlık: durum noktası + oda adı */
  h+='<div style="font-weight:700;font-size:15px;">'+nokta+' '+esc(c.oda)+'</div>';

  /* Son yapılan — küçük, ikincil satır */
  if(son){
    h+='<div style="font-size:12px;color:var(--muted);margin-top:2px;">Son yapılan: '+esc(son.txt)+' — '+fmtDate(son.tarih)+gunKisaHTML(son.tarih)
      +(can("edit")?' <span onclick="adimDuzenleAc(\''+c.id+'\','+son.idx+')" style="text-decoration:underline;cursor:pointer;">düzelt</span>':'')
      +(can("edit")?' · <span onclick="gecmisIslemleriGosterAc(\''+c.id+'\')" style="text-decoration:underline;cursor:pointer;">diğer geçmiş işlemler</span>':'')
      +'</div>';
  }

  if(sd){
    var sdStep=getProtokol()[sd.idx];
    var sdAlanKey=(sdStep&&sdStep.rol)||protokolAdimAlanKey(sdStep?sdStep.txt:"");
    var zenginModal=(sdAlanKey==="tiftik"||sdAlanKey==="toprak"||sdAlanKey==="tirmik");
    var onaylaFonk = zenginModal ? ("toggleTask('"+c.id+"',"+sd.idx+")") : ("adimTamDuzenleAc('"+c.id+"',"+sd.idx+")");
    var gecikmisVeyaBugun = sd.t<=today;

    h+='<div style="border-top:1px solid var(--line);margin-top:8px;padding-top:8px;">'
      +'<div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;">Sıradaki İş</div>'
      +'<div style="font-weight:700;font-size:16px;margin-top:2px;">'+esc(sd.txt)+'</div>'
      +'<div style="font-size:12.5px;color:var(--muted);margin-top:3px;">📅 Planlanan: <b>'+fmtDate(sd.t)+'</b>'+gunKisaHTML(sd.t)+'</div>';

    h+='<div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;margin-top:8px;">Durum</div>';
    if(gecikmisVeyaBugun && can("edit")){
      /* Sırası gelmiş: "Durum" satırı kendisi dokunulabilir aksiyon —
         tıklayınca yapıldı işaretlenir (tiftik/toprak/tırmık'ta detay kutusu,
         diğerlerinde sade tarih kutusu açılır). */
      h+='<div onclick="'+onaylaFonk+'" style="cursor:pointer;margin-top:3px;padding:8px 10px;background:var(--green-soft);color:var(--green-dark);border-radius:8px;font-weight:600;font-size:13.5px;">'
        +(gecikti?'⚠️ Gecikti — Yapıldı mı? Dokun':'Bugün — Yapıldı mı? Dokun')
        +'</div>';
    } else {
      h+='<div style="margin-top:3px;font-size:13px;color:var(--muted);">Henüz zamanı gelmedi</div>';
    }

    if(can("edit")){
      h+='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">';
      if(gecikmisVeyaBugun){
        h+='<button class="btn ghost small" style="flex:1;" onclick="protokolGorevErtele(\''+c.id+'\','+sd.idx+',\'diger\')">Ertele (1 gün)</button>';
      } else {
        h+='<button class="btn small" style="flex:1;" onclick="'+onaylaFonk+'">Erken Yap</button>';
      }

     gelecek tarih. Sıradaki adımı olmayan odalar (protokol bitmiş vb.) en sona. */
  var arr=active.slice().sort(function(a,b){

function delPlan(id){
  if(!can("manage")) return noPerm();
  var pl=getPlan(); var i=-1; pl.forEach(function(x,ix){ if(x.id===id) i=ix; });
  if(i<0) return;
