      }
    }
  });
  
  /* AГ§Дұk arДұza */
  (d.arizalar||[]).filter(function(a){return a.durum==="acik";}).forEach(function(a){
    alerts.push({
      tipo:"ariza",
      arizaId:a.id,
      msg:esc((a.baslik||"ArДұza"))+" вҖ” AГ§Дұk",
      severity:2,
      tarih:a.tarih
    });
  });
  
  /* Kompost bekleyen (geliЕҹ tarihini geГ§miЕҹ, HД°ГҮ tur kaydДұ girilmemiЕҹ).
     Г–NEMLД°: sadece "geliЕҹ gГјnГјne ait" kayДұt aranmaz вҖ” bu neredeyse hiГ§
     karЕҹДұlanmayan bir koЕҹuldu (kullanДұcДұ odaya gidince bugГјnГјn tarihiyle
     kayДұt girer, geliЕҹ tarihiyle deДҹil). DoДҹrusu: gunluk dizisi TAMAMEN
     boЕҹsa uyar; herhangi bir kayДұt girildiyse (hangi tarihli olursa olsun)
     tur baЕҹlamДұЕҹ demektir, uyarДұ kapanДұr. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(c.gelisTarihi){
      var gun=(todayISO().localeCompare(c.gelisTarihi)>=0);
      if(gun && (!c.gunluk || c.gunluk.length===0)){
        alerts.push({
          tipo:"kompost",
          odaId:c.id,
          oda:c.oda,
          msg:"Kompost geldi ama tur kaydДұ yok",
          severity:1,
          tarih:c.gelisTarihi
        });
      }
    }
  });
  
  /* Kompost GeliЕҹ KontrolГј'nde bekleyen madde var mДұ (sДұcaklДұk/irsaliye/kestane/
     nem/amonyak/dГјzeltme). Г–NEMLД°: kompostGelisIkazlariHTML() (GГ¶revler sekmesi)
     bunu sadece geliЕҹten sonraki 3 gГјn iГ§inde gГ¶sterir вҖ” kestane yeri gibi zamana
     baДҹlДұ olmayan maddeler o pencere kapanДұnca sessizce kaybolup unutulabiliyordu.
     Kritik UyarДұlar'da gГјn sДұnДұrДұ YOK вҖ” Г§Г¶zГјlene kadar gГ¶rГјnmeye devam eder. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(!c.gelisTarihi || todayISO().localeCompare(c.gelisTarihi)<0) return; /* henГјz gelmedi */
    var eksik=kompostEksikMaddeler(c);
    if(eksik.length){
      alerts.push({
        tipo:"kgeksik",
        odaId:c.id,
        oda:c.oda,
        msg:"Kompost geliЕҹ kontrolГј eksik: "+eksik.join(" В· "),
        severity:1,
        tarih:c.gelisTarihi
      });
    }
  });

  /* HavalandДұrma planДұ hedeften sapma (havaya baЕҹlanmДұЕҹ odalar). tempAlerts()
     zaten bu hesabДұ yapДұyor (bugГјnkГј hedef vs. son Г¶lГ§Гјm, 1В°'den fazla fark) вҖ”
     sadece havaya baЕҹlama sonrasДұ "odaHedef" tГјrГјnГј buraya da taЕҹДұyoruz ki
     mГјhendis GГ¶revler sekmesine gitmeden, BugГјn ekranДұnda da gГ¶rsГјn. */
  (tempAlerts()||[]).filter(function(a){return a.key==="odaHedef";}).forEach(function(a){
    alerts.push({
      tipo:"havaHedef",
      odaId:a.cid,
      oda:a.oda,
      msg:a.txt,
      severity:1,
      tarih:todayISO()
    });
  });

  /* NOT: Geciken gГ¶revler artДұk "BugГјnГјn Д°Еҹleri" listesinde kДұrmДұzДұ iЕҹaretli
     olarak en Гјstte gГ¶steriliyor. TekrarДұ Г¶nlemek iГ§in uyarДұ bandДұna eklenmez. */

  alerts.sort(function(a,b){return b.severity-a.severity;});
  return alerts;
  }catch(e){
    console.warn("getCriticalAlerts error:", e);
    return [];
  }
}

/* Helper: BugГјn yapДұlacak gГ¶revleri al ve koridor sДұrasДұna gГ¶re sort */
function getTodaysTasks(){
  var d=loadData(), bugun=todayISO();
  var tasks=[];
  
  /* Oda-bazlДұ gГ¶revler (odaGorevleri) вҖ” BEKLEYEN (done:false) her zaman gГ¶rГјnГјr
     (tarih<=bugun ise, geciken dahil). TAMAMLANMIЕһ (done:true) SADECE bugГјn
     tamamlandДұysa gГ¶rГјnГјr (doneAt===bugun) вҖ” aksi halde geГ§miЕҹte tamamlanmДұЕҹ
     HER gГ¶rev sonsuza dek "BugГјnkГј GГ¶revler"de kalДұrdДұ (KRД°TД°K BUG, dГјzeltildi). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){
      if(og.tarih>bugun) return false;
      if(og.done){
        var doneGun = og.doneAt ? og.doneAt.slice(0,10) : og.tarih;
        return doneGun===bugun;
      }
      return true;
    }).forEach(function(og){
      tasks.push({
        tipo:"oda",
        odaId:c.id,
        oda:c.oda,
        islem:og.is,
        atama:og.atama,
        tarih:og.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(!og.done && og.tarih<bugun),
        done:!!og.done,
        id:og.id,
        cyclicId:c.id
      });
    });
  });
  
  /* Genel gГ¶revler (gorevler) вҖ” AYNI mantДұk: bekleyen her zaman, tamamlanmДұЕҹ
     SADECE bugГјn tamamlandДұysa gГ¶rГјnГјr (doneAt===bugun). */
  (getGorevler()||[]).filter(function(g){
    if(g.tarih>bugun) return false;
    if(g.done){
      var doneGun = g.doneAt ? g.doneAt.slice(0,10) : g.tarih;
      return doneGun===bugun;
    }
    return true;
  }).forEach(function(g){
    tasks.push({
      tipo:"genel",
      baslik:g.baslik,
      atama:g.atama,
      tarih:g.tarih,
      gelisTarihi:"",
      geciken:(!g.done && g.tarih<bugun),
      id:g.id,
      done:!!g.done
    });
  });
  
  /* Protokol takvimi вҖ” sДұradaki olay-tipi adДұm bugГјn/gecikmiЕҹse listeye girer.
     Planlama'nДұn hesapladДұДҹДұ AYNI fonksiyon (siradakiProtokolAdimi), Odalar'daki
     Protokol Г–zeti ile aynДұ veri kaynaДҹДұ (SSOT). Tamamlama toggleTask Гјzerinden вҖ”
     tiftik/toprak/tДұrmДұk kendi detay kutusunu aГ§ar, diДҹerleri direkt iЕҹaretlenir.
     BugГјn TAMAMLANMIЕһ bir olay-tipi adДұm varsa (sonYapilanOlayAdimi), o da
     listeye Г§izili/вң“ olarak eklenir вҖ” "bugГјn ne yapДұldДұ" gГ¶rГјnsГјn. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t<=bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:sd.txt,
        atama:"",
        tarih:sd.t,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(sd.t<bugun),
        done:false,
        id:sd.idx,
        cyclicId:c.id
      });
    }
    var son=sonYapilanOlayAdimi(c);
    if(son && son.tarih===bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:son.txt,
        atama:"",
        tarih:son.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:false,
        done:true,
        id:son.idx,
        cyclicId:c.id
      });
    }
  });
  
  /* Sulama/ilaГ§ вҖ” bugГјnГјn protokol Г¶nerisi. Checkbox ile "tamamlanmaz" (Tur'dan
     girilir), o yГјzden buton yerine "Tur'a git" linki gГ¶sterilir. BugГјnkГј gГјnlГјk
     kayДұtta zaten sulama/su girilmiЕҹse "yapДұldДұ" sayДұlДұr вҖ” gizlenmez, Г§izili
     gГ¶rГјnГјr (gerГ§ekte ne uygulandДұДҹДұ orada okunur). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,bugun);
    if(!oneri) return;
    var gun=(c.gunluk||[]).find(function(g){return g.tarih===bugun;});
    var durum=(gun && gun.sulamaDurum)||"";
    /* Д°ptal edilmiЕҹ bir sulama "yapДұlmadДұ" (bekleyen/gecikmiЕҹ) sayДұlmaz вҖ”
       bilinГ§li bir Гјretim kararДұ olarak "tamamlandДұ" tarafДұnda gГ¶sterilir. */
    var yapildiMi=!!(gun && ((gun.sulama||"").trim() || numParse(gun.su)>0)) || durum==="iptal";
    tasks.push({
      tipo:"sulama",
      odaId:c.id,
      oda:c.oda,
      islem:yapildiMi?((numParse(gun.su)>0?gun.su+" lt su":"")+(gun&&gun.sulama?(" "+gun.sulama):"")).trim()||oneri:oneri,
      atama:"",
      tarih:bugun,
      gelisTarihi:c.gelisTarihi||"",
      geciken:false,
      done:yapildiMi,
      durum:durum,
      aciklama:(gun && gun.sulamaAciklama)||"",
      id:c.id,
      cyclicId:c.id
    });
  });

  /* ArДұzalar вҖ” kullanДұcДұ isteДҹi: aГ§Дұk arДұzalar bekleyen gГ¶rev olarak, bugГјn
     tamir edilenler ise "tamamlandДұ" olarak BugГјnkГј GГ¶revler listesinde de
     gГ¶rГјnsГјn (Kritik UyarДұlar bandДұna ek olarak вҖ” teknisyen artДұk BugГјn
     ekranДұnДұ gГ¶rГјyor, oradan da takip edebilsin). */
  (d.arizalar||[]).forEach(function(a){
    if(a.durum==="acik"){
      tasks.push({
        tipo:"ariza",
        oda:a.oda||"",
        islem:(a.oncelik==="acil"?"рҹ”ҙ ":"")+(a.baslik||"ArДұza"),
        atama:"",
        tarih:(a.tarih||bugun).slice(0,10),
        gelisTarihi:"",
        geciken:false,
        done:false,
        id:a.id,
        cyclicId:null
      });
    } else if(a.durum==="tamir" && a.tamirTarihi && a.tamirTarihi.slice(0,10)===bugun){
      tasks.push({
        tipo:"ariza",
        oda:a.oda||"",
        islem:a.baslik||"ArДұza",
        atama:"",
        tarih:bugun,
        gelisTarihi:"",
        geciken:false,
        done:true,
        id:a.id,
        cyclicId:null
      });
    }
  });

  /* SДұralama:
     1) BitmemiЕҹ her zaman bitenlerden Г¶nce (bitenler referans iГ§in en altta)
     2) Geciken iЕҹler en Гјstte (en eski gecikme Г¶nce)
     3) Normal iЕҹler: odanДұn kompost geliЕҹ tarihine gГ¶re YENД°DEN ESKД°YE
        (en son gelen kompostun odasДұ en Гјstte). AynДұ oda birlikte gruplanДұr. */
  tasks.sort(function(a,b){
    if(a.done!==b.done) return a.done?1:-1;   /* biten en sona */
    /* Geciken > normal */
    if(a.geciken!==b.geciken) return a.geciken?-1:1;
    if(a.geciken && b.geciken){
      /* Д°ki geciken: en eski gecikme (en kГјГ§Гјk tarih) Г¶nce */
      return (a.tarih<b.tarih)?-1:(a.tarih>b.tarih?1:0);
    }
    /* Д°ki normal: kompost geliЕҹ tarihi yeniden eskiye */
    var ag=a.gelisTarihi||"", bg=b.gelisTarihi||"";
    if(ag!==bg) return (ag>bg)?-1:1;   /* bГјyГјk tarih (yeni) Г¶nce */
    /* AynДұ geliЕҹte: aynДұ oda birlikte kalsДұn, sonra iЕҹ tarihine gГ¶re */
    if(a.oda!==b.oda) return ((a.oda||"")<(b.oda||""))?-1:1;
    return (a.tarih<b.tarih)?-1:1;
  });
  
  return tasks;
}

/* Helper: Tur kaydДұ girilmemiЕҹ odalar */
function getTourPendingRooms(){
  var d=loadData(), bugun=todayISO();
  var pending=[];
  
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var gunluk=(c.gunluk||[]);
    var bugunKaydi=gunluk.find(function(g){return g.tarih===bugun;});
    if(!bugunKaydi || !bugunKaydi.kompostC){
      pending.push({oda:c.oda, odaId:c.id, gelisTarihi:c.gelisTarihi||""});
    }
  });
  
  /* Kompost geliЕҹ tarihine gГ¶re YENД°DEN ESKД°YE (en son gelen kompost en Гјstte).
     AynДұ geliЕҹte oda adДұna gГ¶re. */
  pending.sort(function(a,b){
    var ag=a.gelisTarihi, bg=b.gelisTarihi;
    if(ag!==bg) return (ag>bg)?-1:1;   /* bГјyГјk tarih (yeni) Г¶nce */
    return ((a.oda||"")<(b.oda||""))?-1:1;
  });
  
  /* AynДұ oda adДұ birden fazla aГ§Дұk dГ¶ngГјde olamaz вҖ” tekilleЕҹtir.
     SДұralama en yeniden eskiye olduДҹu iГ§in ilk gГ¶rГјlen (en gГјncel) kalДұr.
     Bu, yanlДұЕҹlДұkla aГ§ДұlmДұЕҹ Г§ift kayДұtlarДұn listeyi kirletmesini Г¶nler. */
  var gorulen={}, tekil=[];
  pending.forEach(function(p){
    var ad=(p.oda||"").trim();
    if(gorulen[ad]) return;
    gorulen[ad]=true;
    tekil.push(p);
  });
  
  return tekil;
}

/* Helper: Son SAHA iЕҹlemleri вҖ” gГјnlГјk tur kayДұtlarДұndan Гјretilir.
   AynДұ mantДұk bugunIslemHTML() ile tutarlДұ (SSOT): su SADECE sayДұsal
   olarak >0 ise gГ¶sterilir ("0" veya boЕҹ asla yazДұlmaz). Hem sulama
   (mГјhendisin girdiДҹi su/ilaГ§) hem islemNot (protokol adДұmДұ Г¶zeti,
   Г¶rn. "tiftik", "toprak Г§ekimi yapДұldДұ") dahil edilir. */
function getRecentActions(){
  var d=loadData();
  var kayitlar=[];
  (d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var sulama=(g.sulama||"").trim();
      var suVar=(numParse(g.su)>0);
      /* "X iГ§in plan Y olarak gГјncellendi вҖ” gerekГ§e: ..." notlarДұ PLANLAMA'dДұr,
         fiili Гјretim/sulama iЕҹlemi deДҹil вҖ” Son Д°Еҹlemler'den Г§ДұkarДұlДұr. */
      var islemNotHam=(g.islemNot||"").trim();
      var islemNot=islemNotHam
        ? islemNotHam.split(" В· ").map(function(x){return x.trim();}).filter(function(x){
            return x && !/^.+ iГ§in plan /.test(x);
          }).join(" В· ")
        : "";
      if(!sulama && !suVar && !islemNot) return; /* fiili iЕҹ yok вҖ” atla */
      var parca=[];
      if(suVar) parca.push(g.su+" lt su"+(sulama?(" + "+sulama):""));
      else if(sulama) parca.push(sulama);
      if(islemNot) parca.push(islemNot);
      kayitlar.push({
        oda:c.oda,
        tarih:g.tarih,
        metin:parca.join(" В· "),
        vakit:g.vakit||""
      });
    });
  });
  /* En yeni tarih Г¶nce */
  kayitlar.sort(function(a,b){ return cmpDate(b.tarih, a.tarih); });
  return kayitlar.slice(0,6);
}

/* Helper: GГјnГјn ilerleme bilgisi */
function getDayProgress(){
  /* TEK KAYNAK: hem "kalan" hem "tamamlanan", getTodaysTasks()'in DГ–NDГңRDГңДһГң
     AYNI listeden sayДұlДұr вҖ” liste zaten 4 kategoriyi de (oda gГ¶revleri, genel
     gГ¶revler, protokol adДұmlarДұ, sulama/ilaГ§) doДҹru "done" bayraДҹДұyla iГ§eriyor.
     ESKД°DEN "tamamlanan" ayrДұ, sadece oda+genel gГ¶revlerini sayan bir mantДұkla
     hesaplanДұyordu вҖ” protokol adДұmДұ ve sulama/ilaГ§ tamamlamalarДұ hiГ§
     sayДұlmДұyordu. SonuГ§: liste "5 tamamlandДұ" derken Г¶zet kartДұ "0/0"
     gГ¶steriyordu (KRД°TД°K BUG, dГјzeltildi). Д°ki ayrДұ sayma mantДұДҹДұ olduДҹu
     sГјrece bu tГјr sapmalar tekrar olur вҖ” tek kaynaДҹa indirgemek kalДұcДұ Г§Г¶zГјm. */
  var tasks = getTodaysTasks()||[];
  var tamamlanan = tasks.filter(function(t){return t.done;}).length;
  var kalan = tasks.filter(function(t){return !t.done;}).length;
  var toplam = tamamlanan+kalan;
  return {
    toplam: toplam,
    tamamlanan: tamamlanan,
    kalan: kalan,
    yuzde: toplam>0?Math.round((tamamlanan/toplam)*100):0
  };
}

/* ---------- Yoklama ekranДұ ---------- */
var _yoklamaTarih=null;

var _yoklamaRaporYil=null, _yoklamaRaporAy=null;

    var t=new Date();

var YOKLAMA_AY_ADLARI=["Ocak","Еһubat","Mart","Nisan","MayДұs","Haziran","Temmuz","AДҹustos","EylГјl","Ekim","KasДұm","AralДұk"];
function yoklamaAylikRaporKutusuHTML(){

    + '<div class="field-row"><div><label>Ay</label><select id="yk_ay" onchange="_yoklamaRaporAy=parseInt(this.value,10);">'+aySecenek+'</select></div>'
    + '<div><label>YДұl</label><select id="yk_yil" onchange="_yoklamaRaporYil=parseInt(this.value,10);">'+yilSecenek+'</select></div></div>'

      + '<button class="btn small" onclick="printYoklamaRaporu(_yoklamaRaporYil,_yoklamaRaporAy)">рҹ–ЁпёҸ PDF OluЕҹtur / YazdДұr</button>'
      + '<button class="btn ghost small" onclick="yoklamaRaporuWhatsappGonder(_yoklamaRaporYil,_yoklamaRaporAy)">WhatsApp\'tan GГ¶nder</button>'
    + '</div></div>';
}
function renderYoklama(){
  el("hdrTitle").textContent = "Yoklama";
  var tarih = yoklamaTarihVal();
  var personel = getPersonelList().filter(function(p){ return p.aktif!==false; })

  var geldiSayi=0, gelmediSayi=0, izinliSayi=0;
  kayitlar.forEach(function(y){ if(y.durum==="geldi") geldiSayi++; else if(y.durum==="gelmedi") gelmediSayi++; else if(y.durum==="izinli") izinliSayi++; });

  var h = '<div class="card">'
    + '<div class="sec-title" style="margin-top:0;">рҹ§‘вҖҚрҹӨқвҖҚрҹ§‘ GГјnlГјk Yoklama</div>'
    + '<div><label>Tarih</label><input type="date" id="yk_tarih" value="'+tarih+'" onchange="yoklamaTarihDegis(this.value)"></div>'
    + '<div class="muted" style="margin-top:8px;">'+geldiSayi+' geldi В· '+gelmediSayi+' gelmedi В· '+izinliSayi+' izinli'
      + (personel.length ? (' В· '+(personel.length-kayitlar.length)+' henГјz iЕҹaretlenmedi') : '')
    + '</div></div>';

  if(!personel.length){
    h += '<div class="empty"><div class="big">рҹ§‘вҖҚрҹӨқвҖҚрҹ§‘</div><div>HenГјz personel eklenmemiЕҹ.</div><div class="muted" style="margin-top:6px;">Ayarlar вҶ’ Personel\'den ekleyebilirsin.</div></div>';
  } else {
    function personKart(p){
      var y=kayitMap[p.id];
      var durum=y?y.durum:"";
      function pill(val,label,renk){
        var on=durum===val;
        return '<button type="button" onclick="yoklamaKaydet(\''+tarih+'\',\''+p.id+'\',\''+val+'\')" '
          +'style="flex:1; min-height:44px; border-radius:10px; border:1.5px solid '+renk+'; font-size:13.5px; font-weight:700; cursor:pointer; '

        + '<div style="display:flex; gap:8px;">'
          + pill("geldi","вң“ Geldi","#1f7a4d")
          + pill("gelmedi","вң— Gelmedi","#c0291f")

          var on=gerekce===val;

            +'style="flex:1; min-height:38px; border-radius:8px; border:1.5px solid #c0291f; font-size:12.5px; font-weight:600; cursor:pointer; '

        }).join("");
        out += '<div style="display:flex; gap:6px; margin-top:8px;">'+gpills+'</div>';
      }
      out += '</div>';
      return out;

    /* Personel departman departman (getEkipler() sДұrasДұyla: Гңst YГ¶netim,
       Sevkiyat, Д°Г§ Ekip, DДұЕҹ Ekip, ...) gruplanДұr вҖ” kullanДұcДұ isteДҹi:
       "ekibi departman departman ayДұr". Гңyesi olmayan departman gГ¶sterilmez. */
    getEkipler().forEach(function(ek){
      var uyeler=personel.filter(function(p){return p.grup===ek.id;});
      if(!uyeler.length) return;
      h += '<div class="sec-title" style="margin:14px 0 6px;">рҹ‘Ҙ '+esc(ek.ad)+'</div>';
      uyeler.forEach(function(p){ h += personKart(p); });

  }

  h += yoklamaAylikRaporKutusuHTML();

  el("app").innerHTML = h;
}

  var personelIdSet={}; tumKayitlar.forEach(function(y){ personelIdSet[y.personelId]=1; });
  var personel=getPersonelList().filter(function(p){ return p.aktif!==false || personelIdSet[p.id]; })
    .slice().sort(function(a,b){ return (a.ad||"").localeCompare(b.ad||"","tr"); });

  function gunISO(g){ return ayOnEk+"-"+(g<10?"0":"")+g; }

  var headerCells=""; for(var g=1; g<=gunSayisi; g++) headerCells+='<th style="min-width:20px;">'+g+'</th>';
  var rows="", detaySections="";
  personel.forEach(function(p){
    var geldi=0, gelmedi=0, izinli=0;
    var gelmediGerekce={haftalik_izin:0, hasta:0, habersiz:0};
    var gelmediListe=[], izinliListe=[];
    var cells="";
    for(var gg=1; gg<=gunSayisi; gg++){
      var iso=gunISO(gg);
      var y=yoklamaBul(iso, p.id);
      if(!y){ cells+='<td></td>'; continue; }
      if(y.durum==="geldi"){ geldi++; cells+='<td style="background:#dcefe2;color:#1f7a4d;font-weight:700;">G</td>'; }
      else if(y.durum==="izinli"){ izinli++; izinliListe.push(iso); cells+='<td style="background:#fdeecb;color:#8a5a1f;font-weight:700;">Д°</td>'; }
      else if(y.durum==="gelmedi"){
        gelmedi++;
        var gk=y.gerekce||"habersiz"; gelmediGerekce[gk]=(gelmediGerekce[gk]||0)+1;
        gelmediListe.push({tarih:iso, gerekce:gk});
        var kisa=gk==="haftalik_izin"?"HД°":(gk==="hasta"?"H":"X");
        cells+='<td style="background:#fceaea;color:#c0291f;font-weight:700;" title="'+esc(YOKLAMA_GEREKCE_ETIKET[gk]||"")+'">'+kisa+'</td>';
      } else cells+='<td></td>';
    }
    rows+='<tr><td style="text-align:left;white-space:nowrap;"><b>'+esc(p.ad)+'</b></td>'+cells
      +'<td><b>'+geldi+'</b></td><td><b>'+gelmedi+'</b></td><td><b>'+izinli+'</b></td></tr>';

    var gerekceOzet=Object.keys(gelmediGerekce).filter(function(k){return gelmediGerekce[k]>0;})
      .map(function(k){ return YOKLAMA_GEREKCE_ETIKET[k]+": "+gelmediGerekce[k]; }).join(", ");
    detaySections += '<div style="margin-bottom:10px;">'
      + '<b>'+esc(p.ad)+'</b> вҖ” Geldi: '+geldi+' gГјn, Gelmedi: '+gelmedi+' gГјn'+(gerekceOzet?(' ('+esc(gerekceOzet)+')'):'')+', Д°zinli: '+izinli+' gГјn'
      + (gelmediListe.length ? ('<div class="muted" style="font-size:11.5px;">GelmediДҹi gГјnler: '+gelmediListe.map(function(x){return fmtDate(x.tarih)+" ("+YOKLAMA_GEREKCE_ETIKET[x.gerekce]+")";}).join(", ")+'</div>') : '')
      + (izinliListe.length ? ('<div class="muted" style="font-size:11.5px;">Д°zinli gГјnler: '+izinliListe.map(fmtDate).join(", ")+'</div>') : '')
      + '</div>';
  });

  return '<html><head><meta charset="utf-8"><title>Yoklama Raporu вҖ” '+YOKLAMA_AY_ADLARI[ay-1]+' '+yil+'</title>'
    +'<style>body{font-family:Arial,sans-serif;font-size:11px;color:#000;padding:14px;}'
    +'h1{font-size:18px;margin:0 0 4px;}h3{margin:16px 0 6px;font-size:13px;color:#14583a;}'
    +'table{border-collapse:collapse;margin-top:4px;}th,td{border:1px solid #999;padding:3px 4px;text-align:center;}'
    +'.muted{color:#555;font-size:11px;}</style></head><body>'
    +'<h1>Yoklama Raporu вҖ” '+YOKLAMA_AY_ADLARI[ay-1]+' '+yil+'</h1>'
    +'<div class="muted">OluЕҹturulma: '+fmtDateTime(new Date().toISOString())+'</div>'
    +'<div style="overflow-x:auto;"><table><thead><tr><th style="text-align:left;">Personel</th>'+headerCells+'<th>Geldi</th><th>Gelmedi</th><th>Д°zinli</th></tr></thead>'
    +'<tbody>'+(rows||('<tr><td colspan="'+(gunSayisi+4)+'">KayДұt yok</td></tr>'))+'</tbody></table></div>'
    +'<h3>Detay (gerekГ§eli)</h3>'
    +(detaySections||'<div class="muted">KayДұt yok.</div>')
    +'</body></html>';
}

function yoklamaRaporuWhatsappGonder(yil, ay){
  var ayStr=(ay<10?"0":"")+ay, ayOnEk=yil+"-"+ayStr;
  var tumKayitlar=getYoklamalar().filter(function(y){ return y.tarih && y.tarih.slice(0,7)===ayOnEk; });
  if(!tumKayitlar.length){ toast("Bu ay iГ§in yoklama kaydДұ yok"); return; }
  var personelIdSet={}; tumKayitlar.forEach(function(y){ personelIdSet[y.personelId]=1; });
  var personel=getPersonelList().filter(function(p){ return personelIdSet[p.id]; })
    .slice().sort(function(a,b){ return (a.ad||"").localeCompare(b.ad||"","tr"); });
  var lines=personel.map(function(p){
    var kayit=tumKayitlar.filter(function(y){return y.personelId===p.id;});
    var geldi=kayit.filter(function(y){return y.durum==="geldi";}).length;
    var gelmedi=kayit.filter(function(y){return y.durum==="gelmedi";}).length;
    var izinli=kayit.filter(function(y){return y.durum==="izinli";}).length;
    return "рҹ‘Ө "+p.ad+": Geldi "+geldi+", Gelmedi "+gelmedi+", Д°zinli "+izinli;
  });
  var msg="рҹ“Ӣ YOKLAMA RAPORU вҖ” "+YOKLAMA_AY_ADLARI[ay-1]+" "+yil+"\n\n"+lines.join("\n")+"\n\n(GГјn gГјn detaylДұ PDF iГ§in uygulamadan \"PDF OluЕҹtur/YazdДұr\"Дұ kullan.)\n(Dirican Mantar Гңretim Takip'ten)";
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }
  toast("вң“ WhatsApp aГ§ДұldДұ");
}

/* Kritik uyarДұya dokununca doДҹrudan Г§Г¶zГјm ekranДұna git */
function gotoAlert(index){
  var alerts=getCriticalAlerts();
  var a=alerts[index];
  if(!a){ go("bugun"); return; }
  if(a.tipo==="ariza"){
    /* AГ§Дұk arДұza вҶ’ ArДұzalar ekranДұ */
    go("arizalar");
    return;
  }
  if(a.tipo==="kompost" || a.tipo==="temp" || a.tipo==="havaHedef"){
    /* Kompost/tur eksik, sДұcaklДұk kritik veya havalandДұrma hedefinden sapma вҶ’ o odanДұn GГјnlГјk Tur ekranДұ */
    if(a.odaId){
      turOdayaGit(a.odaId);
    } else {
      go("tur");
    }
    return;
  }
  if(a.tipo==="kgeksik"){
    /* Kompost GeliЕҹ KontrolГј eksik maddeleri oda DETAY ekranДұnda вҖ” GГјnlГјk Tur'da deДҹil */
    if(a.odaId) openDetail(a.odaId); else go("bugun");
    return;
  }
  /* Bilinmeyen tip вҶ’ gГјvenli varsayДұlan */
  go("bugun");
}

/* Belirli bir odaya GГјnlГјk Tur ekranДұnda doДҹrudan git (tek oda modu) */
function turOdayaGit(odaId){
  var d=loadData();
  var active=d.cycles.filter(function(c){return !c.bosaltimTarihi;});
  /* renderTur ile AYNI sДұralama: en yeni вҶ’ en eski */
  active.sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var idx=-1;
  for(var i=0;i<active.length;i++){ if(active[i].id===odaId){ idx=i; break; } }
  setTurMod("tek");        /* tek oda moduna geГ§ */
  turIndex=(idx>=0)?idx:0; /* hedef odanДұn index'i */
  view={name:"tur", id:null};
  window.scrollTo(0,0);
  render();
}

/* Helper: GГ¶rev tamamla (oda veya genel) */
function gorevTamamla(id, tipo, cyclicId){
  if(!can("edit")){ noPerm(); return; }
  var d=loadData();
  var simdi=new Date().toISOString();
  if(tipo==="oda"){
    var c=d.cycles.find(function(x){return x.id===cyclicId;});
    if(c){
      var og=(c.odaGorevleri||[]).find(function(x){return x.id===id;});
      if(og){ og.done=true; og.doneAt=simdi; touchCycle(c); saveData(); logAudit("oda gГ¶revi tamamlandДұ", c.oda); render(); }
    }
  } else if(tipo==="genel"){
    var gorevler=getGorevler()||[];
    var g=gorevler.find(function(x){return x.id===id;});
    if(g){ g.done=true; g.doneAt=simdi; saveData(); logAudit("genel gГ¶rev tamamlandДұ", g.baslik); render(); }
  } else if(tipo==="protokol"){
    /* toggleTask kendi render()/toast'ДұnДұ yГ¶netir (tiftik/toprak/tДұrmДұk iГ§in
       detay kutusu aГ§ar) вҖ” burada tekrar toast basmadan direkt dГ¶n. */
    toggleTask(cyclicId, parseInt(id,10));
    return;
  }
  toast("вң“ TamamlandДұ");
}

/* Odaya Г¶zel, tek seferlik iЕҹlemler вҖ” GГ¶revler sekmesinden manuel eklenir */
/* gorevEkleVeyaBirlestir ile aynДұ desen (bkz. o yorumu) ama oda-bazlДұ
   gГ¶revler (c.odaGorevleri) iГ§in. */
function odaGorevEkleVeyaBirlestir(cid, tarih, is, atama){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  if(!c.odaGorevleri) c.odaGorevleri=[];
  var mevcut = c.odaGorevleri.find(function(g){ return !g.done && g.tarih===tarih && g.is===is; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    touchCycle(c);
    return false;
  }
  c.odaGorevleri.push({id:uid(), tarih:tarih, is:is, atama:atama||"", done:false, ertele:0});
  touchCycle(c);
  return true;
}
function odaGorevEkle(cid, tarih, is, atama){
  if(!can("edit")) return noPerm();
  is=(is||"").trim(); if(!is){ toast("Д°Еҹlem aГ§ДұklamasДұ gir"); return; }
  if(!tarih){ toast("Tarih seГ§"); return; }
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var yeni=odaGorevEkleVeyaBirlestir(cid, tarih, is, atama);
  saveData();
  if(yeni) logAudit("oda iЕҹlemi eklendi", c.oda+" В· "+is);
  toast(yeni?"Eklendi":"Bu iЕҹlem zaten vardДұ вҖ” atama gГјncellendi");
  render();
}

/* Elle gГ¶rev eklerken, protokolde aynДұ odaya zaten benzer bir iЕҹ planlДұ mДұ diye bakar.
   Basit ama etkili eЕҹleЕҹtirme: iЕҹ tГјrГјnГјn ilk kelimesi (Г¶rn. "tiftik", "poЕҹet") protokol
   satДұrДұnДұn metninde geГ§iyor mu + tarih birbirine yakДұn mДұ (Вұ3 gГјn). */
function protokolBenzerVarMi(cid, tur, tarih){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  var anahtar=(tur||"").toLocaleLowerCase("tr").split(/\s+/)[0];
  if(!anahtar || anahtar.length<3) return null;
  var hedefT=tarih||todayISO();
  var eslesen=null;
  getProtokol().forEach(function(s,idx){
    if(eslesen || s.silindi || s.tip!=="olay") return;
    var base=protokolTarih(c,s); if(!base) return;
    var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var t=addDays(base,ert);
    var fark=daysBetween(t,hedefT); if(fark===null || Math.abs(fark)>3) return;
    if((s.txt||"").toLocaleLowerCase("tr").indexOf(anahtar)>=0){
      eslesen={txt:s.txt, tarih:t};
    }
  });
  return eslesen;
}

     gГ¶rev otomatik olarak o odanДұn RESMД° kaydДұna (odaGorevleri) iЕҹlenir вҖ” tamamlanДұnca
     gГјnlГјk kayДұt/pano/PDF'de otomatik gГ¶rГјnГјr. DeДҹilse (depo, saha, ya da odanДұn aГ§Дұk
     dГ¶ngГјsГј yoksa) normal bir hatДұrlatma gГ¶revi olarak kalДұr. KullanДұcДұya ayrДұca soru
     sorulmaz вҖ” konum seГ§imine gГ¶re otomatik karar verilir. */
  var odaAdi = konum.match(/^Oda (.+)$/);

  if(hedefCycle){

    if(cakisan){
      var devamEt=confirm("вҡ пёҸ Bu iЕҹ protokolde zaten var:\n\""+cakisan.txt+"\" ("+fmtDate(cakisan.tarih)+" iГ§in planlДұ)\n\nYine de elle eklemek istiyor musun?");

  }
  _genelGorevAcik=false; _genelGorevAtama="";
  render();
}

/* Ekrandaki (henГјz taslaДҹa yazДұlmamДұЕҹ) dГјzenlemeleri taslaДҹa senkronla вҖ” satДұr
   silme/atama deДҹiЕҹikliДҹi gibi yapДұsal gГјncellemeler diДҹer satДұrlardaki elle
   yapДұlmДұЕҹ dГјzenlemeleri kaybetmesin diye Г¶nce bu Г§aДҹrДұlДұr. */
function topluDOMdanSenkronla(){

function topluTarihBul(text){
  var m = text.toLowerCase().match(/(\d{1,2})\s+(ocak|Еҹubat|subat|mart|nisan|mayДұs|mayis|haziran|temmuz|aДҹustos|agustos|eylГјl|eylul|ekim|kasДұm|kasim|aralДұk|aralik)/i);
  if(!m) return null;
  var gun=parseInt(m[1],10), ay=TOPLU_AYLAR[m[2]];
  if(!ay || !gun) return null;
  var yil=new Date().getFullYear();
  var mm=(ay<10?"0":"")+ay, dd=(gun<10?"0":"")+gun;
  return {tarih: yil+"-"+mm+"-"+dd, satir: m[0]};
}
function topluOdaBul(text){
  var bulunan=[];
  getOdaList().forEach(function(o){
    var m=o.match(/([A-Za-z]+)-(\d+)/); if(!m) return;
    var re=new RegExp("\\b"+m[1]+"\\s*-{0,3}\\s*"+m[2]+"\\b","i");
    if(re.test(text)) bulunan.push(o);
  });
  return bulunan;
}
function topluAtamaBul(text){
  var out=[];
  getEkipler().forEach(function(ek){
    var re=new RegExp("\\b"+ek.ad.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")+"\\b","i");
    if(re.test(text)) out.push("grup:"+ek.id);
  });
  getPersonelList().forEach(function(p){
    var ilkAd=(p.ad||"").trim().split(/\s+/)[0]; if(!ilkAd) return;
    var re=new RegExp("\\b"+ilkAd.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(text)) out.push("kisi:"+p.id);
  });
  return out.filter(function(v,idx){ return out.indexOf(v)===idx; });
}
function topluAyristir(){
  var metin=el("tg_metin").value||"";
  if(!metin.trim()){ toast("Metin boЕҹ"); return; }
  var varsayilanTarih=todayISO();
  var tb=topluTarihBul(metin);
  var satirlar=metin.split("\n");
  if(tb){
    varsayilanTarih=tb.tarih;
    /* Tarihin geГ§tiДҹi satДұrДұ (baЕҹka iГ§erik taЕҹДұmДұyorsa) metinden Г§Дұkar,
       yoksa her iЕҹlemin aГ§ДұklamasДұnda tarih satДұrДұ kalДұntДұ olarak kalДұr */
    satirlar=satirlar.filter(function(s){ return s.toLowerCase().indexOf(tb.satir.toLowerCase())<0 || s.trim().length>tb.satir.length+15; });
  }
  metin=satirlar.join("\n");
  var bloklar=metin.split(/\n\s*\n+/).map(function(b){return b.trim();}).filter(Boolean);
  var taslak=[];
  bloklar.forEach(function(b){
    var odalar=topluOdaBul(b);
    var konum=odalar.length?odalar[0]:"";
    var atama=topluAtamaBul(b).join(",");
    taslak.push({tarih:varsayilanTarih, konum:konum, is:b.replace(/\n/g," / ").trim(), atama:atama});
  });
  if(!taslak.length){ toast("HiГ§ iЕҹlem ayrДұЕҹtДұrДұlamadДұ"); return; }
  _topluTaslak=taslak;
  render();
}
function topluOnayla(){
  if(!can("edit")) return noPerm();
  topluDOMdanSenkronla();
  var eklenen=0, resmiKayit=0, birlesen=0;
  _topluTaslak.forEach(function(t){
    var konum=(t.konum||"").trim();
    var is=(t.is||"").trim();
    if(!is) return;
    /* AynДұ akДұllДұ yГ¶nlendirme: konum kayДұtlДұ bir odaya denk geliyorsa ve o odanДұn
       aГ§Дұk dГ¶ngГјsГј varsa, gГ¶rev otomatik olarak odanДұn resmi kaydДұna iЕҹlenir.
       Her ikisi de VeyaBirlestir Г§ekirdeДҹini kullanДұr вҖ” aynДұ iЕҹ (Г¶rn. pasteden
       metinde birden fazla satДұrda geГ§en "Oda B-1 В· Oda boЕҹaltma/yДұkama")
       kopya kopya "AtanmamДұЕҹ" gГ¶rev olarak birikmesin, mevcuda birleЕҹsin. */
    var hedefCycle = konum ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(konum); }) : null;
    if(hedefCycle){
      var yeni1=odaGorevEkleVeyaBirlestir(hedefCycle.id, (t.tarih||todayISO()), is, (t.atama||""));
      if(yeni1) resmiKayit++; else birlesen++;
    } else {
      var baslik = konum ? (konum+" В· "+is) : is;
      var yeni2=gorevEkleVeyaBirlestir((t.tarih||todayISO()), baslik, (t.atama||""));
      if(!yeni2) birlesen++;
    }

/* Delta T: kompost sДұcaklДұДҹДұ oda sДұcaklДұДҹДұndan yГјksek olmalДұ (kompost Г§alДұЕҹДұyor demek).
   Sadece SORUN varsa (eЕҹit ya da ters) gГ¶sterilir вҖ” normal durumda hiГ§bir Еҹey Г§Дұkmaz.
   EN SON gГјnlГјk kayda bakДұlДұr (bugГјn girilmemiЕҹ olsa bile) вҖ” dГјn sorun varsa uyarДұ
   bugГјn de Bildirimler'de gГ¶rГјnmeye devam eder, dГјzelten yeni bir kayДұt girilene kadar sГ¶nmez. */
function deltaTDurum(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var son = c.gunluk[c.gunluk.length-1];
  var od=numParse(son.odaC), ko=numParse(son.kompostC);
  if(od==null || ko==null) return null;
  if(ko<od) return "kritik";
  if(ko===od) return "esit";
  return null;
}
function deltaTUyariHTML(c){
  var durum = deltaTDurum(c);
  if(!durum) return "";
  var son = c.gunluk[c.gunluk.length-1];
  var kritik = (durum==="kritik");
  return '<div class="card" style="border:2px solid '+(kritik?'var(--red)':'var(--amber)')+'; background:'+(kritik?'var(--red-soft)':'var(--amber-soft)')+'; margin-bottom:12px;">'
    + '<div style="font-weight:700; color:'+(kritik?'var(--red)':'var(--amber)')+';">'
    + (kritik?'рҹ”ҙ KOMPOST ГҮALIЕһMIYOR вҖ” oda sДұcaklДұДҹДұ komposttan yГјksek':'рҹҹ  О” T eЕҹit вҖ” kompost henГјz ДұsДұnmДұyor')
    + '</div>'
    + '<div style="margin-top:4px; font-size:14px;">'
    + fmtDate(son.tarih)+' kaydДұ: oda '+esc(son.odaC)+'В°, kompost '+esc(son.kompostC)+'В°. '
    + (kritik?'Kompost ДұsДұ Гјretmiyor demektir вҖ” ziraat mГјhendisine bildir, kompost Г§alДұЕҹtДұrДұlmalДұ.':'Kompost oda ile aynДұ sДұcaklДұkta, henГјz Г§alДұЕҹmaya baЕҹlamamДұЕҹ olabilir вҖ” izle.')
    + '</div>'
    + '<div class="muted" style="margin-top:4px; font-size:12px;">Bu uyarДұ, dГјzelten yeni bir gГјnlГјk kayДұt girilene kadar kalkmaz.</div>'
    + '</div>';
}

function kompostAltUstDurum(c){

       "YarДұn iЕҹlem" / BugГјnkГј GГ¶revler ise doДҹru (ertelenmiЕҹ) tarihi
       kullandДұДҹДұ iГ§in ikisi arasДұnda tutarsДұzlДұk oluЕҹuyordu (kullanДұcДұ
       raporu: "protokol tablosu yarДұn diyor ama YarДұn sГјtunu boЕҹ"). */
    var _ert=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var _tRaw=protokolTarih(c,s);
    var t = (ar?ar.baslangic:(_tRaw?addDays(_tRaw,_ert):_tRaw));
    /* GГңVENLД°K AДһI: bir su/ilaГ§ satДұrДұnДұn tarihi hiГ§bir Еҹekilde hesaplanamДұyorsa
       (Г¶rn. bozuk/eksik referans zinciri), satДұr ESKД°DEN sessizce listeden
       kayboluyordu вҖ” kullanДұcДұ "satДұr yok" sanДұyordu ama aslДұnda satДұr VARDI,
       sadece tarihi null dГ¶ndГјДҹГј iГ§in gГ¶rГјnmГјyordu (bu, "Serenade kayboluyor"
       hatasДұnДұn kГ¶k nedeniydi). Еһimdi tarih hesaplanamasa bile satДұr GГ–RГңNГңR
       kalДұr, en Гјstte "вҡ пёҸ tarih hesaplanamadДұ" notuyla вҖ” sessiz kayДұp yerine
       teЕҹhis edilebilir hata. */
    return {s:s, idx:idx, t:t, ar:ar, hataVar:(!t && !ar), ert:_ert, tOrijinal:_tRaw, done:adimGercektenYapildiMi(c, idx, s)};
  }).filter(function(x){ return !x.s.silindi; });
  /* KullanДұcДұ isteДҹi: erteleme/planlama iЕҹlemleri SADECE bu sayfada (Oda
     DetayДұ вҶ’ Гңretim ProtokolГј) yapДұlabilsin вҖ” GГјnlГјk Tur, BugГјn listesi ve
     Odalar > Protokol Г–zeti'ndeki Ertele/Planla butonlarДұ kaldДұrДұldДұ (bkz.
     yarinPlanlanan kartДұ, panoHTML, odaProtokolOzetSatiriHTML). Buradaki tek
     kontrol noktasДұ olarak, henГјz yapДұlmamДұЕҹ ve tekrarlДұ (aralДұk bazlДұ)
     olmayan olay/ilaГ§/su satДұrlarДұna Ertele + Planla eklenir вҖ” aynДұ
     yarinErteleAc/Kaydet + planTarihiDegistirAc fonksiyonlarДұ (cid,idx

  function protTabloHTML(baslik, filtre){

      return (a.t||"")<(b.t||"")?-1:((a.t||"")>(b.t||"")?1:0);

    var hh='<div style="font-weight:700; margin:10px 0 4px;">'+baslik+'</div><table><thead><tr><th>Tarih</th><th>GГјn</th><th>Д°Еҹlem</th></tr></thead><tbody>';
    liste.forEach(function(x){
      var s=x.s, t=x.t;
      var refKisa = {gelis:"G", poset:"P", tiftik:"Ti", toprak:"T", tirmik:"Tr", hava:"H"}[s.ref] || (s.ref||"");
      var reflbl = refKisa+s.gun;

      var tarihHucre = x.hataVar

        : fmtDate(t);
      var ertBilgi = (!x.hataVar && !x.ar && x.ert && can("edit"))

            + '</div>';
        } else {
          aksiyonHTML='<div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;">'
            + '<button class="btn ghost small" style="padding:3px 8px;" onclick="yarinErteleAc(\''+c.id+'\','+x.idx+')">вҸ° Ertele</button>'

            + '</div>';
        }
      }
      hh += '<tr'+cls+'><td class="red">'+tarihHucre+ertBilgi+'</td>'
        + '<td class="muted">'+reflbl+'</td>'

    hh+='</tbody></table>';
    return hh;
  }
  prot += protTabloHTML('рҹҢұ Гңretim ProtokolГј', function(x){ return x.s.tip==="olay" && !/oda yДұka/i.test(x.s.txt); })

    /* SON GГңVENLД°K AДһI: yukarДұdaki 4 kategoriden hiГ§birine (tip alanДұ beklenmedik/
       bozuksa) girmeyen satДұrlar burada вҖ” hiГ§bir satДұr sessizce tamamen kaybolamaz. */

  prot += '<div class="muted" style="padding:8px 2px 0;">Tarihler tahminГ®dir (kДұrmДұzДұ). Toprak tarihi girilince topraktan sonraki gГјnler ona gГ¶re gГјncellenir. G=geliЕҹten, T=topraktan gГјn.</div></div>';

  /* Ziraat mГјhendisi notlarДұ */
  var notHTML = muhendisNotHTML(c);

  /* El yazДұsДұ Oda Takip Formu fotoДҹrafДұ */
  var fimgs = loadFormImgs(c.id);
  var formFoto = '<div class="sec-title">рҹ“Ӣ El yazДұsДұ Oda Takip Formu (fotoДҹraf)</div><div class="card" style="padding:12px;">'
    +'<div class="muted" style="margin-bottom:8px;">KaДҹДұt forma elle girilen Г¶lГ§Гјmlerin fotoДҹrafДұnДұ buraya yГјkle вҖ” kanДұt/arЕҹiv amaГ§lДұ, cihazda saklanДұr.</div>';
  if(fimgs.length){
    formFoto += '<div style="display:flex; flex-wrap:wrap; gap:10px;">';
    fimgs.forEach(function(im,i){
      var confirming=(_confirmDeleteFormPhoto===(c.id+":"+i));
      formFoto += '<div style="position:relative; width:122px;">'

            : ('<button class="del-x" style="position:absolute; top:-8px; right:-8px; background:#fff; border:1px solid var(--line); border-radius:50%; width:26px; height:26px; padding:0;" onclick="delFormPhotoClick(\''+c.id+'\','+i+')">Г—</button>'))
        + '<div class="muted" style="font-size:10px;">'+fmtDate((im.ts||"").slice(0,10))+'</div></div>';

  } else {

  }
  formFoto += '<div style="margin-top:10px;"><label class="btn sec small" style="cursor:pointer;">рҹ“· Form fotoДҹrafДұ ekle<input type="file" accept="image/*" capture="environment" style="display:none" onchange="if(this.files[0])addFormPhoto(\''+c.id+'\',this.files[0])"></label></div></div>';

  /* FotoДҹraflar */
  var imgs = loadImgs(c.id);
  var katOpt='', bolOpt='';
  for(var ki=1;ki<=5;ki++) katOpt+='<option value="'+ki+'">'+ki+'. kat</option>';
  for(var bi=1;bi<=12;bi++) bolOpt+='<option value="'+bi+'">'+bi+'. bГ¶lme</option>';
  var foto = '<div class="sec-title">HastalДұk / gГ¶zlem kayДұtlarДұ</div><div class="card" style="padding:12px;">';
  if(imgs.length){
    foto += '<div style="display:flex; flex-wrap:wrap; gap:10px;">';
    imgs.forEach(function(im,i){
      var loc=[]; if(im.taraf)loc.push(im.taraf); if(im.kat)loc.push(im.kat+". kat"); if(im.bolme)loc.push(im.bolme+". bГ¶lme");
      var locStr=loc.join(" В· ");
      foto += '<div style="position:relative; width:122px;">'
        + (im.data?('<img src="'+im.data+'" style="width:122px; height:96px; object-fit:cover; border-radius:8px; border:1px solid var(--line);" onclick="showPhoto(\''+c.id+'\','+i+')">'):'<div style="width:122px;height:96px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">not</div>')
        + '<button class="del-x" style="position:absolute; top:-8px; right:-8px; background:#fff; border:1px solid var(--line); border-radius:50%; width:26px; height:26px; padding:0;" onclick="delPhoto(\''+c.id+'\','+i+')">Г—</button>'
        + '<div style="font-size:11px; margin-top:2px;"><b>'+esc(locStr||"вҖ”")+'</b></div>'
        + (im.note?'<div class="muted" style="font-size:11px;">'+esc(im.note)+'</div>':'')
        + '<div class="muted" style="font-size:10px;">'+fmtDate((im.ts||"").slice(0,10))+'</div></div>';
    });
    foto += '</div>';
  } else {
    foto += '<div class="muted" style="padding:2px 0 8px;">HenГјz kayДұt yok.</div>';
  }
  foto += '<div style="border-top:1px solid var(--line); margin-top:10px; padding-top:10px;">'
    + '<div class="field-row"><div><label>Taraf</label><select id="ph_taraf"><option value="">вҖ”</option><option value="Sol">Sol</option><option value="SaДҹ">SaДҹ</option></select></div>'

  var verim = verimCardHTML(c);

        return '<button class="btn '+(aktif?'':'ghost')+' small" style="white-space:nowrap; flex:none;" onclick="odaSekmeAc(\''+s.key+'\')">'+s.ic+' '+s.ad+'</button>';

  /* HavalandДұrma hedef kartДұ (varsa) gГјnlГјk sekmesinde, uyarДұ niteliДҹinde en Гјstte */

/* ---------- Ziraat mГјhendisi notlarДұ (oda baЕҹДұna, gelecek Гјretimlere referans) ---------- */
/* ---------- Sesli not (ses kaydДұ) вҖ” genel amaГ§lДұ, herhangi bir formda kullanДұlabilir ----------
   TarayДұcДұnДұn mikrofon eriЕҹimiyle (MediaRecorder) kДұsa bir ses kaydДұ alДұr, base64 olarak
   geГ§ici bellekte tutar; ilgili "kaydet" fonksiyonu bunu okuyup kalДұcДұ depoya yazar. */
var _sesKayitAktif=null; /* {recorder, hedefId} */
var _sesKayitSonuc={};   /* hedefId -> base64 data URL */
function sesKayitWidgetHTML(hedefId){
  return '<div style="margin-top:8px;">'
    + '<button type="button" class="btn ghost small" id="ses_btn_'+hedefId+'" onclick="sesKayitToggle(\''+hedefId+'\')">рҹҺӨ Sesli not kaydet</button>'
    + '<div id="ses_onizleme_'+hedefId+'"></div>'
    + '</div>';
}
function sesKayitToggle(hedefId){
  if(_sesKayitAktif && _sesKayitAktif.hedefId===hedefId){ sesKayitDurdur(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder==="undefined"){
    toast("Bu cihaz/tarayДұcДұ ses kaydДұnДұ desteklemiyor"); return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var chunks=[];
    var rec;
    try{ rec=new MediaRecorder(stream); }catch(e){ toast("Ses kaydДұ baЕҹlatДұlamadДұ"); return; }
    rec.ondataavailable=function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };
    rec.onstop=function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob=new Blob(chunks, {type: rec.mimeType||"audio/webm"});
      var reader=new FileReader();
      reader.onload=function(){
        _sesKayitSonuc[hedefId]=reader.result;
        var onz=el("ses_onizleme_"+hedefId);
        if(onz) onz.innerHTML='<audio controls src="'+reader.result+'" style="width:100%; margin-top:6px;"></audio>'
          + '<div class="muted" style="font-size:12px;">KayДұt hazДұr вҖ” kaydet/ekle butonuna basДұnca not ile birlikte saklanДұr.</div>';
      };
      reader.readAsDataURL(blob);
      var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="рҹҺӨ Yeniden kaydet";
      _sesKayitAktif=null;
    };
    rec.start();
    _sesKayitAktif={recorder:rec, hedefId:hedefId};
    var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="вҸ№ Durdur";
    toast("KayДұt baЕҹladДұ, bitirince вҸ№ Durdur'a bas");
  }).catch(function(){ toast("Mikrofon izni verilmedi"); });
}
function sesKayitDurdur(){
  if(_sesKayitAktif && _sesKayitAktif.recorder && _sesKayitAktif.recorder.state!=="inactive"){ _sesKayitAktif.recorder.stop(); }
}

/* ---------- MГјhendis notu ekleri (fotoДҹraf/ses) вҖ” cihazda saklanДұr, senkronize olmaz.
   Not metni (c.notlar) zaten Firebase'e senkronize; foto/ses bГјyГјk olabileceДҹinden
   (Firestore dokГјman limiti) diДҹer fotoДҹraflar gibi sadece cihazda tutulur. */
function notEkKey(id){ return "utp_notek_"+id; }
function loadNotEkler(id){ try{ return JSON.parse(localStorage.getItem(notEkKey(id))||"[]"); }catch(e){ return []; } }
function saveNotEkler(id,arr){ try{ localStorage.setItem(notEkKey(id), JSON.stringify(arr)); return true; }catch(e){ toast("HafДұza dolu вҖ” ek kaydedilemedi"); return false; } }
function getMuhendisNotlari(c){ if(!Array.isArray(c.notlar)) c.notlar=[]; return c.notlar; }
function addMuhendisNotu(id){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===id;}); if(!c) return;
  var txt=(el("mn_txt").value||"").trim();
  var sesData=_sesKayitSonuc[id]||null;
  if(!txt && !sesData){ toast("Not yaz ya da sesli not kaydet"); return; }
  getMuhendisNotlari(c).push({tarih:todayISO(), metin:txt||"(sesli not)", by:deviceName()});
  if(sesData){
    var ekler=loadNotEkler(id);
    ekler.push({ts:new Date().toISOString(), tip:"ses", data:sesData});
    saveNotEkler(id, ekler);
    delete _sesKayitSonuc[id];
  }
  saveData(); toast("Not eklendi"); renderDetail(id);
}
function addMuhendisFoto(id, file){
  if(!can("edit")) return noPerm();
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var data=cv.toDataURL("image/jpeg",0.6);
      var ekler=loadNotEkler(id);
      ekler.push({ts:new Date().toISOString(), tip:"foto", data:data});
      if(saveNotEkler(id, ekler)){ toast("FotoДҹraf eklendi"); renderDetail(id); }
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
function delNotEk(id,i){
  if(!can("edit")) return noPerm();
  if(!confirm("Bu ek silinsin mi?")) return;
  var arr=loadNotEkler(id); arr.splice(i,1); saveNotEkler(id,arr); renderDetail(id);
}
var _confirmDeleteNot=null;
function delMuhendisNotu(id,i){
  if(!can("edit")) return noPerm();
  var key=id+":"+i;
  if(_confirmDeleteNot!==key){ _confirmDeleteNot=key; renderDetail(id); return; }
  var c=loadData().cycles.find(function(x){return x.id===id;}); if(!c) return;
  getMuhendisNotlari(c).splice(i,1); _confirmDeleteNot=null; saveData(); renderDetail(id);
}
function gecmisOdaNotlari(oda, excludeId){
  var n=normalizeOda(oda); var out=[];
  loadData().cycles.forEach(function(x){
    if(x.id===excludeId || normalizeOda(x.oda)!==n) return;
    getMuhendisNotlari(x).forEach(function(note){ out.push({tarih:note.tarih, metin:note.metin, gelis:x.gelisTarihi}); });
  });
  out.sort(function(a,b){ return cmpDate(b.tarih,a.tarih); });
  return out.slice(0,8);
}
function muhendisNotHTML(c){

function riskDegerlendir(c){
  if(c.bosaltimTarihi) return null;
  var son3=(c.gunluk||[]).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).slice(-3);
  if(!son3.length) return null;
  var last=son3[son3.length-1];
  var ko=numParse(last.kompostC), od=numParse(last.odaC);
  var nedenler=[], puan=0;
  var yuksekKomp = ko!=null && ko>=KOMPOST_KRITIK_UST;
  var dusukKomp = ko!=null && ko<=KOMPOST_KRITIK_ALT;
  var yuksekOda = od!=null && od>ODA_MAX;
  var co2Val = numParse(last.co2ust); if(co2Val==null) co2Val=numParse(last.co2alt);
  var yuksekCO2 = co2Val!=null && co2Val>3500;
  var nemYuksek = last.nem==="YГјksek";
  var amonyakVar = last.amonyak==="Var";
  var artiyor=false;
  if(son3.length>=2){
    var vals=son3.map(function(r){return numParse(r.kompostC);}).filter(function(v){return v!=null;});
    if(vals.length>=2 && (vals[vals.length-1]-vals[0])>=2) artiyor=true;
  }
  if(yuksekKomp && yuksekCO2 && (nemYuksek||amonyakVar)){
    nedenler.push("Kompost sДұcak + COвӮӮ yГјksek"+(nemYuksek?" + nem yГјksek":(amonyakVar?" + amonyak var":""))+" birlikte gГ¶rГјlГјyor вҖ” havalandДұrma yetersiz olabilir.");
    puan+=3;
  } else if(yuksekKomp && yuksekCO2){
    nedenler.push("Kompost sДұcak ve COвӮӮ yГјksek вҖ” havalandДұrmayДұ artДұrmayДұ deДҹerlendir.");
    puan+=2;
  }
  if(yuksekKomp && !yuksekCO2 && artiyor){ nedenler.push("Kompost sДұcaklДұДҹДұ son Г¶lГ§Гјmlerde yГјkseliyor вҖ” ateЕҹlenme gГјГ§leniyor olabilir, kompost aktivitesi fazla olabilir."); puan+=2; }
  if(dusukKomp){ nedenler.push("Kompost sДұcaklДұДҹДұ dГјЕҹГјk вҖ” misel geliЕҹimi yavaЕҹlayabilir; oda ДұsДұtmasДұ/izolasyonu kontrol et."); puan+=1; }
  if(amonyakVar && !yuksekCO2){ nedenler.push("Amonyak kokusu bildirilmiЕҹ вҖ” kompost fazla Дұslak ya da azot dengesi bozuk olabilir, havalandДұrmayДұ kontrol et."); puan+=2; }
  if(nemYuksek && yuksekKomp){ nedenler.push("Nem yГјksek + kompost sДұcak birlikte вҖ” sulama fazla kaГ§mДұЕҹ olabilir."); puan+=1; }
  if(yuksekOda && !airStarted(c)){ nedenler.push("Oda sДұcaklДұДҹДұ Гјst sДұnДұrДұn Гјzerinde вҖ” dДұЕҹ ortam/klima ayarДұnДұ kontrol et."); puan+=1; }
  if(!nedenler.length) return {seviye:"DГјЕҹГјk", nedenler:[], puan:0};
  var seviye = puan>=4?"YГјksek":(puan>=2?"Orta":"DГјЕҹГјk");
  return {seviye:seviye, nedenler:nedenler, puan:puan};
}
function riskCardHTML(c){
  var r=riskDegerlendir(c);

  var renk = r.seviye==="YГјksek"?"#c0291f":(r.seviye==="Orta"?"var(--amber)":"var(--muted)");
  var bg = r.seviye==="YГјksek"?"#fceaea":(r.seviye==="Orta"?"#fff6e5":"#f7f7f5");

/* Kompost geliЕҹ kontrolГјnde Г§Г¶zГјlmemiЕҹ maddesi olan (yeni gelmiЕҹ) odalar вҖ” GГ¶revler sekmesi ikazДұ */

/* Bir odanДұn kompost geliЕҹ kontrolГјnde eksik/sorunlu maddelerinin kДұsa listesi */
/* Kompost sДұcaklДұДҹДұ iГ§in en gГјncel Г¶lГ§ГјmГј bul (geliЕҹ gГјnГј ilk deДҹer mi, yoksa sonraki gГјnГјn tur Г¶lГ§ГјmГј mГј) */
function kgGuncelSicaklik(c){
  var sonOlcum=null;
  if(c.gunluk && c.gunluk.length){
    for(var gi=c.gunluk.length-1; gi>=0; gi--){
      var ga=numParse(c.gunluk[gi].kompostC), gu=numParse(c.gunluk[gi].kompostUst);
      if(ga!==null || gu!==null){ sonOlcum={alt:ga, ust:gu, tarih:c.gunluk[gi].tarih}; break; }
    }
  }
  /* KRД°TД°K FIX: ">" yerine ">=" вҖ” geliЕҹ GГңNГң mГјhendis Г¶nce "Д°lk gГјn kontrolГј" widget'Дұndan
     yГјksek bir sДұcaklДұk girmiЕҹ olabilir, sonra AYNI GГңN GГјnlГјk Tur'dan dГјЕҹГјk bir Г¶lГ§Гјm eklerse
     (tarihler eЕҹit), eski ">" ЕҹartДұ bunu gГ¶rmezden gelip eski/yГјksek deДҹere takДұlДұ kalДұyordu. */
  if(sonOlcum && (!c.gelisTarihi || sonOlcum.tarih>=c.gelisTarihi)){
    return {alt:sonOlcum.alt, ust:sonOlcum.ust, kaynak:"tur ("+fmtDate(sonOlcum.tarih)+")"};
  }
  return {alt:numParse(c.kgDereceAlt), ust:numParse(c.kgDereceUst), kaynak:"geliЕҹ gГјnГј"};
}
/* Nem 3 seГ§eneДҹe indirildi (YГјksek/Normal/DГјЕҹГјk). Eski kayДұtlarda hГўlГў
   Д°yi/Kuru/ГҮok kuru/Islak/ГҮok Дұslak olabilir вҖ” veri gГ¶Г§Гј yapmadan burada
   normalize ediyoruz ki hem eski hem yeni kayДұtlar aynДұ mantДұkla okunsun. */
function nemNormalize(v){
  if(v==="yuksek"||v==="islak"||v==="cok_islak") return "yuksek";
  if(v==="dusuk"||v==="kuru"||v==="cok_kuru") return "dusuk";
  if(v==="normal"||v==="iyi") return "normal";
  return v||"";
}
/* Kompost geliЕҹ sДұcaklДұДҹДұ iГ§in 3 kademe (kritikUst'ten AYRI вҖ” bu ikisi farklДұ
   amaГ§lar): 28В°'ye kadar sorun yok (madde kapalДұ). 28-35В° arasДұ hГўlГў soДҹuyor,
   hafif ikaz kalДұr. 35В° ГјstГј ACД°L: kompost torbalarДұ ДұslatДұlmalДұ. 35В°'nin
   altДұna dГјЕҹГјnce acil ikaz kalkar, hafif ikaza dГ¶ner (28В° altДұna dГјЕҹene kadar
   madde tam kapanmaz). */
var KG_SICAK_ORTA = 28, KG_SICAK_YUKSEK = 35;
function kompostEksikMaddeler(c){
  var eksik=[];
  var sic=kgGuncelSicaklik(c); var ko=sic.alt, kou=sic.ust;
  if(ko===null && kou===null) eksik.push("sДұcaklДұk girilmedi");
  else {
    var enY=(ko!==null&&kou!==null)?Math.max(ko,kou):(ko!==null?ko:kou);
    if(enY > KG_SICAK_YUKSEK) eksik.push("sДұcaklДұk ГҮOK yГјksek вҖ” kompost torbalarДұnДұ Дұslat");
    else if(enY > KG_SICAK_ORTA) eksik.push("sДұcaklДұk hГўlГў yГјksek");
  }
  if(!c.kgIrsaliye) eksik.push("irsaliye?");
  else if(c.kgIrsaliye==="hayir") eksik.push("irsaliye alДұnmadДұ");
  if(!(c.kestaneKat && c.kestaneTaraf)) eksik.push("kestane yeri?");
  if(!c.kgNem) eksik.push("nem?");
  else if(nemNormalize(c.kgNem)!=="normal") eksik.push("nem: "+c.kgNem);
  if(!c.kgAmonyak) eksik.push("amonyak?");
  else if(c.kgAmonyak==="belirsiz") eksik.push("amonyak belirsiz вҖ” yarДұnki tur'da bak");
  else if(c.kgAmonyak==="var" && !c.kgAmonyakHavalandirildi){
    var amGun=c.kgAmonyakVarTarihi?(daysBetween(c.kgAmonyakVarTarihi,todayISO())||0):0;
    eksik.push(amGun>=3 ? "amonyak 3+ gГјndГјr geГ§medi вҖ” poЕҹeti kes, kompostu havalandДұr" : "amonyak var вҖ” havalandДұrДұlДұyor");
  }
  if(!c.kgDuzeltme) eksik.push("dГјzeltme?");
  else if(c.kgDuzeltme==="gerek") eksik.push("kompost dГјzeltilmeli");
  return eksik;
}
/* TUR NUMARASI вҖ” ortak fonksiyon (SSOT). Bir kez girilir, sonra sadece

/* Tek bir odanДұn iЕҹlem geГ§miЕҹi (tiftik, toprak, tДұrmДұk, ilaГ§lama vb.) вҖ”
   BugГјn ekranДұndaki getRecentActions ile AYNI kaynak/mantДұk (SSOT), tek
   odaya daraltДұlmДұЕҹ. "Kim yaptДұ" bilgisi sistemde tutulmuyor (gГјnlГјk
   kayДұtlarda kiЕҹi alanДұ yok, sadece rol var) вҖ” bu yГјzden sadece tarih
   gГ¶sterilir, kiЕҹi uydurulmaz. */
function odaIslemGecmisi(c){
  var out=[];
  (c.gunluk||[]).forEach(function(g){
    var sulama=(g.sulama||"").trim();
    var suVar=(numParse(g.su)>0);
    var islemNot=(g.islemNot||"").trim();
    if(!sulama && !suVar && !islemNot) return;
    var parca=[];
    if(suVar) parca.push(g.su+" lt su"+(sulama?(" + "+sulama):""));
    else if(sulama) parca.push(sulama);
    if(islemNot) parca.push(islemNot);
    out.push({tarih:g.tarih, metin:parca.join(" В· ")});
  });
  out.sort(function(a,b){ return cmpDate(b.tarih, a.tarih); });
  return out;
}
function odaIslemGecmisiHTML(c){
  var kayitlar=odaIslemGecmisi(c);
  if(!kayitlar.length){
    return '<div class="muted" style="padding:8px 0;font-style:italic;">HenГјz iЕҹlem kaydДұ yok</div>';
  }
  var h='<div style="max-height:260px;overflow-y:auto;">';

    h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:baseline;font-size:13px;">'
      +'<span style="color:var(--muted);white-space:nowrap;min-width:70px;">'+fmtDate(k.tarih)+'</span>'

}

function setKG3(id,field,val){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;}); if(!c) return;
  if(field==="kgAmonyak"){
    if(val==="var"){
      /* Д°lk kez "Var" iЕҹaretleniyorsa gГјn sayacДұ baЕҹlar вҖ” tekrar "Var"a
         basДұlДұrsa (zaten var'ken) tarihi SIFIRLAMAYIZ, aksi halde 3 gГјnlГјk
         sayaГ§ hiГ§ ilerlemez. */
      if(c.kgAmonyak!=="var") c.kgAmonyakVarTarihi=todayISO();
    } else {
      /* yok/belirsiz'e dГ¶nГјlГјrse havalandДұrma onayДұnДұ ve gГјn sayacДұnДұ temizle */
      c.kgAmonyakHavalandirildi=false;
      c.kgAmonyakVarTarihi="";
    }
  }
  /* Kompost "DГјzeltilmeli" iЕҹaretlenince kompost indirmeden 1 gГјn sonraya
     "Kompost dГјzenleme" planДұ eklenir (GГ¶revler sekmesinde gГ¶rГјnГјr, ekip
     atanДұr). DiДҹer seГ§eneklerde (DГјzgГјn serilmiЕҹ / DГјzelttik) hiГ§bir Еҹey
     yapДұlmaz. AynДұ plan zaten (tamamlanmamДұЕҹ olarak) varsa tekrar eklenmez. */
  if(field==="kgDuzeltme" && val==="gerek"){
    var kiTarih=(c.kompostIndirme&&c.kompostIndirme.tarih)||c.gelisTarihi;
    if(kiTarih){
      var planTarih=addDays(kiTarih,1);
      var zatenVar=(c.odaGorevleri||[]).some(function(g){return g.is==="Kompost dГјzenleme" && !g.done;});
      if(!zatenVar) odaGorevEkle(id, planTarih, "Kompost dГјzenleme", "");
    }
  }
  c[field]=val;
  touchCycle(c); saveData(); renderDetail(id);
}

     Takip'ten bu oda+tur iГ§in tur girilmeden Г–NCE gelmiЕҹ olabilecek tartДұ
     verisi varsa hemen yakala; aksi halde sadece BД°R SONRAKД° Firestore
     deДҹiЕҹikliДҹine (onSnapshot) kadar gГ¶rГјnmezdi. */
  try{ hasatTartiTumDonguleriSenkronEt(); }catch(e){}

/* --- Kompost Д°ndirme PlanДұ formu: dokunmatik rozet (chip) durumu ---
   Tablette Ctrl+tДұkla yok; multi-select yerine isimlere dokunarak seГ§ilir.
   Form durumu render'lar arasДұ korunur (yanlДұЕҹlДұkla tДұklayДұnca sДұfДұrlanmasДұn). */
var _indTarih="", _indKompost="", _indMakine="";
var _indSecim={halat:[], ekip1:[], ekip2:[]};
/* Bir kiЕҹi zaten Makine / Halat / 1.Ekip / 2.Ekip rollerinden birinde seГ§iliyse,
   diДҹer rollerde hiГ§ gГ¶rГјnmesin вҖ” yanlДұЕҹlДұkla iki role seГ§ilmesin diye. */
function indBaskaYerdeSecili(ad, haricGrup){
  if(haricGrup!=="makine" && _indMakine===ad) return true;
  var gruplar=["halat","ekip1","ekip2"];
  for(var i=0;i<gruplar.length;i++){
    if(gruplar[i]===haricGrup) continue;
    if((_indSecim[gruplar[i]]||[]).indexOf(ad)>=0) return true;
  }
  return false;
}
function indChipHTML(grup){

  uygun.forEach(function(p){

    h+='<button type="button" onclick="indChipToggle(\''+grup+'\',\''+esc(p.ad).replace(/'/g,"\\'")+'\')" '
      +'style="display:inline-block; margin:3px; padding:6px 12px; border-radius:16px; border:1.5px solid var(--green); font-size:14px; min-height:36px; cursor:pointer; '

/* Formu okur, doДҹrular, WhatsApp mesajДұnДұ Гјretir. Hata varsa null dГ¶ner (toast gГ¶sterilmiЕҹ olur). */
function kompostPlanMesajOlustur(){
  var tarih=el("ind_tarih").value||"";
  var kompost=el("ind_kompost").value||"";
  var makine=el("ind_makine").value||"";
  var halat=_indSecim.halat||[], ekip1=_indSecim.ekip1||[], ekip2=_indSecim.ekip2||[];
  if(!tarih){ toast("Tarih gir"); return null; }
  if(!kompost){ toast("Kompost gir"); return null; }
  /* ГҮakДұЕҹma kontrolГј: aynДұ kiЕҹi hem halatta hem indirme ekibinde olamaz */
  var halatSet={}; halat.forEach(function(h){ halatSet[h]=1; });
  var ekip1Cak=ekip1.find(function(e){ return halatSet[e]; });
  if(ekip1Cak){ toast("вҡ пёҸ Halat ekibindeki kiЕҹi ("+ekip1Cak+") 1. Ekipe seГ§ilemiyor"); return null; }
  var ekip1Set={}; ekip1.forEach(function(e){ ekip1Set[e]=1; });
  var ekip2Cak=ekip2.find(function(e){ return ekip1Set[e]||halatSet[e]; });
  if(ekip2Cak){ toast("вҡ пёҸ "+ekip2Cak+" baЕҹka bir ekipte zaten seГ§ili вҖ” 2. Ekipe eklenemez"); return null; }
  var msg="рҹҘ¬ KOMPOST Д°NDД°RME PLANI\n\n";
  msg+="рҹ“… "+fmtDate(tarih)+"\n";
  msg+="рҹ“Ұ "+kompost+" Kompost Geliyor\n\n";
  msg+="рҹ‘· EKД°PLER:\n";
  if(makine) msg+="рҹ”§ Makine OperatГ¶rГј: "+makine+"\n";
  if(halat.length) msg+="рҹӘў Halat Ekibi: "+halat.join(", ")+"\n";
  if(ekip1.length) msg+="\n1пёҸвғЈ 1. Д°ndirme Ekibi: "+ekip1.join(", ")+"\n";
  if(ekip2.length) msg+="2пёҸвғЈ 2. Д°ndirme Ekibi: "+ekip2.join(", ")+"\n";
  msg+="\nSaatler:\nSabah 08:00'de baЕҹlayacaДҹДұz вң“";
  /* Bu bilgi eskiden sadece WhatsApp mesajДұnda kalДұp kayboluyordu вҖ” artДұk eЕҹleЕҹen
     aktif odaya kalДұcДұ olarak yazДұlДұyor ki PDF/rapor'da da gГ¶rГјnsГјn. */
  var hedefC=loadData().cycles.find(function(x){ return !x.bosaltimTarihi && normalizeOda(x.oda)===normalizeOda(kompost); });
  if(hedefC){
    hedefC.kompostIndirme={tarih:tarih, makine:makine, halat:halat.join(", "), ekip1:ekip1.join(", "), ekip2:ekip2.join(", ")};
    saveData();
  }
  return msg;
}

/* Bu dГ¶ngГјde hangi ilaГ§ ne zaman uygulanmДұЕҹ, sonraki en erken tekrar tarihi, hasat Г¶ncesi bekleme uyarДұsДұ */
function ilacGecmisi(c){
  var L=getIlacList(); if(!L.length) return [];
  var gunluk=(c.gunluk||[]).filter(function(r){return r.sulama;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  var out=[];
  L.forEach(function(ilac){
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    var kullanim=gunluk.filter(function(r){return re.test(r.sulama);});
    if(!kullanim.length) return;
    var son=kullanim[kullanim.length-1].tarih;
    var sonrakiTekrar = (ilac.tekrarGun!=null) ? addDays(son, ilac.tekrarGun) : null;
    var uyari=[];
    if(sonrakiTekrar && sonrakiTekrar>todayISO() && !c.bosaltimTarihi) uyari.push("En erken tekrar: "+fmtDate(sonrakiTekrar)+" (min "+ilac.tekrarGun+" gГјn ara)");
    if(ilac.hasatGun!=null){
      (c.hasat||[]).forEach(function(h){
        var fark=daysBetween(son, h.tarih);
        if(fark!=null && fark>=0 && fark<ilac.hasatGun){
          uyari.push("вҡ пёҸ "+fmtDate(h.tarih)+" hasadДұ, son uygulamadan "+fark+" gГјn sonra вҖ” hasat Г¶ncesi bekleme ("+ilac.hasatGun+" gГјn) dolmamДұЕҹ olabilir");
        }
      });
    }
    out.push({ad:ilac.ad, son:son, sayi:kullanim.length, uyari:uyari});
  });
  return out;
}
function ilacTekrarKontrolMesaji(c, tarih, sulamaTxt){
  if(!sulamaTxt) return [];
  var out=[];
  getIlacList().forEach(function(ilac){
    if(ilac.tekrarGun==null) return;
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    if(!re.test(sulamaTxt)) return;
    var gecmis=(c.gunluk||[]).filter(function(r){return r.sulama && re.test(r.sulama) && r.tarih!==tarih;});
    if(!gecmis.length) return;
    var sonOnceki=gecmis.slice().sort(function(a,b){return cmpDate(b.tarih,a.tarih);})[0];
    var fark=daysBetween(sonOnceki.tarih, tarih);
    if(fark!=null && fark>=0 && fark<ilac.tekrarGun){
      out.push(esc(c.oda||"")+": "+esc(ilac.ad)+" son uygulamadan ("+fmtDate(sonOnceki.tarih)+") "+fark+" gГјn sonra tekrar giriliyor вҖ” Г¶nerilen min. ara "+ilac.tekrarGun+" gГјn.");
    }
  });
  return out;
}

   tamamlandДұ iЕҹaretler ve (tarih bugГјnse) gГјnlГјk kayda otomatik not dГјЕҹer.
   "Bilgileri dГјzenle" formu ve hДұzlДұ tur ekranДұndaki "iЕҹaretle" butonlarДұ

   kopmasДұnlar diye (daha Г¶nce tam bu yГјzden bir hata olmuЕҹtu). */
function protokolGoreviTamamla(c, key, tarih){
  var pi=protokolRolIdx(key); if(pi<0) return;
  /* SSOT: tek yazma kapДұsДұndan geГ§ вҖ” bayrak, Г¶zel tarih ve gГјnlГјk not birlikte yazДұlДұr */

/* Tiftik/Toprak/TДұrmДұk/Hava'nДұn "Bilgileri dГјzenle" formunda ZATEN Г¶zel alanlarДұ var
   (c.tiftikTarihi vb.) вҖ” bunlarДұn protokoldeki karЕҹДұlДұk geldiДҹi satДұr index'lerini bulur,
   bГ¶ylece "DiДҹer Гңretim Д°Еҹlemleri" listesi bu 4'ГјnГј TEKRAR gГ¶stermez. */
function dedicatedAdimIdx(){
  var out={};
  ["tiftik","toprak","tirmik","hava"].forEach(function(key){
    var pi=protokolRolIdx(key);

   c.done["p"+idx] = yapДұldДұ mДұ, c.adimDetay["p"+idx] = {tarih, not} вҖ” tarihi geГ§miЕҹe de ayarlayabilirsin. */
function genericStepBlock(idx, s, c){
  var ad=(c && c.adimDetay && c.adimDetay["p"+idx]) || {};

  return '<div style="padding:8px 0;border-bottom:1px solid #eee;">'

    +'<div class="field-row"><div><label>Tarih (yapДұldДұysa)</label><input type="date" id="f_adim_'+idx+'_t" value="'+esc(ad.tarih||"")+'"></div>'
    +'<div><label>Not</label><input type="text" id="f_adim_'+idx+'_n" value="'+esc(ad.not||"")+'" placeholder="opsiyonel"></div></div>'
    +'</div>';

function saveForm(id){
  if(!can("edit")) return noPerm();
  var d = loadData();
  var c = id ? d.cycles.find(function(x){return x.id===id;}) : {id:uid(), gunluk:[], hava:[]};
  if(id && c && formBase.at && c._at && c._at!==formBase.at && c._by!==deviceName()){
    if(!confirm("Bu oda '"+(c._by||"?")+"' tarafДұndan "+fmtDateTime(c._at)+" deДҹiЕҹtirildi.\nSenin kaydДұn onun deДҹiЕҹikliklerini ezecek.\n\nTamam = yine de kaydet В· Д°ptal = gГјncel halini gГ¶ster")){
      openDetail(c.id); return;
    }
  }
  var odaRaw = el("f_oda").value;
  if(!odaRaw.trim()){ toast("Oda seГ§"); return; }
  var odaN = normalizeOda(odaRaw);
  /* MГңKERRER ENGELД°: yeni dГ¶ngГјde (veya oda deДҹiЕҹtirilirken) aynДұ odada aktif dГ¶ngГј varsa engelle */
  var mevcutBosaltim = el("f_bosalt").value;
  if(!mevcutBosaltim){ /* bu dГ¶ngГј aktif olacaksa */
    var cakisan = d.cycles.filter(function(x){
      return normalizeOda(x.oda)===odaN && !x.bosaltimTarihi && x.id!==(id||"");
    })[0];
    if(cakisan){
      toast(odaN+" odasДұnda zaten aktif kompost var вҖ” Г¶nce boЕҹalt");
      return;
    }
  }
  c.oda = odaN;
  var _fv=el("f_firma").value; c.kompostFirma=(_fv==="__new__"?"":_fv);
  c.tonaj = el("f_tonaj").value.trim();
  var alanGirilen = el("f_alan").value.trim();
  /* mВІ boЕҹ bДұrakДұldДұysa oda tanДұmДұndaki sabit mВІ'yi kullan */
  if(!alanGirilen){
    var sabitM2 = odaM2Get(odaN);
    c.alanM2 = sabitM2!==null ? String(sabitM2) : "";
  } else {
    c.alanM2 = alanGirilen;
  }
  c.gelisTarihi = el("f_gelis").value;
  c.partiNo = partiFromDate(c.gelisTarihi);
  /* Tiftik/Toprak/TДұrmДұk artДұk bu formdan yazДұlmДұyor вҖ” SSOT: tek giriЕҹ kapДұsДұ
     GГјnlГјk Tur'un detay kutusu (adimDetayKaydet). Burada sadece stepBlock ile
     salt-okunur gГ¶steriliyor. */
  /* DiДҹer Гңretim Д°Еҹlemleri (poЕҹet, oda yДұkama, hasat vb.) вҖ” geГ§miЕҹe yГ¶nelik dГјzenleme.
     SSOT: her adДұm tek kapДұdan (adimTamamla/adimGeriAl) yazДұlДұr. */
  if(!c.done) c.done={};
  if(!c.adimDetay) c.adimDetay={};
  var dedIdxSave=dedicatedAdimIdx();
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || dedIdxSave[idx]) return;
    var dEl=el("f_adim_"+idx+"_d"); if(!dEl) return;
    var tEl=el("f_adim_"+idx+"_t"), nEl=el("f_adim_"+idx+"_n");
    var yeniTarih=(tEl?tEl.value:"")||todayISO();
    var notDeg=(nEl?nEl.value.trim():"");
    var eskiDone=adimGercektenYapildiMi(c, idx, s);
    if(dEl.checked){
      /* adimTamamla sДұra engelini kendi dГ¶ndГјrГјr; hasat sДұrasДұ tutmuyorsa iЕҹareti geri al */
      if(!adimTamamla(c, idx, {tarih:yeniTarih, not:notDeg, sessiz:true})){
        dEl.checked=false;

function sulamaMetniGuncelle(selectId, dozId, targetTextId){
  var sel=el(selectId), doz=el(dozId), target=el(targetTextId);
  if(!sel || !doz || !target) return;

  if(ilac && d>0) target.value = d+" ml "+ilac;
  else if(ilac && d===0) target.value = ilac;
  /* KRД°TД°K: dropdown "вҖ” ilaГ§ yok / elle yaz вҖ”"e (boЕҹ deДҹer) geri alДұnДұrsa metni
     TEMД°ZLE. Eskiden burada hiГ§bir Еҹey yapДұlmДұyordu ("elle not girilebilsin"
     diye) вҖ” ama o ana kadar zaten bu picker'Дұn kendisi metni ezmiЕҹ oluyordu
     (yukarДұdaki satДұrlar), yani o noktada korunacak "elle yazДұlmДұЕҹ" bir metin
     kalmДұyordu. SonuГ§: yanlДұЕҹ ilaГ§/doz seГ§ilince Д°PTAL ETMENД°N hiГ§bir yolu
     yoktu вҖ” kullanДұcДұ elle metin kutusuna girip silmek zorunda kalДұyordu. */
  else if(!ilac) target.value = "";
}
/* "DeДҹiЕҹtir" kutusuna kullanДұcДұ tek bir serbest metin yazДұyor (Г¶rn. "250 lt su"
   veya "250 lt su + 100 ml Vivando") вҖ” ama Toplam Su / grafik / tГјketim Г¶zeti
   gibi hesaplar (tuketimOzet, gunlukSuMiktari) suyu HER ZAMAN gun.su alanДұndaki
   TEMД°Z SAYIDAN okur (normal Tur giriЕҹinde su slider'dan, ilaГ§ adДұ ayrДұ metin
   kutusundan gelir вҖ” ikisi hiГ§ karДұЕҹmaz). Bu metni olduДҹu gibi gun.sulama'ya
   yazДұp gun.su'yu boЕҹ bДұrakmak, "Toplam Su" ile o gГјn gerГ§ekte verilen su
   arasДұnda tutarsДұzlДұДҹa yol aГ§Дұyordu (kullanДұcДұ raporu). Bu yГјzden "+" ile
   ayrДұlan parГ§alar arasДұndan SADECE su olanlar (rakam + lt/litre, madde adДұ
   YOK) ayДұklanДұp gun.su'ya, kalan (ilaГ§) kДұsmДұ gun.sulama'ya yazДұlДұr. */
function sulamaMetniSuAyir(txt){
  txt=(""+(txt||"")).trim();
  if(!txt) return {su:"", sulama:""};
  /* Tek baЕҹДұna yazДұlmДұЕҹ Г§Дұplak bir sayДұ (birim/madde adДұ yok) вҖ” normal
     Tur'daki su slider'Дұyla birebir aynДұ kural: tek alanda baЕҹka anlamДұ
     olamayacaДҹДұ iГ§in doДҹrudan litre sayДұlДұr. */
  if(/^\d+(?:[.,]\d+)?$/.test(txt)) return {su:txt.replace(",","."), sulama:""};
  /* Geri kalanДұ iГ§in tekerleДҹi yeniden icat etmek yerine, raporlarДұn zaten
     kullandДұДҹДұ aynДұ sДұnДұflandДұrДұcДұyДұ (gunlukSatirAyristir) kullanДұyoruz вҖ”
     "1000 lt su (ilaГ§sДұz, neme gГ¶re artabilir)" gibi parantezli protokol
     metinlerini de doДҹru ayДұrt eder (madde adДұ yoksa/"su" ile baЕҹlДұyorsa
     su, deДҹilse ilaГ§ sayДұlДұr). */
  var ayr=gunlukSatirAyristir({sulama:txt, su:""});
  var suToplam=0;
  ayr.sulama.forEach(function(seg){
    var m=/^(\d+(?:[.,]\d+)?)/.exec(seg.trim());
    if(m) suToplam+=parseFloat(m[1].replace(",","."));
  });
  var kalan=ayr.ilac.concat(ayr.uretim).join(" + ");
  return {su: suToplam>0?(""+suToplam):"", sulama: kalan};
}

/* Verilen tarihte protokolГјn su mu ilaГ§ mДұ (yoksa ikisi mi) Г¶nerdiДҹini bulur

   gГ¶sterilir (daha sonuГ§lu karar sayДұlДұr). */
function _sulamaGunTuru(c, tarih){
  var ilacVar=false;
  getProtokol().forEach(function(s,idx){
    if(s.silindi || (s.tip!=="su" && s.tip!=="ilac")) return;
    if(s.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,s);
      if(ar && cmpDate(tarih,ar.baslangic)>=0 && cmpDate(tarih,ar.bitis)<=0 && s.tip==="ilac") ilacVar=true;

    if(dt===tarih && s.tip==="ilac") ilacVar=true;

   "yorum" fonksiyonlarДұyla aynДұ yaklaЕҹДұm, aГ§Дұklanabilir kalmasДұ iГ§in her

   altДұna alДұnДұr (gun.sulamaAIVerdict / c.erteleAIVerdict) вҖ” hem kullanДұcДұya

function erteleNedenAIKontrol(c, nedenAdi, tarih){

    return sonuc("sari","GГјncel kompost Г¶lГ§ГјmГј yok вҖ” doДҹrulanamДұyor.");
  }
  if(/^Kompost sДұcaklДұДҹДұ uygun deДҹil$/i.test(nedenAdi)){
    if(ko!=null && (ko>=KOMPOST_KRITIK_UST||ko<=KOMPOST_KRITIK_ALT)) return sonuc("yesil","Son Г¶lГ§Гјm "+ko+"В° вҖ” ideal aralДұДҹДұn dДұЕҹДұnda, kararla uyumlu.");
    if(ko!=null) return sonuc("sari","Son Г¶lГ§Гјm "+ko+"В° вҖ” ideale yakДұn gГ¶rГјnГјyor.");
    return sonuc("sari","GГјncel kompost Г¶lГ§ГјmГј yok вҖ” doДҹrulanamДұyor.");

  }
  if(/^(Гңretim mГјdГјrГј kararДұ|MГјhendis kararДұ|Teknik neden|Ekip\/personel yetiЕҹmedi)$/i.test(nedenAdi)){
    return sonuc("sari","Bu, veriyle doДҹrulanamayan bir yГ¶netim kararДұ вҖ” bilgi amaГ§lДұ kaydedildi.");
  }
  return sonuc("sari","Bu gerekГ§e mevcut verilerle otomatik doДҹrulanamДұyor.");
}

/* ==================== Havaya BaЕҹlama вҖ” karar kartДұ eylemleri ====================
   KullanДұcДұ isteДҹi: Havaya BaЕҹlama tarihi sadece protokol Г–NERД°SД°DД°R, son karar
   ziraat mГјhendisine ait вҖ” bu yГјzden "SДұradaki iЕҹlem" gibi bilgilendirici bir
   kart yerine aГ§Дұk bir BaЕҹlat/Ertele kararДұ istenir. Ertelenirse iЕҹleme Г¶zgГј
   dar bir neden seti (yalnДұzca sarДұm yeterliliДҹi/mГјhendis kararДұ/teknik neden
   вҖ” amonyak/sДұcaklДұk/nem BД°LEREK sorulmuyor, bu aЕҹamada zaten uygun olmalarДұ
   gerekir) + Yapay ZekГў KontrolГј Гјzerinden aynДұ SSOT (c.ertele/_adimiYarinaTasi)
   kullanДұlДұr.
   BaЕҹlat ise (kullanДұcДұ isteДҹi: "BaЕҹlat butonuna basДұnca yalnДұzca havaya
   baЕҹlama kaydДұ oluЕҹuyordu, ben bunu istemiyorum") artДұk kayДұt oluЕҹturmuyor вҖ”
   doДҹrudan mevcut "HavalandДұrma PlanДұ" ekranДұnДұ (go("havaplan",...) вҶ’
   renderHavaPlani вҶ’ havalandirmaPlaniHTML) aГ§Дұyor. Havaya baЕҹlama, YALNIZCA
   o ekranda plan baЕҹarДұyla oluЕҹturulunca (havaPlaniOlustur iГ§inde) kaydedilir
   вҖ” sДұcaklДұk/COвӮӮ yГ¶netimi planДұ olmadan havaya baЕҹlama tamamlanmДұЕҹ sayДұlmaz. */
/* KullanДұcДұ isteДҹi (Г¶nceki bir turda): "Havaya baЕҹla dediДҹim zaman havalandДұrma
   planДұ otomatik olarak Г§ДұkmasДұ gerekir" вҖ” bu fonksiyon SADECE havaya baЕҹlama
   SSOT kapДұsДұndan (adimTamamla) GEГҮД°P de plan henГјz kurulmamДұЕҹ odalar iГ§in
   (Г¶rn. "Bilgileri DГјzenle" formundan hava tarihi girilirse вҖ” BaЕҹlat artДұk bu
   fonksiyonu tetiklemez, kendi ekranДұnda mГјhendisin girdiДҹi gerГ§ek deДҹerlerle
   plan zaten kurulmuЕҹ olur) protokolГјn kendi tarif ettiДҹi varsayДұlan kademeli
   planДұ (4-5 gГјnde 21-22В°вҶ’18В°) sessizce kurar; zaten bir plan varsa dokunmaz. */
function havaPlaniOtomatikOlustur(c){
  if(c.hava && c.hava.length) return false;
  var gunSayisi=5, odaHedef=18;
  var odaBas=lastVal(c,"odaC"); if(odaBas===null) odaBas=22;
  var baz=c.havaBaslangic||todayISO();
  c.hava=[];
  for(var i=0;i<=gunSayisi;i++){
    var oran=i/gunSayisi;
    c.hava.push({tarih:addDays(baz,i), hedefC:""+(Math.round((odaBas+(odaHedef-odaBas)*oran)*10)/10), co2alt:"", co2ust:""});
  }
  return true;
}

    + '<div><label>BaЕҹlangДұГ§ Oda В°C</label><input type="number" step="0.1" inputmode="decimal" id="hp_oda_bas" placeholder="Г¶rn. 22"></div></div>'

/* BugГјnkГј GГ¶revler'de sulama/ilaГ§ satДұrДұ iГ§in "YapДұldДұ"nДұn tek seГ§enek olmamasДұ вҖ”
   kullanДұcДұ sulamayДұ planlanandan farklДұ uygulayabilir (400 lt yerine 250 lt gibi)
   veya bilinГ§li olarak hiГ§ uygulamayabilir (nem yГјksek, hastalДұk riski vb.). Bu
   fonksiyonlar o kararДұ Tur'a gitmeden, tek bir dokunuЕҹla kaydeder. SonuГ§,
   gun.sulamaDurum alanДұnda "degistirildi"/"iptal" olarak SSOT'a (c.gunluk) yazДұlДұr
   вҖ” BugГјnkГј GГ¶revler, GГјn Sonu Г–zeti ve CSV/PDF raporlarДұ aynДұ alandan okur. */
/* Sulama/ilaГ§ kararДұnДұ (deДҹiЕҹtir/iptal) SSOT'a yazar вҖ” Yapay ZekГў KontrolГј de
   burada Г§alДұЕҹДұr ve sonucu (gun.sulamaAIVerdict/gun.sulamaAIAciklama) kayda
   geГ§er: hem kullanДұcДұya anДұnda geri bildirim (toast) hem puanlamaya girdi
   (_puanSulamaYonetimi bu alanДұ okur вҖ” bkz. aЕҹaДҹДұda) hem ileride "bu tГјr
   kararlarДұn baЕҹarДұ oranДұ" analizleri iГ§in veri. */
function _sulamaKararKaydet(c, tarih, durum, deger, neden){
  var oneri=protokolOneri(c,tarih)||"";
  if(!c.gunluk) c.gunluk=[];
  var gun=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(!gun){ gun={tarih:tarih}; c.gunluk.push(gun); }
  if(durum==="iptal"){ gun.sulama=""; gun.su=""; }
  else { var ayr=sulamaMetniSuAyir(deger); gun.sulama=ayr.sulama; gun.su=ayr.su; }
  gun.sulamaDurum=durum; gun.sulamaAciklama=neden; gun.sulamaOrijinal=oneri;
  gun.sulamaKim=kimNeZamanEtiketi();
  var verdict=erteleNedenAIKontrol(c, neden, tarih);
  gun.sulamaAIVerdict=verdict.seviye; gun.sulamaAIAciklama=verdict.aciklama;
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  var eylemTxt = durum==="iptal" ? "Sulama iptal edildi" : ("Sulama deДҹiЕҹtirildi: "+deger);
  gunlukNotTariheEkle(c, tarih, eylemTxt+" (neden: "+neden+") вҖ” "+gun.sulamaKim);
  touchCycle(c); saveData(); closeWarnBox();
  var ikon=verdict.seviye==="yesil"?"рҹҹў":(verdict.seviye==="kirmizi"?"рҹ”ҙ":"рҹҹЎ");
  toast((durum==="iptal"?"Д°ptal edildi":"DeДҹiЕҹtirildi")+" В· "+ikon+" "+verdict.aciklama);
  render();
}

function topluKaydet(id, bas, son){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("KayДұt bulunamadДұ"); return; }
  if(!c.gunluk) c.gunluk=[];
  var eklenen=0, guncellenen=0, islemSayisi=0; var warnLines=[]; var warnSet={};
  var islemSecenekleri = getProtokol().map(function(s,idx){return {s:s,idx:idx};})
    .filter(function(x){ return !x.s.silindi && x.s.tip==="olay"; });
  for(var i=bas;i<=son;i++){
    var oda=el("tp_oda_"+i).value.trim(), komp=el("tp_komp_"+i).value.trim(), sul=el("tp_sul_"+i).value.trim(), su=el("tp_su_"+i).value.trim();
    var islemSecEl=el("tp_islem_"+i); var islemIdxStr=islemSecEl?islemSecEl.value:"";
    var tarih = addDays(c.gelisTarihi, i);
    /* Гңretim iЕҹlemi seГ§ildiyse SSOT kapДұsДұndan kaydet вҖ” Tur'daki detay kutusuyla
       AYNI fonksiyon (adimTamamla), sadece giriЕҹ yeri farklДұ. GeГ§miЕҹ gГјnГј unutmuЕҹsan
       buradan hДұzlДұca tamamlarsДұn. */
    if(islemIdxStr){
      var secX=islemSecenekleri.find(function(x){return (""+x.idx)===islemIdxStr;});
      if(secX && adimYapilmaTarihi(c, secX.idx, secX.s)!==tarih){
        if(adimTamamla(c, secX.idx, {tarih:tarih})) islemSayisi++;
        else warnLines.push(fmtDate(tarih)+": "+secX.s.txt+" kaydedilmedi вҖ” Г¶nceki adДұm henГјz tamamlanmamДұЕҹ");
      }
    }
    if(!oda && !komp && !sul && !su) continue; /* gГјnlГјk Г¶lГ§Гјm satДұrДұ boЕҹ, atla (iЕҹlem yine de yukarДұda kaydedildi) */
    var problems=gunlukKontrolMesaji(c, tarih, !!(sul||su));
    var blockAll=problems.some(function(p){return p.tip==="blockAll";});
    var blockSulama=problems.some(function(p){return p.tip==="blockSulama";});
    problems.forEach(function(p){ if(!warnSet[p.metin]){ warnSet[p.metin]=true; warnLines.push(p.metin); } });
    if(blockAll) continue; /* bu gГјn tamamen atlandДұ */
    if(blockSulama){ sul=""; su=""; if(!oda && !komp) continue; }
    var idx=-1; for(var k=0;k<c.gunluk.length;k++){ if(c.gunluk[k].tarih===tarih){ idx=k; break; } }
    var rec = idx>=0 ? c.gunluk[idx] : {tarih:tarih};
    if(rec.sulamaDurum && (sul!==(rec.sulama||"") || (numParse(su)||0)!==(numParse(rec.su)||0))){
      rec.sulamaDurum=""; rec.sulamaAciklama=""; rec.sulamaOrijinal="";
    }
    rec.odaC=oda; rec.kompostC=komp; rec.sulama=sul; rec.su=su;
    if(idx>=0){ c.gunluk[idx]=rec; guncellenen++; } else { c.gunluk.push(rec); eklenen++; }
  }
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("toplu veri giriЕҹi", c.oda+" В· "+eklenen+" yeni, "+guncellenen+" gГјncellendi"+(islemSayisi?", "+islemSayisi+" Гјretim iЕҹlemi":""));
  toast((eklenen+guncellenen+islemSayisi) ? (eklenen+" yeni, "+guncellenen+" gГјncellendi"+(islemSayisi?", "+islemSayisi+" iЕҹlem kaydedildi":"")) : "HiГ§bir satДұr dolu deДҹildi");
  if(warnLines.length) showWarnBox("BazДұ gГјnler/iЕҹlemler atlandДұ", warnLines);
  _topluRange=null; go("detail",id);
}

/* Havaya baЕҹlama kademeli plan: baЕҹlangДұГ§tan hedefe, seГ§ilen gГјn sayДұsДұnda
   doДҹrusal (eЕҹit adДұmlarla) dГјЕҹГјrГјlГјr вҖ” hem oda sДұcaklДұДҹДұ hem COвӮӮ iГ§in aynДұ
   gГјn sayДұsДұ kullanДұlДұr (mГјhendis kararДұ, tipik 4 veya 5 gГјn). GГјn 0 =
   c.havaBaslangic (henГјz iЕҹaretlenmediyse bugГјn); gГјn N = hedef deДҹerler.
   AynДұ tarihte satДұr zaten varsa Гјzerine yazДұlДұr (kopya oluЕҹmaz), bГ¶ylece
   plan yanlДұЕҹ girilirse tekrar oluЕҹturup dГјzeltilebilir.
   ZORUNLU KURAL (kullanДұcДұ isteДҹi): BaЕҹlat kartДұndan buraya gelindiyse (hava
   henГјz baЕҹlamamДұЕҹsa VE bu ekran view.name==="havaplan" ise) havaya baЕҹlama
   kaydДұ YALNIZCA plan burada BAЕһARIYLA oluЕҹturulunca, bu satДұrДұn sonunda ilk
   kez yazДұlДұr вҖ” sДұcaklДұk/COвӮӮ planДұ olmadan havaya baЕҹlama tamamlanamaz. Oda
   DetayДұ'ndan (plan zaten var olan bir odayДұ dГјzenlerken) Г§aДҹrДұlДұrsa bu ek
   adДұm atlanДұr, eskisi gibi sadece plan gГјncellenir. */
function havaPlaniOlustur(id){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("KayДұt bulunamadДұ"); return; }
  var gunSayisi = parseInt(el("hp_gun").value,10);
  var odaBas = numParse(el("hp_oda_bas").value), odaHedef = numParse(el("hp_oda_hedef").value);
  if(!gunSayisi || gunSayisi<1){ toast("GГјn sayДұsДұ gir (Г¶rn. 4 veya 5)"); return; }
  if(odaBas===null || odaHedef===null){ toast("BaЕҹlangДұГ§ ve hedef Oda В°C gir"); return; }
  var co2AltBas = numParse(el("hp_co2alt_bas").value), co2AltHedef = numParse(el("hp_co2alt_hedef").value);
  var co2UstBas = numParse(el("hp_co2ust_bas").value), co2UstHedef = numParse(el("hp_co2ust_hedef").value);
  var baslatiliyorMu = !c.havaBaslangic && view.name==="havaplan";
  var baz = c.havaBaslangic || todayISO();
  if(!c.hava) c.hava=[];
  for(var i=0;i<=gunSayisi;i++){
    var t = addDays(baz, i);
    var oran = i/gunSayisi;
    var satir = { tarih:t, hedefC: ""+(Math.round((odaBas+(odaHedef-odaBas)*oran)*10)/10), co2alt:"", co2ust:"" };
    if(co2AltBas!==null && co2AltHedef!==null) satir.co2alt = ""+Math.round(co2AltBas+(co2AltHedef-co2AltBas)*oran);
    if(co2UstBas!==null && co2UstHedef!==null) satir.co2ust = ""+Math.round(co2UstBas+(co2UstHedef-co2UstBas)*oran);
    var idx = c.hava.findIndex(function(r){ return r.tarih===t; });
    if(idx>=0) c.hava[idx]=satir; else c.hava.push(satir);
  }
  c.hava.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); logAudit("havalandДұrma planДұ oluЕҹturuldu", c.oda+" В· "+gunSayisi+" gГјn, "+odaBas+"В°вҶ’"+odaHedef+"В°");
  if(baslatiliyorMu){
    var hi=protokolRolIdx("hava");
    if(hi>=0){
      adimTamamla(c, hi, {tarih:baz, sessiz:true}); /* c.hava'yДұ az Г¶nce biz kurduk вҖ” SSOT'taki otomatik-plan zaten var olan planДұn Гјzerine yazmaz */
      gunlukGorevNotEkle(c, "Havaya BaЕҹlama вҖ” рҹҹў BaЕҹlatДұldДұ В· "+gunSayisi+" gГјnlГјk havalandДұrma planДұ ile ("+odaBas+"В°вҶ’"+odaHedef+"В°) вҖ” "+kimNeZamanEtiketi());
    }
    saveData();
    toast("рҹ’Ё Havaya baЕҹlandДұ вҖ” "+gunSayisi+" gГјnlГјk havalandДұrma planДұ oluЕҹturuldu");
    turOdayaGit(c.id);
  } else {
    saveData();
    toast(gunSayisi+" gГјnlГјk plan oluЕҹturuldu"); renderDetail(id);
  }
}

function download(filename, text, mime){
  var blob = new Blob([text], {type:mime||"text/plain;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}
