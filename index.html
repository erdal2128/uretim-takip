function fmtDate(iso){
  if(!iso) return "‚ÄĒ";
  var p = iso.split("-");
  if(p.length!==3) return iso;
  return p[2]+"."+p[1]+"."+p[0];
}
function todayISO(){
  var d=new Date(); var m=("0"+(d.getMonth()+1)).slice(-2); var dd=("0"+d.getDate()).slice(-2);
  return d.getFullYear()+"-"+m+"-"+dd;
}
function parseISO(iso){ var p=(iso||"").split("-"); if(p.length!==3) return null; var y=+p[0],m=+p[1],d=+p[2]; if(isNaN(y)||isNaN(m)||isNaN(d)) return null; return Date.UTC(y,m-1,d); }
function cmpDate(a,b){ a=a||""; b=b||""; return a<b?-1:(a>b?1:0); }
function daysBetween(a,b){
  var da=parseISO(a), db=parseISO(b);
  if(da===null||db===null) return null;
  return Math.round((db-da)/86400000);
}
function gunNo(cycle, iso){
  var base = cycle.gelisTarihi;
  if(!base && cycle.gunluk && cycle.gunluk.length) base = cycle.gunluk[0].tarih;
  var d = daysBetween(base, iso);
  return d===null ? "" : d;   /* geliŇü = 0. g√ľn */
}
function ortuGun(cycle, iso){
  if(!cycle.toprakTarihi) return null;
  var d = daysBetween(cycle.toprakTarihi, iso);
  return (d===null||d<0) ? null : d; /* toprak = 0. g√ľn; √∂ncesi boŇü */
}
function gunEtiket(c){
  var g=gunNo(c, todayISO());
  if(g==="") return "";
  var t=ortuGun(c, todayISO());
  return g + "/" + (t===null ? "\u2014" : t);
}
function addDays(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t + n*86400000);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* Ay ekleme ‚ÄĒ periyodik bakńĪm/kalibrasyon aralńĪklarńĪ i√ßin (6 ayda bir, yńĪlda
   bir vb). Ay taŇümalarńĪnńĪ (√∂rn. 31 Ocak + 1 ay) JS Date kendi normalize eder. */
function addMonths(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t);
  d.setUTCMonth(d.getUTCMonth()+n);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* ---------- Oda performans puanńĪ ‚ÄĒ KATEGORńįLńį, A√áIKLANABńįLńįR SńįSTEM ----------
   KullanńĪcńĪ isteńüi: tek toplam puan yerine, deneyimli bir mantar √ľretim
   m√ľd√ľr√ľn√ľn odayńĪ deńüerlendirme Ňüeklini taklit eden, kategori kategori
   a√ßńĪklanabilir bir puanlama ‚ÄĒ ileride yapay zek√Ę/makine √∂ńürenmesi
   tahminlerine veri sańülayacańüńĪ i√ßin her kategori kendi maksimum puanńĪnńĪ,
   kendi kalemlerini (+/-, a√ßńĪklamalńĪ) ve kritik hatalarńĪ ayrńĪ tutar; "neden
   88 aldńĪm" sorusuna kategori kategori cevap verilebilir.
   6 kategori, toplam 100 puan:
     ūüĆ°ÔłŹ ńįklim Y√∂netimi (25) ¬∑ ūüćĄ Misel GeliŇüimi (20) ¬∑ ūüďč Protokol Uygunluńüu (20)
     ūüíß Sulama Y√∂netimi (15) ¬∑ ūüďą Trend Analizi (10) ¬∑ ‚ö† Risk Fakt√∂rleri (10)
   Korunan/geniŇületilen ilkeler:
   1) Gecikme HAKLI bir biyolojik sebeple (sarńĪm/geliŇüme zayńĪf) ertelendiyse
      puan kńĪrńĪlmaz ‚ÄĒ bu dońüru bir karardńĪ.
   2) SńĪcaklńĪk ihlalleri GE√áMńįŇěTE kaldńĪysa, d√ľzeltilse bile etkisi kalńĪcńĪdńĪr.
   3) YENńį ‚ÄĒ aynńĪ ihlal biyolojik d√∂neme g√∂re farklńĪ ańüńĪrlńĪkta puan kńĪrar
      (kulu√ßkada kompost 30¬į ańüńĪr ceza, hasat sonunda hafif ceza) ‚ÄĒ bkz.
      _donemAgirlikKatsayisi. Sadece ceza deńüil, iyi y√∂netime k√ľ√ß√ľk √∂d√ľller
      de var (7 g√ľn ideal sńĪcaklńĪk, zamanńĪnda iŇülemler vb.).
   5) KalńĪcńĪ/kritik hatalar (_kritikHatalarTespit) normal kategori
      cezalarńĪndan AYRI, kendi baŇülńĪńüńĪ altńĪnda da g√∂sterilir. */

/* AynńĪ sńĪcaklńĪk/protokol ihlalinin biyolojik d√∂neme g√∂re ańüńĪrlńĪńüńĪ ‚ÄĒ misel en
   hassas olduńüu kulu√ßka/toprak d√∂neminde en ańüńĪr, hasat sonuna dońüru en
   hafif (o noktada geliŇüimini b√ľy√ľk √∂l√ß√ľde tamamlamńĪŇü olur). */
function _donemAgirlikKatsayisi(stageAd){
  if(stageAd==="Kulu√ßka d√∂nemi") return 1.4;
  if(stageAd==="Toprak d√∂nemi") return 1.2;
  if(stageAd==="1. Misel geliŇüim") return 1.0;
  if(stageAd==="2. Misel geliŇüim") return 0.8;
  if(stageAd==="Pimleme d√∂nemi") return 0.6;
  if(stageAd==="Bezelye boyutu" || stageAd==="Ceviz boyutu") return 0.5;
  if(stageAd && (stageAd.indexOf("Hasat")>=0 || stageAd.indexOf("FlaŇü")>=0)) return 0.3;
  return 1.0;
}
/* Kategori kalemi: delta (+√∂d√ľl/-ceza/0 bilgi) + a√ßńĪklama. T√ľm kategori
   fonksiyonlarńĪ aynńĪ Ňüekli d√∂nd√ľr√ľr ‚ÄĒ hem UI hem ileride ML tarafńĪ tek
   formatla √ßalńĪŇüsńĪn diye. */
function _kalem(delta, aciklama){ return {delta:delta, aciklama:aciklama}; }

/* ūüĆ°ÔłŹ ńįklim Y√∂netimi (25) ‚ÄĒ kompost/oda sńĪcaklńĪńüńĪ, stabilite, ani deńüiŇüim. */
function _puanIklim(c){
  var maks=25, kalemler=[], puan=maks, today=todayISO();
  var gunler=(c.gunluk||[]).filter(function(r){return r.tarih<=today;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});

  var tehlikeCeza=0, kritikCeza=0, tehlikeGun=0, kritikGun=0, idealSeri=0, maxIdealSeri=0;
  gunler.forEach(function(r){
    var ko=numParse(r.kompostC); if(ko==null) return;
    var kat=_donemAgirlikKatsayisi(stageAtDate(c,r.tarih).t);
    if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT){ tehlikeCeza+=3*kat; tehlikeGun++; idealSeri=0; }
    else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT){ kritikCeza+=1.5*kat; kritikGun++; idealSeri=0; }
    else if(ko>=KOMPOST_IDEAL_MIN && ko<=KOMPOST_IDEAL_MAX){ idealSeri++; if(idealSeri>maxIdealSeri) maxIdealSeri=idealSeri; }
    else idealSeri=0;
  });
  tehlikeCeza=Math.min(11,tehlikeCeza); kritikCeza=Math.min(6,kritikCeza);
  if(tehlikeCeza>0){ puan-=tehlikeCeza; kalemler.push(_kalem(-Math.round(tehlikeCeza), tehlikeGun+" g√ľn tehlikeli kompost sńĪcaklńĪńüńĪ (o d√∂nemin ańüńĪrlńĪńüńĪyla hesaplandńĪ)")); }
  if(kritikCeza>0){ puan-=kritikCeza; kalemler.push(_kalem(-Math.round(kritikCeza), kritikGun+" g√ľn kritik kompost sńĪcaklńĪńüńĪ (o d√∂nemin ańüńĪrlńĪńüńĪyla hesaplandńĪ)")); }
  if(maxIdealSeri>=7){ puan+=2; kalemler.push(_kalem(2, maxIdealSeri+" g√ľn √ľst √ľste ideal kompost sńĪcaklńĪńüńĪ")); }

  /* Oda sńĪcaklńĪńüńĪ: havadan √∂nce √ľst sńĪnńĪr (ODA_MAX), havadan sonra o g√ľn√ľn hedefine (havaHedef) g√∂re sapma. */
  var odaCeza=0, odaIhlalGun=0;
  gunler.forEach(function(r){
    var od=numParse(r.odaC); if(od==null) return;
    var kat=_donemAgirlikKatsayisi(stageAtDate(c,r.tarih).t);
    var havaBasladiMi = c.havaBaslangic && r.tarih>=c.havaBaslangic;
    if(!havaBasladiMi){ if(od>ODA_MAX){ odaCeza+=0.8*kat; odaIhlalGun++; } }
    else { var hedef=havaHedef(c); if(hedef!=null && Math.abs(od-hedef)>2){ odaCeza+=0.6*kat; odaIhlalGun++; } }
  });
  odaCeza=Math.min(5,odaCeza);
  if(odaCeza>0){ puan-=odaCeza; kalemler.push(_kalem(-Math.round(odaCeza), odaIhlalGun+" g√ľn oda sńĪcaklńĪńüńĪ sńĪnńĪrlarńĪn/hedefin dńĪŇüńĪnda")); }

  /* Stabilite: art arda √∂l√ß√ľmler arasńĪ b√ľy√ľk sńĪ√ßrama (ani deńüiŇüim). */
  var aniDegisim=0;
  for(var i=1;i<gunler.length;i++){
    var a=numParse(gunler[i-1].kompostC), b=numParse(gunler[i].kompostC);
    if(a!=null && b!=null && Math.abs(b-a)>=3) aniDegisim++;
  }
  if(aniDegisim>0){ var d=Math.min(3,aniDegisim); puan-=d; kalemler.push(_kalem(-d, aniDegisim+" ani kompost sńĪcaklńĪńüńĪ sńĪ√ßramasńĪ (‚Č•3¬į)")); }

  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"iklim", ad:"ūüĆ°ÔłŹ ńįklim Y√∂netimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* ūüćĄ Misel GeliŇüimi (20) ‚ÄĒ kilometre taŇülarńĪnńĪn (tiftik/toprak/tńĪrmńĪk/hava)
   plana g√∂re zamanlamasńĪ + ateŇülenme/erken poŇüet (misel patlamasńĪ) riski. */
function _puanMiselGelisimi(c){
  var maks=20, kalemler=[], puan=maks, today=todayISO();
  var MILESTONE_ROLLER={tiftik:1,toprak:1,tirmik:1,hava:1};
  var gecGun=0, gecAdimlar=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay" || !MILESTONE_ROLLER[s.rol]) return;
    var t=protokolTarih(c,s); if(!t) return;
    var ert=(c.ertele&&c.ertele["p"+idx])||0; t=addDays(t,ert);
    if(adimGercektenYapildiMi(c,idx,s)){
      var real=adimYapilmaTarihi(c,idx,s);
      if(real && real>t){ var g=daysBetween(t,real); gecGun+=g; gecAdimlar.push(s.txt+" ("+g+" g√ľn ge√ß)"); }
    } else if(t<today){
      var g2=daysBetween(t,today); gecGun+=g2; gecAdimlar.push(s.txt+" (h√Ęl√Ę yapńĪlmadńĪ, "+g2+" g√ľn ge√ßti)");
    }
  });
  if(gecGun>0){ var d=Math.min(10,gecGun*1.5); puan-=d; kalemler.push(_kalem(-Math.round(d), "GeliŇüim kilometre taŇülarńĪnda toplam "+gecGun+" g√ľn gecikme: "+gecAdimlar.slice(0,3).join(", "))); }
  else if(c.tiftikTarihi||c.toprakTarihi||c.tirmikTarihi||c.havaBaslangic){ puan+=2; kalemler.push(_kalem(2,"GeliŇüim kilometre taŇülarńĪ (tiftik/toprak/tńĪrmńĪk/hava) zamanńĪnda ilerliyor")); }

  /* AteŇülenme riski: kompostun geliŇüten 7-8. g√ľnde kritik/tehlikeli seyretmesi
     ‚ÄĒ misel patlamasńĪ riskinin en somut, veriye dayalńĪ iŇüareti. */
  var atesGunSayisi=0;
  (c.gunluk||[]).filter(function(r){return r.tarih<=today && (!c.toprakTarihi||r.tarih<c.toprakTarihi);}).forEach(function(r){
    var g=c.gelisTarihi?daysBetween(c.gelisTarihi,r.tarih):null;
    var ko=numParse(r.kompostC);
    if(g!=null && g>=7 && g<=8 && ko!=null && ko>=KOMPOST_KRITIK_UST) atesGunSayisi++;
  });
  if(atesGunSayisi>0){ puan-=3; kalemler.push(_kalem(-3, "AteŇülenme d√∂nemi (7-8. g√ľn) kompost sńĪcaklńĪńüńĪ y√ľksek seyretmiŇü ‚ÄĒ misel patlamasńĪ riski")); }

  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"misel", ad:"ūüćĄ Misel GeliŇüimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* ūüďč Protokol Uygunluńüu (20) ‚ÄĒ t√ľm adńĪmlar (kilometre taŇülarńĪ dahil, genel
   disiplin a√ßńĪsńĪndan) sńĪrasńĪnda mńĪ; ka√ßńĪ gecikmiŇü, ka√ßńĪ ciddi atlanmńĪŇü, erken
   yapńĪlan var mńĪ. */
function _puanProtokolUygunlugu(c){
  var maks=20, kalemler=[], puan=maks, today=todayISO();
  var gecikmis=[], atlanmis=[], erken=0, haklńĪ=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return; /* sulama kendi kategorisinde (ūüíß) deńüerlendirilir */
    var t=protokolTarih(c,s); if(!t) return;
    var ert=(c.ertele&&c.ertele["p"+idx])||0; var planli=addDays(t,ert);
    if(adimGercektenYapildiMi(c,idx,s)){
      var real=adimYapilmaTarihi(c,idx,s);
      /* B√∂l√ľm 3/9 (√úRETńįM DEńěERLENDńįRME SńįSTEMńį): protokol ZORUNLU bir takvim
         deńüil, referans plan ‚ÄĒ sarńĪm/misel geliŇüimi √ßok iyi olduńüu i√ßin bir
         adńĪm erken yapńĪlmńĪŇüsa (√∂rn. tńĪrmńĪk+3 yerine hava tńĪrmńĪk+1'de
         baŇülamńĪŇü) bu otomatik puan KIRMAMALI. M√ľhendis o adńĪmńĪ (B√∂l√ľm 1,
         c.muhendisDegerlendirme["p"+idx]) ńįyi/√áok ńįyi deńüerlendirmiŇüse
         biyolojik olarak gerek√ßeli sayńĪlńĪr, "erken" cezasńĪna dahil edilmez.
         Deńüerlendirme YOKSA ya da K√∂t√ľ/√áok K√∂t√ľ ise davranńĪŇü DEńěńįŇěMEZ (eski
         temkinli varsayńĪlan korunur) ‚ÄĒ sadece POZńįTńįF kanńĪt cezayńĪ kaldńĪrńĪr,
         veri eksiklińüi avantaj sańülamaz. */
      if(real && real<planli && daysBetween(real,planli)>=2){
        var _mDeg=c.muhendisDegerlendirme && c.muhendisDegerlendirme["p"+idx];
        var _mSv=_mDeg && _mDeg.seviye ? muhendisSeviyeBul(_mDeg.seviye) : null;
        if(_mSv && (_mSv.key==="iyi" || _mSv.key==="cok_iyi")){
          haklńĪ.push(s.txt+" (erken ‚ÄĒ m√ľhendis: "+_mSv.ikon+" "+_mSv.ad+")");
        } else {
          erken++;
        }
      }
      return;
    }
    if(planli<today){
      var g=daysBetween(planli,today);
      var sebep=c.erteleSebep && c.erteleSebep["p"+idx];
      if(sebep==="biyolojik"){ haklńĪ.push(s.txt); return; }
      if(g>=5) atlanmis.push(s.txt+" ("+g+" g√ľn)"); else gecikmis.push(s.txt+" ("+g+" g√ľn)");
    }
  });
  if(atlanmis.length){ var d1=Math.min(12,atlanmis.length*4); puan-=d1; kalemler.push(_kalem(-Math.round(d1), atlanmis.length+" iŇülem ciddi gecikmiŇü/atlanmńĪŇü: "+atlanmis.slice(0,3).join(", "))); }
  if(gecikmis.length){ var d2=Math.min(8,gecikmis.length*2); puan-=d2; kalemler.push(_kalem(-Math.round(d2), gecikmis.length+" iŇülem gecikmiŇü: "+gecikmis.slice(0,3).join(", "))); }
  if(haklńĪ.length){ kalemler.push(_kalem(0, haklńĪ.length+" iŇülem haklńĪ sebeple (geliŇüme/sarńĪm/m√ľhendis kararńĪ) protokolden saptńĪ ‚ÄĒ puan kńĪrńĪlmadńĪ")); }
  if(erken>=2){ puan-=1; kalemler.push(_kalem(-1, erken+" iŇülem planlanandan belirgin erken yapńĪlmńĪŇü ‚ÄĒ sńĪra kontrol√ľ √∂neriliir")); }
  if(!atlanmis.length && !gecikmis.length){ puan+=3; kalemler.push(_kalem(3,"T√ľm iŇülemler zamanńĪnda yapńĪlńĪyor")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"protokol", ad:"ūüďč Protokol Uygunluńüu", maks:maks, puan:puan, kalemler:kalemler, gecikmisAdimlar:gecikmis.concat(atlanmis), haklńĪGecikme:haklńĪ};
}

/* ūüíß Sulama Y√∂netimi (15) ‚ÄĒ protokol√ľn √∂nerdińüi g√ľn hi√ß kayńĪt girilmemiŇü mi
   (sessizce atlanmńĪŇü, ge√ßerli bir gerek√ße YOK ‚ÄĒ her zaman puan kńĪrar).
   ńįptal/deńüiŇütir kararlarńĪ artńĪk Yapay Zek√Ę Kontrol√ľ'nden (bkz.
   erteleNedenAIKontrol, gun.sulamaAIVerdict) ge√ßiyor ‚ÄĒ kullanńĪcńĪ isteńüi:
   "dońüru gerek√ßeyle yapńĪlan bilin√ßli ertelemeler puan d√ľŇü√ľrmemeli, hatta
   olumlu √ľretim y√∂netimi olarak deńüerlendirilebilmeli". Sadece se√ßilen
   gerek√ßenin mevcut verilerle √áELńįŇěTńįńěńį (ūüĒī) kararlar puan kńĪrar; ūüüĘ/ūüü°
   (uyumlu ya da dońürulanamayan) kararlar puanńĪ ETKńįLEMEZ. */
function _puanSulamaYonetimi(c){
  var maks=15, kalemler=[], puan=maks, today=todayISO();
  var gunler=(c.gunluk||[]).filter(function(r){return r.tarih<=today;});
  var kacirilanSayisi=0, toplamGun=0, riskliSayisi=0, uyumluSayisi=0, kararSayisi=0;
  gunler.forEach(function(r){
    if(r.sulamaDurum==="iptal" || r.sulamaDurum==="degistirildi"){
      kararSayisi++;
      if(r.sulamaAIVerdict==="kirmizi") riskliSayisi++;
      else if(r.sulamaAIVerdict==="yesil") uyumluSayisi++;
    }
    var oneri=protokolOneri(c,r.tarih);
    if(!oneri) return;
    toplamGun++;
    var girildi = (numParse(r.su)>0) || (r.sulama&&r.sulama.trim()) || r.sulamaDurum;
    if(!girildi) kacirilanSayisi++;
  });
  if(kacirilanSayisi>0){ var d1=Math.min(8,kacirilanSayisi*2); puan-=d1; kalemler.push(_kalem(-Math.round(d1), kacirilanSayisi+" g√ľn protokol sulama/ila√ß √∂nerdińüi halde hi√ß kayńĪt girilmemiŇü ‚ÄĒ ge√ßerli bir gerek√ße yok")); }
  if(riskliSayisi>0){ var d2=Math.min(6,riskliSayisi*3); puan-=d2; kalemler.push(_kalem(-Math.round(d2), riskliSayisi+" sulama kararńĪ se√ßilen gerek√ßeyle √ßeliŇüen verilerle kaydedildi (ūüĒī)")); }
  if(uyumluSayisi>=2 && !riskliSayisi && !kacirilanSayisi){ puan+=2; kalemler.push(_kalem(2, uyumluSayisi+" sulama kararńĪnńĪn gerek√ßesi verilerle dońürulandńĪ (ūüüĘ) ‚ÄĒ bilin√ßli, tutarlńĪ y√∂netim")); }
  else if(toplamGun>0 && !kacirilanSayisi && !kararSayisi){ puan+=2; kalemler.push(_kalem(2,"Sulama protokole tam uyumlu uygulanńĪyor")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"sulama", ad:"ūüíß Sulama Y√∂netimi", maks:maks, puan:puan, kalemler:kalemler};
}

/* ūüďą Trend Analizi (10) ‚ÄĒ son √∂l√ß√ľmler ideale mi yaklaŇüńĪyor uzaklaŇüńĪyor mu,
   risk (art arda k√∂t√ľleŇüen √∂l√ß√ľm sayńĪsńĪ) artńĪyor mu. */
/* B√∂l√ľm 7 (√úRETńįM DEńěERLENDńįRME SńįSTEMńį) ‚ÄĒ kullanńĪcńĪ isteńüi: "Trend Analizi"
   kategorisini KALDIR, yerine "Hasat Eńürisi" koy. Mevcut hasatEgrisiAnaliz
   motorunu (0-100 zamanlama/denge puanńĪ) yeniden kullanńĪr, 10 puanlńĪk bu
   kategoriye orantńĪlńĪ olarak yansńĪtńĪr. Hen√ľz hasat/flaŇü verisi yoksa (odanńĪn
   aktif hayatńĪnńĪn B√úY√úK kńĪsmńĪ ‚ÄĒ kulu√ßka/toprak/hava d√∂nemleri) N√ĖTR (tam
   puan, ceza yok) d√∂ner: bu kategori hen√ľz uygulanabilir deńüilken odayńĪ
   haksńĪz yere cezalandńĪrmaz. */
function _puanHasatEgrisi(c){
  var maks=10, kalemler=[], puan=maks;
  var flaslar=[1,2].map(function(f){ return hasatEgrisiAnaliz(c,f); }).filter(Boolean);
  if(!flaslar.length){
    return {key:"hasategrisi", ad:"ūüďą Hasat Eńürisi", maks:maks, puan:maks, kalemler:kalemler};
  }
  var toplamOran=0;
  flaslar.forEach(function(a){
    toplamOran+=a.puan;
    (a.bulgular||[]).slice(0,2).forEach(function(b){ kalemler.push(_kalem(0, a.flas+". flaŇü: "+b.aciklama)); });
  });
  var ortOran=toplamOran/flaslar.length; /* 0-100 */
  puan=Math.max(0,Math.min(maks,Math.round(ortOran/100*maks)));
  var d=maks-puan;
  if(d>0) kalemler.unshift(_kalem(-d, "Hasat eńürisi ortalama "+Math.round(ortOran)+"/100 ‚ÄĒ zamanlama/denge sapmasńĪ"));
  return {key:"hasategrisi", ad:"ūüďą Hasat Eńürisi", maks:maks, puan:puan, kalemler:kalemler};
}

/* ‚ö† Risk Fakt√∂rleri (10) ‚ÄĒ ŇěU AN s√ľregelen riskler. ūüĆ°ÔłŹ ńįklim kategorisi
   GE√áMńįŇě maruziyeti kalńĪcńĪ olarak cezalandńĪrńĪr; burada aynńĪ ihlalin h√Ęl√Ę
   DEVAM ediyor olmasńĪ (d√ľzeltilmemiŇü, s√ľregelen risk) ayrńĪca deńüerlendirilir
   ‚ÄĒ farklńĪ bir y√∂netim sorunudur. Kritik hatalar da burada bir kalemle
   toplam puana yansńĪr (ayrńĪca kendi baŇülńĪńüńĪnda da g√∂sterilir). */
function _puanRiskFaktorleri(c, kritikHatalar){
  var maks=10, kalemler=[], puan=maks;
  tempAlerts().filter(function(a){return a.cid===c.id;}).forEach(function(a){
    if(a.lvl===2){ puan-=4; kalemler.push(_kalem(-4,"Ňěu an tehlikeli sńĪcaklńĪk: "+a.txt)); }
    else if(a.lvl===1){ puan-=2; kalemler.push(_kalem(-2,"Ňěu an kritik sńĪcaklńĪk: "+a.txt)); }
  });
  if(odaHastalikRiskli(c)){
    var son14=addDays(todayISO(),-14);
    var son14Kayitlar=(c.hastalikKayitlar||[]).filter(function(k){return k.tarih>=son14;}).sort(function(x,y){return cmpDate(y.tarih,x.tarih);});
    var turler=son14Kayitlar.map(function(k){return k.tur;}).filter(function(t,i,arr){return t && arr.indexOf(t)===i;});
    puan-=3; kalemler.push(_kalem(-3,"Son 14 g√ľnde "+son14Kayitlar.length+" hastalńĪk/zararlńĪ kaydńĪ"+(turler.length?(" ‚ÄĒ "+turler.join(", ")):"")));
  }
  var son=sonGunluk(c);
  if(son && son.amonyak==="Var"){ puan-=2; kalemler.push(_kalem(-2,"Amonyak kokusu bildirilmiŇü")); }
  ilacGecmisi(c).forEach(function(g){
    if(g.uyari.some(function(u){return u.indexOf("‚ö†ÔłŹ")===0;})){ puan-=3; kalemler.push(_kalem(-3, g.ad+": hasat √∂ncesi bekleme ihlali riski")); }
  });
  if(kritikHatalar.length){ var d=Math.min(6,kritikHatalar.length*2); puan-=d; kalemler.push(_kalem(-d, kritikHatalar.length+" kalńĪcńĪ kritik hata (aŇüańüńĪda detaylńĪ)")); }
  /* Yapay Zek√Ę Kontrol√ľ'n√ľn "ūüĒī riskli" bulduńüu protokol adńĪmńĪ ertelemeleri ‚ÄĒ
     kullanńĪcńĪ isteńüi: "erteleme √ľretim a√ßńĪsńĪndan risk oluŇüturuyorsa puanńĪ
     etkileyebilir" ‚ÄĒ normal gecikme cezasńĪnńĪn (Protokol Uygunluńüu/Misel
     GeliŇüimi) √úST√úNE, veriyle √ßeliŇüen gerek√ße se√ßimi i√ßin ayrńĪ bir ceza. */
  var riskliErtelemeSayisi = c.erteleAIVerdict ? Object.keys(c.erteleAIVerdict).filter(function(k){return c.erteleAIVerdict[k]==="kirmizi";}).length : 0;
  if(riskliErtelemeSayisi>0){ var d2=Math.min(4,riskliErtelemeSayisi*2); puan-=d2; kalemler.push(_kalem(-d2, riskliErtelemeSayisi+" erteleme kararńĪ se√ßilen gerek√ßeyle √ßeliŇüen verilerle kaydedildi (ūüĒī)")); }
  puan=Math.max(0,Math.min(maks,Math.round(puan)));
  return {key:"risk", ad:"‚ö† Risk Fakt√∂rleri", maks:maks, puan:puan, kalemler:kalemler};
}

/* KalńĪcńĪ/kritik hatalar ‚ÄĒ normal kategori cezalarńĪndan AYRI listelenir
   (kullanńĪcńĪ isteńüi: "bu hatalar ayrńĪ deńüerlendirilsin"). Risk Fakt√∂rleri
   kategorisi √ľzerinden toplam puana da yansńĪr, ama kullanńĪcńĪya HER ZAMAN
   kendi baŇülńĪńüńĪ altńĪnda, gerek√ßesiyle g√∂sterilir. */
function _kritikHatalarTespit(c){
  var out=[], today=todayISO();
  var seri=0, maxSeri=0;
  (c.gunluk||[]).filter(function(r){return r.tarih<=today;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null && (ko>=KOMPOST_TEHLIKELI||ko<=KOMPOST_TEHLIKE_ALT)){ seri++; if(seri>maxSeri) maxSeri=seri; } else seri=0;
  });
  if(maxSeri>=3) out.push("Kompost art arda "+maxSeri+" g√ľn tehlikeli sńĪcaklńĪkta kaldńĪ ‚ÄĒ kalńĪcńĪ misel hasarńĪ riski y√ľksek.");

  if(c.tirmikTarihi && c.havaBaslangic){
    var S=getSet(c);
    var beklenenHava=addDays(c.tirmikTarihi, S.offHava-S.offTirmik);
    var gecikme=daysBetween(beklenenHava, c.havaBaslangic);
    if(gecikme>=5) out.push("Havaya baŇülama planlanandan "+gecikme+" g√ľn ge√ß yapńĪlmńĪŇü ‚ÄĒ misel geliŇüimi gereńüinden uzun s√ľrm√ľŇü olabilir.");
  }

  if(c.gelisTarihi && c.toprakTarihi){
    var beklenenToprak=addDays(c.gelisTarihi, getSet(c).offToprak);
    var erkenlik=daysBetween(c.toprakTarihi, beklenenToprak);
    if(erkenlik>=3) out.push("Toprak planlanandan "+erkenlik+" g√ľn erken serilmiŇü ‚ÄĒ kompost yeterince olgunlaŇümamńĪŇü olabilir.");
  }

  var amonyakGunleri=(c.gunluk||[]).filter(function(r){return r.amonyak==="Var" && r.tarih<=today;}).map(function(r){return r.tarih;});
  if(amonyakGunleri.length){
    var adimGunleri=[];
    getProtokol().forEach(function(s,idx){ if(s.silindi) return; var yt=adimYapilmaTarihi(c,idx,s); if(yt) adimGunleri.push(yt); });
    var carpisma=amonyakGunleri.some(function(ag){ return adimGunleri.some(function(yt){ return Math.abs(daysBetween(ag,yt))<=1; }); });
    if(carpisma) out.push("Amonyak kokusu bildirilirken protokol iŇülemi yapńĪlmaya devam edilmiŇü ‚ÄĒ √∂nce havalandńĪrma/nem sorunu √ß√∂z√ľlmeliydi.");
  }
  return out;
}

/* Yapay zek√Ę yorumu ‚ÄĒ kural tabanlńĪ ama dońüal dilde, kńĪsa (1-2 c√ľmle),
   puanńĪn ALTINDA her zaman g√∂sterilir. Stage/trend/kritik hata durumuna
   g√∂re en anlamlńĪ Ňüablonu se√ßer. */
function _performansYorumUret(c, kategoriler, kritikHatalar, toplamPuan, stageAd){
  if(kritikHatalar.length){
    return "Ge√ßmiŇüte yaŇüanan "+(kritikHatalar.length>1?"sorunlar":"sorun")+" ilerideki flaŇülarńĪ hafif zayńĪflatabilir; yakńĪndan takip √∂nerilir.";
  }
  var iklim=kategoriler.filter(function(k){return k.key==="iklim";})[0];
  var trend=kategoriler.filter(function(k){return k.key==="trend";})[0];
  if(trend && trend.puan>=trend.maks-1 && iklim && iklim.puan<iklim.maks){
    return "Son √∂l√ß√ľmler ideale yaklaŇütńĪńüńĪ i√ßin √∂nceki risk b√ľy√ľk √∂l√ß√ľde azalmńĪŇü g√∂r√ľn√ľyor.";
  }
  if(toplamPuan>=90) return stageAd+" d√∂neminde sorunsuz ilerliyor; mevcut y√∂netim Ňüekli s√ľrd√ľr√ľlebilir.";
  if(toplamPuan>=75) return stageAd+" d√∂neminde genel olarak iyi gidiyor, birka√ß kategoride k√ľ√ß√ľk iyileŇütirme fńĪrsatńĪ var.";
  return stageAd+" d√∂neminde birden fazla kategoride puan kaybńĪ var ‚ÄĒ en d√ľŇü√ľk puanlńĪ kategoriye √∂nce odaklanmak faydalńĪ olur.";
}

/* Tahmin ‚ÄĒ puan sadece bug√ľn√ľ g√∂stermesin, ileriye d√∂n√ľk √∂ng√∂r√ľ de versin.
   Mevcut tahminiVerim()/verimFlasOzet() altyapńĪsńĪ (firma/filo ge√ßmiŇüi)
   TOPLAM verim i√ßin zaten var (gereksiz tekrar oluŇüturmamak i√ßin AYNEN
   kullanńĪlńĪr); flaŇü1/flaŇü2 kńĪrńĪlńĪmńĪ tamamlanmńĪŇü d√∂ng√ľlerin ortalama flaŇü
   oranńĪndan, risk seviyesi g√ľncel puan + kritik hata sayńĪsńĪndan t√ľretilir. */
function _performansTahminUret(c, toplamPuan, kritikHatalar){
  var tv=tahminiVerim(c); /* {kg, kaynak} ya da null (tonaj/ge√ßmiŇü veri yoksa) */
  var oranEsleri=tumTamamlananDongu().map(function(x){
    var fo=verimFlasOzet(x); var f1=fo.F1?fo.F1.kg:0, f2=fo.F2?fo.F2.kg:0, top=f1+f2;
    return top>0 ? {f1:f1/top} : null;
  }).filter(Boolean);
  var f1Oran = oranEsleri.length ? (oranEsleri.reduce(function(s,x){return s+x.f1;},0)/oranEsleri.length) : 0.55; /* veri yoksa tipik oran */
  var toplamKg = tv?tv.kg:null;
  var puanKatsayi = 0.7+(toplamPuan/100)*0.5; /* d√ľŇü√ľk puan tahmini hafif aŇüańüńĪ, y√ľksek puan hafif yukarńĪ √ßeker */
  var seviyeMetni=function(v){ return v>=80?"y√ľksek":(v>=55?"orta":"d√ľŇü√ľk"); };

  var risk;
  if(kritikHatalar.length>=2 || toplamPuan<55) risk={seviye:"y√ľksek", aciklama:kritikHatalar.length?"kalńĪcńĪ kritik hatalar nedeniyle":"d√ľŇü√ľk puan nedeniyle"};
  else if(kritikHatalar.length===1 || toplamPuan<75) risk={seviye:"orta", aciklama:"bazńĪ kategorilerde puan kaybńĪ var"};
  else risk={seviye:"d√ľŇü√ľk", aciklama:"belirgin bir sorun g√∂r√ľnm√ľyor"};

  return {
    flas1: toplamKg!=null ? {kg:Math.round(toplamKg*f1Oran*puanKatsayi), seviye:seviyeMetni(toplamPuan)} : null,
    flas2: toplamKg!=null ? {kg:Math.round(toplamKg*(1-f1Oran)*puanKatsayi), seviye:seviyeMetni(toplamPuan)} : null,
    toplamVerim: toplamKg!=null ? {kg:Math.round(toplamKg*puanKatsayi), kaynak:tv.kaynak} : null,
    risk: risk
  };
}

/* G√ľven puanńĪ ‚ÄĒ tahminin ne kadar veriye dayandńĪńüńĪnńĪ g√∂sterir ("yeterli
   veri yok" gibi gerek√ßeli d√ľŇü√ľk g√ľven, kullanńĪcńĪ isteńüi). √ú√ß sinyal:
   (1) bu odanńĪn kendi g√ľnl√ľk kayńĪt sayńĪsńĪ, (2) tamamlanmńĪŇü filo d√∂ng√ľ
   sayńĪsńĪ (fleet tahmininin kalitesi), (3) firma-√∂zel ge√ßmiŇü var mńĪ. */
function _performansGuvenPuani(c){
  var gunlukSayisi=(c.gunluk||[]).length;
  var filoDongu=tumTamamlananDongu().length;
  var firmaN=0;
  if(c.kompostFirma){ var f=firmaOrtalamaKgTon(c.kompostFirma); firmaN=f?f.n:0; }
  var puan=30+Math.min(30,gunlukSayisi*1.5)+Math.min(25,filoDongu*3)+Math.min(15,firmaN*4);
  puan=Math.max(5,Math.min(97,Math.round(puan)));
  var aciklama;
  if(puan>=80) aciklama="Yeterli g√ľnl√ľk kayńĪt ve ge√ßmiŇü d√∂ng√ľ verisi var.";
  else if(filoDongu<3) aciklama="Filoda hen√ľz az sayńĪda tamamlanmńĪŇü d√∂ng√ľ var ‚ÄĒ tahminler zamanla g√ľ√ßlenecek.";
  else if(gunlukSayisi<5) aciklama="Bu d√∂ng√ľde hen√ľz az sayńĪda √∂l√ß√ľm girildi.";
  else aciklama="Orta d√ľzeyde veri ‚ÄĒ tahmin ipucu olarak deńüerlendirilmeli.";
  return {yuzde:puan, aciklama:aciklama};
}

function odaPerformans(c){
  if(c.bosaltimTarihi) return null;
  var stageAd=stageOf(c).t;
  var kritikHatalar=_kritikHatalarTespit(c);
  var kategoriler=[
    _puanIklim(c),
    _puanMiselGelisimi(c),
    _puanProtokolUygunlugu(c),
    _puanSulamaYonetimi(c),
    _puanHasatEgrisi(c),

   kasa) hangi √ßiftlińüin hangi flaŇü/g√ľn√ľne denk geldińüine g√∂re (hasatGunNo)

function hasatGercekVeriIstatistik(){

/* Ana analiz ‚ÄĒ 6 g√ľnl√ľk ger√ßek kasa dańüńĪlńĪmńĪnńĪ (%) referansla kńĪyaslar, 0-100

function hasatEgrisiAnaliz(c, flas){
  if(!hasatFlasTamamlandiMi(c,flas)) return null;

  var toplam=gunlukKasa.reduce(function(a,b){return a+b;},0);

  var pikGun=maxIdx+1;

  var gecToplam=yuzde[3]+yuzde[4];
  var erkenBeklenen=ref.yuzde[0]+ref.yuzde[1];
  var gecBeklenen=ref.yuzde[3]+ref.yuzde[4];

  var erkenHasat=false;
  if(erkenToplam>erkenBeklenen+15){
    erkenHasat=true; puan-=15;
    bulgular.push({tip:"erken", aciklama:"1. ve 2. g√ľn toplamńĪ %"+erkenToplam.toFixed(0)+" (beklenen ~%"+erkenBeklenen.toFixed(0)+") ‚ÄĒ MantarlarńĪn k√ľ√ß√ľkken toplanmńĪŇü olma ihtimali bulunmaktadńĪr."});
  }

    gecHasat=true; puan-=15;

  }

  var kirilmalar=[];
  for(var d=1; d<5; d++){
    var fark=yuzde[d]-yuzde[d-1];

  }

    });
  }

  var maxYuzde=yuzde[maxIdx];
  var simetriTip, simetriYorum;
  if(maxYuzde>60){
    simetriTip="tek-gun"; puan-=10;
    simetriYorum="HasadńĪn √ßońüunluńüu tek bir g√ľnde ("+pikGun+". g√ľn, %"+maxYuzde.toFixed(0)+") toplanmńĪŇü ‚ÄĒ dańüńĪlńĪm tek g√ľn etrafńĪnda yońüunlaŇümńĪŇü.";
  } else if(maxYuzde>45){
    simetriTip="keskin"; puan-=5;
    simetriYorum="Eńüri "+pikGun+". g√ľnde (%"+maxYuzde.toFixed(0)+") √ßok keskin/dar bir pik yapńĪyor.";
  } else if(maxYuzde<22){
    simetriTip="yayvan";
    simetriYorum="Belirgin bir pik g√ľn√ľ yok, hasat g√ľnlere olduk√ßa eŇüit yayńĪlmńĪŇü (en y√ľksek g√ľn %"+maxYuzde.toFixed(0)+") ‚ÄĒ √ßok yayvan bir dańüńĪlńĪm.";
  } else if(Math.abs(erkenToplam-gecToplam)<=15 && pikGun>=2 && pikGun<=4){
    simetriTip="simetrik";
    simetriYorum="Eńüri "+pikGun+". g√ľnde pik yapńĪp √ßan eńürisine yakńĪn, dengeli bi√ßimde y√ľkselip al√ßalńĪyor.";
  } else if(erkenToplam>gecToplam+15){
    simetriTip="sol-carpik";
    simetriYorum="Eńüri sola √ßarpńĪk ‚ÄĒ ańüńĪrlńĪk erken g√ľnlerde (1.-2. g√ľn %"+erkenToplam.toFixed(0)+", 4.-5. g√ľn %"+gecToplam.toFixed(0)+").";
  } else if(gecToplam>erkenToplam+15){
    simetriTip="sag-carpik";
    simetriYorum="Eńüri sańüa √ßarpńĪk ‚ÄĒ ańüńĪrlńĪk ge√ß g√ľnlerde (4.-5. g√ľn %"+gecToplam.toFixed(0)+", 1.-2. g√ľn %"+erkenToplam.toFixed(0)+").";
  } else {
    simetriTip="duzensiz";
    simetriYorum="DańüńĪlńĪm belirgin bir simetri g√∂stermiyor.";
  }

  puan=Math.max(0, Math.round(puan));
  var guven = (ref.kaynak.indexOf("bu odanńĪn")===0) ? 85 : (ref.kaynak.indexOf("varsayńĪlan")===0 ? 45 : 65);
  var yorum=_hasatEgrisiYorumUret(flas, puan, erkenHasat, gecHasat, kirilmalar.length, simetriTip, pikGun);

  return {
    flas:flas, gunlukKasa:gunlukKasa, toplam:toplam, yuzde:yuzde, ref:ref,
    pikGun:pikGun, erkenHasat:erkenHasat, gecHasat:gecHasat, kirilmalar:kirilmalar,
    simetriTip:simetriTip, simetriYorum:simetriYorum, bulgular:bulgular,
    puan:puan, etiket:hasatEgriPuanEtiket(puan), guven:guven, yorum:yorum

}

/* D√∂nemler (Erdal'ńĪn tanńĪmńĪ):
   kulu√ßka: geliŇü‚Üítoprak ¬∑ toprak d√∂nemi: toprak‚ÜítńĪrmńĪk ¬∑ 1.misel: tńĪrmńĪk‚Üíhava
   havadan sonra g√ľn 0-5: 2.misel ¬∑ 6-8: pimleme ¬∑ 9: bezelye ¬∑ 10: ceviz ¬∑ sonra hasat */
function _mhDates(c){
  var S=getSet(c);
  var toprak = c.toprakTarihi || (c.gelisTarihi?addDays(c.gelisTarihi,S.offToprak):null);
  var tirmik = c.tirmikTarihi || (toprak?addDays(toprak,S.offTirmik):null);
  var hava   = c.havaBaslangic || (toprak?addDays(toprak,S.offHava):null);
  return {toprak:toprak, tirmik:tirmik, hava:hava};
}
function airStarted(c){ return !!c.havaBaslangic && (daysBetween(c.havaBaslangic, todayISO())>=0); }
function phaseCls(t){
  if(t==="Kulu√ßka d√∂nemi"||t==="Toprak d√∂nemi") return "b-amber";
  if(t==="1. Misel geliŇüim"||t==="2. Misel geliŇüim"||t==="Pimleme d√∂nemi") return "b-teal";
  return "b-harvest";
}
/* stageOf(c)'√ľn asńĪl mantńĪńüńĪ ‚ÄĒ ama BUG√úN'e (todayISO()) sabit deńüil, herhangi
   bir tarih i√ßin hesaplanabilir. Puanlama sistemi (odaPerformans) aynńĪ hatanńĪn
   farklńĪ biyolojik d√∂nemlerde farklńĪ ańüńĪrlńĪkta puan kńĪrmasńĪ i√ßin (kullanńĪcńĪ
   isteńüi) her g√ľnl√ľk kaydńĪn KENDńį tarihindeki aŇüamayńĪ bilmesi gerekiyor ‚ÄĒ
   stageOf sadece "Ňüu an" i√ßin √ßalńĪŇütńĪńüńĪndan bu ihtiyacńĪ karŇüńĪlamńĪyordu. Kod
   tekrarńĪnńĪ √∂nlemek i√ßin stageOf artńĪk bu fonksiyonun today=todayISO() ile
   √ßańürńĪlmńĪŇü hali (SSOT, tek mantńĪk). */
function stageAtDate(c, iso){
  if(c.bosaltimTarihi) return {t:"BoŇüaltńĪldńĪ", cls:"b-gray"};
  if(c.donemManuel) return {t:c.donemManuel, cls:phaseCls(c.donemManuel)};
  var m=_mhDates(c);
  if(!m.toprak || daysBetween(m.toprak,iso)<0) return {t:"Kulu√ßka d√∂nemi", cls:"b-amber"};
  if(!m.tirmik || daysBetween(m.tirmik,iso)<0) return {t:"Toprak d√∂nemi", cls:"b-amber"};
  /* KRńįTńįK FIX: Hava aŇüamasńĪna ge√ßmek i√ßin GER√áEKTEN kayńĪtlńĪ bir Hava BaŇülangńĪ√ß tarihi
     (c.havaBaslangic) gerekir ‚ÄĒ sadece "tahmini" tarihin (toprak+offHava) ge√ßmiŇü olmasńĪ
     yetmez. Aksi halde kullanńĪcńĪ yanlńĪŇülńĪkla girip SńįLSE bile, tahmini tarih ge√ßmiŇüte
     kaldńĪńüńĪ i√ßin oda h√Ęl√Ę "hava baŇüladńĪ" aŇüamasńĪnda g√∂r√ľnmeye devam ediyordu. */
  if(!c.havaBaslangic || daysBetween(c.havaBaslangic,iso)<0) return {t:"1. Misel geliŇüim", cls:"b-teal"};
  var hd=daysBetween(c.havaBaslangic,iso);
  if(hd<=5) return {t:"2. Misel geliŇüim", cls:"b-teal"};
  if(hd<=8) return {t:"Pimleme d√∂nemi", cls:"b-teal"};
  if(hd===9) return {t:"Bezelye boyutu", cls:"b-harvest"};
  if(hd===10) return {t:"Ceviz boyutu", cls:"b-harvest"};
  var ha=hasatAsama(c, iso);
  if(ha){ var lbl=ha.flas>0?("Hasat F"+ha.flas+" ¬∑ "+ha.asama):ha.asama; return {t:lbl, cls:"b-harvest"}; }
  return {t:"Hasat", cls:"b-harvest"};
}
function stageOf(c){ return stageAtDate(c, todayISO()); }
function phaseList(c){

  function row(ad,tarih,cls){ return {ad:ad, tarih:tarih, cls:cls, current:(ad===cur)}; }
  return [
    row("Kulu√ßka d√∂nemi", c.gelisTarihi, "b-amber"),

}

/* KńĪsa g√ľn adńĪ ‚ÄĒ planlama i√ßeren tarihlerin yanńĪna (kompost teslim, protokol
   sńĪradaki adńĪm vb). Pazar √∂zellikle vurgulanńĪr ("PazarńĪ bilelim, √∂nlem alalńĪm"). */
var GUN_KISA=["Paz","Pzt","Sal","√áar","Per","Cum","Cmt"]; /* getUTCDay(): 0=Pazar */
function gunKisa(iso){
  if(!iso) return "";
  var p=(""+iso).split("-"); if(p.length<3) return "";
  var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));
  if(isNaN(d.getTime())) return "";
  return GUN_KISA[d.getUTCDay()];
}
function gunKisaHTML(iso){
  var g=gunKisa(iso); if(!g) return "";
  var pazar=(g==="Paz");
  return ' <span style="font-size:10.5px;'+(pazar?'color:var(--red);font-weight:700;':'color:var(--muted);')+'">'+g+'</span>';
}
function gunAdi(iso){ if(!iso) return ""; var p=(""+iso).split("-"); if(p.length<3) return ""; var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); if(isNaN(d.getTime())) return ""; var g=["Pazar","Pazartesi","SalńĪ","√áarŇüamba","PerŇüembe","Cuma","Cumartesi"]; return g[d.getUTCDay()]; }
function sonGunluk(c){ if(c.gunluk&&c.gunluk.length){ var a=c.gunluk.slice().sort(function(x,y){return cmpDate(x.tarih,y.tarih);}); return a[a.length-1]; } return null; }
/* "Bug√ľn iŇülem" s√ľtunu i√ßin: SADECE bug√ľn√ľn kaydńĪ/kayńĪtlarńĪ ‚ÄĒ sonGunluk() gibi
   "en son ne zaman olduysa o" deńüil, kesinlikle bug√ľne ait olanńĪ getirir.
   AynńĪ g√ľn birden fazla kayńĪt varsa (√∂rn. sabah+akŇüam), sulama notlarńĪnńĪ birleŇütirir. */
function bugunkuGunluk(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var t=todayISO();
  var gunler=c.gunluk.filter(function(g){return g.tarih===t;});
  if(!gunler.length) return null;
  if(gunler.length===1) return gunler[0];
  var birlesik={tarih:t, su:"", sulama:""};
  var suToplam=0;
  gunler.forEach(function(g){
    var sv=numParse(g.su); if(sv) suToplam+=sv;
    if(g.sulama) birlesik.sulama = birlesik.sulama ? (birlesik.sulama+" ¬∑ "+g.sulama) : g.sulama;
    if(g.islemNot) birlesik.islemNot = birlesik.islemNot ? (birlesik.islemNot+" ¬∑ "+g.islemNot) : g.islemNot;
    if(g.odaC) birlesik.odaC=g.odaC;
    if(g.kompostC) birlesik.kompostC=g.kompostC;
    if(g.kompostUst) birlesik.kompostUst=g.kompostUst;
    if(g.klimaC) birlesik.klimaC=g.klimaC;
  });
  if(suToplam>0) birlesik.su=String(suToplam);
  return birlesik;
}
/* G√∂rev (poŇüet a√ßma, tiftik vb.) tamamlanńĪnca bug√ľn√ľn g√ľnl√ľk kaydńĪna otomatik not d√ľŇüer,
   b√∂ylece "Bug√ľn iŇülem" √∂zetinde g√∂revin de yapńĪldńĪńüńĪ g√∂r√ľn√ľr (mevcut sulama notunu SńįLMEZ, ekler). */

/* Belirli bir TARńįHńįN g√ľnl√ľk kaydńĪna not ekler (dedup'lńĪ). Ge√ßmiŇü tarihe de yazabilir.
   Protokol adńĪmńĪ tamamlanńĪnca / ertelenince otomatik d√ľŇüen not ‚ÄĒ SULAMA ALANINA DEńěńįL,
   ayrńĪ bir alana (islemNot) yazńĪlńĪr. B√∂ylece "500 lt su + serenade" (m√ľhendisin Tur'dan
   girdińüi ger√ßek sulama) ile "toprak √ßekimi yapńĪldńĪ" (protokol adńĪmńĪ √∂zeti) aynńĪ kutuda
   karńĪŇümaz ‚ÄĒ Ana Ekran'da iki ayrńĪ satńĪrda g√∂sterilir. */
/* AynńĪ "anahtar" ile baŇülayan ESKńį notu bulup YENńįSńįYLE DEńěńįŇěTńįRńįR (gunlukNotTariheEkle
   gibi sonsuza kadar biriktirmez). "TńĪrmńĪk i√ßin plan ... g√ľncellendi" gibi tekrar tekrar
   deńüiŇüen notlarda kullanńĪlńĪr ‚ÄĒ sadece SONUNCUSU kalsńĪn istenir. */
function gunlukNotTariheGuncelle(c, tarih, anahtar, not){
  if(!c || !tarih || !not) return;
  not=(""+not).trim(); if(!not) return;
  if(!c.gunluk) c.gunluk=[];
  var ex=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(ex){
    var parcalar=(""+(ex.islemNot||"")).split(" ¬∑ ").map(function(x){return x.trim();}).filter(function(x){return x;});
    if(anahtar) parcalar=parcalar.filter(function(p){ return p.indexOf(anahtar)!==0; });
    parcalar.push(not);
    ex.islemNot=parcalar.join(" ¬∑ ");
  } else {
    c.gunluk.push({tarih:tarih, odaC:"", kompostC:"", co2alt:"", co2ust:"", su:"", sulama:"", islemNot:not});
    c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  }
}
function gunlukNotTariheEkle(c, tarih, not){
  if(!c || !tarih || !not) return;
  not = (""+not).trim(); if(!not) return;
  if(!c.gunluk) c.gunluk=[];
  var ex=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(ex){
    var mevcut=(""+(ex.islemNot||"")).split(" ¬∑ ").map(function(x){return x.trim();});
    if(mevcut.indexOf(not)>=0) return;
    ex.islemNot = ex.islemNot ? (ex.islemNot+" ¬∑ "+not) : not;
  } else {
    c.gunluk.push({tarih:tarih, odaC:"", kompostC:"", co2alt:"", co2ust:"", su:"", sulama:"", islemNot:not});
    c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  }
}
/* Bug√ľn√ľn kaydńĪna not ekler (kńĪsayol) */
function gunlukGorevNotEkle(c, not){
  if(!c || !not) return;
  gunlukNotTariheEkle(c, todayISO(), not);
}
/* T√ľm g√ľnl√ľk kayńĪtlardaki " ¬∑ " ile ayrńĪlmńĪŇü tekrar eden notlarńĪ temizler.
   Hem eski v173 bozuk kayńĪtlarńĪnńĪ hem de senkronla geri gelen duplicate'leri d√ľzeltir.
   loadData sonrasńĪ bir kez √ßalńĪŇüńĪr. */
function gunlukNotlariTekille(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  function tekille(g, alan){
    var v=g[alan];
    if(!v || (""+v).indexOf(" ¬∑ ")<0) return;
    var parcalar=(""+v).split(" ¬∑ ").map(function(x){return x.trim();}).filter(function(x){return x;});
    var gorulen={}, temiz=[];
    parcalar.forEach(function(p){
      if(gorulen[p]) return;   /* aynńĪ not tekrar ediyorsa atla */
      gorulen[p]=1; temiz.push(p);
    });
    var yeni=temiz.join(" ¬∑ ");
    if(yeni!==v){ g[alan]=yeni; degisti=true; }
  }
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){ tekille(g,"sulama"); tekille(g,"islemNot"); });
  });
  return degisti;
}
function kompStr(g){ if(!g) return "‚ÄĒ"; var a=(g.kompostC==null?"":(""+g.kompostC)).trim(), b=(g.kompostUst==null?"":(""+g.kompostUst)).trim(); if(a&&b) return a+"-"+b; return a||b||"‚ÄĒ"; }
function posetGun(c){ var i=protokolRolIdx("poset"); if(i>=0){ var t=protokolTarih(c,getProtokol()[i]); if(t) return t; } return (c&&c.gelisTarihi)?addDays(c.gelisTarihi,6):null; }
/* PoŇüet ger√ßekten "tamamlandńĪ" iŇüaretlendi mi (sadece takvim g√ľn√ľ deńüil, ekibin fiilen yaptńĪńüńĪ) */
function posetAcildiMi(c){
  if(!c) return false;
  var i=protokolRolIdx("poset");
  if(i>=0) return !!(c.done && c.done["p"+i]); /* protokol adńĪmńĪ varsa SADECE iŇüaretlenmiŇü olmasńĪ sayńĪlńĪr */
  /* Protokolde poŇüet a√ßma adńĪmńĪ hi√ß yoksa (√∂zelleŇütirilmiŇü protokol), eski takvim mantńĪńüńĪna geri d√∂n */
  var pg=posetGun(c);

}
/* KullanńĪcńĪ isteńüi (agronomik kural): TńĪrmńĪk yapńĪldńĪktan sonra havaya
   baŇülayana kadar KESńįNLńįKLE sulama yapńĪlmamalńĪ ‚ÄĒ bu d√∂nemde misel
   geliŇüimine zarar verir. Sadece protokol √∂nerisi yoksa deńüil, elle "+
   ekle" ile bile bu pencerede sulama giriŇüi tamamen kapalńĪ olmalńĪ. Zaten o
   g√ľn i√ßin bir kayńĪt varsa (ge.su dolu, √∂rn. daha √∂nce yanlńĪŇülńĪkla girildi
   ya da bu tarih ge√ßmiŇüte kaldńĪ) dokunulmaz ‚ÄĒ mevcut veri gizlenmez.
   tarih parametresi ile hem BUG√úN (G√ľnl√ľk Tur) hem YARIN (YarńĪn planlanan

function tirmikHavaArasindaMi(c, tarih){
  if(!c || !c.tirmikTarihi) return false;
  if(daysBetween(c.tirmikTarihi, tarih) < 0) return false; /* tńĪrmńĪk hen√ľz olmadńĪ */
  if(c.havaBaslangic && daysBetween(c.havaBaslangic, tarih) >= 0) return false; /* hava zaten baŇüladńĪ */
  return true;
}

var _arizaFotoGecici=null;
function arizaFotoSec(file){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      _arizaFotoGecici=cv.toDataURL("image/jpeg",0.6);
      var onz=el("az_foto_onizleme");
      if(onz) onz.innerHTML='<img src="'+_arizaFotoGecici+'" style="width:90px; height:90px; object-fit:cover; border-radius:8px; margin-top:6px;">';
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

  var L=getPeriyodikBakim();

/* Genel g√∂revler listesine tarih+baŇülńĪk eŇüleŇüen BEKLEYEN bir g√∂rev varsa
   onun atamasńĪna ekler (kopya oluŇüturmaz), yoksa yeni g√∂rev oluŇüturur.
   UI yan etkisi (toast/render/saveData) YOK ‚ÄĒ hem gorevEkle() (tekli elle
   ekleme) hem topluOnayla() (WhatsApp toplu giriŇüi) bunu kullanńĪr; ikisi de
   ayrńĪ ayrńĪ aynńĪ iŇüi (√∂rn. "Oda B-1 ¬∑ Oda boŇüaltma/yńĪkama") her tekrarda/
   toplu giriŇüte kopya "AtanmamńĪŇü" g√∂rev olarak biriktiren bugńĪ taŇüńĪyordu. */
function gorevEkleVeyaBirlestir(tarih, baslik, atama){
  var d=loadData();
  var mevcut = d.gorevler.find(function(g){ return !g.done && g.tarih===tarih && g.baslik===baslik; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    return false; /* yeni eklenmedi, mevcuda birleŇütirildi */
  }

/* YarńĪn i√ßin SADE g√∂rev listesi ‚ÄĒ Bug√ľnk√ľ G√∂revler ile aynńĪ ruhta ama
   aksiyon butonu yok (hen√ľz yapńĪlamaz, sadece √∂nizleme). yarinHTML()'in
   karmaŇüńĪk onay/deńüiŇütir/WhatsApp apparatus'u (eski G√∂revler ekranńĪndan
   kalma) burada YOK ‚ÄĒ sadece "oda ‚ÄĒ iŇülem" sade listesi. */
function getTomorrowTasks(){
  var d=loadData(), yarin=addDays(todayISO(),1);
  var tasks=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){return !og.done && og.tarih===yarin;}).forEach(function(og){
      tasks.push({oda:c.oda, islem:og.is, tipo:"oda"});
    });
  });
  (getGorevler()||[]).filter(function(g){return !g.done && g.tarih===yarin;}).forEach(function(g){
    tasks.push({oda:"", islem:g.baslik, tipo:"genel"});
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t===yarin){ tasks.push({oda:c.oda, islem:sd.txt, tipo:"protokol"}); }
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,yarin);
    if(oneri) tasks.push({oda:c.oda, islem:oneri, tipo:"sulama"});
  });
  /* PlanlńĪ kompost geliŇüleri (Kompost PlanńĪ) ‚ÄĒ odaya √ßevrilmemiŇü (done olmayan)
     √ßńĪkńĪŇüńĪ YARIN olan kompostlar da yarńĪnki iŇülerde g√∂r√ľn√ľr (kullanńĪcńĪ raporu:
     "yarńĪn kompost gelecek ama yarńĪnki iŇülemlerde g√∂r√ľnm√ľyor"). */
  getPlan().filter(function(x){return !x.done && x.cikis===yarin;}).forEach(function(x){
    tasks.push({oda:x.oda||"‚ÄĒ", islem:"ūüöö Kompost gelecek ("+(x.firma||"firma")+") ‚ÄĒ indirme", tipo:"kompost"});
  });
  /* Oda adńĪna g√∂re grupla, odasńĪz (genel) en sona */
  tasks.sort(function(a,b){
    if(!!a.oda!==!!b.oda) return a.oda?-1:1;
    return (a.oda||"")<(b.oda||"")?-1:1;
  });
  return tasks;
}

function son7GunEnSikSorun(){

/* Bir oda i√ßin YARIN planlanan t√ľm iŇülemler (protokol adńĪmńĪ + manuel oda g√∂revi).
   "Bug√ľn iŇülem" s√ľtununun yanńĪna eklenen "YarńĪn iŇülem" s√ľtunu i√ßin kullanńĪlńĪr. */
function yarinPlanlanan(c){
  if(!c) return [];
  var tomorrow=addDays(todayISO(),1);
  var list=[];
  /* Onay kaydńĪ: c.yarinOnay["p12"]="2026-07-08" ‚ÄĒ adńĪm, O TARńįH i√ßin onaylanmńĪŇü.
     Tarih eŇüleŇümezse (g√ľn ge√ßmiŇüse) onay ge√ßersiz ‚ÄĒ her g√ľn taze onay gerekir.
     M√ľhendis deńüiŇüiklińüi: c.yarinDegisiklik["p12"]={t:"2026-07-08", txt:"600 lt su + ..."}
     ‚ÄĒ protokol 400 dedi, m√ľhendis 600'e √ßevirdi; g√∂sterilen metin m√ľhendisinki olur. */
  function onayliMi(key){ return !!(c.yarinOnay && c.yarinOnay[key]===tomorrow); }
  function degisik(key){ var d=c.yarinDegisiklik&&c.yarinDegisiklik[key]; return (d&&d.t===tomorrow)?d.txt:null; }
  /* KRńįTńįK: sulama/ila√ß adńĪmlarńĪ i√ßin "ńįptal Et"/"DeńüiŇütir" (Bug√ľnk√ľ G√∂revler'deki
     ile aynńĪ kapńĪ) dońürudan c.gunluk[yarńĪn]'a yazńĪyor ‚ÄĒ ama bu liste sadece
     protokol/onay/ertele durumuna bakńĪyordu, c.gunluk'ta zaten bir karar
     verilmiŇü olsa bile g√∂z ardńĪ ediyordu. Sonu√ß: kullanńĪcńĪ yarńĪnńĪn sulamasńĪnńĪ
     iptal etse bile hem "YarńĪn planlanan" kartńĪnda hem Odalar listesinin
     "YarńĪn iŇülem" s√ľtununda hi√ßbir Ňüey deńüiŇümiyordu ("iptal ediyorum ama
     gitmiyor" ‚ÄĒ kullanńĪcńĪ raporu). ArtńĪk o g√ľn√ľn kaydńĪ varsa ve bir karar
     (sulamaDurum) i√ßeriyorsa, bu bilgi de listeye taŇüńĪnńĪr. */
  var yarinGunKaydi=(c.gunluk||[]).find(function(g){return g.tarih===tomorrow;});
  var yarinKarar = (yarinGunKaydi && yarinGunKaydi.sulamaDurum) || "";
  getProtokol().forEach(function(st,idx){
    if(st.silindi) return;
    if(st.tip==="uyari") return;
    /* Agronomik kural: tńĪrmńĪk-hava arasńĪ pencerede kesinlikle sulama
       yapńĪlmamalńĪ ‚ÄĒ yarńĪn bu pencereye denk geliyorsa su/ila√ß adńĪmlarńĪ
       "YarńĪn planlanan" kartńĪnda hi√ß √∂nerilmez (bkz. suGoster/tirmikHavaArasiMi). */
    if((st.tip==="ilac"||st.tip==="su") && tirmikHavaArasindaMi(c, tomorrow)) return;

    /* TEKRARLI KURAL (√∂rn. "PoŇüet a√ßńĪldńĪktan toprak-2'ye kadar HER G√úN Serenade"):
       tek bir "t" tarihi yok, bir ARALIK var (protokolAdimAraligi). "YarńĪn" o
       aralńĪńüńĪn i√ßine d√ľŇü√ľyorsa, bu da yarńĪnńĪn planlanan iŇüi olarak g√∂sterilmeli.
       Bu kontrol EKSńįKTńį ‚ÄĒ tekrarlńĪ kurallar hi√ßbir zaman "YarńĪn iŇülem" kolonunda
       g√∂r√ľnm√ľyordu (KRńįTńįK BUG, d√ľzeltildi). */
    if(st.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,st);
      if(ar && cmpDate(tomorrow,ar.baslangic)>=0 && cmpDate(tomorrow,ar.bitis)<=0){
        var dgR=degisik("p"+idx);
        list.push({txt:(st.tip==="ilac"||st.tip==="su")&&yarinKarar==="degistirildi"?((yarinGunKaydi.su||yarinGunKaydi.sulama)?((numParse(yarinGunKaydi.su)>0?yarinGunKaydi.su+" lt su":"")+(yarinGunKaydi.sulama?(" "+yarinGunKaydi.sulama):"")).trim():st.txt):(dgR||st.txt), orijinal:st.txt, degisti:!!dgR, key:"p"+idx, onayli:onayliMi("p"+idx), tekrar:true,
          sulamaDurum:(st.tip==="ilac"||st.tip==="su")?yarinKarar:"", sulamaAciklama:(yarinGunKaydi&&yarinGunKaydi.sulamaAciklama)||""});
      }
      return;
    }

    var base=protokolTarih(c,st); if(!base) return;
    /* protokolTarih() kasńĪtlńĪ olarak adńĪmńĪn KENDńį ertelemesini dńĪŇüarńĪda bńĪrakńĪr
       (√ßańüńĪran ekler ‚ÄĒ SSOT). "ilac"/"su" tipi kurallar (√∂rn. Vivando) ZńįNCńįRDEN
       (√∂rn. toprak ertelendiyse) otomatik kayar, AMA m√ľhendis suyu/ilacńĪ DOńěRUDAN
       da (zincirden bańüńĪmsńĪz) erteleyebilmeli ‚ÄĒ protokolOneri() (bug√ľnk√ľ liste)
       bunu zaten b√∂yle uyguluyor, burada da (yarńĪnki liste) aynńĪ davranńĪŇü olmalńĪ.
       Zincirin kendi payńĪ ile bu adńĪmńĪn kendi payńĪ farklńĪ alanlarda tutulur
       (referans adńĪmńĪn "p"+refIdx'i vs bu adńĪmńĪn "p"+idx'i) ‚ÄĒ √ßift sayńĪm olmaz. */
    var ert=(c.ertele && c.ertele["p"+idx]) ? c.ertele["p"+idx] : 0;
    var t=addDays(base,ert);
    var done=adimGercektenYapildiMi(c, idx, st);
    if(done) return;
    if(t===tomorrow){
      var dg=degisik("p"+idx);
      var suluMu=(st.tip==="ilac"||st.tip==="su");
      var gosterMetin = (suluMu && yarinKarar==="degistirildi" && (yarinGunKaydi.su||yarinGunKaydi.sulama))
        ? ((numParse(yarinGunKaydi.su)>0?yarinGunKaydi.su+" lt su":"")+(yarinGunKaydi.sulama?(" "+yarinGunKaydi.sulama):"")).trim()
        : (dg||st.txt);
      list.push({txt:gosterMetin, orijinal:st.txt, degisti:!!dg, key:"p"+idx, onayli:onayliMi("p"+idx),
        sulamaDurum: suluMu?yarinKarar:"", sulamaAciklama:(yarinGunKaydi&&yarinGunKaydi.sulamaAciklama)||""});
    }
  });
  (c.odaGorevleri||[]).forEach(function(og){
    if(og.done) return;
    var base=og.tarih; if(!base) return;
    var ert=og.ertele||0;
    var t=addDays(base,ert);
    if(t===tomorrow){
      var dg2=degisik("og_"+og.id);
      list.push({txt:dg2||og.is, orijinal:og.is, degisti:!!dg2, key:"og_"+og.id, onayli:onayliMi("og_"+og.id)});
    }
  });
  return list;
}
/* YarńĪn s√ľtunu HTML'i: onaysńĪz KIRMIZI (protokol √∂ng√∂r√ľs√ľ), onaylńĪ MAVńį (m√ľhendis teyit etti).
   M√ľhendis deńüiŇütirdiyse ‚úé iŇüaretiyle, m√ľhendisin metni g√∂sterilir. */
function yarinPlanlananHTML(c){
  var list=yarinPlanlanan(c);
  if(!list.length) return "‚ÄĒ";
  return list.map(function(it){
    /* Sulama zaten iptal/deńüiŇütirilmiŇüse (Bug√ľnk√ľ G√∂revler'deki ńįptal Et/DeńüiŇütir
       kapńĪsńĪndan yarńĪn i√ßin de karar verilmiŇüse), bunu KIRMIZI "hen√ľz karar
       verilmedi" gibi g√∂stermeye devam etmek yanlńĪŇü ‚ÄĒ kullanńĪcńĪ "iptal ettim
       ama h√Ęl√Ę kńĪrmńĪzńĪ/aynńĪ g√∂r√ľn√ľyor" sanńĪyordu. Karar verilmiŇü adńĪmlar artńĪk
       kendi rengiyle (turuncu/mavi) ve a√ßńĪk etiketiyle g√∂sterilir. */
    if(it.sulamaDurum==="iptal") return '<span style="color:#8a5a1f;">‚ĚĆ ńįptal: '+esc(it.txt)+(it.sulamaAciklama?(' <span class="muted" style="font-size:11px;">('+esc(it.sulamaAciklama)+')</span>'):'')+'</span>';
    if(it.sulamaDurum==="degistirildi") return '<span style="color:#1d6fd8;font-weight:700;">‚úŹÔłŹ '+esc(it.txt)+(it.sulamaAciklama?(' <span class="muted" style="font-size:11px;">('+esc(it.sulamaAciklama)+')</span>'):'')+'</span>';
    var isaret=it.onayli?(it.degisti?'‚úé ':'‚úď '):'';
    return '<span style="color:'+(it.onayli?'#1d4ed8':'#c0291f')+';font-weight:'+(it.onayli?'700':'400')+';"'+(it.degisti?' title="Protokol: '+esc(it.orijinal)+'"':'')+'>'+isaret+esc(it.txt)+'</span>';
  }).join('<span style="color:#b8b8b0;"> + </span>');
}
/* M√ľhendis onayńĪ (Tur'dan): yarńĪna planlńĪ bir adńĪmńĪ teyit eder / teyidi geri alńĪr.
   Onay o g√ľne bańülńĪ ‚ÄĒ ertesi g√ľn otomatik d√ľŇüer. Geri alńĪnca deńüiŇüiklik de silinir. */
function yarinOnayToggle(cid, key){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var tomorrow=addDays(todayISO(),1);
  if(!c.yarinOnay) c.yarinOnay={};
  if(c.yarinOnay[key]===tomorrow){
    delete c.yarinOnay[key];
    if(c.yarinDegisiklik) delete c.yarinDegisiklik[key];
    toast("Onay geri alńĪndńĪ");
  }
  else { c.yarinOnay[key]=tomorrow; toast("‚úď YarńĪn i√ßin onaylandńĪ"); }
  touchCycle(c); saveData(); render();
}
/* "DeńüiŇütirerek onayla": protokol 400 dedi, m√ľhendis 600 diyorsa ‚ÄĒ komple ret YOK.
   Kutu a√ßńĪlńĪr, protokol metni hazńĪr gelir, m√ľhendis d√ľzeltir, onaylar.
   M√ľhendis kararńĪ protokol√ľn √ľst√ľndedir; g√ľnl√ľk kayda da not d√ľŇü√ľl√ľr (iz kalńĪr). */
function yarinDegistirKutu(cid, key){

function yarinDegistirKaydet(cid, key){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var txt=(el("yd_txt")&&el("yd_txt").value.trim())||"";
  if(!txt){ toast("Metin boŇü olamaz"); return; }

    /* Not: burada ayrńĪca bug√ľn√ľn g√ľnl√ľk kaydńĪna not d√ľŇü√ľlm√ľyor ‚ÄĒ m√ľhendisin
       protokolden saptńĪńüńĪ deńüiŇüiklik zaten YarńĪn s√ľtununda mavi yazńĪyla ve
       "(protokol: ...)" karŇüńĪlaŇütńĪrmasńĪyla g√∂r√ľn√ľyor. AynńĪ bilgiyi Bug√ľn
       ńįŇülem kutusuna da eklemek tekrar oluŇüturup kutuyu kalabalńĪklaŇütńĪrńĪyordu. */
  } else {
    delete c.yarinDegisiklik[key];
  }
  touchCycle(c); saveData(); closeWarnBox(); toast("‚úď OnaylandńĪ: "+txt); render();
}

/* Helper: Kritik uyarńĪlarńĪ topla */
function getCriticalAlerts(){
  try{
  var d=loadData(), alerts=[];
  
  /* SńĪcaklńĪk kritik (>28 veya <16) ‚ÄĒ EN G√úNCEL TARńįHLńį g√ľnl√ľk kaydńĪna bak.
     (Dizinin son elemanńĪ her zaman en g√ľncel tarih olmayabilir; kayńĪt sńĪrasńĪ bozuk olabilir.) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var gunluk=(c.gunluk||[]);
    if(!gunluk.length) return;
    /* En g√ľncel tarihli kaydńĪ bul */
    var gun=gunluk[0];
    for(var i=1;i<gunluk.length;i++){
      if((gunluk[i].tarih||"")>(gun.tarih||"")) gun=gunluk[i];
    }
    if(gun){
      var t=numParse(gun.kompostC);
      if(t!==null && (t>KOMPOST_KRITIK_UST || t<KOMPOST_KRITIK_ALT)){
        alerts.push({
          tipo:"temp",
          odaId:c.id,
          oda:c.oda,
          msg:"SńĪcaklńĪk "+t+"¬įC ‚ÄĒ "+((t>KOMPOST_KRITIK_UST)?"√áok y√ľksek, takip et":"D√ľŇü√ľk, kontrol et"),
          severity:2,
          tarih:gun.tarih
        });
      }
    }
  });
  
  /* A√ßńĪk arńĪza */
  (d.arizalar||[]).filter(function(a){return a.durum==="acik";}).forEach(function(a){
    alerts.push({
      tipo:"ariza",
      arizaId:a.id,
      msg:esc((a.baslik||"ArńĪza"))+" ‚ÄĒ A√ßńĪk",
      severity:2,
      tarih:a.tarih
    });
  });
  
  /* Kompost bekleyen (geliŇü tarihini ge√ßmiŇü, Hńį√á tur kaydńĪ girilmemiŇü).
     √ĖNEMLńį: sadece "geliŇü g√ľn√ľne ait" kayńĪt aranmaz ‚ÄĒ bu neredeyse hi√ß
     karŇüńĪlanmayan bir koŇüuldu (kullanńĪcńĪ odaya gidince bug√ľn√ľn tarihiyle
     kayńĪt girer, geliŇü tarihiyle deńüil). Dońürusu: gunluk dizisi TAMAMEN
     boŇüsa uyar; herhangi bir kayńĪt girildiyse (hangi tarihli olursa olsun)
     tur baŇülamńĪŇü demektir, uyarńĪ kapanńĪr. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(c.gelisTarihi){
      var gun=(todayISO().localeCompare(c.gelisTarihi)>=0);
      if(gun && (!c.gunluk || c.gunluk.length===0)){
        alerts.push({
          tipo:"kompost",
          odaId:c.id,
          oda:c.oda,
          msg:"Kompost geldi ama tur kaydńĪ yok",
          severity:1,
          tarih:c.gelisTarihi
        });
      }
    }
  });
  
  /* Kompost GeliŇü Kontrol√ľ'nde bekleyen madde var mńĪ (sńĪcaklńĪk/irsaliye/kestane/
     nem/amonyak/d√ľzeltme). √ĖNEMLńį: kompostGelisIkazlariHTML() (G√∂revler sekmesi)
     bunu sadece geliŇüten sonraki 3 g√ľn i√ßinde g√∂sterir ‚ÄĒ kestane yeri gibi zamana
     bańülńĪ olmayan maddeler o pencere kapanńĪnca sessizce kaybolup unutulabiliyordu.
     Kritik UyarńĪlar'da g√ľn sńĪnńĪrńĪ YOK ‚ÄĒ √ß√∂z√ľlene kadar g√∂r√ľnmeye devam eder. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(!c.gelisTarihi || todayISO().localeCompare(c.gelisTarihi)<0) return; /* hen√ľz gelmedi */
    var eksik=kompostEksikMaddeler(c);
    if(eksik.length){
      alerts.push({
        tipo:"kgeksik",
        odaId:c.id,
        oda:c.oda,
        msg:"Kompost geliŇü kontrol√ľ eksik: "+eksik.join(" ¬∑ "),
        severity:1,
        tarih:c.gelisTarihi
      });
    }
  });

  /* HavalandńĪrma planńĪ hedeften sapma (havaya baŇülanmńĪŇü odalar). tempAlerts()
     zaten bu hesabńĪ yapńĪyor (bug√ľnk√ľ hedef vs. son √∂l√ß√ľm, 1¬į'den fazla fark) ‚ÄĒ
     sadece havaya baŇülama sonrasńĪ "odaHedef" t√ľr√ľn√ľ buraya da taŇüńĪyoruz ki
     m√ľhendis G√∂revler sekmesine gitmeden, Bug√ľn ekranńĪnda da g√∂rs√ľn. */
  (tempAlerts()||[]).filter(function(a){return a.key==="odaHedef";}).forEach(function(a){
    alerts.push({
      tipo:"havaHedef",
      odaId:a.cid,
      oda:a.oda,
      msg:a.txt,
      severity:1,
      tarih:todayISO()
    });
  });

  /* NOT: Geciken g√∂revler artńĪk "Bug√ľn√ľn ńįŇüleri" listesinde kńĪrmńĪzńĪ iŇüaretli
     olarak en √ľstte g√∂steriliyor. TekrarńĪ √∂nlemek i√ßin uyarńĪ bandńĪna eklenmez. */

  alerts.sort(function(a,b){return b.severity-a.severity;});
  return alerts;
  }catch(e){
    console.warn("getCriticalAlerts error:", e);
    return [];
  }
}

/* Helper: Bug√ľn yapńĪlacak g√∂revleri al ve koridor sńĪrasńĪna g√∂re sort */
function getTodaysTasks(){
  var d=loadData(), bugun=todayISO();
  var tasks=[];
  
  /* Oda-bazlńĪ g√∂revler (odaGorevleri) ‚ÄĒ BEKLEYEN (done:false) her zaman g√∂r√ľn√ľr
     (tarih<=bugun ise, geciken dahil). TAMAMLANMIŇě (done:true) SADECE bug√ľn
     tamamlandńĪysa g√∂r√ľn√ľr (doneAt===bugun) ‚ÄĒ aksi halde ge√ßmiŇüte tamamlanmńĪŇü
     HER g√∂rev sonsuza dek "Bug√ľnk√ľ G√∂revler"de kalńĪrdńĪ (KRńįTńįK BUG, d√ľzeltildi). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){
      if(og.tarih>bugun) return false;
      if(og.done){
        var doneGun = og.doneAt ? og.doneAt.slice(0,10) : og.tarih;
        return doneGun===bugun;
      }
      return true;
    }).forEach(function(og){
      tasks.push({
        tipo:"oda",
        odaId:c.id,
        oda:c.oda,
        islem:og.is,
        atama:og.atama,
        tarih:og.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(!og.done && og.tarih<bugun),
        done:!!og.done,
        id:og.id,
        cyclicId:c.id
      });
    });
  });
  
  /* Genel g√∂revler (gorevler) ‚ÄĒ AYNI mantńĪk: bekleyen her zaman, tamamlanmńĪŇü
     SADECE bug√ľn tamamlandńĪysa g√∂r√ľn√ľr (doneAt===bugun). */
  (getGorevler()||[]).filter(function(g){
    if(g.tarih>bugun) return false;
    if(g.done){
      var doneGun = g.doneAt ? g.doneAt.slice(0,10) : g.tarih;
      return doneGun===bugun;
    }
    return true;
  }).forEach(function(g){
    tasks.push({
      tipo:"genel",
      baslik:g.baslik,
      atama:g.atama,
      tarih:g.tarih,
      gelisTarihi:"",
      geciken:(!g.done && g.tarih<bugun),
      id:g.id,
      done:!!g.done
    });
  });
  
  /* Protokol takvimi ‚ÄĒ sńĪradaki olay-tipi adńĪm bug√ľn/gecikmiŇüse listeye girer.
     Planlama'nńĪn hesapladńĪńüńĪ AYNI fonksiyon (siradakiProtokolAdimi), Odalar'daki
     Protokol √Ėzeti ile aynńĪ veri kaynańüńĪ (SSOT). Tamamlama toggleTask √ľzerinden ‚ÄĒ
     tiftik/toprak/tńĪrmńĪk kendi detay kutusunu a√ßar, dińüerleri direkt iŇüaretlenir.
     Bug√ľn TAMAMLANMIŇě bir olay-tipi adńĪm varsa (sonYapilanOlayAdimi), o da
     listeye √ßizili/‚úď olarak eklenir ‚ÄĒ "bug√ľn ne yapńĪldńĪ" g√∂r√ľns√ľn. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t<=bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:sd.txt,
        atama:"",
        tarih:sd.t,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(sd.t<bugun),
        done:false,
        id:sd.idx,
        cyclicId:c.id
      });
    }
    var son=sonYapilanOlayAdimi(c);
    if(son && son.tarih===bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:son.txt,
        atama:"",
        tarih:son.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:false,
        done:true,
        id:son.idx,
        cyclicId:c.id
      });
    }
  });
  
  /* Sulama/ila√ß ‚ÄĒ bug√ľn√ľn protokol √∂nerisi. Checkbox ile "tamamlanmaz" (Tur'dan
     girilir), o y√ľzden buton yerine "Tur'a git" linki g√∂sterilir. Bug√ľnk√ľ g√ľnl√ľk
     kayńĪtta zaten sulama/su girilmiŇüse "yapńĪldńĪ" sayńĪlńĪr ‚ÄĒ gizlenmez, √ßizili
     g√∂r√ľn√ľr (ger√ßekte ne uygulandńĪńüńĪ orada okunur). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,bugun);
    if(!oneri) return;
    var gun=(c.gunluk||[]).find(function(g){return g.tarih===bugun;});
    var durum=(gun && gun.sulamaDurum)||"";
    /* ńįptal edilmiŇü bir sulama "yapńĪlmadńĪ" (bekleyen/gecikmiŇü) sayńĪlmaz ‚ÄĒ
       bilin√ßli bir √ľretim kararńĪ olarak "tamamlandńĪ" tarafńĪnda g√∂sterilir. */
    var yapildiMi=!!(gun && ((gun.sulama||"").trim() || numParse(gun.su)>0)) || durum==="iptal";
    tasks.push({
      tipo:"sulama",
      odaId:c.id,
      oda:c.oda,
      islem:yapildiMi?((numParse(gun.su)>0?gun.su+" lt su":"")+(gun&&gun.sulama?(" "+gun.sulama):"")).trim()||oneri:oneri,
      atama:"",
      tarih:bugun,
      gelisTarihi:c.gelisTarihi||"",
      geciken:false,
      done:yapildiMi,
      durum:durum,
      aciklama:(gun && gun.sulamaAciklama)||"",
      id:c.id,
      cyclicId:c.id
    });
  });

  /* ArńĪzalar ‚ÄĒ kullanńĪcńĪ isteńüi: a√ßńĪk arńĪzalar bekleyen g√∂rev olarak, bug√ľn
     tamir edilenler ise "tamamlandńĪ" olarak Bug√ľnk√ľ G√∂revler listesinde de
     g√∂r√ľns√ľn (Kritik UyarńĪlar bandńĪna ek olarak ‚ÄĒ teknisyen artńĪk Bug√ľn
     ekranńĪnńĪ g√∂r√ľyor, oradan da takip edebilsin). */
  (d.arizalar||[]).forEach(function(a){
    if(a.durum==="acik"){
      tasks.push({
        tipo:"ariza",
        oda:a.oda||"",
        islem:(a.oncelik==="acil"?"ūüĒī ":"")+(a.baslik||"ArńĪza"),
        atama:"",
        tarih:(a.tarih||bugun).slice(0,10),
        gelisTarihi:"",
        geciken:false,
        done:false,
        id:a.id,
        cyclicId:null
      });
    } else if(a.durum==="tamir" && a.tamirTarihi && a.tamirTarihi.slice(0,10)===bugun){
      tasks.push({
        tipo:"ariza",
        oda:a.oda||"",
        islem:a.baslik||"ArńĪza",
        atama:"",
        tarih:bugun,
        gelisTarihi:"",
        geciken:false,
        done:true,
        id:a.id,
        cyclicId:null
      });
    }
  });

  /* SńĪralama:
     1) BitmemiŇü her zaman bitenlerden √∂nce (bitenler referans i√ßin en altta)
     2) Geciken iŇüler en √ľstte (en eski gecikme √∂nce)
     3) Normal iŇüler: odanńĪn kompost geliŇü tarihine g√∂re YENńįDEN ESKńįYE
        (en son gelen kompostun odasńĪ en √ľstte). AynńĪ oda birlikte gruplanńĪr. */
  tasks.sort(function(a,b){
    if(a.done!==b.done) return a.done?1:-1;   /* biten en sona */
    /* Geciken > normal */
    if(a.geciken!==b.geciken) return a.geciken?-1:1;
    if(a.geciken && b.geciken){
      /* ńįki geciken: en eski gecikme (en k√ľ√ß√ľk tarih) √∂nce */
      return (a.tarih<b.tarih)?-1:(a.tarih>b.tarih?1:0);
    }
    /* ńįki normal: kompost geliŇü tarihi yeniden eskiye */
    var ag=a.gelisTarihi||"", bg=b.gelisTarihi||"";
    if(ag!==bg) return (ag>bg)?-1:1;   /* b√ľy√ľk tarih (yeni) √∂nce */
    /* AynńĪ geliŇüte: aynńĪ oda birlikte kalsńĪn, sonra iŇü tarihine g√∂re */
    if(a.oda!==b.oda) return ((a.oda||"")<(b.oda||""))?-1:1;
    return (a.tarih<b.tarih)?-1:1;
  });
  
  return tasks;
}

/* Helper: Tur kaydńĪ girilmemiŇü odalar */
function getTourPendingRooms(){
  var d=loadData(), bugun=todayISO();
  var pending=[];
  
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var gunluk=(c.gunluk||[]);
    var bugunKaydi=gunluk.find(function(g){return g.tarih===bugun;});
    if(!bugunKaydi || !bugunKaydi.kompostC){
      pending.push({oda:c.oda, odaId:c.id, gelisTarihi:c.gelisTarihi||""});
    }
  });
  
  /* Kompost geliŇü tarihine g√∂re YENńįDEN ESKńįYE (en son gelen kompost en √ľstte).
     AynńĪ geliŇüte oda adńĪna g√∂re. */
  pending.sort(function(a,b){
    var ag=a.gelisTarihi, bg=b.gelisTarihi;
    if(ag!==bg) return (ag>bg)?-1:1;   /* b√ľy√ľk tarih (yeni) √∂nce */
    return ((a.oda||"")<(b.oda||""))?-1:1;
  });
  
  /* AynńĪ oda adńĪ birden fazla a√ßńĪk d√∂ng√ľde olamaz ‚ÄĒ tekilleŇütir.
     SńĪralama en yeniden eskiye olduńüu i√ßin ilk g√∂r√ľlen (en g√ľncel) kalńĪr.
     Bu, yanlńĪŇülńĪkla a√ßńĪlmńĪŇü √ßift kayńĪtlarńĪn listeyi kirletmesini √∂nler. */
  var gorulen={}, tekil=[];
  pending.forEach(function(p){
    var ad=(p.oda||"").trim();
    if(gorulen[ad]) return;
    gorulen[ad]=true;
    tekil.push(p);
  });
  
  return tekil;
}

/* Helper: Son SAHA iŇülemleri ‚ÄĒ g√ľnl√ľk tur kayńĪtlarńĪndan √ľretilir.
   AynńĪ mantńĪk bugunIslemHTML() ile tutarlńĪ (SSOT): su SADECE sayńĪsal
   olarak >0 ise g√∂sterilir ("0" veya boŇü asla yazńĪlmaz). Hem sulama
   (m√ľhendisin girdińüi su/ila√ß) hem islemNot (protokol adńĪmńĪ √∂zeti,
   √∂rn. "tiftik", "toprak √ßekimi yapńĪldńĪ") dahil edilir. */
function getRecentActions(){
  var d=loadData();
  var kayitlar=[];
  (d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var sulama=(g.sulama||"").trim();
      var suVar=(numParse(g.su)>0);
      /* "X i√ßin plan Y olarak g√ľncellendi ‚ÄĒ gerek√ße: ..." notlarńĪ PLANLAMA'dńĪr,
         fiili √ľretim/sulama iŇülemi deńüil ‚ÄĒ Son ńįŇülemler'den √ßńĪkarńĪlńĪr. */
      var islemNotHam=(g.islemNot||"").trim();
      var islemNot=islemNotHam
        ? islemNotHam.split(" ¬∑ ").map(function(x){return x.trim();}).filter(function(x){
            return x && !/^.+ i√ßin plan /.test(x);
          }).join(" ¬∑ ")
        : "";
      if(!sulama && !suVar && !islemNot) return; /* fiili iŇü yok ‚ÄĒ atla */
      var parca=[];
      if(suVar) parca.push(g.su+" lt su"+(sulama?(" + "+sulama):""));
      else if(sulama) parca.push(sulama);
      if(islemNot) parca.push(islemNot);
      kayitlar.push({
        oda:c.oda,
        tarih:g.tarih,
        metin:parca.join(" ¬∑ "),
        vakit:g.vakit||""
      });
    });
  });
  /* En yeni tarih √∂nce */
  kayitlar.sort(function(a,b){ return cmpDate(b.tarih, a.tarih); });
  return kayitlar.slice(0,6);
}

function renderYoklama(){

  var geldiSayi=0, gelmediSayi=0, izinliSayi=0;
  kayitlar.forEach(function(y){ if(y.durum==="geldi") geldiSayi++; else if(y.durum==="gelmedi") gelmediSayi++; else if(y.durum==="izinli") izinliSayi++; });

    + '<div><label>Tarih</label><input type="date" id="yk_tarih" value="'+tarih+'" onchange="yoklamaTarihDegis(this.value)"></div>'
    + '<div class="muted" style="margin-top:8px;">'+geldiSayi+' geldi ¬∑ '+gelmediSayi+' gelmedi ¬∑ '+izinliSayi+' izinli'

    + '</div></div>';

  if(!personel.length){
    h += '<div class="empty"><div class="big">ūüßĎ‚Äćūü§Ě‚ÄćūüßĎ</div><div>Hen√ľz personel eklenmemiŇü.</div><div class="muted" style="margin-top:6px;">Ayarlar ‚Üí Personel\'den ekleyebilirsin.</div></div>';

            +'style="flex:1; min-height:38px; border-radius:8px; border:1.5px solid #c0291f; font-size:12.5px; font-weight:600; cursor:pointer; '

function ayinGunSayisi(yil, ay){ return new Date(yil, ay, 0).getDate(); }
function buildYoklamaRaporHTML(yil, ay){
  var gunSayisi=ayinGunSayisi(yil, ay);
  var ayStr=(ay<10?"0":"")+ay;
  var ayOnEk=yil+"-"+ayStr;
  var tumKayitlar=getYoklamalar().filter(function(y){ return y.tarih && y.tarih.slice(0,7)===ayOnEk; });
  var personelIdSet={}; tumKayitlar.forEach(function(y){ personelIdSet[y.personelId]=1; });
  var personel=getPersonelList().filter(function(p){ return p.aktif!==false || personelIdSet[p.id]; })
    .slice().sort(function(a,b){ return (a.ad||"").localeCompare(b.ad||"","tr"); });

  function gunISO(g){ return ayOnEk+"-"+(g<10?"0":"")+g; }

  var headerCells=""; for(var g=1; g<=gunSayisi; g++) headerCells+='<th style="min-width:20px;">'+g+'</th>';
  var rows="", detaySections="";
  personel.forEach(function(p){
    var geldi=0, gelmedi=0, izinli=0;
    var gelmediGerekce={haftalik_izin:0, hasta:0, habersiz:0};
    var gelmediListe=[], izinliListe=[];
    var cells="";
    for(var gg=1; gg<=gunSayisi; gg++){
      var iso=gunISO(gg);
      var y=yoklamaBul(iso, p.id);
      if(!y){ cells+='<td></td>'; continue; }
      if(y.durum==="geldi"){ geldi++; cells+='<td style="background:#dcefe2;color:#1f7a4d;font-weight:700;">G</td>'; }
      else if(y.durum==="izinli"){ izinli++; izinliListe.push(iso); cells+='<td style="background:#fdeecb;color:#8a5a1f;font-weight:700;">ńį</td>'; }
      else if(y.durum==="gelmedi"){
        gelmedi++;
        var gk=y.gerekce||"habersiz"; gelmediGerekce[gk]=(gelmediGerekce[gk]||0)+1;
        gelmediListe.push({tarih:iso, gerekce:gk});
        var kisa=gk==="haftalik_izin"?"Hńį":(gk==="hasta"?"H":"X");
        cells+='<td style="background:#fceaea;color:#c0291f;font-weight:700;" title="'+esc(YOKLAMA_GEREKCE_ETIKET[gk]||"")+'">'+kisa+'</td>';
      } else cells+='<td></td>';
    }
    rows+='<tr><td style="text-align:left;white-space:nowrap;"><b>'+esc(p.ad)+'</b></td>'+cells
      +'<td><b>'+geldi+'</b></td><td><b>'+gelmedi+'</b></td><td><b>'+izinli+'</b></td></tr>';

    var gerekceOzet=Object.keys(gelmediGerekce).filter(function(k){return gelmediGerekce[k]>0;})
      .map(function(k){ return YOKLAMA_GEREKCE_ETIKET[k]+": "+gelmediGerekce[k]; }).join(", ");
    detaySections += '<div style="margin-bottom:10px;">'
      + '<b>'+esc(p.ad)+'</b> ‚ÄĒ Geldi: '+geldi+' g√ľn, Gelmedi: '+gelmedi+' g√ľn'+(gerekceOzet?(' ('+esc(gerekceOzet)+')'):'')+', ńįzinli: '+izinli+' g√ľn'
      + (gelmediListe.length ? ('<div class="muted" style="font-size:11.5px;">Gelmedińüi g√ľnler: '+gelmediListe.map(function(x){return fmtDate(x.tarih)+" ("+YOKLAMA_GEREKCE_ETIKET[x.gerekce]+")";}).join(", ")+'</div>') : '')
      + (izinliListe.length ? ('<div class="muted" style="font-size:11.5px;">ńįzinli g√ľnler: '+izinliListe.map(fmtDate).join(", ")+'</div>') : '')
      + '</div>';
  });

  return '<html><head><meta charset="utf-8"><title>Yoklama Raporu ‚ÄĒ '+YOKLAMA_AY_ADLARI[ay-1]+' '+yil+'</title>'
    +'<style>body{font-family:Arial,sans-serif;font-size:11px;color:#000;padding:14px;}'
    +'h1{font-size:18px;margin:0 0 4px;}h3{margin:16px 0 6px;font-size:13px;color:#14583a;}'
    +'table{border-collapse:collapse;margin-top:4px;}th,td{border:1px solid #999;padding:3px 4px;text-align:center;}'
    +'.muted{color:#555;font-size:11px;}</style></head><body>'
    +'<h1>Yoklama Raporu ‚ÄĒ '+YOKLAMA_AY_ADLARI[ay-1]+' '+yil+'</h1>'
    +'<div class="muted">OluŇüturulma: '+fmtDateTime(new Date().toISOString())+'</div>'
    +'<div style="overflow-x:auto;"><table><thead><tr><th style="text-align:left;">Personel</th>'+headerCells+'<th>Geldi</th><th>Gelmedi</th><th>ńįzinli</th></tr></thead>'
    +'<tbody>'+(rows||('<tr><td colspan="'+(gunSayisi+4)+'">KayńĪt yok</td></tr>'))+'</tbody></table></div>'
    +'<h3>Detay (gerek√ßeli)</h3>'
    +(detaySections||'<div class="muted">KayńĪt yok.</div>')
    +'</body></html>';
}
function printYoklamaRaporu(yil, ay){
  var w=window.open("","_blank");
  if(!w){ toast("A√ßńĪlńĪr pencereye izin ver"); return; }
  w.document.write(buildYoklamaRaporHTML(yil, ay)); w.document.close();
  setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){ console.warn("yazdńĪrma a√ßńĪlamadńĪ", e); } }, 500);
}
function yoklamaRaporuWhatsappGonder(yil, ay){
  var ayStr=(ay<10?"0":"")+ay, ayOnEk=yil+"-"+ayStr;
  var tumKayitlar=getYoklamalar().filter(function(y){ return y.tarih && y.tarih.slice(0,7)===ayOnEk; });
  if(!tumKayitlar.length){ toast("Bu ay i√ßin yoklama kaydńĪ yok"); return; }
  var personelIdSet={}; tumKayitlar.forEach(function(y){ personelIdSet[y.personelId]=1; });
  var personel=getPersonelList().filter(function(p){ return personelIdSet[p.id]; })
    .slice().sort(function(a,b){ return (a.ad||"").localeCompare(b.ad||"","tr"); });
  var lines=personel.map(function(p){
    var kayit=tumKayitlar.filter(function(y){return y.personelId===p.id;});
    var geldi=kayit.filter(function(y){return y.durum==="geldi";}).length;
    var gelmedi=kayit.filter(function(y){return y.durum==="gelmedi";}).length;
    var izinli=kayit.filter(function(y){return y.durum==="izinli";}).length;
    return "ūüĎ§ "+p.ad+": Geldi "+geldi+", Gelmedi "+gelmedi+", ńįzinli "+izinli;
  });
  var msg="ūüďč YOKLAMA RAPORU ‚ÄĒ "+YOKLAMA_AY_ADLARI[ay-1]+" "+yil+"\n\n"+lines.join("\n")+"\n\n(G√ľn g√ľn detaylńĪ PDF i√ßin uygulamadan \"PDF OluŇütur/YazdńĪr\"ńĪ kullan.)\n(Dirican Mantar √úretim Takip'ten)";
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }
  toast("‚úď WhatsApp a√ßńĪldńĪ");
}

/* Kritik uyarńĪya dokununca dońürudan √ß√∂z√ľm ekranńĪna git */
function gotoAlert(index){
  var alerts=getCriticalAlerts();
  var a=alerts[index];
  if(!a){ go("bugun"); return; }
  if(a.tipo==="ariza"){
    /* A√ßńĪk arńĪza ‚Üí ArńĪzalar ekranńĪ */
    go("arizalar");
    return;
  }
  if(a.tipo==="kompost" || a.tipo==="temp" || a.tipo==="havaHedef"){
    /* Kompost/tur eksik, sńĪcaklńĪk kritik veya havalandńĪrma hedefinden sapma ‚Üí o odanńĪn G√ľnl√ľk Tur ekranńĪ */
    if(a.odaId){
      turOdayaGit(a.odaId);
    } else {
      go("tur");
    }
    return;
  }
  if(a.tipo==="kgeksik"){
    /* Kompost GeliŇü Kontrol√ľ eksik maddeleri oda DETAY ekranńĪnda ‚ÄĒ G√ľnl√ľk Tur'da deńüil */
    if(a.odaId) openDetail(a.odaId); else go("bugun");
    return;
  }
  /* Bilinmeyen tip ‚Üí g√ľvenli varsayńĪlan */
  go("bugun");
}

/* Belirli bir odaya G√ľnl√ľk Tur ekranńĪnda dońürudan git (tek oda modu) */
function turOdayaGit(odaId){
  var d=loadData();
  var active=d.cycles.filter(function(c){return !c.bosaltimTarihi;});
  /* renderTur ile AYNI sńĪralama: en yeni ‚Üí en eski */
  active.sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var idx=-1;
  for(var i=0;i<active.length;i++){ if(active[i].id===odaId){ idx=i; break; } }
  setTurMod("tek");        /* tek oda moduna ge√ß */
  turIndex=(idx>=0)?idx:0; /* hedef odanńĪn index'i */
  view={name:"tur", id:null};
  window.scrollTo(0,0);
  render();
}

/* Helper: G√∂rev tamamla (oda veya genel) */
function gorevTamamla(id, tipo, cyclicId){
  if(!can("edit")){ noPerm(); return; }
  var d=loadData();
  var simdi=new Date().toISOString();
  if(tipo==="oda"){
    var c=d.cycles.find(function(x){return x.id===cyclicId;});
    if(c){
      var og=(c.odaGorevleri||[]).find(function(x){return x.id===id;});
      if(og){ og.done=true; og.doneAt=simdi; touchCycle(c); saveData(); logAudit("oda g√∂revi tamamlandńĪ", c.oda); render(); }
    }
  } else if(tipo==="genel"){
    var gorevler=getGorevler()||[];
    var g=gorevler.find(function(x){return x.id===id;});
    if(g){ g.done=true; g.doneAt=simdi; saveData(); logAudit("genel g√∂rev tamamlandńĪ", g.baslik); render(); }
  } else if(tipo==="protokol"){
    /* toggleTask kendi render()/toast'ńĪnńĪ y√∂netir (tiftik/toprak/tńĪrmńĪk i√ßin
       detay kutusu a√ßar) ‚ÄĒ burada tekrar toast basmadan direkt d√∂n. */
    toggleTask(cyclicId, parseInt(id,10));
    return;
  }
  toast("‚úď TamamlandńĪ");
}

/* Odaya √∂zel, tek seferlik iŇülemler ‚ÄĒ G√∂revler sekmesinden manuel eklenir */
/* gorevEkleVeyaBirlestir ile aynńĪ desen (bkz. o yorumu) ama oda-bazlńĪ
   g√∂revler (c.odaGorevleri) i√ßin. */
function odaGorevEkleVeyaBirlestir(cid, tarih, is, atama){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  if(!c.odaGorevleri) c.odaGorevleri=[];
  var mevcut = c.odaGorevleri.find(function(g){ return !g.done && g.tarih===tarih && g.is===is; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    touchCycle(c);
    return false;
  }
  c.odaGorevleri.push({id:uid(), tarih:tarih, is:is, atama:atama||"", done:false, ertele:0});
  touchCycle(c);
  return true;
}
function odaGorevEkle(cid, tarih, is, atama){
  if(!can("edit")) return noPerm();
  is=(is||"").trim(); if(!is){ toast("ńįŇülem a√ßńĪklamasńĪ gir"); return; }
  if(!tarih){ toast("Tarih se√ß"); return; }
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var yeni=odaGorevEkleVeyaBirlestir(cid, tarih, is, atama);
  saveData();
  if(yeni) logAudit("oda iŇülemi eklendi", c.oda+" ¬∑ "+is);
  toast(yeni?"Eklendi":"Bu iŇülem zaten vardńĪ ‚ÄĒ atama g√ľncellendi");
  render();
}

/* Elle g√∂rev eklerken, protokolde aynńĪ odaya zaten benzer bir iŇü planlńĪ mńĪ diye bakar.
   Basit ama etkili eŇüleŇütirme: iŇü t√ľr√ľn√ľn ilk kelimesi (√∂rn. "tiftik", "poŇüet") protokol
   satńĪrńĪnńĪn metninde ge√ßiyor mu + tarih birbirine yakńĪn mńĪ (¬Ī3 g√ľn). */
function protokolBenzerVarMi(cid, tur, tarih){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  var anahtar=(tur||"").toLocaleLowerCase("tr").split(/\s+/)[0];
  if(!anahtar || anahtar.length<3) return null;
  var hedefT=tarih||todayISO();
  var eslesen=null;
  getProtokol().forEach(function(s,idx){
    if(eslesen || s.silindi || s.tip!=="olay") return;
    var base=protokolTarih(c,s); if(!base) return;
    var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var t=addDays(base,ert);
    var fark=daysBetween(t,hedefT); if(fark===null || Math.abs(fark)>3) return;
    if((s.txt||"").toLocaleLowerCase("tr").indexOf(anahtar)>=0){
      eslesen={txt:s.txt, tarih:t};
    }
  });
  return eslesen;
}
function genelGorevKaydet(){
  if(!can("edit")) return noPerm();
  var t=el("gg_tarih").value;
  var konum=el("gg_konum").value;
  var tur=el("gg_tur").value;
  var not=(el("gg_not").value||"").trim();
  if(!konum){ toast("Konum se√ß"); return; }
  if(!tur){ toast("ńįŇü t√ľr√ľ se√ß"); return; }
  var is=tur+(not?(" ("+not+")"):"");
  /* AKILLI Y√ĖNLENDńįRME: konum bir "Oda X" ise ve o odanńĪn a√ßńĪk bir d√∂ng√ľs√ľ varsa,
     g√∂rev otomatik olarak o odanńĪn RESMńį kaydńĪna (odaGorevleri) iŇülenir ‚ÄĒ tamamlanńĪnca
     g√ľnl√ľk kayńĪt/pano/PDF'de otomatik g√∂r√ľn√ľr. Deńüilse (depo, saha, ya da odanńĪn a√ßńĪk
     d√∂ng√ľs√ľ yoksa) normal bir hatńĪrlatma g√∂revi olarak kalńĪr. KullanńĪcńĪya ayrńĪca soru
     sorulmaz ‚ÄĒ konum se√ßimine g√∂re otomatik karar verilir. */
  var odaAdi = konum.match(/^Oda (.+)$/);
  var hedefCycle = odaAdi ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(odaAdi[1]); }) : null;
  if(hedefCycle){
    var cakisan=protokolBenzerVarMi(hedefCycle.id, tur, t);
    if(cakisan){
      var devamEt=confirm("‚ö†ÔłŹ Bu iŇü protokolde zaten var:\n\""+cakisan.txt+"\" ("+fmtDate(cakisan.tarih)+" i√ßin planlńĪ)\n\nYine de elle eklemek istiyor musun?");
      if(!devamEt) return;
    }
    odaGorevEkle(hedefCycle.id, t, is, _genelGorevAtama);
  } else {
    var baslik=konum+" ¬∑ "+is;
    gorevEkle(t, baslik, _genelGorevAtama);
  }
  _genelGorevAcik=false; _genelGorevAtama="";
  render();
}
