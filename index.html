/* Delta T: kompost sıcaklığı oda sıcaklığından yüksek olmalı (kompost çalışıyor demek).
   Sadece SORUN varsa (eşit ya da ters) gösterilir — normal durumda hiçbir şey çıkmaz.
   EN SON günlük kayda bakılır (bugün girilmemiş olsa bile) — dün sorun varsa uyarı
   bugün de Bildirimler'de görünmeye devam eder, düzelten yeni bir kayıt girilene kadar sönmez. */
function deltaTDurum(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var son = c.gunluk[c.gunluk.length-1];
  var od=numParse(son.odaC), ko=numParse(son.kompostC);
  if(od==null || ko==null) return null;
  if(ko<od) return "kritik";
  if(ko===od) return "esit";
  return null;
}
function deltaTUyariHTML(c){
  var durum = deltaTDurum(c);
  if(!durum) return "";
  var son = c.gunluk[c.gunluk.length-1];
  var kritik = (durum==="kritik");
  return '<div class="card" style="border:2px solid '+(kritik?'var(--red)':'var(--amber)')+'; background:'+(kritik?'var(--red-soft)':'var(--amber-soft)')+'; margin-bottom:12px;">'
    + '<div style="font-weight:700; color:'+(kritik?'var(--red)':'var(--amber)')+';">'
    + (kritik?'🔴 KOMPOST ÇALIŞMIYOR — oda sıcaklığı komposttan yüksek':'🟠 Δ T eşit — kompost henüz ısınmıyor')
    + '</div>'
    + '<div style="margin-top:4px; font-size:14px;">'
    + fmtDate(son.tarih)+' kaydı: oda '+esc(son.odaC)+'°, kompost '+esc(son.kompostC)+'°. '
    + (kritik?'Kompost ısı üretmiyor demektir — ziraat mühendisine bildir, kompost çalıştırılmalı.':'Kompost oda ile aynı sıcaklıkta, henüz çalışmaya başlamamış olabilir — izle.')
    + '</div>'
    + '<div class="muted" style="margin-top:4px; font-size:12px;">Bu uyarı, düzelten yeni bir günlük kayıt girilene kadar kalkmaz.</div>'
    + '</div>';
}
/* Kompost ALT/ÜST sıcaklık farkı — 4°C ve üzeri KRİTİK kabul edilir (Δ T ile aynı önem seviyesi).
   Kompost eşit ısınmıyor demektir — odaya hava vererek sirkülasyon yapılması gerekir. */
function kompostAltUstDurum(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var son = c.gunluk[c.gunluk.length-1];
  var alt=numParse(son.kompostC), ust=numParse(son.kompostUst);
  if(alt==null || ust==null) return null;
  if((ust-alt)>=4) return "kritik";
  return null;
}
function kompostAltUstUyariHTML(c){
  var durum = kompostAltUstDurum(c);
  if(!durum) return "";
  var son = c.gunluk[c.gunluk.length-1];
  var fark = numParse(son.kompostUst)-numParse(son.kompostC);
  return '<div class="card" style="border:2px solid var(--red); background:var(--red-soft); margin-bottom:12px;">'
    + '<div style="font-weight:700; color:var(--red);">🌬️ KOMPOST ALT-ÜST FARKI YÜKSEK — hava ile sirkülasyon gerekir</div>'
    + '<div style="margin-top:4px; font-size:14px;">'
    + fmtDate(son.tarih)+' kaydı: alt '+esc(son.kompostC)+'°, üst '+esc(son.kompostUst)+'° (fark '+fark+'°C). '
    + 'Kompost eşit ısınmıyor — odaya hava vererek sirkülasyon yapılması önerilir.'
    + '</div>'
    + '<div class="muted" style="margin-top:4px; font-size:12px;">Bu uyarı, düzelten yeni bir günlük kayıt girilene kadar kalkmaz.</div>'
    + '</div>';
}
/* ---- Detay ---- */
function renderDetail(id){
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ go("list"); return; }
  el("hdrTitle").textContent = c.oda || "Oda";
  var st = stageOf(c);

  var kgKart = komposGelisKontrolHTML(c);
  var deltaTKart = deltaTUyariHTML(c);
  var kompDeltaKart = kompostAltUstUyariHTML(c);

  var info = '<div class="card">'
    + '<div style="display:flex; justify-content:space-between; align-items:center;">'
    + '<span class="oda-name">'+esc(c.oda)+'</span><span class="badge '+st.cls+'">'+st.t+'</span></div>'
    + '<hr>'
    + kv("Kompost firması", c.kompostFirma)
    + kv("Kompost tonajı", c.tonaj ? (c.tonaj+" kg") : "")
    + kv("Geliş tarihi / Parti no", c.gelisTarihi ? (fmtDate(c.gelisTarihi)+"  ("+partiFromDate(c.gelisTarihi)+")") : "—")
    + kvCheck("Tiftik", c.tiftikTarihi, c.tiftikDogru, c.tiftikPersonel, c.tiftikNot)
    + kvCheck("Toprak", c.toprakTarihi, c.toprakDogru, c.toprakPersonel, c.toprakNot)
    + kvCheck("Tırmık", c.tirmikTarihi, c.tirmikDogru, c.tirmikPersonel, c.tirmikNot)
    + kv("Hava başlangıç", fmtDate(c.havaBaslangic))
    + kv("Kestane konumu", (c.kestaneKat?(c.kestaneKat+". kat "):"")+(c.kestaneTaraf||""))
    + kv("Boşaltım tarihi", fmtDate(c.bosaltimTarihi))
    + (c._at ? kv("Son düzenleme", (c._by||"?")+" · "+fmtDateTime(c._at)) : "")
    + turSayisiHTML(c)
    + '<div class="row" style="margin-top:14px;">'
    + '<button class="btn sec small" onclick="openForm(\''+c.id+'\')">Bilgileri düzenle</button>'
    + '<button class="btn ghost small" onclick="exportCycleCSV(\''+c.id+'\')">Excel (CSV)</button>'
    + '<button class="btn ghost small" onclick="printForm(\''+c.id+'\')">PDF / Yazdır</button>'
    + '<button class="btn ghost small" onclick="go(\'compare\',\''+c.oda+'\')">Bu odayı kıyasla</button>'
    + (can("manage")?'<button class="btn ghost small" onclick="arsivle(\''+c.id+'\')">📦 Arşivle</button>':'')
    + '</div></div>';

  var riskCard = riskCardHTML(c);
  var hastalikCard = hastalikKontrolHTML(c);
  var hasatKart = hasatTakipKart(c);
  var puanCard = puanCardHTML(c);
  var ilacKart = ilacKartHTML(c);

  /* Günlük tablo */
  var ge = (editGun>=0 && c.gunluk && c.gunluk[editGun]) ? c.gunluk[editGun] : null;
  var showCo2 = airStarted(c) || (c.gunluk||[]).some(function(r){return r.co2alt||r.co2ust;});
  var gunluk = '<div class="sec-title">Günlük kayıt</div><div class="card" style="padding:8px;">'
    + (can("edit")?('<button class="btn ghost small" style="margin-bottom:8px;" onclick="_topluRange=null; go(\'toplu\',\''+c.id+'\')">📥 Geçmiş günleri toplu gir</button>'):'')
    + '<div style="overflow-x:auto;"><table><thead><tr><th>Tarih</th><th>Gün<br>(geliş)</th><th>Gün<br>(toprak)</th><th>Oda °C</th><th>Komp. °C</th>'+(showCo2?'<th>CO₂<br>alt-üst</th>':'')+'<th>Sulama / İlaçlama</th><th></th></tr></thead><tbody>';
  if(c.gunluk && c.gunluk.length){
    c.gunluk.forEach(function(r,i){
      var og = ortuGun(c, r.tarih);
      var co2 = (r.co2alt||r.co2ust) ? ((r.co2alt||"?")+"-"+(r.co2ust||"?")) : "";
      gunluk += '<tr'+(i===editGun?' style="background:var(--green-soft);"':'')+'>'
        + '<td>'+fmtDate(r.tarih)+(r.vakit?'<br><span class="muted">'+esc(r.vakit)+'</span>':'')+'</td>'
        + '<td>'+gunNo(c,r.tarih)+'</td>'
        + '<td>'+(og!==null?og:'')+'</td>'
        + '<td>'+esc(r.odaC)+'</td>'
        + '<td>'+esc(r.kompostC)+'</td>'
        + (showCo2?'<td>'+esc(co2)+'</td>':'')
        + '<td class="note">'+gunMeta(r)+((numParse(r.su)>0)?('<b>'+esc(r.su)+' lt su</b>'+(r.sulama?' · ':'')):'')+esc(r.sulama)+'</td>'
        + '<td style="white-space:nowrap;"><button class="del-x" style="color:var(--green);" onclick="editGunluk(\''+c.id+'\','+i+')">✎</button>'
        + '<button class="del-x" onclick="delGunluk(\''+c.id+'\','+i+')">×</button></td>'
        + '</tr>';
    });
  } else {
    gunluk += '<tr><td colspan="'+(showCo2?8:7)+'" class="muted" style="padding:16px;">Henüz kayıt yok</td></tr>';
  }
  gunluk += '</tbody></table></div>';
  gunluk += '<div style="border-top:1px solid var(--line); margin-top:6px; padding-top:12px;">'
    + (ge?'<div class="red" style="margin-bottom:6px; font-weight:600;">Düzenleniyor: '+fmtDate(ge.tarih)+'</div>':'')
    + '<div class="field-row"><div><label>Tarih</label><input type="date" id="g_tarih" value="'+(ge?ge.tarih:todayISO())+'"></div>'
    + '<div><label>Vakit</label><select id="g_vakit"><option value="">—</option>'+["Sabah","Öğle","Akşam"].map(function(x){return '<option value="'+x+'" '+((ge&&ge.vakit===x)?'selected':'')+'>'+x+'</option>';}).join('')+'</select></div></div>'
    + '<div class="field-row"><div><label>Oda °C</label><input type="number" step="0.1" inputmode="decimal" id="g_oda" value="'+(ge?esc(ge.odaC):'')+'"></div>'
    + '<div><label>Klima °C</label><input type="number" step="0.1" inputmode="decimal" id="g_klima" value="'+(ge?esc(ge.klimaC||''):'')+'"></div></div>'
    + '<div class="field-row"><div><label>Komp °C alt</label><input type="number" step="0.1" inputmode="decimal" id="g_komp" value="'+(ge?esc(ge.kompostC):'')+'"></div>'
    + '<div><label>Komp °C üst</label><input type="number" step="0.1" inputmode="decimal" id="g_kompust" value="'+(ge?esc(ge.kompostUst||''):'')+'"></div></div>'
    + (showCo2?('<div class="field-row"><div><label>CO₂ alt</label><input type="number" inputmode="numeric" id="g_co2a" value="'+(ge?esc(ge.co2alt):'')+'" placeholder="3900"></div>'
    + '<div><label>CO₂ üst</label><input type="number" inputmode="numeric" id="g_co2u" value="'+(ge?esc(ge.co2ust):'')+'" placeholder="4200"></div></div>'):'')
    + '<div class="field-row"><div><label>Amonyak (koku)</label><select id="g_amonyak"><option value="">—</option>'+["Yok","Var"].map(function(x){return '<option value="'+x+'" '+((ge&&ge.amonyak===x)?'selected':'')+'>'+x+'</option>';}).join('')+'</select></div>'
    + '<div><label>Nem</label><select id="g_nem"><option value="">—</option>'+["Düşük","Normal","Yüksek"].map(function(x){return '<option value="'+x+'" '+((ge&&ge.nem===x)?'selected':'')+'>'+x+'</option>';}).join('')+'</select></div></div>'
    + (suGoster(c, ge)?(suSliderHTML("g_su", ge?ge.su:"")
        + ilacDozPickerHTML("g_ilac_sec","g_ilac_doz","g_sulama")
        + '<label>Sulama / İlaçlama (açıklama — yukarıdan seçince otomatik dolar, istersen elle düzenle)</label><input type="text" id="g_sulama" value="'+(ge?esc(ge.sulama):'')+'" placeholder="örn. 250 ml Serenade">')
      : '<div class="muted" style="padding:8px 0; font-style:italic;">🚫 Poşet henüz açılmadı — sulama/ilaçlama girişi kapalı.</div>'
        + '<input type="hidden" id="g_sulama" value="'+(ge?esc(ge.sulama):'')+'">')
    + '<button class="btn small" style="margin-top:12px; width:100%;" onclick="addGunluk(\''+c.id+'\')">'+(ge?'Kaydı güncelle':'+ Günlük kayıt ekle')+'</button>'
    + (ge?'<button class="btn ghost small" style="margin-top:8px; width:100%;" onclick="cancelEditGun(\''+c.id+'\')">Vazgeç</button>':'')
    + '</div></div>';

  /* Havalandırma planı */
  var hava = '<div class="sec-title">Havalandırma planı (hedef sıcaklık + CO₂)</div><div class="card" style="padding:8px;">'
    + '<table><thead><tr><th>Tarih</th><th>Gün</th><th>Hedef °C</th><th>CO₂ / Hava</th><th></th></tr></thead><tbody>';
  if(c.hava && c.hava.length){
    c.hava.forEach(function(r,i){
      var co2 = (r.co2alt||r.co2ust) ? ((r.co2alt||"?")+" - "+(r.co2ust||"?")) : "—";
      hava += '<tr><td>'+fmtDate(r.tarih)+'</td><td>'+gunNo(c,r.tarih)+'</td>'
        + '<td class="hava-temp">'+esc(r.hedefC)+'°</td><td>'+esc(co2)+'</td>'
        + '<td><button class="del-x" onclick="delHava(\''+c.id+'\','+i+')">×</button></td></tr>';
    });
  } else {
    hava += '<tr><td colspan="5" class="muted" style="padding:16px;">Havaya başlayınca buraya günlük hedefleri ekle</td></tr>';
  }
  hava += '</tbody></table>';
  hava += '<div style="border-top:1px solid var(--line); margin-top:6px; padding-top:12px;">'
    + '<div class="field-row"><div><label>Tarih</label><input type="date" id="h_tarih" value="'+todayISO()+'"></div>'
    + '<div><label>Hedef °C</label><input type="number" step="0.1" inputmode="decimal" id="h_temp"></div></div>'
    + '<div class="field-row"><div><label>CO₂ / Hava alt</label><input type="number" inputmode="numeric" id="h_alt" placeholder="3900"></div>'
    + '<div><label>CO₂ / Hava üst</label><input type="number" inputmode="numeric" id="h_ust" placeholder="4200"></div></div>'
    + '<button class="btn small" style="margin-top:12px; width:100%;" onclick="addHava(\''+c.id+'\')">+ Havalandırma satırı ekle</button>'
    + '</div></div>';

  var footer = '<hr><div class="row">'
    + '<button class="btn ghost" onclick="go(\'list\')">‹ Geri</button>';
  if(!c.bosaltimTarihi){
    footer += '<button class="btn danger" onclick="bosalt(\''+c.id+'\')">Odayı boşalt</button>';
  }
  footer += '<button class="btn danger" onclick="delCycle(\''+c.id+'\')">Döngüyü sil</button></div>';

  var dl = phaseList(c);
  var donem = '<div class="sec-title">Dönemler</div><div class="card" style="padding:8px;">'
    + '<table><thead><tr><th>Dönem</th><th>Başlangıç</th></tr></thead><tbody>';
  dl.forEach(function(p){
    var hl = p.current ? ' style="background:var(--green-soft);"' : '';
    var mark = p.current ? '<b>▶ </b>' : '';
    donem += '<tr'+hl+'><td class="note" style="font-weight:500;">'+mark+p.ad+'</td>'
      + '<td class="red">'+fmtDate(p.tarih)+'</td></tr>';
  });
  donem += '</tbody></table>';
  donem += '<div style="border-top:1px solid var(--line); margin-top:8px; padding-top:10px;">'
    + '<label>Dönemi elle ayarla (gözleme göre)</label>'
    + '<select id="d_manuel" onchange="setManuelDonem(\''+c.id+'\', this.value)">'
    + '<option value="">Otomatik (tarihe göre)</option>'
    + PHASES.map(function(p){ return '<option value="'+esc(p)+'" '+(c.donemManuel===p?'selected':'')+'>'+esc(p)+'</option>'; }).join('')
    + '</select>'
    + (c.donemManuel?'<div class="red" style="margin-top:6px;">Elle ayarlı: '+esc(c.donemManuel)+' (otomatiğe dönmek için "Otomatik" seç)</div>':'<div class="muted" style="margin-top:6px;">Mantar takvimden farklı geldiyse buradan elle dönemi sabitleyebilirsin.</div>')
    + '</div></div>';

  var tak = beklenenTakvim(c);
  var plan = '<div class="sec-title">Beklenen takvim</div><div class="card" style="padding:8px;">'
    + '<table><thead><tr><th>Aşama</th><th>Beklenen</th><th>Gerçekleşen</th></tr></thead><tbody>';
  tak.forEach(function(m){
    plan += '<tr><td class="note" style="font-weight:500;">'+m.ad+'</td>'
      + '<td class="red">'+fmtDate(m.beklenen)+'</td>'
      + '<td>'+(m.ger?('✓ '+fmtDate(m.ger)):'<span class="muted">—</span>')+'</td></tr>';
  });
  plan += '</tbody></table><div class="muted" style="padding:8px 8px 4px;">Kural: gelişten tiftik '+getSet(c).offTiftik+'., toprak '+getSet(c).offToprak+'. gün · topraktan tırmık '+getSet(c).offTirmik+'., hava '+getSet(c).offHava+'., hasat '+getSet(c).offHasat+'. gün</div></div>';

  var prot = '<div class="sec-title">Protokol — beklenen işlemler</div><div class="card" style="padding:12px;">'
    + '<div class="warn">🌡️ Kompost ideal 24-26° · <b>21° altı ve 28° üstü KRİTİK</b> · 30° üstü TEHLİKELİ<br>Oda üst sınır 21° · toprak→hava arası hava kapalı<br>🌬️ Havadan sonra: oda 18° (hasatta 17°) · kompost 19-21° · CO₂ 1.flaş 2100-2400 / 2.flaş 3000-3300</div>';
  var protAdimlari = getProtokol().map(function(s,idx){ return {s:s, idx:idx, t:protokolTarih(c,s)}; });
  function protTabloHTML(baslik, filtre){
    var liste = protAdimlari.filter(filtre).sort(function(a,b){ return (a.t||"")<(b.t||"")?-1:((a.t||"")>(b.t||"")?1:0); });
    if(!liste.length) return "";
    var hh='<div style="font-weight:700; margin:10px 0 4px;">'+baslik+'</div><table><thead><tr><th>Tarih</th><th>Gün</th><th>İşlem</th></tr></thead><tbody>';
    liste.forEach(function(x){
      var s=x.s, t=x.t;
      var reflbl = (s.ref==="gelis"?"G":"T")+s.gun;
      var cls = s.tip==="uyari" ? ' style="background:#fff6e5;"' : '';
      var icon = s.tip==="olay" ? '<b>◆</b> ' : (s.tip==="uyari" ? '⚠️ ' : '');
      hh += '<tr'+cls+'><td class="red">'+fmtDate(t)+'</td>'
        + '<td class="muted">'+reflbl+'</td>'
        + '<td class="note">'+icon+esc(s.txt)+'</td></tr>';
    });
    hh+='</tbody></table>';
    return hh;
  }
  prot += protTabloHTML('🔧 Yapılacak İşlemler', function(x){ return x.s.tip==="olay"; })
    + protTabloHTML('⚠️ Kontrol / Gözlem', function(x){ return x.s.tip==="uyari"; })
    + protTabloHTML('💧 Sulama / İlaçlama', function(x){ return x.s.tip==="ilac" || x.s.tip==="su"; });
  prot += '<div class="muted" style="padding:8px 2px 0;">Tarihler tahminîdir (kırmızı). Toprak tarihi girilince topraktan sonraki günler ona göre güncellenir. G=gelişten, T=topraktan gün.</div></div>';

  /* Ziraat mühendisi notları */
  var notHTML = muhendisNotHTML(c);

  /* El yazısı Oda Takip Formu fotoğrafı */
  var fimgs = loadFormImgs(c.id);
  var formFoto = '<div class="sec-title">📋 El yazısı Oda Takip Formu (fotoğraf)</div><div class="card" style="padding:12px;">'
    +'<div class="muted" style="margin-bottom:8px;">Kağıt forma elle girilen ölçümlerin fotoğrafını buraya yükle — kanıt/arşiv amaçlı, cihazda saklanır.</div>';
  if(fimgs.length){
    formFoto += '<div style="display:flex; flex-wrap:wrap; gap:10px;">';
    fimgs.forEach(function(im,i){
      var confirming=(_confirmDeleteFormPhoto===(c.id+":"+i));
      formFoto += '<div style="position:relative; width:122px;">'
        + '<img src="'+im.data+'" style="width:122px; height:158px; object-fit:cover; border-radius:8px; border:1px solid var(--line);" onclick="showFormPhoto(\''+c.id+'\','+i+')">'
        + (confirming
            ? ('<button class="del-x" style="position:absolute; top:-8px; right:-8px; background:#c0291f; color:#fff; border-radius:50%; width:26px; height:26px; padding:0; font-size:16px;" onclick="delFormPhotoClick(\''+c.id+'\','+i+')">✓</button>')
            : ('<button class="del-x" style="position:absolute; top:-8px; right:-8px; background:#fff; border:1px solid var(--line); border-radius:50%; width:26px; height:26px; padding:0;" onclick="delFormPhotoClick(\''+c.id+'\','+i+')">×</button>'))
        + '<div class="muted" style="font-size:10px;">'+fmtDate((im.ts||"").slice(0,10))+'</div></div>';
    });
    formFoto += '</div>';
  } else {
    formFoto += '<div class="muted" style="padding:2px 0 8px;">Henüz form fotoğrafı yok.</div>';
  }
  formFoto += '<div style="margin-top:10px;"><label class="btn sec small" style="cursor:pointer;">📷 Form fotoğrafı ekle<input type="file" accept="image/*" capture="environment" style="display:none" onchange="if(this.files[0])addFormPhoto(\''+c.id+'\',this.files[0])"></label></div></div>';

  /* Fotoğraflar */
  var imgs = loadImgs(c.id);
  var katOpt='', bolOpt='';
  for(var ki=1;ki<=5;ki++) katOpt+='<option value="'+ki+'">'+ki+'. kat</option>';
  for(var bi=1;bi<=12;bi++) bolOpt+='<option value="'+bi+'">'+bi+'. bölme</option>';
  var foto = '<div class="sec-title">Hastalık / gözlem kayıtları</div><div class="card" style="padding:12px;">';
  if(imgs.length){
    foto += '<div style="display:flex; flex-wrap:wrap; gap:10px;">';
    imgs.forEach(function(im,i){
      var loc=[]; if(im.taraf)loc.push(im.taraf); if(im.kat)loc.push(im.kat+". kat"); if(im.bolme)loc.push(im.bolme+". bölme");
      var locStr=loc.join(" · ");
      foto += '<div style="position:relative; width:122px;">'
        + (im.data?('<img src="'+im.data+'" style="width:122px; height:96px; object-fit:cover; border-radius:8px; border:1px solid var(--line);" onclick="showPhoto(\''+c.id+'\','+i+')">'):'<div style="width:122px;height:96px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">not</div>')
        + '<button class="del-x" style="position:absolute; top:-8px; right:-8px; background:#fff; border:1px solid var(--line); border-radius:50%; width:26px; height:26px; padding:0;" onclick="delPhoto(\''+c.id+'\','+i+')">×</button>'
        + '<div style="font-size:11px; margin-top:2px;"><b>'+esc(locStr||"—")+'</b></div>'
        + (im.note?'<div class="muted" style="font-size:11px;">'+esc(im.note)+'</div>':'')
        + '<div class="muted" style="font-size:10px;">'+fmtDate((im.ts||"").slice(0,10))+'</div></div>';
    });
    foto += '</div>';
  } else {
    foto += '<div class="muted" style="padding:2px 0 8px;">Henüz kayıt yok.</div>';
  }
  foto += '<div style="border-top:1px solid var(--line); margin-top:10px; padding-top:10px;">'
    + '<div class="field-row"><div><label>Taraf</label><select id="ph_taraf"><option value="">—</option><option value="Sol">Sol</option><option value="Sağ">Sağ</option></select></div>'
    + '<div><label>Kat</label><select id="ph_kat"><option value="">—</option>'+katOpt+'</select></div>'
    + '<div><label>Bölme</label><select id="ph_bolme"><option value="">—</option>'+bolOpt+'</select></div></div>'
    + '<label>Not (hastalık / gözlem)</label><input type="text" id="ph_note" placeholder="örn. yeşil küf başlangıcı">'
    + '<div class="row" style="margin-top:10px;">'
    + '<label class="btn sec small" style="cursor:pointer;">📷 Fotoğraflı ekle<input type="file" accept="image/*" capture="environment" style="display:none" onchange="if(this.files[0])addPhoto(\''+c.id+'\',this.files[0])"></label>'
    + '<button class="btn ghost small" onclick="addDiseaseNote(\''+c.id+'\')">Notlu ekle (fotoğrafsız)</button>'
    + '</div>'
    + '<div class="muted" style="margin-top:6px;">Oda 5 katlı, her kat 12 bölme (sol/sağ). Kayıtlar cihazda saklanır ve "Yedekle" ile yedeğe dahildir.</div></div>';


  var verim = verimCardHTML(c);
  var hasatTak = hasatTakvimHTML(c);
  var tuketim = tuketimCardHTML(c);

  var sekmeBar = '<div style="display:flex; overflow-x:auto; gap:6px; margin:2px 0 12px; padding-bottom:2px;">'
    + ODA_SEKMELERI.map(function(s){
        var aktif=(_odaSekme===s.key);
        return '<button class="btn '+(aktif?'':'ghost')+' small" style="white-space:nowrap; flex:none;" onclick="odaSekmeAc(\''+s.key+'\')">'+s.ic+' '+s.ad+'</button>';
      }).join('')
    + '</div>';

  var icerik="";
  if(_odaSekme==="gunluk") icerik = gunluk + hava;
  else if(_odaSekme==="hasat") icerik = hasatKart + hasatTak;
  else if(_odaSekme==="hastalik") icerik = hastalikCard + foto;
  else if(_odaSekme==="ilac") icerik = ilacKart + tuketim;
  else if(_odaSekme==="uretim") icerik = puanCard + verim + donem + plan + prot;
  else if(_odaSekme==="notlar") icerik = notHTML + formFoto;

  /* Havalandırma hedef kartı (varsa) günlük sekmesinde, uyarı niteliğinde en üstte */
  var havaHedef = airStarted(c) ? havaHedefKart(c) : "";

  el("app").innerHTML = deltaTKart + kompDeltaKart + kgKart + info + riskCard
    + (_odaSekme==="gunluk" ? havaHedef : "")
    + sekmeBar + icerik + footer;
}

/* ---------- Sesli not (ses kaydı) — genel amaçlı, herhangi bir formda kullanılabilir ----------
   Tarayıcının mikrofon erişimiyle (MediaRecorder) kısa bir ses kaydı alır, base64 olarak
   geçici bellekte tutar; ilgili "kaydet" fonksiyonu bunu okuyup kalıcı depoya yazar. */
var _sesKayitAktif=null; /* {recorder, hedefId} */
var _sesKayitSonuc={};   /* hedefId -> base64 data URL */
function sesKayitWidgetHTML(hedefId){
  return '<div style="margin-top:8px;">'
    + '<button type="button" class="btn ghost small" id="ses_btn_'+hedefId+'" onclick="sesKayitToggle(\''+hedefId+'\')">🎤 Sesli not kaydet</button>'
    + '<div id="ses_onizleme_'+hedefId+'"></div>'
    + '</div>';
}
function sesKayitToggle(hedefId){
  if(_sesKayitAktif && _sesKayitAktif.hedefId===hedefId){ sesKayitDurdur(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder==="undefined"){
    toast("Bu cihaz/tarayıcı ses kaydını desteklemiyor"); return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var chunks=[];
    var rec;
    try{ rec=new MediaRecorder(stream); }catch(e){ toast("Ses kaydı başlatılamadı"); return; }
    rec.ondataavailable=function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };
    rec.onstop=function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob=new Blob(chunks, {type: rec.mimeType||"audio/webm"});
      var reader=new FileReader();
      reader.onload=function(){
        _sesKayitSonuc[hedefId]=reader.result;
        var onz=el("ses_onizleme_"+hedefId);
        if(onz) onz.innerHTML='<audio controls src="'+reader.result+'" style="width:100%; margin-top:6px;"></audio>'
          + '<div class="muted" style="font-size:12px;">Kayıt hazır — kaydet/ekle butonuna basınca not ile birlikte saklanır.</div>';
      };
      reader.readAsDataURL(blob);
      var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="🎤 Yeniden kaydet";
      _sesKayitAktif=null;
    };
    rec.start();
    _sesKayitAktif={recorder:rec, hedefId:hedefId};
    var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="⏹ Durdur";
    toast("Kayıt başladı, bitirince ⏹ Durdur'a bas");
  }).catch(function(){ toast("Mikrofon izni verilmedi"); });
}
function sesKayitDurdur(){
  if(_sesKayitAktif && _sesKayitAktif.recorder && _sesKayitAktif.recorder.state!=="inactive"){ _sesKayitAktif.recorder.stop(); }
}

function notEkKey(id){ return "utp_notek_"+id; }
function loadNotEkler(id){ try{ return JSON.parse(localStorage.getItem(notEkKey(id))||"[]"); }catch(e){ return []; } }

function addMuhendisNotu(id){

  getMuhendisNotlari(c).push({tarih:todayISO(), metin:txt||"(sesli not)", by:deviceName()});
  if(sesData){
    var ekler=loadNotEkler(id);
    ekler.push({ts:new Date().toISOString(), tip:"ses", data:sesData});
    saveNotEkler(id, ekler);
    delete _sesKayitSonuc[id];
  }

}
function addMuhendisFoto(id, file){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var data=cv.toDataURL("image/jpeg",0.6);
      var ekler=loadNotEkler(id);
      ekler.push({ts:new Date().toISOString(), tip:"foto", data:data});
      if(saveNotEkler(id, ekler)){ toast("Fotoğraf eklendi"); renderDetail(id); }
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- Risk değerlendirmesi / muhtemel neden (kural tabanlı ipucu) ---------- */
function riskDegerlendir(c){
  if(c.bosaltimTarihi) return null;
  var son3=(c.gunluk||[]).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).slice(-3);
  if(!son3.length) return null;
  var last=son3[son3.length-1];
  var ko=numParse(last.kompostC), od=numParse(last.odaC);
  var nedenler=[], puan=0;
  var yuksekKomp = ko!=null && ko>=KOMPOST_KRITIK_UST;
  var dusukKomp = ko!=null && ko<=KOMPOST_KRITIK_ALT;
  var yuksekOda = od!=null && od>ODA_MAX;
  var co2Val = numParse(last.co2ust); if(co2Val==null) co2Val=numParse(last.co2alt);
  var yuksekCO2 = co2Val!=null && co2Val>3500;
  var nemYuksek = last.nem==="Yüksek";
  var amonyakVar = last.amonyak==="Var";
  var artiyor=false;
  if(son3.length>=2){
    var vals=son3.map(function(r){return numParse(r.kompostC);}).filter(function(v){return v!=null;});
    if(vals.length>=2 && (vals[vals.length-1]-vals[0])>=2) artiyor=true;
  }
  if(yuksekKomp && yuksekCO2 && (nemYuksek||amonyakVar)){
    nedenler.push("Kompost sıcak + CO₂ yüksek"+(nemYuksek?" + nem yüksek":(amonyakVar?" + amonyak var":""))+" birlikte görülüyor — havalandırma yetersiz olabilir.");
    puan+=3;
  } else if(yuksekKomp && yuksekCO2){
    nedenler.push("Kompost sıcak ve CO₂ yüksek — havalandırmayı artırmayı değerlendir.");
    puan+=2;
  }
  if(yuksekKomp && !yuksekCO2 && artiyor){ nedenler.push("Kompost sıcaklığı son ölçümlerde yükseliyor — ateşlenme güçleniyor olabilir, kompost aktivitesi fazla olabilir."); puan+=2; }
  if(dusukKomp){ nedenler.push("Kompost sıcaklığı düşük — misel gelişimi yavaşlayabilir; oda ısıtması/izolasyonu kontrol et."); puan+=1; }
  if(amonyakVar && !yuksekCO2){ nedenler.push("Amonyak kokusu bildirilmiş — kompost fazla ıslak ya da azot dengesi bozuk olabilir, havalandırmayı kontrol et."); puan+=2; }
  if(nemYuksek && yuksekKomp){ nedenler.push("Nem yüksek + kompost sıcak birlikte — sulama fazla kaçmış olabilir."); puan+=1; }
  if(yuksekOda && !airStarted(c)){ nedenler.push("Oda sıcaklığı üst sınırın üzerinde — dış ortam/klima ayarını kontrol et."); puan+=1; }
  if(!nedenler.length) return {seviye:"Düşük", nedenler:[], puan:0};
  var seviye = puan>=4?"Yüksek":(puan>=2?"Orta":"Düşük");
  return {seviye:seviye, nedenler:nedenler, puan:puan};
}
function riskCardHTML(c){
  var r=riskDegerlendir(c);
  if(!r || !r.nedenler.length) return "";
  var renk = r.seviye==="Yüksek"?"#c0291f":(r.seviye==="Orta"?"var(--amber)":"var(--muted)");
  var bg = r.seviye==="Yüksek"?"#fceaea":(r.seviye==="Orta"?"#fff6e5":"#f7f7f5");
  var body='<div style="font-weight:700;color:'+renk+';margin-bottom:6px;">Risk seviyesi: '+r.seviye+'</div>'
    +r.nedenler.map(function(n){ return '<div style="padding:4px 0;font-size:14px;">• '+esc(n)+'</div>'; }).join('')
    +'<div class="muted" style="margin-top:8px;font-size:12px;">Bu değerlendirme kurallara dayalı bir ipucudur, kesin teşhis değildir — son karar ziraat mühendisinindir.</div>';
  return sectionCard('🔍 Risk değerlendirmesi (kural tabanlı ipucu)', body, {border:renk, bg:bg});
}

function kompostGelisIkazlariHTML(){
  var d=loadData(); var today=todayISO();
  var problemliOdalar=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){

/* Kompost sıcaklığı için en güncel ölçümü bul (geliş günü ilk değer mi, yoksa sonraki günün tur ölçümü mü) */
function kgGuncelSicaklik(c){
  var sonOlcum=null;
  if(c.gunluk && c.gunluk.length){
    for(var gi=c.gunluk.length-1; gi>=0; gi--){
      var ga=numParse(c.gunluk[gi].kompostC), gu=numParse(c.gunluk[gi].kompostUst);
      if(ga!==null || gu!==null){ sonOlcum={alt:ga, ust:gu, tarih:c.gunluk[gi].tarih}; break; }
    }
  }
  if(sonOlcum && (!c.gelisTarihi || sonOlcum.tarih>c.gelisTarihi)){
    return {alt:sonOlcum.alt, ust:sonOlcum.ust, kaynak:"tur ("+fmtDate(sonOlcum.tarih)+")"};
  }
  return {alt:numParse(c.kgDereceAlt), ust:numParse(c.kgDereceUst), kaynak:"geliş günü"};
}
function kompostEksikMaddeler(c){
  var S=getSicaklik(); var eksik=[];
  var sic=kgGuncelSicaklik(c); var ko=sic.alt, kou=sic.ust;
  if(ko===null && kou===null) eksik.push("sıcaklık girilmedi");
  else {
    var enD=(ko!==null&&kou!==null)?Math.min(ko,kou):(ko!==null?ko:kou);
    var enY=(ko!==null&&kou!==null)?Math.max(ko,kou):(ko!==null?ko:kou);
    if(!(enD>=S.idealMin && enY<=S.idealMax)) eksik.push("sıcaklık ideal dışı");
  }
  if(!c.kgIrsaliye) eksik.push("irsaliye?");
  else if(c.kgIrsaliye==="hayir") eksik.push("irsaliye alınmadı");
  if(!(c.kestaneKat && c.kestaneTaraf)) eksik.push("kestane yeri?");
  if(!c.kgNem) eksik.push("nem?");
  else if(c.kgNem!=="iyi" && c.kgNem!=="normal") eksik.push("nem: "+c.kgNem);
  if(!c.kgAmonyak) eksik.push("amonyak?");
  else if(c.kgAmonyak==="belirsiz") eksik.push("amonyak belirsiz");
  else if(c.kgAmonyak==="var" && !c.kgAmonyakHavalandirildi) eksik.push("amonyak var");
  if(!c.kgDuzeltme) eksik.push("düzeltme?");
  else if(c.kgDuzeltme==="gerek") eksik.push("kompost düzeltilmeli");
  return eksik;
}

  var halatSet={}; halat.forEach(function(h){ halatSet[h]=1; });
  var ekip1Cak=ekip1.find(function(e){ return halatSet[e]; });
  if(ekip1Cak){ toast("⚠️ Halat ekibindeki kişi ("+ekip1Cak+") 1. Ekipe seçilemiyor"); return null; }
  var ekip1Set={}; ekip1.forEach(function(e){ ekip1Set[e]=1; });
  var ekip2Cak=ekip2.find(function(e){ return ekip1Set[e]||halatSet[e]; });
  if(ekip2Cak){ toast("⚠️ "+ekip2Cak+" başka bir ekipte zaten seçili — 2. Ekipe eklenemez"); return null; }
  var msg="🥬 KOMPOST İNDİRME PLANI\n\n";
  msg+="📅 "+fmtDate(tarih)+"\n";

  msg+="👷 EKİPLER:\n";
  if(makine) msg+="🔧 Makine Operatörü: "+makine+"\n";
  if(halat.length) msg+="🪢 Halat Ekibi: "+halat.join(", ")+"\n";
  if(ekip1.length) msg+="\n1️⃣ 1. İndirme Ekibi: "+ekip1.join(", ")+"\n";
  if(ekip2.length) msg+="2️⃣ 2. İndirme Ekibi: "+ekip2.join(", ")+"\n";

  return msg;

/* Bu döngüde hangi ilaç ne zaman uygulanmış, sonraki en erken tekrar tarihi, hasat öncesi bekleme uyarısı */
function ilacGecmisi(c){
  var L=getIlacList(); if(!L.length) return [];
  var gunluk=(c.gunluk||[]).filter(function(r){return r.sulama;}).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  var out=[];
  L.forEach(function(ilac){
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    var kullanim=gunluk.filter(function(r){return re.test(r.sulama);});
    if(!kullanim.length) return;
    var son=kullanim[kullanim.length-1].tarih;
    var sonrakiTekrar = (ilac.tekrarGun!=null) ? addDays(son, ilac.tekrarGun) : null;
    var uyari=[];
    if(sonrakiTekrar && sonrakiTekrar>todayISO() && !c.bosaltimTarihi) uyari.push("En erken tekrar: "+fmtDate(sonrakiTekrar)+" (min "+ilac.tekrarGun+" gün ara)");
    if(ilac.hasatGun!=null){
      (c.hasat||[]).forEach(function(h){
        var fark=daysBetween(son, h.tarih);
        if(fark!=null && fark>=0 && fark<ilac.hasatGun){
          uyari.push("⚠️ "+fmtDate(h.tarih)+" hasadı, son uygulamadan "+fark+" gün sonra — hasat öncesi bekleme ("+ilac.hasatGun+" gün) dolmamış olabilir");
        }
      });
    }
    out.push({ad:ilac.ad, son:son, sayi:kullanim.length, uyari:uyari});
  });
  return out;
}
function ilacTekrarKontrolMesaji(c, tarih, sulamaTxt){
  if(!sulamaTxt) return [];
  var out=[];
  getIlacList().forEach(function(ilac){
    if(ilac.tekrarGun==null) return;
    var re=new RegExp(ilac.ad.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"i");
    if(!re.test(sulamaTxt)) return;
    var gecmis=(c.gunluk||[]).filter(function(r){return r.sulama && re.test(r.sulama) && r.tarih!==tarih;});
    if(!gecmis.length) return;
    var sonOnceki=gecmis.slice().sort(function(a,b){return cmpDate(b.tarih,a.tarih);})[0];
    var fark=daysBetween(sonOnceki.tarih, tarih);
    if(fark!=null && fark>=0 && fark<ilac.tekrarGun){
      out.push(esc(c.oda||"")+": "+esc(ilac.ad)+" son uygulamadan ("+fmtDate(sonOnceki.tarih)+") "+fark+" gün sonra tekrar giriliyor — önerilen min. ara "+ilac.tekrarGun+" gün.");
    }
  });
  return out;
}

/* Tiftik/toprak/tırmık/hava alanı ilk kez set edilince ilgili protokol görevini
   tamamlandı işaretler ve (tarih bugünse) günlük kayda otomatik not düşer.
   "Bilgileri düzenle" formu ve hızlı tur ekranındaki "işaretle" butonları
   bu TEK fonksiyonu ortak kullanır — iki yerde ayrı ayrı yazılıp birbirinden
   kopmasınlar diye (daha önce tam bu yüzden bir hata olmuştu). */
function protokolGoreviTamamla(c, key, tarih){
  var reMap={tiftik:/tiftik/i, toprak:/toprak/i, tirmik:/tırmık/i, hava:/hava/i};
  var re=reMap[key]; if(!re) return;
  var sahipGerekli = (key!=="hava") ? "ekip" : null;
  var P=getProtokol();
  for(var pi=0; pi<P.length; pi++){
    if(P[pi].tip==="olay" && re.test(P[pi].txt) && (!sahipGerekli || P[pi].sahip===sahipGerekli)){
      if(!c.done) c.done={};
      c.done["p"+pi]=true;
      if(tarih===todayISO()) gunlukGorevNotEkle(c, P[pi].txt+" yapıldı");
      break;
    }
  }
}
function saveForm(id){
  if(!can("edit")) return noPerm();
  var d = loadData();
  var c = id ? d.cycles.find(function(x){return x.id===id;}) : {id:uid(), gunluk:[], hava:[]};
  if(id && c && formBase.at && c._at && c._at!==formBase.at && c._by!==deviceName()){
    if(!confirm("Bu oda '"+(c._by||"?")+"' tarafından "+fmtDateTime(c._at)+" değiştirildi.\nSenin kaydın onun değişikliklerini ezecek.\n\nTamam = yine de kaydet · İptal = güncel halini göster")){
      openDetail(c.id); return;
    }
  }
  var odaRaw = el("f_oda").value;
  if(!odaRaw.trim()){ toast("Oda seç"); return; }
  var odaN = normalizeOda(odaRaw);
  /* MÜKERRER ENGELİ: yeni döngüde (veya oda değiştirilirken) aynı odada aktif döngü varsa engelle */
  var mevcutBosaltim = el("f_bosalt").value;
  if(!mevcutBosaltim){ /* bu döngü aktif olacaksa */
    var cakisan = d.cycles.filter(function(x){
      return normalizeOda(x.oda)===odaN && !x.bosaltimTarihi && x.id!==(id||"");
    })[0];
    if(cakisan){
      toast(odaN+" odasında zaten aktif kompost var — önce boşalt");
      return;
    }
  }
  c.oda = odaN;
  var _fv=el("f_firma").value; c.kompostFirma=(_fv==="__new__"?"":_fv);
  c.tonaj = el("f_tonaj").value.trim();
  var alanGirilen = el("f_alan").value.trim();
  /* m² boş bırakıldıysa oda tanımındaki sabit m²'yi kullan */
  if(!alanGirilen){
    var sabitM2 = odaM2Get(odaN);
    c.alanM2 = sabitM2!==null ? String(sabitM2) : "";
  } else {
    c.alanM2 = alanGirilen;
  }
  c.gelisTarihi = el("f_gelis").value;
  c.partiNo = partiFromDate(c.gelisTarihi);
  ["tiftik","toprak","tirmik"].forEach(function(k){
    var eskiTarih = c[k+"Tarihi"];
    var yeniTarih = el("f_"+k+"_t").value;
    c[k+"Tarihi"]=yeniTarih;
    c[k+"Personel"]=el("f_"+k+"_p").value.trim();
    c[k+"Dogru"]=el("f_"+k+"_d").checked;
    var nEl=el("f_"+k+"_n"); c[k+"Not"]=nEl?nEl.value.trim():"";
    if(!eskiTarih && yeniTarih) protokolGoreviTamamla(c, k, yeniTarih);
  });
  var eskiHava = c.havaBaslangic;
  c.havaBaslangic = el("f_hava").value;
  if(!eskiHava && c.havaBaslangic){
    var P_hava=getProtokol();
    for(var hi=0; hi<P_hava.length; hi++){
      if(P_hava[hi].tip==="olay" && /hava/i.test(P_hava[hi].txt)){
        if(!c.done) c.done={};
        c.done["p"+hi]=true;
        if(c.havaBaslangic===todayISO()) gunlukGorevNotEkle(c, P_hava[hi].txt+" yapıldı");
        break;
      }
    }
  }
  c.kestaneKat = el("f_kkat").value.trim();
  c.kestaneTaraf = el("f_ktaraf").value;
  c.bosaltimTarihi = el("f_bosalt").value;
  c.offsets={};
  [["offTiftik","f_o_tiftik"],["offToprak","f_o_toprak"],["offTirmik","f_o_tirmik"],["offHava","f_o_hava"],["offHasat","f_o_hasat"]].forEach(function(pr){
    var e2=el(pr[1]); var vv=e2?e2.value.trim():""; if(vv!=="" && !isNaN(parseInt(vv,10))) c.offsets[pr[0]]=parseInt(vv,10);
  });
  if(!id) d.cycles.push(c);
  touchCycle(c);

}

function topluRangeUygula(id){
  var bas=parseInt(el("tp_bas").value,10), son=parseInt(el("tp_son").value,10);
  if(isNaN(bas)) bas=0; if(isNaN(son)) son=bas;
  if(bas<0){ bas=0; toast("Geliş tarihinden önceki günler girilemez (0'dan başlar)"); }

function topluKaydet(id, bas, son){
  if(!can("edit")) return noPerm();
  var c = loadData().cycles.find(function(x){return x.id===id;});
  if(!c){ toast("Kayıt bulunamadı"); return; }
  if(!c.gunluk) c.gunluk=[];
  var eklenen=0, guncellenen=0; var warnLines=[]; var warnSet={};
  for(var i=bas;i<=son;i++){
    var oda=el("tp_oda_"+i).value.trim(), komp=el("tp_komp_"+i).value.trim(), sul=el("tp_sul_"+i).value.trim(), su=el("tp_su_"+i).value.trim();
    if(!oda && !komp && !sul && !su) continue; /* boş satır, atla */
    var tarih = addDays(c.gelisTarihi, i);
    var problems=gunlukKontrolMesaji(c, tarih, !!(sul||su));
    var blockAll=problems.some(function(p){return p.tip==="blockAll";});
    var blockSulama=problems.some(function(p){return p.tip==="blockSulama";});
    problems.forEach(function(p){ if(!warnSet[p.metin]){ warnSet[p.metin]=true; warnLines.push(p.metin); } });
    if(blockAll) continue; /* bu gün tamamen atlandı */
    if(blockSulama){ sul=""; su=""; if(!oda && !komp) continue; }
    var idx=-1; for(var k=0;k<c.gunluk.length;k++){ if(c.gunluk[k].tarih===tarih){ idx=k; break; } }
    var rec = idx>=0 ? c.gunluk[idx] : {tarih:tarih};
    rec.odaC=oda; rec.kompostC=komp; rec.sulama=sul; rec.su=su;
    if(idx>=0){ c.gunluk[idx]=rec; guncellenen++; } else { c.gunluk.push(rec); eklenen++; }
  }
  c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  touchCycle(c); saveData(); logAudit("toplu veri girişi", c.oda+" · "+eklenen+" yeni, "+guncellenen+" güncellendi");
  toast(eklenen+guncellenen ? (eklenen+" yeni, "+guncellenen+" güncellendi") : "Hiçbir satır dolu değildi");
  if(warnLines.length) showWarnBox("Bazı günler atlandı/kısıtlandı", warnLines);
  _topluRange=null; go("detail",id);
}

function download(filename, text, mime){
  var blob = new Blob([text], {type:mime||"text/plain;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

  var out={cycles:(memData.cycles||[]), settings:(memData.settings||{}), gorevler:(memData.gorevler||[]), photos:photos, formPhotos:formPhotos};

function restoreJSON(file){
  var r = new FileReader();
  r.onload = function(){
    try{
      var obj = JSON.parse(r.result);
      if(!obj.cycles) throw new Error("geçersiz");
      memData = {cycles:obj.cycles, settings:obj.settings||{}, gorevler:obj.gorevler||[]};
      saveData();
      if(obj.photos){ Object.keys(obj.photos).forEach(function(id){ saveImgs(id, obj.photos[id]); }); }
      if(obj.formPhotos){ Object.keys(obj.formPhotos).forEach(function(id){ saveFormImgs(id, obj.formPhotos[id]); }); }
      toast("Geri yüklendi"); go("list");
    }catch(e){ toast("Dosya okunamadı"); }
  };
  r.readAsText(file);
}

/* Ortak günlük kayıt mantığı: hem Günlük Tur hem Ana Ekran (panoEdit) bunu kullanır —
   böylece hangi ekrandan girilirse girilsin AYNI kurallarla AYNI kayda (tarih+vakit) yazılır.
   patch: {odaC, kompostC, kompostUst, klimaC, co2alt, co2ust, su, sulama} */
function gunlukKaydet(c, t, vk, patch, warnLines){
  if(!c) return 0;
  var oda=patch.odaC||"", komp=patch.kompostC||"", kompUst=patch.kompostUst||"",
      klima=patch.klimaC||"", a=patch.co2alt||"", u=patch.co2ust||"",
      sul=patch.sulama||"", suV=patch.su||"";
  if(!oda && !komp && !kompUst && !klima && !a && !u && !sul && !suV) return 0;
  var problems=gunlukKontrolMesaji(c, t, !!(sul||suV));
  if(problems.some(function(p){return p.tip==="blockAll";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    return 0;
  }
  if(problems.some(function(p){return p.tip==="blockSulama";})){
    problems.forEach(function(p){warnLines.push(p.metin);});
    sul=""; suV="";
    if(!oda && !komp && !kompUst && !klima && !a && !u){ return 0; }
  }
  if(!c.gunluk) c.gunluk=[];
  if(sul){ ilacTekrarKontrolMesaji(c,t,sul).forEach(function(m){warnLines.push(m);}); }
  var ex=c.gunluk.find(function(r){return r.tarih===t && (r.vakit||"")===vk;});
  if(ex){
    /* Form her zaman görünen alanların TAMAMINI gönderir — boş bırakılan alan
       "dokunma" değil "temizle" demektir. Aksi halde yanlışlıkla eklenmiş bir
       not (örn. otomatik "ertelendi" notu) kullanıcı silip kaydetse bile geri gelirdi. */
    ex.odaC=oda; ex.kompostC=komp; ex.kompostUst=kompUst;
    ex.klimaC=klima; ex.co2alt=a; ex.co2ust=u;
    ex.sulama=sul; ex.su=suV;
  } else {
    c.gunluk.push({tarih:t,vakit:vk,odaC:oda,kompostC:komp,kompostUst:kompUst,klimaC:klima,co2alt:a,co2ust:u,su:suV,sulama:sul});
  }
  c.gunluk.sort(function(x,y){return cmpDate(x.tarih,y.tarih);});
  return 1;
}
/* Tek bir oda kartındaki verileri kaydeder. Döndürür: 1 (kaydedildi) / 0 (boş, atlandı) */
function turKaydetKart(card, t, vk, warnLines){
  var d=loadData();
  var cid=card.getAttribute('data-cid');
  var c=d.cycles.find(function(x){return x.id===cid;}); if(!c) return 0;
  var g=function(sel){ var e=card.querySelector(sel); return e?e.value.trim():""; };
  var patch={
    odaC: g('.tur_oda'), kompostC: g('.tur_komp'), kompostUst: g('.tur_kompust'), klimaC: g('.tur_klima'),
    co2alt: g('.tur_co2a'), co2ust: g('.tur_co2u'), sulama: g('.tur_sulama'), su: g('.tur_su')
  };
  return gunlukKaydet(c, t, vk, patch, warnLines);
}
function turIlerle(delta){
  var t=el("tur_tarih").value;

    if(warnLines.length) showWarnBox("Bu oda için uyarı", warnLines);
  }

}
function turBitir(){

function setLastBackup(){ try{ localStorage.setItem("utp_meta", JSON.stringify({lastFileBackup:new Date().toISOString()})); }catch(e){ console.warn("yedek zamanı kaydedilemedi", e); } }

function autoSnapshot(){
  try{
    var snap={ts:new Date().toISOString(), data:loadData()};
    localStorage.setItem("utp_autobak", JSON.stringify(snap));
    _autoBk=snap;
    var log=loadAutoBackupLog();
    var day=todayISO();
    var idx=-1; for(var i=0;i<log.length;i++){ if(log[i].day===day){ idx=i; break; } }
    var entry={day:day, ts:snap.ts, data:snap.data};
    if(idx>=0) log[idx]=entry; else log.push(entry);
    log.sort(function(a,b){ return a.day<b.day?-1:(a.day>b.day?1:0); });
    if(log.length>14) log=log.slice(log.length-14);
    try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }
    catch(e2){
      log=log.slice(Math.ceil(log.length/2));
      try{ localStorage.setItem("utp_autobak_log", JSON.stringify(log)); }catch(e3){ console.warn("otomatik yedek küçültülerek de yazılamadı", e3); }
    }
  }catch(e){ console.warn("otomatik yedek alınamadı", e); }
}

/* ---------- Hastalık kelime-eşleştirme kütüphanesi (kural tabanlı ipucu, kesin teşhis değil) ---------- */
var HASTALIK_KB = [
  {kw:["yeşil küf","yesil kuf","trichoderma"], ad:"Trichoderma (yeşil küf)", oneri:"Bulaşık bölgeyi izole et; o bölgeye dokunan alet/elleri dezenfekte et; nem ve havalandırmayı gözden geçir (genelde nem/hijyen kaynaklı yayılır). Etkilenen alanı kurutmadan/dağıtmadan nazikçe kapat ve uzaklaştır."},
  {kw:["kuru çürük","kuru curuk","mycogone"], ad:"Mycogone (kuru çürüklük)", oneri:"Şekilsiz/kabarık dokulu mantarları hemen uzaklaştır; o bölgeye tuz ya da uygun dezenfektan uygulamayı değerlendir; izolasyon ve el/alet hijyeni kritik, sulama suyuyla sıçratmamaya dikkat et."},
  {kw:["ıslak çürük","islak curuk","verticillium"], ad:"Verticillium (ıslak çürüklük)", oneri:"Etkilenen mantarları dokunmadan uzaklaştır; elleri ve aletleri dezenfekte et; yüzey nemini/yoğuşmayı azalt, hava akışını artır."},
  {kw:["örümcek ağı","orumcek agi","cobweb"], ad:"Cobweb (örümcek ağı küfü)", oneri:"Etkilenen alanı tuz ya da uygun dezenfektanla kapat; nemi düşür, hava sirkülasyonunu artır; hızlı yayılır, erken müdahale önemli."},
  {kw:["bakteriyel leke","kahverengi leke","bacterial blotch","pseudomonas"], ad:"Bakteriyel leke (kahverengi leke)", oneri:"Yüzey nemini azalt, havalandırmayı artır, sulama sonrası kuruma süresini uzat; su damlacıklarının şapkada uzun süre kalmaması önemli."}
];
function hastalikTaraKB(txt){
  if(!txt) return [];
  var t=(""+txt).toLocaleLowerCase("tr");
  return HASTALIK_KB.filter(function(h){ return h.kw.some(function(k){ return t.indexOf(k)>=0; }); });
}
function hastalikUyariGoster(note){
  var hits=hastalikTaraKB(note);
  if(!hits.length) return;
  showWarnBox("Olası hastalık eşleşmesi (kural tabanlı ipucu — kesin teşhis değil, ziraat mühendisi kararı esastır)",
    hits.map(function(h){ return "<b>"+esc(h.ad)+"</b><br>"+esc(h.oneri); }));
}

function addPhoto(id, file){
  var m=phMeta();
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var data=cv.toDataURL("image/jpeg",0.6);

    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

function kompostChartSVG(c){
  var T=[], CO=[], S=[];
  (c.gunluk||[]).forEach(function(r){
    var g=gunNo(c,r.tarih); if(g==="") return;
    var od=numParse(r.odaC), ko=numParse(r.kompostC);
    if(od!==null||ko!==null) T.push({g:g,oda:od,komp:ko});
    var a=numParse(r.co2alt),u=numParse(r.co2ust);
    if(a!==null||u!==null) CO.push({g:g,alt:(a!==null?a:u),ust:(u!==null?u:a)});
    if(r.sulama) S.push(g);
  });
  if(!T.length && !CO.length) return '<div style="color:#777;font-size:11px;">Grafik i\u00e7in \u00f6l\u00e7\u00fcm yok.</div>';
  var W=760,H=320,padL=44,padR=54,padT=16,padB=48;
  var odaPts=T.filter(function(p){return p.oda!==null;}).map(function(p){return{g:p.g,v:p.oda};}).sort(function(a,b){return a.g-b.g;});
  var kompPts=T.filter(function(p){return p.komp!==null;}).map(function(p){return{g:p.g,v:p.komp};}).sort(function(a,b){return a.g-b.g;});
  CO.sort(function(a,b){return a.g-b.g;});
  var gall=[]; T.forEach(function(p){gall.push(p.g);}); CO.forEach(function(p){gall.push(p.g);}); S.forEach(function(g){gall.push(g);});
  var gmin=Math.min.apply(null,gall), gmax=Math.max.apply(null,gall); if(gmax===gmin) gmax=gmin+1;
  var tv=[]; odaPts.concat(kompPts).forEach(function(p){tv.push(p.v);});
  var tmin,tmax; if(tv.length){tmin=Math.floor(Math.min.apply(null,tv)-1);tmax=Math.ceil(Math.max.apply(null,tv)+1);}else{tmin=18;tmax=28;} if(tmax===tmin)tmax=tmin+1;
  var cvals=[]; CO.forEach(function(p){cvals.push(p.alt);cvals.push(p.ust);});
  var hasCo=cvals.length>0, cmin=0,cmax=1;
  if(hasCo){cmin=Math.floor(Math.min.apply(null,cvals));cmax=Math.ceil(Math.max.apply(null,cvals));if(cmax===cmin)cmax=cmin+100;}
  function X(g){return padL+(g-gmin)/(gmax-gmin)*(W-padL-padR);}
  function YT(v){return H-padB-(v-tmin)/(tmax-tmin)*(H-padT-padB);}
  function YC(v){return H-padB-(v-cmin)/(cmax-cmin)*(H-padT-padB);}
  var svg='';
  if(26<=tmax&&24>=tmin) svg+='<rect x="'+padL+'" y="'+YT(26)+'" width="'+(W-padL-padR)+'" height="'+(YT(24)-YT(26))+'" fill="#dcefe2"/>';
  [21,28,30].forEach(function(lim){ if(lim>=tmin&&lim<=tmax){ var col=lim>=30?"#c0291f":"#d98a1f"; svg+='<line x1="'+padL+'" y1="'+YT(lim)+'" x2="'+(W-padR)+'" y2="'+YT(lim)+'" stroke="'+col+'" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>'; } });
  var tstep=Math.max(1,Math.round((tmax-tmin)/5));
  for(var t=tmin;t<=tmax;t+=tstep){var y=YT(t);svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#ececec"/><text x="'+(padL-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#2f6b4f">'+t+'\u00b0</text>';}
  if(hasCo){var cstep=Math.max(1,Math.round((cmax-cmin)/5));for(var cc=cmin;cc<=cmax;cc+=cstep){var yc=YC(cc);svg+='<text x="'+(W-padR+5)+'" y="'+(yc+3)+'" font-size="9" text-anchor="start" fill="#c47a1a">'+cc+'</text>';}}
  S.forEach(function(g){var x=X(g);svg+='<line x1="'+x+'" y1="'+padT+'" x2="'+x+'" y2="'+(H-padB)+'" stroke="#bcdcff" stroke-dasharray="3,3"/><circle cx="'+x+'" cy="'+(H-padB)+'" r="3" fill="#3b82c4"/>';});
  var allg=[]; odaPts.concat(kompPts).forEach(function(p){allg.push(p.g);}); CO.forEach(function(p){allg.push(p.g);}); allg=allg.filter(function(v,i,a){return a.indexOf(v)===i;}).sort(function(a,b){return a-b;});
  var everyX=Math.ceil(allg.length/14)||1;
  allg.forEach(function(g,i){if(i%everyX===0)svg+='<text x="'+X(g)+'" y="'+(H-padB+15)+'" font-size="9" text-anchor="middle" fill="#555">'+g+'</text>';});
  /* CO2 band (alt-ust) */
  if(hasCo && CO.length>=1){
    var top=CO.map(function(p){return X(p.g)+","+YC(p.ust);});
    var bot=CO.map(function(p){return X(p.g)+","+YC(p.alt);}).reverse();
    svg+='<polygon points="'+top.concat(bot).join(" ")+'" fill="#f2c98a" fill-opacity="0.45" stroke="none"/>';
    svg+='<polyline points="'+CO.map(function(p){return X(p.g)+","+YC(p.ust);}).join(" ")+'" fill="none" stroke="#d98a1f" stroke-width="1.2"/>';
    svg+='<polyline points="'+CO.map(function(p){return X(p.g)+","+YC(p.alt);}).join(" ")+'" fill="none" stroke="#d98a1f" stroke-width="1.2"/>';
  }
  function poly(pts,col,dash){if(pts.length<1)return '';var d=pts.map(function(p){return X(p.g)+","+YT(p.v);}).join(" ");var dd=pts.map(function(p){return '<circle cx="'+X(p.g)+'" cy="'+YT(p.v)+'" r="2.2" fill="'+col+'"/>';}).join("");return '<polyline points="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"'+(dash?' stroke-dasharray="5,4"':'')+'/>'+dd;}
  svg+=poly(kompPts,"#14583a",false);
  svg+=poly(odaPts,"#1f9e75",true);
  svg+='<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#888"/>';
  svg+='<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="#2f6b4f"/>';
  if(hasCo) svg+='<line x1="'+(W-padR)+'" y1="'+padT+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#d98a1f"/>';
  svg+='<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">G\u00fcn (geli\u015ften)</text>';
  var lg='<div style="font-size:10px;margin-top:4px;">'
    +'<span style="color:#14583a;">\u25cf Kompost \u00b0C</span> &nbsp; '
    +'<span style="color:#1f9e75;">- - Oda \u00b0C</span> &nbsp; '
    +(hasCo?'<span style="color:#d98a1f;">\u25a0 CO\u2082 alt-\u00fcst band\u0131 (sa\u011f eksen)</span> &nbsp; ':'')
    +'<span style="color:#3b82c4;">\u25cf sulama</span> &nbsp; '
    +'<span style="color:#7aa886;">\u25a0 hedef 24-26\u00b0</span> &nbsp; '
    +'<span style="color:#d98a1f;">- - 21/28 kritik</span> &nbsp; <span style="color:#c0291f;">- - 18/30 tehlike</span></div>';
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;border:1px solid #ccc;">'+svg+'</svg>'+lg;
}

function planHatirlatici(){
  var plan=getPlan().filter(function(x){return !x.done && x.cikis;});
  if(!plan.length) return "";
  var today=todayISO(); var rows=[];
  plan.forEach(function(x){
    var dg=daysBetween(today, x.cikis); /* çıkış - bugün */
    if(dg>=-1 && dg<=2) rows.push({x:x, dg:dg});
  });
  if(!rows.length) return "";
  rows.sort(function(a,b){ return a.dg-b.dg; });
  var h='<div class="card" style="border:1.5px solid #2e7d32; background:#eef7ee; margin-bottom:10px;">'
    +'<div style="font-weight:700; color:#2e7d32; margin-bottom:6px;">🌱 Ziraat müh. — yaklaşan kompost</div>';
  rows.forEach(function(r){
    var ne = r.dg<0?"dün geldi (girilmedi)":(r.dg===0?"BUGÜN geliyor":(r.dg===1?"yarın geliyor":r.dg+" gün sonra"));
    h+='<div style="padding:5px 0; font-size:15px; border-bottom:1px solid #dcecdc;"><b>'+esc(r.x.oda||"—")+'</b> · '+esc(r.x.firma||"")+' — '+ne
      +' <span class="muted">(çıkış '+fmtDate(r.x.cikis)+')</span><br>'
      +'<label style="display:inline-flex; align-items:center; gap:4px; font-weight:normal; margin-top:3px;">'
      +'<input type="checkbox" '+(r.x.irtibat?"checked":"")+' onchange="togglePlanIrtibat(\''+r.x.id+'\')" style="width:18px;height:18px;">'
      +'Firma ile irtibata geçildi</label> '
      +'<button class="btn small" style="margin-left:4px;" onclick="planToOda(\''+r.x.id+'\')">Oda oluştur</button></div>';
  });
  h+='</div>';
  return h;
}

  el("hdrTitle").textContent="Kompost Planı";

function _pad2(n){ return ("0"+n).slice(-2); }
function parsePlanDate(v){
  if(v==null||v==="") return null;
  if(Object.prototype.toString.call(v)==="[object Date]" && !isNaN(v)) return v.getFullYear()+"-"+_pad2(v.getMonth()+1)+"-"+_pad2(v.getDate());
  if(typeof v==="number"){ var dt=new Date(Math.round((v-25569)*86400000)); return dt.getUTCFullYear()+"-"+_pad2(dt.getUTCMonth()+1)+"-"+_pad2(dt.getUTCDate()); }
  var str=(""+v).trim(); var m=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+_pad2(+m[2])+"-"+_pad2(+m[3]);
  m=str.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
  if(m){ var y=m[3]; if(y.length===2) y="20"+y; return y+"-"+_pad2(+m[2])+"-"+_pad2(+m[1]); }
  return null;
}
function parseSep(text){
  return text.split(/\r?\n/).filter(function(l){return l.trim()!=="";}).map(function(l){
    var sep = l.indexOf("\t")>=0?"\t":(l.indexOf(";")>=0?";":",");
    return l.split(sep).map(function(c){return c.trim().replace(/^"|"$/g,"");});
  });
}
function ensureXLSX(cb){
  if(window.XLSX) return cb(true);
  var sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload=function(){ cb(!!window.XLSX); };
  sc.onerror=function(){ cb(false); };
  document.head.appendChild(sc);
}
function planImportFile(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var name=(f.name||"").toLowerCase();
  if(/\.csv$/.test(name)){
    var rd=new FileReader();
    rd.onload=function(e){ planAddRows(parseSep(e.target.result)); };
    rd.readAsText(f,"utf-8");
  } else {
    toast("Excel okunuyor…");
    ensureXLSX(function(ok){
      if(!ok){ toast("Excel kütüphanesi yüklenemedi (çevrimdışı). CSV ya da kopyala-yapıştır kullan."); return; }
      var rd=new FileReader();
      rd.onload=function(e){
        try{
          var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"}); /* cellDates yok: tarihler ham seri olarak gelir, parsePlanDate UTC ile çevirir (gün kayması olmaz) */
          var names=wb.SheetNames, sheet=names[0];
          if(names.length>1){
            var pick=prompt("Hangi ay sayfası içe aktarılsın?\nSayfalar: "+names.join(", "), names[0]);
            if(pick===null) return;
            pick=pick.trim();
            if(names.indexOf(pick)>=0) sheet=pick;
            else { var lc=names.map(function(n){return n.toLowerCase();}).indexOf(pick.toLowerCase()); if(lc>=0) sheet=names[lc]; }
          }
          var ws=wb.Sheets[sheet];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
          planAddRows(rows);
        }catch(err){ toast("Excel okunamadı"); }
      };
      rd.readAsArrayBuffer(f);
    });
  }
  input.value="";
}
function planImportPaste(){
  var elT=el("pl_paste"); if(!elT||!elT.value.trim()){ toast("Önce yapıştır"); return; }
  planAddRows(parseSep(elT.value));
}
function planAddRows(rows){
  if(!rows||!rows.length){ toast("Satır bulunamadı"); return; }
  /* Çok bloklu plan: tekrarlanan başlık + boş satırlar olabilir.
     Başlık satırı görülünce sütun eşlemesi (tarih/oda/firma) güncellenir. */
  var ci=-1, oi=-1, fi=-1;        // tarih, oda, firma sütun indexleri
  var dci=1, doi=2, dfi=0;        // başlık yoksa varsayılan: firma·tarih·oda
  function isHeader(r){ var j=r.map(function(x){return (""+(x==null?"":x)).toLowerCase();}).join("|"); return /tarih/.test(j) && /oda/.test(j); }
  var pl=getPlan(), add=0, skip=0, dup=0;
  rows.forEach(function(r){
    if(!r||!r.length) return;
    if(isHeader(r)){
      ci=oi=fi=-1;
      r.forEach(function(hd,ix){ hd=(""+(hd==null?"":hd)).toLowerCase().trim();
        if(/tarih|çık/.test(hd)) ci=ix; else if(/oda/.test(hd)) oi=ix; else if(/firma/.test(hd)) fi=ix; });
      return;
    }
    var ti=(ci>=0?ci:dci), oo=(oi>=0?oi:doi), ff=(fi>=0?fi:dfi);
    var cikis=parsePlanDate(r[ti]);
    var oda=(r[oo]!=null?(""+r[oo]).trim():"");
    var firma=(ff>=0 && r[ff]!=null)?(""+r[ff]).trim():"";
    if(!cikis || !oda){ skip++; return; }
    var no=normalizeOda(oda);
    if(pl.some(function(q){return q.cikis===cikis && (q.oda||"").toLowerCase()===no.toLowerCase();})){ dup++; return; }
    pl.push({id:uid(), cikis:cikis, oda:no, firma:firma, done:false}); add++;
  });
  saveData();
  toast(add+" plan satırı eklendi"+(dup?(" · "+dup+" zaten vardı"):"")+((!add&&!dup)?" · uygun satır yok":"")); render();
}

/* ---------- Raporlar ---------- */
/* ---------- Üretim öğrenmesi (geçmiş döngü istatistik analizi, gerçek veri — AI değil) ---------- */
function tumTamamlananDongu(){
  return loadData().cycles.filter(function(c){ return c.bosaltimTarihi && (c.hasat||[]).length; });
}
function ortKompostSicaklik(c){
  var vals=(c.gunluk||[]).filter(function(r){ return (!c.toprakTarihi || r.tarih<c.toprakTarihi) && numParse(r.kompostC)!=null; }).map(function(r){return numParse(r.kompostC);});
  if(!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function uretimOgrenmesiVeri(){
  var all=tumTamamlananDongu();
  var bulgular=[];
  var withTemp=all.map(function(c){ return {sic:ortKompostSicaklik(c), v:verimOzet(c)}; }).filter(function(x){return x.sic!=null && x.v.kgTon!=null;});
  if(withTemp.length>=4){
    var esik=26;
    var ust=withTemp.filter(function(x){return x.sic>=esik;});
    var alt=withTemp.filter(function(x){return x.sic<esik;});
    if(ust.length>=2 && alt.length>=2){
      var avgU=ust.reduce(function(s,x){return s+x.v.kgTon;},0)/ust.length;
      var avgA=alt.reduce(function(s,x){return s+x.v.kgTon;},0)/alt.length;
      var fark=avgA>0?((avgA-avgU)/avgA*100):0;
      bulgular.push({baslik:"Kompost sıcaklığı ve verim", metin: esik+"°C üstü ortalama kompost sıcaklığı olan "+ust.length+" döngüde ortalama verim "+avgU.toFixed(0)+" kg/ton; "+esik+"°C altı "+alt.length+" döngüde "+avgA.toFixed(0)+" kg/ton"+(fark>3?(" — yüksek sıcaklık döngülerinde verim yaklaşık %"+fark.toFixed(0)+" daha düşük görünüyor."):(fark<-3?(" — yüksek sıcaklık döngülerinde verim daha yüksek görünüyor, örnek sayısı azken tesadüf olabilir."):" — belirgin bir fark görünmüyor."))});
    }
  }
  var firmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var f=c.kompostFirma||"Bilinmiyor"; if(!firmaGroups[f]) firmaGroups[f]=[]; firmaGroups[f].push(v.kgTon); });
  var firmaListe=Object.keys(firmaGroups).filter(function(f){return firmaGroups[f].length>=2;});
  if(firmaListe.length>=2){
    var firmaOrt=firmaListe.map(function(f){ var arr=firmaGroups[f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    firmaOrt.sort(function(a,b){return b.ort-a.ort;});
    bulgular.push({baslik:"Firma bazlı verim karşılaştırması (kg/ton)", metin: firmaOrt.map(function(x){return esc(x.f)+": "+x.ort.toFixed(0)+" (n="+x.n+")";}).join(" · ")});
  }
  var withSu=all.map(function(c){ var t=tuketimOzet(c); var v=verimOzet(c); return {suTon:t.suTon, kgTon:v.kgTon}; }).filter(function(x){return x.suTon!=null && x.kgTon!=null;});
  if(withSu.length>=4){
    var suSirali=withSu.slice().sort(function(a,b){return a.suTon-b.suTon;});
    var medyanSu=suSirali[Math.floor(suSirali.length/2)].suTon;
    var dusukSu=withSu.filter(function(x){return x.suTon<medyanSu;});
    var yuksekSu=withSu.filter(function(x){return x.suTon>=medyanSu;});
    if(dusukSu.length>=2 && yuksekSu.length>=2){
      var ortD=dusukSu.reduce(function(s,x){return s+x.kgTon;},0)/dusukSu.length;
      var ortY=yuksekSu.reduce(function(s,x){return s+x.kgTon;},0)/yuksekSu.length;
      bulgular.push({baslik:"Su miktarı ve verim", metin:"Ton kompost başına su medyanı ~"+medyanSu.toFixed(0)+" lt. Bunun altında sulanan "+dusukSu.length+" döngüde ortalama verim "+ortD.toFixed(0)+" kg/ton; üstünde sulanan "+yuksekSu.length+" döngüde "+ortY.toFixed(0)+" kg/ton."});
    }
  }
  var partiGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null || !c.gelisTarihi) return; var p=partiFromDate(c.gelisTarihi); if(!partiGroups[p]) partiGroups[p]=[]; partiGroups[p].push({oda:c.oda, kgTon:v.kgTon}); });
  var partiListe=Object.keys(partiGroups).filter(function(p){return partiGroups[p].length>=2;});
  if(partiListe.length){
    partiListe.sort(function(a,b){
      var oa=partiGroups[a].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[a].length;
      var ob=partiGroups[b].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[b].length;
      return ob-oa;
    });
    bulgular.push({baslik:"Parti bazlı karşılaştırma (aynı gün gelen kompost partileri)", metin: partiListe.slice(0,6).map(function(p){
      var arr=partiGroups[p]; var ort=arr.reduce(function(s,x){return s+x.kgTon;},0)/arr.length;
      return "Parti "+esc(p)+" ("+arr.map(function(x){return esc(x.oda);}).join(", ")+"): ort. "+ort.toFixed(0)+" kg/ton";
    }).join(" · ")});
  }
  var odaFirmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var o=normalizeOda(c.oda); var f=c.kompostFirma||"Bilinmiyor"; if(!odaFirmaGroups[o]) odaFirmaGroups[o]={}; if(!odaFirmaGroups[o][f]) odaFirmaGroups[o][f]=[]; odaFirmaGroups[o][f].push(v.kgTon); });
  var odaFirmaSatir=[];
  Object.keys(odaFirmaGroups).forEach(function(o){
    var firmalar=Object.keys(odaFirmaGroups[o]);
    if(firmalar.length<2) return;
    var ortlar=firmalar.map(function(f){ var arr=odaFirmaGroups[o][f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    ortlar.sort(function(a,b){return b.ort-a.ort;});
    var iyi=ortlar[0], kotu=ortlar[ortlar.length-1];
    var odaAdi=all.find(function(c){return normalizeOda(c.oda)===o;}).oda;
    odaFirmaSatir.push(esc(odaAdi)+"'da en iyi "+esc(iyi.f)+" ("+iyi.ort.toFixed(0)+" kg/ton), en kötü "+esc(kotu.f)+" ("+kotu.ort.toFixed(0)+" kg/ton)");
  });
  if(odaFirmaSatir.length){
    bulgular.push({baslik:"Oda bazında firma performansı", metin: odaFirmaSatir.join(" · ")});
  }
  return {n: all.length, bulgular: bulgular};
}
/* ---------- Kök neden analizi: tamamlanmış, düşük verimli döngülerde olası nedenler ---------- */
function donguKokNeden(c){
  var bulgular=[];
  var kritikGun=0, tehlikeGun=0, amonyakGun=0, nemYuksekGun=0;
  (c.gunluk||[]).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null){
      if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeGun++;
      else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
    }
    if(r.amonyak==="Var") amonyakGun++;
    if(r.nem==="Yüksek") nemYuksekGun++;
  });
  if(tehlikeGun>0) bulgular.push(tehlikeGun+" gün tehlikeli kompost sıcaklığı kaydedilmiş.");
  if(kritikGun>0) bulgular.push(kritikGun+" gün kritik kompost sıcaklığı kaydedilmiş.");
  if(amonyakGun>0) bulgular.push(amonyakGun+" gün amonyak kokusu bildirilmiş.");
  if(nemYuksekGun>=3) bulgular.push(nemYuksekGun+" gün yüksek nem bildirilmiş.");
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var ertelenen=audit.filter(function(a){
    if(!/ertelendi/i.test(a.action)) return false;
    if(!a.detail || a.detail.indexOf(c.oda||"\u0000")!==0) return false;
    var g=(a.at||"").slice(0,10);
    return g>=(c.gelisTarihi||"") && (!c.bosaltimTarihi || g<=c.bosaltimTarihi);
  }).length;
  if(ertelenen>0) bulgular.push(ertelenen+" işlem ertelenmiş.");
  return bulgular;
}
function dusukVerimliDongulerHTML(){
  var all=tumTamamlananDongu();
  var vals=all.map(function(c){ return {c:c, v:verimOzet(c)}; }).filter(function(x){return x.v.kgTon!=null;});
  if(vals.length<4) return "";
  var ortalama=vals.reduce(function(s,x){return s+x.v.kgTon;},0)/vals.length;
  var dusuk=vals.filter(function(x){return x.v.kgTon<ortalama*0.85;}).sort(function(a,b){return a.v.kgTon-b.v.kgTon;}).slice(0,6);
  if(!dusuk.length) return "";
  var body='<div class="muted" style="margin-bottom:8px;">Filo ortalaması '+ortalama.toFixed(0)+' kg/ton\'un belirgin altında kalan döngüler ve döngü boyunca kaydedilen olası etkenler.</div>';
  dusuk.forEach(function(x){
    var neden=donguKokNeden(x.c);
    body+='<div style="padding:6px 0;border-bottom:1px solid #eee;">'
      +'<div style="font-weight:700;">'+esc(x.c.oda||"")+' <span class="muted" style="font-weight:400;">('+fmtDate(x.c.gelisTarihi)+' \u2014 '+x.v.kgTon.toFixed(0)+' kg/ton)</span></div>'
      +(neden.length?neden.map(function(n){return '<div style="font-size:13px;color:var(--muted);margin-top:2px;">\u2022 '+esc(n)+'</div>';}).join(''):'<div style="font-size:13px;color:var(--muted);margin-top:2px;">Belirgin bir kayıtlı etken bulunamadı — başka sebepler (kompost kalitesi, iklim vb.) olabilir.</div>')
      +'</div>';

function akilliAnalizHTML(aktif){
  var bul=[];
  tempAlerts().filter(function(a){return a.lvl>=1;}).forEach(function(a){
    bul.push({sev:"warn", txt:esc(a.oda)+": "+esc(a.txt)});
  });
  aktif.forEach(function(c){

/* ---------- Flaş bazlı verim (F1 vs F2 kg/kasa) ---------- */
function verimFlasOzet(c){
  var S=getSet(); var out={};
  (c.hasat||[]).forEach(function(h){
    var ha=hasatAsama(c,h.tarih);
    var key=(ha&&ha.flas>0)?("F"+ha.flas):"diğer";
    if(!out[key]) out[key]={kasa:0};
    out[key].kasa+=(numParse(h.kasa)||0);
  });
  Object.keys(out).forEach(function(k){ out[k].kg=out[k].kasa*S.kasaAgirlik; });
  return out;
}
/* ---------- Tahmini verim (aktif odalar için, firma/filo geçmişine göre) ---------- */
function firmaOrtalamaKgTon(firma){
  var vals=tumTamamlananDongu().filter(function(c){return (c.kompostFirma||"")===firma;}).map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function filoOrtalamaKgTon(){
  var vals=tumTamamlananDongu().map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function tahminiVerim(c){
  if(c.bosaltimTarihi) return null;
  var ton=(numParse(c.tonaj)||0)/1000; if(ton<=0) return null;
  var f=firmaOrtalamaKgTon(c.kompostFirma||"");
  var kaynak;
  if(f && f.n>=2){ kaynak="firma ortalaması ("+esc(c.kompostFirma||"")+", n="+f.n+")"; }
  else { f=filoOrtalamaKgTon(); kaynak=f?("filo geneli ortalaması, n="+f.n):null; }
  if(!f) return null;
  return {kg: f.ort*ton, kaynak: kaynak};
}
/* ---------- Oda bazlı geçmiş istatistik ---------- */
function odaGecmisIstatistik(oda, excludeId){
  var n=normalizeOda(oda);
  var gecmis=tumTamamlananDongu().filter(function(c){return c.id!==excludeId && normalizeOda(c.oda)===n;});
  var vals=gecmis.map(function(c){ return {c:c, kgTon:verimOzet(c).kgTon}; }).filter(function(x){return x.kgTon!=null;});
  if(!vals.length) return null;
  var ort=vals.reduce(function(s,x){return s+x.kgTon;},0)/vals.length;
  var en_iyi=vals.slice().sort(function(a,b){return b.kgTon-a.kgTon;})[0];
  var en_kotu=vals.slice().sort(function(a,b){return a.kgTon-b.kgTon;})[0];
  return {n: vals.length, ort: ort, enIyi:{tarih:en_iyi.c.gelisTarihi, kgTon:en_iyi.kgTon}, enKotu:{tarih:en_kotu.c.gelisTarihi, kgTon:en_kotu.kgTon}};
}
function verimOzet(c){
  var kes=0,nor=0;
  (c.hasat||[]).forEach(function(h){ var k=numParse(h.kasa)||0; if(h.tip==="kestane")kes+=k; else nor+=k; });
  var toplam=kes+nor; var ton=(numParse(c.tonaj)||0)/1000;
  var S=getSet(); var kg=toplam*S.kasaAgirlik;
  var alan=numParse(c.alanM2);
  return {kestane:kes, normal:nor, toplam:toplam, ton:ton, verim:(ton>0?toplam/ton:null), kg:kg, kgTon:(ton>0?kg/ton:null), kgM2:(alan&&alan>0?kg/alan:null), alan:alan};
}

/* ---------- Tüketim özeti ---------- */
function tuketimOzet(c){
  var su=0, kim={}, n=0, approx=false; var suGunSayisi=0; var flasSu={};
  (c.gunluk||[]).forEach(function(r){
    var sn=numParse(r.su); var hasText=!!r.sulama;
    if(sn===null && !hasText) return;
    n++;
    var buSu=0;
    if(sn!==null){ buSu=sn; su+=sn; }
    else if(hasText){ var m=(""+r.sulama).match(/(\d+(?:[.,]\d+)?)\s*lt/gi); if(m){ approx=true; m.forEach(function(x){ var num=parseFloat(x.replace(/[^\d.,]/g,'').replace(',','.')); if(!isNaN(num)){ su+=num; buSu+=num; } }); } }
    if(buSu>0){ suGunSayisi++; var ha=hasatAsama(c,r.tarih); var key=(ha&&ha.flas>0)?("F"+ha.flas):"hazırlık/kuluçka"; flasSu[key]=(flasSu[key]||0)+buSu; }
    if(hasText){ ["Serenade","Vivando","Tezguard","insektisit","formaldehit","Asena","kalsiyum","sodyum"].forEach(function(kw){ if(new RegExp(kw,"i").test(r.sulama)) kim[kw]=(kim[kw]||0)+1; }); }
  });
  var ton=(numParse(c.tonaj)||0)/1000; var alan=numParse(c.alanM2);
  return {su:su, islem:n, kim:kim, approx:approx, suTon:(ton>0?su/ton:null), suM2:(alan&&alan>0?su/alan:null), suGunOrt:(suGunSayisi>0?su/suGunSayisi:null), flasSu:flasSu};
}

/* ---------- Geçmiş kıyas ---------- */
function overlayChartSVG(list){
  var colors=["#14583a","#1f9e75","#d98a1f","#3b82c4","#a3408a","#888"];
  var series=[];
  list.forEach(function(c,idx){
    var pts=[]; (c.gunluk||[]).forEach(function(r){ var v=numParse(r.kompostC), g=gunNo(c,r.tarih); if(v!==null&&g!=="") pts.push({g:g,v:v}); });
    pts.sort(function(a,b){return a.g-b.g;});
    if(pts.length) series.push({pts:pts, col:colors[idx%colors.length], lbl:fmtDate(c.gelisTarihi)+(c.tur?(" ("+c.tur+".tur)"):"")});
  });
  if(!series.length) return '<div class="muted">Kompost ölçümü yok.</div>';
  var W=720,H=300,pad=42,gmin=Infinity,gmax=-Infinity,vmin=Infinity,vmax=-Infinity;
  series.forEach(function(s){ s.pts.forEach(function(p){ if(p.g<gmin)gmin=p.g; if(p.g>gmax)gmax=p.g; if(p.v<vmin)vmin=p.v; if(p.v>vmax)vmax=p.v; }); });
  vmin=Math.floor(vmin-1); vmax=Math.ceil(vmax+1); if(gmax===gmin)gmax=gmin+1; if(vmax===vmin)vmax=vmin+1;
  function X(g){return pad+(g-gmin)/(gmax-gmin)*(W-2*pad);}
  function Y(v){return H-pad-(v-vmin)/(vmax-vmin)*(H-2*pad);}
  var svg=''; if(26<=vmax&&24>=vmin) svg+='<rect x="'+pad+'" y="'+Y(26)+'" width="'+(W-2*pad)+'" height="'+(Y(24)-Y(26))+'" fill="#dcefe2"/>';
  var step=Math.max(1,Math.round((vmax-vmin)/5));
  for(var t=vmin;t<=vmax;t+=step){var y=Y(t);svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#eee"/><text x="'+(pad-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#555">'+t+'°</text>';}
  series.forEach(function(s){ var d=s.pts.map(function(p){return X(p.g)+","+Y(p.v);}).join(" "); svg+='<polyline points="'+d+'" fill="none" stroke="'+s.col+'" stroke-width="2"/>'; });
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#888"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#888"/>';
  var leg=series.map(function(s){return '<span style="color:'+s.col+';">\u25cf '+s.lbl+'</span>';}).join(" &nbsp; ");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="max-width:100%;border:1px solid #ccc;" xmlns="http://www.w3.org/2000/svg">'+svg+'<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">Gün (gelişten)</text></svg><div style="font-size:11px;margin-top:4px;">'+leg+'</div>';
}

  list.forEach(function(c){ var v=verimOzet(c); h+='<tr><td>'+fmtDate(c.gelisTarihi)+'</td><td>'+(c.tur||0)+'</td><td>'+v.toplam+'</td><td>'+v.kestane+'</td><td>'+v.normal+'</td><td>'+(v.verim!=null?v.verim.toFixed(1):'—')+'</td><td>'+(tuketimOzet(c).su||0)+'</td></tr>'; });
  h+='</tbody></table></div>'
    +'<div class="sec-title">Kompost sıcaklık (üst üste)</div><div class="card" style="padding:10px;overflow-x:auto;">'+overlayChartSVG(list)+'</div>'
    +'<button class="btn ghost" style="width:100%;margin-top:12px;" onclick="go(\'list\')">‹ Geri</button>';
  el("app").innerHTML=h;
}

/* ---------- Havalandırma günlük hedefi (dinamik ikaz) ---------- */
function havaHedef(c){
  if(!c.hava||!c.hava.length) return null;
  var today=todayISO(), best=null;
  c.hava.forEach(function(r){ if(r.tarih<=today && (!best||r.tarih>best.tarih)) best=r; });
  if(!best) c.hava.forEach(function(r){ if(!best||r.tarih<best.tarih) best=r; });
  return best?numParse(best.hedefC):null;
}
