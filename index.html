/* Bir şartlı kuralın, VERİLEN oda için şu an tetiklenebilir olup olmadığını kontrol eder.
   Tetiklenebilir = hedef adım henüz yapılmamış + normal zamanı henüz gelmemiş (gerçekten "erken")
   + eşik güne ulaşılmış. Bulamazsa/uygun değilse null döner. */
function sartliKuralUygunMu(c, kural){
  if(!c || c.bosaltimTarihi) return null;
  var idx=-1;
  /* ROL bazlı eşleştirme ÖNCELİKLİ (kodun geri kalanıyla tutarlı, SSOT) —
     kural.hedefTxt'ten çıkarılan rol (protokolAdimAlanKey) ile protokoldeki
     rol eşleşir. Metin birebir aynı olmasa bile ("toprak serimi" vs "Toprak
     serilir") ROL üzerinden doğru adımı bulur. Rol çıkarılamazsa (örn. "Oda
     yıkanır" gibi rolsüz bir adım hedeflenmişse) eski birebir metin eşleşmesine
     düşer — geriye dönük uyumluluk. */
  var hedefRol=protokolAdimAlanKey(kural.hedefTxt);
  if(hedefRol){
    idx=protokolRolIdx(hedefRol);
  }
  if(idx<0){
    getProtokol().forEach(function(s,i){ if(idx<0 && !s.silindi && s.tip==="olay" && s.txt===kural.hedefTxt) idx=i; });
  }
  if(idx<0) return null;
  var s=getProtokol()[idx];
  var done=adimGercektenYapildiMi(c, idx, s);
  if(done) return null;
  var base=protokolTarih(c,s); if(!base) return null;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var planliTarih=addDays(base,mevcutErt);
  var bugun=todayISO();
  if(kural.yon==="ertele"){
    if(bugun>planliTarih) return null; /* zaten gecikmiş — normal erteleme akışı geçerli, bu kural anlamsız */
  } else {
    if(bugun>=planliTarih) return null; /* zaten zamanı gelmiş/geçmiş, "erken" anlamsız */
  }
  var refTarih = kural.ref==="toprak" ? c.toprakTarihi : c.gelisTarihi;
  if(!refTarih) return null;
  var offset=daysBetween(refTarih,bugun);
  if(offset===null || offset<(kural.gun||0)) return null;
  /* Otomatik ölçüm eşiği varsa (örn. Kompost °C > 28), sadece koşul GERÇEKTEN sağlanıyorsa göster.
     Yoksa (boş bırakıldıysa) tamamen mühendisin gözlemine bağlı bir kuraldır — her zaman gösterilir. */
  if(kural.otoAlan){
    var son=(c.gunluk&&c.gunluk.length)?c.gunluk[c.gunluk.length-1]:null;
    var deger=son?numParse(son[kural.otoAlan]):null;
    if(deger===null || kural.otoDeger===null) return null;
    if(kural.otoOp==="<" ? !(deger<kural.otoDeger) : !(deger>kural.otoDeger)) return null;
  }
  return {idx:idx, s:s};
}
function aktifSartliKurallar(c){
  var out=[];
  getSartliKurallar().forEach(function(k){
    var r=sartliKuralUygunMu(c,k);
    if(r){
      /* HANGİ ÖNCEKİ ADIMLAR ATLANIYOR: bu kural hedefi (örn. "Toprak serimi")
         doğrudan öneriyor — ama Poşet/Tiftik gibi ondan ÖNCE gelmesi gereken
         adımlar henüz yapılmamışsa, bu SESSİZCE atlanıyordu. Artık böyle bir
         durumda "Sıradaki işlem" olarak kuralın hedefi DEĞİL, GERÇEKTEN
         sıradaki (en erken, henüz yapılmamış) adım gösteriliyor — kural
         sadece bağlam/gerekçe olarak kalıyor, aksiyon (metin + Planla)
         gerçek sırayı takip ediyor. Acil durumda kuralın asıl hedefini açmak
         istersen, o hâlâ "atlanan" listesinde görünür, oradan elle açabilirsin. */
      var hedefSira=protokolSiraAnahtari(r.s);
      var atlanan=[]; var enErken=null;
      getProtokol().forEach(function(s2,idx2){
        if(s2.silindi || s2.tip!=="olay" || idx2===r.idx) return;
        if(adimGercektenYapildiMi(c, idx2, s2)) return;
        var sira2=protokolSiraAnahtari(s2);
        if(sira2 < hedefSira){
          atlanan.push(s2.txt);
          if(!enErken || sira2<enErken.sira) enErken={idx:idx2, s:s2, sira:sira2};
        }
      });
      var gosterIdx = enErken ? enErken.idx : r.idx;
      var gosterTxt = enErken ? enErken.s.txt : r.s.txt;
      out.push({kural:k, hedefIdx:gosterIdx, hedefTxt:gosterTxt, atlanan:atlanan, kuralHedefTxt:r.s.txt});
    }
  });
  return out;
}
/* Bir protokol adımını BUGÜNE çeker (protokolYarinaCek'in "bugün" versiyonu) —

function protokolBugunAc(cid, idx, sebep){

  var mevcutTarih=addDays(base,mevcutErt);

/* Şartlı kuralın "ertele" yönü: koşul gerçekleşirse (mühendis onaylarsa) hedef işi 1 gün erteler.
   protokolGorevErtele ile aynı mantık ama açıklaması kuralın kendi metninden geliyor; puan kırılmaz
   (biyolojik/kalite kaynaklı erteleme sayılır — kompost sıcak, sarım zayıf gibi). */
/* Bir protokol adımını YARINA taşır (DRY — hem koşul ertelemesi hem manuel ertele kullanır).
   Gecikmiş/bugünkü işi doğrudan yarına sabitler; zaten gelecekteki işi bir gün ittirir.
   Puan orijinal tarihe + erteleSebep'e baktığı için (ertele sayısına değil) puanı etkilemez. */
function _adimiYarinaTasi(c, idx){
  if(!c.ertele) c.ertele={};
  var base=protokolTarih(c, getProtokol()[idx]);
  var yarin=addDays(todayISO(),1);
  var mevcutErt=(c.ertele["p"+idx]||0);
  var mevcutTarih=base?addDays(base, mevcutErt):null;
  if(base && mevcutTarih && cmpDate(mevcutTarih, yarin) < 0){
    c.ertele["p"+idx] = daysBetween(base, yarin);
  } else {
    c.ertele["p"+idx] = mevcutErt + 1;
  }
}

/* Üretim sırası kontrolü: Tiftik → Toprak → Tırmık → Hasat.

function oncekiAdimTamamMi(c, key){

/* Protokol görevini (Tiftik/Toprak/Poşet kesimi vb.) 1 gün ertele.

function protokolGorevErtele(cid, idx, sebep){

function fmtDate(iso){
  if(!iso) return "—";
  var p = iso.split("-");
  if(p.length!==3) return iso;
  return p[2]+"."+p[1]+"."+p[0];
}
function todayISO(){
  var d=new Date(); var m=("0"+(d.getMonth()+1)).slice(-2); var dd=("0"+d.getDate()).slice(-2);
  return d.getFullYear()+"-"+m+"-"+dd;
}
function parseISO(iso){ var p=(iso||"").split("-"); if(p.length!==3) return null; var y=+p[0],m=+p[1],d=+p[2]; if(isNaN(y)||isNaN(m)||isNaN(d)) return null; return Date.UTC(y,m-1,d); }
function cmpDate(a,b){ a=a||""; b=b||""; return a<b?-1:(a>b?1:0); }
function daysBetween(a,b){
  var da=parseISO(a), db=parseISO(b);
  if(da===null||db===null) return null;
  return Math.round((db-da)/86400000);
}
function gunNo(cycle, iso){
  var base = cycle.gelisTarihi;
  if(!base && cycle.gunluk && cycle.gunluk.length) base = cycle.gunluk[0].tarih;
  var d = daysBetween(base, iso);
  return d===null ? "" : d;   /* geliş = 0. gün */
}
function ortuGun(cycle, iso){
  if(!cycle.toprakTarihi) return null;
  var d = daysBetween(cycle.toprakTarihi, iso);
  return (d===null||d<0) ? null : d; /* toprak = 0. gün; öncesi boş */
}
function gunEtiket(c){
  var g=gunNo(c, todayISO());
  if(g==="") return "";
  var t=ortuGun(c, todayISO());
  return g + "/" + (t===null ? "\u2014" : t);
}
function addDays(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t + n*86400000);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* Ay ekleme — periyodik bakım/kalibrasyon aralıkları için (6 ayda bir, yılda
   bir vb). Ay taşmalarını (örn. 31 Ocak + 1 ay) JS Date kendi normalize eder. */
function addMonths(iso,n){
  var t=parseISO(iso); if(t===null) return null;
  var d=new Date(t);
  d.setUTCMonth(d.getUTCMonth()+n);
  var m=("0"+(d.getUTCMonth()+1)).slice(-2); var dd=("0"+d.getUTCDate()).slice(-2);
  return d.getUTCFullYear()+"-"+m+"-"+dd;
}
/* ---------- Oda performans puanı (100 üzerinden, kural tabanlı) ----------
   20 yıllık ziraat mühendisi mantığı: her gecikme veya her sıcaklık sapması
   otomatik puan kırmaz / otomatik affetmez. İki temel ilke:
   1) Gecikme, HAKLI bir biyolojik sebeple (sarım/gelişme zayıf) ertelendiyse
      puan kırılmaz — bu doğru bir karardı. Sebepsiz/önlenebilir gecikme
      (ekip yetişmedi, unutuldu vb.) puan kırar.
   2) Kompost sıcaklığı kritik/tehlikeli seviyede GEÇMİŞTE kaldıysa, daha sonra
      düzeltilmiş olsa bile o günlerin etkisi kalıcıdır — misel o günlerde
      zarar görmüş olabilir. Bu yüzden sadece ANLIK son ölçüme değil, kuluçka
      dönemindeki TÜM geçmiş kayıtlara bakılır. */
function odaPerformans(c){
  if(c.bosaltimTarihi) return null;
  var puan=100, nedenler=[];

  /* 1) Şu anki (canlı) sıcaklık durumu — küçük, anlık bir uyarı payı */
  tempAlerts().filter(function(a){return a.cid===c.id;}).forEach(function(a){
    if(a.lvl===2){ puan-=5; nedenler.push({tip:"kritik", metin:"Şu an tehlikeli sıcaklık: "+a.txt}); }
    else if(a.lvl===1){ puan-=3; nedenler.push({tip:"kritik", metin:"Şu an kritik sıcaklık: "+a.txt}); }
  });

  /* 2) GEÇMİŞ sıcaklık maruziyeti (kuluçka dönemi — toprak serilene kadar).
     Düzeltilmiş olsa bile kalıcı olarak puanı etkiler. */
  var kulucka = (c.gunluk||[]).filter(function(r){ return !c.toprakTarihi || r.tarih < c.toprakTarihi; });
  var tehlikeliGun=0, kritikGun=0;
  kulucka.forEach(function(r){
    var ko=numParse(r.kompostC); if(ko==null) return;
    if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeliGun++;
    else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
  });
  if(tehlikeliGun>0){
    var dT=Math.min(30, tehlikeliGun*8);
    puan-=dT;
    nedenler.push({tip:"kritik", metin:"Kuluçka döneminde "+tehlikeliGun+" gün tehlikeli sıcaklıkta kaldı — düzeltilmiş olsa bile misel o günlerde zarar görmüş olabilir (kalıcı puan kırılması)."});
  }
  if(kritikGun>0){
    var dK=Math.min(20, kritikGun*4);
    puan-=dK;
    nedenler.push({tip:"kritik", metin:"Kuluçka döneminde "+kritikGun+" gün kritik sıcaklıkta kaldı (kalıcı puan kırılması)."});
  }

  /* 3) Gecikmiş işlemler — sebebine göre değerlendirilir */
  var today=todayISO(), gecikmisListe=[], haklıGecikme=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(s.tip==="uyari") return;
    if(s.tip==="ilac" || s.tip==="su") return; /* sulama günlük kayıttan takip edilir, puan hesabına dahil edilmez */
    var t=protokolTarih(c,s); if(!t) return;
    var done=adimGercektenYapildiMi(c, idx, s);
    if(t<today && !done){
      var sebep = c.erteleSebep && c.erteleSebep["p"+idx];
      if(sebep==="biyolojik") haklıGecikme.push(s.txt);
      else gecikmisListe.push(s.txt);
    }
  });
  if(gecikmisListe.length>0){
    var d1=Math.min(20,gecikmisListe.length*5); puan-=d1;
    nedenler.push({tip:"gecikme", metin:gecikmisListe.length+" gecikmiş işlem (sebepsiz/önlenebilir): "+gecikmisListe.join(" · ")});
  }
  if(haklıGecikme.length>0){
    nedenler.push({tip:"bilgi", metin:haklıGecikme.length+" işlem haklı sebeple (gelişme/sarım) ertelendi — puan kırılmadı: "+haklıGecikme.join(" · ")});
  }

  var son=sonGunluk(c);
  if(son && son.amonyak==="Var"){ puan-=5; nedenler.push({tip:"gozlem", metin:"Amonyak kokusu bildirilmiş."}); }
  ilacGecmisi(c).forEach(function(g){
    if(g.uyari.some(function(u){return u.indexOf("⚠️")===0;})){ puan-=10; nedenler.push({tip:"ilac", metin:g.ad+": hasat öncesi bekleme ihlali riski."}); }
  });
  puan=Math.max(0, Math.min(100, Math.round(puan)));
  return {puan:puan, nedenler:nedenler};
}

  return sectionCard('🎯 Üretim performans puanı', body);
}
function hasatKaymasi(c){
  var ort=ortKompostSicaklik(c);
  if(ort==null) return {kayma:0, neden:[]};
  var kayma=0, neden=[];
  if(ort>=KOMPOST_TEHLIKELI){ kayma=-3; neden.push("Kuluçka dönemi kompost ort. "+ort.toFixed(1)+"° (tehlikeli yüksek) — misel çok hızlanmış olabilir, hasat ~3 gün erkene kayabilir."); }

function beklenenTakvim(c){
  /* SSOT: Her aşama için protokol adımını bul ve protokolTarih() ile hesapla,
     SONRA adımın KENDİ ertelemesini (c.ertele["p"+idx]) ayrıca ekle.
     ÖNEMLİ: protokolTarih() bir adımın SADECE referans verdiği (bir önceki)
     adımın ertelemesini zincirden taşır — kendi ertelemesini eklemez. Kendi
     ertelemesini eklemek uygulamanın her yerinde (siradakiProtokolAdimi,
     planTarihiDegistirAc vb.) AYRI bir adım olarak yapılıyor — burada da aynı
     desen kullanılmalı, aksi halde "📅 Planla" ile değiştirilen tarih (örn.
     Toprak) bu takvimde yansımaz (KRİTİK BUG, düzeltildi). */
  var roles = ['tiftik', 'toprak', 'tirmik', 'hava', 'hasat'];
  var names = {tiftik:'Tiftik', toprak:'Toprak', tirmik:'Tırmık', hava:'Hava', hasat:'1. Hasat'};
  var gerçekler = {tiftik:c.tiftikTarihi, toprak:c.toprakTarihi, tirmik:c.tirmikTarihi, hava:c.havaBaslangic, hasat:null};
  
  var result = [];
  roles.forEach(function(rol){
    var idx = protokolRolIdx(rol);
    var beklenen = null;
    if(idx >= 0){
      var step = getProtokol()[idx];
      var base = protokolTarih(c, step);
      if(base){
        var ert = (c.ertele && c.ertele["p"+idx]) || 0;
        beklenen = ert ? addDays(base, ert) : base;
      }
    }
    result.push({
      ad: names[rol],
      beklenen: beklenen,
      ger: gerçekler[rol]
    });
  });
  return result;
}

/* ---------- Aşama / durum ---------- */
/* Dönemler (Erdal'ın tanımı):
   kuluçka: geliş→toprak · toprak dönemi: toprak→tırmık · 1.misel: tırmık→hava
   havadan sonra gün 0-5: 2.misel · 6-8: pimleme · 9: bezelye · 10: ceviz · sonra hasat */
function _mhDates(c){
  var S=getSet(c);
  var toprak = c.toprakTarihi || (c.gelisTarihi?addDays(c.gelisTarihi,S.offToprak):null);
  var tirmik = c.tirmikTarihi || (toprak?addDays(toprak,S.offTirmik):null);
  var hava   = c.havaBaslangic || (toprak?addDays(toprak,S.offHava):null);
  return {toprak:toprak, tirmik:tirmik, hava:hava};
}
function airStarted(c){ return !!c.havaBaslangic && (daysBetween(c.havaBaslangic, todayISO())>=0); }
function phaseCls(t){
  if(t==="Kuluçka dönemi"||t==="Toprak dönemi") return "b-amber";
  if(t==="1. Misel gelişim"||t==="2. Misel gelişim"||t==="Pimleme dönemi") return "b-teal";
  return "b-harvest";
}
function stageOf(c){
  if(c.bosaltimTarihi) return {t:"Boşaltıldı", cls:"b-gray"};
  if(c.donemManuel) return {t:c.donemManuel, cls:phaseCls(c.donemManuel)};
  var today=todayISO(); var m=_mhDates(c);
  if(!m.toprak || daysBetween(m.toprak,today)<0) return {t:"Kuluçka dönemi", cls:"b-amber"};
  if(!m.tirmik || daysBetween(m.tirmik,today)<0) return {t:"Toprak dönemi", cls:"b-amber"};
  /* KRİTİK FIX: Hava aşamasına geçmek için GERÇEKTEN kayıtlı bir Hava Başlangıç tarihi
     (c.havaBaslangic) gerekir — sadece "tahmini" tarihin (toprak+offHava) geçmiş olması
     yetmez. Aksi halde kullanıcı yanlışlıkla girip SİLSE bile, tahmini tarih geçmişte
     kaldığı için oda hâlâ "hava başladı" aşamasında görünmeye devam ediyordu. */
  if(!c.havaBaslangic || daysBetween(c.havaBaslangic,today)<0) return {t:"1. Misel gelişim", cls:"b-teal"};
  var hd=daysBetween(c.havaBaslangic,today);
  if(hd<=5) return {t:"2. Misel gelişim", cls:"b-teal"};
  if(hd<=8) return {t:"Pimleme dönemi", cls:"b-teal"};
  if(hd===9) return {t:"Bezelye boyutu", cls:"b-harvest"};
  if(hd===10) return {t:"Ceviz boyutu", cls:"b-harvest"};
  var ha=hasatAsama(c, todayISO());
  if(ha){ var lbl=ha.flas>0?("Hasat F"+ha.flas+" · "+ha.asama):ha.asama; return {t:lbl, cls:"b-harvest"}; }
  return {t:"Hasat", cls:"b-harvest"};
}
function phaseList(c){
  var m=_mhDates(c); var cur=stageOf(c).t;
  function row(ad,tarih,cls){ return {ad:ad, tarih:tarih, cls:cls, current:(ad===cur)}; }
  return [
    row("Kuluçka dönemi", c.gelisTarihi, "b-amber"),
    row("Toprak dönemi", m.toprak, "b-amber"),
    row("1. Misel gelişim", m.tirmik, "b-teal"),
    row("2. Misel gelişim", m.hava, "b-teal"),
    row("Pimleme dönemi", m.hava?addDays(m.hava,6):null, "b-teal"),
    row("Bezelye boyutu", m.hava?addDays(m.hava,9):null, "b-harvest"),
    row("Ceviz boyutu", m.hava?addDays(m.hava,10):null, "b-harvest"),
    row("Hasat", m.toprak?addDays(m.toprak,22):null, "b-harvest")
  ];
}
function lastOlcum(c){
  if(c.gunluk && c.gunluk.length){
    var last = c.gunluk[c.gunluk.length-1];
    var parts=[];
    if(last.odaC!=="" && last.odaC!=null) parts.push(last.odaC+"° oda");
    if(last.kompostC!=="" && last.kompostC!=null) parts.push(last.kompostC+"° komp.");
    return parts.length? parts.join(" · ") : "—";
  }
  return "—";
}

/* ---------- Günlük veri girişinde mantık kontrolü (geliş öncesi tarih, poşet açılmadan sulama) ---------- */
function gunlukKontrolMesaji(c, tarih, sulamaVarMi){
  var msgs=[];
  if(c.gelisTarihi && tarih && tarih<c.gelisTarihi){
    msgs.push({tip:"blockAll", metin:esc(c.oda||"")+": "+fmtDate(tarih)+" tarihi kompost geliş tarihinden ("+fmtDate(c.gelisTarihi)+") önce — bu odaya henüz kompost gelmedi."});
  }
  /* KRİTİK FIX: Eskiden burada yanlışlıkla c.tiftikTarihi kontrol ediliyordu — "poşet açıldı mı"
     ile "tiftik yapıldı mı" birbirine karışmıştı. Artık gerçek poşet durumuna (posetAcildiMi)
     bakıyor — bu da protokoldeki metne göre değil, işaretlenen "done" durumuna göre çalışıyor,
     kullanıcı satırı "Poşet kesimi" gibi yeniden adlandırsa bile doğru sonuç verir. */
  if(sulamaVarMi && !posetAcildiMi(c)){
    var pg=posetGun(c);
    msgs.push({tip:"blockSulama", metin:esc(c.oda||"")+": poşet henüz açılmadı"+(pg?(" (beklenen: "+fmtDate(pg)+")"):"")+" — sulama/su bu tarihte girilemez."});
  }
  /* SULAMA YASAĞI: Tırmık tamamlandıktan Havaya Başlama gerçekleşene kadar
     hiçbir sulama görevi girilmemeli — kompost bu dönemde su almamalı. */
  if(sulamaVarMi && c.tirmikTarihi && tarih>=c.tirmikTarihi && (!c.havaBaslangic || tarih<c.havaBaslangic)){
    msgs.push({tip:"blockSulama", metin:esc(c.oda||"")+": Bu üretim aşamasında sulama yapılmamalıdır (Tırmık sonrası, Havaya Başlama'ya kadar)."});
  }
  return msgs;
}

  /* SSOT: tek yazma kapısı — bayrak, özel tarih (c.tiftikTarihi vb.) ve günlük not birlikte */

  active.sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var idx=active.findIndex(function(c){return c.id===cid;});
  setTurMod("tek");
  /* KRİTİK: go("tur") turIndex'i her zaman 0'a sıfırlar (bkz. go()) — o yüzden
     hedef odanın index'ini go()'dan SONRA, view'i doğrudan atayıp render()
     ile uygularız (turOdayaGit ile aynı desen). Aksi halde bu buton her zaman
     en yeni odayı açar, kullanıcı hedef odaya "Sonraki oda" ile elle gitmek
     zorunda kalır. */
  turIndex = idx<0 ? 0 : idx;
  view={name:"tur", id:null};
  window.scrollTo(0,0);
  render();
}

/* Kısa gün adı — planlama içeren tarihlerin yanına (kompost teslim, protokol
   sıradaki adım vb). Pazar özellikle vurgulanır ("Pazarı bilelim, önlem alalım"). */
var GUN_KISA=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"]; /* getUTCDay(): 0=Pazar */
function gunKisa(iso){
  if(!iso) return "";
  var p=(""+iso).split("-"); if(p.length<3) return "";
  var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));
  if(isNaN(d.getTime())) return "";
  return GUN_KISA[d.getUTCDay()];
}
function gunKisaHTML(iso){
  var g=gunKisa(iso); if(!g) return "";
  var pazar=(g==="Paz");
  return ' <span style="font-size:10.5px;'+(pazar?'color:var(--red);font-weight:700;':'color:var(--muted);')+'">'+g+'</span>';
}
function gunAdi(iso){ if(!iso) return ""; var p=(""+iso).split("-"); if(p.length<3) return ""; var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); if(isNaN(d.getTime())) return ""; var g=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"]; return g[d.getUTCDay()]; }
function sonGunluk(c){ if(c.gunluk&&c.gunluk.length){ var a=c.gunluk.slice().sort(function(x,y){return cmpDate(x.tarih,y.tarih);}); return a[a.length-1]; } return null; }
/* "Bugün işlem" sütunu için: SADECE bugünün kaydı/kayıtları — sonGunluk() gibi
   "en son ne zaman olduysa o" değil, kesinlikle bugüne ait olanı getirir.
   Aynı gün birden fazla kayıt varsa (örn. sabah+akşam), sulama notlarını birleştirir. */
function bugunkuGunluk(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var t=todayISO();
  var gunler=c.gunluk.filter(function(g){return g.tarih===t;});
  if(!gunler.length) return null;
  if(gunler.length===1) return gunler[0];
  var birlesik={tarih:t, su:"", sulama:""};
  var suToplam=0;
  gunler.forEach(function(g){
    var sv=numParse(g.su); if(sv) suToplam+=sv;
    if(g.sulama) birlesik.sulama = birlesik.sulama ? (birlesik.sulama+" · "+g.sulama) : g.sulama;
    if(g.islemNot) birlesik.islemNot = birlesik.islemNot ? (birlesik.islemNot+" · "+g.islemNot) : g.islemNot;
    if(g.odaC) birlesik.odaC=g.odaC;
    if(g.kompostC) birlesik.kompostC=g.kompostC;
    if(g.kompostUst) birlesik.kompostUst=g.kompostUst;
    if(g.klimaC) birlesik.klimaC=g.klimaC;
  });
  if(suToplam>0) birlesik.su=String(suToplam);
  return birlesik;
}
/* Görev (poşet açma, tiftik vb.) tamamlanınca bugünün günlük kaydına otomatik not düşer,
   böylece "Bugün işlem" özetinde görevin de yapıldığı görünür (mevcut sulama notunu SİLMEZ, ekler). */
/* "Bugün işlem" hücresi: SULAMA (mühendisin Tur'dan girdiği su/ilaç) ve İŞLEM NOTU
   (protokol adımı tamamlandı/ertelendi özeti) iki ayrı satırda gösterilir — aynı
   kutuda birbirine karışmasın diye. */
function bugunIslemHTML(bg, c){
  var satir1 = ((numParse(bg.su)>0)?('<b>'+esc(bg.su)+' lt su</b>'+(bg.sulama?' + ':'')):'')+esc(bg.sulama||"");
  /* "X için plan Y olarak güncellendi — gerekçe: ..." notları PLANLAMA/idari
     kayıttır, fiili üretim işlemi DEĞİL — Son İşlemler'de zaten filtreleniyordu
     ama burada (Bugün İşlem kolonu) filtrelenmiyordu, bu yüzden "Poşet kesimi
     için plan 14.07 — gerekçe: belirtilmedi" gibi metinler yanlışlıkla "bugün

  if(c){

/* Belirli bir TARİHİN günlük kaydına not ekler (dedup'lı). Geçmiş tarihe de yazabilir.
   Protokol adımı tamamlanınca / ertelenince otomatik düşen not — SULAMA ALANINA DEĞİL,
   ayrı bir alana (islemNot) yazılır. Böylece "500 lt su + serenade" (mühendisin Tur'dan
   girdiği gerçek sulama) ile "toprak çekimi yapıldı" (protokol adımı özeti) aynı kutuda
   karışmaz — Ana Ekran'da iki ayrı satırda gösterilir. */
/* Aynı "anahtar" ile başlayan ESKİ notu bulup YENİSİYLE DEĞİŞTİRİR (gunlukNotTariheEkle
   gibi sonsuza kadar biriktirmez). "Tırmık için plan ... güncellendi" gibi tekrar tekrar
   değişen notlarda kullanılır — sadece SONUNCUSU kalsın istenir. */
function gunlukNotTariheGuncelle(c, tarih, anahtar, not){
  if(!c || !tarih || !not) return;
  not=(""+not).trim(); if(!not) return;
  if(!c.gunluk) c.gunluk=[];
  var ex=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(ex){
    var parcalar=(""+(ex.islemNot||"")).split(" · ").map(function(x){return x.trim();}).filter(function(x){return x;});
    if(anahtar) parcalar=parcalar.filter(function(p){ return p.indexOf(anahtar)!==0; });
    parcalar.push(not);
    ex.islemNot=parcalar.join(" · ");
  } else {
    c.gunluk.push({tarih:tarih, odaC:"", kompostC:"", co2alt:"", co2ust:"", su:"", sulama:"", islemNot:not});
    c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  }
}
function gunlukNotTariheEkle(c, tarih, not){
  if(!c || !tarih || !not) return;
  not = (""+not).trim(); if(!not) return;
  if(!c.gunluk) c.gunluk=[];
  var ex=c.gunluk.find(function(g){return g.tarih===tarih;});
  if(ex){
    var mevcut=(""+(ex.islemNot||"")).split(" · ").map(function(x){return x.trim();});
    if(mevcut.indexOf(not)>=0) return;
    ex.islemNot = ex.islemNot ? (ex.islemNot+" · "+not) : not;
  } else {
    c.gunluk.push({tarih:tarih, odaC:"", kompostC:"", co2alt:"", co2ust:"", su:"", sulama:"", islemNot:not});
    c.gunluk.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  }
}

/* Tüm günlük kayıtlardaki " · " ile ayrılmış tekrar eden notları temizler.
   Hem eski v173 bozuk kayıtlarını hem de senkronla geri gelen duplicate'leri düzeltir.
   loadData sonrası bir kez çalışır. */
function gunlukNotlariTekille(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  function tekille(g, alan){
    var v=g[alan];
    if(!v || (""+v).indexOf(" · ")<0) return;
    var parcalar=(""+v).split(" · ").map(function(x){return x.trim();}).filter(function(x){return x;});
    var gorulen={}, temiz=[];
    parcalar.forEach(function(p){
      if(gorulen[p]) return;   /* aynı not tekrar ediyorsa atla */
      gorulen[p]=1; temiz.push(p);
    });
    var yeni=temiz.join(" · ");
    if(yeni!==v){ g[alan]=yeni; degisti=true; }
  }
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){ tekille(g,"sulama"); tekille(g,"islemNot"); });
  });
  return degisti;
}
function kompStr(g){ if(!g) return "—"; var a=(g.kompostC==null?"":(""+g.kompostC)).trim(), b=(g.kompostUst==null?"":(""+g.kompostUst)).trim(); if(a&&b) return a+"-"+b; return a||b||"—"; }
function posetGun(c){ var i=protokolRolIdx("poset"); if(i>=0){ var t=protokolTarih(c,getProtokol()[i]); if(t) return t; } return (c&&c.gelisTarihi)?addDays(c.gelisTarihi,6):null; }
/* Poşet gerçekten "tamamlandı" işaretlendi mi (sadece takvim günü değil, ekibin fiilen yaptığı) */
function posetAcildiMi(c){

  var i=protokolRolIdx("poset");
  if(i>=0) return !!(c.done && c.done["p"+i]); /* protokol adımı varsa SADECE işaretlenmiş olması sayılır */
  /* Protokolde poşet açma adımı hiç yoksa (özelleştirilmiş protokol), eski takvim mantığına geri dön */
  var pg=posetGun(c);

var _arizaFotoGecici=null;
function arizaFotoSec(file){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      _arizaFotoGecici=cv.toDataURL("image/jpeg",0.6);
      var onz=el("az_foto_onizleme");
      if(onz) onz.innerHTML='<img src="'+_arizaFotoGecici+'" style="width:90px; height:90px; object-fit:cover; border-radius:8px; margin-top:6px;">';
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

/* Genel görevler listesine tarih+başlık eşleşen BEKLEYEN bir görev varsa
   onun atamasına ekler (kopya oluşturmaz), yoksa yeni görev oluşturur.
   UI yan etkisi (toast/render/saveData) YOK — hem gorevEkle() (tekli elle
   ekleme) hem topluOnayla() (WhatsApp toplu girişi) bunu kullanır; ikisi de
   ayrı ayrı aynı işi (örn. "Oda B-1 · Oda boşaltma/yıkama") her tekrarda/
   toplu girişte kopya "Atanmamış" görev olarak biriktiren bugı taşıyordu. */
function gorevEkleVeyaBirlestir(tarih, baslik, atama){
  var d=loadData();
  var mevcut = d.gorevler.find(function(g){ return !g.done && g.tarih===tarih && g.baslik===baslik; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    return false; /* yeni eklenmedi, mevcuda birleştirildi */
  }
  d.gorevler.push({id:uid(), tarih:tarih, baslik:baslik, atama:atama||"", done:false, at:new Date().toISOString(), by:deviceName()});
  return true;
}
function gorevEkle(tarih,baslik,atama){
  if(!can("edit")) return noPerm();
  baslik=(baslik||"").trim(); if(!baslik){ toast("Görev başlığı gir"); return; }
  if(!tarih){ toast("Tarih seç"); return; }
  var yeni=gorevEkleVeyaBirlestir(tarih, baslik, atama);
  saveData();
  if(yeni) logAudit("görev eklendi", baslik+" ("+fmtDate(tarih)+")");
  toast(yeni?"Görev eklendi":"Bu görev zaten vardı — atama güncellendi");
  render();
}

  return arr.join(",");

/* Yarın için SADE görev listesi — Bugünkü Görevler ile aynı ruhta ama
   aksiyon butonu yok (henüz yapılamaz, sadece önizleme). yarinHTML()'in
   karmaşık onay/değiştir/WhatsApp apparatus'u (eski Görevler ekranından
   kalma) burada YOK — sadece "oda — işlem" sade listesi. */
function getTomorrowTasks(){
  var d=loadData(), yarin=addDays(todayISO(),1);
  var tasks=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){return !og.done && og.tarih===yarin;}).forEach(function(og){
      tasks.push({oda:c.oda, islem:og.is, tipo:"oda"});
    });
  });
  (getGorevler()||[]).filter(function(g){return !g.done && g.tarih===yarin;}).forEach(function(g){
    tasks.push({oda:"", islem:g.baslik, tipo:"genel"});
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t===yarin){ tasks.push({oda:c.oda, islem:sd.txt, tipo:"protokol"}); }
  });
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,yarin);
    if(oneri) tasks.push({oda:c.oda, islem:oneri, tipo:"sulama"});
  });
  /* Oda adına göre grupla, odasız (genel) en sona */
  tasks.sort(function(a,b){
    if(!!a.oda!==!!b.oda) return a.oda?-1:1;
    return (a.oda||"")<(b.oda||"")?-1:1;
  });
  return tasks;
}

      +(t.oda?('<b>'+esc(t.oda)+'</b> — '):'')+esc(t.islem)

  h+='</div>';

function son7GunEnSikSorun(){
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var sinir=addDays(todayISO(),-7);
  var sayac={};
  audit.forEach(function(a){
    var gun=(a.at||"").slice(0,10);
    if(!gun || gun<sinir) return;
    if(!/ertelendi|gecik/i.test(a.action)) return;
    sayac[a.action]=(sayac[a.action]||0)+1;
  });
  var keys=Object.keys(sayac);
  if(!keys.length) return null;
  keys.sort(function(a,b){return sayac[b]-sayac[a];});
  return {action:keys[0], sayi:sayac[keys[0]]};
}

/* Bir oda için YARIN planlanan tüm işlemler (protokol adımı + manuel oda görevi).
   "Bugün işlem" sütununun yanına eklenen "Yarın işlem" sütunu için kullanılır. */
function yarinPlanlanan(c){
  if(!c) return [];
  var tomorrow=addDays(todayISO(),1);
  var list=[];
  /* Onay kaydı: c.yarinOnay["p12"]="2026-07-08" — adım, O TARİH için onaylanmış.
     Tarih eşleşmezse (gün geçmişse) onay geçersiz — her gün taze onay gerekir.
     Mühendis değişikliği: c.yarinDegisiklik["p12"]={t:"2026-07-08", txt:"600 lt su + ..."}
     — protokol 400 dedi, mühendis 600'e çevirdi; gösterilen metin mühendisinki olur. */
  function onayliMi(key){ return !!(c.yarinOnay && c.yarinOnay[key]===tomorrow); }
  function degisik(key){ var d=c.yarinDegisiklik&&c.yarinDegisiklik[key]; return (d&&d.t===tomorrow)?d.txt:null; }
  getProtokol().forEach(function(st,idx){
    if(st.silindi) return;
    if(st.tip==="uyari") return;
    
    /* TEKRARLI KURAL (örn. "Poşet açıldıktan toprak-2'ye kadar HER GÜN Serenade"):
       tek bir "t" tarihi yok, bir ARALIK var (protokolAdimAraligi). "Yarın" o
       aralığın içine düşüyorsa, bu da yarının planlanan işi olarak gösterilmeli.
       Bu kontrol EKSİKTİ — tekrarlı kurallar hiçbir zaman "Yarın işlem" kolonunda
       görünmüyordu (KRİTİK BUG, düzeltildi). */
    if(st.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,st);
      if(ar && cmpDate(tomorrow,ar.baslangic)>=0 && cmpDate(tomorrow,ar.bitis)<=0){
        var dgR=degisik("p"+idx);
        list.push({txt:dgR||st.txt, orijinal:st.txt, degisti:!!dgR, key:"p"+idx, onayli:onayliMi("p"+idx)});
      }
      return;
    }
    
    var base=protokolTarih(c,st); if(!base) return;
    /* SADECE "olay" tipi adımlarda kendi ertele'si eklenir — protokolTarih()
       bu tipler için kasıtlı olarak kendi ertele'sini dışarıda bırakır (çağıran
       ekler). "ilac"/"su" tipi kurallar (örn. Vivando) ZATEN protokolTarih()
       içinde referans zincirinden (toprak ertelendiyse) doğru tarihi alır —
       burada ikinci kez eklemek aynı çift-sayma hatasını tekrarlardı. */
    var ert=(st.tip==="olay" && c.ertele && c.ertele["p"+idx]) ? c.ertele["p"+idx] : 0;
    var t=addDays(base,ert);
    var done=adimGercektenYapildiMi(c, idx, st);
    if(done) return;
    if(t===tomorrow){
      var dg=degisik("p"+idx);
      list.push({txt:dg||st.txt, orijinal:st.txt, degisti:!!dg, key:"p"+idx, onayli:onayliMi("p"+idx)});
    }
  });
  (c.odaGorevleri||[]).forEach(function(og){
    if(og.done) return;
    var base=og.tarih; if(!base) return;
    var ert=og.ertele||0;
    var t=addDays(base,ert);
    if(t===tomorrow){
      var dg2=degisik("og_"+og.id);
      list.push({txt:dg2||og.is, orijinal:og.is, degisti:!!dg2, key:"og_"+og.id, onayli:onayliMi("og_"+og.id)});
    }
  });
  return list;
}
/* Yarın sütunu HTML'i: onaysız KIRMIZI (protokol öngörüsü), onaylı MAVİ (mühendis teyit etti).

/* Mühendis onayı (Tur'dan): yarına planlı bir adımı teyit eder / teyidi geri alır.

}

/* Helper: Kritik uyarıları topla */
function getCriticalAlerts(){
  try{
  var d=loadData(), alerts=[];
  
  /* Sıcaklık kritik (>28 veya <16) — EN GÜNCEL TARİHLİ günlük kaydına bak.
     (Dizinin son elemanı her zaman en güncel tarih olmayabilir; kayıt sırası bozuk olabilir.) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var gunluk=(c.gunluk||[]);
    if(!gunluk.length) return;
    /* En güncel tarihli kaydı bul */
    var gun=gunluk[0];
    for(var i=1;i<gunluk.length;i++){
      if((gunluk[i].tarih||"")>(gun.tarih||"")) gun=gunluk[i];
    }
    if(gun){
      var t=numParse(gun.kompostC);
      if(t!==null && (t>KOMPOST_KRITIK_UST || t<KOMPOST_KRITIK_ALT)){
        alerts.push({
          tipo:"temp",
          odaId:c.id,
          oda:c.oda,
          msg:"Sıcaklık "+t+"°C — "+((t>KOMPOST_KRITIK_UST)?"Çok yüksek, takip et":"Düşük, kontrol et"),
          severity:2,
          tarih:gun.tarih
        });
      }
    }
  });
  
  /* Açık arıza */
  (d.arizalar||[]).filter(function(a){return a.durum==="acik";}).forEach(function(a){
    alerts.push({
      tipo:"ariza",
      arizaId:a.id,
      msg:esc((a.baslik||"Arıza"))+" — Açık",
      severity:2,
      tarih:a.tarih
    });
  });
  
  /* Kompost bekleyen (geliş tarihini geçmiş, HİÇ tur kaydı girilmemiş).
     ÖNEMLİ: sadece "geliş gününe ait" kayıt aranmaz — bu neredeyse hiç
     karşılanmayan bir koşuldu (kullanıcı odaya gidince bugünün tarihiyle
     kayıt girer, geliş tarihiyle değil). Doğrusu: gunluk dizisi TAMAMEN
     boşsa uyar; herhangi bir kayıt girildiyse (hangi tarihli olursa olsun)
     tur başlamış demektir, uyarı kapanır. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(c.gelisTarihi){
      var gun=(todayISO().localeCompare(c.gelisTarihi)>=0);
      if(gun && (!c.gunluk || c.gunluk.length===0)){
        alerts.push({
          tipo:"kompost",
          odaId:c.id,
          oda:c.oda,
          msg:"Kompost geldi ama tur kaydı yok",
          severity:1,
          tarih:c.gelisTarihi
        });
      }
    }
  });
  
  /* Kompost Geliş Kontrolü'nde bekleyen madde var mı (sıcaklık/irsaliye/kestane/
     nem/amonyak/düzeltme). ÖNEMLİ: kompostGelisIkazlariHTML() (Görevler sekmesi)
     bunu sadece gelişten sonraki 3 gün içinde gösterir — kestane yeri gibi zamana
     bağlı olmayan maddeler o pencere kapanınca sessizce kaybolup unutulabiliyordu.
     Kritik Uyarılar'da gün sınırı YOK — çözülene kadar görünmeye devam eder. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    if(!c.gelisTarihi || todayISO().localeCompare(c.gelisTarihi)<0) return; /* henüz gelmedi */
    var eksik=kompostEksikMaddeler(c);
    if(eksik.length){
      alerts.push({
        tipo:"kgeksik",
        odaId:c.id,
        oda:c.oda,
        msg:"Kompost geliş kontrolü eksik: "+eksik.join(" · "),
        severity:1,
        tarih:c.gelisTarihi
      });
    }
  });

  /* Havalandırma planı hedeften sapma (havaya başlanmış odalar). tempAlerts()
     zaten bu hesabı yapıyor (bugünkü hedef vs. son ölçüm, 1°'den fazla fark) —
     sadece havaya başlama sonrası "odaHedef" türünü buraya da taşıyoruz ki
     mühendis Görevler sekmesine gitmeden, Bugün ekranında da görsün. */
  (tempAlerts()||[]).filter(function(a){return a.key==="odaHedef";}).forEach(function(a){
    alerts.push({
      tipo:"havaHedef",
      odaId:a.cid,
      oda:a.oda,
      msg:a.txt,
      severity:1,
      tarih:todayISO()
    });
  });

  /* NOT: Geciken görevler artık "Bugünün İşleri" listesinde kırmızı işaretli
     olarak en üstte gösteriliyor. Tekrarı önlemek için uyarı bandına eklenmez. */

  alerts.sort(function(a,b){return b.severity-a.severity;});
  return alerts;
  }catch(e){
    console.warn("getCriticalAlerts error:", e);
    return [];
  }
}

/* Helper: Bugün yapılacak görevleri al ve koridor sırasına göre sort */
function getTodaysTasks(){
  var d=loadData(), bugun=todayISO();
  var tasks=[];
  
  /* Oda-bazlı görevler (odaGorevleri) — BEKLEYEN (done:false) her zaman görünür
     (tarih<=bugun ise, geciken dahil). TAMAMLANMIŞ (done:true) SADECE bugün
     tamamlandıysa görünür (doneAt===bugun) — aksi halde geçmişte tamamlanmış
     HER görev sonsuza dek "Bugünkü Görevler"de kalırdı (KRİTİK BUG, düzeltildi). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).filter(function(og){
      if(og.tarih>bugun) return false;
      if(og.done){
        var doneGun = og.doneAt ? og.doneAt.slice(0,10) : og.tarih;
        return doneGun===bugun;
      }
      return true;
    }).forEach(function(og){
      tasks.push({
        tipo:"oda",
        odaId:c.id,
        oda:c.oda,
        islem:og.is,
        atama:og.atama,
        tarih:og.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(!og.done && og.tarih<bugun),
        done:!!og.done,
        id:og.id,
        cyclicId:c.id
      });
    });
  });
  
  /* Genel görevler (gorevler) — AYNI mantık: bekleyen her zaman, tamamlanmış
     SADECE bugün tamamlandıysa görünür (doneAt===bugun). */
  (getGorevler()||[]).filter(function(g){
    if(g.tarih>bugun) return false;
    if(g.done){
      var doneGun = g.doneAt ? g.doneAt.slice(0,10) : g.tarih;
      return doneGun===bugun;
    }
    return true;
  }).forEach(function(g){
    tasks.push({
      tipo:"genel",
      baslik:g.baslik,
      atama:g.atama,
      tarih:g.tarih,
      gelisTarihi:"",
      geciken:(!g.done && g.tarih<bugun),
      id:g.id,
      done:!!g.done
    });
  });
  
  /* Protokol takvimi — sıradaki olay-tipi adım bugün/gecikmişse listeye girer.
     Planlama'nın hesapladığı AYNI fonksiyon (siradakiProtokolAdimi), Odalar'daki
     Protokol Özeti ile aynı veri kaynağı (SSOT). Tamamlama toggleTask üzerinden —
     tiftik/toprak/tırmık kendi detay kutusunu açar, diğerleri direkt işaretlenir.
     Bugün TAMAMLANMIŞ bir olay-tipi adım varsa (sonYapilanOlayAdimi), o da
     listeye çizili/✓ olarak eklenir — "bugün ne yapıldı" görünsün. */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var sd=siradakiProtokolAdimi(c);
    if(sd && sd.t<=bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:sd.txt,
        atama:"",
        tarih:sd.t,
        gelisTarihi:c.gelisTarihi||"",
        geciken:(sd.t<bugun),
        done:false,
        id:sd.idx,
        cyclicId:c.id
      });
    }
    var son=sonYapilanOlayAdimi(c);
    if(son && son.tarih===bugun){
      tasks.push({
        tipo:"protokol",
        odaId:c.id,
        oda:c.oda,
        islem:son.txt,
        atama:"",
        tarih:son.tarih,
        gelisTarihi:c.gelisTarihi||"",
        geciken:false,
        done:true,
        id:son.idx,
        cyclicId:c.id
      });
    }
  });
  
  /* Sulama/ilaç — bugünün protokol önerisi. Checkbox ile "tamamlanmaz" (Tur'dan
     girilir), o yüzden buton yerine "Tur'a git" linki gösterilir. Bugünkü günlük
     kayıtta zaten sulama/su girilmişse "yapıldı" sayılır — gizlenmez, çizili
     görünür (gerçekte ne uygulandığı orada okunur). */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var oneri=protokolOneri(c,bugun);
    if(!oneri) return;
    var gun=(c.gunluk||[]).find(function(g){return g.tarih===bugun;});
    var yapildiMi=!!(gun && ((gun.sulama||"").trim() || numParse(gun.su)>0));
    tasks.push({
      tipo:"sulama",
      odaId:c.id,
      oda:c.oda,
      islem:yapildiMi?((numParse(gun.su)>0?gun.su+" lt su":"")+(gun.sulama?(" "+gun.sulama):"")).trim()||oneri:oneri,
      atama:"",
      tarih:bugun,
      gelisTarihi:c.gelisTarihi||"",
      geciken:false,
      done:yapildiMi,
      id:c.id,
      cyclicId:c.id
    });
  });
  
  /* Sıralama:
     1) Bitmemiş her zaman bitenlerden önce (bitenler referans için en altta)
     2) Geciken işler en üstte (en eski gecikme önce)
     3) Normal işler: odanın kompost geliş tarihine göre YENİDEN ESKİYE
        (en son gelen kompostun odası en üstte). Aynı oda birlikte gruplanır. */
  tasks.sort(function(a,b){
    if(a.done!==b.done) return a.done?1:-1;   /* biten en sona */
    /* Geciken > normal */
    if(a.geciken!==b.geciken) return a.geciken?-1:1;
    if(a.geciken && b.geciken){
      /* İki geciken: en eski gecikme (en küçük tarih) önce */
      return (a.tarih<b.tarih)?-1:(a.tarih>b.tarih?1:0);
    }
    /* İki normal: kompost geliş tarihi yeniden eskiye */
    var ag=a.gelisTarihi||"", bg=b.gelisTarihi||"";
    if(ag!==bg) return (ag>bg)?-1:1;   /* büyük tarih (yeni) önce */
    /* Aynı gelişte: aynı oda birlikte kalsın, sonra iş tarihine göre */
    if(a.oda!==b.oda) return ((a.oda||"")<(b.oda||""))?-1:1;
    return (a.tarih<b.tarih)?-1:1;
  });
  
  return tasks;
}

/* Helper: Tur kaydı girilmemiş odalar */
function getTourPendingRooms(){
  var d=loadData(), bugun=todayISO();
  var pending=[];
  
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    var gunluk=(c.gunluk||[]);
    var bugunKaydi=gunluk.find(function(g){return g.tarih===bugun;});
    if(!bugunKaydi || !bugunKaydi.kompostC){
      pending.push({oda:c.oda, odaId:c.id, gelisTarihi:c.gelisTarihi||""});
    }
  });
  
  /* Kompost geliş tarihine göre YENİDEN ESKİYE (en son gelen kompost en üstte).
     Aynı gelişte oda adına göre. */
  pending.sort(function(a,b){
    var ag=a.gelisTarihi, bg=b.gelisTarihi;
    if(ag!==bg) return (ag>bg)?-1:1;   /* büyük tarih (yeni) önce */
    return ((a.oda||"")<(b.oda||""))?-1:1;
  });
  
  /* Aynı oda adı birden fazla açık döngüde olamaz — tekilleştir.
     Sıralama en yeniden eskiye olduğu için ilk görülen (en güncel) kalır.
     Bu, yanlışlıkla açılmış çift kayıtların listeyi kirletmesini önler. */
  var gorulen={}, tekil=[];
  pending.forEach(function(p){
    var ad=(p.oda||"").trim();
    if(gorulen[ad]) return;
    gorulen[ad]=true;
    tekil.push(p);
  });
  
  return tekil;
}

/* Helper: Son SAHA işlemleri — günlük tur kayıtlarından üretilir.
   Aynı mantık bugunIslemHTML() ile tutarlı (SSOT): su SADECE sayısal
   olarak >0 ise gösterilir ("0" veya boş asla yazılmaz). Hem sulama
   (mühendisin girdiği su/ilaç) hem islemNot (protokol adımı özeti,
   örn. "tiftik", "toprak çekimi yapıldı") dahil edilir. */
function getRecentActions(){
  var d=loadData();
  var kayitlar=[];
  (d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var sulama=(g.sulama||"").trim();
      var suVar=(numParse(g.su)>0);
      /* "X için plan Y olarak güncellendi — gerekçe: ..." notları PLANLAMA'dır,
         fiili üretim/sulama işlemi değil — Son İşlemler'den çıkarılır. */
      var islemNotHam=(g.islemNot||"").trim();
      var islemNot=islemNotHam
        ? islemNotHam.split(" · ").map(function(x){return x.trim();}).filter(function(x){
            return x && !/^.+ için plan /.test(x);
          }).join(" · ")
        : "";
      if(!sulama && !suVar && !islemNot) return; /* fiili iş yok — atla */
      var parca=[];
      if(suVar) parca.push(g.su+" lt su"+(sulama?(" + "+sulama):""));
      else if(sulama) parca.push(sulama);
      if(islemNot) parca.push(islemNot);
      kayitlar.push({
        oda:c.oda,
        tarih:g.tarih,
        metin:parca.join(" · "),
        vakit:g.vakit||""
      });
    });
  });
  /* En yeni tarih önce */
  kayitlar.sort(function(a,b){ return cmpDate(b.tarih, a.tarih); });
  return kayitlar.slice(0,6);
}

/* Helper: Günün ilerleme bilgisi */
function getDayProgress(){
  /* TEK KAYNAK: hem "kalan" hem "tamamlanan", getTodaysTasks()'in DÖNDÜRDÜĞÜ
     AYNI listeden sayılır — liste zaten 4 kategoriyi de (oda görevleri, genel
     görevler, protokol adımları, sulama/ilaç) doğru "done" bayrağıyla içeriyor.
     ESKİDEN "tamamlanan" ayrı, sadece oda+genel görevlerini sayan bir mantıkla
     hesaplanıyordu — protokol adımı ve sulama/ilaç tamamlamaları hiç
     sayılmıyordu. Sonuç: liste "5 tamamlandı" derken özet kartı "0/0"
     gösteriyordu (KRİTİK BUG, düzeltildi). İki ayrı sayma mantığı olduğu
     sürece bu tür sapmalar tekrar olur — tek kaynağa indirgemek kalıcı çözüm. */
  var tasks = getTodaysTasks()||[];
  var tamamlanan = tasks.filter(function(t){return t.done;}).length;
  var kalan = tasks.filter(function(t){return !t.done;}).length;
  var toplam = tamamlanan+kalan;
  return {
    toplam: toplam,
    tamamlanan: tamamlanan,
    kalan: kalan,
    yuzde: toplam>0?Math.round((tamamlanan/toplam)*100):0
  };
}

/* Kritik uyarı bandı: genişleyen listeyi aç/kapa */
function toggleAlerts(){
  var list=el("alertList"), btn=el("alertToggleBtn");
  if(!list) return;
  var acik=(list.style.display!=="none");
  list.style.display=acik?"none":"block";
  if(btn){
    var say=list.querySelectorAll("div[onclick]").length;
    btn.innerHTML=acik?("+"+say+" daha ▾"):("gizle ▴");
  }
}

/* Kritik uyarıya dokununca doğrudan çözüm ekranına git */
function gotoAlert(index){
  var alerts=getCriticalAlerts();
  var a=alerts[index];
  if(!a){ go("bugun"); return; }
  if(a.tipo==="ariza"){
    /* Açık arıza → Arızalar ekranı */
    go("arizalar");
    return;
  }
  if(a.tipo==="kompost" || a.tipo==="temp" || a.tipo==="havaHedef"){
    /* Kompost/tur eksik, sıcaklık kritik veya havalandırma hedefinden sapma → o odanın Günlük Tur ekranı */
    if(a.odaId){
      turOdayaGit(a.odaId);
    } else {
      go("tur");
    }
    return;
  }
  if(a.tipo==="kgeksik"){
    /* Kompost Geliş Kontrolü eksik maddeleri oda DETAY ekranında — Günlük Tur'da değil */
    if(a.odaId) openDetail(a.odaId); else go("bugun");
    return;
  }
  /* Bilinmeyen tip → güvenli varsayılan */
  go("bugun");
}

/* Belirli bir odaya Günlük Tur ekranında doğrudan git (tek oda modu) */
function turOdayaGit(odaId){
  var d=loadData();
  var active=d.cycles.filter(function(c){return !c.bosaltimTarihi;});
  /* renderTur ile AYNI sıralama: en yeni → en eski */
  active.sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var idx=-1;
  for(var i=0;i<active.length;i++){ if(active[i].id===odaId){ idx=i; break; } }
  setTurMod("tek");        /* tek oda moduna geç */
  turIndex=(idx>=0)?idx:0; /* hedef odanın index'i */
  view={name:"tur", id:null};
  window.scrollTo(0,0);
  render();
}

/* Helper: Görev tamamla (oda veya genel) */
function gorevTamamla(id, tipo, cyclicId){
  if(!can("edit")){ noPerm(); return; }
  var d=loadData();
  var simdi=new Date().toISOString();
  if(tipo==="oda"){
    var c=d.cycles.find(function(x){return x.id===cyclicId;});
    if(c){
      var og=(c.odaGorevleri||[]).find(function(x){return x.id===id;});
      if(og){ og.done=true; og.doneAt=simdi; touchCycle(c); saveData(); logAudit("oda görevi tamamlandı", c.oda); render(); }
    }
  } else if(tipo==="genel"){
    var gorevler=getGorevler()||[];
    var g=gorevler.find(function(x){return x.id===id;});
    if(g){ g.done=true; g.doneAt=simdi; saveData(); logAudit("genel görev tamamlandı", g.baslik); render(); }
  } else if(tipo==="protokol"){
    /* toggleTask kendi render()/toast'ını yönetir (tiftik/toprak/tırmık için
       detay kutusu açar) — burada tekrar toast basmadan direkt dön. */
    toggleTask(cyclicId, parseInt(id,10));
    return;
  }
  toast("✓ Tamamlandı");
}

/* Helper: Tarih adı (Pazartesi, vb.) */
function todayName(){
  var names=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  return names[new Date(todayISO()).getDay()];
}

/* Ana ekranda: bekleyen görev + kritik ikaz varsa Görevler sekmesine yönlendiren özet */
function gorevOzetRozet(){
  var items=nextTasks();
  var bugun=items.filter(function(i){return i.overdue||i.off===0;});
  var warns=(typeof tempAlerts==="function")?tempAlerts().filter(function(w){return w.lvl>=1;}):[];
  var parts=[];
  var kompostBekleyen=(typeof kompostGelisIkazlariHTML==="function" && kompostGelisIkazlariHTML()!=="");
  if(kompostBekleyen) parts.push('<span style="color:#c0291f;">🚚 kompost kontrolü</span>');
  if(warns.length) parts.push('<span style="color:#c0291f;">🌡️ '+warns.length+' kritik ikaz</span>');
  if(bugun.length) parts.push('<span style="color:#1f6b38;">📋 '+bugun.length+' bugünkü görev</span>');
  if(!parts.length) return "";
  return '<div class="card tap" onclick="go(\'gorevler\')" style="border:1.5px solid #e0a800; background:#fffbe9; display:flex; justify-content:space-between; align-items:center;">'
    + '<div style="font-weight:600;">'+parts.join(' · ')+'</div>'
    + '<div style="color:#8a6d00; font-size:13px;">Görevler →</div>'
    + '</div>';
}

function bugunGenelGorevHTML(){
  var today=todayISO();
  /* Tamamlanmamış TÜM genel görevler — sadece bugün/gecikmiş değil, ileri tarihli olanlar da
     (örn. yarına planlanan "bahçe bakımı") burada görünsün ki WhatsApp'a gönderilebilsin.
     Aksi halde ileri tarihli bir genel görevin gösterileceği/gönderileceği hiçbir yer yoktu. */
  var gorevler=getGorevler().filter(function(g){return !g.done && g.tarih;});
  gorevler.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  if(!gorevler.length) return "";
  var h='<div class="card" style="border:1.5px solid var(--green);"><div class="sec-title" style="margin-top:0;">🧹 Genel Görevler</div>';
  gorevler.forEach(function(g){
    var gecikti = g.tarih<today;
    var bugun = g.tarih===today;
    var etiket = gecikti ? ('<span style="color:#c0291f; font-size:12px; font-weight:700;">Gecikti · '+fmtDate(g.tarih)+'</span>')
      : bugun ? ('<span style="color:#1f6b38; font-size:12px; font-weight:700;">Bugün</span>')
      : ('<span style="color:#8a5a1f; font-size:12px; font-weight:700;">Yaklaşan · '+fmtDate(g.tarih)+'</span>');
    h+='<div style="padding:8px 0;border-bottom:1px solid #eee;">'
      +'<div style="font-size:12px; margin-bottom:2px;">'+etiket+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
      +'<div style="flex:1;font-size:15px;">🧹 '+esc(g.baslik)+'</div>';
    if(can("edit")) h+='<button class="del-x" onclick="gorevSil(\''+g.id+'\')">×</button>';
    h+='</div>';
    if(can("edit")){
      h+=atamaCokluHTML(g.atama, (function(gid){ return function(val){ return "gorevAtamaToggle('"+gid+"',this,'"+val+"')"; }; })(g.id));
      h+='<div style="display:flex; gap:8px; margin-top:8px;">'
        +'<button class="btn small" style="flex:1;" onclick="gorevToggle(\''+g.id+'\')">✓ Tamamlandı</button>'
        +'<button class="btn ghost small" style="flex:1;" onclick="gorevErtele(\''+g.id+'\')">→ Tamamlanmadı (yarına)</button>'
        +'</div>';
      h+='<div style="margin-top:6px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">'
        +'<label style="display:inline-flex; align-items:center; gap:4px; font-size:13px; font-weight:normal;"><input type="checkbox" '+(_gorevSecili["gg|"+g.id]?"checked":"")+' onchange="gorevSecToggle(\'gg|'+g.id+'\')" style="width:20px;height:20px;">Toplu seç</label>'
        +'<button class="btn small" onclick="gorevPlanlaGonder(\'\',\''+esc(g.baslik).replace(/'/g,"\\'")+'\',\''+esc(g.atama)+'\',\''+esc(g.tarih)+'\')">📋 Planla — WhatsApp\'a gönder</button>'
        +'</div>';
    } else if(g.atama){
      h+='<div class="muted" style="font-size:13px;margin-top:2px;">'+atamaLabel(g.atama)+'</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;

/* Odaya özel, tek seferlik işlemler — Görevler sekmesinden manuel eklenir */
/* gorevEkleVeyaBirlestir ile aynı desen (bkz. o yorumu) ama oda-bazlı
   görevler (c.odaGorevleri) için. */
function odaGorevEkleVeyaBirlestir(cid, tarih, is, atama){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  if(!c.odaGorevleri) c.odaGorevleri=[];
  var mevcut = c.odaGorevleri.find(function(g){ return !g.done && g.tarih===tarih && g.is===is; });
  if(mevcut){
    if(atama){
      var arr=atamaParse(mevcut.atama||"");
      atamaParse(atama).forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      mevcut.atama=arr.join(",");
    }
    touchCycle(c);
    return false;
  }
  c.odaGorevleri.push({id:uid(), tarih:tarih, is:is, atama:atama||"", done:false, ertele:0});
  touchCycle(c);
  return true;
}
function odaGorevEkle(cid, tarih, is, atama){
  if(!can("edit")) return noPerm();
  is=(is||"").trim(); if(!is){ toast("İşlem açıklaması gir"); return; }
  if(!tarih){ toast("Tarih seç"); return; }
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var yeni=odaGorevEkleVeyaBirlestir(cid, tarih, is, atama);
  saveData();
  if(yeni) logAudit("oda işlemi eklendi", c.oda+" · "+is);
  toast(yeni?"Eklendi":"Bu işlem zaten vardı — atama güncellendi");
  render();
}
function odaGorevOnayla(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var og=(c.odaGorevleri||[]).find(function(x){return x.id===ogId;}); if(!og) return;
  og.done=true;
  gunlukGorevNotEkle(c, og.is+" yapıldı");
  touchCycle(c); saveData(); toast("Tamamlandı"); render();
}
function odaGorevErtele(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var og=(c.odaGorevleri||[]).find(function(x){return x.id===ogId;}); if(!og) return;
  if(!confirm('"'+og.is+'" 1 gün ertelensin mi?')) return;
  og.ertele=(og.ertele||0)+1;
  gunlukGorevNotEkle(c, og.is+" başlandı, yetişmedi — ertelendi");
  touchCycle(c); saveData(); toast("Ertelendi (+1 gün)"); render();
}
function odaGorevSil(cid, ogId){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  if(!confirm("Bu oda işlemi silinsin mi?")) return;
  c.odaGorevleri=(c.odaGorevleri||[]).filter(function(x){return x.id!==ogId;});
  touchCycle(c); saveData(); toast("Silindi"); render();
}

/* Elle görev eklerken, protokolde aynı odaya zaten benzer bir iş planlı mı diye bakar.
   Basit ama etkili eşleştirme: iş türünün ilk kelimesi (örn. "tiftik", "poşet") protokol
   satırının metninde geçiyor mu + tarih birbirine yakın mı (±3 gün). */
function protokolBenzerVarMi(cid, tur, tarih){
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return null;
  var anahtar=(tur||"").toLocaleLowerCase("tr").split(/\s+/)[0];
  if(!anahtar || anahtar.length<3) return null;
  var hedefT=tarih||todayISO();
  var eslesen=null;
  getProtokol().forEach(function(s,idx){
    if(eslesen || s.silindi || s.tip!=="olay") return;
    var base=protokolTarih(c,s); if(!base) return;
    var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
    var t=addDays(base,ert);
    var fark=daysBetween(t,hedefT); if(fark===null || Math.abs(fark)>3) return;
    if((s.txt||"").toLocaleLowerCase("tr").indexOf(anahtar)>=0){
      eslesen={txt:s.txt, tarih:t};
    }
  });
  return eslesen;
}
function genelGorevKaydet(){
  if(!can("edit")) return noPerm();
  var t=el("gg_tarih").value;
  var konum=el("gg_konum").value;
  var tur=el("gg_tur").value;
  var not=(el("gg_not").value||"").trim();
  if(!konum){ toast("Konum seç"); return; }
  if(!tur){ toast("İş türü seç"); return; }
  var is=tur+(not?(" ("+not+")"):"");
  /* AKILLI YÖNLENDİRME: konum bir "Oda X" ise ve o odanın açık bir döngüsü varsa,
     görev otomatik olarak o odanın RESMİ kaydına (odaGorevleri) işlenir — tamamlanınca
     günlük kayıt/pano/PDF'de otomatik görünür. Değilse (depo, saha, ya da odanın açık
     döngüsü yoksa) normal bir hatırlatma görevi olarak kalır. Kullanıcıya ayrıca soru
     sorulmaz — konum seçimine göre otomatik karar verilir. */
  var odaAdi = konum.match(/^Oda (.+)$/);
  var hedefCycle = odaAdi ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(odaAdi[1]); }) : null;
  if(hedefCycle){
    var cakisan=protokolBenzerVarMi(hedefCycle.id, tur, t);
    if(cakisan){
      var devamEt=confirm("⚠️ Bu iş protokolde zaten var:\n\""+cakisan.txt+"\" ("+fmtDate(cakisan.tarih)+" için planlı)\n\nYine de elle eklemek istiyor musun?");
      if(!devamEt) return;
    }
    odaGorevEkle(hedefCycle.id, t, is, _genelGorevAtama);
  } else {
    var baslik=konum+" · "+is;
    gorevEkle(t, baslik, _genelGorevAtama);
  }
  _genelGorevAcik=false; _genelGorevAtama="";
  render();
}

/* Ekrandaki (henüz taslağa yazılmamış) düzenlemeleri taslağa senkronla — satır
   silme/atama değişikliği gibi yapısal güncellemeler diğer satırlardaki elle
   yapılmış düzenlemeleri kaybetmesin diye önce bu çağrılır. */
function topluDOMdanSenkronla(){
  if(!_topluTaslak) return;
  _topluTaslak.forEach(function(t,i){
    var tE=el("tg_tarih_"+i), kE=el("tg_konum_"+i), iE=el("tg_is_"+i);
    if(tE) t.tarih=tE.value;
    if(kE) t.konum=kE.value;
    if(iE) t.is=iE.value;
  });
}
function topluSatirSil(i){
  topluDOMdanSenkronla();
  _topluTaslak.splice(i,1);

function topluTarihBul(text){
  var m = text.toLowerCase().match(/(\d{1,2})\s+(ocak|şubat|subat|mart|nisan|mayıs|mayis|haziran|temmuz|ağustos|agustos|eylül|eylul|ekim|kasım|kasim|aralık|aralik)/i);
  if(!m) return null;
  var gun=parseInt(m[1],10), ay=TOPLU_AYLAR[m[2]];
  if(!ay || !gun) return null;
  var yil=new Date().getFullYear();
  var mm=(ay<10?"0":"")+ay, dd=(gun<10?"0":"")+gun;
  return {tarih: yil+"-"+mm+"-"+dd, satir: m[0]};
}
function topluOdaBul(text){
  var bulunan=[];
  getOdaList().forEach(function(o){
    var m=o.match(/([A-Za-z]+)-(\d+)/); if(!m) return;
    var re=new RegExp("\\b"+m[1]+"\\s*-{0,3}\\s*"+m[2]+"\\b","i");
    if(re.test(text)) bulunan.push(o);
  });
  return bulunan;
}
function topluAtamaBul(text){
  var out=[];
  getEkipler().forEach(function(ek){
    var re=new RegExp("\\b"+ek.ad.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")+"\\b","i");
    if(re.test(text)) out.push("grup:"+ek.id);
  });
  getPersonelList().forEach(function(p){
    var ilkAd=(p.ad||"").trim().split(/\s+/)[0]; if(!ilkAd) return;
    var re=new RegExp("\\b"+ilkAd.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(text)) out.push("kisi:"+p.id);
  });
  return out.filter(function(v,idx){ return out.indexOf(v)===idx; });
}
function topluAyristir(){
  var metin=el("tg_metin").value||"";
  if(!metin.trim()){ toast("Metin boş"); return; }
  var varsayilanTarih=todayISO();
  var tb=topluTarihBul(metin);
  var satirlar=metin.split("\n");
  if(tb){
    varsayilanTarih=tb.tarih;
    /* Tarihin geçtiği satırı (başka içerik taşımıyorsa) metinden çıkar,
       yoksa her işlemin açıklamasında tarih satırı kalıntı olarak kalır */
    satirlar=satirlar.filter(function(s){ return s.toLowerCase().indexOf(tb.satir.toLowerCase())<0 || s.trim().length>tb.satir.length+15; });
  }
  metin=satirlar.join("\n");
  var bloklar=metin.split(/\n\s*\n+/).map(function(b){return b.trim();}).filter(Boolean);
  var taslak=[];
  bloklar.forEach(function(b){
    var odalar=topluOdaBul(b);
    var konum=odalar.length?odalar[0]:"";
    var atama=topluAtamaBul(b).join(",");
    taslak.push({tarih:varsayilanTarih, konum:konum, is:b.replace(/\n/g," / ").trim(), atama:atama});
  });
  if(!taslak.length){ toast("Hiç işlem ayrıştırılamadı"); return; }
  _topluTaslak=taslak;
  render();
}
function topluOnayla(){
  if(!can("edit")) return noPerm();
  topluDOMdanSenkronla();
  var eklenen=0, resmiKayit=0, birlesen=0;
  _topluTaslak.forEach(function(t){
    var konum=(t.konum||"").trim();
    var is=(t.is||"").trim();
    if(!is) return;
    /* Aynı akıllı yönlendirme: konum kayıtlı bir odaya denk geliyorsa ve o odanın
       açık döngüsü varsa, görev otomatik olarak odanın resmi kaydına işlenir.
       Her ikisi de VeyaBirlestir çekirdeğini kullanır — aynı iş (örn. pasteden
       metinde birden fazla satırda geçen "Oda B-1 · Oda boşaltma/yıkama")
       kopya kopya "Atanmamış" görev olarak birikmesin, mevcuda birleşsin. */
    var hedefCycle = konum ? loadData().cycles.find(function(c){ return !c.bosaltimTarihi && normalizeOda(c.oda)===normalizeOda(konum); }) : null;
    if(hedefCycle){
      var yeni1=odaGorevEkleVeyaBirlestir(hedefCycle.id, (t.tarih||todayISO()), is, (t.atama||""));
      if(yeni1) resmiKayit++; else birlesen++;
    } else {
      var baslik = konum ? (konum+" · "+is) : is;
      var yeni2=gorevEkleVeyaBirlestir((t.tarih||todayISO()), baslik, (t.atama||""));
      if(!yeni2) birlesen++;
    }
    eklenen++;
  });
  saveData(); logAudit("toplu görev girişi", eklenen+" işlem işlendi ("+resmiKayit+" oda kaydına, "+birlesen+" zaten vardı)");
  toast(eklenen+" işlem işlendi"+(resmiKayit?(" ("+resmiKayit+" odanın resmi kaydına)"):"")+(birlesen?(", "+birlesen+" zaten vardı"):""));
  _topluAcik=false; _topluTaslak=null;
  render();
}

/* Delta T: kompost sıcaklığı oda sıcaklığından yüksek olmalı (kompost çalışıyor demek).
   Sadece SORUN varsa (eşit ya da ters) gösterilir — normal durumda hiçbir şey çıkmaz.
   EN SON günlük kayda bakılır (bugün girilmemiş olsa bile) — dün sorun varsa uyarı
   bugün de Bildirimler'de görünmeye devam eder, düzelten yeni bir kayıt girilene kadar sönmez. */
function deltaTDurum(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var son = c.gunluk[c.gunluk.length-1];
  var od=numParse(son.odaC), ko=numParse(son.kompostC);
  if(od==null || ko==null) return null;
  if(ko<od) return "kritik";
  if(ko===od) return "esit";
  return null;
}
function deltaTUyariHTML(c){
  var durum = deltaTDurum(c);
  if(!durum) return "";
  var son = c.gunluk[c.gunluk.length-1];
  var kritik = (durum==="kritik");
  return '<div class="card" style="border:2px solid '+(kritik?'var(--red)':'var(--amber)')+'; background:'+(kritik?'var(--red-soft)':'var(--amber-soft)')+'; margin-bottom:12px;">'
    + '<div style="font-weight:700; color:'+(kritik?'var(--red)':'var(--amber)')+';">'
    + (kritik?'🔴 KOMPOST ÇALIŞMIYOR — oda sıcaklığı komposttan yüksek':'🟠 Δ T eşit — kompost henüz ısınmıyor')
    + '</div>'
    + '<div style="margin-top:4px; font-size:14px;">'
    + fmtDate(son.tarih)+' kaydı: oda '+esc(son.odaC)+'°, kompost '+esc(son.kompostC)+'°. '
    + (kritik?'Kompost ısı üretmiyor demektir — ziraat mühendisine bildir, kompost çalıştırılmalı.':'Kompost oda ile aynı sıcaklıkta, henüz çalışmaya başlamamış olabilir — izle.')
    + '</div>'
    + '<div class="muted" style="margin-top:4px; font-size:12px;">Bu uyarı, düzelten yeni bir günlük kayıt girilene kadar kalkmaz.</div>'
    + '</div>';
}
/* Kompost ALT/ÜST sıcaklık farkı — 4°C ve üzeri KRİTİK kabul edilir (Δ T ile aynı önem seviyesi).
   Kompost eşit ısınmıyor demektir — odaya hava vererek sirkülasyon yapılması gerekir. */
function kompostAltUstDurum(c){
  if(!c || !c.gunluk || !c.gunluk.length) return null;
  var son = c.gunluk[c.gunluk.length-1];
  var alt=numParse(son.kompostC), ust=numParse(son.kompostUst);
  if(alt==null || ust==null) return null;
  if((ust-alt)>=4) return "kritik";
  return null;
}
function kompostAltUstUyariHTML(c){
  var durum = kompostAltUstDurum(c);
  if(!durum) return "";
  var son = c.gunluk[c.gunluk.length-1];
  var fark = numParse(son.kompostUst)-numParse(son.kompostC);
  return '<div class="card" style="border:2px solid var(--red); background:var(--red-soft); margin-bottom:12px;">'
    + '<div style="font-weight:700; color:var(--red);">🌬️ KOMPOST ALT-ÜST FARKI YÜKSEK — hava ile sirkülasyon gerekir</div>'
    + '<div style="margin-top:4px; font-size:14px;">'
    + fmtDate(son.tarih)+' kaydı: alt '+esc(son.kompostC)+'°, üst '+esc(son.kompostUst)+'° (fark '+fark+'°C). '
    + 'Kompost eşit ısınmıyor — odaya hava vererek sirkülasyon yapılması önerilir.'
    + '</div>'
    + '<div class="muted" style="margin-top:4px; font-size:12px;">Bu uyarı, düzelten yeni bir günlük kayıt girilene kadar kalkmaz.</div>'
    + '</div>';
}

/* ---------- Sesli not (ses kaydı) — genel amaçlı, herhangi bir formda kullanılabilir ----------
   Tarayıcının mikrofon erişimiyle (MediaRecorder) kısa bir ses kaydı alır, base64 olarak
   geçici bellekte tutar; ilgili "kaydet" fonksiyonu bunu okuyup kalıcı depoya yazar. */
var _sesKayitAktif=null; /* {recorder, hedefId} */
var _sesKayitSonuc={};   /* hedefId -> base64 data URL */
function sesKayitWidgetHTML(hedefId){
  return '<div style="margin-top:8px;">'
    + '<button type="button" class="btn ghost small" id="ses_btn_'+hedefId+'" onclick="sesKayitToggle(\''+hedefId+'\')">🎤 Sesli not kaydet</button>'
    + '<div id="ses_onizleme_'+hedefId+'"></div>'
    + '</div>';
}
function sesKayitToggle(hedefId){
  if(_sesKayitAktif && _sesKayitAktif.hedefId===hedefId){ sesKayitDurdur(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder==="undefined"){
    toast("Bu cihaz/tarayıcı ses kaydını desteklemiyor"); return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var chunks=[];
    var rec;
    try{ rec=new MediaRecorder(stream); }catch(e){ toast("Ses kaydı başlatılamadı"); return; }
    rec.ondataavailable=function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };
    rec.onstop=function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob=new Blob(chunks, {type: rec.mimeType||"audio/webm"});
      var reader=new FileReader();
      reader.onload=function(){
        _sesKayitSonuc[hedefId]=reader.result;
        var onz=el("ses_onizleme_"+hedefId);
        if(onz) onz.innerHTML='<audio controls src="'+reader.result+'" style="width:100%; margin-top:6px;"></audio>'
          + '<div class="muted" style="font-size:12px;">Kayıt hazır — kaydet/ekle butonuna basınca not ile birlikte saklanır.</div>';
      };
      reader.readAsDataURL(blob);
      var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="🎤 Yeniden kaydet";
      _sesKayitAktif=null;
    };
    rec.start();
    _sesKayitAktif={recorder:rec, hedefId:hedefId};
    var btn=el("ses_btn_"+hedefId); if(btn) btn.textContent="⏹ Durdur";
    toast("Kayıt başladı, bitirince ⏹ Durdur'a bas");
  }).catch(function(){ toast("Mikrofon izni verilmedi"); });
}
function sesKayitDurdur(){
  if(_sesKayitAktif && _sesKayitAktif.recorder && _sesKayitAktif.recorder.state!=="inactive"){ _sesKayitAktif.recorder.stop(); }
}

/* ---------- Mühendis notu ekleri (fotoğraf/ses) — cihazda saklanır, senkronize olmaz.
   Not metni (c.notlar) zaten Firebase'e senkronize; foto/ses büyük olabileceğinden
   (Firestore doküman limiti) diğer fotoğraflar gibi sadece cihazda tutulur. */
function notEkKey(id){ return "utp_notek_"+id; }
function loadNotEkler(id){ try{ return JSON.parse(localStorage.getItem(notEkKey(id))||"[]"); }catch(e){ return []; } }
function saveNotEkler(id,arr){ try{ localStorage.setItem(notEkKey(id), JSON.stringify(arr)); return true; }catch(e){ toast("Hafıza dolu — ek kaydedilemedi"); return false; } }
function getMuhendisNotlari(c){ if(!Array.isArray(c.notlar)) c.notlar=[]; return c.notlar; }
function addMuhendisNotu(id){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===id;}); if(!c) return;
  var txt=(el("mn_txt").value||"").trim();
  var sesData=_sesKayitSonuc[id]||null;
  if(!txt && !sesData){ toast("Not yaz ya da sesli not kaydet"); return; }
  getMuhendisNotlari(c).push({tarih:todayISO(), metin:txt||"(sesli not)", by:deviceName()});
  if(sesData){
    var ekler=loadNotEkler(id);
    ekler.push({ts:new Date().toISOString(), tip:"ses", data:sesData});
    saveNotEkler(id, ekler);
    delete _sesKayitSonuc[id];
  }
  saveData(); toast("Not eklendi"); renderDetail(id);
}
function addMuhendisFoto(id, file){
  if(!can("edit")) return noPerm();
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1000, w=img.width, h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      var data=cv.toDataURL("image/jpeg",0.6);
      var ekler=loadNotEkler(id);
      ekler.push({ts:new Date().toISOString(), tip:"foto", data:data});
      if(saveNotEkler(id, ekler)){ toast("Fotoğraf eklendi"); renderDetail(id); }
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
function delNotEk(id,i){
  if(!can("edit")) return noPerm();
  if(!confirm("Bu ek silinsin mi?")) return;
  var arr=loadNotEkler(id); arr.splice(i,1); saveNotEkler(id,arr); renderDetail(id);
}
var _confirmDeleteNot=null;
function delMuhendisNotu(id,i){
  if(!can("edit")) return noPerm();
  var key=id+":"+i;
  if(_confirmDeleteNot!==key){ _confirmDeleteNot=key; renderDetail(id); return; }
  var c=loadData().cycles.find(function(x){return x.id===id;}); if(!c) return;
  getMuhendisNotlari(c).splice(i,1); _confirmDeleteNot=null; saveData(); renderDetail(id);
}
function gecmisOdaNotlari(oda, excludeId){
  var n=normalizeOda(oda); var out=[];
  loadData().cycles.forEach(function(x){
    if(x.id===excludeId || normalizeOda(x.oda)!==n) return;
    getMuhendisNotlari(x).forEach(function(note){ out.push({tarih:note.tarih, metin:note.metin, gelis:x.gelisTarihi}); });
  });
  out.sort(function(a,b){ return cmpDate(b.tarih,a.tarih); });
  return out.slice(0,8);
}

          + '</div>';
      } else if(ek.tip==="ses"){
        h += '<div style="margin-bottom:8px;"><audio controls src="'+ek.data+'" style="width:100%; max-width:280px; vertical-align:middle;"></audio>'

  if(can("edit")){
    h+='<div style="margin-top:10px;"><label>Yeni not</label><textarea id="mn_txt" rows="2" placeholder="örn. Sarım çok kuvvetli, kompost biraz sıcak, 2. flaş güçlü bekleniyor"></textarea>'

      +'</div>'

    gecmis.forEach(function(g){
      h+='<div style="padding:4px 0;font-size:13px;" class="muted"><b>'+fmtDate(g.gelis)+' dönemi</b> ('+fmtDate(g.tarih)+'): '+esc(g.metin)+'</div>';
    });

  }
  h+='</div>';
  return h;

/* ---------- Risk değerlendirmesi / muhtemel neden (kural tabanlı ipucu) ---------- */
function riskDegerlendir(c){
  if(c.bosaltimTarihi) return null;
  var son3=(c.gunluk||[]).slice().sort(function(a,b){return cmpDate(a.tarih,b.tarih);}).slice(-3);
  if(!son3.length) return null;
  var last=son3[son3.length-1];
  var ko=numParse(last.kompostC), od=numParse(last.odaC);
  var nedenler=[], puan=0;
  var yuksekKomp = ko!=null && ko>=KOMPOST_KRITIK_UST;
  var dusukKomp = ko!=null && ko<=KOMPOST_KRITIK_ALT;
  var yuksekOda = od!=null && od>ODA_MAX;
  var co2Val = numParse(last.co2ust); if(co2Val==null) co2Val=numParse(last.co2alt);
  var yuksekCO2 = co2Val!=null && co2Val>3500;
  var nemYuksek = last.nem==="Yüksek";
  var amonyakVar = last.amonyak==="Var";
  var artiyor=false;
  if(son3.length>=2){
    var vals=son3.map(function(r){return numParse(r.kompostC);}).filter(function(v){return v!=null;});
    if(vals.length>=2 && (vals[vals.length-1]-vals[0])>=2) artiyor=true;
  }
  if(yuksekKomp && yuksekCO2 && (nemYuksek||amonyakVar)){
    nedenler.push("Kompost sıcak + CO₂ yüksek"+(nemYuksek?" + nem yüksek":(amonyakVar?" + amonyak var":""))+" birlikte görülüyor — havalandırma yetersiz olabilir.");
    puan+=3;
  } else if(yuksekKomp && yuksekCO2){
    nedenler.push("Kompost sıcak ve CO₂ yüksek — havalandırmayı artırmayı değerlendir.");
    puan+=2;
  }
  if(yuksekKomp && !yuksekCO2 && artiyor){ nedenler.push("Kompost sıcaklığı son ölçümlerde yükseliyor — ateşlenme güçleniyor olabilir, kompost aktivitesi fazla olabilir."); puan+=2; }
  if(dusukKomp){ nedenler.push("Kompost sıcaklığı düşük — misel gelişimi yavaşlayabilir; oda ısıtması/izolasyonu kontrol et."); puan+=1; }
  if(amonyakVar && !yuksekCO2){ nedenler.push("Amonyak kokusu bildirilmiş — kompost fazla ıslak ya da azot dengesi bozuk olabilir, havalandırmayı kontrol et."); puan+=2; }
  if(nemYuksek && yuksekKomp){ nedenler.push("Nem yüksek + kompost sıcak birlikte — sulama fazla kaçmış olabilir."); puan+=1; }
  if(yuksekOda && !airStarted(c)){ nedenler.push("Oda sıcaklığı üst sınırın üzerinde — dış ortam/klima ayarını kontrol et."); puan+=1; }
  if(!nedenler.length) return {seviye:"Düşük", nedenler:[], puan:0};
  var seviye = puan>=4?"Yüksek":(puan>=2?"Orta":"Düşük");
  return {seviye:seviye, nedenler:nedenler, puan:puan};
}
function riskCardHTML(c){
  var r=riskDegerlendir(c);
  if(!r || !r.nedenler.length) return "";
  var renk = r.seviye==="Yüksek"?"#c0291f":(r.seviye==="Orta"?"var(--amber)":"var(--muted)");
  var bg = r.seviye==="Yüksek"?"#fceaea":(r.seviye==="Orta"?"#fff6e5":"#f7f7f5");
  var body='<div style="font-weight:700;color:'+renk+';margin-bottom:6px;">Risk seviyesi: '+r.seviye+'</div>'
    +r.nedenler.map(function(n){ return '<div style="padding:4px 0;font-size:14px;">• '+esc(n)+'</div>'; }).join('')
    +'<div class="muted" style="margin-top:8px;font-size:12px;">Bu değerlendirme kurallara dayalı bir ipucudur, kesin teşhis değildir — son karar ziraat mühendisinindir.</div>';
  return sectionCard('🔍 Risk değerlendirmesi (kural tabanlı ipucu)', body, {border:renk, bg:bg});
}

function setKGNem(id,val){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;});
  if(!c) return;
  c.kgNem=val; touchCycle(c);
  /* Nem YÜKSEK (havalandır) veya DÜŞÜK (nemlendir) ise poşet kompost
     indirmeden 1 gün sonraya çekilir (standart: +6). Normal'e dönülürse
     standart zamanlamaya geri döner. Poşet zaten açılmışsa (gerçek tarih
     kayıtlı) dokunulmaz — geçmiş değiştirilmez. */
  var pi=protokolRolIdx("poset");
  if(pi>=0){
    var pst=getProtokol()[pi];
    if(!adimGercektenYapildiMi(c, pi, pst)){
      if(!c.ertele) c.ertele={};
      var norm=nemNormalize(val);
      if(norm==="yuksek" || norm==="dusuk") c.ertele["p"+pi] = 1-(pst.gun||0);
      else delete c.ertele["p"+pi];
    }
  }
  saveData(); renderDetail(id);
}
var HASTALIK_TURLERI = ["Yeşil küf (Trichoderma)","Dactylium (Örümcek ağı hastalığı)","Mycogone (Islak kabarcık)","Verticillium","Bakteriyel leke","Keçeleşme","Diğer mantar hastalığı","Sinek (Sciarid/Phorid)"];
function hastalikTurRenk(tur){
  if(tur==="Sinek (Sciarid/Phorid)") return "#8e5a1f";
  return "#c0392b";
}
function odaHastalikRiskli(c){
  if(!c || !c.hastalikKayitlar || !c.hastalikKayitlar.length) return false;
  var son14 = addDays(todayISO(), -14);
  return c.hastalikKayitlar.some(function(k){ return k.tarih >= son14; });
}
function addHastalikKayit(id){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;});
  if(!c) return;
  var tarih = el("h_tarih").value || todayISO();
  var tur = el("h_tur").value;
  if(!tur){ toast("Tür seç"); return; }
  var isSinek = (tur==="Sinek (Sciarid/Phorid)");
  var kayit = {
    id: uid(), tarih: tarih, tur: tur,
    taraf: isSinek ? "" : (el("h_taraf").value||""),
    kat: isSinek ? "" : (el("h_kat").value||""),
    bolme: isSinek ? "" : (el("h_bolme").value||""),
    yogunluk: isSinek ? (el("h_yogunluk").value||"") : "",
    not: (el("h_not").value||"").trim()
  };
  if(!c.hastalikKayitlar) c.hastalikKayitlar=[];
  c.hastalikKayitlar.push(kayit);
  c.hastalikKayitlar.sort(function(a,b){ return cmpDate(b.tarih,a.tarih); });
  touchCycle(c); saveData(); logAudit("hastalık kaydı", c.oda+" · "+tur); toast("Kayıt eklendi");
  renderDetail(id);
}
function delHastalikKayit(id,kid){
  if(!can("edit")) return noPerm();
  var d=loadData(); var c=d.cycles.find(function(x){return x.id===id;});
  if(!c||!c.hastalikKayitlar) return;
  c.hastalikKayitlar=c.hastalikKayitlar.filter(function(k){return k.id!==kid;});
  touchCycle(c); saveData(); toast("Kayıt silindi"); renderDetail(id);
}
function hastalikKonumTxt(k){
  if(k.tur==="Sinek (Sciarid/Phorid)") return k.yogunluk ? ("Yoğunluk: "+esc(k.yogunluk)) : "";
  var parts=[];
  if(k.taraf) parts.push(esc(k.taraf));
  if(k.kat) parts.push(esc(k.kat)+". kat");
  if(k.bolme) parts.push(esc(k.bolme)+". bölme");
  return parts.length ? parts.join(" · ") : '<span class="muted">konum girilmedi</span>';
}
function toggleHastalikKonumAlan(){
  var tur = el("h_tur").value;
  var isSinek = (tur==="Sinek (Sciarid/Phorid)");
  ["h_taraf","h_kat","h_bolme"].forEach(function(fid){ var e2=el(fid); if(e2) e2.style.display = isSinek?"none":""; });
  var yEl = el("h_yogunluk"); if(yEl) yEl.style.display = isSinek?"":"none";
}
/* Bir odanın GEÇMİŞ döngülerindeki (bosaltılmış eski cycle'lardaki) hastalık kayıtlarını toplar.
   excludeId: mevcut açık cycle'ı hariç tutmak için (kendi kaydını "geçmiş" olarak göstermesin). */
function odaGecmisHastalik(oda, excludeId){
  var n = normalizeOda(oda);
  var d = loadData();
  var gecmisCycle = (d.cycles||[]).filter(function(x){
    return normalizeOda(x.oda)===n && x.id!==excludeId && x.hastalikKayitlar && x.hastalikKayitlar.length;
  });
  gecmisCycle.sort(function(a,b){ return cmpDate(b.gelisTarihi||"", a.gelisTarihi||""); });
  var out=[];
  gecmisCycle.forEach(function(cy){
    (cy.hastalikKayitlar||[]).forEach(function(k){
      out.push({tur:k.tur, tarih:k.tarih, not:k.not, konum:hastalikKonumTxt(k), gelis:cy.gelisTarihi, bosaltim:cy.bosaltimTarihi});
    });
  });
  return out;
}
function odaGecmisHastalikHTML(oda, excludeId){
  var list = odaGecmisHastalik(oda, excludeId);
  if(!list.length) return "";
  var rows = list.map(function(k){
    return '<div style="padding:6px 0; border-bottom:1px solid #f3d9d6;">'
      + '<b style="color:'+hastalikTurRenk(k.tur)+';">'+esc(k.tur)+'</b> — '+fmtDate(k.tarih)
      + (k.konum && k.konum.indexOf("konum girilmedi")<0 ? '<br><span class="muted" style="font-size:12px;">'+k.konum+'</span>' : '')
      + '<br><span class="muted" style="font-size:12px;">Döngü: geliş '+fmtDate(k.gelis)+(k.bosaltim?(' · boşaltım '+fmtDate(k.bosaltim)):' · devam ediyordu')+'</span>'
      + '</div>';
  }).join('');
  return '<div class="card" style="border:2px solid #c0392b; background:#fdf2f0; margin-bottom:12px;">'
    + '<div style="font-weight:700; color:#c0392b; margin-bottom:6px;">🦠 '+esc(normalizeOda(oda))+' — geçmiş döngülerde görülen hastalıklar</div>'
    + '<div class="muted" style="margin-bottom:8px; font-size:13px;">Bu odada önceki dönemlerde tespit edilen kayıtlar. Kompost sermeden önce oda tam sterilize edildi mi kontrol et — özellikle Dactylium ve Mycogone sporları sterilizasyon eksikse yeni döngüye taşınır.</div>'
    + rows
    + '</div>';
}

    + '<div style="font-weight:700; margin-bottom:6px; '+(riskli?"color:#c0392b;":"")+'">🦠 Hastalık / zararlı takibi'+(riskli?' — son 14 günde kayıt var':'')+'</div>'
    + form
    + list
    + '</div>';
}

function hasatTakipKart(c){
  if(!c) return "";
  var kayitlar = hasatTartiGetir(c.oda, c.tur);
  if(!kayitlar.length) return "";
  var toplamGenel=0;
  var rows = kayitlar.map(function(k){

      + '<td>'+fmtDate(k.tarih)+'</td>'

      + '</tr>';
  }).join("");
  return '<div class="card">'
    + '<div style="font-weight:700; margin-bottom:6px; color:#1f6b38;">🍄 Hasat Takip — günlük tartı (bu tur)</div>'
    + '<div style="overflow-x:auto;"><table style="width:100%; font-size:13px;"><thead><tr>'
    + '<th>Tarih</th><th style="text-align:center;">Flaş</th><th style="text-align:right;">Ana</th><th style="text-align:right;">Kestane</th><th style="text-align:right;">Duble</th><th style="text-align:right;">Dökme</th><th style="text-align:right;">İkinci</th><th style="text-align:right;">Toplam</th>'
    + '</tr></thead><tbody>'+rows+'</tbody>'

    + '</table></div>'
    + '<div class="muted" style="font-size:12px; margin-top:4px;">Bu veriler Hasat Takip programından otomatik gelir.</div>'
    + '</div>';
