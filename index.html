<style>
  :root{
    --green:#1f7a4d; --green-dark:#14583a; --green-soft:#e6f3ec;
    --amber:#b87514; --amber-soft:#faeeda;
    --teal:#0f6e56; --teal-soft:#e1f5ee;
    --harvest:#3b6d11; --harvest-soft:#eaf3de;
    --gray:#5f5e5a; --gray-soft:#f1efe8;
    --red:#a32d2d; --red-soft:#fceaea;
    --bg:#f4f5f3; --card:#ffffff; --line:#dcdcd6;
    --text:#1c1c1a; --muted:#6b6b66;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); font-size:17px; line-height:1.5;
    padding-bottom:130px;
  }
  .bottomnav{position:fixed; left:0; right:0; bottom:0; z-index:40; background:#fff; border-top:1px solid var(--line); display:flex; box-shadow:0 -2px 8px rgba(0,0,0,.08); padding-bottom:env(safe-area-inset-bottom);}
  .bottomnav button{flex:1; background:none; border:none; padding:11px 2px 10px; font-size:12px; color:var(--muted); font-family:inherit; line-height:1.3; min-height:58px;}
  .bottomnav button .ic{display:block; font-size:24px; line-height:1.15; margin-bottom:2px;}
  .bottomnav button.active{color:var(--green); font-weight:700;}
  .bottomnav button:active{background:var(--green-soft);}
  header{
    position:sticky; top:0; z-index:30; background:var(--green); color:#fff;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  header .title{font-size:20px; font-weight:600; flex:1;}
  header button.hbtn{
    background:rgba(255,255,255,.16); color:#fff; border:none; border-radius:10px;
    padding:9px 12px; font-size:15px; font-weight:500;
  }
  header button.hbtn:active{background:rgba(255,255,255,.3);}
  #app{max-width:900px; margin:0 auto; padding:14px;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;}
  .card.tap:active{background:#fafafa;}
  .sec-title{font-size:14px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:22px 4px 8px;}
  .oda-name{font-size:22px; font-weight:700;}
  .badge{display:inline-block; font-size:13px; font-weight:600; padding:4px 11px; border-radius:9px;}
  .b-amber{background:var(--amber-soft); color:var(--amber);}
  .b-teal{background:var(--teal-soft); color:var(--teal);}
  .b-harvest{background:var(--harvest-soft); color:var(--harvest);}
  .b-gray{background:var(--gray-soft); color:var(--gray);}
  .kv{display:flex; justify-content:space-between; gap:12px; padding:5px 0; font-size:16px; border-bottom:1px solid #f0f0ec;}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);}
  .kv .v{font-weight:500; text-align:right;}
  label{display:block; font-size:14px; color:var(--muted); margin:12px 0 5px; font-weight:600;}
  input,select,textarea{
    width:100%; font-size:18px; font-family:inherit; padding:14px 14px;
    border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--text);
    min-height:50px; box-sizing:border-box;
  }
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  .field-row{display:flex; gap:10px;}
  .field-row > div{flex:1;}
  .chk{display:flex; align-items:center; gap:8px; margin-top:8px;}
  .chk input{width:28px; height:28px; min-height:28px;}
  .chk label{margin:0;}
  button.btn{
    border:none; border-radius:12px; padding:16px 20px; font-size:18px; font-weight:700;
    font-family:inherit; background:var(--green); color:#fff; min-height:52px;

  button.btn:active{background:var(--green-dark);}
  button.btn.sec{background:#fff; color:var(--green); border:2px solid var(--green);}
  button.btn.ghost{background:#fff; color:var(--text); border:2px solid var(--line);}
  button.btn.danger{background:#fff; color:var(--red); border:2px solid var(--red);}
  button.small{padding:12px 16px; font-size:16px; min-height:44px;}
  table{width:100%; border-collapse:collapse; font-size:15px;}
  th,td{padding:9px 8px; text-align:center; border-bottom:1px solid var(--line);}

  td.note{text-align:left;}
  .tbl-input{padding:8px 8px; font-size:15px; border:1px solid var(--line); border-radius:8px;}
  .del-x{color:var(--red); font-weight:700; background:none; border:none; font-size:20px; padding:9px 13px; min-height:40px;}
  .fab{
    position:fixed; right:18px; bottom:78px; z-index:40;

  .empty{text-align:center; color:var(--muted); padding:50px 20px;}
  .empty .big{font-size:54px; margin-bottom:10px;}
  .toast{
    position:fixed; left:50%; bottom:150px; transform:translateX(-50%); z-index:60;

  .pill{font-size:13px; color:var(--muted);}
  .hava-temp{font-weight:700; color:var(--teal);}
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal{background:#fff; border-radius:16px; padding:20px; max-width:420px; width:100%;}
  hr{border:none; border-top:1px solid var(--line); margin:18px 0;}
  .muted{color:var(--muted); font-size:14px;}
  .red{color:#c0291f; font-weight:600;}
  .warn{background:#fff6e5; border-left:4px solid var(--amber); padding:10px 12px; border-radius:8px; font-size:14px; margin:8px 0;}

<script>
"use strict";

/* ===================== SENKRON (Firebase Firestore) =====================
   Bo\u015f b\u0131rak\u0131rsan uygulama yaln\u0131zca bu cihazda \u00e7al\u0131\u015f\u0131r (offline, mevcut h\u00e2li).
   Senkron i\u00e7in: Firebase'de \u00fccretsiz proje a\u00e7 -> Firestore Database ba\u015flat ->
   Proje Ayarlar\u0131 > "Web app" yap\u0131land\u0131rmas\u0131n\u0131 a\u015fa\u011f\u0131ya yap\u0131\u015ft\u0131r. FARM_CODE: i\u015fletme kodu. */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyDzG6DG2Z1xbGIBIy7gRM2yTENfrSq7Kh4",
  authDomain: "dirican-mantar.firebaseapp.com",
  projectId: "dirican-mantar",
  storageBucket: "dirican-mantar.firebasestorage.app",
  messagingSenderId: "854408068861",
  appId: "1:854408068861:web:7b358e97db38620d83c894"
};
var FARM_CODE = "merkez";
/* ======================================================================= */

var FB = { ready:false, coll:null, gorevColl:null, arizaColl:null, hasatColl:null, firstServer:false, firstServerG:false, firstServerA:false };
var _synced = {};
var _syncedG = {};
var _syncedA = {};
function cycleJSON(c){ return JSON.stringify(c); }
function fbClean(c){ return JSON.parse(JSON.stringify(c)); }
function rebuildSynced(){ _synced={}; ((memData&&memData.cycles)||[]).forEach(function(c){ _synced[c.id]=cycleJSON(c); }); }
function rebuildSyncedG(){ _syncedG={}; ((memData&&memData.gorevler)||[]).forEach(function(g){ _syncedG[g.id]=cycleJSON(g); }); }
function rebuildSyncedA(){ _syncedA={}; ((memData&&memData.arizalar)||[]).forEach(function(a){ _syncedA[a.id]=cycleJSON(a); }); }
function isTyping(){ var a=document.activeElement; return !!(a && /^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)); }
function fbPendingCount(){
  var n=0;
  ((memData&&memData.cycles)||[]).forEach(function(c){ if(_synced[c.id]!==cycleJSON(c)) n++; });
  ((memData&&memData.gorevler)||[]).forEach(function(g){ if(_syncedG[g.id]!==cycleJSON(g)) n++; });
  ((memData&&memData.arizalar)||[]).forEach(function(a){ if(_syncedA[a.id]!==cycleJSON(a)) n++; });
  return n;
}
function fbSetStatus(s){
  var e=document.getElementById("syncDot"); if(!e) return;
  var bekleyen = (s==="offline"||s==="hata") ? fbPendingCount() : 0;
  var bek = bekleyen>0 ? (" \u00b7 "+bekleyen+" kay\u0131t bekliyor") : "";
  if(s==="synced"){ e.textContent="\u25cf senkron"; e.style.color="#bff5dc"; }
  else if(s==="offline"){ e.textContent="\u25cf \u00e7evrimd\u0131\u015f\u0131"+bek; e.style.color="#ffe0a3"; }
  else if(s==="local"){ e.textContent="\u25cf yerel"; e.style.color="#cfe3ff"; }
  else if(s==="hata"){ e.textContent="\u25cf senkron bekliyor"+bek; e.style.color="#ffb3b3"; }
  else { e.textContent=""; }
}
var _syncFailCount=0;
function fbPushDirty(){
  if(!FB.ready) return;
  ((memData&&memData.cycles)||[]).forEach(function(c){
    var j=cycleJSON(c);
    if(_synced[c.id]!==j){
      FB.coll.doc(c.id).set(fbClean(c)).then(function(){
        _synced[c.id]=j; /* sadece gerçekten başarılı olursa işaretle */
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("set",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDelete(id){
  if(!FB.ready) return Promise.resolve();
  delete _synced[id];
  return FB.coll.doc(id).delete()
    .then(function(){
      /* Silme başarılı — tombstone listesinden çıkar (tekrar gelmez) */
      silinenIdTemizle(id);
    })
    .catch(function(e){
      console.warn("delete hatası", e);
      fbSetStatus("hata");
      /* Hata olsa bile tombstone'da kalır — sonra retry'ı otomatik deneyecek */
      throw e;
    });
}
/* KALICI SİLİNEN KAYIT LİSTESİ (tombstone): bir döngü silindiğinde ID'si buraya
   eklenir. Silme isteği buluta ulaşamadan (yavaş bağlantı, uygulama erken
   kapatılırsa) cihaz kapanırsa, bulut o kaydı hâlâ tutar ve bir sonraki
   senkronda GERİ GELİR — kullanıcı "her kapattığımda eski veri geliyor" diye
   defalarca aynı hayalet kayıtları elle siliyordu. Artık silinen ID'ler ayrı
   bir listede kalıcı tutuluyor; senkronda bu ID'lerden biri tekrar gelirse
   sessizce YOK SAYILIP buluttan bir daha silinir — kullanıcıya hiç görünmez. */
var SILINEN_KEY = "utp_silinenIdler";
function silinenIdlerGetir(){ try{ return JSON.parse(localStorage.getItem(SILINEN_KEY)||"[]"); }catch(e){ return []; } }
function silinenIdEkle(id){
  try{
    var L=silinenIdlerGetir();
    if(L.indexOf(id)<0){ L.push(id); if(L.length>500) L=L.slice(-500); localStorage.setItem(SILINEN_KEY, JSON.stringify(L)); }
  }catch(e){ console.warn("silinen id kaydedilemedi", e); }
}
function silinenIdMi(id){ return silinenIdlerGetir().indexOf(id)>=0; }
/* Silinen ID'sini listeden kaldır (buluta başarıyla gittikten sonra) */
function silinenIdTemizle(id){
  try{
    var L=silinenIdlerGetir();
    L = L.filter(function(x){return x!==id;});
    localStorage.setItem(SILINEN_KEY, JSON.stringify(L));
  }catch(e){ console.warn("silinen id temizleme hatası", e); }
}
function fbPushDirtyGorev(){
  if(!FB.ready || !FB.gorevColl) return;
  ((memData&&memData.gorevler)||[]).forEach(function(g){
    var j=cycleJSON(g);
    if(_syncedG[g.id]!==j){
      FB.gorevColl.doc(g.id).set(fbClean(g)).then(function(){
        _syncedG[g.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setG",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteGorev(id){ if(FB.ready && FB.gorevColl){ delete _syncedG[id]; FB.gorevColl.doc(id).delete().catch(function(e){ console.warn("deleteG",e); fbSetStatus("hata"); }); } }
/* Arızalar (d.arizalar) — KRİTİK: eskiden hiç buluta senkronize edilmiyordu,
   sadece o anki cihazın localStorage'ında kalıyordu. Teknisyenin ekranı,
   Arızalar sekmesinin TEK amacı olduğu için bu, "yöneticinin bildirdiği arıza
   teknisyende hiç görünmüyor" hatasının doğrudan sebebiydi — iki cihaz aynı
   veriyi paylaşmıyordu. gorevler ile birebir aynı desen: kendi Firestore
   koleksiyonu, her arıza kendi dokümanı. */
function fbPushDirtyAriza(){
  if(!FB.ready || !FB.arizaColl) return;
  ((memData&&memData.arizalar)||[]).forEach(function(a){
    var j=cycleJSON(a);
    if(_syncedA[a.id]!==j){
      FB.arizaColl.doc(a.id).set(fbClean(a)).then(function(){
        _syncedA[a.id]=j;
        if(_syncFailCount>0){ _syncFailCount=0; fbSetStatus("synced"); }
      }).catch(function(e){
        console.warn("setA",e);
        _syncFailCount++;
        fbSetStatus("hata");
      });
    }
  });
}
function fbDeleteAriza(id){ if(FB.ready && FB.arizaColl){ delete _syncedA[id]; FB.arizaColl.doc(id).delete().catch(function(e){ console.warn("deleteA",e); fbSetStatus("hata"); }); } }
/* gorevlerMukerrerleriBirlestir()'in kuyruğa aldığı fazlalık bulut dokümanlarını
   siler — bkz. o fonksiyondaki yorum. Bulut hazır değilse sessizce vazgeçer,
   kuyruk (memData._gorevMukerrerSil) diskte kalır, bir sonraki fırsatta
   (30sn'lik senkron döngüsü / bulut bağlantısı kurulunca) tekrar denenir. */
function gorevMukerrerBulutTemizle(){
  if(!FB.ready || !FB.gorevColl) return;
  var d=loadData();
  if(!Array.isArray(d._gorevMukerrerSil) || !d._gorevMukerrerSil.length) return;
  d._gorevMukerrerSil.forEach(function(id){ fbDeleteGorev(id); });
  d._gorevMukerrerSil=[];
  saveData();
}
/* ---- Eşzamanlı düzenleme: döngü birleştirme (veri kaybı olmasın) ---- */
function mergeArr(localArr, remoteArr, keyFn, preferLocal){
  var map={}, order=[];
  function add(arr){ (arr||[]).forEach(function(e){ var k=keyFn(e); if(!(k in map)) order.push(k); map[k]=e; }); }
  if(preferLocal){ add(remoteArr); add(localArr); } else { add(localArr); add(remoteArr); }
  return order.map(function(k){ return map[k]; });
}
/* İki düz obje (key -> değer) için birleştirme: her iki taraftaki TÜM anahtarlar
   korunur, aynı anahtar ikisinde de varsa "tercih edilen" (daha yeni _at'lı) taraf
   kazanır. mergeArr'ın obje versiyonu — dizi olmayan alanlar (done/ertele/
   adimDetay/kontrolKarar) için de aynı "hiçbir taraf sessizce kaybolmasın"
   prensibi geçerli olsun diye. */
function mergeFlatObj(localObj, remoteObj, preferLocal){
  var out={};
  var alt=preferLocal?remoteObj:localObj, ust=preferLocal?localObj:remoteObj;
  if(alt) Object.keys(alt).forEach(function(k){ out[k]=alt[k]; });
  if(ust) Object.keys(ust).forEach(function(k){ out[k]=ust[k]; });
  return out;
}
function mergeCycle(localC, remoteC){
  if(!localC) return remoteC; if(!remoteC) return localC;
  var lAt=localC._at||"", rAt=remoteC._at||"", preferLocal=lAt>rAt;
  var merged=JSON.parse(JSON.stringify(preferLocal?localC:remoteC));
  merged.gunluk=mergeArr(localC.gunluk, remoteC.gunluk, function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hava  =mergeArr(localC.hava,   remoteC.hava,   function(e){return (e.tarih||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.hasat =mergeArr(localC.hasat,  remoteC.hasat,  function(e){return (e.tarih||"")+"|"+(e.tip||"");}, preferLocal).sort(function(a,b){return cmpDate(a.tarih,b.tarih);});
  merged.odaGorevleri=mergeArr(localC.odaGorevleri, remoteC.odaGorevleri, function(e){return e.id||"";}, preferLocal);
  /* KRİTİK: eskiden bu alanlar SADECE daha yeni _at'lı tarafın bütün objesinden
     kopyalanıyordu — iki cihaz aynı anda farklı protokol adımlarını (örn. biri
     "Toprak serildi", diğeri "Tırmık yapıldı") işaretlerse, geç senkron olan
     cihazın işareti sessizce kaybolabiliyordu (bkz. adimTamamla/c.done). Artık
     her iki taraftaki anahtarlar da korunuyor, sadece ÇAKIŞAN anahtarlarda
     "tercih edilen" taraf kazanıyor. */
  merged.done      = mergeFlatObj(localC.done,      remoteC.done,      preferLocal);
  merged.doneSon   = mergeFlatObj(localC.doneSon,   remoteC.doneSon,   preferLocal);
  merged.ertele    = mergeFlatObj(localC.ertele,    remoteC.ertele,    preferLocal);
  merged.adimDetay = mergeFlatObj(localC.adimDetay, remoteC.adimDetay, preferLocal);
  merged.kontrolKarar = mergeFlatObj(localC.kontrolKarar, remoteC.kontrolKarar, preferLocal);
  var tempAckKeys={};
  Object.keys(localC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  Object.keys(remoteC.tempAck||{}).forEach(function(k){ tempAckKeys[k]=1; });
  merged.tempAck={};
  Object.keys(tempAckKeys).forEach(function(k){
    merged.tempAck[k]=mergeFlatObj((localC.tempAck||{})[k], (remoteC.tempAck||{})[k], preferLocal);
  });
  merged._at=(lAt>rAt?lAt:rAt)||merged._at;
  return merged;
}
function fbInit(){
  if(!FIREBASE_CONFIG.projectId){ fbSetStatus("local"); return; }
  if(typeof firebase==="undefined"){ fbSetStatus("local"); console.warn("Firebase SDK y\u00fcklenmedi (ilk a\u00e7\u0131l\u0131\u015fta internet gerekir)."); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    /* GÜVENLİK: Firestore Rules artık "request.auth != null" bekliyor.
       Anonim giriş (kullanıcıya hiç görünmez, şifre gerektirmez) yapmadan
       hiçbir okuma/yazma işlemi çalışmaz. Bu, API key'i bilen rastgele bir
       script/curl isteğinin doğrudan Firestore'a erişmesini engeller —
       sadece gerçek Firebase SDK üzerinden (yani bu uygulama üzerinden)
       bağlanan istekler kabul edilir. */
    firebase.auth().signInAnonymously().then(function(){
      fbInitAfterAuth();
    }).catch(function(e){
      console.error("Anonim giriş başarısız — Firestore Auth Console'da 'Anonymous' etkin mi kontrol et", e);
      fbSetStatus("local");
    });
  }catch(e){
    console.error("Firebase başlatma hatası", e);
    fbSetStatus("local");
  }
}
function fbInitAfterAuth(){
  try{
    var db=firebase.firestore();
    db.enablePersistence({synchronizeTabs:true}).catch(function(e){ console.warn("persistence", e); });
    FB.db=db;
    FB.coll=db.collection("farms").doc(FARM_CODE).collection("cycles");
    FB.gorevColl=db.collection("farms").doc(FARM_CODE).collection("gorevler");
    FB.arizaColl=db.collection("farms").doc(FARM_CODE).collection("arizalar");

    FB.coll.onSnapshot({includeMetadataChanges:true}, function(snap){

        if(data.id && silinenIdMi(data.id)){

          if(li>=0){ var mg=mergeCycle(memData.cycles[li], data); memData.cycles[li]=mg; if(cycleJSON(mg)!==nj) needPush=true; }
          else memData.cycles.push(data);

      if(!FB.firstServer && !snap.metadata.fromCache){

  }catch(e){ console.warn("fbInit",e); fbSetStatus("local"); }
}
var _syncedSettings=null;
var _settingsFirstSyncDone=false; /* buluttan en az bir kez güncel ayar alınana kadar YEREL ayarları buluta göndermeyi engeller — eski veri yeniyi ezmesin */
var _settingsPendingSince=0; /* 0=bekleyen yerel değişiklik yok; aksi halde push'un .set() ile ONAYLANMASINI bekliyoruz — bkz. handleSettingsSnapshot yorumu */
/* farms/{FARM_CODE}/meta/settings dokümanının onSnapshot işleyicisi — test
   edilebilsin diye adlandırılmış bir fonksiyon olarak ayrıldı (sahte bir
   "snap" objesiyle doğrudan çağrılabilir). */
function handleSettingsSnapshot(snap){
  if(!snap.exists){
    /* Bulutta henüz ayar yok — yereldekini ilk kez gönder */
    _settingsFirstSyncDone = true;
    fbPushSettings();
    return;
  }
  var remote = snap.data();
  if(!remote){ _settingsFirstSyncDone = true; return; }
  var j = JSON.stringify(remote);
  _settingsFirstSyncDone = true; /* buluttan en az bir kez veri aldık — artık göndermek güvenli */
  if(_syncedSettings===j) return; /* kendi yazdığımızın yankısı */
  /* KRİTİK: d.settings TEK bir bulut dokümanı olarak, hiçbir alan-bazlı
     birleştirme YAPILMADAN (mergeCycle'ın aksine) senkronize ediliyor.
     Yerelde henüz buluta ULAŞMAMIŞ bir değişiklik varsa (fbPushSettings
     hâlâ bekliyor — örn. reçete satırına az önce "su" eklendi, Kaydet'e
     basıldı ama .set() henüz dönmedi), buluttan bu anda gelen anlık
     görüntü büyük ihtimalle O DEĞİŞİKLİKTEN ÖNCEKİ hali taşıyor. Eskiden
     burada koşulsuz "d.settings=remote" yapılıyordu — kullanıcı Kaydet'e
     basıp "Kaydedildi" görse bile, hemen ardından gelen bu eski anlık
     görüntü değişikliği SESSİZCE siliyordu ("kaydediyorum ama yine eski
     hâline dönüyor" raporu tam olarak buradan geliyordu). Bekleyen yerel
     bir değişiklik varsa buluttan geleni KABUL ETMİYORUZ, bunun yerine
     kendi değişikliğimizi yeniden göndermeyi deniyoruz. */
  if(_settingsPendingSince){ fbPushSettings(); return; }
  _syncedSettings = j;
  var d=loadData();
  d.settings = remote;
  persistEncrypted(JSON.stringify(memData));
  if(!isTyping()) render();
}
function fbPushSettings(){
  if(!FB.ready || !FB.settingsDoc) return;
  if(!_settingsFirstSyncDone) return; /* henüz buluttaki güncel hali görmedik — göndermek riskli, bekle */
  var d=loadData(); if(!d.settings) d.settings={};
  var j=JSON.stringify(d.settings);
  if(_syncedSettings===j) return;
  if(!_settingsPendingSince) _settingsPendingSince=Date.now();
  FB.settingsDoc.set(fbClean(d.settings)).then(function(){
    _syncedSettings=j;
    _settingsPendingSince=0;
  }).catch(function(e){ console.warn("setSettings",e); fbSetStatus("hata"); });
}

/* Belirli oda+tur için Hasat Takip kayıtlarını getir (tarihe göre sıralı) */
function hasatTartiGetir(oda, tur){
  var out=[];
  var store=window._hasatTarti||{};
  Object.keys(store).forEach(function(k){
    var d=store[k];
    if(d && d.oda===oda && String(d.tur)===String(tur)) out.push(d);
  });
  out.sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  return out;
}


/* ---------- Depolama (offline, localStorage + bellek yedeği) ---------- */
var STORE_KEY = "uretim_takip_v1";
var APP_VER = "v332";
var memData = null;
var _veriOkumaHatasi=false;
function loadData(){
  if(memData) return memData;
  var raw=null;
  try{ raw = localStorage.getItem(STORE_KEY); }
  catch(e){ console.error("localStorage okunamadı", e); }
  if(raw){
    try{
      memData = JSON.parse(raw);
      /* GÜVENLİK AĞI: raw, PIN ile şifrelenmiş zarf ({enc:1,salt,iv,ct}) olabilir —
         bu senkron yol onu ÇÖZEMEZ (şifre çözme asenkron). Zarfı gerçek veriymiş
         gibi kabul edip memData.cycles'ı sessizce boşaltmak yerine (geçmişte tam
         olarak bu, "odalar silindi" görünümüne yol açan bir veri kaybı bugı
         yaratmıştı — bkz. resumeYenidenYukle), burada NET biçimde reddedip
         pinBoot/resumeYenidenYukle'nin doğru (asenkron) yoldan doldurmasını
         bekleriz. */
      if(memData && memData.enc===1){
        console.error("loadData(): şifreli zarf senkron yoldan okunmaya çalışıldı — çözülmeden kullanılmayacak");
        memData = null;
        return {cycles:[]};
      }
    }catch(e){
      console.error("Kayıtlı veri bozuk — JSON.parse hatası", e);
      /* Bozuk ham veriyi ASLA kaybetme: ayrı bir anahtara yedekle ki elle kurtarılabilsin.
         Aksi halde ilk saveData() bozuk veriyi ezerdi ve geri dönüşü olmazdı. */
      try{ localStorage.setItem(STORE_KEY+"_bozuk_"+Date.now(), raw); }catch(e2){ console.error("bozuk veri yedeklenemedi", e2); }
      _veriOkumaHatasi=true;
      memData = {cycles:[]};
    }
  } else {
    memData = {cycles:[]};
  }
  memDataNormalizeVeGoc();
  return memData;
}
/* loadData()'nın alan-varsayılanı + tek seferlik göç mantığı — PIN akışları
   (pinBoot/pinKilidiAc/resumeYenidenYukle) memData'yı loadData()'nın senkron
   soğuk yolundan GEÇMEDEN doğrudan atadığı için (şifre çözme asenkron olduğu
   için zorunlu), bu adımı KENDİLERİ de çağırmalı — aksi halde örn. yeni bir
   kurulumda memData={cycles:[]} kalır, memData.gorevler hiç oluşmaz ve ilk
   "Görev ekle" TypeError ile çöker (KRİTİK BUG, düzeltildi). */
function memDataNormalizeVeGoc(){
  if(!memData || typeof memData !== "object") memData = {cycles:[]};
  if(!Array.isArray(memData.cycles)) memData.cycles = [];
  if(!memData.settings || typeof memData.settings !== "object") memData.settings = {};
  if(!Array.isArray(memData.gorevler)) memData.gorevler = [];
  if(!Array.isArray(memData.arizalar)) memData.arizalar = [];
  gunlukKayitlariniBirlestir();
  /* Tekrar eden günlük notları ("Yarına planlandı · Yarına planlandı" gibi) temizle.
     Oturum başına bir kez; hem eski v173 kayıtlarını hem senkron duplicate'lerini düzeltir. */
  var _degMigrasyon = gunlukEskiNotlariAyir(memData);
  var _degTekil = gunlukNotlariTekille(memData);
  var _degKompostInd = kompostIndirmeGeriyeDonukDoldur(memData);
  var _degGorevMukerrer = gorevlerMukerrerleriBirlestir(memData);
  if(_degMigrasyon || _degTekil || _degKompostInd || _degGorevMukerrer) saveData();
}
/* TEK SEFERLİK GEÇİŞ: gorevEkleVeyaBirlestir/odaGorevEkleVeyaBirlestir düzeltmesinden
   ÖNCE oluşmuş mükerrer görevleri (örn. "Oda B-1 · Oda boşaltma/yıkama" x4, hepsi
   Atanmamış) temizler. Yeni kopya oluşumu artık engelleniyor ama var olan eski
   kopyalar veride kalıyordu — kullanıcı ekranda aynı görevi 4 kez görmeye devam
   ediyordu (bkz. ekran görüntüsü raporu). Aynı tarih+başlık(+is)+done durumundaki
   satırları TEK satırda birleştirir (atamaları birleştirerek), fazlalıkları siler.
   İdempotent — mükerrer kalmayınca hiçbir şeyi değiştirmez, her yüklemede güvenle
   çalışır. */
function gorevlerMukerrerleriBirlestir(d){
  if(!d) return false;
  var degisti=false;
  if(Array.isArray(d.gorevler) && d.gorevler.length>1){
    var gruplar={}, sira=[];
    d.gorevler.forEach(function(g){
      var k=(g.tarih||"")+"||"+(g.baslik||"")+"||"+(g.done?"1":"0");
      if(!gruplar[k]){ gruplar[k]=[]; sira.push(k); }
      gruplar[k].push(g);
    });
    var yeni=[];
    sira.forEach(function(k){
      var grup=gruplar[k];
      if(grup.length===1){ yeni.push(grup[0]); return; }
      degisti=true;
      var ana=grup[0];
      var arr=atamaParse(ana.atama||"");
      for(var i=1;i<grup.length;i++){
        atamaParse(grup[i].atama||"").forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
        /* KRİTİK: genel görevler tek tek ayrı Firestore dokümanı olarak da
           senkronize ediliyor (gorevColl). Burada sadece memData.gorevler'den
           silmek YETMEZ — buluttaki fazlalık doküman duruyor olsa, bir sonraki
           onSnapshot'ta (özellikle her açılışın İLK anlık görüntüsünde, "added"
           olarak) sessizce GERİ GELİYORDU — kullanıcı düzeltmenin hiç işe
           yaramadığını görüyordu ("bu düzelmemiş"). Silinecek fazlalık ID'leri
           kuyruğa al, buluta bağlantı olur olmaz gorevMukerrerBulutTemizle()
           gerçek silmeyi yapsın. */
        if(grup[i].id){ if(!d._gorevMukerrerSil) d._gorevMukerrerSil=[]; if(d._gorevMukerrerSil.indexOf(grup[i].id)<0) d._gorevMukerrerSil.push(grup[i].id); }
      }
      ana.atama=arr.join(",");
      yeni.push(ana);
    });
    if(degisti) d.gorevler=yeni;
  }
  (d.cycles||[]).forEach(function(c){
    if(!Array.isArray(c.odaGorevleri) || c.odaGorevleri.length<2) return;
    var gruplar={}, sira=[];
    c.odaGorevleri.forEach(function(g){
      var k=(g.tarih||"")+"||"+(g.is||"")+"||"+(g.done?"1":"0");
      if(!gruplar[k]){ gruplar[k]=[]; sira.push(k); }
      gruplar[k].push(g);
    });
    var yeni=[]; var buDegisti=false;
    sira.forEach(function(k){
      var grup=gruplar[k];
      if(grup.length===1){ yeni.push(grup[0]); return; }
      buDegisti=true;
      var ana=grup[0];
      var arr=atamaParse(ana.atama||"");
      for(var i=1;i<grup.length;i++){
        atamaParse(grup[i].atama||"").forEach(function(a){ if(arr.indexOf(a)<0) arr.push(a); });
      }
      ana.atama=arr.join(",");
      yeni.push(ana);
    });
    if(buDegisti){ c.odaGorevleri=yeni; degisti=true; }
  });
  return degisti;
}
/* TEK SEFERLİK GEÇİŞ: Zaten aktif olan (kompost içinde, günlük ölçüm giriliyor)
   odalarda kompostIndirme hiç set edilmemiş olabilir (bu düzeltmeden önce oluşturulmuş
   odalar). "Oda var = kompost zaten konmuş = indirilmiş" mantığıyla geriye dönük
   dolduruyoruz — böylece "Yarın planlanan"da anlamsız bir "kompost indirme" görevi
   kırmızı görünmeye devam etmez. İdempotent, zaten dolu olanlara dokunmaz. */
function kompostIndirmeGeriyeDonukDoldur(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  d.cycles.forEach(function(c){
    if(c.bosaltimTarihi) return; /* boşaltılmış eski odaları geriye dönük değiştirmeye gerek yok */
    if((!c.kompostIndirme || !c.kompostIndirme.tarih) && c.gelisTarihi){
      c.kompostIndirme={tarih:c.gelisTarihi};
      degisti=true;
    }
  });
  return degisti;
}
/* TEK SEFERLİK GEÇİŞ (v187 öncesi kayıtlar için): eskiden protokol notları
   ("X yapıldı", "X ertelendi" vb.) sulama alanına karışık yazılıyordu. Bunları
   islemNot'a ayırır. Desen eşleşmeyen (gerçek sulama/ilaç metni) sulama'da kalır.
   "Yarın için değişiklik: ..." notları TAŞINMAZ, tamamen SİLİNİR — o bilgi zaten
   c.yarinDegisiklik içinde ayrıca saklı ve Yarın sütununda mavi gösteriliyor;
   Bugün İşlem kutusunda tekrar göstermek sadece kalabalık yapıyordu.
   İdempotent — zaten temiz kayıtlarda hiçbir şeyi değiştirmez, her seferinde
   çalıştırmak güvenlidir. */
function gunlukEskiNotlariAyir(d){
  if(!d || !d.cycles) return false;
  var degisti=false;
  var silDeseni=/^(değişiklik|yarın için değişiklik)\s*:/i;
  var tasiDeseni=/(yapıldı|ertelendi|planlandı|çekildi|hatırlatılacak)\s*(\([^)]*\))?\s*$/i;
  d.cycles.forEach(function(c){
    if(!c.gunluk) return;
    c.gunluk.forEach(function(g){
      if(g.sulama){
        var parcalar=(""+g.sulama).split(" · ").map(function(x){return x.trim();}).filter(Boolean);
        var kalanSulama=[], tasinacak=[];
        parcalar.forEach(function(p){
          if(silDeseni.test(p)){ degisti=true; return; } /* tamamen at */
          (tasiDeseni.test(p)?tasinacak:kalanSulama).push(p);
        });
        var yeniSulama=kalanSulama.join(" · ");
        if(yeniSulama!==g.sulama){ g.sulama=yeniSulama; degisti=true; }
        tasinacak.forEach(function(t){
          var mevcut=(""+(g.islemNot||"")).split(" · ").map(function(x){return x.trim();});
          if(mevcut.indexOf(t)>=0) return;
          g.islemNot = g.islemNot ? (g.islemNot+" · "+t) : t;
          degisti=true;
        });
      }
      /* islemNot'ta zaten "değişiklik:" notu varsa (v187-v189 arası kısa süre
         böyle yazılmıştı) onu da temizle */
      if(g.islemNot){
        var inP=(""+g.islemNot).split(" · ").map(function(x){return x.trim();}).filter(Boolean);
        var inK=inP.filter(function(p){ return !silDeseni.test(p); });
        if(inK.length!==inP.length){ g.islemNot=inK.join(" · "); degisti=true; }
      }
    });
  });
  return degisti;
}

function gunlukKayitlariniBirlestir(){

  var degisti=false;
  (memData.cycles||[]).forEach(function(c){
    if(!Array.isArray(c.gunluk) || c.gunluk.length<2) return;
    var byTarih={}; var yeni=[];
    c.gunluk.forEach(function(r){
      var t=r&&r.tarih; if(!t) return;
      if(!byTarih[t]){ byTarih[t]=r; yeni.push(r); }
      else{
        degisti=true;
        var mevcut=byTarih[t];
        ["odaC","kompostC","kompostUst","klimaC","co2alt","co2ust","su"].forEach(function(k){
          if(!mevcut[k] && r[k]) mevcut[k]=r[k];
        });
        if(r.sulama && r.sulama!==mevcut.sulama){
          mevcut.sulama = mevcut.sulama ? (mevcut.sulama+" · "+r.sulama) : r.sulama;
        }
        if(r.vakit) mevcut.vakit=r.vakit;

}

/* ================= PIN KİLİDİ + YEREL VERİ ŞİFRELEME =================
   Cihazdaki iş verisi (ciro/hasat/personel kayıtları) artık düz metin değil,
   kullanıcının belirlediği PIN'den türetilen bir anahtarla AES-256-GCM ile
   şifrelenmiş olarak localStorage'da tutuluyor. PIN yalnızca bu cihazda
   bilinir, hiçbir yere (buluta dahil) gönderilmez — unutulursa cihazdaki
   şifreli veri kurtarılamaz (bulut senkronu açıksa oradan geri gelir).
   Kilit açma anahtarı sessionStorage'da tutulur: sekme tamamen kapanınca
   silinir, aynı sekmede sayfa yenilemede tekrar PIN sormaz — güvenlik ile
   kullanılabilirlik arasında bilinçli bir denge. */
var PIN_CFG_KEY = "utp_pinCfg";        /* localStorage: {salt} — PIN'in kendisi HİÇ saklanmaz */
var PIN_SESSION_KEY = "utp_pinOturum"; /* sessionStorage: türetilmiş ham anahtar — sekme ömrü */
var _pinKey = null; /* CryptoKey — yalnızca bellekte */
function b64FromBuf(buf){
  var bytes=new Uint8Array(buf), bin="";
  for(var i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function bufFromB64(b64){
  var bin=atob(b64), bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}
function pinCfgOku(){ try{ return JSON.parse(localStorage.getItem(PIN_CFG_KEY)||"null"); }catch(e){ return null; } }
async function pinAnahtarTuret(pin, saltB64){
  var baseKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(pin), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:bufFromB64(saltB64), iterations:150000, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, true, ["encrypt","decrypt"]
  );
}
async function pinSifrele(key, metin){
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var ct=await crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, key, new TextEncoder().encode(metin));
  return {iv:b64FromBuf(iv), ct:b64FromBuf(ct)};
}
async function pinCoz(key, ivB64, ctB64){
  var pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:bufFromB64(ivB64)}, key, bufFromB64(ctB64));
  return new TextDecoder().decode(pt);
}
/* ================= IndexedDB (ana veri deposu) =================
   localStorage'ın ~5-10MB sınırı büyüdükçe (yıllar boyu biriken günlük
   kayıtlar) yetersiz kalabilir. Ana şifreli veri bloğu (STORE_KEY) artık
   IndexedDB'de tutuluyor — çok daha büyük kota. IndexedDB kullanılamazsa
   (eski tarayıcı, kısıtlı bağlam) localStorage'a sessizce düşülür —
   crypto.subtle yoksa düz metin moduna düşen mantıkla aynı desen.
   Küçük anahtarlar (PIN_CFG_KEY, oturum vb.) hala localStorage/sessionStorage'da —
   senkron okunmaları gerekiyor, boyutları zaten önemsiz. */
var IDB_NAME = "utp_db", IDB_STORE = "kv", IDB_VERSION = 1;
var _idbPromise = null;
function idbAc(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise(function(resolve, reject){
    if(!window.indexedDB){ reject(new Error("indexedDB yok")); return; }
    var req;
    try{ req = indexedDB.open(IDB_NAME, IDB_VERSION); }catch(e){ reject(e); return; }
    req.onupgradeneeded = function(){ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
  return _idbPromise;
}
function idbGet(key){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var req;
      try{ req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(key); }catch(e){ reject(e); return; }
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  });
}
function idbSet(key, val){
  return idbAc().then(function(db){
    return new Promise(function(resolve, reject){
      var tx;
      try{ tx = db.transaction(IDB_STORE, "readwrite"); tx.objectStore(IDB_STORE).put(val, key); }catch(e){ reject(e); return; }
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
      tx.onabort = function(){ reject(tx.error||new Error("işlem iptal edildi")); };
    });
  });
}
/* STORE_KEY'i okur; IndexedDB'de yoksa localStorage'a bakar (eski v≤310
   kurulumları ya da IndexedDB'nin henüz tarafına hiç yazılmamış olması) ve
   bulursa TEK SEFERLİK IndexedDB'ye taşır (başarılı taşımadan SONRA
   localStorage'dan siler — asıl kazanılan alan bu). */
async function storeKeyOku(){
  try{
    var v = await idbGet(STORE_KEY);
    if(v!=null) return v;
  }catch(e){ console.warn("IndexedDB okunamadı, localStorage'a bakılıyor", e); }
  var raw=null;
  try{ raw=localStorage.getItem(STORE_KEY); }catch(e){ console.warn("localStorage okunamadı", e); }
  if(raw!=null){
    try{
      await idbSet(STORE_KEY, raw);
      try{ localStorage.removeItem(STORE_KEY); }catch(e){ console.warn("eski localStorage kaydı silinemedi (önemli değil)", e); }
    }catch(e){ console.warn("IndexedDB'ye taşınamadı, localStorage'da kalmaya devam ediyor", e); }
  }
  return raw;
}
function storeKeyYaz(str){
  return idbSet(STORE_KEY, str).catch(function(e){
    console.warn("IndexedDB'ye yazılamadı, localStorage'a düşülüyor", e);
    localStorage.setItem(STORE_KEY, str); /* kota hatası burada fırlarsa çağıran yakalar */
  });
}
/* Üst üste gelen saveData() çağrıları birbirini yarışta ezmesin diye
   yazmalar bir zincirde (kuyrukta) sırayla işlenir. */
var _pinSaveChain = Promise.resolve();
function persistEncrypted(jsonStr){
  if(!_pinKey){ return; } /* kilit açılmadan buraya düşülmemeli, güvenlik ağı */
  _pinSaveChain = _pinSaveChain.then(function(){
    return pinSifrele(_pinKey, jsonStr);
  }).then(function(payload){
    var cfg=pinCfgOku()||{};
    return storeKeyYaz(JSON.stringify({enc:1, salt:cfg.salt, iv:payload.iv, ct:payload.ct}));
  }).then(function(){
    _quotaWarnShown=false; /* bir sonraki dolma anında tekrar uyarabilelim */
  }).catch(function(e){
    console.error("şifreli kayıt yazılamadı", e);
    /* KRİTİK: Depolama dolduğunda sessizce geçmek veri kaybına yol açar —
       kullanıcı "kaydettim" sanır ama değişiklik sadece bellekte (memData)
       kalır, sayfa kapanınca kaybolur. Kota dolma hatası özel olarak
       yakalanıp AÇIKÇA bildirilir — sadece console'a değil. */
    var isQuota = (e && (e.name==="QuotaExceededError" || e.code===22 || e.code===1014 || /quota/i.test(e.message||"")));
    if(isQuota && !_quotaWarnShown){
      _quotaWarnShown=true;
      showWarnBox("⚠️ Depolama Doldu", [
        "Cihazın hafızası doldu — <b>son değişiklik cihaza kaydedilemedi.</b>",
        FB.ready ? "Bulut senkronu açık — az önceki değişiklik oradan kurtarılabilir, ama emin olmak için hemen bir yedek al." : "⚠️ Bulut senkronu KAPALI — bu değişiklik kaybolmuş olabilir!",
        "Çözüm: Ayarlar → Yedekleme'den JSON indir, sonra eski fotoğrafları (özellikle sesli/fotoğraflı kayıtları) sil.",
        "Silme sonrası tekrar dene — bu uyarı kaybolursa kayıt başarılı demektir."
      ]);
    }
  });
}

function normalizeOda(s){
  if(!s) return "";

  var m = x.match(/([A-Z]+)\s*[-\/ .]?\s*(\d+)/);
  if(m) return m[1] + "-" + parseInt(m[2],10);
  return x.replace(/\s+/g,"");
}

function atamaCokluHTML(mevcut, onclickExpr){
  var secili=atamaParse(mevcut);
  var ekipler=getEkipler();
  function rozet(val,label,renk){
    var on=secili.indexOf(val)>=0;
    return '<button type="button" onclick="'+onclickExpr(val)+'" '
      +'style="display:inline-block; margin:3px; padding:4px 10px; border-radius:14px; border:1.5px solid '+renk+'; font-size:13px; cursor:pointer; '
      +(on?('background:'+renk+'; color:#fff;'):('background:#fff; color:'+renk+';'))+'">'+esc(label)+'</button>';
  }
  var h='<div style="margin-top:4px;">';
  h+='<div style="font-size:12px; color:#888; margin:2px;">Grup:</div>';
  ekipler.forEach(function(ek){ h+=rozet("grup:"+ek.id, "👥 "+ek.ad, ekipRenk(ek.id)); });
  ekipler.forEach(function(ek){
    var uyeler=getPersonelList().filter(function(p){return p.grup===ek.id;});
    if(uyeler.length){
      h+='<div style="font-size:12px; color:#888; margin:4px 2px 2px;">'+esc(ek.ad)+':</div>';
      uyeler.forEach(function(p){ h+=rozet("kisi:"+p.id, p.ad, ekipRenk(ek.id)); });
    }
  });
  h+='</div>';
  return h;
}
function atamaLabel(val){
  if(!val) return "";
  var parts=atamaParse(val);
  if(!parts.length) return "";
  return parts.map(function(v){
    if(v.indexOf("grup:")===0) return "👥 "+ekipAdi(v.slice(5));
    if(v.indexOf("kisi:")===0){ var p=personelBul(v.slice(5)); return p?("👤 "+esc(p.ad)):"👤 (silinmiş)"; }
    return "";
  }).filter(Boolean).join(" · ");
}
/* Atanan grup/kişi kodlarını gerçek isim listesine çevirir (WhatsApp mesajı için) */
function atamaIsimListesi(val){
  var parts=atamaParse(val); var isimler=[];
  parts.forEach(function(p){
    if(p.indexOf("grup:")===0){
      var gid=p.slice(5);
      getPersonelList().filter(function(x){return x.grup===gid;}).forEach(function(x){ if(isimler.indexOf(x.ad)<0) isimler.push(x.ad); });
    }
    else if(p.indexOf("kisi:")===0){ var per=personelBul(p.slice(5)); if(per && isimler.indexOf(per.ad)<0) isimler.push(per.ad); }
  });
  return isimler;
}
/* Görev metnini kısaltır: parantez/tire sonrası uzun açıklamaları atar (WhatsApp mesajı kısa olsun) */
function kisaGorevAdi(txt){
  if(!txt) return "";
  var t=(""+txt).split(" (")[0].split(" — ")[0].split(" · ")[0];
  return t.trim();
}
/* Oda + görev + atanan personel isimlerini WhatsApp'a göndermek üzere hazırlar */
/* --- Toplu görev seçimi: birden fazla görevi işaretleyip TEK WhatsApp mesajında gönder ---
   Anahtar: protokol görevi için "cid|idx", kompost indirme görevi için "plan|planId". */
var _gorevSecili={};
function gorevSecAnahtar(i){
  if(i.plan) return "plan|"+i.planId;
  if(i.odaGorev) return "og|"+i.ogId;
  if(i.gg) return "gg|"+i.ggId;
  return i.cid+"|"+i.idx;
}
function gorevSecili(i){ return !!_gorevSecili[gorevSecAnahtar(i)]; }
function gorevSecToggle(anahtar){
  if(_gorevSecili[anahtar]) delete _gorevSecili[anahtar]; else _gorevSecili[anahtar]=true;
  render();
}
function gorevSecSayisi(){ return Object.keys(_gorevSecili).length; }
function gorevSecTemizle(){ _gorevSecili={}; render(); }
function gorevSecBarHTML(){
  var n=gorevSecSayisi();
  if(!n) return "";
  return '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; background:#eafbef; border:1.5px solid var(--green); border-radius:8px; padding:8px 10px; margin-bottom:10px; flex-wrap:wrap;">'
    +'<span style="font-weight:700; font-size:14px;">📋 '+n+' görev seçili</span>'
    +'<span style="display:flex; gap:6px;"><button class="btn small" onclick="gorevTopluGonder()">WhatsApp\'a Gönder</button> <button class="btn ghost small" onclick="gorevSecTemizle()">Temizle</button></span>'
    +'</div>';
}
/* Seçili görevlerin tamamını, oda + iş + atanan kişilerle tek mesajda birleştirir.
   Protokol görevleri + oda işlemleri (odaGorev) + genel/serbest görevler hepsi dahil. */
function gorevTopluMesajOlustur(){
  var items=nextTasks();
  var lines=[];
  items.forEach(function(i){
    if(!gorevSecili(i)) return;
    if(i.odaGorev){
      lines.push("📅 "+fmtDate(i.date)+" · 🏠 "+(i.oda||"")+": "+kisaGorevAdi(i.txt||""));
      return;
    }
    var isimler=atamaIsimListesi(i.atama||"");
    var satir="📅 "+fmtDate(i.date)+" · 🏠 "+(i.oda||"")+": "+kisaGorevAdi(i.txt||"");
    if(isimler.length) satir+="\n   👤 "+isimler.join(", ");
    lines.push(satir);
  });
  getGorevler().filter(function(g){return !g.done && g.tarih;}).forEach(function(g){
    if(!_gorevSecili["gg|"+g.id]) return;
    var isimler=atamaIsimListesi(g.atama||"");
    var satir="📅 "+fmtDate(g.tarih)+" · 🧹 "+kisaGorevAdi(g.baslik||"");
    if(isimler.length) satir+="\n   👤 "+isimler.join(", ");
    lines.push(satir);
  });
  if(!lines.length) return null;
  return "📋 GÖREV PLANI\n\n"+lines.join("\n\n");
}
function gorevTopluGonder(){
  var msg=gorevTopluMesajOlustur();
  if(!msg){ toast("Önce en az bir görev seç"); return; }
  window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).catch(function(e){ console.warn("clipboard", e); }); }
  _gorevSecili={};
  toast("✓ Gönderildi — seçim temizlendi");
  render();
}
function gorevPlanlaGonder(oda, txt, atamaVal, tarihISO){
  var isimler=atamaIsimListesi(atamaVal);
  if(!isimler.length){ toast("Önce personel/ekip seç"); return; }
  var mesaj="📋 GÖREV\n\n"
    +"📅 "+fmtDate(tarihISO||todayISO())+"\n"
    +"🏠 "+(oda||"")+"\n"
    +"🔧 "+kisaGorevAdi(txt)+"\n"
    +"👤 "+isimler.join(", ");
  /* Not: chat.whatsapp.com grup davet linkleri metin ön-doldurmayı desteklemiyor.
     wa.me/?text= WhatsApp'ı mesaj hazır açar, hangi sohbete gönderileceğini kullanıcı seçer. */
  window.open("https://wa.me/?text="+encodeURIComponent(mesaj), "_blank");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(mesaj).catch(function(e){ console.warn("clipboard", e); }); }
}

/* Parti no = geliş tarihi (ddmmyyyy) */
function partiFromDate(iso){
  if(!iso) return "";
  var p=iso.split("-"); if(p.length!==3) return "";
  return p[2]+p[1]+p[0];
}

var PROTOKOL_SURUM = 6; /* v6: Üretim zinciri yeniden kuruldu — Kompost indirme (gelis+0, YENİ) → Poşet (indirmeden+6, artık geliş yerine indirmeye bağlı) → Tiftik (gelis+7, bağımsız) → Toprak (offToprak, bağımsız) → Tırmık (toprak+7) → Hava (artık tırmık+3, eskiden toprak+10 sabitti) → Hasat (artık hava+11, eskiden toprak+20 sabitti). Poşet/tiftik gecikmesi sonrakini ETKİLEMEZ; kompost indirme/toprak/tırmık/hava gecikmesi bir SONRAKİ adımı ETKİLER (otomatik kayar). */
/* KRİTİK FIX: Kullanıcı protokolünü v158'den (rol sistemi) ÖNCE özelleştirmişse,
   protokolOzellestirildi bayrağı zaten true olduğu için normal senkron mekanizması
   bir daha çalışmaz — bu da "rol" alanının hiç eklenmemesine yol açar! Sonuç: sistem
   hâlâ eski, kırılgan metin eşleşmesine (regex) düşer, "Tiftik yapıldı" gibi durumlar
   Görevler ile Bilgileri Düzenle arasında tutarsız görünür.
   Bu fonksiyon SADECE eksik rol etiketlerini, mevcut metne bakarak BİR KERELİK tahmin
   edip doldurur — metni/günü/hiçbir şeyi değiştirmez, protokolOzellestirildi'den
   bağımsız olarak HER ZAMAN çalışır (çünkü sadece eksiği tamamlar, asla üzerine yazmaz). */
function protokolRolleriTamamla(P){
  if(!Array.isArray(P)) return;
  var atanmis={};
  P.forEach(function(s){ if(s && s.rol) atanmis[s.rol]=true; });
  ["poset","tiftik","toprak","tirmik","hasat","hava","kompostindirme"].forEach(function(rol){
    if(atanmis[rol]) return;
    var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return;
    var sahipGerekli=(rol==="tiftik"||rol==="toprak"||rol==="tirmik")?"ekip":null;
    var bulunanIdx=-1;
    /* 1. deneme: metin + sahip ikisi de uysun (en kesin eşleşme) */
    for(var i=0;i<P.length;i++){
      if(P[i] && !P[i].silindi && P[i].tip==="olay" && re.test(P[i].txt||"") && (!sahipGerekli||P[i].sahip===sahipGerekli)){ bulunanIdx=i; break; }
    }
    /* 2. deneme: bulunamadıysa (kullanıcı sahip'i değiştirmiş/farklı bırakmış olabilir),
       sadece metne bak — hiç rol atanmamaktansa daha toleranslı eşleşme daha güvenli */
    if(bulunanIdx<0){
      for(var j=0;j<P.length;j++){
        if(P[j] && !P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt||"")){ bulunanIdx=j; break; }
      }
    }
    if(bulunanIdx>=0){ P[bulunanIdx].rol=rol; return; }
    /* 3. SATIR HİÇ YOK: kullanıcının donmuş (protokolOzellestirildi) protokolü bu
       adımın eklenmesinden ÖNCE oluşturulmuş olabilir (örn. "Kompost indirme"
       v6'da eklendi — daha eski kopyalarda hiç satır yok). Bu durumda "sıradaki
       işlem" hesaplaması bu adımın referans tarihini bulamaz (null döner), adım
       SESSİZCE atlanır ve sıra bozulur (örn. Poşet/Tiftik atlanıp doğrudan
       Toprak "sıradaki" gösterilir — KRİTİK BUG, düzeltildi). Eksik zorunlu
       adım varsayılandan (PROTOKOL dizisi) SONA eklenir — mevcut index'leri
       (c.ertele, c.done) bozmaz. */
    var varsayilan=null;
    for(var k=0;k<PROTOKOL.length;k++){ if(PROTOKOL[k].rol===rol){ varsayilan=PROTOKOL[k]; break; } }
    if(varsayilan){ P.push(protokolSatirKopyala(varsayilan)); }
  });
}
function getProtokol(){
  var d=loadData();
  if(d.settings && Array.isArray(d.settings.protokol) && d.settings.protokol.length){
    /* KRİTİK: kullanıcı bir kez elle düzenleme yaptıysa (protokolOzellestirildi),
       kod güncellemesi (PROTOKOL_SURUM artışı) bir daha ASLA onun listesinin üzerine yazmaz.
       Aksi halde her yazılım güncellemesinde kullanıcının sildiği/eklediği satırlar
       sessizce geri gelirdi — bu gerçekten yaşanmış bir hataydı. */
    if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
      d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
      d.settings.protokolSurum = PROTOKOL_SURUM;
      saveData();
    }
    protokolRolleriTamamla(d.settings.protokol);
    return d.settings.protokol;
  }
  return PROTOKOL;
}
/* Bir protokol satırının TAM kopyasını çıkarır — tüm alanlar dahil.
   TEK KAYNAK: ensureProtokol() ve protokolVarsayilan() burayı kullanır.
   Eskiden üç yerde ayrı ayrı elle alan listesi vardı; yeni bir alan (örn.
   tekrarBitisRef) eklendiğinde üçünü de güncellemek unutulabiliyordu —
   tam da "poşetten sonra sulama vermedi" hatasının sebebi buydu: varsayılana
   dönünce/otomatik güncellenince tekrarBitisRef sessizce düşüyordu. */
function protokolSatirKopyala(x){
  return {ref:x.ref, gun:x.gun, tip:x.tip, sahip:x.sahip, txt:x.txt, sure:x.sure, tekrar:x.tekrar, rol:x.rol,
    sonucSecenekleri:x.sonucSecenekleri, tekrarBitisRef:x.tekrarBitisRef, tekrarBitisGun:x.tekrarBitisGun};
}
function ensureProtokol(){
  var d=loadData(); if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.protokol) || !d.settings.protokol.length){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  } else if(!d.settings.protokolOzellestirildi && d.settings.protokolSurum !== PROTOKOL_SURUM){
    d.settings.protokol = PROTOKOL.map(protokolSatirKopyala);
    d.settings.protokolSurum = PROTOKOL_SURUM;
  }
  protokolRolleriTamamla(d.settings.protokol);
  return d.settings.protokol;
}
/* Bir referans noktasının (gelis/poset/tiftik/toprak/tirmik/hava) TARİHİNİ bulur.
   Gerçek tarih girilmişse onu, girilmemişse protokoldeki kendi tanımından tahmin
   eder — tahmine o adımın kendi ertelemesi de eklenir. Böylece "tiftikten 2 gün
   sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar (toprak/su'da
   yaptığımız düzeltmenin genel hâli).
   Not: "toprak" özel durumdur — protokoldeki kendi satırı kendine referans verir
   (ref:"toprak"), bu yüzden döngüye girmemesi için ayrı ele alınır; tahmini
   ayarlardaki offToprak'tan gelir. poset/tiftik/tırmık/hava satırları gelis veya
   toprak'a referans verdiği için özyinelemeli çözüm güvenlidir (döngü olmaz). */
function protokolReferansTarihi(c, ref, callerRol, _visiting){
  var visiting = _visiting || [];
  if(!c || !ref) return null;
  if(ref==="gelis") return c.gelisTarihi||null;
  if(ref==="toprak"){
    if(c.toprakTarihi) return c.toprakTarihi;
    if(!c.gelisTarihi) return null;
    var ti=protokolRolIdx("toprak");
    var base=null;
    /* Kullanıcı toprak satırını özelleştirmişse (örn. ref:"gelis" + kendi gun
       değeri, offToprak ayarından FARKLI) o satırın KENDİ tanımına göre
       hesaplarız — offToprak ayarını görmezden geliriz. Böylece toprağın
       kendi hesabı ile ona referans veren adımlar (örn. Vivando/toprak−2)
       HER ZAMAN aynı tarihi baz alır. Varsayılan dizide toprak'ın kendi satırı
       ref:"toprak" (kendine referans) olduğu için sonsuz döngüye girmemek
       adına SADECE ref başka bir şeyse (özelleştirilmişse) bu yolu kullanırız. */
    if(ti>=0 && getProtokol()[ti].ref!=="toprak"){
      if(visiting.indexOf(ti)<0){
        base=protokolTarih(c, getProtokol()[ti], visiting.concat([ti]));
      }
      /* visiting'de zaten varsa (döngü) base=null kalır, alttaki varsayılana düşer */
    }
    if(!base){
      base=addDays(c.gelisTarihi,getSet(c).offToprak); /* varsayılan/self-referential durum */
    }
    /* Adımın kendisi TOPRAK ise kendi ertelemesini burada eklemeyiz — çağıran
       (_adimiYarinaTasi, protokolGorevErtele vb.) bunu ayrıca ekliyor. Eklersek
       erteleme çift sayılır. Sadece BAŞKA bir adım (örn. "1000 lt su") toprağa
       referans veriyorsa, toprağın ertelemesini bu adıma da yansıtırız. */
    if(callerRol!=="toprak"){
      if(ti>=0){
        var te=(c.ertele&&c.ertele["p"+ti])||0;
        if(te) base=addDays(base,te);
      }
    }
    return base;
  }
  /* poset / tiftik / tırmık / hava: gerçek tarih varsa onu, yoksa protokoldeki
     kendi tanımından (ref:gelis veya ref:toprak — döngü olmaz) tahmin ediyoruz,
     tahmine o adımın kendi ertelemesi de eklenir. Böylece "tiftikten 2 gün
     sonra" gibi yeni bir madde, tiftik ertelenirse otomatik kayar.
     GÜVENLİK: kullanıcı Ayarlar'dan iki adımı birbirine referans verecek
     şekilde ayarlarsa (A→B, B→A), bu zincir sonsuz döngüye girip tarayıcıyı
     çökertebilirdi ("Maximum call stack size exceeded"). "visiting" dizisi
     şu ana kadar ziyaret edilen adım indekslerini tutar; aynı indekse tekrar
     gelinirse döngü tespit edilmiş demektir — hesaplama sessizce durdurulur
     (null döner, uygulama çökmez). Kullanıcıya asıl uyarı Ayarlar ekranında
     protokol satırı kaydedilirken (protokolDongriVarMi) gösterilir. */
  var idx=protokolRolIdx(ref);
  if(idx<0) return null;
  if(visiting.indexOf(idx)>=0){
    console.error("⚠️ Protokol referans döngüsü tespit edildi (adım #"+idx+") — hesaplama durduruldu, çökme engellendi");
    return null;
  }
  var st=getProtokol()[idx];
  if(!st) return null;
  if(adimGercektenYapildiMi(c, idx, st)){
    var real=adimYapilmaTarihi(c, idx, st);
    if(real) return real;
  }
  var est=protokolTarih(c, st, visiting.concat([idx]));
  if(!est) return null;
  var ert=(c.ertele && c.ertele["p"+idx]) || 0;
  return ert ? addDays(est, ert) : est;
}
function protokolTarih(c, step, _visiting){
  if(!step) return null;
  var refDate=protokolReferansTarihi(c, step.ref, step.rol, _visiting);
  if(!refDate) return null;
  return addDays(refDate, step.gun);
}

var SICAKLIK_VARSAYILAN = { odaMax:21, idealMin:24, idealMax:26, kritikAlt:21, kritikUst:28, tehlikeAlt:18, tehlikeUst:30 };

    idealMin:  g(s.idealMin,  SICAKLIK_VARSAYILAN.idealMin),

    kritikAlt: g(s.kritikAlt, SICAKLIK_VARSAYILAN.kritikAlt),
    kritikUst: g(s.kritikUst, SICAKLIK_VARSAYILAN.kritikUst),

  };

}
function numParse(s){ if(s===""||s==null) return null; var n=parseFloat((""+s).replace(",",".")); return isNaN(n)?null:n; }
function lastVal(c, field){

  for(var i=c.gunluk.length-1;i>=0;i--){
    var n=numParse(c.gunluk[i][field]);

}
function lastTxt(c, field){
  if(!c.gunluk) return "";

}

/* SON GÜVENLİK AĞI: Rol eşleşmesi (veya c.done bayrağı) her nasılsa senkron kaçırmışsa bile,
   Tiftik/Toprak/Tırmık/Hava'nın kendi ÖZEL tarih alanı (c.tiftikTarihi vb.) zaten doluysa,
   bu adım HER ZAMAN "yapıldı" sayılır. Bu iki ayrı bayrağın (c.done ile c.tiftikTarihi)
   birbirinden kopmasına karşı kesin bir çözümdür — hangi sebepten kopmuş olursa olsun. */
function adimGercektenYapildiMi(c, idx, s){
  if(c.done && c.done["p"+idx]) return true;
  var rol=(s&&s.rol)||"";
  if(rol==="kompostindirme") return !!(c.kompostIndirme && c.kompostIndirme.tarih);
  if(rol==="tiftik") return !!c.tiftikTarihi;
  if(rol==="toprak") return !!c.toprakTarihi;
  if(rol==="tirmik") return !!c.tirmikTarihi;
  if(rol==="hava") return !!c.havaBaslangic;
  return false;
}
/* ==================== SSOT: Bir protokol adımının TEK yazma kapısı ====================
   Bir işi "yapıldı" yapmanın tek yolu budur. Hangi ekrandan çağrılırsa çağrılsın
   (Görevler ✓, Bilgileri Düzenle formu, protokol tamamlama, Günlük Tur) aynı sonucu üretir.
   Böylece aynı bilgi üç ayrı yere farklı biçimde yazılmaz — kafa karışıklığı biter.
     • c.done["p"+idx]                → kanonik "yapıldı" bayrağı
     • rol'e göre özel tarih alanı    → rapor/PDF/performans bunları okuduğu için senkron tutulur
       (tiftikTarihi / toprakTarihi / tirmikTarihi / havaBaslangic)
     • c.adimDetay["p"+idx]           → geçmişe dönük tarih + serbest not
     • o tarihin günlük kaydına not   → Ana Ekran "Bugün işlem" sütunu buradan besleniyor
   opts: {tarih (vars. bugün), not, sessiz (günlük nota yazma)}
   Döner: true (yapıldı) / false (sıra engeli — önceki zorunlu adım eksik) */
function adimTamamla(c, idx, opts){
  if(!c) return false;
  opts = opts || {};
  var st=getProtokol()[idx]; if(!st) return false;
  var tarih = opts.tarih || todayISO();
  var alanKey = st.rol || protokolAdimAlanKey(st.txt);

  /* Tekrarlı iş (oda yıkama vb.): kalıcı bitmez — son yapılmayı işaretle, N gün sonra yine çıkar */
  var tekrarG = parseInt(st.tekrar,10)||0;
  if(tekrarG>0){
    if(!c.doneSon) c.doneSon={};
    c.doneSon["p"+idx]=tarih;
    if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapıldı ("+tekrarG+" gün sonra tekrar hatırlatılacak)");
    touchCycle(c);
    return true;
  }

  /* Sıra kontrolü: önceki zorunlu adım yapılmadıysa engelle */
  if(alanKey==="toprak" && !oncekiAdimTamamMi(c,"toprak")) return false;
  if(alanKey==="tirmik" && !oncekiAdimTamamMi(c,"tirmik")) return false;
  if((alanKey==="hasat" || (!alanKey && /hasat/i.test(st.txt))) && !oncekiAdimTamamMi(c,"hasat")) return false;

  if(!c.done) c.done={};
  c.done["p"+idx]=true;

  /* Rol'e göre özel tarih alanı — rapor/PDF/performans bunları okur, senkron şart.
     "kompostindirme" hariç: onun gerçek verisi Kompost İndirme Planı formundan
     (c.kompostIndirme) gelir, burada ayrıca yazmıyoruz — SSOT tek kaynakta kalsın.
     "bosaltma": c.bosaltimTarihi UYGULAMANIN HER YERİNDE "aktif mi" kontrolü için
     kullanılan KANONİK alan — bu adım tamamlanınca onu da senkron tutuyoruz, aksi
     halde oda hem "boşaltıldı" (protokolde) hem "hâlâ aktif" (her yerde) görünür.
     Flaş adımları (flas1/flas1bitis/flasarasi/flas2/flas2bitis) ayrı üst-seviye
     alana ihtiyaç duymaz, c.adimDetay zaten SSOT olarak yeterli. */
  if(alanKey==="hava"){ if(!c.havaBaslangic) c.havaBaslangic=tarih; }
  else if(alanKey==="bosaltma"){ if(!c.bosaltimTarihi) c.bosaltimTarihi=tarih; }
  else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=tarih; }

  /* Geçmişe dönük tarih + not + (tiftik/toprak/tırmık DIŞINDAKİ adımlar için)
     kim yaptı / doğru mu — bunlar rapor okumadığı için buraya YAZILABİLİR,
     tiftik/toprak/tırmık'ın kendi özel alanlarına (rapor okur) DOKUNULMAZ. */
  if(!c.adimDetay) c.adimDetay={};
  var oncekiDetay=c.adimDetay["p"+idx]||{};
  c.adimDetay["p"+idx]={
    tarih:tarih,
    not:(opts.not!=null?opts.not:oncekiDetay.not)||"",
    personel:(opts.personel!=null?opts.personel:oncekiDetay.personel)||"",
    dogru:(opts.dogru!=null?opts.dogru:oncekiDetay.dogru)||false
  };

  if(!opts.sessiz) gunlukNotTariheEkle(c, tarih, st.txt+" yapıldı");
  touchCycle(c);
  return true;
}
/* SSOT: Bir adımı "yapılmadı"ya geri alır — bayrağı VE rol'e bağlı özel tarihi birlikte temizler.
   Tek yerden geri alınca her ekrandan kalkar (yarım "yapıldı" durumu kalmaz). */
function adimGeriAl(c, idx){
  if(!c) return;
  var st=getProtokol()[idx];
  if(c.done) c.done["p"+idx]=false;
  if(st){
    var alanKey = st.rol || protokolAdimAlanKey(st.txt);
    if(alanKey==="hava"){ c.havaBaslangic=""; }
    else if(alanKey==="bosaltma"){ c.bosaltimTarihi=""; }
    else if(alanKey && ["poset","hasat","kompostindirme","flas1","flas1bitis","flasarasi","flas2","flas2bitis","bosaltma"].indexOf(alanKey)<0){ c[alanKey+"Tarihi"]=""; }
  }
  if(c.adimDetay) delete c.adimDetay["p"+idx];
  touchCycle(c);
}
/* Bir protokol adımının fiilen YAPILDIĞI tarihi döndürür (özel alan veya adimDetay). */
function adimYapilmaTarihi(c, idx, s){
  var rol=(s&&s.rol)||protokolAdimAlanKey(s&&s.txt);
  if(rol==="kompostindirme") return (c.kompostIndirme&&c.kompostIndirme.tarih)||"";
  if(rol==="tiftik") return c.tiftikTarihi||"";
  if(rol==="toprak") return c.toprakTarihi||"";
  if(rol==="tirmik") return c.tirmikTarihi||"";
  if(rol==="hava")   return c.havaBaslangic||"";
  var ad=c.adimDetay && c.adimDetay["p"+idx];
  return (ad&&ad.tarih)||"";
}
/* Bir odada BELİRLİ GÜN yapılan tüm işleri tek yerden türetir (SSOT gösterim):
   hem bugün yapıldı işaretlenen protokol adımları (tarih alanına göre),
   hem o günün günlük kaydındaki sulama/ilaç/manuel notlar — tekilleştirilmiş. */
function odaYapilanlar(c, gun){
  var out=[], gorulen={};
  function ekle(not){ not=(""+not).trim(); if(!not||gorulen[not]) return; gorulen[not]=1; out.push(not); }
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(!adimGercektenYapildiMi(c, idx, s)) return;
    if(adimYapilmaTarihi(c, idx, s)===gun) ekle(s.txt+" yapıldı");
  });
  (c.gunluk||[]).forEach(function(r){
    if(r.tarih!==gun) return;
    if(r.sulama) (""+r.sulama).split(" · ").forEach(function(p){ ekle(p); });
    if(r.islemNot) (""+r.islemNot).split(" · ").forEach(function(p){ ekle(p); });
  });
  return out;
}
function nextTasks(){
  var d=loadData(); var today=todayISO(); var items=[];
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi) return; /* soft-silinmiş satır — index kaymasın diye array'den hiç çıkarılmıyor */
      if(s.rol==="kompostindirme") return; /* SSOT: gerçek kaydı Kompost İndirme Planı formunda tutuluyor (c.kompostIndirme) — burada sadece tarih zinciri için referans, ayrıca görev olarak gösterilmez */
      if(s.tip==="uyari") return; /* ateşlenme üstte ayrı kutuda gösteriliyor */
      if(s.tip==="ilac" || s.tip==="su") return; /* sulamalar görev listesinde değil, oda içinde */
      var base=protokolTarih(c,s); if(!base) return;
      var ert=(c.ertele&&c.ertele["p"+idx])?c.ertele["p"+idx]:0;
      var t = ert ? addDays(base,ert) : base;
      var sure = parseInt(s.sure,10)||1;         /* işin kaç gün sürdüğü (hasat=5 gibi) */
      var tekrarG = parseInt(s.tekrar,10)||0;    /* periyodik iş: kaç günde bir tekrar */
      /* Tekrarlı iş (örn. oda yıkama): ✓'lanınca kalıcı bitmez, tekrarG gün sonra yeniden çıkar */
      if(tekrarG>0){
        var son=(c.doneSon&&c.doneSon["p"+idx])||null;
        var tNext = son ? addDays(son,tekrarG) : t;
        var offT=daysBetween(today,tNext); if(offT===null) return;
        if((offT>=0 && offT<=1) || (offT<0 && offT>=-7)){
          items.push({cid:c.id, idx:idx, off:offT, date:tNext, oda:c.oda, txt:s.txt, tip:s.tip, sahip:s.sahip||"", done:false, overdue:offT<0, ertelendi:false, tekrarli:true, tekrarG:tekrarG, atama:(c.atama&&c.atama["p"+idx])||""});
        }
        return;
      }
      var off=daysBetween(today,t); if(off===null) return;
      var done = adimGercektenYapildiMi(c, idx, s);
      /* Çok günlük iş (örn. hasat 5 gün): başlangıç geçse de son güne kadar "devam ediyor" sayılır,
         gecikmiş DEĞİL. Ancak son gün de geçtiyse gerçekten gecikmiştir. */
      var sonGun = addDays(t, sure-1);
      var offEnd = daysBetween(today, sonGun);
      var devamEdiyor = (!done && sure>1 && off<0 && offEnd>=0);
      var overdue = (!done && offEnd<0);
      var goster = (off>=0 && off<=1)                 /* bugün + yarın */
                || devamEdiyor                         /* çok günlük iş sürüyor */
                || (overdue && offEnd>=-7);            /* gecikmiş (7 güne kadar göster) */
      if(goster){
        var kacinciGun = devamEdiyor ? (daysBetween(t,today)+1) : 0;
        items.push({cid:c.id, idx:idx, off:off, date:t, oda:c.oda, txt:adimGosterMetni(c, idx, s, t), tip:s.tip, sahip:s.sahip||"", done:done, overdue:overdue, devamGun:kacinciGun, sureGun:sure, ertelendi:!!ert, atama:(c.atama&&c.atama["p"+idx])||""});
      }
    });
  });
  /* Odaya özel, tek seferlik işlemler (Görevler sekmesinden manuel eklenen) */
  d.cycles.filter(function(c){return !c.bosaltimTarihi;}).forEach(function(c){
    (c.odaGorevleri||[]).forEach(function(og){
      if(og.done) return; /* tamamlananlar listede kalmasın */
      var base=og.tarih; if(!base) return;
      var ert=og.ertele||0;
      var t = ert ? addDays(base,ert) : base;
      var off=daysBetween(today,t); if(off===null) return;
      if((off>=0 && off<=1) || (off<0 && off>=-7)){
        items.push({cid:c.id, ogId:og.id, off:off, date:t, oda:c.oda, txt:og.is, tip:"olay", sahip:"", atama:og.atama||"", odaGorev:true, done:false, overdue:off<0, ertelendi:!!ert});
      }
    });
  });
  getPlan().filter(function(x){return !x.done && x.cikis;}).forEach(function(x){
    var off=daysBetween(today, x.cikis);
    if(off===null) return;
    if(off===1){
      items.push({plan:true, planId:x.id, off:1, date:x.cikis, oda:x.oda||"—",
        txt:"Yarın kompost gelecek ("+(x.firma||"firma")+") — bugün firma ile görüşülecek",
        tip:"olay", sahip:"ziraat", done:!!x.irtibat, overdue:false, komGorusme:true});
    } else if(off===0){
      items.push({plan:true, planId:x.id, off:0, date:x.cikis, oda:x.oda||"—",
        txt:"Kompost BUGÜN geliyor ("+(x.firma||"firma")+") — karşıla, oda oluştur",
        tip:"olay", sahip:"ekip", done:false, overdue:false, komGelis:true});
    } else if(off<0 && off>=-2){
      items.push({plan:true, planId:x.id, off:off, date:x.cikis, oda:x.oda||"—",
        txt:"Kompost geldi ama oda oluşturulmadı ("+(x.firma||"firma")+")",
        tip:"olay", sahip:"ekip", done:false, overdue:true, komGelis:true});
    }
  });
  items.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:(a.oda<b.oda?-1:1)); });
  return items;
}
/* Protokol adımının metnine göre hangi tarih alanına (tiftikTarihi/toprakTarihi/
   tirmikTarihi/havaBaslangic) karşılık geldiğini bulur. toggleTask'ta kullanılır. */
function protokolAdimAlanKey(txt){
  if(!txt) return null;
  if(/tiftik/i.test(txt)) return "tiftik";
  if(/tırmık/i.test(txt)) return "tirmik";
  if(/toprak/i.test(txt)) return "toprak";
  if(/hava/i.test(txt)) return "hava";
  return null;
}
/* MERKEZİ ROL BULUCU — kullanıcı bir satırı istediği gibi yeniden adlandırabilir
   (örn. "Poşet açılır" → "Poşet kesimi"); sistem artık metne değil, satıra açıkça
   atanmış "rol" etiketine bakıyor. Böylece yeniden adlandırma hiçbir hesaplamayı bozmaz.
   Eski (henüz rol atanmamış) kayıtlar için metin eşleşmesine geriye dönük düşer. */
var PROTOKOL_ROL_REGEX = {poset:/po\u015fet/i, tiftik:/tiftik/i, toprak:/toprak/i, tirmik:/t\u0131rm\u0131k/i, hasat:/hasat/i, hava:/hava/i, kompostindirme:/kompost indirme/i};
function protokolRolIdx(rol){
  var P=getProtokol();
  for(var i=0;i<P.length;i++){ if(!P[i].silindi && P[i].tip==="olay" && P[i].rol===rol) return i; }
  var re=PROTOKOL_ROL_REGEX[rol]; if(!re) return -1;
  var sahipGerekli = (rol==="tiftik"||rol==="toprak"||rol==="tirmik") ? "ekip" : null;
  for(var j=0;j<P.length;j++){ if(!P[j].silindi && P[j].tip==="olay" && re.test(P[j].txt) && (!sahipGerekli || P[j].sahip===sahipGerekli)) return j; }
  /* Sahip şartıyla bulunamadıysa (kullanıcı bu alanı değiştirmiş olabilir), sadece metne bak */
  for(var k=0;k<P.length;k++){ if(!P[k].silindi && P[k].tip==="olay" && re.test(P[k].txt)) return k; }
  return -1;
}
/* Bir adımın (startIdx) referans zinciri takip edildiğinde kendine geri dönüp
   dönmediğini kontrol eder. protokolTarih()'teki döngü koruması bir GÜVENLİK
   AĞI'dır (çökmeyi engeller) — ama en doğrusu döngüyü hiç KAYDETMEMEK. Bu
   fonksiyon, Ayarlar'da bir referans değiştirilirken (henüz kaydedilmeden
   hemen önce, o değerle) çağrılır. */
function protokolRefDongusuVarMi(startIdx){
  var P=getProtokol();
  var idx=startIdx, guard=0;
  while(true){
    if(guard++ > P.length+2) return true; /* aşırı uzun zincir, güvenlik için döngü say */
    var st=P[idx];
    if(!st || !st.ref) return false;
    if(st.ref==="gelis") return false;
    var nextIdx;
    if(st.ref==="toprak"){
      var ti=protokolRolIdx("toprak");
      if(ti<0 || !P[ti] || P[ti].ref==="toprak" || !P[ti].ref) return false; /* kendine referans = güvenli taban */
      nextIdx=ti;
    } else {
      nextIdx=protokolRolIdx(st.ref);
      if(nextIdx<0) return false; /* tanımsız referans, döngü değil */
    }
    if(nextIdx===startIdx) return true; /* zincir başa döndü — döngü! */
    idx=nextIdx;
  }
}
/* Bir odanın SIRADAKİ (henüz yapılmamış, en yakın tarihli) protokol adımını bulur.
   Günlük Tur ekranında ziraat mühendisinin gözlemine göre "yarın yapalım" diyebilmesi için. */
/* Bir adımın BELİRLİ TARİH için gösterilecek metni: mühendis o tarih için
   "değiştirerek onayla" yaptıysa (yarinDegisiklik) ekip protokol metnini değil
   mühendisin düzelttiği metni görür — protokol 400 dese de görevde 600 yazar. */
function adimGosterMetni(c, idx, st, tarih){
  var d=c && c.yarinDegisiklik && c.yarinDegisiklik["p"+idx];
  if(d && d.txt && d.t===tarih) return d.txt;
  return st.txt;
}
/* siradakiProtokolAdimi'nin tersi: en son TAMAMLANMIŞ olay tipi adım.
   c.adimDetay["p"+idx].tarih her tamamlanan adımda evrensel olarak tutulur
   (poşet dahil, rol'e özel alanlara ihtiyaç yok) — SSOT'tan okunur. */
function sonYapilanOlayAdimi(c){
  var best=null;
  getProtokol().forEach(function(s,idx){
    if(s.silindi || s.tip!=="olay") return;
    if(!adimGercektenYapildiMi(c,idx,s)) return;
    var detay=c.adimDetay && c.adimDetay["p"+idx];
    var tarih=detay?detay.tarih:null;
    if(!tarih) return;
    if(!best || tarih>best.tarih){ best={idx:idx, tarih:tarih, txt:s.txt}; }
  });
  return best;
}
function siradakiProtokolAdimi(c){
  /* KÖK MİMARİ DÜZELTME: eskiden bu fonksiyon adaylar arasından en ERKEN
     TARİHLİ olanı seçiyordu (t<best.t). Bu, referans zinciri bir yerde
     bozuksa (örn. eksik/sahipsiz bir referans → tarihi yanlış/erken
     hesaplanıyor) Poşet/Tiftik gibi ÖNCEKİ zorunlu adımlar hâlâ yapılmamışken
     sistemin Toprak gibi SONRAKİ bir adımı "sıradaki" göstermesine yol
     açıyordu — kullanıcı defalarca aynı hatayı bildirdi (Poşet/Tiftik atlanıp
     Toprak'a sıçrama). Artık seçim, Ayarlar → Görevler'de TANIMLI GERÇEK İŞ
     AKIŞI SIRASINA (protokolSiraAnahtari — tüm referans zincirini kompost
     indirme→poşet→tiftik/toprak→tırmık→hava→hasat şeklinde çözer) göre
     yapılıyor: yapılmamış adımlar arasında SIRA numarası en KÜÇÜK olan asla
     atlanmaz, tarih sadece görüntüleme/gecikme hesabı için kullanılır. */
  var adaylar=[];
  getProtokol().forEach(function(s,idx){
    if(s.silindi) return;
    if(s.tip==="uyari" || s.tip==="ilac" || s.tip==="su") return;
    var done=adimGercektenYapildiMi(c, idx, s); if(done) return;
    adaylar.push({idx:idx, s:s, sira:protokolSiraAnahtari(s)});
  });
  if(!adaylar.length) return null;
  adaylar.sort(function(a,b){ return a.sira-b.sira; });
  var secilen=adaylar[0];
  var base=protokolTarih(c,secilen.s);
  var t;
  if(base){
    var ert=(c.ertele && c.ertele["p"+secilen.idx])?c.ertele["p"+secilen.idx]:0;
    t=ert?addDays(base,ert):base;
  } else {
    /* Tarih hesaplanamıyor (referans hâlâ sahipsiz) — sessizce atlamak yerine
       bugünün tarihiyle göster, en azından adım kaybolmasın ve kullanıcı
       Ayarlar'da referansı düzeltmesi gerektiğini fark etsin. */
    t=todayISO();
  }
  return {idx:secilen.idx, t:t, txt:adimGosterMetni(c, secilen.idx, secilen.s, t)};
}
/* Günlük Tur'da "Yarın X yapılsın" — mevcut Ertele mekanizmasını TERS yönde kullanır
   (Ertele +gün ekler, bu -gün ekleyerek tarihi öne çeker). Yeni bir veri modeli gerekmez,
   aynı c.ertele alanı okunur; Görevler listesi ve puanlama otomatik olarak günceli görür. */
/* PLANLANAN TARİH — henüz yapılmamış bir adımın hedef tarihini DOĞRUDAN
   istenen güne taşır (sadece yarın veya +1 gün değil, herhangi bir tarih).
   c.ertele["p"+idx] zaten var olan zincir-mekanizmasını kullanır — yeni bir
   alan icat edilmedi, sadece "yarına çek/ertele"nin daha esnek hâli. Seçilen
   tarih yeni PLAN olur, sonraki adımlar (gerçekleşince) buna göre kayar. */
function planTarihiDegistirAc(cid, idx){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var base=protokolTarih(c,s); if(!base) return;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var mevcutTarih=addDays(base,mevcutErt);
  wm.innerHTML='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:4px;">'+esc(s.txt)+' — planlanan tarih</div>'
    +'<div class="muted" style="font-size:12px;margin-bottom:8px;">Şu an planlanan: '+fmtDate(mevcutTarih)+'. Yeni bir tarih seç — bu, adım henüz yapılmadan önce planı değiştirir (gerçekleşen tarih değil).</div>'
    +'<label>Yeni planlanan tarih</label><input type="date" id="ptd_tarih" value="'+mevcutTarih+'">'
    +'<div class="row" style="margin-top:14px;"><button class="btn" onclick="planTarihiOnayla(\''+cid+'\','+idx+')">Kaydet</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">Vazgeç</button></div>'
    +'</div></div>';
}
/* Tarih seçildikten sonra: değişmediyse sessizce kapat, değiştiyse yön
   (ileri/geri) tespit edip gerekçe sorma modaline geçer. Gerçek yazma
   planGerekceKaydet'te olur. */
function planTarihiOnayla(cid, idx){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var base=protokolTarih(c,s); if(!base) return;
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var mevcutTarih=addDays(base,mevcutErt);
  var yeniTarih=(el("ptd_tarih")&&el("ptd_tarih").value)||todayISO();
  if(yeniTarih===mevcutTarih){ closeWarnBox(); toast("Değişiklik yok"); return; }
  var fark=daysBetween(mevcutTarih, yeniTarih); /* >0: ileri (ertelendi), <0: geri (erkene alındı) */
  planGerekceSorAc(cid, idx, yeniTarih, fark>0);
}
/* Gerekçe seçimi — yöne göre farklı seçenekler. İleri alma (erteleme) puan
   sistemini etkiler (c.erteleSebep — biyolojik korur, diğer etkiler, mevcut
   sistemle AYNI). Erkene alma puanı etkilemez, sadece kayıt için sorulur. */
function planGerekceSorAc(cid, idx, yeniTarih, ileriMi){
  var wm=el("warnModal"); if(!wm) return;
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var secenekler = ileriMi
    ? [{key:"biyolojik", ad:"Sarım zayıf / gelişme yavaş"}, {key:"diger", ad:"Personel eksik"}]
    : [{key:"erken_biyolojik", ad:"Sarım çok iyi / gelişme hızlı"}, {key:"erken_talep", ad:"Mantar ihtiyacı (pazar talebi)"}];
  var h='<div class="modal-bg" onclick="if(event.target===this) closeWarnBox();"><div class="modal">'
    +'<div style="font-weight:700;font-size:17px;margin-bottom:4px;">'+esc(s.txt)+' — gerekçe</div>'
    +'<div class="muted" style="font-size:12px;margin-bottom:10px;">'+fmtDate(yeniTarih)+' olarak '+(ileriMi?'erteleniyor':'erkene alınıyor')+'. Kısa bir gerekçe seç:</div>';
  secenekler.forEach(function(op){
    h+='<button class="btn ghost" style="width:100%;margin-bottom:6px;text-align:left;" onclick="planGerekceKaydet(\''+cid+'\','+idx+',\''+yeniTarih+'\',\''+op.key+'\',\''+esc(op.ad).replace(/'/g,"\\'")+'\')">'+esc(op.ad)+'</button>';
  });
  h+='<input type="text" id="pgs_diger" placeholder="Diğer sebep (yaz)" style="margin-top:4px;">'
    +'<div class="row" style="margin-top:10px;"><button class="btn" onclick="planGerekceDigerKaydet(\''+cid+'\','+idx+',\''+yeniTarih+'\','+(ileriMi?'true':'false')+')">Kaydet (yazdığım sebep)</button>'
    +'<button class="btn ghost" onclick="closeWarnBox()">Vazgeç</button></div>'
    +'</div></div>';
  wm.innerHTML=h;
}
function planGerekceKaydet(cid, idx, yeniTarih, sebepKey, sebepAdi){
  planGerekceUygula(cid, idx, yeniTarih, sebepKey, sebepAdi);
}
function planGerekceDigerKaydet(cid, idx, yeniTarih, ileriMi){
  var metin=(el("pgs_diger")&&el("pgs_diger").value.trim())||"belirtilmedi";
  planGerekceUygula(cid, idx, yeniTarih, (ileriMi?"diger":"erken_diger"), metin);
}
function planGerekceUygula(cid, idx, yeniTarih, sebepKey, sebepAdi){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var base=protokolTarih(c,s); if(!base) return;
  if(!c.ertele) c.ertele={};
  c.ertele["p"+idx]=daysBetween(base, yeniTarih);
  /* Sadece İLERİ alma (erteleme) puan sistemini etkiler — biyolojik/diğer
     ayrımı mevcut odaPerformans() ve Protokol Uygunluğu raporuyla aynı alanı
     (c.erteleSebep) kullanır. Erkene alma bu alana yazılmaz (puanı etkilemez). */
  if(sebepKey==="biyolojik"||sebepKey==="diger"){
    if(!c.erteleSebep) c.erteleSebep={};
    c.erteleSebep["p"+idx]=sebepKey;
  }
  gunlukNotTariheGuncelle(c, todayISO(), esc(s.txt)+" için plan", esc(s.txt)+" için plan "+fmtDate(yeniTarih)+" — gerekçe: "+esc(sebepAdi));
  touchCycle(c); saveData(); closeWarnBox(); toast("Plan güncellendi: "+fmtDate(yeniTarih)); render();
}
function protokolYarinaCek(cid, idx){
  if(!can("edit")) return noPerm();
  var c=loadData().cycles.find(function(x){return x.id===cid;}); if(!c) return;
  var s=getProtokol()[idx]; if(!s) return;
  var base=protokolTarih(c,s); if(!base) return;
  var yarin=addDays(todayISO(),1);
  var mevcutErt=(c.ertele && c.ertele["p"+idx])?c.ertele["p"+idx]:0;
  var mevcutTarih=addDays(base,mevcutErt);
  /* Çift kayıt engelleme: adım zaten yarına planlandıysa tekrar sorma/ekleme */
  if(mevcutTarih===yarin){ toast("Bu iş zaten yarına planlı"); return; }
  if(!confirm('"'+s.txt+'" yarın için planlansın mı?')) return;
  var fark=daysBetween(mevcutTarih, yarin);
  if(!c.ertele) c.ertele={};
  c.ertele["p"+idx]=mevcutErt+fark;
  /* Not kısa; kısa etiket ("Yarına planlandı") — hangi iş olduğu satırda zaten belli.
     gunlukGorevNotEkle içindeki dedup aynı notu ikinci kez eklemez. */
  gunlukGorevNotEkle(c, "Yarına planlandı");
  touchCycle(c); saveData(); toast("Yarın için planlandı: "+s.txt); render();
}
/* "Dün ne yaptıysan aynısı" — sulama/ilaçlama genelde birkaç gün aynı gidiyor,
   dropdown'dan tekrar seçmek yerine dünkü kaydı tek dokunuşla kopyalar. */

/* Günlük Tur / panoEdit ekranında, sulamanın altında sıradaki adımı gösterir.
   Adım BUGÜN (ya da daha erken/gecikmiş) ise direkt işaretlenebilir bir kutucuk
   çıkar — Görevler sekmesine ayrıca gitmeye gerek kalmaz. İleri bir tarihse
   "yarına çek" butonu gösterilir. */
/* Şartlı Kurallar: Ayarlar → Görevler → Kontrol Protokolü altında ayrı olarak yönetilir.
   Her kural: {id, aciklama, ref(gelis/toprak), gun(eşik), hedefTxt(hangi olay adımını bugüne çekecek)}.
   Varsayılan: mevcut "misel patlarsa..." kuralı. */
function getSartliKurallar(){
  var d=loadData(); if(!d.settings) d.settings={};
  if(!Array.isArray(d.settings.sartliKurallar)){
    d.settings.sartliKurallar=[{id:"varsayilan_misel", aciklama:"Misel patlarsa ve nem/sıcaklık/amonyak kötüyse", ref:"gelis", gun:3, hedefTxt:"Poşet açılır (yetişmezse ertesi gün devam)", yon:"erken", otoAlan:"", otoOp:">", otoDeger:null}];
  }
  /* Eski kayıtlarda "yon" alanı yoktu (hepsi erken tetikleyiciydi) — geriye uyumluluk */
  d.settings.sartliKurallar.forEach(function(k){ if(!k.yon) k.yon="erken"; if(k.otoAlan===undefined) k.otoAlan=""; if(!k.otoOp) k.otoOp=">"; if(k.otoDeger===undefined) k.otoDeger=null; });
  return d.settings.sartliKurallar;
}
function sartKuralEkle(aciklama, ref, gun, hedefTxt, yon, otoAlan, otoOp, otoDeger){
  if(!can("manage")) return noPerm();
  aciklama=(aciklama||"").trim(); if(!aciklama){ toast("Koşul açıklaması gir"); return; }
  hedefTxt=(hedefTxt||"").trim(); if(!hedefTxt){ toast("Hedef adım seç"); return; }
  var g=parseInt(gun,10); if(isNaN(g)) g=0;
  var od=parseFloat(otoDeger); if(isNaN(od)) od=null;
  var d=loadData(); if(!d.settings) d.settings={};
  var L=getSartliKurallar();
  L.push({id:uid(), aciklama:aciklama, ref:(ref==="toprak"?"toprak":"gelis"), gun:g, hedefTxt:hedefTxt, yon:(yon==="ertele"?"ertele":"erken"), otoAlan:otoAlan||"", otoOp:(otoOp==="<"?"<":">"), otoDeger:od});
  d.settings.sartliKurallar=L; saveData(); toast("✓ Şartlı kural eklendi"); render();
}
function sartKuralEkleForm(){
  sartKuralEkle(
