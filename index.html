/* ---------- √úretim √∂ńürenmesi (ge√ßmiŇü d√∂ng√ľ istatistik analizi, ger√ßek veri ‚ÄĒ AI deńüil) ---------- */
function tumTamamlananDongu(){
  return loadData().cycles.filter(function(c){ return c.bosaltimTarihi && (c.hasat||[]).length; });
}
function ortKompostSicaklik(c){
  var vals=(c.gunluk||[]).filter(function(r){ return (!c.toprakTarihi || r.tarih<c.toprakTarihi) && numParse(r.kompostC)!=null; }).map(function(r){return numParse(r.kompostC);});
  if(!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function uretimOgrenmesiVeri(){
  var all=tumTamamlananDongu();
  var bulgular=[];
  var withTemp=all.map(function(c){ return {sic:ortKompostSicaklik(c), v:verimOzet(c)}; }).filter(function(x){return x.sic!=null && x.v.kgTon!=null;});
  if(withTemp.length>=4){
    var esik=26;
    var ust=withTemp.filter(function(x){return x.sic>=esik;});
    var alt=withTemp.filter(function(x){return x.sic<esik;});
    if(ust.length>=2 && alt.length>=2){
      var avgU=ust.reduce(function(s,x){return s+x.v.kgTon;},0)/ust.length;
      var avgA=alt.reduce(function(s,x){return s+x.v.kgTon;},0)/alt.length;
      var fark=avgA>0?((avgA-avgU)/avgA*100):0;
      bulgular.push({baslik:"Kompost sńĪcaklńĪńüńĪ ve verim", metin: esik+"¬įC √ľst√ľ ortalama kompost sńĪcaklńĪńüńĪ olan "+ust.length+" d√∂ng√ľde ortalama verim "+avgU.toFixed(0)+" kg/ton; "+esik+"¬įC altńĪ "+alt.length+" d√∂ng√ľde "+avgA.toFixed(0)+" kg/ton"+(fark>3?(" ‚ÄĒ y√ľksek sńĪcaklńĪk d√∂ng√ľlerinde verim yaklaŇüńĪk %"+fark.toFixed(0)+" daha d√ľŇü√ľk g√∂r√ľn√ľyor."):(fark<-3?(" ‚ÄĒ y√ľksek sńĪcaklńĪk d√∂ng√ľlerinde verim daha y√ľksek g√∂r√ľn√ľyor, √∂rnek sayńĪsńĪ azken tesad√ľf olabilir."):" ‚ÄĒ belirgin bir fark g√∂r√ľnm√ľyor."))});
    }
  }
  var firmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var f=c.kompostFirma||"Bilinmiyor"; if(!firmaGroups[f]) firmaGroups[f]=[]; firmaGroups[f].push(v.kgTon); });
  var firmaListe=Object.keys(firmaGroups).filter(function(f){return firmaGroups[f].length>=2;});
  if(firmaListe.length>=2){
    var firmaOrt=firmaListe.map(function(f){ var arr=firmaGroups[f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    firmaOrt.sort(function(a,b){return b.ort-a.ort;});
    bulgular.push({baslik:"Firma bazlńĪ verim karŇüńĪlaŇütńĪrmasńĪ (kg/ton)", metin: firmaOrt.map(function(x){return esc(x.f)+": "+x.ort.toFixed(0)+" (n="+x.n+")";}).join(" ¬∑ ")});
  }
  var withSu=all.map(function(c){ var t=tuketimOzet(c); var v=verimOzet(c); return {suTon:t.suTon, kgTon:v.kgTon}; }).filter(function(x){return x.suTon!=null && x.kgTon!=null;});
  if(withSu.length>=4){
    var suSirali=withSu.slice().sort(function(a,b){return a.suTon-b.suTon;});
    var medyanSu=suSirali[Math.floor(suSirali.length/2)].suTon;
    var dusukSu=withSu.filter(function(x){return x.suTon<medyanSu;});
    var yuksekSu=withSu.filter(function(x){return x.suTon>=medyanSu;});
    if(dusukSu.length>=2 && yuksekSu.length>=2){
      var ortD=dusukSu.reduce(function(s,x){return s+x.kgTon;},0)/dusukSu.length;
      var ortY=yuksekSu.reduce(function(s,x){return s+x.kgTon;},0)/yuksekSu.length;
      bulgular.push({baslik:"Su miktarńĪ ve verim", metin:"Ton kompost baŇüńĪna su medyanńĪ ~"+medyanSu.toFixed(0)+" lt. Bunun altńĪnda sulanan "+dusukSu.length+" d√∂ng√ľde ortalama verim "+ortD.toFixed(0)+" kg/ton; √ľst√ľnde sulanan "+yuksekSu.length+" d√∂ng√ľde "+ortY.toFixed(0)+" kg/ton."});
    }
  }
  var partiGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null || !c.gelisTarihi) return; var p=partiFromDate(c.gelisTarihi); if(!partiGroups[p]) partiGroups[p]=[]; partiGroups[p].push({oda:c.oda, kgTon:v.kgTon}); });
  var partiListe=Object.keys(partiGroups).filter(function(p){return partiGroups[p].length>=2;});
  if(partiListe.length){
    partiListe.sort(function(a,b){
      var oa=partiGroups[a].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[a].length;
      var ob=partiGroups[b].reduce(function(s,x){return s+x.kgTon;},0)/partiGroups[b].length;
      return ob-oa;
    });
    bulgular.push({baslik:"Parti bazlńĪ karŇüńĪlaŇütńĪrma (aynńĪ g√ľn gelen kompost partileri)", metin: partiListe.slice(0,6).map(function(p){
      var arr=partiGroups[p]; var ort=arr.reduce(function(s,x){return s+x.kgTon;},0)/arr.length;
      return "Parti "+esc(p)+" ("+arr.map(function(x){return esc(x.oda);}).join(", ")+"): ort. "+ort.toFixed(0)+" kg/ton";
    }).join(" ¬∑ ")});
  }
  var odaFirmaGroups={};
  all.forEach(function(c){ var v=verimOzet(c); if(v.kgTon==null) return; var o=normalizeOda(c.oda); var f=c.kompostFirma||"Bilinmiyor"; if(!odaFirmaGroups[o]) odaFirmaGroups[o]={}; if(!odaFirmaGroups[o][f]) odaFirmaGroups[o][f]=[]; odaFirmaGroups[o][f].push(v.kgTon); });
  var odaFirmaSatir=[];
  Object.keys(odaFirmaGroups).forEach(function(o){
    var firmalar=Object.keys(odaFirmaGroups[o]);
    if(firmalar.length<2) return;
    var ortlar=firmalar.map(function(f){ var arr=odaFirmaGroups[o][f]; return {f:f, ort:arr.reduce(function(a,b){return a+b;},0)/arr.length, n:arr.length}; });
    ortlar.sort(function(a,b){return b.ort-a.ort;});
    var iyi=ortlar[0], kotu=ortlar[ortlar.length-1];
    var odaAdi=all.find(function(c){return normalizeOda(c.oda)===o;}).oda;
    odaFirmaSatir.push(esc(odaAdi)+"'da en iyi "+esc(iyi.f)+" ("+iyi.ort.toFixed(0)+" kg/ton), en k√∂t√ľ "+esc(kotu.f)+" ("+kotu.ort.toFixed(0)+" kg/ton)");
  });
  if(odaFirmaSatir.length){
    bulgular.push({baslik:"Oda bazńĪnda firma performansńĪ", metin: odaFirmaSatir.join(" ¬∑ ")});
  }
  return {n: all.length, bulgular: bulgular};
}
/* ---------- K√∂k neden analizi: tamamlanmńĪŇü, d√ľŇü√ľk verimli d√∂ng√ľlerde olasńĪ nedenler ---------- */
function donguKokNeden(c){
  var bulgular=[];
  var kritikGun=0, tehlikeGun=0, amonyakGun=0, nemYuksekGun=0;
  (c.gunluk||[]).forEach(function(r){
    var ko=numParse(r.kompostC);
    if(ko!=null){
      if(ko>=KOMPOST_TEHLIKELI || ko<=KOMPOST_TEHLIKE_ALT) tehlikeGun++;
      else if(ko>=KOMPOST_KRITIK_UST || ko<=KOMPOST_KRITIK_ALT) kritikGun++;
    }
    if(r.amonyak==="Var") amonyakGun++;
    if(r.nem==="Y√ľksek") nemYuksekGun++;
  });
  if(tehlikeGun>0) bulgular.push(tehlikeGun+" g√ľn tehlikeli kompost sńĪcaklńĪńüńĪ kaydedilmiŇü.");
  if(kritikGun>0) bulgular.push(kritikGun+" g√ľn kritik kompost sńĪcaklńĪńüńĪ kaydedilmiŇü.");
  if(amonyakGun>0) bulgular.push(amonyakGun+" g√ľn amonyak kokusu bildirilmiŇü.");
  if(nemYuksekGun>=3) bulgular.push(nemYuksekGun+" g√ľn y√ľksek nem bildirilmiŇü.");
  var d=loadData(); var audit=(d.settings&&d.settings.audit)||[];
  var ertelenen=audit.filter(function(a){
    if(!/ertelendi/i.test(a.action)) return false;
    if(!a.detail || a.detail.indexOf(c.oda||"\u0000")!==0) return false;
    var g=(a.at||"").slice(0,10);
    return g>=(c.gelisTarihi||"") && (!c.bosaltimTarihi || g<=c.bosaltimTarihi);
  }).length;
  if(ertelenen>0) bulgular.push(ertelenen+" iŇülem ertelenmiŇü.");
  return bulgular;
}

/* Hasat raporu ‚ÄĒ GE√áMńįŇěE D√ĖN√úK ger√ßek kayńĪtlar (tahmin deńüil). G√ľnl√ľk/haftalńĪk/

function hasatRaporuHTML(){

    });
  });
  function box(lbl,val,unit){ return '<div style="flex:1;min-width:84px;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px;"><div class="muted" style="font-size:12px;">'+lbl+'</div><div style="font-size:19px;font-weight:700;">'+val+(unit?'<span style="font-size:11px;"> '+unit+'</span>':'')+'</div></div>'; }
  var body='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">'
    +box("Bug√ľn",Math.round(gunlukKasa),"kasa")+box("Son 7 g√ľn",Math.round(haftalikKasa),"kasa")+box("Son 30 g√ľn",Math.round(aylikKasa),"kasa")
    +box("Bug√ľn",(gunlukKasa*S.kasaAgirlik).toFixed(0),"kg")+box("Son 30 g√ľn",(aylikKasa*S.kasaAgirlik).toFixed(0),"kg")
    +'</div>';

  var odaKeys=Object.keys(odaToplam).sort(function(a,b){return odaToplam[b]-odaToplam[a];});
  if(odaKeys.length){
    body+='<div class="muted" style="margin-bottom:4px;">Oda bazńĪnda (son 30 g√ľn):</div>';
    odaKeys.forEach(function(o){
      body+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:13px;"><span><b>'+esc(o)+'</b></span><span class="note">'+Math.round(odaToplam[o])+' kasa ('+(odaToplam[o]*S.kasaAgirlik).toFixed(0)+' kg)</span></div>';
    });
  }

  var tamam=tumTamamlananDongu();
  var verimler=tamam.map(function(c){return verimOzet(c).kgTon;}).filter(function(x){return x!=null;});
  if(verimler.length){
    var ortVerim=verimler.reduce(function(a,b){return a+b;},0)/verimler.length;
    body+='<div class="muted" style="margin-top:10px;">TamamlanmńĪŇü '+verimler.length+' d√∂ng√ľde ortalama verim: <b>'+ortVerim.toFixed(0)+' kg/ton</b></div>';
  }
  if(!odaKeys.length && !gunlukKasa && !haftalikKasa && !aylikKasa){
    body='<div class="muted">Son 30 g√ľnde kayńĪtlńĪ hasat yok.</div>'+body;
  }
  return sectionCard('ūüĆĺ Hasat Raporu (ge√ßmiŇüe d√∂n√ľk)', body);
}
/* HaftalńĪk Hasat Tahmini ‚ÄĒ √∂n√ľm√ľzdeki 7 g√ľn i√ßin hangi odanńĪn hangi flaŇü
   g√ľn√ľnde olacańüńĪnńĪ (hasatAsama) ve o g√ľne ait ortalama kasa aralńĪńüńĪnńĪ
   (HASAT_PLAN.kasaMin/kasaMax) birleŇütirip g√ľn g√ľn + oda oda + haftalńĪk
   toplam tahmini kasa (ve kg) g√∂sterir. KullanńĪcńĪnńĪn verdińüi ortalama
   g√ľnl√ľk hasat rakamlarńĪna dayalńĪ kaba bir tahmindir, kesin deńüildir. */
function haftalikHasatTahminiHTML(){
  var d=loadData();
  var S=getSet();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var today=todayISO();
  var gunler=[];
  for(var i=0;i<7;i++) gunler.push(addDays(today,i));

  var toplamMin=0, toplamMax=0;
  var body='';
  var hicHasatYok=true;
  var gercekVeriKullanildiMi=false;
  /* Hafta 7 g√ľn, cumartesi/pazar dahil ‚ÄĒ √ßiftlik 7 g√ľn √ßalńĪŇüńĪyor, hafta sonu
     ATLANMAZ. Hasat olmayan bir g√ľn de (cumartesi/pazar dahil) listeden
     GńįZLENMEZ ‚ÄĒ aksi halde "cumartesi/pazar hi√ß g√∂sterilmiyor, hesaba
     katńĪlmamńĪŇü" izlenimi veriyordu (kullanńĪcńĪ raporu). BoŇü bir g√ľn a√ßńĪk√ßa
     "planlńĪ hasat yok" diye g√∂sterilir; sessizce atlanmaz. */
  gunler.forEach(function(iso){
    var satirlar=[];
    var gunMin=0, gunMax=0;
    aktif.forEach(function(c){
      var a=hasatAsama(c, iso);
      if(!a || a.flas<=0 || (a.kasaMin<=0 && a.kasaMax<=0)) return;
      if(a.kasaKaynak==="gercek") gercekVeriKullanildiMi=true;
      satirlar.push({oda:c.oda, flas:a.flas, gun:a.gun, min:a.kasaMin, max:a.kasaMax, kaynak:a.kasaKaynak, n:a.kasaOrnekSayisi});
      gunMin+=a.kasaMin; gunMax+=a.kasaMax;
    });
    satirlar.sort(function(x,y){ return y.max-x.max; });
    body+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">'
      +'<div style="font-weight:700;">'+fmtDate(iso)+' '+esc(gunAdi(iso))+(iso===today?' <span class="muted" style="font-weight:400;">(bug√ľn)</span>':'')+'</div>';
    if(!satirlar.length){
      body+='<div class="muted" style="font-size:13px;padding:3px 0;">PlanlńĪ hasat yok.</div></div>';
      return;
    }
    hicHasatYok=false;
    toplamMin+=gunMin; toplamMax+=gunMax;
    satirlar.forEach(function(s){
      var flasGunGoreli = (s.flas===1?s.gun:s.gun-10); /* 2.flaŇü i√ßin HASAT_PLAN'daki 11-15 -> "1-5. g√ľn" olarak g√∂ster */
      body+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px;">'
        +'<span><b>'+esc(s.oda)+'</b> <span class="muted">('+s.flas+'. FlaŇü, '+flasGunGoreli+'. g√ľn)</span></span>'
        +'<span class="note">'+s.min+'-'+s.max+' kasa'+(s.kaynak==="gercek"?(' <span style="color:var(--green);" title="'+s.n+' ge√ßmiŇü kayda dayalńĪ ger√ßek veri">ūüĆĪ</span>'):'')+'</span></div>';
    });
    body+='<div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-top:3px;"><span>G√ľn toplamńĪ</span><span>'+gunMin+'-'+gunMax+' kasa</span></div></div>';
  });

  if(hicHasatYok){
    return sectionCard('ūüď¶ HaftalńĪk Hasat Tahmini (√∂n√ľm√ľzdeki 7 g√ľn)', body+'<div class="muted" style="margin-top:10px;">√Ėn√ľm√ľzdeki 7 g√ľnde hi√ßbir odada tahmini hasat g√ľn√ľ yok.</div>');
  }
  body+='<div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:2px solid var(--green);font-size:15px;font-weight:700;">'
    +'<span>HaftalńĪk toplam tahmini</span><span>'+toplamMin+'-'+toplamMax+' kasa</span></div>'
    +'<div class="muted" style="text-align:right;font-size:12px;">(~'+(toplamMin*S.kasaAgirlik).toFixed(0)+'-'+(toplamMax*S.kasaAgirlik).toFixed(0)+' kg)</div>'
    +'<div class="muted" style="margin-top:8px;font-size:11.5px;">FlaŇü g√ľn√ľne g√∂re ortalama kasa aralńĪklarńĪna dayalńĪ kaba tahmindir, kesin deńüildir.'
    +(gercekVeriKullanildiMi
      ? ' ūüĆĪ iŇüaretli satńĪrlar artńĪk senin ge√ßmiŇü hasat kayńĪtlarńĪna dayanńĪyor (varsayńĪlan tahmin deńüil).'
      : ' Hen√ľz yeterli ge√ßmiŇü hasat kaydńĪ yok ‚ÄĒ en az '+HASAT_GERCEK_MIN_ORNEK+' d√∂ng√ľ tamamlanńĪnca aynńĪ g√ľnler i√ßin otomatik olarak kendi ger√ßek verilerine ge√ßer, hi√ßbir Ňüey yapman gerekmez.')
    +'</div>';
  return sectionCard('ūüď¶ HaftalńĪk Hasat Tahmini (√∂n√ľm√ľzdeki 7 g√ľn)', body);
}
/* Protokol Uygunluńüu ‚ÄĒ firma bazlńĪ + oda bazlńĪ. "BaŇüarńĪ" = erken + zamanńĪnda +
   ge√ß-ama-haklńĪ-sebepli (c.erteleSebep="biyolojik" ‚ÄĒ sarńĪm/geliŇüme yavaŇüsa puan
   kńĪrńĪlmaz, odaPerformans() ile AYNI mantńĪk). Sadece FńįńįLEN YAPILMIŇě adńĪmlar
   deńüerlendirilir; hen√ľz sńĪrasńĪ gelmemiŇü adńĪmlar rapora girmez. */
function protokolUygunlukHTML(){
  var d=loadData();
  var firmaStats={}, odaStats={};
  function bosSayac(){ return {erken:0, zamaninda:0, gecSebep:0, gecSebepsiz:0, toplam:0}; }
  (d.cycles||[]).forEach(function(c){
    getProtokol().forEach(function(s,idx){
      if(s.silindi || s.tip!=="olay") return;
      var beklenen=protokolTarih(c,s); if(!beklenen) return;
      var gercek=adimYapilmaTarihi(c,idx,s); if(!gercek) return;
      var firma=c.kompostFirma||"Bilinmiyor", oda=c.oda||"Bilinmiyor";
      if(!firmaStats[firma]) firmaStats[firma]=bosSayac();
      if(!odaStats[oda]) odaStats[oda]=bosSayac();
      var fS=firmaStats[firma], oS=odaStats[oda];
      fS.toplam++; oS.toplam++;
      if(gercek<beklenen){ fS.erken++; oS.erken++; }
      else if(gercek===beklenen){ fS.zamaninda++; oS.zamaninda++; }
      else {
        var sebep=c.erteleSebep && c.erteleSebep["p"+idx];
        if(sebep==="biyolojik"){ fS.gecSebep++; oS.gecSebep++; }
        else { fS.gecSebepsiz++; oS.gecSebepsiz++; }
      }
    });
  });
  function tabloYaz(stats, baslik){
    var keys=Object.keys(stats);
    if(!keys.length) return '';
    var h='<div class="muted" style="margin-top:10px;margin-bottom:4px;">'+baslik+'</div>';
    keys.sort(function(a,b){return stats[b].toplam-stats[a].toplam;}).forEach(function(k){
      var x=stats[k];
      var basari = x.toplam>0 ? Math.round(((x.erken+x.zamaninda+x.gecSebep)/x.toplam)*100) : 0;
      h+='<div style="padding:7px 0;border-bottom:1px solid #eee;">'
        +'<div style="display:flex;justify-content:space-between;"><b>'+esc(k)+'</b><span style="font-weight:700;'+(basari<80?'color:var(--red);':'color:var(--green);')+'">%'+basari+'</span></div>'
        +'<div style="font-size:12px;color:var(--muted);margin-top:2px;">'
        +x.erken+' erken ¬∑ '+x.zamaninda+' zamanńĪnda ¬∑ '+x.gecSebep+' ge√ß (haklńĪ sebep) ¬∑ '+x.gecSebepsiz+' ge√ß (sebepsiz)'
        +'</div></div>';
    });
    return h;
  }
  var body=tabloYaz(firmaStats,'Firma bazńĪnda')+tabloYaz(odaStats,'Oda bazńĪnda');
  if(!body) body='<div class="muted">Hen√ľz deńüerlendirilecek tamamlanmńĪŇü protokol adńĪmńĪ yok.</div>';
  return sectionCard('ūüďč Protokol Uygunluńüu', body);
}
/* ============ √úRETńįM M√úD√úR√ú ANALńįZ MOTORU (cihazda, kural tabanlńĪ) ============
   KullanńĪcńĪ isteńüi: sńĪradan veri g√∂sterimi deńüil, 20 yńĪllńĪk √ľretim m√ľd√ľr√ľ gibi
   t√ľm verileri BńįRLńįKTE deńüerlendiren bir karar destek raporu. Mevcut analiz
   fonksiyonlarńĪnńĪ (odaPerformans, tempAlerts, hasatKaymasi, aktifSartliKurallar,
   getTodaysTasks, odaHastalikRiskli, stageOf, siradakiProtokolAdimi,
   beklenenHasat) TEK bir y√∂netici bakńĪŇüńĪnda birleŇütirir. Kesin teŇühis KOYMAZ ‚ÄĒ
   her zaman "mevcut verilere g√∂re" yorumdur, eksik veri varsa onu s√∂yler. */

/* Uzun metinleri (√∂rn. onlarca gecikmiŇü adńĪmńĪn listesi) rapor i√ßin kńĪsaltńĪr. */
function _analizKisalt(s, n){ s=""+(s||""); n=n||150; return s.length>n ? (s.slice(0,n-1).replace(/\s+\S*$/,'')+"‚Ä¶") : s; }
/* Bir √∂l√ß√ľm alanńĪnńĪn son n kaydńĪndaki eńüilim (artńĪyor/azalńĪyor/sabit). */
function analizTrend(c, field, n){
  n = n || 4;
  var recs = (c.gunluk||[]).filter(function(r){ return numParse(r[field])!==null; })
    .sort(function(a,b){ return cmpDate(a.tarih,b.tarih); });
  if(recs.length < 2) return null;
  recs = recs.slice(-n);
  var ilk = numParse(recs[0][field]), son = numParse(recs[recs.length-1][field]);
  var fark = son - ilk;
  var yon = Math.abs(fark) < 0.6 ? "sabit" : (fark > 0 ? "artńĪyor" : "azalńĪyor");
  return {yon:yon, ilk:ilk, son:son, fark:fark, n:recs.length};
}
/* OdanńĪn son g√ľnl√ľk √∂l√ß√ľm√ľ ka√ß g√ľn √∂nce (veri tazelińüi / eksik veri tespiti). */
function analizSonOlcumGun(c){
  var son = sonGunluk(c);
  if(!son || !son.tarih) return null;
  return daysBetween(son.tarih, todayISO());
}
/* Her aktif odanńĪn √∂n√ľm√ľzdeki 7 g√ľndeki ńįLK hasat g√ľn√ľn√ľ d√∂nd√ľr√ľr. */
function analizYaklasanHasatlar(){
  var d=loadData(); var today=todayISO();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var out=[];
  aktif.forEach(function(c){
    for(var k=0;k<7;k++){
      var iso=addDays(today,k);
      var a=hasatAsama(c,iso);
      if(a && a.flas>0 && (a.kasaMin>0||a.kasaMax>0)){
        out.push({oda:c.oda, iso:iso, gunSonra:k, flas:a.flas, gun:a.gun, min:a.kasaMin, max:a.kasaMax});
        break; /* sadece bu odanńĪn SONRAKńį hasat g√ľn√ľ */
      }
    }
  });
  out.sort(function(a,b){return a.gunSonra-b.gunSonra;});
  return out;
}
/* Tek bir odanńĪn tam analizi ‚ÄĒ hem "Oda Analizi" hem de m√ľd√ľr raporu bunu kullanńĪr. */
function odaAnalizVeri(c){
  var today=todayISO();
  var perf=odaPerformans(c);
  var puan=perf?perf.puan:null;
  var odaAlerts=tempAlerts().filter(function(a){return a.cid===c.id;});
  var stage=stageOf(c).t, gun=gunNo(c,today);
  var son=sonGunluk(c);
  var sog=analizSonOlcumGun(c);
  var kritik=[], dikkat=[], olumlu=[], eksik=[], sonraki=[], trendler=[];

  /* KRńįTńįK: tehlikeli sńĪcaklńĪk (lvl 2) */
  odaAlerts.filter(function(a){return a.lvl===2;}).forEach(function(a){
    kritik.push({neden:a.txt, sonuc:"Misel/√ľr√ľn zarar g√∂rebilir, geliŇüim durabilir.", oneri:"HavalandńĪrma/ńĪsńĪtmayńĪ hemen ayarla; 1-2 saat sonra tekrar √∂l√ß."});
  });
  /* KRńįTńįK: hastalńĪk/zararlńĪ (son 14 g√ľn) */
  if(odaHastalikRiskli(c)){
    var sonH=(c.hastalikKayitlar||[]).slice().sort(function(x,y){return cmpDate(y.tarih,x.tarih);})[0];
    kritik.push({neden:"Son 14 g√ľnde hastalńĪk/zararlńĪ kaydńĪ"+(sonH?(" ‚ÄĒ "+esc(sonH.tur)):""), sonuc:"YayńĪlńĪrsa komŇüu odalara bulaŇüabilir, verim d√ľŇüer.", oneri:"B√∂lgeyi izole et, uygun ila√ßlama/temizlik uygula, komŇüu odalarńĪ da kontrol et."});
  }
  /* KRńįTńįK: sebepsiz/√∂nlenebilir gecikmeler + kalńĪcńĪ kritik hatalar ‚ÄĒ artńĪk
     nedenler listesinde metin/regex arayarak DEńěńįL, odaPerformans'ńĪn
     yapńĪlandńĪrńĪlmńĪŇü alanlarńĪndan (SSOT, aynńĪ veri Puan DetayńĪ'nda da
     kullanńĪlńĪyor) dońürudan okunuyor. */
  if(perf && perf.gecikmisAdimlar.length){
    kritik.push({neden:_analizKisalt(perf.gecikmisAdimlar.length+" gecikmiŇü/atlanmńĪŇü iŇülem: "+perf.gecikmisAdimlar.join(", "),150), sonuc:"Protokol sńĪrasńĪ bozulur, sonraki adńĪmlar da kayar.", oneri:"Geciken adńĪmńĪ bug√ľn tamamla ya da haklńĪ sebebi (geliŇüme/sarńĪm) iŇüaretle."});
  }
  if(perf) perf.kritikHatalar.forEach(function(h){
    kritik.push({neden:_analizKisalt(h,150), sonuc:"KalńĪcńĪ etkisi olabilecek bir hata ‚ÄĒ geri alńĪnamaz.", oneri:"Bir sonraki d√∂ng√ľde bu adńĪmńĪn zamanlamasńĪna √∂zellikle dikkat et."});
  });

  /* DńįKKAT: hafif/kritik sńĪcaklńĪk (lvl 0-1) */
  odaAlerts.filter(function(a){return a.lvl<=1;}).forEach(function(a){ dikkat.push(a.txt); });
  /* DńįKKAT: amonyak */
  if(son && son.amonyak==="Var") dikkat.push("Amonyak kokusu bildirildi ‚ÄĒ havalandńĪrmayńĪ kontrol et.");
  /* DńįKKAT: ge√ßmiŇü sńĪcaklńĪk maruziyeti (kalńĪcńĪ, artńĪk d√ľzeltilemez ama bilgi) ‚ÄĒ ūüĆ°ÔłŹ ńįklim kategorisinin negatif kalemleri */
  if(perf){
    var iklimKat=perf.kategoriler.filter(function(k){return k.key==="iklim";})[0];
    if(iklimKat) iklimKat.kalemler.filter(function(kl){return kl.delta<0;}).forEach(function(kl){ dikkat.push(_analizKisalt(kl.aciklama,150)); });
  }
  /* DńįKKAT: ŇüartlńĪ kurallar (kompost 28¬į+ vb.) */
  aktifSartliKurallar(c).forEach(function(ak){ dikkat.push(ak.kural.aciklama||ak.kuralHedefTxt); });

  /* TREND: kompost / oda / CO‚āā eńüilimleri */
  [["kompostC","Kompost ¬įC"],["odaC","Oda ¬įC"],["co2ust","CO‚āā"]].forEach(function(f){
    var t=analizTrend(c,f[0],4);
    if(t && t.yon!=="sabit") trendler.push(f[1]+" son "+t.n+" √∂l√ß√ľmde "+t.yon+" ("+t.ilk+"‚Üí"+t.son+")");
  });

  /* EKSńįK VERńį */
  if(sog===null) eksik.push("Hi√ß g√ľnl√ľk √∂l√ß√ľm kaydńĪ yok ‚ÄĒ analiz sńĪnńĪrlńĪ.");
  else if(sog>=2) eksik.push("Son √∂l√ß√ľm "+sog+" g√ľn √∂nce ‚ÄĒ g√ľncel sńĪcaklńĪk/CO‚āā gir.");

  /* OLUMLU ‚ÄĒ kategorilerin √∂d√ľl (pozitif) kalemleri, SSOT */
  if(puan!=null && puan>=85 && !odaAlerts.length && !odaHastalikRiskli(c)) olumlu.push("Sorunsuz ilerliyor (puan "+puan+"/100).");
  if(perf) perf.kategoriler.forEach(function(k){ k.kalemler.filter(function(kl){return kl.delta>0;}).forEach(function(kl){ olumlu.push(kl.aciklama); }); });

  /* SONRAKńį KRńįTńįK ADIMLAR */
  var sd=siradakiProtokolAdimi(c);
  if(sd){
    var gg=daysBetween(today, sd.t);
    sonraki.push(sd.txt+" ‚ÄĒ "+(gg>0?(gg+" g√ľn sonra"):(gg===0?"bug√ľn":((-gg)+" g√ľn gecikti"))));
  }
  var kayma=hasatKaymasi(c);
  if(kayma.neden.length) sonraki.push(kayma.neden[0]);
  var bh=beklenenHasat(c);
  if(bh){ var hgg=daysBetween(today,bh); if(hgg!=null && hgg>=0 && hgg<=14) sonraki.push("Tahmini 1. FlaŇü: "+fmtDate(bh)+" ("+hgg+" g√ľn sonra)"); }

  return {oda:c.oda, stage:stage, gun:gun, son:son, sonOlcumGun:sog, puan:puan,
    kritik:kritik, dikkat:dikkat, olumlu:olumlu, eksik:eksik, trendler:trendler, sonraki:sonraki, perf:perf};
}
/* T√ľm tesis i√ßin g√ľnl√ľk √úretim M√ľd√ľr√ľ Raporu verisi. */
function uretimMuduruRaporVeri(){
  var d=loadData(); var today=todayISO();
  var aktif=(d.cycles||[]).filter(function(c){return !c.bosaltimTarihi;});
  var kritik=[], dikkat=[], olumlu=[], eksik=[], oneriler=[], riskli=[];
  aktif.forEach(function(c){
    var v=odaAnalizVeri(c);
    v.kritik.forEach(function(k){ kritik.push({oda:c.oda, neden:k.neden, sonuc:k.sonuc, oneri:k.oneri}); });
    v.dikkat.forEach(function(x){ dikkat.push({oda:c.oda, metin:x}); });
    v.olumlu.forEach(function(x){ olumlu.push(esc(c.oda)+" ("+v.gun+". g√ľn): "+x); });
    v.eksik.forEach(function(x){ eksik.push(esc(c.oda)+": "+x); });
    if(v.puan!=null){
      var neden = v.kritik.length ? v.kritik[0].neden : (v.dikkat.length ? v.dikkat[0] : "");
      riskli.push({oda:c.oda, puan:v.puan, gun:v.gun, neden:neden});
    }
  });
  riskli.sort(function(a,b){ return a.puan-b.puan; });

  /* Bug√ľn + geciken (getTodaysTasks ile ‚ÄĒ SSOT) */
  var tasks=getTodaysTasks();

  var puanlar=riskli.map(function(r){return r.puan;});
  var ortPuan = puanlar.length ? Math.round(puanlar.reduce(function(a,b){return a+b;},0)/puanlar.length) : null;

  return {
    aktifSayi: aktif.length,
    kritik: kritik.slice(0,5),
    dikkat: dikkat,
    olumlu: olumlu,
    eksik: eksik,
    bugun: bugun,

    riskli: riskli.filter(function(r){return r.puan<85;}).slice(0,6),

}

function cloudYedekleriGetir(sessiz){
  if(!FB.ready || !FB.db){ if(!sessiz) toast("Bulut bańülantńĪsńĪ yok"); _cloudBakErr="Bulut bańülantńĪsńĪ yok"; return; }
  if(_cloudBakFetching) return;
  _cloudBakFetching=true;
  var refBase=FB.db.collection("farms").doc(FARM_CODE).collection("yedekler");
  if(!sessiz) toast("Y√ľkleniyor...");
  refBase.where(firebase.firestore.FieldPath.documentId(), ">=", "aktif_")
    .where(firebase.firestore.FieldPath.documentId(), "<", "aktif_~")
    .get().then(function(snap){
      var list=[];
      snap.forEach(function(doc){ list.push({olayId:doc.id.replace("aktif_",""), ts:doc.data().ts, gun:doc.data().gun}); });
      _cloudBakList=list.sort(function(a,b){ return (b.ts||"").localeCompare(a.ts||""); });
      _cloudBakErr=null;
      _cloudBakFetching=false;
      render();
    }).catch(function(e){
      console.warn("bulut yedekleri listelenemedi", e);
      _cloudBakErr=(e&&e.message)||"bilinmeyen hata";
      _cloudBakFetching=false;
      if(!sessiz) toast("Bulut yedekleri listelenemedi");
      render();
    });

/* BAKIM: "olay" tipi olmayan (ila√ß/su) adńĪmlarda ertele ASLA olmamalńĪ ‚ÄĒ hi√ßbir
   UI akńĪŇüńĪ bu tiplere ertele yazmaz. Ama eski/buglńĪ kod yollarńĪndan (v247

   Bu tarayńĪcńĪ+temizleyici o kalńĪntńĪyńĪ bulup g√ľvenle siler. */
function bozukErteleTara(){
  var d=loadData();
  var P=getProtokol();
  var bulunan=[];
  (d.cycles||[]).forEach(function(c){
    if(!c.ertele) return;
    Object.keys(c.ertele).forEach(function(key){
      var idx=parseInt(key.substring(1),10);
      var s=P[idx];
      if(!s || s.tip!=="olay"){
        bulunan.push({cid:c.id, oda:c.oda, key:key, deger:c.ertele[key], adim:s?s.txt:"(bilinmeyen adńĪm)"});
      }
    });
  });
  return bulunan;
}
function bozukErteleTemizle(){
  if(!can("manage")) return noPerm();

  var ozet=bulunan.slice(0,3).map(function(b){return b.oda+" ‚ÄĒ "+b.adim;}).join(", ");

/* BAKIM: v253 √∂ncesi, her "Planla" iŇülemi eskiyi silmeden yeni not ekliyordu
   ("TńĪrmńĪk i√ßin plan X ¬∑ TńĪrmńĪk i√ßin plan Y ¬∑ ..."). v253 bunu d√ľzeltti (artńĪk
   aynńĪ adńĪm i√ßin sadece SONUNCUSU tutulur) ama GE√áMńįŇěTE birikmiŇü notlar
   otomatik temizlenmez. Bu ara√ß, aynńĪ "X i√ßin plan" √∂nekiyle birden fazla kez
   tekrarlanan notlarńĪ bulup sadece en sonuncusunu bńĪrakńĪr ‚ÄĒ "i√ßin plan"
   olmayan dińüer notlara (√∂rn. "yapńĪldńĪ" tamamlama kayńĪtlarńĪ) dokunmaz. */
function tekrarliPlanNotlariTara(){
  var d=loadData();
  var bulunan=[];
  (d.cycles||[]).forEach(function(c){
    (c.gunluk||[]).forEach(function(g){
      var v=g.islemNot; if(!v) return;
      var parcalar=(""+v).split(" ¬∑ ").map(function(x){return x.trim();}).filter(Boolean);
      var gruplar={};
      parcalar.forEach(function(p,i){
        var m=/^(.+?) i√ßin plan /.exec(p);
        if(m){ (gruplar[m[1]]=gruplar[m[1]]||[]).push(i); }
      });
      if(Object.keys(gruplar).some(function(k){return gruplar[k].length>1;})){
        bulunan.push({cid:c.id, oda:c.oda, tarih:g.tarih});
      }
    });
  });
  return bulunan;
}
function tekrarliPlanNotlariTemizle(){
  if(!can("manage")) return noPerm();
  var bulunan=tekrarliPlanNotlariTara();
  if(!bulunan.length){ toast("Temiz ‚ÄĒ tekrarlayan plan notu yok"); return; }
  var ozet=bulunan.slice(0,3).map(function(b){return b.oda+" ("+fmtDate(b.tarih)+")";}).join(", ");
  if(!confirm(bulunan.length+" g√ľndeki tekrarlayan plan notlarńĪ tek satńĪra indirilecek ("+ozet+(bulunan.length>3?", ...":"")+"). Devam edilsin mi?")) return;
  var d=loadData();
  bulunan.forEach(function(b){
    var c=d.cycles.find(function(x){return x.id===b.cid;}); if(!c) return;
    var g=(c.gunluk||[]).find(function(x){return x.tarih===b.tarih;}); if(!g || !g.islemNot) return;
    var parcalar=(""+g.islemNot).split(" ¬∑ ").map(function(x){return x.trim();}).filter(Boolean);
    var sonIdx={};
    parcalar.forEach(function(p,i){ var m=/^(.+?) i√ßin plan /.exec(p); if(m) sonIdx[m[1]]=i; });
    var yeni=parcalar.filter(function(p,i){
      var m=/^(.+?) i√ßin plan /.exec(p);
      return !m || sonIdx[m[1]]===i; /* "i√ßin plan" deńüilse hep kalńĪr; √∂yleyse sadece en son g√∂r√ľleni */
    });
    g.islemNot=yeni.join(" ¬∑ ");
  });
  saveData(); logAudit("tekrarlayan plan notlarńĪ temizlendi", bulunan.length+" kayńĪt"); toast(bulunan.length+" kayńĪt temizlendi"); render();
}

/* Re√ßete satńĪrlarńĪnńĪ Ayarlar'da g√∂sterirken kronolojik/iŇü akńĪŇüńĪ sńĪrasńĪna g√∂re
   sńĪralamak i√ßin ortak anahtar. ESKńįDEN sadece "gelis" ve "toprak" referanslarńĪ
   dońüru normalize ediliyordu ‚ÄĒ "poŇüet"e, "tiftik"e, "tńĪrmńĪk"a referans veren
   satńĪrlar (√∂rn. Serenade: poŇüet+8) ham g√ľn sayńĪsńĪyla (8) sńĪralanńĪyordu, sanki
   geliŇü+8'miŇü gibi ‚ÄĒ oysa ger√ßekte poŇüet zaten geliŇü+6-7 civarńĪ olduńüundan
   ger√ßek sńĪrasńĪ √ßok daha geriydi. ArtńĪk T√úM referans zinciri (kompost indirme ‚Üí
   poŇüet ‚Üí tiftik/toprak ‚Üí tńĪrmńĪk ‚Üí hava ‚Üí hasat) √∂zyinelemeli olarak "geliŇü
   ekseni"ne √ß√∂z√ľl√ľyor ‚ÄĒ d√∂ng√ľ/sonsuz √∂zyineleme korumasńĪ var. */
function protokolSiraAnahtari(s, _derinlik){
  _derinlik = _derinlik||0;
  if(_derinlik>8) return 90000+(s.gun||0); /* d√∂ng√ľ korumasńĪ */
  if(!s || !s.ref || s.ref==="gelis") return (s&&s.gun)||0;
  if(s.ref==="toprak"){
    var offToprak=getSet().offToprak||13;
    return offToprak+(s.gun||0);
  }
  /* poset/tiftik/tirmik/hava/kompostindirme/√∂zel referanslar: o rol√ľn KENDńį
     satńĪrńĪnńĪ bul, onun ekseni + bu satńĪrńĪn g√ľn farkńĪ */
  var refIdx=protokolRolIdx(s.ref);
  /* SAHńįPSńįZ REFERANS: bu referansńĪ (√∂rn. √∂zel eklenen "1. FlaŇü") hi√ßbir satńĪr
     hen√ľz Rol olarak almamńĪŇüsa, sistem "bu ne zaman?" bilemiyor demektir.
     ESKńįDEN bu durumda ham g√ľn sayńĪsńĪyla (√∂rn. 5) sńĪralanńĪyordu ‚ÄĒ sanki
     geliŇüten 5 g√ľn sonraymńĪŇü gibi listenin EN BAŇěINA √ßńĪkńĪyordu, oysa ger√ßekte
     √ßok daha ge√ß bir aŇüama olabilir (√∂rn. "1. FlaŇü" hasat civarńĪ). ArtńĪk
     sahipsiz referanslar listenin SONUNA atńĪlńĪyor (90000+) ‚ÄĒ en azńĪndan
     yanlńĪŇü yere deńüil, g√∂ze √ßarpan/kontrol edilmesi gereken bir yere d√ľŇüer. */
  if(refIdx<0) return 90000+(s.gun||0);
  var refStep=getProtokol()[refIdx];
  if(!refStep) return 90000+(s.gun||0);
  return protokolSiraAnahtari(refStep, _derinlik+1) + (s.gun||0);
}

async function parolaDegistir(rolKey){

function protokolSatirKaydet(idx){
  if(!can("manage")) return noPerm();

  var sre=el("pr_sure_"+idx); if(sre){ var sv=parseInt(sre.value,10); P[idx].sure=(isNaN(sv)||sv<1)?1:sv; }
  var tk=el("pr_tekrar_"+idx); if(tk){ var tv=parseInt(tk.value,10); P[idx].tekrar=(isNaN(tv)||tv<0)?0:tv; }
  var rl=el("pr_rol_"+idx); if(rl) P[idx].rol=rl.value||"";

     fazla satńĪra atanmńĪŇüsa, protokolRolIdx() sadece ńįLK bulduńüunu kullanńĪr ‚ÄĒ
     kullanńĪcńĪ ikinci satńĪra Rol atadńĪńüńĪnńĪ sanńĪr ama sistem h√Ęl√Ę eskisini
     baz alńĪr, kafa karńĪŇütńĪrńĪcńĪ/√ßeliŇükili sonu√ßlar √ľretir. Burada yeni Rol
     atanńĪrken, AYNI Rol'√ľ taŇüńĪyan BAŇěKA satńĪrlardan otomatik kaldńĪrńĪlńĪr ‚ÄĒ
     "bu rol√ľ artńĪk BEN taŇüńĪyorum" mantńĪńüńĪyla tek sahip garanti edilir. */
  if(rl && rl.value){
    var yeniRol=rl.value, tasindi=0;
    P.forEach(function(diger,dIdx){
      if(dIdx!==idx && !diger.silindi && diger.rol===yeniRol){ diger.rol=""; tasindi++; }

  }
  /* Referans noktasńĪ (Kompost indirme/PoŇüet/Tiftik/Toprak/TńĪrmńĪk/Hava/GeliŇü) ‚ÄĒ
     eskiden bu satńĪrlarda hi√ß d√ľzenlenemiyordu, sadece yeni satńĪr eklerken
     (ve orada da sadece GeliŇü/Toprak se√ßeneńüi vardńĪ) ayarlanabiliyordu. Bu,
     "PoŇüetten sonra sulama vermedi" ve "sńĪradaki iŇülem sńĪra atlńĪyor" gibi
     hatalarńĪn temel sebebiydi ‚ÄĒ kullanńĪcńĪ referansńĪ g√∂remiyor/deńüiŇütiremiyordu. */
  var refEl=el("pr_ref_"+idx);
  if(refEl && refEl.value){
    var eskiRef=P[idx].ref;
    P[idx].ref=refEl.value;
    if(refEl.value!==eskiRef && protokolRefDongusuVarMi(idx)){
      /* Bu referans zinciri kendine geri d√∂n√ľyor ‚ÄĒ kaydedilirse uygulama her
         bu adńĪmńĪn tarihi hesaplanmaya √ßalńĪŇüńĪldńĪńüńĪnda √ß√∂kerdi (sonsuz
         √∂zyineleme). DeńüiŇüiklińüi geri al, kullanńĪcńĪyńĪ net bir Ňüekilde uyar. */
      P[idx].ref=eskiRef;
      refEl.value=eskiRef;
      showWarnBox("‚ĚĆ D√∂ng√ľsel Referans", [
        '"'+esc(refEtiketi(refEl.value))+'" referansńĪ se√ßilemedi ‚ÄĒ bu adńĪmńĪn referans zinciri dolaŇüńĪp kendine geri d√∂n√ľyor.',
        "√Ėrnek: A adńĪmńĪ B'ye bakńĪyor, B de (dolaylńĪ olarak) A'ya bakńĪyorsa d√∂ng√ľ oluŇüur.",
        "DeńüiŇüiklik kaydedilmedi, √∂nceki referans korundu."
      ]);
    }
  }
  var scEl=el("pr_sonuc_"+idx);
  if(scEl){ P[idx].sonucSecenekleri = scEl.value.split(",").map(function(x){return x.trim();}).filter(Boolean); }
  /* TekrarlńĪ sulama/ila√ß kuralńĪ (M√ľhendis Protokol√ľ satńĪrlarńĪ): "HER G√úN
     tekrarlansńĪn" kutusu iŇüaretliyse tekrarBitisRef/tekrarBitisGun kaydedilir,
     deńüilse (daha √∂nce varsa) TEMńįZLENńįR. Bu alan eskiden mevcut satńĪrlarda
     hi√ß d√ľzenlenemiyordu ‚ÄĒ sadece yeni eklenirken ayarlanabiliyordu. Bir kez
     eksik kaydedilmiŇü satńĪrlar bu formdan artńĪk d√ľzeltilebilir. */
  var trChk=el("pr_tekrar_chk_"+idx);
  if(trChk){
    if(trChk.checked){
      var trRef=el("pr_tekrar_ref_"+idx); var trGun=el("pr_tekrar_gun_"+idx);

/* ---------- G√ľnl√ľk tur: protokolden sulama √∂nerisi ---------- */
/* Bir protokol adńĪmńĪnńĪn uygulandńĪńüńĪ TARńįH ARALIńěINI d√∂nd√ľr√ľr.
   Normal (tekil) adńĪmlarda baŇülangńĪ√ß=bitiŇü=protokolTarih(c,step).
   "tekrarBitisRef" tanńĪmlńĪ adńĪmlarda (√∂rn. poŇüetten toprak-2'ye kadar HER G√úN
   500 lt su + Serenade) baŇülangńĪ√ß poŇüetin tarihi, bitiŇü toprańüńĪn (tekrarBitisGun
   kadar kaydńĪrńĪlmńĪŇü) tarihidir ‚ÄĒ toprak ertelenirse bitiŇü de otomatik kayar. */
function protokolAdimAraligi(c, step){
  if(!step) return null;
  var baslangic=protokolTarih(c, step);
  if(!baslangic) return null;
  if(!step.tekrarBitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitisRef=protokolReferansTarihi(c, step.tekrarBitisRef, step.rol);
  if(!bitisRef) return {baslangic:baslangic, bitis:baslangic};
  var bitis=addDays(bitisRef, step.tekrarBitisGun||0);
  if(cmpDate(bitis, baslangic) < 0) return null; /* aralńĪk bu partide anlamsńĪzsa (toprak √ßok erken vb.) g√∂sterme */
  return {baslangic:baslangic, bitis:bitis};
}
/* Bug√ľn (iso) i√ßin protokol√ľn √∂nerdińüi su/ila√ß adńĪmlarńĪnńĪn getProtokol() indeksleri
   ‚ÄĒ protokolOneri ile AYNI eŇüleŇütirme mantńĪńüńĪ (aŇüama piramidi, tekrarBitisRef aralńĪńüńĪ,
   placeholder metin filtresi), ama metin yerine idx d√∂ner. Tek kaynak: protokolOneri
   bunu sarmalayńĪp metne √ßevirir, sulamaGorevErteleUygula da AYNI idx'leri kullanarak
   "bug√ľn√ľn √∂nerisini yarńĪna taŇüńĪ" iŇülemini _adimiYarinaTasi (SSOT) √ľzerinden yapar ‚ÄĒ
   iki yerde ayrńĪ ayrńĪ eŇüleŇütirme mantńĪńüńĪ tekrarlanmaz. */
function protokolOneriIdxleri(c, iso){
  var out=[];
  /* Oda Ňüu an hangi aŇüamada? Sulama/ila√ß √∂nerisi SADECE oda o aŇüamada veya
     daha sonraki aŇüamadaysa g√∂sterilsin. √Ėrn: Toprak aŇüamasńĪndayken "Hava+3 su"
     √∂nerisi gelmemeli ‚ÄĒ √ß√ľnk√ľ hen√ľz Hava aŇüamasńĪna gelmedi. */
  var odaAsamasi = stageOf(c).t; /* "Toprak d√∂nemi", "1. Misel geliŇüim", vb */

  getProtokol().forEach(function(s,idx){
    if(s.silindi || (s.tip!=="ilac" && s.tip!=="su")) return;
    if(s.tekrarBitisRef){
      var ar=protokolAdimAraligi(c,s);
      if(ar && cmpDate(iso,ar.baslangic)>=0 && cmpDate(iso,ar.bitis)<=0) out.push(idx);
      return;
    }
    var dt=protokolTarih(c,s); if(!dt) return;
    /* KRńįTńįK: ila√ß/su adńĪmlarńĪnńĪn KENDńį ertelemesi (c.ertele["p"+idx]) eskiden
       hi√ß uygulanmńĪyordu ‚ÄĒ sarńĪm toprańüa ge√ßmediyse formaldehit g√ľn√ľn√ľ 1 g√ľn
       ertelemek gibi bir aksiyonun hi√ßbir etkisi olmuyordu (bkz.
       sarimSoruCevapla). protokolTarih() SADECE referans zincirindeki √ĖNCEKńį
       adńĪmlarńĪn ertelemesini taŇüńĪr, adńĪmńĪn KENDńį ertelemesini SSOT deseni
       gereńüi √ßańüńĪran ekler ‚ÄĒ burada da aynńĪ desen uygulanńĪyor. */
    var _ert=(c.ertele && c.ertele["p"+idx])||0;
    if(_ert) dt=addDays(dt,_ert);

    /* YALNIZCA bug√ľn i√ßin sulama/ila√ß ‚ÄĒ eski tarihlerde deńüil */
    if(dt!==iso) return;
    
    /* AŇüama kontrol√ľ: Sulama/ila√ß ref'ńĪ oda'nńĪn bulunduńüu aŇüamaya uygun mu?
       Toprak d√∂nemindeyken ‚Üí ref:"toprak" sulamalar ‚úď
       Hava d√∂nemindeyken ‚Üí ref:"hava" sulamalar ‚úď
       Ama Toprak d√∂nemindeyken ref:"hava" sulamalar g√∂sterilmemeli ‚úó */
    var refAsamaPiramidi = {
      gelis:0, poset:1, tiftik:2, toprak:3, tirmik:4, hava:5, hasat:6
    };
    var sulamaRefSeviye = refAsamaPiramidi[s.ref] || -1;
    var odaAsamaSeviye = odaAsamasi.includes("Kulu√ßka") ? 0
      : odaAsamasi.includes("Toprak d√∂nemi") ? 3
      : odaAsamasi.includes("1. Misel") ? 4
      : odaAsamasi.includes("2. Misel") ? 5
      : odaAsamasi.includes("Pimleme") ? 5
      : odaAsamasi.includes("Bezelye") ? 5
      : odaAsamasi.includes("Ceviz") ? 5
      : odaAsamasi.includes("Hasat") ? 6
      : -1;
    
    /* Sulama ref'ńĪ oda'nńĪn aŇüamasńĪndan SONRASINA referans veriyorsa, hen√ľz
       o aŇüamaya gelmedińüinden sulamayńĪ gizle. */
    if(sulamaRefSeviye > odaAsamaSeviye) return;
    
    var metin = adimGosterMetni(c, idx, s, iso);
    /* Placeholder/sentinel metin kontrol√ľ: kullanńĪcńĪ protokole "bu g√ľn hi√ßbir

    var PLACEHOLDER_RE = /^(boŇü|yok|hi√ß ?bir ?Ňüey|hi√ßbir Ňüey verilmeyecek|-|‚ÄĒ)$/i;

/* "SarńĪm kontrol√ľ" gereken ila√ß adńĪmńĪ: formaldehit uygulamasńĪ, sarńĪm
   toprańüa hen√ľz ge√ßmediyse 1 g√ľn ertelenmeli (kullanńĪcńĪ isteńüi). Metin

   kelime" korunduńüu s√ľrece √ßalńĪŇümaya devam eder. */
function sarimKontrolluMu(s){ return !!(s && s.tip==="ilac" && /formaldehit/i.test(s.txt||"")); }
/* Bug√ľn i√ßin sarńĪm-kontroll√ľ bir ila√ß adńĪmńĪ var mńĪ (ertele dahil edilmiŇü

function bugunSarimKontroluGerekliMi(c, iso){

   (protokolOneri artńĪk bunu okuyor, bkz. yukarńĪdaki yorum). Ertesi g√ľn adńĪm

function sarimSoruCevapla(cid, idx, cevap){

function verimFlasOzet(c){
  var S=getSet(); var out={};
  (c.hasat||[]).forEach(function(h){
    var ha=hasatAsama(c,h.tarih);
    var key=(ha&&ha.flas>0)?("F"+ha.flas):"dińüer";
    if(!out[key]) out[key]={kasa:0};

}
/* ---------- Tahmini verim (aktif odalar i√ßin, firma/filo ge√ßmiŇüine g√∂re) ---------- */
function firmaOrtalamaKgTon(firma){
  var vals=tumTamamlananDongu().filter(function(c){return (c.kompostFirma||"")===firma;}).map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function filoOrtalamaKgTon(){
  var vals=tumTamamlananDongu().map(function(c){return verimOzet(c).kgTon;}).filter(function(v){return v!=null;});
  if(!vals.length) return null;
  return {ort: vals.reduce(function(a,b){return a+b;},0)/vals.length, n: vals.length};
}
function tahminiVerim(c){
  if(c.bosaltimTarihi) return null;
  var ton=(numParse(c.tonaj)||0)/1000; if(ton<=0) return null;
  var f=firmaOrtalamaKgTon(c.kompostFirma||"");

  if(f && f.n>=2){ kaynak="firma ortalamasńĪ ("+esc(c.kompostFirma||"")+", n="+f.n+")"; }
  else { f=filoOrtalamaKgTon(); kaynak=f?("filo geneli ortalamasńĪ, n="+f.n):null; }
  if(!f) return null;
  return {kg: f.ort*ton, kaynak: kaynak};
}
/* ============ Kompost Firma Performans Analizi ============
   Her firma, ge√ßmiŇü T√úM tamamlanmńĪŇü (boŇüaltńĪlmńĪŇü + hasat kaydńĪ olan) odalarńĪ
   √ľzerinden 7 kategoride 100 puan √ľzerinden deńüerlendirilir. Hi√ßbir puan
   kalńĪcńĪ olarak SAKLANMAZ ‚ÄĒ odaPerformans/hasatEgrisiAnaliz'le aynńĪ mimari:
   her render'da mevcut veriden CANLI hesaplanńĪr, bu y√ľzden "her yeni oda
   tamamlandńĪńüńĪnda puan g√ľncellensin" isteńüi ekstra bir tetikleyici kodu
   gerektirmeden kendilińüinden sańülanńĪr. Kategori fonksiyonlarńĪ m√ľmk√ľn olan
   yerde MEVCUT oda-bazlńĪ fonksiyonlarńĪ (SSOT) yeniden kullanńĪr:
   _puanIklim/_puanMiselGelisimi (v382), hasatEgrisiAnaliz (v385),
   firmaOrtalamaKgTon/filoOrtalamaKgTon ‚ÄĒ tekrar hesaplama YAPILMAZ. */

/* ūüďč Protokol Uyumu (20) ‚ÄĒ kompost ortalama ka√ßńĪncńĪ g√ľnde tiftik/toprak/
   hava/ilk flaŇüa ulaŇüńĪyor. Tek baŇüńĪna erken ya da ge√ß olmak CEZALANDIRILMAZ
   (tutarlńĪ bir erken firma hńĪzlńĪ geliŇüim demek olabilir) ‚ÄĒ asńĪl √∂l√ß√ľlen
   TUTARLILIK (sapma): aynńĪ firma bazen √ßok erken bazen √ßok ge√ß kalńĪyorsa
   (√∂ng√∂r√ľlemezlik) puan kńĪrńĪlńĪr. */
function _firmaProtokolUyumu(cycles){
  var maks=20, puanPerCheckpoint=5;
  var checkpoints=[
    {key:'tiftik', ad:'Tiftik', takAd:'Tiftik', gercek:function(c){return c.tiftikTarihi;}},
    {key:'toprak', ad:'Toprak serimi', takAd:'Toprak', gercek:function(c){return c.toprakTarihi;}},
    {key:'hava', ad:'Hava baŇülangńĪcńĪ', takAd:'Hava', gercek:function(c){return c.havaBaslangic;}},
    {key:'flas1', ad:'ńįlk flaŇü baŇülangńĪcńĪ', takAd:'1. FlaŇü', gercek:function(c){return (c.hasat&&c.hasat.length)?hasatBaslangic(c):null;}}
  ];
  var puanToplam=0, kalemler=[], bulgular=[];
  checkpoints.forEach(function(cp){
    var farklar=[];
    cycles.forEach(function(c){
      var tak=beklenenTakvim(c);
      var row=tak.filter(function(r){return r.ad===cp.takAd;})[0];
      var beklenen=row?row.beklenen:null, gercek=cp.gercek(c);
      if(beklenen && gercek){ var d=daysBetween(beklenen,gercek); if(d!=null) farklar.push(d); }
    });
    if(farklar.length<2){ puanToplam+=puanPerCheckpoint; return; } /* yeterli veri yok ‚ÄĒ n√∂tr (tam puan) */
    var ort=farklar.reduce(function(a,b){return a+b;},0)/farklar.length;
    var sapma=Math.sqrt(farklar.reduce(function(s,x){return s+Math.pow(x-ort,2);},0)/farklar.length);
    var puan=Math.max(0, puanPerCheckpoint-Math.min(puanPerCheckpoint, sapma*1.1));
    if(Math.abs(ort)>4) puan=Math.max(0, puan-1); /* √ßok b√ľy√ľk ortalama sapma (tutarlńĪ olsa da) k√ľ√ß√ľk ek not */
    puanToplam+=puan;
    if(puan<puanPerCheckpoint-0.5){
      kalemler.push(_kalem(Math.round((puan-puanPerCheckpoint)*10)/10, cp.ad+" zamanlamasńĪ tutarsńĪz (ort. "+(ort>=0?"+":"")+ort.toFixed(1)+" g√ľn, sapma ¬Ī"+sapma.toFixed(1)+" g√ľn, n="+farklar.length+")"));
    }
    bulgular.push({ad:cp.ad, ortalama:ort, sapma:sapma, n:farklar.length});
  });
  if(!kalemler.length) kalemler.push(_kalem(0,"Protokol kilometre taŇülarńĪ √∂ng√∂r√ľlebilir zamanlamayla ilerliyor"));
  puanToplam=Math.max(0,Math.min(maks,Math.round(puanToplam*10)/10));
  return {puan:puanToplam, maks:maks, kalemler:kalemler, bulgular:bulgular};
}
/* ūüĆ°ÔłŹ Kompost Kalitesi (20) ‚ÄĒ sńĪcaklńĪk stabilitesi (_puanIklim, 12p) + amonyak
   s√ľresi (4p) + misel geliŇüim d√ľzenlilińüi/homojenlińüi (_puanMiselGelisimi, 4p). */
function _firmaKompostKalitesi(cycles){
  var maks=20;
  var sicaklikPuanlar=cycles.map(function(c){return _puanIklim(c).puan;});
  var miselPuanlar=cycles.map(function(c){return _puanMiselGelisimi(c).puan;});
  var amonyakGunler=cycles.map(function(c){return (c.gunluk||[]).filter(function(r){return r.amonyak==="Var";}).length;});
  var ortSicaklikPuan=sicaklikPuanlar.length?(sicaklikPuanlar.reduce(function(a,b){return a+b;},0)/sicaklikPuanlar.length):25;
  var ortMiselPuan=miselPuanlar.length?(miselPuanlar.reduce(function(a,b){return a+b;},0)/miselPuanlar.length):20;
  var ortAmonyak=amonyakGunler.length?(amonyakGunler.reduce(function(a,b){return a+b;},0)/amonyakGunler.length):0;

  var sicaklikKismi=(ortSicaklikPuan/25)*12;
  var miselKismi=(ortMiselPuan/20)*4;
  var amonyakKismi=4;
  var kalemler=[];
  if(ortAmonyak>4){ var d=Math.min(4,(ortAmonyak-4)*0.8); amonyakKismi-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "Ortalama amonyak s√ľresi "+ortAmonyak.toFixed(1)+" g√ľn ‚ÄĒ uzun")); }
  else kalemler.push(_kalem(0,"Amonyak s√ľresi ortalama "+ortAmonyak.toFixed(1)+" g√ľn ‚ÄĒ normal aralńĪkta"));
  if(sicaklikKismi<12*0.8) kalemler.push(_kalem(Math.round((sicaklikKismi-12)*10)/10, "Kompost/oda sńĪcaklńĪńüńĪ y√∂netimi ortalamanńĪn altńĪnda (d√∂ng√ľ baŇüńĪna ort. iklim puanńĪ "+ortSicaklikPuan.toFixed(0)+"/25)"));
  if(miselKismi<4*0.8) kalemler.push(_kalem(Math.round((miselKismi-4)*10)/10, "Misel geliŇüimi d√ľzensizlińüi g√∂r√ľl√ľyor (d√∂ng√ľ baŇüńĪna ort. misel puanńĪ "+ortMiselPuan.toFixed(0)+"/20)"));

  var puan=Math.max(0,Math.round((sicaklikKismi+miselKismi+amonyakKismi)*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, ortSicaklikPuan:ortSicaklikPuan, ortMiselPuan:ortMiselPuan, ortAmonyak:ortAmonyak};
}
/* ūüĆ¶ÔłŹ ńįklim ToleransńĪ (10) ‚ÄĒ k√ľ√ß√ľk iklim sapmalarńĪnńĪn olduńüu d√∂ng√ľlerle
   olmadńĪńüńĪ d√∂ng√ľler arasńĪnda verim farkńĪ var mńĪ (uretimOgrenmesiVeri'deki
   medyan-b√∂lme deseniyle AYNI yaklaŇüńĪm). Fark k√ľ√ß√ľkse firma dayanńĪklńĪ,
   b√ľy√ľkse k√ľ√ß√ľk hatalarda bile √ľretim bozuluyor demektir. */
function _firmaIklimToleransi(cycles){
  var maks=10;
  var veri=cycles.map(function(c){
    var sapmaGun=0;
    (c.gunluk||[]).forEach(function(r){
      var ko=numParse(r.kompostC); if(ko==null) return;
      if(ko>=KOMPOST_KRITIK_UST||ko<=KOMPOST_KRITIK_ALT||ko>=KOMPOST_TEHLIKELI||ko<=KOMPOST_TEHLIKE_ALT) sapmaGun++;
    });
    return {sapmaGun:sapmaGun, kgTon:verimOzet(c).kgTon};
  }).filter(function(x){return x.kgTon!=null;});
  if(veri.length<4) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Yeterli veri yok (n="+veri.length+") ‚ÄĒ n√∂tr puan verildi")]};
  var sirali=veri.slice().sort(function(a,b){return a.sapmaGun-b.sapmaGun;});
  var medyan=sirali[Math.floor(sirali.length/2)].sapmaGun;
  var az=veri.filter(function(x){return x.sapmaGun<=medyan;});
  var cok=veri.filter(function(x){return x.sapmaGun>medyan;});
  if(az.length<2||cok.length<2) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Sapma dańüńĪlńĪmńĪ yetersiz ‚ÄĒ n√∂tr puan verildi")]};
  var ortAz=az.reduce(function(s,x){return s+x.kgTon;},0)/az.length;
  var ortCok=cok.reduce(function(s,x){return s+x.kgTon;},0)/cok.length;
  var fark=ortAz>0?((ortAz-ortCok)/ortAz*100):0;
  var puan, aciklama;
  if(fark<=5){ puan=maks; aciklama="Az sapmalńĪ ve √ßok sapmalńĪ d√∂ng√ľler arasńĪnda verim farkńĪ yok denecek kadar az ‚ÄĒ k√ľ√ß√ľk iklim dalgalanmalarńĪnda √ľretim stabil kalńĪyor."; }
  else if(fark<=15){ puan=maks-3; aciklama="√áok sapmalńĪ d√∂ng√ľlerde verim ortalama %"+fark.toFixed(0)+" daha d√ľŇü√ľk ‚ÄĒ orta d√ľzey iklim toleransńĪ."; }
  else { puan=maks-6; aciklama="√áok sapmalńĪ d√∂ng√ľlerde verim ortalama %"+fark.toFixed(0)+" daha d√ľŇü√ľk ("+ortAz.toFixed(0)+" ‚Üí "+ortCok.toFixed(0)+" kg/ton) ‚ÄĒ k√ľ√ß√ľk iklim hatalarńĪnda bile √ľretim belirgin bozuluyor."; }
  puan=Math.max(0,puan);
  return {puan:puan, maks:maks, kalemler:[_kalem(puan-maks, aciklama)]};
}
/* ūüďą Hasat Eńürisi (20) ‚ÄĒ v385'teki hasatEgrisiAnaliz() (0-100/flaŇü) firma
   genelinde ortalanńĪp 20 puana √∂l√ßeklenir; ayrńĪ bir eńüri analizi TEKRARLANMAZ. */
function _firmaHasatEgrisi(cycles){

/* ‚öĖÔłŹ Verim (15) ‚ÄĒ tek baŇüńĪna belirleyici deńüil (toplam 100'√ľn %15'i);
   firmaOrtalamaKgTon/filoOrtalamaKgTon (mevcut) ile filo geneline kńĪyaslanńĪr. */
function _firmaVerim(firma){

  if(filo&&filo.n>=2){
    var fark=((f.ort-filo.ort)/filo.ort)*100;

    else if(fark>=-5){ puan=maks*0.85; aciklama+=", filo ortalamasńĪna yakńĪn"; }
    else if(fark>=-15){ puan=maks*0.6; aciklama+=", filo ortalamasńĪnńĪn %"+Math.abs(fark).toFixed(0)+" altńĪnda"; }
    else { puan=maks*0.35; aciklama+=", filo ortalamasńĪnńĪn belirgin (%"+Math.abs(fark).toFixed(0)+") altńĪnda"; }
  }
  puan=Math.round(puan*10)/10;
  return {puan:puan, maks:maks, kalemler:[_kalem(Math.round((puan-maks)*10)/10, aciklama)]};

/* ūüßļ Kalite ve Fire (10) ‚ÄĒ VARSA (Hasat Takip tartńĪ programńĪndan gelen
   ana90/kestane/duble/dokme/ikinci kayńĪtlarńĪ, bkz. hasatTartiGetir)
   deńüerlendirilir; kayńĪt yoksa n√∂tr bńĪrakńĪlńĪr ("varsa deńüerlendir" isteńüi). */
function _firmaKaliteFire(cycles){
  var maks=10;
  var toplam=0, kestane=0, duble=0, dokme=0, ikinci=0, kayitSayisi=0;
  cycles.forEach(function(c){
    hasatTartiGetir(c.oda, c.tur).forEach(function(k){
      var t=(k.ana90||0)+(k.kestane||0)+(k.duble||0)+(k.dokme||0)+(k.ikinci||0);
      toplam+=t; kestane+=(k.kestane||0); duble+=(k.duble||0); dokme+=(k.dokme||0); ikinci+=(k.ikinci||0);
      kayitSayisi++;
    });
  });
  if(!kayitSayisi||toplam<=0) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Hasat Takip (tartńĪ) verisi bulunmuyor ‚ÄĒ bu kategori n√∂tr bńĪrakńĪldńĪ")]};
  var kucukOrani=(kestane/toplam)*100;
  var fireOrani=((duble+dokme+ikinci)/toplam)*100;
  var puan=maks, kalemler=[];
  if(kucukOrani>15){ var d=Math.min(4,(kucukOrani-15)*0.3); puan-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "K√ľ√ß√ľk mantar (kestane) oranńĪ %"+kucukOrani.toFixed(0)+" ‚ÄĒ y√ľksek")); }
  if(fireOrani>20){ var d2=Math.min(6,(fireOrani-20)*0.3); puan-=d2; kalemler.push(_kalem(-Math.round(d2*10)/10, "Fire/alt sńĪnńĪf (duble+d√∂kme+ikinci) oranńĪ %"+fireOrani.toFixed(0)+" ‚ÄĒ y√ľksek")); }
  if(!kalemler.length) kalemler.push(_kalem(0,"Fire ve k√ľ√ß√ľk mantar oranńĪ d√ľŇü√ľk, kalite sńĪnńĪflarńĪ dengeli (n="+kayitSayisi+" tartńĪ kaydńĪ)"));
  puan=Math.max(0,Math.round(puan*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, kucukOrani:kucukOrani, fireOrani:fireOrani};
}
/* ūüéĮ √úretim KolaylńĪńüńĪ (5) ‚ÄĒ d√∂ng√ľ baŇüńĪna m√ľdahale (erteleme/plan deńüiŇüiklińüi)
   sńĪklńĪńüńĪ + sulama iptal/deńüiŇüikliklerinin AI Kontrol√ľ'nden (v383) ge√ßen
   verdict oranńĪ ("sulama toleransńĪ"). */
function _firmaUretimKolayligi(cycles){
  var maks=5;
  if(!cycles.length) return {puan:maks, maks:maks, kalemler:[_kalem(0,"Yeterli veri yok ‚ÄĒ n√∂tr puan verildi")], sulamaToleransEtiket:"‚ÄĒ"};
  var mudahaleToplam=0, sulamaKararToplam=0, sulamaRiskliToplam=0, sulamaUyumluToplam=0;
  cycles.forEach(function(c){
    mudahaleToplam+=c.ertele?Object.keys(c.ertele).filter(function(k){return c.ertele[k];}).length:0;
    (c.gunluk||[]).forEach(function(r){
      if(r.sulamaDurum==="iptal"||r.sulamaDurum==="degistirildi"){
        sulamaKararToplam++;
        if(r.sulamaAIVerdict==="kirmizi") sulamaRiskliToplam++;
        else if(r.sulamaAIVerdict==="yesil") sulamaUyumluToplam++;
      }
    });
  });
  var mudahaleOrani=mudahaleToplam/cycles.length;
  var puan=maks, kalemler=[];
  if(mudahaleOrani>3){ var d=Math.min(2,(mudahaleOrani-3)*0.4); puan-=d; kalemler.push(_kalem(-Math.round(d*10)/10, "D√∂ng√ľ baŇüńĪna ortalama "+mudahaleOrani.toFixed(1)+" erteleme/plan deńüiŇüiklińüi ‚ÄĒ sńĪk m√ľdahale gerektiriyor")); }
  var sulamaToleransEtiket="‚ÄĒ";
  if(sulamaKararToplam>0){
    var riskliOran=(sulamaRiskliToplam/sulamaKararToplam)*100;
    if(riskliOran>30){ var d2=Math.min(2,riskliOran*0.02); puan-=d2; sulamaToleransEtiket="D√ľŇü√ľk"; kalemler.push(_kalem(-Math.round(d2*10)/10, "Sulama iptal/deńüiŇüikliklerinin %"+riskliOran.toFixed(0)+"'i verilerle √ßeliŇüen gerek√ßeyle yapńĪlmńĪŇü")); }
    else if(sulamaUyumluToplam>=2){ sulamaToleransEtiket="Y√ľksek"; kalemler.push(_kalem(0,"Sulama kararlarńĪnńĪn √ßońüu verilerle dońürulanmńĪŇü ‚ÄĒ sulama toleransńĪ y√ľksek")); }
    else sulamaToleransEtiket="Orta";
  } /* sulamaKararToplam===0: hi√ß sulama iptal/deńüiŇüiklińüi kaydńĪ yok ‚ÄĒ "y√ľksek tolerans" iddia etmek yerine
       veri yetersiz (‚ÄĒ) bńĪrakńĪlńĪr, "varsa deńüerlendir" ilkesiyle tutarlńĪ. */
  if(!kalemler.length) kalemler.push(_kalem(0,"D√∂ng√ľ baŇüńĪna m√ľdahale sayńĪsńĪ d√ľŇü√ľk ‚ÄĒ kolay y√∂netilen bir kompost"));
  puan=Math.max(0,Math.round(puan*10)/10);
  return {puan:puan, maks:maks, kalemler:kalemler, mudahaleOrani:mudahaleOrani, sulamaToleransEtiket:sulamaToleransEtiket};
}
function _firmaYorumUret(kategoriler, protokol, kalite, kolaylik){
  var cumleler=[];
  (protokol.bulgular||[]).forEach(function(b){
    if(b.sapma<=1.2 && Math.abs(b.ortalama)>=0.5){
      cumleler.push(b.ad+" ortalama "+Math.abs(b.ortalama).toFixed(0)+" g√ľn "+(b.ortalama<0?"erkene alńĪnabilmektedir":"ge√ß kalmaktadńĪr")+".");
    } else if(b.sapma>1.6){
      cumleler.push(b.ad+" zamanlamasńĪ sńĪk sńĪk tutarsńĪzlaŇümaktadńĪr (sapma ¬Ī"+b.sapma.toFixed(1)+" g√ľn).");
    }
  });
  if(kalite.ortAmonyak>4) cumleler.push("KompostlarńĪnda amonyak s√ľresi ortalama "+kalite.ortAmonyak.toFixed(1)+" g√ľn ile uzun s√ľrmektedir.");
  else cumleler.push("Kompost sńĪcaklńĪńüńĪ olduk√ßa stabildir.");

  var sorunluKat=kategoriler.filter(function(k){return k.kalemler.some(function(kl){return kl.delta<0;});}).sort(function(a,b){return (a.puan/a.maks)-(b.puan/b.maks);})[0];
  if(sorunluKat){
    var kotuKalem=sorunluKat.kalemler.filter(function(kl){return kl.delta<0;})[0];
    if(kotuKalem) cumleler.push(kotuKalem.aciklama+".");
  }
  var enIyiKat=kategoriler.slice().sort(function(a,b){return (b.puan/b.maks)-(a.puan/a.maks);})[0];
  if(enIyiKat && (enIyiKat.puan/enIyiKat.maks)>=0.9) cumleler.push(enIyiKat.ad.replace(/^\S+\s/,"")+" g√ľ√ßl√ľ bir y√∂n.");

  if(kolaylik.puan/kolaylik.maks>=0.85) cumleler.push("√úretimi y√∂netmesi kolaydńĪr.");
  else if(kolaylik.puan/kolaylik.maks<0.55) cumleler.push("√úretim s√ľrekli m√ľdahale istemektedir, y√∂netimi zordur.");

  if(!cumleler.length) return "Yeterli veri birikince bu firma i√ßin daha ayrńĪntńĪlńĪ bir deńüerlendirme oluŇüacaktńĪr.";
  return cumleler.slice(0,5).join(" ");
}
/* Ana fonksiyon: firma adńĪna g√∂re 7 kategori + genel puan + yorum + karne.
   Hi√ß oda yoksa (bu firma hi√ß kullanńĪlmamńĪŇü) null d√∂ner.

   KullanńĪcńĪ isteńüi: "Uzman/ersanlar i√ßin anlamlńĪ bir kńĪsmi karne √ßńĪksńĪn,
   √Ėzdal dahil yap" ‚ÄĒ √∂nceden T√úM analiz "tamamlanmńĪŇü (boŇüaltńĪlmńĪŇü+hasat
   kaydńĪ olan) d√∂ng√ľ" ŇüartńĪna bańülńĪydńĪ; oda bitmeden hi√ßbir firma i√ßin
   hi√ßbir Ňüey g√∂r√ľnm√ľyordu. Ama 7 kategoriden 5'i (Protokol Uyumu, Kompost
   Kalitesi, Hasat Eńürisi, Kalite ve Fire, √úretim KolaylńĪńüńĪ) kesin/final
   verim bilgisi GEREKTńįRMńįYOR ‚ÄĒ aktif odalardaki BUG√úNE KADARKńį ger√ßek
   veriyle de hesaplanabilir. Sadece Verim ve ńįklim ToleransńĪ, kesin toplam
   verim bilinmeden anlamlńĪ olmadńĪńüńĪ i√ßin tamamlanmńĪŇü d√∂ng√ľlerle sńĪnńĪrlńĪ
   kaldńĪ (veri yoksa kendi "n√∂tr puan" mantńĪklarńĪna d√ľŇüerler). Sonu√ßta
   `kismi:true` iŇüaretlenir ki aray√ľz bunun ge√ßici/eksik bir deńüerlendirme
   olduńüunu a√ßńĪk√ßa g√∂stersin. */
function firmaPerformans(firma){
  var tumCycles=(loadData().cycles||[]).filter(function(c){return (c.kompostFirma||"")===firma;});
  if(!tumCycles.length) return null;
  var tamam=tumCycles.filter(function(c){return c.bosaltimTarihi && (c.hasat||[]).length;});
  var kismi=!tamam.length;

  var protokol=_firmaProtokolUyumu(tumCycles);
  var kalite=_firmaKompostKalitesi(tumCycles);
  var iklim=_firmaIklimToleransi(tamam);
  var hasategri=_firmaHasatEgrisi(tumCycles);
  var verim=_firmaVerim(firma);
  var kalitefire=_firmaKaliteFire(tumCycles);
  var kolaylik=_firmaUretimKolayligi(tumCycles);

  var kategoriler=[
    {key:"protokol",   ad:"ūüďč Protokol Uyumu",   maks:protokol.maks,   puan:protokol.puan,   kalemler:protokol.kalemler},
    {key:"kompost",    ad:"ūüĆ°ÔłŹ Kompost Kalitesi", maks:kalite.maks,     puan:kalite.puan,     kalemler:kalite.kalemler},
    {key:"iklimtol",   ad:"ūüĆ¶ÔłŹ ńįklim ToleransńĪ",  maks:iklim.maks,      puan:iklim.puan,      kalemler:iklim.kalemler},
    {key:"hasategri",  ad:"ūüďą Hasat Eńürisi",     maks:hasategri.maks,  puan:hasategri.puan,  kalemler:hasategri.kalemler},
    {key:"verim",      ad:"‚öĖÔłŹ Verim",            maks:verim.maks,      puan:verim.puan,      kalemler:verim.kalemler},
    {key:"kalitefire", ad:"ūüßļ Kalite ve Fire",   maks:kalitefire.maks, puan:kalitefire.puan, kalemler:kalitefire.kalemler},
    {key:"kolaylik",   ad:"ūüéĮ √úretim KolaylńĪńüńĪ", maks:kolaylik.maks,   puan:kolaylik.puan,   kalemler:kolaylik.kalemler}
  ];
  var toplamPuan=Math.max(0,Math.min(100,Math.round(kategoriler.reduce(function(s,k){return s+k.puan;},0)*10)/10));
  var yorum=_firmaYorumUret(kategoriler, protokol, kalite, kolaylik);

  var kgM2Vals=tamam.map(function(c){return verimOzet(c).kgM2;}).filter(function(v){return v!=null;});
  var kasaVals=tamam.map(function(c){return verimOzet(c).toplam;});
  var flasToplam={F1:0,F1n:0,F2:0,F2n:0};
  tamam.forEach(function(c){
    var fo=verimFlasOzet(c);
    if(fo.F1){ flasToplam.F1+=fo.F1.kasa; flasToplam.F1n++; }
    if(fo.F2){ flasToplam.F2+=fo.F2.kasa; flasToplam.F2n++; }
  });

  return {
    firma:firma, n:tamam.length, nAktif:tumCycles.length-tamam.length, kismi:kismi,
    puan:toplamPuan, kategoriler:kategoriler, yorum:yorum,
    karne:{
      ortKgM2: kgM2Vals.length?(kgM2Vals.reduce(function(a,b){return a+b;},0)/kgM2Vals.length):null,
      ortToplamKasa: kasaVals.length?(kasaVals.reduce(function(a,b){return a+b;},0)/kasaVals.length):null,
      ortFlas1Kasa: flasToplam.F1n?(flasToplam.F1/flasToplam.F1n):null,
      ortFlas2Kasa: flasToplam.F2n?(flasToplam.F2/flasToplam.F2n):null,
      ortMiselPuan: kalite.ortMiselPuan,
      ortAmonyak: kalite.ortAmonyak,
      sulamaToleransEtiket: kolaylik.sulamaToleransEtiket
    }
  };
}

function odaGecmisIstatistik(oda, excludeId){
  var n=normalizeOda(oda);
  var gecmis=tumTamamlananDongu().filter(function(c){return c.id!==excludeId && normalizeOda(c.oda)===n;});
  var vals=gecmis.map(function(c){ return {c:c, kgTon:verimOzet(c).kgTon}; }).filter(function(x){return x.kgTon!=null;});
  if(!vals.length) return null;
  var ort=vals.reduce(function(s,x){return s+x.kgTon;},0)/vals.length;
  var en_iyi=vals.slice().sort(function(a,b){return b.kgTon-a.kgTon;})[0];
  var en_kotu=vals.slice().sort(function(a,b){return a.kgTon-b.kgTon;})[0];
  return {n: vals.length, ort: ort, enIyi:{tarih:en_iyi.c.gelisTarihi, kgTon:en_iyi.kgTon}, enKotu:{tarih:en_kotu.c.gelisTarihi, kgTon:en_kotu.kgTon}};
}
function verimOzet(c){
  var kes=0,nor=0;
  (c.hasat||[]).forEach(function(h){ var k=numParse(h.kasa)||0; if(h.tip==="kestane")kes+=k; else nor+=k; });
  var toplam=kes+nor; var ton=(numParse(c.tonaj)||0)/1000;
  var S=getSet(); var kg=toplam*S.kasaAgirlik;
  var alan=numParse(c.alanM2);
  return {kestane:kes, normal:nor, toplam:toplam, ton:ton, verim:(ton>0?toplam/ton:null), kg:kg, kgTon:(ton>0?kg/ton:null), kgM2:(alan&&alan>0?kg/alan:null), alan:alan};
}
/* B√∂l√ľm 8 (√úRETńįM DEńěERLENDńįRME SńįSTEMńį) ‚ÄĒ Hasat verim oranńĪ otomatik
   sńĪnńĪflandńĪrmasńĪ. Mevcut verim hesaplama y√∂ntemi (verimOzet.kgTon = kg
   hasat / ton kompost) korunur; kullanńĪcńĪnńĪn verdińüi y√ľzde eŇüikleri
   (√∂rn. "%29,4") kgTon/10 ile bire bir √∂rt√ľŇü√ľyor (1 ton = 1000 kg,

function hasatVerimYuzde(c){ var v=verimOzet(c); return v.kgTon!=null ? v.kgTon/10 : null; }
function hasatVerimSiniflandir(yuzde){

  return muhendisSeviyeBul("cok_iyi");
}
/* ==================== B√∂l√ľm 11-13 + 15 ‚ÄĒ Kompost Firma Karnesi (nitel) ====================
   Bir odanńĪn T√úM boyutlarńĪnńĪ (m√ľhendis deńüerlendirmeleri + hasat eńürisi +
   hasat verimi + mantar kalitesi) tek bir 5-seviyeye indirger ‚ÄĒ hem oda
   tamamlama √∂zetinde (B√∂l√ľm 14) hem firma karnesinde (B√∂l√ľm 11-13) aynńĪ
   SSOT kullanńĪlsńĪn diye. */
var MUHENDIS_SEVIYE_SIRA={cok_kotu:1, kotu:2, normal:3, iyi:4, cok_iyi:5};
var MUHENDIS_SEVIYE_ANAHTAR_SIRALI=["", "cok_kotu", "kotu", "normal", "iyi", "cok_iyi"];
function muhendisSeviyeSayidan(n){ return muhendisSeviyeBul(MUHENDIS_SEVIYE_ANAHTAR_SIRALI[Math.min(5,Math.max(1,Math.round(n)))]); }
function odaTumBoyutSeviyeleri(c){
  var out={};
  MUHENDIS_DEGERLENDIRME_ROLLER.forEach(function(r){
    var idx=protokolRolIdx(r.rol);
    var mDeg=(idx>=0 && c.muhendisDegerlendirme) ? c.muhendisDegerlendirme["p"+idx] : null;
    out[r.rol] = mDeg && mDeg.seviye ? muhendisSeviyeBul(mDeg.seviye) : null;
  });
  var flaslar=[1,2].map(function(f){ return hasatEgrisiAnaliz(c,f); }).filter(Boolean);
  out.hasategrisi = flaslar.length ? hasatEgriSeviyeSinifla(flaslar.reduce(function(s,a){return s+a.puan;},0)/flaslar.length) : null;
  out.hasatverimi = hasatVerimSiniflandir(hasatVerimYuzde(c));
  var mk=c.muhendisDegerlendirme && c.muhendisDegerlendirme["mantar_kalite"];
  out.mantarkalite = mk && mk.seviye ? muhendisSeviyeBul(mk.seviye) : null;
  return out;
}
/* Bir odanńĪn "Genel Sonu√ß"u ‚ÄĒ t√ľm boyutlardaki seviyelerin ortalamasńĪ. Hi√ßbir
   boyut deńüerlendirilmemiŇüse null (genelleme yapńĪlmaz). */
function odaGenelSonucSeviyesi(c){
  var b=odaTumBoyutSeviyeleri(c);
  var vals=[b.tiftik,b.toprak,b.tirmik,b.hava,b.flas1,b.hasategrisi,b.hasatverimi,b.mantarkalite].filter(Boolean).map(function(s){return MUHENDIS_SEVIYE_SIRA[s.key];});
  if(!vals.length) return null;
  return {seviye: muhendisSeviyeSayidan(vals.reduce(function(a,b){return a+b;},0)/vals.length), n: vals.length};
}
var FIRMA_BOYUT_LISTESI = [
  {key:"tiftik", ad:"ūüćĄ Misel GeliŇüimi (SarńĪm)"},
  {key:"toprak", ad:"ūüĆĪ Toprak Ge√ßiŇüi"},
  {key:"tirmik", ad:"ūü™ģ TńĪrmńĪk PerformansńĪ"},
  {key:"hava", ad:"ūüĆ¨ÔłŹ Havaya Ge√ßiŇü"},
  {key:"flas1", ad:"ūüćĄ 1. FlaŇü"},
  {key:"hasategrisi", ad:"ūüďą Hasat Eńürisi"},
  {key:"hasatverimi", ad:"‚öĖÔłŹ Hasat Verimi"},
  {key:"mantarkalite", ad:"ūüćĄ Mantar Kalitesi"}
];
/* Bir firmanńĪn T√úM odalarńĪ (aktif+tamamlanmńĪŇü) √ľzerinden her boyutun
   dańüńĪlńĪmńĪnńĪ (ka√ß oda √áok ńįyi/ńįyi/...) ve baskńĪn seviyesini + tamamlanmńĪŇü
   d√∂ng√ľlerin Genel Sonu√ß dańüńĪlńĪmńĪndan STABńįLńįTE'yi hesaplar. √Ėrneklem
   sayńĪsńĪ HER ZAMAN ayrńĪ g√∂sterilir (B√∂l√ľm 12) ‚ÄĒ az veriyle genelleme
   yapńĪlmaz (B√∂l√ľm 13/15). */
function firmaBoyutDagilimi(firma){
  var cycles=(loadData().cycles||[]).filter(function(c){return (c.kompostFirma||"")===firma;});
  var out={};
  FIRMA_BOYUT_LISTESI.forEach(function(bl){ out[bl.key]={sayac:{cok_iyi:0,iyi:0,normal:0,kotu:0,cok_kotu:0}, n:0, baskin:null}; });
  cycles.forEach(function(c){
    var b=odaTumBoyutSeviyeleri(c);
    FIRMA_BOYUT_LISTESI.forEach(function(bl){
      var sv=b[bl.key];
      if(sv){ out[bl.key].sayac[sv.key]++; out[bl.key].n++; }
    });
  });
  FIRMA_BOYUT_LISTESI.forEach(function(bl){
    var o=out[bl.key];
    if(!o.n) return;
    var toplam=0;
    Object.keys(o.sayac).forEach(function(k){ toplam+=MUHENDIS_SEVIYE_SIRA[k]*o.sayac[k]; });
    o.baskin=muhendisSeviyeSayidan(toplam/o.n);
  });
  var tamam=cycles.filter(function(c){return c.bosaltimTarihi && (c.hasat||[]).length;});
  var genelSonuclar=tamam.map(function(c){return odaGenelSonucSeviyesi(c);}).filter(Boolean);
  var stabilite=null;
  if(genelSonuclar.length>=2){
    var vals=genelSonuclar.map(function(g){return MUHENDIS_SEVIYE_SIRA[g.seviye.key];});
    var ort=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var sapma=Math.sqrt(vals.reduce(function(s,v){return s+Math.pow(v-ort,2);},0)/vals.length);
    var stKey = sapma<=0.4?"cok_iyi":(sapma<=0.8?"iyi":(sapma<=1.2?"normal":(sapma<=1.8?"kotu":"cok_kotu")));
    stabilite={seviye:muhendisSeviyeBul(stKey), sapma:sapma};
  }
  var dagilimGenel={cok_iyi:0,iyi:0,normal:0,kotu:0,cok_kotu:0};
  genelSonuclar.forEach(function(g){ dagilimGenel[g.seviye.key]++; });
  return {n:tamam.length, nAktif:cycles.length-tamam.length, boyutlar:out, stabilite:stabilite, genelSonuclar:genelSonuclar, dagilimGenel:dagilimGenel};
}

/* ---------- T√ľketim √∂zeti ---------- */
/* KullanńĪcńĪ raporu: "oda akńĪŇüńĪ ve pdf de toplam su ile verdińüim su miktarńĪ
   uyuŇümuyor." K√∂k sebep: bu fonksiyon "Toplam Su" i√ßin KENDńį AYRI, basit
   bir regex (r.sulama i√ßindeki T√úM "sayńĪ+lt" kalńĪplarńĪnńĪ TOPLAR) kullanńĪyordu
   ‚ÄĒ oysa PDF/Oda AkńĪŇüńĪ'ndaki g√ľnl√ľk "Sulama" s√ľtunu (gunlukSatirAyristir) ve
   grafikteki su √ßubuklarńĪ (gunlukSuMiktari) √ßok daha sofistike bir
   sńĪnńĪflandńĪrńĪcńĪ kullanńĪyor (miktar+madde adńĪ ayrńĪmńĪ yapar, TOPLAMAK yerine
   g√ľn√ľn en b√ľy√ľk tek sayńĪsńĪnńĪ alńĪr). ńįki ayrńĪ yol aynńĪ veriyi farklńĪ
   yorumlayńĪnca, PDF'in √ľst√ľndeki toplam ile altńĪndaki g√ľnl√ľk satńĪrlar
   birbirini tutmuyordu. ArtńĪk BURASI DA gunlukSuMiktari'yi (SSOT) kullanńĪyor
   ‚ÄĒ √ľ√ß yer de (toplam, g√ľnl√ľk satńĪr, grafik) garanti olarak aynńĪ sonucu verir. */
function tuketimOzet(c){
  var su=0, kim={}, n=0, approx=false; var suGunSayisi=0; var flasSu={};
  (c.gunluk||[]).forEach(function(r){
    var sn=numParse(r.su); var hasText=!!r.sulama;
    if(sn===null && !hasText) return;
    n++;
    var buSu=gunlukSuMiktari(r);
    if(buSu>0){
      su+=buSu;
      if(sn===null) approx=true; /* deńüer temiz sayńĪsal r.su'dan deńüil, serbest metinden okundu */
      suGunSayisi++; var ha=hasatAsama(c,r.tarih); var key=(ha&&ha.flas>0)?("F"+ha.flas):"hazńĪrlńĪk/kulu√ßka"; flasSu[key]=(flasSu[key]||0)+buSu;
    }
    if(hasText){ ["Serenade","Vivando","Tezguard","insektisit","formaldehit","Asena","kalsiyum","sodyum"].forEach(function(kw){ if(new RegExp(kw,"i").test(r.sulama)) kim[kw]=(kim[kw]||0)+1; }); }
  });
  var ton=(numParse(c.tonaj)||0)/1000; var alan=numParse(c.alanM2);
  return {su:su, islem:n, kim:kim, approx:approx, suTon:(ton>0?su/ton:null), suM2:(alan&&alan>0?su/alan:null), suGunOrt:(suGunSayisi>0?su/suGunSayisi:null), flasSu:flasSu};
}
function tuketimCardHTML(c){
  var t=tuketimOzet(c);
  var kimStr=Object.keys(t.kim).map(function(k){return k+" ("+t.kim[k]+")";}).join(", ")||"‚ÄĒ";
  var flasStr=Object.keys(t.flasSu).map(function(k){return k+": "+t.flasSu[k].toFixed(0)+" lt";}).join(" ¬∑ ")||"‚ÄĒ";
  return '<div class="sec-title">T√ľketim √∂zeti</div><div class="card">'
    +'<div class="kv"><span class="k">Toplam su'+(t.approx?' (kńĪsmen tahmini)':'')+'</span><span class="v" style="font-weight:700;">'+(t.su||0)+' lt</span></div>'
    +(t.suTon!=null?'<div class="kv"><span class="k">Ton kompost baŇüńĪna su</span><span class="v">'+t.suTon.toFixed(0)+' lt/ton</span></div>':'')
    +(t.suM2!=null?'<div class="kv"><span class="k">m¬≤ baŇüńĪna su</span><span class="v">'+t.suM2.toFixed(1)+' lt/m¬≤</span></div>':'')
    +(t.suGunOrt!=null?'<div class="kv"><span class="k">Sulama g√ľn√ľ ortalamasńĪ</span><span class="v">'+t.suGunOrt.toFixed(0)+' lt/g√ľn</span></div>':'')
    +'<div class="kv"><span class="k">FlaŇü bazńĪnda su</span><span class="v" style="text-align:right;max-width:60%;">'+esc(flasStr)+'</span></div>'
    +'<div class="kv"><span class="k">Sulama/ila√ß iŇülemi</span><span class="v">'+t.islem+'</span></div>'
    +'<div class="kv"><span class="k">KullanńĪlan ila√ßlar</span><span class="v" style="text-align:right;max-width:60%;">'+esc(kimStr)+'</span></div>'
    +(t.approx?'<div class="muted" style="margin-top:6px;">Su, sayńĪ kutusuna girilenlerden toplanńĪr; girilmeyen satńĪrlarda metindeki "lt" tahmin edilir.</div>':'')+'</div>';
}

/* ---------- Ge√ßmiŇü kńĪyas ---------- */
function overlayChartSVG(list){
  var colors=["#14583a","#1f9e75","#d98a1f","#3b82c4","#a3408a","#888"];
  var series=[];
  list.forEach(function(c,idx){
    var pts=[]; (c.gunluk||[]).forEach(function(r){ var v=numParse(r.kompostC), g=gunNo(c,r.tarih); if(v!==null&&g!=="") pts.push({g:g,v:v}); });
    pts.sort(function(a,b){return a.g-b.g;});
    if(pts.length) series.push({pts:pts, col:colors[idx%colors.length], lbl:fmtDate(c.gelisTarihi)+(c.tur?(" ("+c.tur+".tur)"):"")});
  });
  if(!series.length) return '<div class="muted">Kompost √∂l√ß√ľm√ľ yok.</div>';
  var W=720,H=300,pad=42,gmin=Infinity,gmax=-Infinity,vmin=Infinity,vmax=-Infinity;
  series.forEach(function(s){ s.pts.forEach(function(p){ if(p.g<gmin)gmin=p.g; if(p.g>gmax)gmax=p.g; if(p.v<vmin)vmin=p.v; if(p.v>vmax)vmax=p.v; }); });
  vmin=Math.floor(vmin-1); vmax=Math.ceil(vmax+1); if(gmax===gmin)gmax=gmin+1; if(vmax===vmin)vmax=vmin+1;
  function X(g){return pad+(g-gmin)/(gmax-gmin)*(W-2*pad);}
  function Y(v){return H-pad-(v-vmin)/(vmax-vmin)*(H-2*pad);}
  var svg=''; if(26<=vmax&&24>=vmin) svg+='<rect x="'+pad+'" y="'+Y(26)+'" width="'+(W-2*pad)+'" height="'+(Y(24)-Y(26))+'" fill="#dcefe2"/>';
  var step=Math.max(1,Math.round((vmax-vmin)/5));
  for(var t=vmin;t<=vmax;t+=step){var y=Y(t);svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#eee"/><text x="'+(pad-5)+'" y="'+(y+3)+'" font-size="10" text-anchor="end" fill="#555">'+t+'¬į</text>';}
  series.forEach(function(s){ var d=s.pts.map(function(p){return X(p.g)+","+Y(p.v);}).join(" "); svg+='<polyline points="'+d+'" fill="none" stroke="'+s.col+'" stroke-width="2"/>'; });
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#888"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#888"/>';
  var leg=series.map(function(s){return '<span style="color:'+s.col+';">\u25cf '+s.lbl+'</span>';}).join(" &nbsp; ");
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="max-width:100%;border:1px solid #ccc;" xmlns="http://www.w3.org/2000/svg">'+svg+'<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" fill="#333">G√ľn (geliŇüten)</text></svg><div style="font-size:11px;margin-top:4px;">'+leg+'</div>';
}

/* ---------- HavalandńĪrma g√ľnl√ľk hedefi (dinamik ikaz) ---------- */
/* Bug√ľne ait havalandńĪrma planńĪ satńĪrńĪnńĪn TAMAMINI d√∂ner (hedefC +
   co2alt/co2ust) ‚ÄĒ havaHedef() bunun sadece sńĪcaklńĪk sayńĪsńĪnńĪ istedińüi i√ßin
   ayrńĪ tutuluyor, ikisi de aynńĪ satńĪrńĪ bulur.
   KRńįTńįK: Plan sadece m√ľhendisin se√ßtińüi g√ľn sayńĪsńĪ kadar (√∂rn. 4 g√ľn)
   kademeli d√ľŇü√ľŇü i√ßindir ‚ÄĒ bug√ľn, plandaki EN SON tarihten sonraysa (kademeli
   d√ľŇü√ľŇü s√ľresi bittiyse) null d√∂neriz. Aksi halde son g√ľn√ľn hedefi (√∂rn. 18¬į)
   s√ľresiz g√∂sterilmeye devam eder ‚ÄĒ h√Ęlbuki o noktadan sonra artńĪk "kademeli
   hedef" deńüil, sabit rejim d√∂nemidir; ayrńĪ bir uyarńĪ kapsamńĪ olmamalńĪ. */
/* tarih (opsiyonel): hangi g√ľne ait hedefin isteneceńüi ‚ÄĒ verilmezse bug√ľn.
   G√ľnl√ľk Tur'da m√ľhendis √ľstteki tarihi deńüiŇütirip "o g√ľn ne olacaktńĪ"
   √∂nizlemesi yapabilsin diye (kullanńĪcńĪ isteńüi: "tarihi deńüiŇütiriyorum ama
   aŇüańüńĪdaki bilgiler deńüiŇümiyor") ‚ÄĒ ger√ßek aksiyonlar (plan kaydńĪ vb.) her
   zaman todayISO() ile √ßańürńĪlmaya devam eder, sadece G√ĖR√úNT√úLEME buradan tarih alńĪr. */
function havaHedefSatiri(c, tarih){
  if(!c.hava||!c.hava.length) return null;
  var today=tarih||todayISO(), best=null, sonTarih=null;
  c.hava.forEach(function(r){
    if(!sonTarih || r.tarih>sonTarih) sonTarih=r.tarih;
    if(r.tarih<=today && (!best||r.tarih>best.tarih)) best=r;
  });
  if(sonTarih && today>sonTarih) return null; /* kademeli d√ľŇü√ľŇü s√ľresi bitti */
  if(!best) c.hava.forEach(function(r){ if(!best||r.tarih<best.tarih) best=r; });
  return best;
}
function havaHedef(c, tarih){
  var best=havaHedefSatiri(c, tarih);
  return best?numParse(best.hedefC):null;
}

/* Uygulama arka plandan/kapalńĪyken √∂ne gelince (√∂zellikle iOS'ta) tarayńĪcńĪ
   bazen JS'i hi√ß yeniden √ßalńĪŇütńĪrmadan, kapanmadan √ĖNCEKńį donmuŇü ekran
   g√∂r√ľnt√ľs√ľn√ľ g√∂sterir (bfcache) ‚ÄĒ bu y√ľzden diskteki EN G√úNCEL veriyi
   okuyup yeniden render etmemiz gerekiyor (belki baŇüka cihaz senkronla
   deńüiŇütirmiŇütir). storeKeyOku() IndexedDB'den okuduńüu i√ßin asenkron olmak
   zorunda, ama artńĪk Ňüifre √ß√∂zme yok ‚ÄĒ sadece JSON.parse. Herhangi bir hata
   olursa mevcut bellek verisi OLDUńěU GńįBńį bńĪrakńĪlńĪr, ASLA boŇüaltńĪlmaz. */
async function resumeYenidenYukle(){
  try{
    var raw = await storeKeyOku();
    if(raw){
      var parsed = JSON.parse(raw);
      if(parsed && parsed.enc!==1){
        memData = parsed;
        memDataNormalizeVeGoc();
      }
    }
  }catch(e){
    console.error("arka plandan d√∂n√ľŇüte veri yenilenemedi ‚ÄĒ mevcut bellek verisi korunuyor", e);
    return;
  }
  try{ render(); }catch(e){ console.error("resume render error:", e); }
  cloudYedekAcilista();
}
